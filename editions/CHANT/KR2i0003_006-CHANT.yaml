body:
  text: 卷第六劉先主志先主諱備字玄德涿郡涿縣人漢景帝子中山靖王勝後也勝子真元朔二年封涿郡陸成侯因家焉祖父雄察孝廉為東郡范令父弘早亡先主幼孤與母販履織蓆自業舍東南角籬上有桑樹生高五丈餘遙望童童如車蓋人皆異之或謂當出貴人先主少時與宗中諸兒戲於樹下言吾必乘此羽葆蓋車叔父子敬謂曰汝勿妄言滅吾門也年十五母遣行學與宗人劉德然遼西公孫瓚俱事故九江太守同郡盧子幹德然父元起常資給先主與德然等元起妻曰各自一家何能常爾起曰宗中有此兒非常人也而瓚深與先主善瓚年長先主兄事之喜狗馬音樂美衣服長七尺五寸垂臂下膝顧自見耳能下人喜怒不形於色善交結豪俠年少爭附之中山大商張世平蘇雙等見而奇之多與之金先主由是得合徒眾河東關羽雲長同郡張飛益德並以壯烈為禦侮先主與二子寢則同床食則共器恩若弟兄然於稠人廣眾中侍立終日中平元年從校尉鄒靖討黃巾賊有功除安喜尉求謁督郵不得乃入縛執之杖二百以綬繫督郵頭頸著馬枊柱委官亡命頃之應大將軍何進募有功除下密丞復為高唐尉遷為令瓚為中郎將表先主為別部司馬拒冀州牧袁紹數有戰功守平原令進領平原相郡民劉平恥為之下使客刺之客服其德告之而去北海相魯國孔融為黃巾賊所圍使太史慈求救於先主先主曰孔文舉聞天下有劉備乎以兵救之廣陵太守下邳陳登元龍太尉球孫也有雋才輕天下士謂功曹陳矯曰閨門雍穆有德有行吾敬陳元方父子冰清玉潔有德有言吾敬華子魚博聞強志奇偉卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉玄德名器盡此徐州牧陶謙表先主為豫州刺史謙病篤謂別駕東海麋竺曰非劉備不能安此州也謙卒竺率州迎先主先主未許陳登進曰今漢室陵遲海內傾覆立功立事在今日鄙州殷富戶口百萬欲屈使君撫臨州事先主曰袁公路近在壽春此君四世五公海內所歸可以州與之登曰公路驕豪非治亂之主今欲為使君合步騎十萬上可以匡濟生民成五霸之業下可以割地守境書功於竹帛若使君不見聽許登亦未敢聽使君也孔融謂先主曰袁術豈憂國忘家者耶冢中枯骨何足介意今日之事百姓與能天與不取悔不可追先主遂領徐州牧建安元年曹公表為鎮東將軍封宜城亭侯先主與袁術相拒而下邳守將曹豹叛為呂布所取先主失妻子轉軍海西麋竺進妹為夫人及客奴二千金銀寶貨資之先主因而獲振連合於布布還其妻子先主眾萬餘移軍小沛布惡之自攻先主先主歸曹公公以為豫州牧益其軍使伐布失利布將高順復虜先主妻子送布公使夏侯惇助先主不能克三年公自征布生禽之布曰使布為明公將騎天下不足定也公有疑色先主曰公待布能如丁建陽董太師乎公頷之布目先主曰大耳兒最叵信者也遂殺布先主還得妻子從公還許為左將軍公禮之甚重出則同輿坐則同席又拜關羽張飛皆中郎將公謀臣程昱郭嘉勸公殺先主公慮失英豪望不許袁術自淮南欲經徐州北就袁紹公遣先主要擊術未至術病死先主未出時獻帝舅車騎將軍董承受帝衣帶中密詔當殺公承先與先主及長水校尉种輯將軍吳子蘭王子服等同謀以將行未發公從容謂先主曰天下英雄惟使君與操本初之徒不足數也先主方食失匕箸會天震雷先主曰聖人言迅雷風烈必變良有以也一震之威乃至於此也公亦悔失言先主還解公使覘之見其方披蔥使廝人為之不端正舉杖擊之公曰大耳翁未之覺也其夜先主急東行昱嘉復言之公馳使追之不及先主遂殺徐州刺史車冑以叛留關羽行下邳太守事身還小沛而承等謀洩受誅先主眾數萬遣從事北海孫乾自結於袁紹公遣將軍劉岱王忠擊之不克五年公東征先主先主敗績妻子及關羽見獲先主奔青州刺史袁譚奉迎道路馳以白父紹紹身出鄴二百里與先主相見公壯羽勇銳拜偏將軍初羽隨先主從公圍呂布於濮陽時秦宜祿為布求救於張楊羽啟公妻無子下城乞納宜祿妻公許之及至城門復白公疑其有色自納之後先主與公獵羽欲於獵中殺公先主為天下惜不聽故羽常懷懼公察其神不安使將軍張遼以情問之羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之要當立效以報曹公公聞而義之是歲紹征官渡遣梟將顏良攻東郡太守劉延於白馬公使遼羽為先鋒羽望見良麾蓋策馬刺良於萬眾中斬其首還紹將莫敵遂解延圍公即表封羽漢壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主左右欲追之公曰彼各有主先主說紹南連荊州牧劉表紹遣將其本兵至汝南公使將蔡楊擊之先主謂曰吾勢雖不便汝等百萬來末如吾何曹孟德單車來吾自去楊等必戰為先主所殺公既破紹自南征汝南先主遣麋竺孫乾詣劉表表郊迎之待以上賓使屯新野潁川徐元直致瑯琊諸葛亮曰孔明臥龍也將軍願見之乎先主曰君與俱來庶曰此人可就見不可屈致也先主遂造亮凡三因屏人曰漢室傾頹奸臣竊命主上蒙塵孤不度德量力欲信大義於天下而智術淺短遂用猖蹶至於今日志猶未已君謂計將安出亮對曰自董卓以來豪傑並起跨州連郡不可勝數曹操比於袁紹則名微而眾寡然遂能克紹以弱為強雖云天時抑人謀也今操已擁百萬之眾挾天子而令諸侯此誠不可與爭也孫權據有江東已歷三世國險而民附賢能為之用此可以為援而不可圖也荊州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能殆天所以資將軍也益州險塞沃野天府之土高祖因之以成帝業劉璋闇弱張魯在北國富民殷而不知卹賢能之士思得明君將軍既帝室之冑信義著於四海總攬英雄思賢如渴若跨有荊益保其險阻西和諸戎南撫夷越結好孫權內脩政理天下有變命一上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川天下孰不簞食壺漿以迎將軍者乎如此則霸業可成漢室可興矣先主曰善與亮情好日密自以為猶魚得水也十三年表卒少子琮襲位曹公南征琮遣使請降先主屯樊不知曹公卒至至宛先主乃知遂將其眾去比到當陽眾十餘萬人車數千兩日行十餘里別遣關羽乘船會江陵或謂先主曰宜速行雖擁大眾被甲者少曹公軍至何以禦之先主曰夫濟大事以人為本今人歸吾何忍棄之公以江陵有軍實恐先主據之乃釋輜重以輕騎五千追先主一日一夜行三百里及於當陽之長坂先主棄妻子與諸葛亮張飛等數十騎走公盡獲其民眾急追先主張飛據水斷橋橫馬按矛曰我張益德也可來決死公徒乃止先主斜趣漢津適與羽船會而趙雲身抱先主弱子後主及擁先主甘夫人相及濟沔亮曰事急矣請奉命求救於孫將軍時權軍柴桑既服先主大名又悅亮奇雅即遣周瑜程普水軍三萬助先主拒曹公大破公軍於赤壁焚其舫舟公引軍北歸先主以劉表長子江夏太守琦為荊州刺史先主南平四郡武陵太守金旋長沙太守韓玄桂陽太守趙範零陵太守劉度皆降廬江雷緒率部曲數萬口稽顙琦病死先主領荊州牧治公安孫權進妹恩好綢繆以亮為軍師中郎將督南三郡事以關羽為盪寇將軍領襄陽太守住江北張飛為征虜將軍宜都太守初先主之敗東走也徑往鄂無土地關羽責之曰早從獵中言無今日先主曰安知此不為福也及得荊州復有人眾孫權遣使求共伐蜀又曰雅願以隆成為一家諸葛孔明母兄在吳可令相并主簿殷觀曰若為吳先驅大事去矣今但可贊之言新據諸郡未可以動彼必不越我而有蜀也先主乃報曰益州不明得罪左右庶幾將軍高義上匡漢朝下輔宗室若必尋干戈備將放髮於山林未敢聞命權果輟計遷觀別駕十六年益州牧劉璋遣法正迎遂西入益州建安十九年先主克蜀蜀中豐富盛樂置酒大會饗食三軍取蜀城中民金銀頒賜將士還其穀帛賜諸葛亮法正關羽張飛金五百斤銀千斤錢五千萬錦段萬匹其餘各有差以亮為軍師將軍署左將軍府事正揚武將軍蜀郡太守關羽督荊州事張飛為巴西太守馬超平西將軍不用許靖法正說曰有獲虛譽而無實者靖也然其浮名稱播海內人將謂公輕士乃以為長史龐羲為司馬李嚴為犍為太守費觀為巴郡太守徵益州太守南郡董和為掌軍中郎將巴郡太守漢嘉王謀為別駕廣漢彭羕為治中辟零陵劉巴為西曹掾廣漢長黃權為偏將軍於是亮為股肱正為謀主羽飛超為爪牙靖羲及麋竺𥳑雍孫乾山陽伊籍為賓友和嚴權本劉璋所授用也吳懿費觀璋之婚親也彭羕璋所排擯也劉巴己所宿恨也皆處之顯位盡其器能有志之士無不競勸群下勸先主納劉瑁妻先主嫌其同族法正曰論其親疏何與晉文之於子圉乎從之正既臨郡睚眥之怨一湌之惠無不報復或謂諸葛亮曰法正於蜀郡太縱橫將軍宜啟主公亮曰主公之在公安也北畏曹操之強東憚孫權之逼內慮孫夫人興變於肘腋之下孝直為輔翼遂翻飛翱翔不可復制如何禁法使不得行其志也孫夫人才捷剛猛有諸兄風侍婢百人皆仗劍侍立先主每下車心常凜凜正勸先主還之二十年孫權使報先主欲得荊州先主報曰吾方圖涼州涼州定以荊州相與孫權怒遣呂蒙襲奪長沙零陵桂陽三郡先主下公安令關羽下益陽會曹公入漢中張魯走巴西黃權進曰若失漢中則三巴不振此割蜀人股臂也於是先主與吳連和分荊州江夏長沙桂陽東屬南郡零陵武陵西屬引軍還江州以權為護軍迎魯魯已北降曹公權破公所署三巴太守杜濩朴胡袁約等公留征西將軍夏侯淵益州刺史趙顒及張郃守漢中公東還郃數犯掠巴界先主令張飛等進軍宕渠之蒙頭拒郃相持五十餘日飛從他道邀郃戰於陽石遂大破郃軍郃失馬緣山獨與麾下十餘人從閒道還南鄭也二十一年先主還成都二十二年蜀郡太守法正進曰曹操一舉降張魯定漢中不因此勢以圖巴蜀而留淵郃身遽北還非智不逮力不足將內有憂逼耳今算淵郃才略不勝吾將率舉眾往討則必可擒天以與我時不可失也先主從之以問儒林校尉巴西周群群對曰當得其地不得其民若出偏軍必不利先主遂行諸葛亮居守足食足兵也二十三年先主急書發兵軍師亮以問從事犍為楊洪洪對曰漢中蜀之咽喉存亡之機若無漢中則無蜀矣此家門之禍男子當戰女子當運發兵何疑亮以法正從行白先主以洪領蜀郡太守後遂即真初洪為犍為太守李嚴功曹去郡數年已為蜀郡嚴故在職而蜀郡何祗為洪門下書佐去郡數年已為廣漢太守洪故在官是以西土咸服亮之能攬拔英秀也後洪祗俱會亮門下洪謂祗曰君馬何駛祗對曰故吏馬不為駛明府馬不進耳二十四年先主定漢中斬夏侯淵張郃率吏民內徙先主遣將吳蘭雷同入武都皆沒乃舉群茂才時州後部司馬張裕亦知占術坐漏言言先主得蜀寅卯之間當失漢凶年在庚子誅曹公為魏王王西征聞法正策曰固知玄德不辨此又曰吾收奸雄略盡獨不得正邪群下上先主為漢中王大司馬以許靖為太傅法正為尚書令零陵賴恭為太常南陽黃柱為光祿勳王謀為少府武陵廖立為侍中關羽為前將軍張飛為右將軍馬超為左將軍皆假節鉞又以黃忠為後將軍趙雲翊軍將軍其餘各進官號軍師諸葛亮曰黃忠名望本非關張馬超之倫也今張馬在近親見其功猶可喻指關遙聞之恐必不悅先主曰吾自解之時關羽自江陵圍曹仁於樊城遣前部司馬犍為費詩拜假節羽怒曰大丈夫終不與老兵同列不肯受拜詩謂曰昔蕭曹與高祖幼舊陳韓亡命後至論其班爵韓最居上未聞蕭曹以此為怨今王以一時之功隆崇於漢升意之輕重寧當與君侯齊乎王與君侯譬猶一體禍福同之愚謂君侯不宜計官號之高下爵祿之多少也羽即受拜初羽聞馬超來降素非知故書與諸葛亮問其人材亮知羽忌前答曰孟起黔彭之徒一世之桀當與益德並驅爭先猶不如髯之絕倫也羽省書忻悅以示賓客羽美鬢髭故亮稱云髯也羽臂嘗中流矢每天陰疼痛醫言矢鋒有毒須破臂刮毒患乃可除羽即伸臂使治時適會客臂血流離盈於盤器而羽引酒割炙言笑自若魏王遣左將軍于禁督七軍三萬人救樊漢水暴長皆為羽所獲又殺魏將龐德威震華夏魏王議徙許都以避其銳而孫權襲江陵將軍傅士仁南郡太守麋芳降吳羽久不拔城魏右將軍徐晃救樊羽退還遂為孫權所殺吳盡取荊州以劉璋為益州牧住姊歸是歲尚書令法正卒謚曰翼侯以尚書劉巴為尚書令二十五年春正月魏武王薨嗣王丕即位改元延康蜀傳聞漢帝見害先主乃發喪制服追謚曰孝愍皇帝所在並言眾瑞故議郎陽泉亭侯劉豹青衣侯向舉偏將軍張裔黃權大司馬屬陰純別駕趙莋治中楊洪從事祭酒何宗議曹從事杜瓊勸學從事張爽尹默譙周等上言河洛符驗孔子所甄洛書甄耀度曰赤三日德昌九世會備合為帝際洛書寶號命曰天度帝道備稱皇又言周群父未亡時數言西南有黃氣立數十丈而景雲祥風從璇璣下來應之如圖書必有天子出方今大王應際而生與神合契願速即洪業以寧海內先主未許冬魏王丕即皇帝位改元黃初漢獻帝遜位為山陽公章武元年魏黃初二年也春太傅許靖安漢將軍麋竺軍師將軍諸葛亮太常賴恭光祿勳黃柱少府王謀等乃勸先主紹漢絕統即帝號先主不許亮進曰昔吳漢耿弇等勸世祖即帝位世祖辭讓耿純進曰天下英雄喁喁冀有所望若不從議者士大夫各歸其主無從公也世祖感之今曹氏篡漢天下無主大王紹世而起乃其宜也士大夫隨大王久勤苦者亦欲望尺寸之功如純言耳先主乃從之亮與博士許慈議郎孟光建立禮儀擇令辰費詩上疏曰殿下以曹操父子逼主篡位故乃羈旅萬里糺合士眾將以討賊今大敵未克而先自立恐人疑惑昔高祖與楚約先破秦者王及屠咸陽獲子嬰猶推讓況今殿下未出門便欲自立愚臣誠不為殿下取也朝廷左遷詩部永昌從事夏四月丙午先主即帝位大赦改元章武以諸葛亮為丞相假節錄尚書事許靖為右司徒張飛車騎將軍領司隸校尉進封西鄉侯馬超驃騎將軍領涼州刺史封斄鄉侯北督臨沮偏將軍吳懿為關中都督進魏延鎮北將軍李嚴輔漢將軍襄陽馬良為侍中楊儀為尚書蜀郡何宗為鴻臚立宗廟祫祭高皇帝世祖光武皇帝五月辛巳立皇后吳氏吳懿妹劉璋兄瑁妻也子禪為皇太子六月立子永為魯王理為梁王先主將東征以復關羽之恥命張飛率巴西萬兵將會江州飛帳下將張達范彊殺飛持其首奔吳初飛勇冠三軍俱稱萬人之敵羽善待小人而驕士大夫飛愛敬君子而不卹小人是以皆敗先主常戒之曰卿刑殺過差鞭撻健兒令在左右此取禍之道飛不悟故敗先主聞飛營軍都督之有表也曰噫飛死矣命丞相亮領司隸校尉秋七月先主東伐群臣多諫不納廣漢秦宓上陳天時必無其利先主怒縶之於理孫權送書請和先主不聽吳將陸議李異劉阿等軍至姊歸左右領軍南郡馮習陳留吳班自建平攻破異等軍次姊歸武陵五溪蠻夷遣使請兵二年春正月先主軍姊歸吳班陳戒等水軍屯夷陵夾江東西岸二月將進黃權諫曰吳人悍戰而水軍泝流進易退難臣請為先驅以嘗寇陛下宜為後鎮先主不從以權為鎮北將軍督江北軍先主連營稍前軍於夷道猇亭遣侍中馬良經佷山安慰五溪蠻夷夏六月黃氣見自姊歸十餘里中廣十餘丈後十數日與吳人戰先主敗績馮習及將張南皆死先主歎曰吾之敗天也委舟舫由步道還魚復將軍義陽傅彤為後殿兵眾死盡彤氣益烈吳將喻令降彤罵曰吳狗何有漢將軍降者遂戰死從事祭酒程畿獨泝江退眾曰後追以至宜解舫輕行畿曰吾在軍未習為敵走況從天子乎亦見殺黃權偏軍孤絕遂北降魏李異劉阿等踵躡先主屯南山先主改魚復曰永安丞相亮聞而歎曰法孝直若在則能制主上使不東行既復東行必不顛危矣八月司徒靖卒是歲驃騎將軍馬超亦卒臨沒上疏曰臣宗門二百餘口為孟德所誅略盡唯從弟岱當為微宗血食之係深託陛下岱官至平北將軍拜彤子僉左右郎將冬十月詔丞相亮營南北郊於成都孫權聞先主在白帝甚懼遣使請和先主使太中大夫南陽宗瑋報命十有一月先主寢疾十有二月漢嘉太守黃元素亮所不善聞先主疾病慮有後患舉郡拒守三年春正月召丞相亮於成都詔亮省疾於永安元燒臨邛城治中從事楊洪啟太子遣將軍陳曶鄭綽由青衣水伐元滅之二月亮至永安先主謂曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣對曰臣敢竭股肱之力效忠貞之節繼之以死先主又為詔敕太子曰汝與丞相從事事之如父亮與尚書令李嚴並受寄託夏四月先主殂於永安宮時年六十二亮表後主曰大行皇帝邁仁樹德覆育無彊昊天不弔今月二十四日奄忽升遐臣妾號咷如喪考姚乃顧遺詔事惟太宗百寮發哀三日除服到葬復服其郡國守相令長丞尉三日除服五月梓宮至成都謚曰昭烈皇帝秋八月葬惠陵譔曰漢末大亂雄桀並起若董卓呂布二袁韓馬張楊劉表之徒兼州連郡眾踰萬計叱咤之閒皆自謂漢祖可踵桓文易邁而魏武神武幹略戡屠盪盡於時先主名微人鮮而能龍興鳳舉伯豫君徐假翼荊楚翻飛梁益之地克胤漢祚而吳魏與之鼎峙非英才命世孰克如之然必以曹氏替漢宜扶信順以明至公還乎名號為義士所非及其寄死託孤於諸葛亮而心神無貳陳子以為君臣之至公古今之盛軌也
