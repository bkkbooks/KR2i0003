body:
  text: 卷第十一後賢志聞之善志者述而不作序事者實而不華是以史遷之記詳於秦漢班生之書備乎哀平皆以世及事邇可得而言也西州自奉聖晉後俊偉倜儻之士或脩德讓行止從時或播功立事羽儀上京策勳王府甄名史錄侔於先賢會遇喪亂軋搆華夏顛墜典籍多缺族祖武平府君愍其若斯乃操𥳑援翰拾其遺闕然但言三蜀巴漢未列又務在舉善不必珍異關之耆舊竹素宜闡今更撰次損益足銘後觀者凡二十人綴之斯篇雖行故墜沒大較舉其一隅衛尉散騎常侍文立廣休散騎穆穆誠感聖君西河太守柳隱休然西河烈烈秉義居貞漢嘉太守司馬勝之興先漢嘉克讓謙德之倫郫令州主簿常勗脩業郫君騫諤自固底身江陽太守何隨季業江陽皎皎命世清淳梓潼太守王化伯遠梓潼矜矜在險能平太子中庶子陳壽承祚庶子稽古遷固並聲漢中太守李宓令伯漢中暐曄才蓋群生犍為太守杜軫超宗犍為卬卬友于寔令給事中任熙伯遠給事溫恭尚德蔑榮中書郎王長文德雋中書淵識寶道韜明大長秋壽良文淑長秋忠肅明允篤誠大司農西城公何攀惠興司農運籌思侔良平少府成都威侯李毅允剛少府果壯文武是經衡陽內史楊邠岐之衡陽固節隱然不傾尚書三州都費立建熙尚書準繩古之遺直湘東太守常騫季慎湘東氾愛仁以接物武平太守常寬泰恭武平亹亹冰清玉嶷揚烈將軍梓潼內史譙登慎明江陽太守侯馥世明文立字廣休巴郡臨江人也少遊蜀太學治毛詩三禮兼通群書州刺史費褘命為從事入為尚書郎復辟褘大將軍東曹掾稍遷尚書蜀并於魏梁州建首為別駕從事威熙元年舉秀才除郎中晉武帝方欲懷納梁益引致雋彥泰始二年拜立濟陰太守武帝立太子以司徒李胤為太傅齊王驃騎為少傅選立為中庶子立上疏曰伏惟皇太子春秋美茂盛德日新始建幼志誕陟大繇猶朝日初暉良寶耀璞侍從之臣宜𥳑俊乂妙選賢彥使視觀則覩禮容棣棣之則聽納當受嘉話駭耳之言靜應道軌動有所采佐清初陽緝熙天光其任至重聖王詳擇誠非糞朽能可堪任臣聞之人臣之道量力受命其所不諧得以誠聞帝報曰古人稱與田蘇遊非舊德乎立上故蜀大官及盡忠死事者子孫雖仕郡國或有不才同之齊民為劇又上諸葛亮蔣琬費褘等子孫流徙中畿宜見敘用一則以慰巴蜀民之心其次傾東吳士人之望事皆施行十年詔曰太子中庶子立忠貞清實有思理器幹前在濟陰政事脩明後事東宮盡輔導之節昔光武平隴蜀皆收其才秀所以援濟殊方伸敘幽滯也其以立為散騎常侍累辭不許上疏曰臣子之心願從疏以求昵凡在人情貪從幽以致明斯實物性賢愚所同臣者何人能無此懷誠自審量邊荒遺燼犬馬老甚非左右機納之器臣雖至愚處之何顏詔曰常伯之職𥳑才而授何謙虛也立自內侍獻可替否多所補納甄致二州人士銓衡平當為士彥所宗故蜀尚書犍為程瓊雅有德望素與立至厚武帝聞其名以問立立對曰臣至知其人但年垂八十稟性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也西界獻馬帝問立馬何如對曰乞問太僕帝每善其恭慎遷衛尉猶兼都職中朝服其賢雅為時名卿連上表年老乞求解替還桑梓帝不聽咸寧末卒帝緣立有懷舊性乃送葬於蜀使者護喪事郡縣脩墳塋當時榮之初安樂思公世子早沒次子宜嗣而思公立所愛者立亟諫之不納及愛子立驕暴二州人士皆欲表廢立止之曰彼自暴其一門不及百姓當以先公故得爾也後安樂公淫亂無道何攀與上庸太守王崇涪陵太守張寅為書諫責稱當思立言凡立章奏集為十篇詩賦論頌亦數十篇同郡毛楚楊宗皆有德美楚牂柯宗武陵太守柳隱字休然蜀郡成都人也少與同郡杜禎柳伸並知名隱直誠篤亮交友居厚達於從政數從大將軍姜維征伐臨事設計當敵陷陣勇略冠軍為牙門將巴郡太守騎都尉遷漢中黃金圍督景耀六年魏鎮西將軍鍾會伐蜀入漢川圍戍多下惟隱堅壁不動會別將攻之不能克後主既降以手令勑隱乃詣會晉文帝聞而義之咸熙元年內移河東拜議郎武帝踐祚以為西河太守在官三年以年老去官乞骸還蜀卒於家時年八十長子充連道令次子初舉秀才杜禎字文然柳伸字雅厚州牧諸葛亮辟為從事禎符節令梁益二州都伸度支漢嘉巴東太守禎子珍字伯重略陽護軍大同後並舉秀才珍子弢字景文伸子純字偉叔有名德幹器舉秀才巴郡宜都建平太守西夷長水校尉巴東監軍司馬勝之字興先廣漢緜竹人也學通毛詩治三禮清尚虛素性澹不榮利初為郡功曹甚善紀綱之體州辟從事進尚書左選郎徙祕書郎時蜀國州書佐望與郡功曹參選而從事侔臺郎特重察舉雖位經朝要還為秀孝亦為郡端右景耀末郡請察孝廉大同後梁州辟別駕從事舉秀才歷廣都繁令政理尤異以清秀徵為散騎侍郎以宗室禮之終以疾辭去職即家拜漢嘉太守候迎盈門固讓不之官閑居清靜謙卑自牧常言世人不務求道德而汲汲於爵祿若吾者可少以為有餘榮矣訓化鄉閭以恭敬為先年六十五卒於家子尊賢佐皆有令德常勗字脩業蜀郡江原人也祖父原牂柯永昌太守父高廟令從父閎漢中廣漢太守勗少與閎子忌齊名安貧樂道志篤墳典治毛詩尚書陟洽群籍多所通覽州命辟從事入為光祿郎中主事又為尚書左選郎郡請迎為功曹時州將董軍政置從事職典刑獄以勗清亮復為督軍治訟平當還察孝廉除郫令為政𥳑而不煩魏征西將軍鄧艾伐蜀破諸葛瞻於緜竹威振西土諸縣長吏或望風降下或委官奔走勗獨率吏民固城拒守後主檄令乃詣艾故郫穀帛全完刺史袁邵嘉勗志節辟為主簿勗善儀容翔集動為表觀言論壯烈州里重之然交友惟賢不交下己者汎愛之恩猶不足邵徵還道卒忌字茂通蜀謁者黃門侍郎喪親以至孝聞察孝廉為郎使吳稱職歷參軍什邡雒令大同後刺史邵坐治城被徵忌詣洛陳訴遠國初附君民始結不宜改易又表脩治城池居安思危邊將常職事皆中情晉文帝時為相國辟忌舍人武帝踐祚拜騎都尉除河內令州名為難治忌挫折豪勢風教大興縣有奸嫂殺兄者群黨蔽匿前令莫得忌皆窮治入為州都方議為郡守會卒忌為人信道任數不從下人故為貴勢所不善是以作詩著論先攻己短臨喪與樂歡哀俱至為士類所稱忌友人廣漢段宗仲亦有學行蜀時官與忌比袁邵辟為主簿與忌共理郡事文帝善之梁州辟別駕從事舉秀才稍遷官至雲南建寧太守何隨字季業蜀郡郫人也漢司空武後世有名德徵聘入官隨治韓詩歐陽尚書研精文緯通星曆郡命功曹州辟從事光祿郎中主事除安漢令蜀亡去官時巴土飢荒所在無穀送吏行乏輒取道側民芋隨以緜繫其處使足所取直民視芋見緜相語曰聞何安漢清廉行過從者無糧必能爾耳將緜追還之終不受因為語曰安漢吏取糧令為之償察孝廉大同後臺召不詣除河閒王郎中令不就居貧固險衣弊蔬食晝躬耕耨夕脩講諷鄉族饋及禮厚皆不納目不視色口不語利著譚言十篇論道德仁讓嘗有屠牽豬過隨門豬索斷失之強認溷中豬隨便牽豬與之屠人出門尋得其所失豬謝隨還豬遂以乞之隨家養竹園人盜其筍隨偶行見之恐盜者覺怖走竹中傷其手足挈屐徐步而歸其仁如此太康中即家拜江陽太守民思其政年七十一卒官後州鄉人言議平當者皆相謂何江陽至於汶山夷有正直廉讓者亦號夷中何江陽杜景文何興仁皆為作傳長子觀字巨忠清公淑慎知名州里察孝廉西都南安令平西長史張昌作亂荊州從黨西上郡守無不望風降下至江陽平西將軍羅尚表為安遠護軍討賊平殄除巴郡太守朝議欲以為寧州刺史會病卒次子遊治中從事隨時同郡繁令張崇清廉推讓見稱當時王化字伯遠廣漢郪人也漢將作大匠王堂後也祖父商字文表州牧劉璋時為蜀太守有懿德高名在耆舊傳父彭字仲巴郡太守化兄弟四人少有令望化治毛詩三禮春秋公羊傳郡命功曹州辟從事光祿郎中主事尚書郎除閬中令為政清靜察孝廉大同後端右郡察孝廉為樂涫令縣近邊塞值胡虜反化率吏民積穀堅守虜斷道重圍孤絕七年伺虜怠惰出軍討之民得野掠大軍至虜退以功封關內侯遷朱提太守撫和殊俗得夷晉心轉任梓潼復有稱績為人嚴重言論方雅臧否允衷州里服其誠亮年七十二卒官弟振字仲遠亦有德望廣都令巴東太守叔弟岱字季遠恪居官次歷黃陽作唐令早亡少弟崇字幼遠學業淵博雅性洪粹蜀時東觀郎大同後梁州辟別駕別舉秀才尚書郎與壽良李宓陳壽李驤杜烈同入京洛為二州標雋五子情好未必能終惟崇獨以寬和無所彼此著蜀書及詩賦之屬數十篇其書與陳壽頗不同官至上庸蜀郡太守陳壽字承祚巴西安漢人也少受學於散騎常侍譙周治尚書三傳銳精史漢聰警敏識屬文富豔初應州命衛將軍主簿東觀祕書郎散騎黃門侍郎大同後察孝廉為本郡中正益部自建武後蜀郡鄭伯邑太尉趙彥信及漢中陳申伯祝元靈廣漢王文表皆以博學洽聞作巴蜀耆舊傳壽以為不足經遠乃并巴漢撰為益部耆舊傳十篇散騎常侍文立表呈其傳武帝善之再為著作郎吳平後壽乃鳩合三國史著魏吳蜀三書六十五篇號三國志又著古國志五十篇品藻典雅中書監荀勗令張華深愛之以班固史遷不足方也出為平陽侯相華又表令次定諸葛亮故事集為二十四篇時壽良亦集故頗不同復入為著作鎮南將軍杜預表為散騎侍郎詔曰昨適用蜀人壽良具員且可以為侍御史上官司論七篇依據典故議所因革又上釋諱廣國論華表令兼中書郎而壽魏志有失勗意勗不欲其處內表為長廣太守遵繼母遺令不附葬以是見議數歲除太子中庶子太子轉徙後再兼散騎常侍惠帝謂司空張華曰壽才宜真不足久兼也華表欲登九卿會受誅忠賢排擯壽遂卒洛下位望不充其才當時冤之兄子符字長信亦有文才繼壽著作佐郎上廉令符弟莅字叔度梁州別駕驃騎將軍齊王辟掾卒洛下莅從弟階字達之州主簿察孝廉褒中令永昌西部都尉建寧興古太守階辭章粲麗馳名當世凡壽所述作二百餘篇符莅階各數十篇二州先達及華夏文士多為作傳大較如此時梓潼李驤叔龍亦雋逸器知名當世舉秀才尚書郎拜建平太守以疾辭不就意在州里除廣漢太守初與壽齊望又相昵友后與壽情好攜隙遠相誣攻有識以是短之亦自列傳李宓字令伯犍為武陽人也祖父光朱提太守父早亡母何更行見養祖母治春秋左傳博覽五經多所通涉機警辨捷辭義響起事祖母以孝聞其侍疾則泣涕側息日夜不解帶膳飲湯藥必自口嘗本郤禮命不應州辟從事尚書郎大將軍主簿太子洗馬奉使聘吳吳主問蜀馬多少對曰官用有餘民閒自足吳主與群臣汎論道義謂寧為人弟宓曰願為人兄吳主曰何以為兄宓曰為兄供養之日長吳主及群臣稱之大同後征西將軍鄧艾聞其名請為主簿及書招欲與相見皆不往以祖母年老心在色養拒州郡之命獨講學立旌授生武帝立太子徵為洗馬詔書累下郡縣逼遣於是宓上書曰臣以險舋夙遭閔凶生孩六月慈父見背行年四歲舅奪母志祖母劉愍臣孤弱躬見撫養臣少多疾病九歲不行零丁孤苦至於成立既無伯叔終鮮兄弟門衰祚薄晚有兒息外無期功強近之親內無應門五尺之童煢煢孑立形影相弔而劉早嬰疾病常在床蓐臣侍湯藥未曾廢離逮奉聖朝沐浴清化前太守臣逵察臣孝廉後刺史臣榮舉臣秀才臣以供養無主亂不赴命詔書特下拜臣郎中尋蒙國恩除臣洗馬猥以微賤當侍東宮非臣隕首所能上報臣具表聞辭不就職詔書切峻責臣逋慢郡縣逼迫催臣上道州司臨門急於星火臣欲奉詔奔馳則劉病日篤苟順私情則告訴不許臣之進退實為狼狽伏惟聖朝以孝治天下凡在故老猶蒙矜愍況臣孤苦特為尤甚且臣少仕偽朝歷職郎署本圖宦達不矜名節今臣亡國賤俘至微至陋猥蒙拔擢寵命優渥豈敢盤桓有所希冀但以劉日薄西山氣息奄奄人命危淺朝不慮夕臣無祖母無以至今日祖母無臣亦無以終餘年母孫二人更相為命是以區區不敢廢遠臣今年四十有四祖母劉今年九十有六是臣盡節於陛下之日長報養劉之日短也烏鳥私情願乞終養臣之辛苦非徒蜀之人士及二州牧伯所見明知皇天后土實所共鑒願陛下矜愍愚誠聽臣微志庶劉僥倖保卒餘年臣生當隕首死當結草臣不勝犬馬怖懼之情武帝覽之曰宓不空有名也嘉其誠款賜奴婢二人下郡縣供其祖母奉膳及祖母卒服終徙尚書郎為河內溫縣令敷德陳教政化嚴明大傅鉅平侯羊公薨無子帝令宗子為世子嗣之不時赴喪宓遣戶曹齎移推轂遣之中山諸王每過溫縣必責求供給吏民患之及宓至中山王過縣徵芻茭薪蒸宓牋引高祖過沛賓禮老幼桑梓之供一無煩費伏惟明王孝思惟則動識先戒本國望風式歌且舞誅求煩碎所未聞命後諸王過不敢煩溫縣盜賊發河內餘縣不敢近溫追賊者不敢經界隴西王司馬子舒深敬友之而貴勢之家憚其公直宓去官為州大中正性方亮不曲意勢位者失荀張指左遷漢中太守諸王多以為冤一年去官年六十四卒著述理論論中和仁義儒學道化之事凡十篇安東將軍胡羆與皇甫士安深善之又與士安論夷齊及司馬文中杜超宗郄令先文廣休等議論往返言經訓詁眾人服其理趣釋河內趙子聲譏詩賦之屬二十餘篇壽良李驤與陳承祚相長短宓公議其得失而切責之常言吾獨立於世顧景為疇而不懼者心無彼此於人故也宓六子皆英挺秀逸號曰六龍長子賜字宗碩州別駕舉秀才汶山太守少與東海王司馬元超友昵每書詩往返雅有新聲少子興字雋碩太傅參軍幼子盛碩寧浦太守宓同時蜀郡高玩字伯珍少受學於太常杜瓊術藝微妙博聞強識清尚𥳑素少與宓齊名官位相比大同後察孝廉除曲陽令單車之縣移檄縣綱紀不使遣迎以明三才徵為太史令送者亦不出界朝廷稱之方論大用會卒杜軫字超宗蜀郡成都人也父雄字伯休安漢雒令軫少師譙周發明高經於譙氏之門郡命為功曹鄧艾既破蜀被徵鍾會進成都時太守南陽張府君不肯出官軫進曰征西囚執鎮西在近必有所遣軍亂之際交害無常宜避正殿府君即出住下舍會果遣參軍牽弘為太守數百騎擐甲馳馬入郡前驅問侯所在云已出善之弘復召為功曹察孝廉除建寧令徙任山陽新城池陽所在有治入為尚書郎每升降趍翔廊閣之下威容可觀中朝偉之遷犍為太守惠愛在民還為州大中正軫既才學兼該而氣量倜儻武帝雅識之方用內侍會卒時年五十八弟烈字仲武貞幹敏識平坦和粹名譽侔軫察孝廉歷平康牛鞞南鄭安陽令王國建首選為郎中令遷衡陽太守兄軫喪自上求去官以兄子幼弱軫喪飄颻欲扶將靈柩葬舊墳武帝歎惜軫能用未盡而嘉烈弟意轉拜徙官犍為太守又轉湘東少弟良字幼倫亦有當世局分舉秀才茶陵新都令王國郎中令遷涪陵建寧太守兄弟並典州里以為美譚軫二子長子毘字長基少子秀字彥穎珪璋琬琰世號二鳳毘舉秀才大將軍辟掾太傅參軍平東長史尚書郎稍遷鎮南軍司益州刺史秀州主簿早卒任熙字伯遠蜀郡成都人也漢大司農任方後也世有德彥父元字秀明犍為太守執金吾熙治毛詩京易博通五經事親至孝居喪毀瘠為州鄉所稱察孝廉除南鄭令以病去官復授南鄭不就轉梓潼令為政清淨辭疾告歸勤農力穡居室致給循訓閨門內則可法博愛以謙恭接物開門待賓傾懷下士客無長幼必有供膳清談遊講不妄失言祗慎著聞太康中除越巂護軍非其雅好不往徵給事中熙以侍臣日月左右贊暉揚光不可苟私終以病辭而蜀郡令每至官為之脩謁歲致羊酒即家拜朱提太守固讓不之官好述作詩誄論難皆粲豔年六十九卒於家子蕃字憲祖察孝廉新都令西夷司馬涪陵太守蕃子迪字叔孤少與巴西龔壯俱知名而學業優之早歿熙同時犍為楊彭敬宗弟逵訓宗各以德行稱同察孝廉彭比蘇令甘露降其縣逵滇池令殊俗懷其德王長文字德雋廣漢郪人也父顒字伯元犍為太守長文天姿聰警高暢敏識治五經博綜群籍弱冠州三辟書佐丁時興衰託疾歸家大同後郡功曹察孝廉不就遂陽愚嘗降衣絳帽牽豬過市中訖人與語偽不聞常騎牛周旋郡守初至詣門脩敬至閭走出請終不還刺史淮南胡羆辟從事祭酒臥在治羆出板舉秀才長文陽發狂疾步擔走出門羆累遣教請還終不顧還家養母獨講學著無名子十三篇依則論語又著通經四篇亦有卦名擬易玄以為春秋三傳傳經不同每生訟議乃據經摭傳著春秋三傳十二篇又撰約禮記除煩舉要凡十篇皆行於時長文才鑒清妙汎愛廣納放蕩闊達不以細宜廉介為意亦不好臧否人物故時人愛而敬之以母欲祿養咸寧中領蜀郡太守郫有孝子羅偶事親至孝二親將亡時病不能食肉終身不食肉郡察孝廉長文追為立表以旌之宰府辟三司及撫軍大將軍王濬累辟不詣濬薨以故州將軍弔祭元康初試守江原令縣收得盜賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祈歸就汝上下善相懽樂過節來還當為思他理群吏惶遽爭請不許尋有赦令無不感恩所宥人輟不為惡曰不敢負王君將喪去官民思其政大將軍梁王肜及諸府並辟長文曰吾從其先命者遂應肜招為從事中郎諸王公卿慕其名咸與之交賈氏之誅從肜有功封關內侯再為中書郎愍懷太子死於許下博士中書論虞祔之禮長文議虞祭宜還東宮以繼太子者為主配食於潁川府君皆施行除洛陽令長文見肜曰主者不庶幾奏長文為洛陽令肜笑荅曰卿乃不庶幾非主者也固辭不拜聞益州亂以通經筮得老蠶緣枯桑之卦歎曰桑無葉蠶以卒也吾蜀人殄於是矣拜蜀郡太守暴疾卒時年六十四長文時人蜀郡柳竺任興亦博學著聞俱為州別駕竺在右職公亮蹇蹇刺史盛怒欲殺人群下請不聽竺乃懷縛徑入頓几上乃極陳其刑理刺史從謝還縛皆早亡壽良字文淑蜀郡成都人也父祖二世犍為太守良少與犍為張徵費緝並知名治春秋三傳貫通五經澡身貞素州從事散騎黃門侍郎大同郡主簿上計吏察孝廉就州辟主簿治中別駕舉才行刺史皇甫晏貢之三司遂辟太宰除霸城令始平太守治政著稱從扶風轉秦國內史文立卒後溫令李宓表武帝言二州人士零頹才彥淩遲無復廁豫綱紀後進慰寧遐外者良公幹英特二州之望宜見超子紹繼立後帝徵為黃門侍郎兼二州都給事中梁州刺史遷散騎常侍大長秋卒葬洛北芒山徵字建興張翼子也篤志好學官至廣漢太守緝字文平清檢有治幹舉秀才歷城令涪陵太守遷譙內史何攀字惠興蜀郡郫人漢司空氾鄉侯武弟潁川太守顯後也父包字休楊察舉秀孝皆不行除瑯琊王中尉不就攀兄弟五人皆知名攀少夙成奇姿卓逸弱冠郡主簿上計吏州辟從事刺史皇甫晏稱攀王佐才也以為主簿泰始十年喪母歸家晏為牙門張弘等所害攀操喪徑詣洛訟釋事得清刺史王濬復辟主簿別駕咸寧三年濬被詔罷屯田兵作船為伐吳調攀進曰今見佃兵但六百人計作船六七年財可勝萬人後者未成前者已腐無以輔成國意宜輒召回休兵及諸郡武吏并萬餘人造作歲終可辨濬及綱紀疑輒召萬兵欲先上須報攀曰官家雖欲伐吳疑者尚多卒聞召萬兵必不見聽以佃兵作船船不時成當輒召以速為機設當見卻功夫已成勢不得止濬善之議欲入山裁船動數百里艱難攀曰今冢墓多種松柏當什四市取以速為機濬悅之任攀典舟船器杖冬遣攀使洛攀曰聖人之功可成使人信之不可必也夫高祖之大略猶未察於韓信婁敬因蕭何子房而後用之今建非常之功或莫之信羊公使君同盟國家所重加曩日失策西陵思有夙駕宜與相聞此一助也濬曰何但羊叔子亦宗元亮之憂君至洛官家未有舉意便前至襄陽與羊宗論之攀既至洛拜表獻策因至荊州與刺史宗廷論宗未許乃見羊祜累日共畫用兵之要攀曰若令青徐循海以趣京下壽春楊州直指秣陵兗豫踰淮並據桑浦則武昌以東會稽以西必然駭困荊州平南徑造夏口巴東諸軍固守西陵益梁之眾浮江東下封樂鄉要巴丘則武陵零桂長沙湘東從風而靡矣但明信賞首尾俱會旌旗耀天四面雲合乘勝席卷傳檄南極吳會不盡平者未之有也羊祜大悅遂表請伐吳尋徵濬大司農至晉壽詔以濬為龍驤將軍除攀郎中參濬軍事攀頻奉使詣洛時未婚司空裴公奇其才以女妻之五年秋攀使在洛安東將軍王渾表孫皓欲北上邊戍警戒朝議征卻須六年攀上疏策皓必不敢出宜因今戒嚴掩取甚易中書令張華命宿下舍設諸難攀皆通之又言濬性在忠烈受命必果宜重其位號詔書遷濬平東將軍督二州事吳平封關內侯濬入拜輔國攀為司馬上論時務五篇除榮陽令進廷尉平有盜開城門下關者法據大辟攀駁之曰上關執信之主下關儲備之物設有開上關何以加刑遂減死多所議讞遷散騎侍郎太傅楊駿謀逆請眾官攀與侍中傅祗侍郎王愷等往惠帝從楚王瑋殿中中郎孟觀策戒嚴誅駿外已怱怱攀與祗踰牆得出侍天子天子以為翊軍校尉領熊渠兵一戰斬駿社稷用安封西城公邑萬戶策曰於戲在昔先王光濟厥世罔不開國列土建德表功也故逆臣楊駿謀危社稷構兵飛矢集於殿庭白刃交於宮闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城為攀封國錫茲玄社苴以白茅永為晉藩輔往欽哉敬乃有土惠康黎元無或以隳爾顯烈又賞絹萬匹攀固辭受五千疋又錫拜弟逢平鄉侯兄子夔關內侯遷宣城內史不就轉東羌校尉西虜寇邊遣長史楊威討之違攀指受失利徵還領越騎校尉武庫災百官皆救火攀獨以兵衛宮復賞絹五百匹領河南尹遷揚州刺史假節在職數年德教敷宣征虜將軍石崇表東南有兵氣不宜用遠人征拜大司農兼二州都自表以被疾錯忘不堪銓量人物讓都職於任熙費緝不聽遷兗州刺史錫寶劍赤舄固辭不之官時帝室政衰多害忠直又諸王迭起好結黨徒攀闔門治疾不與世務朝議欲以為公會薨時年五十七天子愍悼追贈司農印綬謚曰桓公遺令勑世子務行恭儉引荀公曾諸葛德林為模範子璋嗣李毅字允剛廣漢郪人也祖父朝字偉南州別駕從事父旦字欽宗光祿郎中主事毅少散達不治素檢年二十餘乃詣郡文學受業通詩禮訓詁為學主事太守弘農王濬臨學講試問祭酒姬豔曰學中有可成進幾百人豔對曰可有百人濬怒言童冠八百而成者百人教少何為毅對曰如豔之言明府之教盛於孔氏不為少也濬奇之命為主簿濬嘗夢得三口刀云人以禾益之手持不得以問郡丞與掾吏莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾傍失者秩字明府秩當至益州濬笑曰如卿言當相以為秀才張弘殺益州刺史皇甫晏誣表晏反毅白濬曰皇甫侯起自諸生位極方州又當何求且廣漢與成都密邇而統梁州者衿益州之領須防若今日也益州有禍乃此郡之憂加張弘小豎眾所不與宜時赴討濬欲先上後行毅曰大夫出疆苟利社稷專之為賢何況殺主賊急當不拘常宜濬從之發兵與牙門滿泰等共討弘斬之詔書遷濬益州刺史復為州主簿別駕舉秀才及濬伐吳與何攀並為參軍吳平封關內侯除隴西護軍以疾去官徙繁令遷雲南太守濬臨薨上表後武帝思濬問毅所在徙犍為使持節南夷校尉久之建寧民毛詵李叡與朱提民李猛共逐太守杜俊雍約以叛眾數萬毅討破之斬詵猛首叡走依五茶夷夷亦叛晉朝復置寧州以毅為刺史加龍驤將軍封成都縣侯夷遂大反破沒郡縣攻圍州城中原亂而李雄寇蜀救援不至疾病薨於窮城懷帝嘉其忠節追贈少府謚曰威侯毅性通博居情雅厚賑䘏寒貧篤於故舊人咸愛歸之但好談調德重猶少從弟苾字叔平脩身砥礪名行數諫毅宜矜嚴毅笑應之曰吾小來不治名素然杖旄節故可至九卿卿清檢履道卒不失成都令也時毅始受南夷而苾為歷城令果作成都遷犍為太守位官不及毅毅子釗世秉儒學有格望以父任為謁者除壽林侯相不就為尚書外兵郎自表赴難治䍧柯夷斷道不得進經年以寧州城中無穀父疾病未知吉凶不食穀惟茹草迄至奔喪至朱提越巂太守西夷校尉毅女秀適漢家太守新都王載有才智父亡後州文武推領州三年二州當元康中位至方州節將者壽良何攀及毅永嘉中巴張奕希祖為荊州刺史南蠻長水校尉蜀郡張峻紹茂為監南中八郡事西夷校尉持節楊邠字岐之犍為武陽人也少好學志古藻勵名行州辟主簿別駕刺史王濬舉秀才安漢雒令王國中尉以選為尚書郎遷汶山太守值夷復讎失殊俗和徙授巴東轉廣漢永嘉初進衡陽內史還流民叛亂攻沒長沙湘東邠輒救助賊眾浸盛遂破郡城獲邠欲以為主邠不許賊晝夜持守邠候其小怠夜急走比覺已去遠收餘眾軍重安欲投湘州刺史荀眺共圖進取會眺降賊邠孤軍固城賊圍之誓死不移遂卒城中時年六十九帝為鎮東大將軍嘉其忠節死義遣使弔贈策曰惟永嘉七年四月已未使持節都督揚江湘交廣五州諸軍事鎮東大將軍瑯琊王睿謹遣板命前衡陽內史楊君忠肅貞固守正不移雖危逼節義可嘉不幸殞卒孤城甚悼之今列上尚書贈君淮南內史魂而有靈嘉茲寵榮嗚呼哀哉邠同郡楊稷文曹泰始初為交阯太守平九真鬱林日南四郡斬吳交州刺史劉峻大將脩則武帝方授交州會孫皓遣大將薛珝陶璜十萬人攻稷被攻八月救援不至眾寡不敵遂為珝璜所獲囚稷欲以送皓稷歐血死帝嘉其忠烈歿命贈交州刺史也費立字建熙犍為南安人也父揖字君讓巴西太守立學義沖邃玄靜沈嘿察孝廉王國中尉王年少好輕行遊觀立常正色匡諫及上疏風喻辭義劘切合箴規之體出為成都令縣名難治立莅之垂績以性公亮入為州大中正除巴西太守不就轉梁益寧三州都兼尚書值大駕西幸長安常與大臣居守在洛加員外散騎常侍封關內侯每準正三州人物品格褒貶帥意方規無復疏親莫不畏敬然委曲者多恨其繩墨數辭諸郡意在河泰汝潁久之朝議欲以為荊州永嘉六年與子并沒於胡寇立時漢國呂淑字偉德以清彥辟別駕舉秀才尚書郎秦國內史長水校尉員外常侍梁州都督與立同沒胡寇常騫字季慎蜀郡江原人也祖父竺字代文南廣太守侍中父偉字公然閬中令騫治毛詩三禮以清尚知名州辟部從事主簿郡請功曹察孝廉萍鄉令以選為王國侍郎出為緜竹令國王歸之復入為中郎令從王起義有功封關內侯遷魏郡太守加材官將軍以晉政衰覩中原不靜固辭去官拜新都內史時蜀亂民皆流在荊湘徙湘東太守疾病未拜卒年六十八騫性汎愛敦友宗族當官脩理恕以撫物好咨問動必謙讓州鄉以為義範二州清官見述者先有宜都太守犍為唐定義業隴西太守巴西馮山休翊而後騫云常寬字泰恭騫族弟郫令勗弟子也父廓字敬業以明經著稱早亡闔門廣學治毛詩三禮春秋尚書尤耽意大易博涉史漢彊識多聞而謙虛清素與俗殊務郡命功曹及察孝廉不就州辟主簿別駕舉刺史羅尚秀才為侍御史除繁令隨民縣零陵以舉將喪去官湘州叛亂乃南入交州交州刺史陶咸表為長史固辭不之職雖流離交城衣敝縕袍冠皮冠乘牛往來獨鳩合經籍研精著述依孟陽宗盧師矩著典言五篇撰蜀後志及後賢傳續陳壽耆舊作梁益篇元帝踐祚嘉其德行潔白拜武平太守民悅其政以榮貴非志在官三年去職尋梁碩作亂得免難卒於交州凡所著述詩賦論議二十餘篇子長生字彭祖亦有學行州主簿資中令治中從事早亡時蜀郡太守巴西黃容亦好述作著家訓梁州巴紀姓族左傳抄凡數十篇漢嘉太守蜀郡杜龔敬脩亦著蜀後志及志趙廞李特叛亂之事及喪紀禮式後生有取焉譙登字慎明巴西西充國人譙周孫也伯父熙察孝廉本部大中正沔陽令叔父同字彥紹少知名拒州郡之命梁州刺史壽良與東羌校尉何攀貢之三司及大將軍幕府為尚書郎除錫令亦有為作傳者登少以公亮義烈聞郡命功曹州辟主簿別駕從事領陰平太守郡五官素大姓豪擅侵淩羌晉登誅之郡中皆肅後以李特作亂本郡沒寇父為李雄巴西太守馬脫所殺乃東詣鎮南劉公請兵時中原亂守公三年不能得兵表拜揚烈將軍梓潼內史使合義募登凡募巴蜀流士得二千人平西羅尚以退住巴郡登從尚索益軍討雄不得乃往攻宕渠斬脫食其肝巴西賊破復詣尚求軍尚參佐多以必無利登憤恚數淩折之又加責於尚尚但下之而已會羅羕殺雄太尉李離舉梓潼來降登徑進涪城雄自攻登為登所破而尚將張羅進屯犍為之合水文碩殺雄太宰李國以巴西降羅遣軍掠廣漢破雄叔父驤虜其妻子募人斫雄頭賊以向困而尚卒參佐恨登之見矜侮不供其軍食益州刺史皮素至巴東勑平西送故遣將張順楊顯救登至墊江素遇害順顯還雄知登乏食遣驤致攻兵窮士餓誓死不退眾亦餓死而無去者永嘉五年為驤所生得輿登致雄言辭慷慨涕泣歔欷無服降臣折情雄乃殺之囚其軍士皆以為奴虜畀兵士而連陰雨百餘日雄中以登為枉而所領無辜怒氣感天下赦出登軍士湮沒者初尚之在成都也與雄攻戰郫令犍為張昕欽明每摧破雄雄眾憚之而救助不能并心為雄所殺雄常言羅尚將均如張昕輩吾族早無遺矣時牙門左氾亦有戰功尚不能益其兵穀氾恚恨以母喪歸尚累召不往尚怒曰微左氾當不滅賊乎遂殺之雄聞氾死大小相賀登同郡縣李高亦有武幹平吳時與牙門將處前獲孫皓封縣侯官至金城鴈門太守侯馥字世明江陽人也察孝廉平西參軍平西羅尚薨後巴郡亂辟地入䍧柯寧州刺史王遜領平西將軍復取為參軍遜議欲遷牂柯太守謝恕為涪陵太守出屯巴郡之把口表馥為江陽太守往江陽之沘源撫䘏蠻獠克復江陵清通長江雄征東大將軍李恭己在江陽馥招降夷獠脩繕舟艦為進取調預白遜請軍移恕俱出涪陵不能自前恭舉眾攻馥眾寡不敵為恭所破生虜馥送雄雄下廷尉責馥曰事君有死無貳其次破家與國今縱不死又無益國灰沒其分守心而已無他願望雄必欲屈之使馥同郡人張迎曉之馥怒罵迎曰吾等國亡不能存大難不能死低眉海內何面目相見也且王寧州治亂才也以吾有桑梓之恥故遠上尚書遣吾討賊受命之日實忘寢食但裁船未辨請軍未至牽揣不及為他所先當滅身隕碎以謝不及冀上不負日月下不愧王侯吾豈苟生如卿兒女之人乎遠還白雄雄義而赦之時雄眾寇所獲犍為太守建寧魏紀漢國太守梓潼文琰巴郡太守巴西黃龕涪陵太守巴西趙弼永昌謝俊䍧柯文猛皆區區稽顙無如馥者數年卒譔曰文王多士才不同用孔門七十科不一揆百行殊塗貴於一致若斯諸子或挺珪璋之質或苞瑚璉之器或耽儒墨之業或韞王佐之略潛則泥蟠躍則龍飛揮翮揚芳流光遐紀實西土之珍彥聖晉之多士也徒以生處限外服膺日淺負荷榮顯未充其能假使植幹華宇振條神區德行自有長短然三趙兩李張何之軌其有及之者乎譙登侯馥忠規奮烈美志不遂哀哉五公司空何武司空趙戒太尉趙謙司徒趙溫司空張皓
