front:
  text: 華陽國志卷苐八
  hash: sha256:b8d99546c4bfcc6ebf5b92064aeed6ff0fc813dc65959be24f131d341e4dcc80
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_008-1a}
body:
  text: 大同志古者國無大小必有記事之史表成著敗以朙懲勸稽之前式州部宐然自劉氏祚替金德當陽天下文朙不及曩世逮以多故族祖武平府君漢嘉杜府君竝作蜀後志書其大同及其䘮亂然逮在李氏未相條貫又其始末有不詳苐璩徃在蜀櫛沐艱難備諳諸故事更叙次顯挺年号上以彰朙德下以治違亂庻幾萬分有益國史之廣識焉魏咸熈元年蜀破之朙年也以東郡袁邵爲益州剌史隴西太守安平牽弘爲蜀郡金成太守天水楊欣為犍為太守後主既東遷内移蜀之大臣宗預廖化及諸葛顯等幷三萬家扵東及關中復二十年田租董厥樊建竝爲相國參軍冬分州置梁州遣厥建兼㪚騎常侍使蜀慰勞晉泰始元年春刺史袁邵以治城將被徵故蜀侍郎蜀郡常忌詣相國府陳邵撫䘏有方逺國初附當以漸導化不宐改易州將失遐外心相國聽留辟忌爲舎人冬十月晉武帝踐祚二年春武帝弘納梁益引援方彦用故黄金督蜀郡栁隠爲西河巴郡文立為濟隂太守常忌河内縣令四年故中軍士王冨有罪逃匿密結亡命刑徒得數百人自稱諸葛都護起臨卭轉侵江原江原方畧吏李髙閭術縛冨送州刺史童策斬之初諸葛瞻與鄧艾戰扵綿竹也時身失䘮或言生走深逃親兵言富貌似瞻故冨假之也五年散騎常侍文立表復假故蜀大臣名勲後五百家不預厮劇皆依故官号爲降六年分益州南中建寧雲南永昌興古四郡爲寧州七年汶山守兵吕臣等殺其督將以叛族滅之初蜀以汶山西五郡北逼隂平武都故於嶮要置守自汶江龍鶴冉駹白馬厈用五圍皆置修屯㸦門晉初以禦夷徼因仍其守八年三蜀地生毛如白毫三夕長七八寸生數里十年汶山白馬胡恣縱掠諸種夏刺史皇甫晏表出討之别駕從事王紹等固諫不從典學從事蜀郡何旅諫曰昔周宣王六月北伐者獫狁孔熾憂及諸夏故也今胡夷相殘戎虜之常未爲大患而盛夏出軍水潦將降必有疾疫宐須秋冬圖之未晩晏不聽遂西行軍城比入麂入營中軍占以爲不祥晏不悟胡康水子燒香言軍出必敗以爲沮衆斬之夏五月軍至都安屯觀坂上旅復諫曰今所安營地名觀坂自上觀下反上之象徵不吉昔漢祖悟柏人以免難岑彭惡彭亡而不去遂陷扵􅍔宐移營他所晏不納其言夜所將中州兵蔡雄宣班張儀等以汶山道險心畏胡之强晏愎諫干時衆庶所怨遂引牙門張弘督張衡等反殺晏衆夜亂不知所為惟兵曹從事犍為楊倉彎弓力戰射百餘發且詈雄衆擊之盡見殺從事廣漢王紹亦赴之死初晏未出蜀中相傳告曰井中有人學士靳普言客入東東井益州之分野憂剌史戒客人耳又有猛風是逆風其日觀卦用事若軍西行護觀坂門人向天井益可慮也故旅懃諫云卒如其言弘等遂誣表晏欲率已共反故殺之求以免罪其衆抄掠百姓廣漢主簿李毅白太守弘農王濬宐急救益州􅍔亂保晏無惡必爲弘等所枉害濬從之而晏主簿蜀郡何攀以母䘮在家聞亂釋衰絰詣洛訴晏忠孝而弘等惡逆事得分朙詔書因以濬為益州刺史加輕車將軍濬斬弘等益州平咸寧三年春刺史濬誅犍爲民陳瑞瑞初以鬼道惑民一道始用酒一㪷魚一頭不奉他神貴鮮潔其死䘮産乳者不得至道治其爲師者曰祭酒父母妻子之䘮不得撫殯入弔及問乳病者轉奢靡作朱衣素帶朱幘進賢冠瑞自稱天師徒衆以千數百濬聞以爲不孝誅瑞及祭酒袁旌等焚其傳舎益州民有奉瑞道者見官二千石長吏巴郡太守犍為唐定等皆免官除名蜀中山川神祠皆種松柏濬以爲非禮皆廢壞燒除取其柏松為舟船惟不毁禹王祠及漢武帝祠又禁作巫祀扵是俗無滛祀之俗教化大行有木連理嘉禾黄龍黄龍甘露之祥三月被詔罷屯田兵大作舟舩冬十月遣攀使詣洛表可征伐狀因使至襄陽與征南將軍羊祜荆州刺史宋􅒉論進取計四年春漢中都吏龔祚等謀殺太守姜宗以叛宗覺堅守祚等燒南鄭市及平民屋族誅刺史濬當當遷大司農至漢夀重遣參軍李毅詣洛輿何攀竝表求伐吳五年詔書拜濬龍驤將軍假節監梁益二州軍事除何攀郎中參軍事以典軍從事張任趙眀李髙徐兆爲㸦門姚顯郄堅爲督冬當大舉秋攀使在洛安東將軍王渾表孫皓欲北侵請兵朝議征却須六年攀因表可因今取之策皓必不自送帝乃許焉冬十有二月濬因自成都帥水陸軍及梁州三水胡七萬人伐吳臨發斬㸦門將李延所愛待將也以爭騎斬衆莫不肅至江州詔書進濬平東將軍都督二州巴東監軍唐彬及平南軍皆受指授别遣參軍李毅將軍由涪陵入取武陵㑹巴陵太康元年春三月吳平攀毅以下功封各有差以淮南胡羆爲益州刺史濬遷輔國將軍初濬將征問靳浦普今行何如普對曰客星伏南斗中而太白歲星在西方占曰東方之國破必如志矣普學術不貪榮貴䘚於布衣三年更以益梁州爲輕車刺史乘傳奏事以蜀多羗夷置西夷府以平吳軍司張牧爲校尉持節統兵州别立治西夷治蜀各置長史司馬五年罷寧州諸郡還益州置南夷校尉持節如西夷皆舉秀才亷良八年武帝子成都王頴受封以蜀郡廣漢犍爲汶山十萬户為王國易蜀郡太守号爲成都内史元康六年復以梁益州爲重州遷益州刺史栗􅠟爲梁州加材官將軍揚烈將軍趙廞為益州刺史加折衝將軍闗中氐及馬蘭羗反冦天水略陽扶風始平武都隂平發梁州及東羗鎮西討之不克益州遣牙門馬玄尹方捄援之以鹿車運成都米給軍粮八年廞至州雖崇簡約而性實奢泰略陽天水六郡民李特及弟庠閻式趙肅何巨李逺等及氐傁青叟數萬家以郡土連年軍荒就穀入漢川詔書不聽入蜀益州敕闗禁之而户曹李苾關關放入蜀布散梁州及三蜀界汶山興樂縣黄石北地盧水胡成豚堅安角成眀石等與廣柔平康文降劉紫利羗有讎遂與蜯羗郅逢等數千騎刼縣令求助討紫利太守楊邠撻殺豚堅而降其餘類餘類遂叛殺長吏冬西夷校尉西平麴炳表出軍遣牙門將孫眺爲督護萬人征之戰于常安大為胡所破九年炳以敗軍徵還晉夏用江夏太守陳揔爲代胡退散永康元年詔徴刺史趙廞為大長秋遷成都内史中山耿滕為益州刺史折衝將軍因廞所服佩初廞以晉政衰而趙星黄占曰星黄者王隂懷異計蜀土四塞可以自安乃傾倉賑施流民以收衆心以李特弟庠衞六郡人勇壯厚恤遇之流民恃此專為刼盜蜀民患之滕數密表流民剛戅而蜀人懦弱客主不能相饒宐移還其本土不者與東三郡隘地觀其情態漸不可長將移秦雍之􅍔於梁益矣又言倉庫虗竭無以應鋒鏑之急必益聖朝西顧之憂由是廞惡滕州被詔書已遣文武士千餘人迎滕滕以廞未出州故在郡廞募庠黨羅安王利等刼滕大敗扵廣漢宣化亭殺傳詔者滕議欲入州城功曹陳恂諫曰今州郡竝治兵怨遘日深入城必有大􅍔不如安住少城檄諸縣合村保以備秦氐陳西夷行至且觀其變不爾可退住犍為西渡江原以防非常滕不從冬十有二月滕入城登西門廞遣親近代茂取滕茂告之而去廞又遣兵討滕滕軍敗績自投少城上吏左䧺負滕子竒依民宋寧藏廞購千金寧不出廞敗得免郡吏皆竄走惟陳恂面縛詣廞請滕死䘮廞義而不殺也恂與户曹掾常敞共備棺冡葬之廞又遣軍逆陳揔揔至江陽聞廞有異志主簿趙模進曰今州郡不協必生大變惟當速行府是兵要助順討逆莫有動者也揔更縁道遲留至南安魚涪津以與廞軍遇白揔散財貨募士卒拒戰若尭州軍則州可得不克順流而退必無害也揔不能更曰趙益州忿耿侯故殺之與吾無嫌何為如此模曰今州起事必當立威雖不戰無益也言至垂涕揔不聽衆㢮揔逃草中模衣揔服格戰廞兵殺模見非揔乃搜求揔殺之廞自稱大將軍益州牧以武陽令蜀郡杜㳤别駕張粲巴西張龜西夷司馬龔尼江原令犍爲費逺等為左右長史司馬參軍徙犍為太守李庠為威冦將軍召臨卭令涪陵許弇為㸦門將召諸王官莫敢不徃又以廣漢太守張微汶山太守楊邠成都令費立爲軍祭酒時庠與兄弟流驤妹婿李含天水任回上官晶扶風李攀始平費他氐符成隗伯董滕等四千騎在北門廞使庠斷北道庠素東羗良將曉軍陳不用麾志舉矛為行伍庠勸稱大号漢庠部下放攪廞等忌之遂於㑹所斬庠及其兄子弘等十餘人慮特等為變又命為督將安慰其軍還特庠䘮其夜特流徹衆散歸綿竹廞遣故隂平令張衡升遷費恕就綏納皆為特所殺許弇求為巴東監軍杜㳤張粲逆不許弇怒於州閤下手刅殺㳤粲即亦殺弇二子廞腹心也永寧元年春正月廞遣萬餘人斷北道次綿竹以長史費逺爲繼前軍宿石亭特等相合得七百餘人夜襲之因放火殺廞軍畧盡進成都城中忷懼中郎常美與費逺李苾張徴等夜斬闗委廞走文武散盡廞獨與妻子乘小船順水至廣都為下人朱竺所殺裒疑廞字和叔本巴西安漢人也祖世隨張魯内移家趙趙王倫器之歴長安令天門武陵太守來臨州長子昺在洛亦見誅特流至成都殺西夷護軍姜發及龔尼相都令袁洽因大抄掠遣㸦門王角李基詣洛表狀初梁州刺史羅尚聞廞反表廞非雄才又蜀人不願為亂必無同者事終無成敗亡可計日而俟惠帝因拜尚平西將軍假節領䕶西夷校尉益州刺史給衞節兵一千梁州兵二千又配尚書都尉義部千五百人合四千五百人遷梓潼太守樂陵徐儉爲蜀郡太守揚烈将軍隴西􅉝舟為廣漢太守羅尚又表請牙門將王敦兵七千餘人入蜀特等聞尚來甚懼使弟驤奉迎持厚進寶物尚以驤為騎督特流奉牛酒勞尚扵綿竹王敦説尚曰特等隴上塞盜刼賊宐軍無後患也㑹所殺之辛舟本趙王倫所用非資次召當還欲討廞以自新亦言之尚不納冉又謂特曰故人相逢不吉當凶特自猜懼三月尚至州治汶山羗反於都安之天拭山遣王敦討之殺數千人大没女弱爲生口敦單馬馳爲羌所殺御史馮該張昌攝秦雍州從事督郵移還流民從者萬餘家而特兄輔素留鄊里記言迎家既至蜀因謂特曰中國亂不足還遣天水閻式累詣尚求弛領權停至秋竝進貨賂於尚該許之及秋又求至冬辛舟李苾以爲不可必欲移之式爲别駕杜弢説逼移利害弢亦欲寛迸民一年辛冉李苾以為不可尚從之弢致秀才版出還家知計謀不行故也時有白虹頭在井里尾在東山拖大城上治中從事巴西馬休問閻式曰此何祥也式曰占言下有萬屍氣甚迫於城非佳應天孽可違乎平西若能寛迸民災自消矣冉苾又白尚流民前廞亂際多所枉殁宐因移設闗以奪取秋七月尚移書梓潼所在抱闗八月闗皆城閻式曰無寇而城讎必保之蜀將亂矣九月遣軍軍綿竹揚言種麥實備越逸冉又購特流首百匹特驤􅊖更其購云能送六郡大姓閻趙任楊李上官及氐傁梁竇苻隗董費等首百匹流民本無還意大驚駭趣特冬十月特流乃保赤祖為二營特稱鎮北益州流鎮東皆大將軍兄輔驃騎弟驤驍騎特長子蕩鎮軍少子雄前軍李含西夷校尉含子國離及任回上官晶李攀費他皆將軍以天水任臧上官惇楊褒楊發楊珪王達麴歆隂平李逺武都李搏略陽夕斌等參佐而閻式何巨趙肅亦為賓従其餘皆有官号􅉝冉遣護軍曽元攻之為特所殺尚遣督護田佐牙門劉竝助冉復敗進圍廣漢尚復遣犍為太守李苾長史費逺助冉不能克冉託罪扵綿竹令南郡岐苞斬之而潰圍走徳陽特等得廣漢詐爲表奏稱引梁統推舉竇融故事以自貴大尚書檄告喻閻式式荅曰辛冉傾巧杜景狂發曽元小豎田佐血氣不治李叔平才經廊廟無將帥之氣討羸乏羌謂可長爾式前為節下及杜景文論留徙之宐人懐桑梓孰不願之但徃初至隨穀庸債一室五分復値雨潦乞須冬􅌻而不見聽必窮鹿抵虎但恐繩之大過迸民不肯延頸受刀其憂在後即聽式言寛使治嚴不過去九月盡集十月生進道令達鄉里何有如此也雅聽未察䘏彼過言今辛冉奴亡叔平長遯支分勢解事漸及已所謂不寤曲突逺薪而有焦爛之客也尚率其民盡渡郫水以南尚阻長圍自都安至犍為七百里押特等保廣漢太安元年春尚㸦門夏厈攻李特於立石失利征西遣督護衙博西征討特博次梓潼晉復拜前廣漢太守張㣲廣漢太守據徳陽尚遣督護巴西張龜督四十牙門軍繁城博方遣參軍蒙紹誘特降尚貽博書曰昔年得李流牋降心𣢾歀由時威帖得還爲寇聞特委誠扵下吏而流驤七八千人來寇日至姧凶之態詭譎不測不可不重以持之也博不從故為特所破扵陽沔梓潼太守張演委倉庫走巴西巴西郡丞毛植五官襄班舉郡降特衙慱才兼文武征西大將軍河間王深器之初爲隂平太守爲從事巴郡毛扶所免怨梁州人及西征征西許雄以陽沔之沒冦尚未至聞鸖鳴便退博欲委罪梁州託以自不供給梁州治中表之博以是得罪晉乃更用許雄為梁州刺史八月特破徳陽流次成都北上李驤在毗橋尚遣將張興偽降扵驤覘士衆還以告尚尚遣叜兵襲驤破之流驤并士衆攻尚軍軍失利䘮其器甲梁州刺史許雄數遣軍討特特備嶮不得進征西乃遣監軍劉沈將西征以中國有事不果而南夷校尉李毅遣叜兵助尚軍數挫特勢日盛二年春正月朔特攻尚水上軍特従盎底渡黨徒従赤水渡入郫及水西南縁江守軍皆散走太守徐儉逼降尚保大城特營少城而流軍江西之檢上蜀民先已結村堡特分人就主之雄書諫特收質任無得分散猛銳流亦諫之特怒曰大事以定但當安民何縁疑動而刼害不止尚従事蜀郡任叡說尚曰㑴㬥百姓又分人衆散在諸村怠忼無備殆天亡特之秋也可告諸村宻剋戰日内外擊之破特必矣尚従之從縋出叡使宣㫖告諸村期二月十日同時討特手書隠語曰在彼楊水叡先詣特降究觀虚實特問城中叡曰米穀已欲盡但有貨帛耳因求省家特與啓信諸村􅊖從叡叡還報尚如期出軍討特諸村亦起大殺特衆破退追及扵繁之官桑斬特及兄輔逺等李流歛餘衆還赤祖尚乘勝但施遊軍征盪傳特首洛陽焚其屍李雄以李離為梓潼太守衆還赤祖推流爲大將軍大都督而荆州刺史宋岱水軍三萬助尚次墊江前鋒建平太守孫阜破特徳陽守將碩太守任减徑至涪三月尚遣督護張龜何冲左汜等軍繁城而綿竹降涪陵民藥紳杜阿應尚尚又遣督護常深軍毗橋爲流驤禦蕩䧺攻紳深破驤殺李攀弟恭復為主左汜黄誾逼攻特北營營中氐羗因苻成隗伯石定叛應汜誾攻蕩雄蕩母羅擐甲略陳伯手刅羅傷目壯氣益烈又時成伯戰扵内汜誾攻其外自晨至日中營垂欲破㑹流破深蕩雄破紳還適與汜誾㑹大破之成伯將其黨突出詣尚蕩䇿馬追退軍為叜長矛所摏死羅雄秘不發䘮以安衆心流以特蕩死而岱阜竝至恐懼李含勸流降流從之雄與驤諫之不納遣子世及含子胡質扵阜李離聞父舅將降自梓潼還欲諫不及雄與離謀襲阜曰若功成事濟當為人主要三年一更雄曰與君計雖定老子不從若何離曰當制之若不可便行大事雖君叔勢不得已老父在君夫復何言雄乃說六郡人士激以尚之自侵懼以共殘蜀民之􅍔陳阜可冨貴之秋得以破阜阜軍死者甚衆而岱病亡荆州軍退轉攻尚流漸其短軍事任雄雄數破尚軍保大城夏四月尚殺隠士劉敞敞乃故州牧劉璋曽孫也隠居白鹿山髙尚皓首未嘗屈志亦不預世事尚信妖言殺之殺之日雷震人大雨城中出水五月李流降于孫阜遣子爲質不可乃舉兵與李離襲阜軍敗績宋岱病䘚墊江州軍退雄逼攻尚尚保大城中六月雄従帛芊頽渡攻殺汶山太守陳圗據郫城秋七月朔雄入郫城流盡移營據之三蜀民流迸南入東下野無烟火鹵掠無處亦尋饑餓唯涪陵民千餘家在江西依青城山處士范賢自守平西參軍涪陵徐輿求為汶山太守撫帥江西民與官犄角討雄尚不許輿怨之求使江西因叛降雄以為安西將軍給其軍糧雄得以振九月流病死雄復稱大將軍都督州牧尚數攻郫雄使武都朴泰譎尚曰李驤與雄以飢餓孤危日鬪爭相咎驤欲將民江西食穀若潜軍來我為内應可得也尚以然大與金宝泰曰今事故未立効後取不晚也又求遣人自隨覘伺尚従之泰要發火遣隗伯諸軍攻郫驤使道設伏以長梯上伯軍伯軍見火起皆争縁梯雄因放兵擊之大破尚軍雄徑追退夜至城下稱萬嵗曰以得郫城矣入少城尚乃覺保大城驤别攻犍為斷尚運道獲太守武陵龔恢恢往為天水西縣令任回為吏回問曰識故吏不恢曰識汝耳郡吏星散惟功曹楊渙侍衛回謂曰卿義人也吾力恐不能捄龔君不能免卿也宐早去渙曰背主求生何如守義而死遂并見殺以李漙爲犍爲太守雄生獲伯知其傷死創也伯女為梁雙妻為已用故不殺閏十二月尚糧運不繼而被攻急夜退由牛鞞水東下留牙門張羅持城終夜比雄覺去以逺倉卒失節鉞羅持從後得之并獲資應雄得成都梁州刺史許雄以討賊不進檻車徵詣詔獄惟護軍與漢國太守杜孟治都戰帥趙汶荆州太守梓潼疑闕守漢中元興元年春正月尚至江陽軍司辛寳詣表狀詔書權統巴東巴郡涪陵三郡供其軍賦冬尚移屯巴郡遣軍掠蜀中斬雄從祖冉獲驤妻昝子壽兄弟十二月雄太尉李離伐漢中殺戰帥趙汶永嘉元年春尚施置關戍至漢安僰道時益州民流移在荆湘州及越嶲牂柯尚書置郡縣就民所在又施諸村參軍三月闗中流民鄧定訇氐等掠漢中冬辰勢以叛巴西太守張燕帥牙門武肇漢國郡丞宣定遣兵圍之氐求捄扵李雄夏五月雄遣李離李雲李璜李鳳入漢中救定杜孟治聞離至命燕釋圍保州城初燕攻定定衆飢餓偽降送金一器與燕燕納之居七日氐至定還冬辰勢燕進圍之不聽孟治言離至先攻肇營營破次攻定又破之燕懼戰將百騎走離等大破州軍牙門蔡松退告孟治曰州軍以破賊衆不可待也孟治怖護軍欲城守謂孟治曰賊來雖衆客氣之常李區區有東南之逼必不分宿兵扵外不過迎㧞定氐耳孟治曰不然雄冒稱帝王縦横天下以遣重众必取漢中雖有牢城士民破瞻不可與待冦也乃開門退走護軍北還孟治入大桑谷民數千家車數千兩一夜行才數十里而梓潼荆子有誤疑字以父與孟治有隙合子弟追之及扵谷口孟治棄子走荆子獲之及吏民千餘家惟漢國功曹母建荷檐仗曰吾雖不肖一國大夫國亡不能存終不屬賊也餓死谷中積十餘日離等引還漢中民句方白落率吏民還守南鄭二年詔書録尚討特功加散騎常侍都督二州進爵夷陵侯長子字以佩奉車都尉拜次子延壽騎都尉梁州以雄所破壊晉更以皇甫商為梁州商不能之官更用順陽内史江夏張光為刺史治新城漢中民逼李鳳冦掠東走荆沔三年冬天水訇琦張金茍畧陽羅羕殺雄太尉李離降尚䧺太傅驤李雲李璜攻羕為所破殺雲璜雄従弟也為司空十有二月琦等送離母子於尚尚斬之分其室四年天水文石殺雄太宰李國以巴西降尚梓潼巴西還屬初巴西譙登詣鎮南請兵鎮南無兵表為揚烈將軍梓潼内史義募三巴蜀漢民為兵克復州郡先征宕渠殺雄巴西太守馬脫還住涪折衝將軍張羅進據犍為之合水巴蜀為語曰譙登治涪城文石在巴西張羅守合水巴氐郡得前秋七月尚薨于巴南尚字敬之一名仲字敬真襄陽人也歴尚書丞郎武陵汝南太守徙梁州臨州詔書除長沙太守下邳皮素泰混為益州刺史兼西夷校尉楊烈將軍領義募人及平西將軍當進治三闗時李驤急攻譙登素次巴東敕平西將軍張順楊顯捄登尚子宇恚恨加登糧運不給素至涪欲治執事執事懐懼冬十有二月素至巴郡降人天水趙攀閻蘭等夜殺素素字泰混下邳人也建平都尉㬥重殺宇及攀巴郡亂不果捄登三府官屬上巴東監軍冠軍將軍南陽韓松為剌史校尉治巴東五年春正月李驤破涪城獲登巴西梓潼𣸪爲雄有荆襄有亂氐苻成隗文作亂宐都西上巴東雄衆攻僰道走犍為太守魏紀殺江陽太守姚襲二月氐隗文等反扵巴東㬥重討之未下重殺太守韓松松字公治南陽人隗文司徒暨孫也自領三府事三月三府文武與巴東太守吏共囚重及妻子於宐都殺之共表巴郡太守張羅字景治行三府事羅治枳自討隗文於宫坼破降之旬月復叛刼巴郡太守黄龕託以爲主龕窮急自殺主簿楊預諫曰文之宿惡江川所知拘刼朙府誰不危心虚假之名孰當信之可使張將軍知其丹誠何遽如此龕曰賊已道斷何縁得令景治知之預乃作龕書遣弟逃氐詣羅羅曰子宣宣誠吾自眀之耳隗文聞怒囚龕執預問遣信狀龕曰不遣也文乃考預一日夜預不言文欲殺龕預死杖下文義之赦龕羅遣軍討之破還羅自討之敗績身死羅字景治河南梁人也巴中無復餘種矣文驅畧吏民西上降雄將任回獲犍為太守魏紀三府文武共表平西司馬王異行三府事又領巴郡太守梁州剌史張光復治漢中六年龍驤將軍江湯太守犍為張啓與廣漢羅琦共殺異異字彦眀蜀人也啓復行三府事羅琦行巴郡太守啓病亡啓字進朙犍為人蜀車騎將軍張翼孫也三府文武復共表涪陵太守義陽向沈行西夷校尉吏民南入涪陵建興元年春沈卒涪陵多疫癘蜀郡太守江陽程融宐都太守犍為楊芬西夷司馬巴郡常歆都安令蜀郡常倉弘等共推汶山太守涪陵蘭維為西夷校尉時中原既亂江東有事捄援無所顧望融等共率吏民北出枳欲下巴東遂為雄將李恭費黒所破獲五月梁州刺史張光討王如黨涪陵李運巴西王建於蛇盤便作山疑其欲叛也運建走保拘山光遣軍攻破殺之建女聓楊虎保黄金山以叛討之虎夜棄營還趣厄水去州城四十里住光遣其子孟萇討之迭有勝負光求助於武都氐王楊茂􅊧虎亦求捄於茂􅊧初茂􅊧子難敵遣養子適賈梁州私買良人子一人光怒鞭殺之難敵以是怨光曰使君初來大荒之後兵民之命仰我氐活氐有小罪不能貰也隂謀討光㑹光虎求捄秋八月茂搜遣難敵將騎入漢中外言助光内實應虎至州城下光以牛酒饗勞遣與孟萇共討虎孟萇自處前難敵繼後與虎戰久難敵従後擊孟萇大破生禽孟萇殺之九月光恚死州人共推始平太守胡子序領州冬十月虎與氐急攻州城子序不能守委城退走氐虎得州城發光塚㷊其屍䘮難敵得光鼓吹妓樂自号刺史虎領吏民入蜀漢中民張咸等討難敵難敵退還咸復入蜀於是三州沒為雄矣蜀自太康至于太安頻恠異成都北鄊有人嘗見女子僻入草中往視物如人有身形頭目口無手足能動揺不能言廣漢有馬生角長大各半寸又有驢無皮毛袒肉飲食數日死繁什邡郫江原生草髙七八尺莖葉赤子青如牛角内史耿滕以為朱草表美於成都王元康三年正月中欵一夜有火光地仍震童謡曰郫城堅盎底穿郫中細子李特細又曰江橋頭闕下市成都北門十八字及尚在巴郡也又曰巴郡葛當下美巴郡皮素之西上也又曰有客有客來侵門陌其氣欲索武平府君云譙周言巴沒三十年後當有異人入蜀蜀由之亡蜀亡之嵗去周三十三年又曰宋岱不死則孫阜不交市三旬之間流雄之首懸扵轅門愚以為宋岱方進阜見得質及更推敗設岱生在無所保據矣杜弢自湘中與柳監軍書曰前諸人不能寛李特一年又不以徐士權為汶山太守而屯故如此謂失之毫釐差以萬里斯言有似然必以不村漸為恨者流民初西當承詔書閉闗不入其次易代趙廞選宐内遣平西綿竹之㑹聽王敦之計少可以寧毫釐之覺非彼之謂也譔曰先王䂓方萬國必兼親尊賢能而任宗盟者葢内藩王室外禦叛侮故元牧有連率之職奉貢無失職之愆奚及漢氏部州必卿佐之才郡守皆台鼎之望是以王尊王褒著名前世第五倫蔡茂徑登三司斯作逺之准格不凌之令範也自大同後能言之士無不以西土張曠為憂求王皇宗樹賢建徳于時莫察視險若夷缺垣不防任非其噐啓戎長冦遂覆三州詩所謂四國無正不用其良也華陽國志卷苐八
