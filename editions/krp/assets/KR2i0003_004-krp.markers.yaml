  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書華陽國志卷四晉常璩撰南中志寧州晉泰始六年初置蜀之南中諸郡庲降都督治也南中在昔盖夷越之地滇濮句町夜郎葉榆桐師嶲唐侯王國以十數編髮左祍隨畜遷徙莫能相雄長下永昌縣有嶲唐縣周之季世楚威王遣將軍莊蹻泝沅水出且蘭以伐夜郎植牂柯繫船於是且蘭既尅夜郎又降而秦奪楚黔中地無路得反遂留王滇池蹻楚莊王苗裔也以牂柯繫船因名且蘭為牂柯國分侯支黨傳數百年秦并蜀通五尺道置吏主之漢興遂不賓有竹王者興於遯水有一女子浣於水濱有}
