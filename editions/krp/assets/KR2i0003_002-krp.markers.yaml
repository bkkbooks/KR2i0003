  - {type: variant, offset: 1494, length: 0, content: '', WYG: 攻漢中至定軍淵郃顒來戰大為先主所破將軍黄忠斬淵顒首魏武帝復西征先主先主曰孟德雖來無能為也我必有漢川矣先主遂為漢中王將還成都當得重將以鎮漢中衆皆以必張飛張飛心亦自許先主乃以牙門義陽魏延為鎮逺將軍漢中太守先主大㑹羣臣問延曰今委卿以漢中卿居之若何對曰若曹操舉天下而來請為大王拒之若偏將十萬而來請為大王吞之衆壯其言初魏武之留淵郃也以雞肋示外外人莫察惟主簿楊脩知之故曰夫雞肋棄之如可惜食之無所得以比漢中也是後處蜀魏界固險重守自丞相大司馬大將軍皆}
