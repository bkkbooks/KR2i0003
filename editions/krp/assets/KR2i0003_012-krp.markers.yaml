  - {type: variant, offset: 7789, length: 0, content: '', WYG: 附江原常氏士女志明張佳允輯侍中長水校尉常洽字茂尼侍御史常翊南廣太守常竺字代文閬中令常偉字公然竺子廣都令常良郫令常朂字修業河内令常忌朂弟常仲山湘東太守常騫字季慎偉子戸曹掾常敞中郎常美都䕶常俊都䕶常深武平太守常寛字泰恭騫從弟治中從事長生字彭祖寛子散騎常侍常璩字道將寛族孫右士十六人便敬賔婦常元常良女殷氏婦常靡常仲山女趙侯夫人常紀常右女三人佳允曰江原常氏代有明徳故大姓也道將立志僅書其半豈以私親自嫌哉夫岷瀆委靈哲又作則儻資國器寸璧是尊今考出士女共十九人自立録目又見道將承源家學修辭有經斯龍門世業良史稱材間有行實詳畧不侔然英名遺烈垂在竹素庶幾尚友遐心蓍龜孔邇者矣}
