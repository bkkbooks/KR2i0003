front:
  text: 三節大竹流入女子足間推之不肯去聞有兒聲取持歸破之得一男兒長飬有才武遂雄夷狄氏以竹爲姓捐所破竹於野成竹林今竹王祠竹林是也王與從人嘗止大石上命作羮從者曰無水王以劒擊石水出今王水是也破竹存焉後漸驕恣武帝使張騫至大夏國見卭竹蜀布問所從來曰吾賈人從身毒國得之身毒國蜀之西國今永昌是也騫以白帝東越攻南越大行王恢救之恢使番陽令唐蒙曉喻南越南越人食有蒟醬蒙問所從曰䍧柯來蒙亦以白帝因上書曰南越地東西萬里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎精兵可得十萬若從畨禺浮舩䍧柯出其不意此制越之一竒也可通夜郎道為置吏主之帝乃拜䝉中郎將發巴蜀兵千人奉幣帛見夜郎侯喻以威德為置吏㫄小邑皆貪漢繒帛以為道逺漢終不能有也故皆且聽命司馬相如亦言西戎卭笮蜀之後園可置為郡帝既感卭竹又甘蒟醬乃拜為中郎將徃喻意皆聽命後西南夷數反發運興伇費甚多相如知其不易也乃假巴蜀之論以諷帝且以宣指使於百姓本傳檄文在卒開僰門通南中相如持節開越嶲按道侯韓說開益州武帝轉拜唐䝉為都尉開䍧柯以重幣喻告諸種侯王侯王服從因斬竹王置䍧柯郡以呉覇為太守及置越嶲朱提益州四郡後夷濮阻城咸怨訴竹王非血氣所生求立後嗣覇表其三子列侯死配食父祠今竹王三郎神是也昭帝始元元年益州廉頭姑繒等二十四縣民反水衡都尉吕破奴募吏民及發犍為蜀郡奔命擊破之後三歲姑繒復反都尉吕辟胡擊之敗績明年遣大鴻臚田廣明等大破之斬首捕虜五萬人獲畜産十餘萬頭冨埒中國封其渠帥亡波為鉤町王以助擊反者故也廣明賜爵邑成帝時夜郎王興與鉤町王禹漏卧侯俞更相攻擊命使太中大夫張匡持節和解之鉤町夜郎王不服乃刻木作漢使射之大將軍王鳯薦金城司馬蜀郡陳立為䍧柯太守何覇為中郎將出益州立既到郡單至夜郎召興興與邑君數千人來見立立責數斬興邑君皆悅服興妻父翁指與興子耻復反立討之威震南裔平帝末梓潼文齊為益州太守公孫述時拒郡不服光武稱帝以南中有義益州西部金銀寳貨之地居其官者皆冨及十世孝明帝初廣漢鄭純獨尚清廉毫毛不犯夷漢歌詠表薦無數上自三司下及卿士莫不歎賞明帝嘉之因以為永昌郡拜純太守章帝時蜀郡王阜為益州太守治化尤異神馬四匹出滇池河中甘露降白烏見始興文學漸遷其俗安帝永初中漢中隂平廣漢羗反征戰連年元初四年益州永昌越嶲諸夷封離等反衆十餘萬多所􅋊破益州刺史張喬遣從事蜀郡楊竦將兵討之竦先以詔書告諭告諭不從方畧滌討凡殺虜三萬餘人獲生口千五百人財物四十餘萬降赦夷三十六種舉劾姦貪長吏九十人黄綬六十人諸郡皆平竦以傷死故功不録自是後少寧五十餘年迄靈帝熹平中蠻夷復反擁没益州太守雍陟遣御史中丞朱龜將并涼勁兵討之不克朝議不能征欲依朱厓故事棄之太尉掾巴郡李顒獻陳方䇿以為可討帝乃拜顒益州太守與刺史龎芝伐之徵龜還顒將巴郡板楯軍討之皆破陟得生出後復更叛梓潼景毅為益州太守承䘮亂後民夷困餓米一斗千錢皆離散毅至安集後米一斗八錢建安十九年劉先主定蜀遣安逺將軍南郡鄧方以朱提太守庲降都督治南昌縣輕財果毅夷漢敬其威信方爲先主問代於治中從事建寧李恢對曰西零之役趙充國有言莫若老臣先主遂用恢為都督治平夷縣先主薨後越嶲叟帥髙定元殺郡將焦璜舉郡稱王以叛益州大姓雍闓亦殺太守正昻更以蜀郡張裔為太守闓假鬼教曰張裔府君如瓠壺外雖澤而内實粗殺之不可縳與吴於是執送裔於吴吴王孫權遙用闓為永昌太守遣故劉璋子闡為益州刺史處交益州除䍧柯郡丞朱提朱襃領太守恣睢丞相諸葛亮以初遭大喪未便加兵遣越嶲太守巴西龔禄住安上縣遙領郡從事蜀郡常頎行部南入以都護李嚴書曉喻闓闓荅曰愚聞天無二日土無二主今天下派分正朔有三逺人惶惑不知所歸其傲慢如此頎至䍧柯收郡主簿考訊奸襃因殺頎為亂益州夷復不從闓闓使建寧孟獲說夷叟曰官欲得烏狗三百頭膺前盡黑蟎腦三斗斵木三丈者三千枚汝能得不夷以為然皆從闓斵木堅剛性委曲高不至二丈故獲以欺夷建興三年亮南征自安上由水路入越嶲别遣馬忠伐䍧柯李恢向益州以犍為太守廣漢王士為益州太守髙定元自旄頭定笮卑水多為壘守亮欲俟定元軍衆集合并討之軍卑水定元部曲殺雍闓及士庶等孟獲代闓為主亮既斬定元而馬忠破䍧柯李恢敗於南中夏五月亮渡瀘進征益州生虜孟獲置軍中問曰我軍如何獲對曰恨不相知公易勝耳亮以方務在北而南中好叛亂宐窮其詐乃赦獲使還合軍更戰凡七虜七赦獲等心服夷漢亦思反善亮復問獲獲對曰眀公天威也邊民長不為惡矣秋遂平四郡改益州為建寧以李恢為太守加安漢將軍領交州刺史移治味縣分建寧越嶲置雲南郡以吕凱為太守又分建寧䍧柯置興古郡以馬忠為䍧柯太守移南中勁卒青羗萬餘家於蜀為五部無當無前軍號飛闕分其羸弱配大姓焦雍婁㸑孟量毛李為部曲置五部都尉號五子故南人言四姓五子也以夷多剛狠不賓大姓冨豪乃勸令出金帛聘䇿惡夷為家部曲得多者奕世襲官於是夷人貪貨物以漸服屬於漢成夷漢部曲亮收其俊傑建寧㸑習朱提孟琰及獲為官屬習官至領軍琰輔漢將軍獲御史中丞出其金銀丹漆耕牛戰馬給軍國之用都督常重用其人李恢卒後以蜀郡太守犍為張翼為都督翼持法嚴不得殊俗和夷帥劉胄反徵翼以馬忠為代忠未至翼修攻戰方畧資儲群下懼翼曰吾方臨戰塲豈可以絀退之故廢公家之務乎忠至承以滅胄蜀賜翼爵關内侯忠在南柔逺能邇甚垂恵愛官至鎮南大將軍卒後南人為之立祠水旱禱之以蜀郡張表為代加安南將軍又以犍為楊義為參軍副貳之表後以南郡閻宇為都督南郡霍戈為参軍弋甚善參毗之禮遂代宇為監軍安南將軍撫和異俗為之立法施教輕重允當夷晉安之及晉世因仍其任時交趾不附假弋節遙領交州刺史得以便宐選用長吏令官和解夷人及適罰之皆依弋故事弋卒子在龔領其兵和諸姓晉以巴西太守吴靜在官數年撫䘏失和軍司鮮于嬰表徵靜還嬰因代之泰始六年以益州大分南中四郡為寧州嬰為刺史咸寧五年尚書令衛瓘奏兼并州郡太康三年罷寧州置南夷以天水李毅為校尉持節統兵鎮南中統五十八部夷族都監行事毎夷供貢南夷府入牛金旃馬動以萬計皆豫作忿恚致校尉官屬其供郡縣亦然南人以為饒自四姓子弟仕進必先經都監夷人大種曰昆小種曰叟皆曲頭木耳環鐵褁結無大侯王如汶山漢嘉夷也夷中有桀黠能言議屈服種人者謂之耆老便為主論議好譬喻物謂之夷經今南人言論雖學者亦半引夷經與夷為姓曰遑耶諸姓為自有耶世亂犯法輒依之藏匿或曰有為官所法夷或為執仇與夷至厚者謂百世遑耶恩若骨肉為其逋逃之藪故南人輕為􅍔變恃此也其俗徵巫鬼好詛盟投石結草官常以盟詛要之諸葛亮乃為夷作圖譜先畫天地日月君長城府次畫神龍龍生夷及牛馬羊後畫部主吏乗馬幡葢廵行安䘏又畫牽牛負酒齎金宝詣之之象以賜夷夷甚重之許致生口直又與瑞錦鐵劵今皆存每刺史校尉至齎以呈詣動亦如之毅後永昌吕祥為校尉祥後數人李廣漢從雲南犍為郡守為校尉久之建寧太守巴西杜俊朱提太守梓潼雍約懦鈍無治政以賄成俊奪大姓鐵官令毛詵中郎李叡部曲致詵弟耐罪朱提大姓太中大夫李猛有才幹弟為功曺分當察舉而俊約受都尉雷逄賂舉逢子炤孝廉不禮猛猛等怨之太安元年秋詵叡猛逐俊以叛猛之書曰昔魯侯失道季氏出之天之愛民君師所治知足下追踵古人見賢思齊足下箕帚枉慚吾郡亦逐約應之作亂衆數萬毅討破之斬詵首叡走依遑耶丘蔡夷師于陵承猛箋降曰生長遐荒不達禮教徒與季雄和光合勢雖不能營師五丈略地渭濱兾北斷襃斜東據永安退考靈符晉德長久誠非狂夫所能干輒表革面歸罪有司毅惡其言遂誘殺之部永昌從事江陽孫辨上南中形勢七郡斗絶晉弱夷强加其土人屈塞應復寧州以相鎮慰冬十一月丙戌詔書𣸪置寧州增統䍧柯益州朱提合剌郡為刺史加龍驤將軍進封成都縣侯二年于陵承詣毅請恕叡罪毅許之叡至羣下以為詵叡破亂州土必殺之毅不得已許諾及叡死干陵承及詵猛遑耶怒扇動謀反奉建寧太守巴西馬恢為刺史燒郡偽發毅方疾作力出軍初以救恢及聞其情乃殺恢夷愈强盛破壊郡縣役吏民會毅疾甚軍連不利晉民或入交州或入永昌䍧柯半亦為夷所困虜夷因攻圍州城毅但病力固孤城病篤不能戰討時李特李雄作亂益州而所在有事救援莫至毅上疏陳謝不能式遏冦虐疾與事遇使虜遊䰟兵穀既單器械窮盡而求救無望坐待殄斃若必不垂矜憂乞請大使及臣尚存加以重罪若臣已死必陳屍為戮積四年光熈元年春三月毅薨子釗任洛還赴到䍧柯路塞停住交州文武以毅女秀明達有父才遂奉領州事秀初適漢嘉太守廣漢王載載將家避地在南故共推之又以載領南夷龍驤參軍秀奬厲戰討食糧已盡人但焦草炙鼠為命秀伺夷怠緩輒出軍掩破首尾三年釗乃得達丁喪文武復逼釗領州府事毅故吏毛孟等詣洛求救至欲自刎懐帝乃下交州使救助之以釗為平冦將軍領南夷護軍遣御史趙濤贈毅少府謚曰武侯交州刺史吾彦遣子威逺將軍咨以援之朝廷以廣漢太守魏興王遜為南夷校尉寧州刺史代毅自永嘉元年受除四年乃至遙舉建寧董敏為秀才郡久無太守功曹周悅行郡事輕敏不下其板遜至怒殺悅悅弟秦㨔長周昺合夷叟謀以趙濤父混昔為建寧有德恵欲殺遜樹濤遜誅之并殺濤夷晉莫不惶懼表釗為朱提太守治南廣禦雄時荒亂後倉無斗粟衆無一旅官民虚竭繩紀弛廢遜惡衣菜食招集夷民夷徼厭亂漸亦返善勞來不怠數年克復以五荼夷昔為亂首圖討之未有致罪㑹夷發夜郎莊王墓遜因此遂討滅之及討惡獠剛夷數千落威震南方官至平西安南將軍又兼益州刺史加散騎常侍封襃中伯而嚴猛太過多所誅鋤犍為太守朱提雷炤流民隂貢平樂太守董覇破䍧柯平夷南廣北降李雄建寧㸑量與益州太守李易梁水太守董慬保興古槃南以叛雄遣叔父驤破越嶲伐寧州遜使使督護雲南姚岳拒驤於堂螂縣違遜指授雖大破驤不獲太興四年遜發病薨州人推中子堅領州事永昌元年晉朝更用零陵太守南陽尹奉為寧州刺史南夷校尉加安西將軍奉威刑緩鈍政治不理咸和八年遂為雄弟壽所破獲南中盡為雄所有惟䍧柯謝恕不為壽所用
