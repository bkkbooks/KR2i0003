body:
  text: 遂保郡獨為晉官至撫夷中郎將寧州刺史冠軍是嵗咸和八年也䍧柯郡漢武帝元鼎二年開屬縣漢十七户六萬及晉縣四戸五千去洛五千六百一十里郡上值天井故多雨潦俗好鬼巫多禁忌畬山為田無蠶桑頗尚學書少威儀多懦怯寡畜産雖有僮僕方諸郡為貧王莽更名䍧柯曰同亭郡不服㑹公孫述時三蜀大姓龍傅尹董氏與功曺謝暹保郡聞漢世祖在河北乃逺使使由畨禺江出奉貢漢朝世祖嘉之號為義郎明章之世母歛人尹珍字道真以生遐裔未漸庠序乃逺從汝南許叔重受五經又師事應世叔學圖緯通三材還以教授於是南域始有學焉珍以經術選用歴尚書丞郎荆州刺史而世叔為司隷校尉師生竝顯平夷傅寳夜郎尹貢亦有名德歴尚書郎長安令巴郡太守彭城相號南州人士郡特多阻嶮有延江霧赤煎水為池衛少有亂惟朱褒見誅其郡守垂功名者前有吴覇陳立後有漢中張亮則廣漢劉寵犍為費詩巴西馬忠皆著勲烈晉元帝世太守建寧孟才以驕㬥無恩郡民王清范朗逐出之刺史王遜怒分鄨半為平夷郡夜郎以南為夜郎郡四縣萬壽縣郡治有萬壽山沮本有鹽井漢末時夷民共詛盟不開今三郡皆無鹽且蘭縣音沮漢曰故且蘭有柱蘭關也廣談縣毋歛縣有剛火也平夷郡晉元帝建興元年置屬縣二戸千平夷縣郡治有䂪津安樂水山出茶蜜鄨縣故犍為郡城也不狼山出鄨水入沅水有野生薜可食大姓王氏夜郎郡夜郎國也屬縣二戸千夜郎縣郡治有遯水通廣鬰林有竹王三郎祠甚有靈響也談指縣晉寧郡本益州也元鼎初屬䍧柯越嶲漢武帝元封二年叟反遣將軍郭昌討平之因開為郡治滇池上號曰益州漢屬縣二十四戸二十萬晉縣七户萬去洛五千六百里司馬相如韓說初開得牛馬羊屬三十萬漢乃募徙死罪及姧豪實之郡土大平敞原田多長松臯有鸚鵡孔雀鹽池田漁之饒金銀畜産之冨俗奢豪難撫御惟文齊王阜景毅李顒及南郡董和為之防檢後遂為善蜀建興三年丞相亮之南征以郡民李恢為太守改曰建寧治味縣寧州别建為益州郡後太守李逷恢孫也與前太守董慬建寧㸑量共叛寧州刺史王遜表改益州為晉寧郡滇池縣郡治故滇國也有澤水周圍二百里所出深廣下流淺狹如倒流故曰滇池長老傳言池中有神馬或交焉即生駿馬俗稱之曰滇池駒日行五百里水神祠祀亦有温泉如越嶲温水又有白蝟山山無石惟有蝟也同勞縣同安縣連然縣有鹽泉南中共仰之建令縣毋單縣秦臧縣建寧郡治故庲降都督屯也南人謂之屯下屬縣晉太安二年分為益州平樂二郡合縣十三戸萬去洛五千六百三十九里有五部都尉四姓及霍家部曲味縣郡治有明月社夷晉不奉官則官與共盟於此社也升麻縣山出好升麻有塗水同樂縣大姓㸑氏穀昌縣漢武帝將軍郭昌討夷平之因名郭昌以威夷孝章帝時改為穀昌也同瀨縣雙柏縣存䣖縣雍闓反結壘於縣山繫馬枊柱生成林今夷言無雍梁夷言馬也昆澤縣漏江縣九十里出蠙口談槀縣有濮獠伶丘縣主獠脩雲縣新定縣平樂郡元帝建興元年刺史割建寧新定興遷二縣新立平樂三沮二縣合四縣為郡後太守建寧董覇叛降李䧺郡縣遂省寧州北屬雄復為郡以朱提李壮為太守朱提郡本犍為南部孝武帝元封二年置屬縣四建武後省為犍為屬國至建安二十年鄧方為都尉先主因易名太守屬縣五戸八千去洛五千三百里先有梓潼文齊初為屬國穿龍池溉稻田為民興利亦為立祠大姓朱魯雷興仇逓髙李亦有部曲其民好學濵犍為號多士人為寧州冠冕朱提縣郡治堂螂縣因山名也出銀鉛白銅雜藥有堂螂附子南秦縣自僰道南廣有八亭道通平夷漢陽縣有漢水入延江南昌縣故都督治有鄧安逺城也南廣郡蜀延熈中置以蜀郡常竺為太守蜀朝召竺入為侍中巴西令狐衷代之建武九年省元帝世刺史王遜移朱提治郡南廣太守李釗數破雄殺賊大將樂初後刺史尹奉却郡還舊治及雄定寧州復置郡以興古太守朱提李播為太守屬縣四戸千自僰道至朱提有水步道水道有黑水及羊官水至險難行步道渡三津亦艱阻故行人為語曰猶溪赤木盤虵七曲盤羊烏櫳氣與天通看都濩泚住柱乎尹庲降賈子左儋七里又有牛叩頭馬摶坂其險如此土地無稻田蠶桑多虵蛭虎狼俗妖巫惑禁忌多神祠南廣縣郡治漢武帝大初元年置有鹽官臨利縣常遷縣新興縣永昌郡古哀牢國哀牢山名也其先有一婦人名曰沙壼沙壹後漢作依哀牢山下居以捕魚自給忽於水中觸一沉木遂感而有娠度十月産子男十人後沉木化為龍出謂沙壼曰君為我生子今在乎而九子驚走惟一小子不能去陪龍坐龍就而䑛之沙壼與言語以龍與陪坐因名曰元隆猶漢言陪坐也沙壼將元隆居龍山下元隆長大才武後九兄曰元隆能與龍言而黠有智天所貴也共推以為王時哀牢山下復有一夫一婦産十女元隆兄弟妻之由是始有人民皆象之衣後着十尾臂脛刻文元隆死世世相繼分置小王徃徃邑居散在溪谷絶域荒外山川阻深生民以來未嘗通中國也南中昆明祖之故諸葛為其國譜也孝武時通博南山度蘭滄水谿置嶲唐不韋二縣徙南越相吕嘉子孫宗族實之因名不韋以彰其先人惡行人歌之曰漢德廣開不賓渡博南越蘭津渡蘭滄為他人渡蘭滄水以取哀牢地哀牢轉衰至世祖建武二十三年王扈栗賢栗後漢作遣兵乘箄船南攻鹿茤鹿茤民弱小將為所擒㑹天大震雷疾風㬥雨水為逆流箄船沉没溺死者數千人後扈栗復遣六王攻鹿茤鹿茤王迎戰大破哀牢軍殺其六王哀牢人埋六王夜虎掘而食之哀牢人驚怖引去扈栗懼謂諸耆老曰哀牢略徼自古以來初不如此今攻鹿茤輒被天誅中國有受命之王乎是何天祐之明也漢威甚神即遣使詣越嶲太守願帥種人歸義奉貢世祖納之以為西部屬國其地東西三千里南北四千六百里有穿胷儋耳種閩越濮鳩獠其渠帥皆曰王孝明帝永平十二年哀牢抑狼遣子奉獻明帝乃置郡以蜀郡鄭純為太守屬縣八戸六萬去洛六千九百里寧州之極西南也有閩濮鳩獠僄越躶濮身毒之民土地沃腴黄金光珠虎魄翡翠孔雀犀象蠶桑綿絹采帛文繡又有貊獸食鐵猩猩獸能言其血可以染朱罽有大竹名濮竹節相去一丈受一斛許其梧桐木其花柔如絲民績以為布幅廣五尺以還潔白不受汚俗名曰桐華布以覆亡人然後服之及賣與人有蘭干細布蘭干獠言紵也織成文如綾錦又有罽旄帛疊水精瑠璃軻蟲蚌珠宐五穀出銅錫太守著名績者自鄭純後有蜀郡張化常員巴郡沈稚黎彪然顯者猶鮮章武初郡無太守值諸郡叛亂功曹吕凱奉郡丞蜀郡王伉保境六年丞相亮南征髙其義表曰不意永昌風俗乃爾以凱為雲南太守伉為永昌太守皆封亭侯李恢遷濮民數千落于雲南建寜界以實二郡凱子祥太康中獻光珠五百觔還臨本郡遷南夷校尉祥子元康末為永昌太守值南夷作亂閩濮反乃南移永壽去故郡千里遂與州隔絶吕氏世官領郡於今三世矣大姓陳趙謝楊氏不韋縣故郡治比蘇縣哀牢縣永壽縣今郡治嶲唐縣有周水從徼外來雍鄉縣南里縣有翡翠孔雀博南縣山高四十里越之得蘭滄水有金沙以火融之為黄金有光珠穴出光珠有虎魄能吸芥又有珊瑚雲南郡建興三年置屬縣七戸萬去洛六千三百四十三里本雲川地有熊倉山上有神鹿一身两頭食毒艸有上方下方夷亦出花布孔雀常以二月來翔月餘而去土地有稻田畜牧但不蠶桑雲南縣郡治葉榆縣有河洲遂久縣有繩水也㺯棟縣有無血水水出連山蜻蛉縣有鹽官濮水同出山有碧雞金馬光彩倐忽民多見之有山神漢宣帝遣諌議大夫蜀郡王襃祭之欲致雞馬襃道病卒故不宣著其縣二别爲郡河陽郡刺史王遜分雲南置屬縣四戸千河陽縣郡治在河中源洲上也梁水郡刺史王遜分置在興古之盤南梁水縣郡治有振山出銅賁古縣山出銀鈆銅鐵西隨縣興古郡建興三年置屬縣十一户四萬去洛五千八百九十里多鳩獠濮特有瘴氣自梁水興古西平三郡少穀有桄榔木可以作麵以牛酥酪食之人民資以為糧欲取其木先當祠祀温縣郡治元鼎二年置律髙縣西有石空山出錫東南有盤町山出錫鐔封縣有温水句町縣故句町王國也其置自濮王姓毋漢時受封迄今漢興縣勝休縣有河水也唐都縣故名雲夢縣西平郡刺史王遜時㸑量保盤南遜出軍攻討不能克及遜薨後寇掠州下吏民患之刺史尹奉重募徼外夷刺殺量而誘降李逷盤南平奉以功進安西將軍封遷陵伯乃割興古雲南之盤江來如南零三縣為郡右寧州統郡十四縣六十八咸熈元年吳交趾郡吏吕興殺太守孫靖内附魏魏拜興安南將軍時南中監軍霍弋表遣建寧㸑谷為交趾太守率牙門將軍建寧董元毛炅孟幹孟通㸑熊李松王素等領部曲以討之谷未至興已為功曹李統所殺泰始元年谷等徑至郡撫和初附無幾谷卒晉更用馬忠子融代谷融卒遣犍為楊稷代之加綏逺將軍又進諸牙門皆雜號將軍封吳侯交州刺史劉峻大都督脩則領軍三攻稷皆為稷所敗鬰林九真皆附稷稷表遣將軍毛炅董元等攻合浦戰于古城大破吳軍殺峻則稷因表炅為鬰林太守元為九真太守元病亡更以益州王素代之數攻交州諸郡泰始七年春吳王孫皓遣大都督薛珝交州刺史陶璜帥二十萬軍興扶嚴惡夷合十萬伐交趾稷遣炅及將軍建寧孟岳等禦之戰于封谿衆寡不敵炅等敗績僅以身免還交趾固城自守破敗之後衆裁千人并新附可有四千男女萬餘口陶璜圍之杜塞蹊徑救援不至雖班糧約食猶不供繼至秋七月城中食盡病餓死者太半交趾人廣野將軍王約友應陶璜以梯援外吳人遂得入城得稷等皆囚之即斬稷長史張登將軍孟通及炅幷交趾人邵暉等二千餘人受皓詔傳稷秣陵故梏稷及孟幹㸑熊李松四人于吳通四逺消息稷至合浦發病歐血死傳首秣陵棄其屍喪於海幹松熊至吳將加斬刑或說皓宥免幹等可以勸邊將皓原之欲徙付臨海郡初稷等私誓不能死節困辱虜手若蒙未死必當思求北歸稷既路死幹等恐北路轉逺以吳人愛蜀側竹弓弩言能作之皓轉付部為弓工九年幹自吳逃返洛陽松熊為皓所殺初晉武帝以稷為交州刺史大封半道稷城陷或傳降故不録幹至表状乃追贈交州刺史封松熊後嗣侯焉古城之戰毛炅手殺脩則則子允隨陶璜璜以炅壯勇欲赦之而允必欲求殺炅炅亦不屈於璜璜怒乃躶身囚結面縳呵曰晉兵賊炅亦烈聲呵曰呉狗何等為賊呉人生割其腹允割其肝罵曰虜腹炅罵不斷曰尚欲斬汝孫皓汝父何死狗也吳人斬之武帝聞而矜哀即詔炅子襲爵封諸子三人關内侯九真太守王素以交趾敗與董元牙門王承等欲還南中為陶璜别將衛濮所獲功曺李祚見交趾民􅋊害還遂率吏民保郡為晉祚舅黎晃為吳將攻伐祚不下數遣人解喻降之祚荅曰舅自吳將祚自晉臣惟力是視矣邵暉子胤先為父使詣洛拜奉車都尉比還暉敗亡胤依祚固守求救南中南中遥為之援諸姓得世有部曲弋遣之南征因以功相承也譔曰南域處卭笮五夷之表不毛閩濮之鄉固九服之外也而能開土列郡爰建方州踰博南越蘭滄逺撫西垂漢武之迹可謂大業然要荒之俗不與華同安邊撫逺務在得才故高祖思猛士作歌孝文想頗牧咨嗟斯靜禦之將信王者所詳釋也馬霍王尹得失之際足以觀矣交趾雖異州部事連南中故幷志焉華陽國志卷苐四
