front:
  text: 華陽國志卷苐十一
  hash: sha256:42863c5f25fce570d9b0693b0813e7fea958988dc012239c4af0283286888de1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_011-1a}
body:
  text: 後賢志聞之善志者述而不作序事者實而不華是以史遷之記詳扵秦漢班生之書僃乎哀平皆以丗及事邇可得而言也西州自奉聖晉後俊瑋倜儻之士或脩德讓行止從時或播功立事羽儀上京策勲王府甄名史録侔扵先賢㑹遇䘮亂軋遘華夏顛墜典籍多缺族祖武平府君愍其若斯乃操簡援翰拾其遺闕然但言三蜀巴漢未列又務在舉善不必珍異揆之耆舊竹素宐闡今更撰次損益足銘後觀者凡二十人綴之斯篇雖行故墜没大較舉其一隅衞尉散騎常侍文立廣休散騎穆穆誠感聖君西河太守桞隱休然西河烈烈秉義居眞漢嘉太守司馬勝之興先漢嘉克讓謙德之倫郫令州主簿常勗修業郫君謇諤自固底身江陽太守何隨季業江陽皎皎命丗清湻梓潼太守王化伯逺梓潼矜矜在險能平太子中庶子陳壽承祚庻子稽古遷固竝聲漢中太守李宓令伯漢中韙曄才葢羣生犍爲太守杜軫起宗犍爲卬卬友于寔令給事中任熈伯逺給事温恭尚德蔑榮中書郎王長文德雋中書淵識寳道韜朙大長秋壽良文㳤長秋忠肅朙允篤誠大司農西城公何攀恵興司農運籌思侔良平少府成都侯威李毅允剛少府果壯文武是經衡陽内史楊邠岐之衡陽固節隱然不傾尚書三州都費立建熈尚書凖繩古之遺直湘東太守常騫季愼湘東汜􅋢仁以接物武平太守常寛泰恭武平亹亹氷清玉嶷楊烈將軍梓潼内史巴西譙登江陽太守江陽侯馥文立廣休巴郡臨江人也少逰蜀太學治毛詩三禮兼通羣書州刺史費褘命爲從事入爲尚書郎復辟褘大將軍東曺掾稍遷尚書蜀并于魏梁州建首爲别駕從事咸熈元年舉秀才除郎中晉武帝方欲懐納梁益引致雋彦泰始二年拜立濟隂太守武帝太子以司徒李胤爲太傅齊王驃爲少傅選立爲中庶子立上䟽曰伏惟皇太子春秋美茂盛德日新始建㓜志誕陟大繇猶朝日初暉良寳耀璞侍從之臣宐簡俊乂妙選賢彦使視觀則覩禮容棣棣之則聽納當受嘉話駭耳之言靜應道軌動有所采佐清初陽緝熈天光其任至重聖王詳擇誠非糞朽能可堪任臣聞之人臣之道量力受命其所不諧得以誠聞帝報曰古人稱與田蘇逰非舊德乎立上故蜀大官及盡忠死事者子孫雖仕郡國或有不才同之齊民為劇又上諸葛亮蒋琬費禕等子孫流徙中畿宐見叙用一則以慰巴蜀民之心其次傾東吳士人之望事皆施行十年詔曰太子中庶子立忠貞清實有思理器幹前在濟隂政事修朙後事東宫盡輔導之節昔光武平隴蜀皆收其才秀所以援濟殊方伸叙幽滯也其以立爲散騎常侍累辭不許上䟽曰臣子之心碩從䟽以求眤凡在人情貪從幽以致眀斯實物性賢愚所同臣者何人能無此懐誠自審量邊荒遺燼犬馬老甚非左右機納之噐臣雖至愚處之何顔詔曰常伯之職簡才而授何謙虗也立自内侍獻可替否多所補納甄致二州人士銓衡平當爲士彦所宗故蜀尚書犍爲程瓊雅有德望素與立至厚武帝聞其名以問立立對曰臣至知其人但年垂八十禀性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也西界獻馬帝問立馬何如對曰乞問太僕帝毎善其恭慎遷衛尉猶兼都職中朝服其賢雅爲時名卿連上表年老乞求解替還桑梓帝不聴咸寜末卒帝縁立有懐舊性乃送葬于蜀使者護䘮事郡縣修墳塋當時榮之初安樂思公丗子早殁次子宐嗣而思公立所􅋢者立亟諌之不納及􅋢子立驕㬥二州人士皆欲表廢立止之曰彼自㬥其一門不及百姓當以先公故得爾也後安樂公淫亂無道何攀與上庸太守王崇涪陵太守張寅爲書諌責稱當思立言凡立章奏集爲十篇詩賦論頌亦數十篇同郡毛楚楊崇皆有德美楚牂柯崇武陵太守栁隱字休然蜀郡成都人也少與同郡杜充栁伸竝知名隱直誠篤亮交友居厚逹扵從政數從大将軍姜維征伐臨事設計當敵䧟陣勇畧冠軍爲牙門将巴郡太守騎都尉遷漢中黄金圍督景耀六年魏鎮西将軍鍾㑹伐蜀入漢川圍戍多下惟隱堅壁不動㑹别将攻之不能克後主旣降以手令敕隱乃詣㑹晉文帝聞而義之咸熈元年内移河東拜議郎武帝踐祚以爲西河太守在官三年以年老去官乞骸還蜀卒扵家年八十長子克連道令次子初舉秀才杜禛字文然栁伸字雅厚州牧諸葛亮辟爲從事禛符節令梁益二州都督伸度支禛子昣字伯重略陽護軍伸漢嘉巴東太守大同後竝舉秀才昣子彌字景文伸子純字偉㳤有名德幹器舉秀才巴郡宐都建平太守西夷長水校尉巴東監軍司馬勝之字興先廣漢綿竹人也學通毛詩治三禮清尚虗素性澹不榮利初爲郡功曹甚善綱紀之體州辟從事進尚書左選郎徙秘書郎時蜀國州書佐望與郡功曹參選而從事侔臺郎時重察舉雖位經朝要還為秀孝亦為郡端右景耀末郡請察孝㢘大同後梁州辟别駕從事舉秀才歴廣都新繁令政理尤異以清秀徵為散騎侍郎以宗室禮之終以疾辭去職即家拜漢嘉太守候迎盈門固讓不之官閒居清靜謙卑自牧常言世人不務求道德而汲汲扵爵禄若吾者可少以爲有餘榮矣訓化鄊閭以恭敬爲先年六十五卒扵家子尊賢佐皆有令德常勗字修業蜀郡江原人也祖父貟牂柯永昌太守父高廟令從父閎漢中廣漢太守勗少與閎子忌齊名安貧樂道志篤墳典治毛詩尚書渉治羣籍多所通覽州命辟從事入爲光禄郎中主事入爲尚書左選郎郡請迎爲功曹時州將董軍政置從事職典刑獄以勗清亮復爲督軍治訟平當還察孝㢘除郫令爲政簡而不煩魏征西将軍鄧艾伐蜀破諸葛瞻扵綿竹威振西土諸縣長吏或望風降下或委官奔走朂獨率吏民固城拒守後主檄令乃詣艾故郫穀帛全完刺史袁邵嘉朂志節辟爲主簿朂善儀容翔集動爲表觀言論壯烈州里重之然交友惟賢不交下已者汎􅋢之恩猶不足邵徴還道卒忌字茂通蜀謁者黄門侍郎䘮親以致孝聞察孝㢘爲郎使呉稱職歷長水参軍什邡雒令大同後刺史邵坐治城被徵忌詣洛陳訴逺國初附君民始結不冝改易又表修治城池居安思危邊將常職事皆中情晉文帝時爲相國辟忌舎人武帝踐祚拜騎都尉除河内令州名爲難治忌挫折豪勢風教大行縣有姦嫂殺兄者羣黨蔽匿前令莫得忌皆窮治入爲州都方議爲郡守㑹卒忌爲人信道任數不從下人故爲貴勢所不善是以作詩著論先攻己短臨䘮與樂歡哀俱至爲士類所稱忌友人廣漢段宗仲亦有學行蜀時官與忌比袁邵爲主簿與忌共理郡事文帝善之梁州辟别駕從事舉秀才稍遷官至雲南建寧太守何隨字季業蜀郡郫人也漢司空武後丗有名德徵聘入官隨治韓詩歐陽尚書研精文緯通星歷郡命功曹州辟從事光禄郎中主事除安漢令蜀亡去官時巴土飢荒所在無榖送吏行乏輒取道側民芋隨以綿繫其處使足所取直民視芋見綿相語曰聞安漢清㢘行過從者無糧必能爾耳持綿追還之終不受因爲語曰安漢吏取糧令爲之償察孝㢘大同後臺召不詣除河間王郎中令不就居貧固儉衣弊𬞞食晝躬耕耨夕修講諷郷族饋及禮厚皆不納目不視色口不語利著譚言十篇論道德仁讓嘗有屠牽猪過隨門猪索斷失之強認溷中猪隨便牽猪與之屠人出門㝷得其所亡猪謝隨還猪遂以乞之有家飬竹園人盗其笋隨遇行見之恐盜者覺怖走竹中傷其手足挈屐徐歩而歸其仁如此太康中即家拜江陽太守民思其政年七十一卒官後州鄊人言議平當者皆相謂何江陽至于汶山夷有正直㢘讓者亦號夷中何江陽杜景文何興仁皆爲作傳長子觀字匡忠清公㳤慎知名州里察孝㢘西都南安令平西長史張昌作亂荆州從黨西上郡守無不望風降下至江陽平西将軍羅尚表爲安逺護軍討賊平殄除巴郡太守朝議欲以爲寜州刺史㑹病卒次子逰治中從事隨時同郡繁令張崇清㢘推譲見稱當時王化字伯逺廣漢郪人也漢将作大匠王堂後也祖父啇字文表州牧劉璋時爲蜀太守有懿德髙名在耆舊傳父彭字仲巴郡太守化兄弟四人少有令望化治毛詩三禮春秋公羊傳郡命功曺州辟從事光禄郎中主事尚書郎除閬中令爲政清靜察孝廉大同後復端右郡察孝㢘爲樂逭令縣近邊塞值外虜反化率吏民積穀堅守虜斷道重圍孤絶七年伺虜怠惰出軍討之民得野掠大軍至虜退以功封關内侯遷朱提太守撫和殊俗得夷晉懽心轉在梓潼復有稱績爲人嚴重言論方雅臧否允衷州里服其誠亮年七十二卒官弟振字仲逺亦有德望廣都令巴東太守叔弟岱字季逺恪居官次歷廣陽作唐令早亡少弟崇字㓜逺學業淵博雅性洪粹蜀時東觀郎大同後梁州辟别駕别舉秀才尚書郎與壽良李宓陳壽李驤杜烈同入京洛爲二州標雋五子情好未必能終惟崇獨以寛和無所彼此著蜀書及詩賦之屬數十篇其書與陳壽頗不同官至上庸蜀郡太守陳壽字承祚巴西安漢人也少受學扵散騎常侍譙周治尚書三傳銳精史漢聦警敏識屬文冨豔初應州命衞将軍主簿東觀秘書郎散騎黄門侍郎大同後察孝㢘爲本郡中正益部自建武後蜀郡鄭伯邑大尉趙彦信及漢中陳申伯祝元靈廣漢王文表皆以博學洽聞作巴蜀耆舊傳壽以為不足經逺乃并巴漢撰爲益部耆舊傳十篇散騎常侍文立表呈其傳武帝善之再爲著作郎吳平後壽乃鳩合三國史著魏吳蜀三書六十五篇號三國志又著古國志五十篇品藻典雅中書監荀勗令張華深􅋢之以班固史遷不足方也出爲平陽侯相華又表令次定諸葛亮故事集爲二十四篇時壽良亦集故頗不同復入爲著作郎鎮南将軍杜預表爲散騎侍郎詔曰昨適用蜀人壽良具貟且可以爲侍御史上官司論七篇依據典故議所因革又上釋諱廣國論華表令兼中書郎而壽魏志有失勗意勗不欲其處内表爲長廣太守繼母遺令不附葬以是見譏數嵗除太子中庻子太子傅從後再兼散騎常侍恵帝謂司空張華曰壽才宐眞不足久兼也華表欲登九卿㑹受誅忠賢排擯壽遂卒洛下位望不充其才當時寃之兄子符字長住亦有文才繼壽著作佐郎上廉令符弟莅字叔度梁州别駕驃騎将軍齊王辟掾卒洛下莅從弟階字逹芝州主簿察孝廉襃中令永西部都尉建寜興古太守皆辭章燦麗馳名當丗凡壽所述作二百餘篇符莅階各數十篇二州先逹及華夏文士多爲作傳大較如此尚書郎拜建章太守以疾辭不就意在州里除時梓潼李驤叔龍亦雋逸器知名當丗舉秀才攜隟還相誣攻有識以是短之亦自别傳廣漢太守初與夀齊望又相眤友後與夀情好李宓字令伯犍爲武陽人也祖父光朱提太守父早亡母何更行見飬祖母治春秋左傳博覽五經多所通渉機警辯捷辭義響起事祖母以孝聞其侍疾則泣涕側息日夜不解帶饍飲湯藥必過目嘗口本郡禮命不應州辟從事尚書郎大將軍主簿太子洗馬奉使聘吴吴主問蜀馬多少對曰官用有餘民間自足吴主與群臣汎論道義謂寜爲人弟宓曰碩爲人兄吴主及群臣稱之大同後征西将軍鄧艾聞其名請爲主簿及書招欲與相見皆不徃以祖母年老心在色飬拒州郡之命獨講學立旌授生武帝立太子徵爲洗馬詔書累下郡縣相逼宓上䟽本傳䟽在武帝覽之曰宓不空有名也嘉其誠𣢾賜奴婢二人下郡縣供其祖母奉膳徙尚書郎河内温令敷徳陳教政化嚴明太傅鉅平侯羊公薨無子帝令宗子爲丗子嗣之不時赴䘮宓遣户曹賫移推轂遣之中山諸王毎過温縣必責求供給吏民患之宓至中山王過縣徵芻茭薪蒸宓引髙祖過沛賓老㓜桑梓之供一無煩費伏惟眀王孝思惟則動識先戒本國望風式歌且舞誅求煩碎所未聞命後諸王過不敢煩温縣盗賊發河内餘縣不敢近温追賊者不敢經界隴西王司馬子舒深敬友之而貴豪憚其公直宓去官爲州大中正性方亮不曲意勢位者失荀張指左遷漢中太守諸王多以爲寃一年去官年六十四卒著述理論論中和仁義儒學道化之事凡十篇安東将軍胡羆與皇甫士安深善之又與士安論夷齊及司馬文中杜起宗郄令先文廣休等議論徃返言經訓詁衆人服其理趣釋河内趙子聲譏詩賦之屬二十餘篇壽良李驤與陳承祚相長短宓公議其得失而切責之常言吾獨立扵丗顧景爲疇而不懼者心無彼此扵人也故宓六子皆英挺秀逸號曰六龍長子賜字宗碩州别駕舉秀才汶山太守少與東海王司馬元超友昵毎書詩徃返雅有新聲少子興字雋碩太傅參軍㓜子盛碩寜浦太守宓同時蜀郡髙玩字伯珍少受學扵太常杜瓊術藝微妙博聞強識清尚簡素少與宓齊名官位相比大同後察孝㢘除曲隅令單車之縣移檄縣綱紀不使遣迎以眀三材徵爲太史令送者亦不出界朝廷稱之方論大用㑹卒杜軫字超宗蜀郡成都人也父雄字伯休安漢雒令軫少師譙周發明髙經扵譙氏之門郡命爲功曹鄧艾既破蜀被徵鍾㑹進成都時太守南陽張府君不肯出官軫進曰征西囚執鎭西在近必有所遣軍亂之際交害無常宐避正殿府君即出住下舎會果遣參軍牽弘爲太守數百騎擐甲馳馬入郡前驅問侯所在云已出善之引復召爲功曹察孝㢘除建寜令徙仕山陽新城池陽所在有治入爲尚書郎毎升降趋翔廊閣之下盛容可觀中朝偉之遷犍爲太守恵􅋢在民還爲州大中正軫旣才學兼該而器量倜儻武帝雅識之方用内侍㑹卒時年五十八弟烈字仲武貞幹敏識平坦和粹名譽侔軫察孝㢘歷平康牛鞞南鄭安陽令王國建首選為郎中令選衡陽太守兄軫䘮自上求去官以兄子㓜弱軫䘮飄颻欲扶将靈柩葬舊墳武帝歎惜軫能用未盡而嘉烈弟意轉拜徙官犍爲太守又轉湘東少弟良字㓜倫亦有當丗局分舉秀才茶陵新都令國王郎中令遷涪陵建寧太守兄弟竝興州里以爲美譚軫二子長子毗字長基少子秀字彦潁圭璋琬琰丗号二鳯毗舉秀才大將軍辟掾太傅參軍平東長史尚書郎稍遷鎭南軍司益州刺史主簿早卒任熈字伯逺蜀郡成都人也漢大司徒任方後也卋有德彦父元字秀明犍爲太守執金吾熈治毛詩京易博通五經事親至孝居䘮毁瘠爲州郷所稱察孝㢘除南鄭令以病去官復授南鄭不就轉梓潼令爲政清淨辭疾告歸勤農力穡居室致給循訓闔門内則可法博􅋢以謙恭接物開門待賔傾懐下士客無長㓜必有供饍清談逰講不妄失言祗愼著聞太康中除越嶲護軍非其雅好不徃徴給事中熈以侍臣日月左右贊暉揚光不可茍私終以疾辭而蜀郡令毎至官爲之修謁歳致羊酒即家拜朱提太守固讓不之官好述作詩誄論難皆燦豔年六十九卒扵家子蕃字憲祖察孝㢘新都令西夷司馬涪陵太守蕃子迪字叔孤少與巴西龔壯俱知名而學業優之早殁熈同時犍爲楊彭敬宗弟逵訓宗各以德行稱同察孝㢘彭比蘇令甘露降其縣逵滇池令殊俗懐其德王長文字德雋廣漢郪人也父顒字伯元犍爲太守長文天姿聰警髙暢敏識治五經博綜群籍弱冠州三辟書佐丁時興衰託疾歸家大同後郡功曺察孝㢘不就遂陽愚常着絳衣絳㡌牽猪過市中乞人與語偽不聞常騎牛周旋郡初至詣門修敬至閭走出請終不還刺史淮南胡羆辟從事祭酒卧在治羆出版舉秀才長文陽發狂疾歩擔走出門羆累遣教請還終不顧還家飬母獨講學著無名子十二篇依則論語又著通經四篇亦有卦名擬易玄以爲春秋三傳傳經不同毎生訟議乃擬經摭傳著春秋三傳十三篇又撰約禮記除煩舉要凡十篇皆行於時長文才鑒清妙汎􅋢廣納放蕩闊逹不以細宐㢘分爲意亦不好臧否人物故時人􅋢而敬之以母欲禄飬咸寜中領蜀郡太守郫有孝子羅偶事親至孝二親將亡時病不能食肉終身不食肉郡察孝㢘長文追爲立表以旌之宰府辟三司撫及軍大將軍王濬累辟不詣濬薨以故州將軍弔祭元康初試守江原令縣収得盗賊長文引見誘慰時適臘晦皆遣歸家獄先有繋囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶析歸就汝上下善相懽樂過節來還當爲思他理羣吏惶遽爭請不許㝷有赦令無不感恩所宥人輟不爲惡曰不敢負王君將䘮去官民思其政大將軍梁王􅊮及諸府竝辟長文曰吾從其先命者遂應􅊮招爲從事中書郎諸王公卿慕其名咸與之交賈氏之誅從􅊮有功封關内侯再爲中書郎愍懐太子死扵許下博士中書論虞祔之禮長文議虞祭宐還東宫以繼太子者爲主配食扵潁川府君皆施行除洛陽令長文見􅊮曰主者不庻幾奏長文爲洛陽令􅊮笑答曰卿乃不庻幾非主者也固辭不拜聞益州亂以通經筮得老蠶縁枯桑之卦歎曰桑無桑蠶以卒也吾蜀人殄扵是矣拜蜀郡太守暴疾卒時年六十四長文時人蜀郡桞竺任興亦博學著聞俱爲州别駕竺在右職公亮蹇蹇刺史盛怒欲殺人羣下請不聴竺乃懐縛徑入頓几上乃極陳其刑理刺史從謝還縛闕皆早亡下作長久壽良字文㳤蜀郡成都人也父祖二世犍爲太守良少與犍爲張徵費緝竝知名治春秋三傳貫通五經澡身貞素州從事散騎黄門侍郎大同郡主簿上計吏察孝不就州辟主簿治中别駕舉才行刺史皇甫晏貢之三司遂辟太宰除覇城令始平太守治政著稱從扶風轉秦國内史文立卒後温令李宓表武帝言二州人士零頽才彦凌遲無復厠豫綱紀後進慰寧遐外者良公朝在時二州之望宐見超子紹繼立後帝徵爲黄門侍郎兼二州都給事中梁州刺史遷散騎常侍大長秋卒葬洛北芒山徵字建興張翼子也篤志好學官至廣漢太守緝字文平清檢有治幹舉秀才歷城令涪陵太守遷譙内史良公朝疑誤何攀字恵興蜀郡郫人漢司空汎鄊侯武弟潁川太守顯後也父包字休楊察舉孝秀皆不行除瑯琊王中尉不就攀兄弟五人皆知名攀少夙成竒姿卓逸弱冠郡主簿上計吏州辟從事刺史王晏稱攀王佐才也以爲主簿泰始十年飬母歸家晏爲牙門張弘等所害攀操表詣洛訟釋事得清刺史王濬復辟主簿别駕咸寜三年濬被詔罷屯田兵作船爲伐吳調攀進曰今見佃兵但六百人計作船六七年財可勝萬人後者未成前者已腐無以輔成國意宐輙召四守休兵及諸武吏并萬餘人造作嵗終可辦濬及綱紀疑輙召萬兵欲先上須報攀曰官家雖欲伐呉疑者尚多卒聞召萬兵必不見聽以佃兵作船船不時成當輒召以速爲機設當見却功夫已成勢不得止濬之議欲入山裁船動數百里艱難攀曰今冡墓多種松栢當什四市取以速爲機濬悦之任攀典舟船器仗冬遣攀使洛攀曰聖人之功可成使人信之不可必也夫髙祖之大略猶未察扵韓信婁敬因蕭何子房而後用之今建非常之功或莫之信羊公使君同􅉀國家所重加曩日失䇿江陵思有夙駕宐與相聞此一助也濬曰何但芉叔子亦宋元亮之憂君至洛官家未有舉意便前襄陽與芉宋論之攀既至洛拜表獻䇿因至荆州與刺史宋􅒉論宋未許乃見芉祜累日共畫用兵之要攀曰若令循清海以趣京下壽春揚州直指秣陵兖豫踰海竝據桑浦則武昌以東㑹稽以西騷然駭矣荆州平南徑造夏口巴東諸軍固守西陵益梁之衆乘浮江東下封樂郷要巴丘則武陵零桂長沙湘東從風而靡矣但眀信賞首尾俱㑹旌旗耀天四面雲合乘機席卷傳檄南極呉㑹不盡平者未之有也羊祜大悦遂表請伐吳㝷徴濬大司農至晉壽詔以濬爲龍驤将軍除攀郎中參濬軍事攀頻奉使詣洛時未婚司空裴公竒其才以女妻之五年秋攀使在洛安東将軍王渾表孫皓欲北上邊戍警戒朝議征却須六年攀上䟽䇿皓必不敢出宐因今戒嚴掩取甚易中書令張華命宿下舍設諸難攀皆通之又濬性在忠烈受命必果宐重其位號詔書遷濬平東将軍督二州事呉平封關内侯濬入拜輔國攀爲司馬上論時務五篇除滎陽令進廷尉評有盗開城門下關者法據大辟攀駮之曰上關執信之主下關儲備之物設有開上關何以加刑遂減死多所議讞遷散騎侍郎太傅楊駿謀逆請衆官攀與侍中傅祗侍郎王愷等徃恵帝從楚王瑋殿中中郎孟觀䇿戒嚴誅駿外已怱怱攀與祇踰墻得出侍天子天子以爲翊軍校尉領熊渠兵一戰斬駿社稷用安封西城公邑萬户䇿曰於戲在昔先王光濟厥丗罔不開國列土建德表功也故逆臣楊駿謀危社稷􅌟兵飛矢集于殿􅒉白刄交扵宫闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城爲攀封國錫兹玄社苴以白茅永為晉藩輔徃欽㢤敬乃有土恵康黎元無或以隳爾顯烈又賞絹萬匹攀固辭受五千匹又賜拜弟逢平郷侯兄子夔關内侯遷宣闕内史不就轉東羗校尉西虜冦邊遣長史揚威討之違攀指受失利徴還領越騎校尉武庫災百官皆赴火攀獨以兵衞宫復賜絹五百匹領河南尹遷揚州刺史假節在官數年徳教敷宣征虜将軍石崇表東南有兵氣不宐用逺人徴拜大司農兼三州都自表以被疾錯忘不堪銓量人物讓都職扵任熈費緝不聴遷兖州刺史錫寳劒赤舄固辭不之官時帝室政衰多害忠直又諸王迭起好結黨徒攀闔門治疾不與丗務朝議欲以爲公㑹薨時年五十七天子愍悼追贈司印綬謚曰桓公遺令敕丗子務行恭儉引荀公曽諸葛林爲模範子璋嗣李毅字允剛廣漢郪人也祖父朝字愇南州别駕從事父旦字欽宗光禄郎中主事毅少散逹不治素檢年二十餘乃詣郡文學受業通詩礼訓詁爲學主事太守弘農王濬臨學講試問祭酒姬豔曰學中有可成進㡬百人艶對曰可有百人濬怒曰童冠八百而成者百人教少何爲毅對曰如艶之言眀府之教盛扵孔氏不爲少也濬竒之命爲主簿濬嘗夢得三口刀云人以禾益之手持不得以問郡丞與掾史莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾傍失者秩字眀府秩當至孟州濬笑曰如卿言當相以爲秀才張弘殺益州刺史皇甫晏誣表晏反毅白濬曰皇甫侯起自諸生位極方州又當何求且廣漢與成都宻爾而統梁州者衿益州之領須防若今日也益州有􅍔乃此郡之憂加張弘小竪衆所不與宐時赴討濬欲先上後行毅曰大夫出疆苟利社稷専之爲賢何兄殺主賊急當不拘常宐濬從之發兵與牙門滿泰等共討弘斬之詔書遷濬益州刺史毅復爲州主簿别駕舉秀才及濬伐呉與何攀竝爲參軍呉平封闗内侯除隴西護軍以疾去官徙繁令遷雲南太守濬臨薨上表後武帝思濬勲問毅所在徙犍爲使持節南夷校尉久之犍爲民毛詵李叡與朱提民李孟共逐太守杜俊雍約以叛衆數萬毅討破之斬詵孟首叡走依五荼夷亦叛晉朝復置寜州以毅爲刺史加龍驤将軍封成都縣侯夷遂大反破沒郡縣攻圍州城中原亂而李雄冦蜀救援不至疾病薨扵窮城懐帝嘉其忠節追贈少府謚曰威侯毅性通博居情雅厚賑䘏寒貧篤扵故舊人咸歸之但好談調德重猶少從弟苾字叔平少修身砥厲名行數諌毅宐自矜嚴毅笑應之曰吾小來不治名素終杖旄節故可至九卿卿清儉履道卒不失成都令也時毅始受南夷而苾歷城令果作成都遷犍爲太守位官不及毅毅子釗世秉儒學有格望以父任爲謁者除夀林侯相不就爲尚書外兵郎自表赴難至牂柯夷㫁道不得進經年以寜州城中無榖父疾病未知吉凶不食穀惟茹草迄至奔䘮官至朱提越嶲太守西夷校尉毅女秀適漢嘉太守新都王載有才智父亡後州文武推領州三年二州當太清中位至方州節将者夀良何攀及毅永嘉中巴張奕希祖爲荆州刺史南蠻長水校尉蜀郡張峻紹茂爲監南中八部事西夷校尉持節事楊邠字岐之犍爲武陽人也少好學志古藻厲名行州辟主簿别駕刺史王濬舉秀才安漢雒令國王中尉以選爲尚書郎遷汶山太守值夷復讎失殊俗和徙授巴東轉廣漢永嘉初進衡陽内史遇流民叛亂攻沒長沙湘東邠輒救助賊衆􅒓盛遂破郡城獲邠欲以爲主邠不許賊晝夜執守邠候其小怠夜急走比覺已去逺収餘衆軍重安欲投湘州刺史荀眺共圖進取㑹眺降賊邠孤軍固城賊攻圍之誓死不移遂卒城中時年六十九帝為鎭東大将軍嘉其忠節死義大使弔贈䇿曰惟永嘉七年四月己未使持節都督江陽諸軍事鎭東大將軍瑯琊王睿謹遣版命前衡陽内史楊君忠肅貞固守正不移雖危逼節義可嘉不幸殞卒孤城甚悼之今列上尚書贈君淮南内史魂而有靈嘉玆寵榮哀㢤交阯太守平九眞鬰林日南邠同郡楊稷文曺泰始初為珝陶璜十萬人攻稷被攻八月救援不至衆寡不敵遂為珝璜所獲囚稷四郡斬吳交州刺史劉俊大将軍脩則武帝方授交州㑹孫皓遣大將薛烈殁命追贈交州刺史也欲以送皓稷毆血死帝嘉其忠費立字建熈犍為南安人也父揖字君讓巴西太守立學義沖邃玄靜沉嘿察孝㢘王國中尉王年少好輕行逰觀立常正色匡諌及上䟽風喻詞義劘切合箴䂓之體出爲成都令縣名難治立莅之垂績以性公亮入爲州大中正除巴西太守不就轉梁益寜三州都督兼尚書值大駕西幸長安常與大臣居守在洛加貟外散騎常侍封闗内侯每准正三州人物品格襃貶帥意方矩無復䟽親莫不畏敬然委曲者多恨其繩墨數辭諸郡意在河秦汝潁久之朝議欲以為荆州永嘉六年與子并殁扵胡冦立時漢國吕毅叔偉德以清彦辟别舉秀才尚書郎秦國内史長水校尉貟外常侍梁州都督與立同殁胡冦常騫字季愼蜀郡江原人也祖父竺字代文南廣太守侍中祖偉字公然閬中令騫治毛詩三禮以清尚知名州辟部從事主簿郡請功曺察孝㢘萍鄊令以選爲國王侍郎出爲綿竹令國王歸之復入爲郎中令從王起義有功封闗内侯遷魏郡太守加材官将軍以晉政衰覩中原不靜固辭去官拜新都内史時蜀亂民在流在荆湘徙湘東太守疾病未拜卒年六十八騫性汎􅋢敦敬友宗族當官修理恕以撫物好咨問動必謙讓州鄊以爲儀範二州清官見述者先有宐都太守犍爲唐定義業隴西太守巴西馮仚休翊而後騫云常寛字泰恭騫族弟郫令勗弟子也父廓字敬業以朙經著稱早亡闔門廣學治毛詩三禮春秋尚書尤耽意大易博涉史漢疆識多聞而謙虗清素與俗殊務郡命功曹及察孝㢘不就州辟主簿别駕舉刺史羅尚秀才爲侍御史除繁令隨民安縣零陵以舉将䘮去官湘州叛辭乃南入交州交州刺史陶咸表爲長史固辭不之職雖流離交城衣弊褞袍冠皮冠乗牛徃來獨鳩合經籍研精著述依孟揚宗盧師矩著典言五篇撰蜀後志及後賢傳續陳夀耆舊傳作梁益篇元帝踐祚嘉其德行㓗白拜武平太守民悦其政以榮貴非志在官三年去職尋梁碩作亂得免難卒於交州凡所著述詩賦論議二十餘篇子長生字彭祖亦有學行州主簿資中令治中從軍早亡時蜀郡太守巴西黄容亦好述作著家訓梁州巴紀姓族左傳抄凡數十篇漢嘉太守蜀郡杜龔敬修亦著蜀後志及志趙廞李特叛亂之事及䘮紀禮式後生有取焉譙登字愼朙巴西西充國人譙周孫也仲父熈察孝㢘本郡大中正沔陽令叔父同字彦紹少知名拒州郡之命梁州刺史夀良與東羗校尉何攀貢之三司及大将軍幕府爲尚書郎除錫令亦有爲作傳者登少以公亮義烈聞郡命功曹州辟主簿别駕從事領隂平太守郡五官素大姓豪擅侵凌羗晉登誅之郡中皆肅後以李特作亂本郡没冦父爲李雄巴西太守馬脱所殺乃東詣鎭南劉公請兵時中原亂守公三年不能得兵表拜楊烈將軍梓潼内史使合義募巴蜀流士得二千人鎭西將軍羅尚以退住已郡登凡募登從尚索益軍討雄不得乃徃攻宕渠斬脱食其肝巴西賊破復詣尚求軍尚参佐多以必無利登憤恚數凌折之又加責扵尚尚但下之而已㑹羅羕殺雄太尉李離舉梓潼來降登徑進涪城雄自攻登爲登所破而尚將張羅進屯犍爲之合水文碩殺雄太宰李國以巴西降羅遣軍掠廣漢破雄叔父驤虜其妻子募人斫䧺頭賊以向困而尚本参佐恨登之見矜侮不供其軍食益州刺史皮素至巴東敕平西送故遣将張順楊顯救登至墊江素遇害順顯還雄知登乏食遣􅋮致攻兵窮士餓誓死不退衆亦餓死而無去者永嘉三年爲驤所生得輿登致雄言辭慷慨涕泣􅒣欷無服降臣折情雄乃殺之囚其軍士皆以爲奴虜畀兵士而連陰雨百餘日雄中以登爲枉而所領無辜怒氣感天下赦出登軍士湮沒者初尚之在成都也與䧺攻戰郫令犍爲張昕欽眀每摧破雄雄衆憚之而救助不能并心爲䧺所殺雄常言羅尚將均如張昕吾軰族早無遺矣時牙門左汜亦有戰功尚不能益其兵穀汜恚恨以母䘮歸尚累召不徃尚怒曰微左汜當不滅賊乎遂殺之雄聞汜死大小相賀登同郡縣李高亦有武幹平吳時與牙門将處前獲孫皓封縣侯官至金城雁門太守侯馥字丗朙江陽人也察孝㢘平西參軍闕薨後巴郡亂避地入牂柯寧州刺史王遜領平西将軍復取爲參軍遜議欲遷牂柯太守謝恕爲涪陵太守出屯巴郡之把口表馥爲江陽太守徃江陽之沘源撫䘏蠻獠克復江陵請通長江雄征東大將軍李恭已在江陽馥招降夷獠修繕舟艦爲進取調預白遜請軍移恕俱出涪陵不能自前恭舉衆攻馥衆寡不敵爲恭所破獲生虜馥送雄雄下廷尉責曰事君有死無二其次破家與國今縦不死又無益國灰沒其分守心而已無他碩望雄必欲屈之使馥同郡人張迎曉喻之馥怒罵迎曰吾等國亡不能存大難不能死低睂海内何面目相見也且王寧州治亂才也以吾有桑梓之耻故逺上尚書遣吾討賊受命之日實忘寝食但裁船未辦請軍未至牽揣不及爲他所先當滅身殞碎以謝不及兾上不負日月下不愧王侯吾豈苟生如鄊兒女之人乎迎還白雄雄義而赦之時雄衆冦所獲犍爲太守建寜魏紀漢國太守梓潼文琰巴郡太守巴西黄龕涪陵太守巴西趙弼永昌謝俊牂柯文猛皆區區稽顙無如馥者數年卒譔曰文王多士才不同用孔門七十科揆百行殊塗貴扵一致若斯諸子或挺珪璋之質或苞瑚璉之器或躭儒墨之業或韜王佐之略潛則泥蟠躍則龍飛揮翮揚芳流光遐紀實西土之珍彦聖晉之多士也徒以生処限外服膺日淺負荷榮顯未充其能假使植榦華宇振條神區徳行自有長短然三趙兩李張何之軌其有及之者乎譙登侯馥忠䂓奮烈美志不遂哀哉五公司空何武司空趙戒太尉趙謙司徒趙温司空張浩華陽國志巻苐十一
