front:
  text: 華陽國志卷苐三
  hash: sha256:a725b5eed4220039909aa97197f20bce683ea03fbfd1da6400132199a665fbb7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_003-1a}
body:
  text: 蜀志蜀之爲國肇於人皇與巴同囿至黄帝爲其子昌意娶蜀山氏之女生子髙陽是爲帝嚳封其支庶於蜀世爲侯伯歴夏商周武王伐紂蜀與焉其地東接于巴南接于越北與秦分西奄峨嶓地稱天府原曰華陽故其精靈則井絡垂耀江漢遵流河圖括地象曰岷山之下爲井絡帝以㑹昌神以建福夏書曰岷山導江東别爲沱泉源深盛爲四瀆之首而分爲九江其寳則有璧玉金銀珠碧銅鐵鈆錫赭堊錦繡罽氂犀象氈眊丹黄空青桑漆麻苧之饒滇獠賨僰僮㒒六百之冨其卦值坤故多班綵文章其辰值未故尚滋味德在少昊故好辛香星應輿鬼故君子精敏小人鬼黠與秦同分故多悍勇在詩文王之化被乎江漢之域秦豳同詠故有夏聲也其山林澤漁園囿果瓜四節代􅍄靡不有焉有周之世限以秦巴雖奉王職不得與春秋盟㑹君長莫同書軌周失紀綱蜀先稱王有蜀侯蠶叢其目縱始稱王死作石棺石椁國人從之故俗以石棺椁為縱目人冡也次王曰栢灌次王曰魚鳬魚鳬王田於湔山忽得仙道蜀人思之為立祠後有王曰杜宇教民務農一號杜主時朱提有梁氏女利遊江源宇悅之納以為妃移治郫邑或治瞿上七國稱王杜宇稱帝號曰望帝更名蒲卑自以功德髙諸王乃以襃斜為前門熊耳靈關為後户玉壘峨睂為城郭江濳綿洛為池澤以汶山為畜牧南中為園苑會有火災其相開明决玉壘山以除水害帝遂委以政事法堯舜禪授之義遂禪位于開明帝升西山隱焉時適二月子鵑鳥鳴故蜀人悲子鵑鳥鳴也巴亦化其教而力農務迄今巴蜀民農時先祀杜主君開明位號曰叢帝叢帝生廬帝盧帝攻奉至雍生保子帝帝攻青衣䧺張獠僰九世有開明帝始立宗廟以酒曰醴樂曰荆人尚赤帝稱王時蜀有五丁力士能移山舉萬鈞毎王薨輒立大石長三丈重千鈞為墓志今石笋是也號曰笋里未有謚列但以五色為主故其廟稱青赤黑黄白帝也開明王自夢廓移乃徙治成都周顯王之世蜀王有襃漢之地因獵谷中與秦恵王遇恵王以金一笥遺蜀王王報珍玩之物物化為土恵王怒羣臣賀曰天奉我矣王將得蜀土地恵王喜乃作石牛五頭朝㵼金其後曰牛便金有飬卒百人蜀人悅之使使請石牛恵王許之乃遣五丁迎石牛既不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也武都有一丈夫化為女子美而豔葢山精也蜀王納為妃不習水土欲去王必留之乃爲東平之歌以樂之無幾物故蜀王哀之乃遣五丁之武都擔土爲妃作冢葢地數畆高七丈上有石鏡今成都北角武檐是也後王悲悼作臾邪歌龍歸之曲其親埋作冢者皆立方石以志其墓成都縣内有一方折石圍可六尺長三丈許去城北六十里曰毗橋亦有一折石亦如之長老傳言丁士檐土擔也公孫述時武擔石折故治中從事任文公歎曰噫西方智士死吾其應之歲中䘚周顯王二十二年蜀侯使朝秦秦恵王數以美女進蜀王感之故朝焉恵王知蜀王好色許嫁五女於蜀蜀遣五丁迎之還到梓潼見一大虵入宂中一人攬其尾掣之不禁至五人相助大呼抴虵山崩時壓殺五人及秦五女并將從而山分為五嶺直頂上有平石蜀王痛傷乃登之因命曰五婦冡山川平石上為望婦堠作思妻臺今其山或名五丁冢蜀王别封弟葭萌於漢中號苴侯命其邑曰葭萌焉苴侯與巴王為好巴與蜀讎故蜀王怒伐苴侯苴侯奔巴求救於秦秦恵王方欲謀楚群臣議曰夫蜀西僻之國戎狄為鄰不如伐楚司馬錯中尉田真黄曰蜀有桀紂之亂其國冨饒得其布帛金銀足給軍用水通于楚有巴之勁卒浮大舶舩以東向楚楚地可得得蜀則得楚楚亡則天下幷矣恵王曰善周慎王五年秋秦大夫張儀司馬錯都尉墨等從石牛道伐蜀蜀王自於葭萌拒之敗績王遯走至武陽為秦軍所害其傅相及太子退至逢鄉死於白鹿山開明氏遂亡凡王蜀十二世周赧王元年秦恵王封子通國為蜀侯以陳壯為相置巴郡以張若為蜀國守戎伯尚强乃移秦民萬家實之三年分巴蜀置漢中郡六年陳壯反殺蜀侯通國秦遣庶長甘茂張儀司馬錯復伐蜀誅陳壯七年封子惲為蜀侯司馬錯率巴蜀衆十萬大船舩萬艘米六百萬斛浮江伐楚取啇於之地為黔中郡五年恵王二十七年儀與若城成都周廻十二里高七丈郫城周廻七里髙六丈臨卭城周廻六里髙五丈造作下倉上皆有屋而置觀樓射蘭成都縣本治赤里街若徙置少城内城營廣府舍置鹽鐵市官并長丞修整里闠市張列肆與咸陽同制其築城取土去城十里因以飬魚今萬歲池是也恵王二十七年也城北又有龍埧池城東有千秋池城西有栁池冬夏不竭其園囿因之平陽山亦有池澤蜀之漁畋之地也赧王十四年蜀侯惲祭山川獻饋於秦孝文王惲後毋害其寵加毒以進王王將嘗之後毋曰饋從二千里來當試之王與近臣近臣即斃文王大怒遣司馬錯賜惲劒使自裁惲懼夫婦自殺秦誅其臣郎中令嬰等二十七人蜀人葬惲郭外十五年封其子綰為蜀侯十七年聞惲無罪寃死使使迎喪入葬之郭内初則炎旱三月後又霖雨七月車溺不得行喪車至城北門忽陷入地中蜀人因名北門曰咸陽門為蜀侯惲立祠其神有靈能興雲致雨水旱禱之三十年疑蜀侯綰反王復誅之但置蜀守張若因取筰及其江南地焉周滅後秦孝文王以李氷為蜀守氷能知天文地理謂汶山為天彭門乃至湔及縣見两山對如闕因號天彭闕髣髴若見神遂從水上立祀三所所祭用三牲珪璧沉濆漢興數使使者祭之氷乃壅江作堋穿郫江撿江别支流雙過郡下以行舟船岷山多梓柏大竹頹隨水流坐致材木功省用饒又溉灌三郡開稻田於是蜀沃野千里號為陸海旱則引水浸潤雨則杜塞水門故記曰水旱從人不知饑饉時無荒年天下謂之天府也外作石犀五頭以厭水精穿石犀谿於江南命曰犀牛里後轉為耕牛二頭一在府市市橋門今所謂石牛門是也二在淵中乃自湔堰上分穿羊摩江灌江西於玉女房下自涉郵作三石人立三水中與江神要水竭不至足盛不沒肩時青衣有沫水出蒙山下伏行地中㑹江南安觸山脇溷崖水脈漂疾破害舟舩歴代患之氷發卒鑿平溷崖通正水道或曰氷鑿崖時水神怒氷乃操刀入水中與神闘迄今蒙福僰道有故蜀主兵闌亦有神作大灘江中其崕嶃峻不可鑿乃積薪燒之故其處懸崕有赤白五色氷又通笮通汶井江徑臨卭與蒙谿分水白木江㑹武陽天社山下合江又導洛通山洛水或出瀑口經什邡郫别江㑹新都大渡又有綿水出紫巖山經綿竹入洛東流過資中㑹江陽皆溉灌稻田膏潤稼穡是以蜀川人稱郫繁曰膏腴綿洛為浸沃也又識齊水脉穿廣都鹽井諸陂池蜀於是盛有養生之饒焉漢祖自漢中出三秦伐楚蕭何發蜀漢米萬舩而給助軍糧收其精銳以補傷疾雖王有巴蜀南中不賓也高祖六年始分置廣漢郡高后六年城僰道開青衣孝文帝末年以廬江文翁為蜀守穿湔江口溉灌繁田千七百頃是時世平道治民物阜康承秦之後學校陵夷俗好文刻翁乃立學選吏子弟就學遣雋士張叔等十八人東詣博士受七經還以教授學徒鱗萃蜀學比於齊魯巴漢亦立文學孝景帝嘉之令天下郡國皆立文學因翁倡其教蜀為之始也孝武帝皆徵入叔為博士叔明天文災異始作春秋章句官至侍中揚州刺史元光四年置蜀四部都尉元鼎二年立成都十八郭於是郡縣多城觀矣六年分廣漢置犍為郡元封元年分犍為置䍧柯郡二年分䍧柯置益州郡六年以廣漢西部蜀南部爲越嶲郡北部冉厖爲汶山郡卭笮爲沉黎郡合置二十餘縣天漢四年罷沉黎置兩部都尉一治旄牛主外羗一治青衣主漢民孝宣帝地節三年罷汶山郡置北部都尉時又穿臨卭蒲江鹽井二十所增置鹽鐵官蜀自漢興至乎哀平皇德隆熈牧守仁明宣德立教風雅英偉之士命世挺生感於帝思於是璽書交馳於斜谷之南玉帛踐乎梁益之鄉而西秀彦盛或龍飛紫闥允陟璿璣或盤桓利居經綸皓素故司馬相如耀文上京揚子雲齊聖廣淵才高名雋李仲元湛然岳立林翁孺訓誥互逺何君公謨明弼諧王延世著勲河平其次楊壯何顯得意之徒恂恂焉斯盖華岷之靈標江漢之精華也故益州刺史王襄悅之命王襃作中和頌令胄子作鹿鳴聲歌之以上孝宣帝帝曰此盛德之事朕何以堪之即拜為郎降及建武以後爰迄靈獻文化彌純道德彌臻趙志伯三遷台衡子柔兄弟相繼元輔司空張公宣融皇極太常仲經為天下材英廣陵太守張文紀號天下整理武陵太守杜伯持能决天下所疑王稚子震名華夏常茂尼流芳京尹其次張俊秦宓英辯博通董扶楊厚究知天文任定祖訓徒同風洙泗其孝悌則有姜詩感物寤靈禽堅精動殊俗隗通石横中流吴順赤烏來巢其忠貞則王皓隕身不傾朱遵絆馬必死王累懸頸州門張任守節故主其㳤媛則有元常紀常程玦及吴几先絡郫之二姚殷氏兩女趙公夫人自時厥後龍宗有鱗鳯集有翼搢紳邵右之疇比肩而進世載其美是以四方述作有志者莫不仰其高風範其儀則擅名八區為世師表矣其忠臣孝子列士貞女不勝詠述雖魯之詠洙泗齊之禮稷下未足尚也故漢徵八士蜀有四焉然秦恵文始皇克定六國輒徙其豪傑於蜀資我豐土家有鹽銅之利戸専山川之材居給人足以富相尚故工商致結駟連騎豪族服王侯美衣娶嫁設太牢之厨膳歸女有百兩之徒車送葬必高墳瓦椁祭奠而芉豕夕牲贈襚兼加贈賻過禮此其所失原其由來染秦化故也若卓王孫家僮千數程鄭各八百人而郄公從禽卷無行人簫鼓歌吹擊鐘肆懸冨侔公室豪過田文漢家食貨以為稱首葢亦地沃土豐奢侈不期而至也蜀郡州治屬縣五戸漢廿七萬晉六萬五千去洛三千一百二十里東接廣漢北接汶山西接漢嘉犍為州治大城郡治少城西南兩江有七橋直西門郫江中沖治橋西南石牛門曰市橋下石犀所潛淵中也城南曰江橋南渡流曰萬里橋西上曰夷里橋上曰笮橋橋從冲治橋西出折曰長昇橋郫江上西有永平橋長老傳言李氷造七橋上應七星故世祖謂吴漢曰安軍置在七星間城北十里有昇僊橋有送客觀司馬相如初入長安題市門曰不乘赤車駟馬不過汝下也其郫西上有永平橋於是江衆多作橋故蜀立里多以橋為名其大江自湔堰下至犍為有五津始曰白華津二曰里津三曰江首津四曰涉頭津劉璋時召東州民居此改曰東州頭五曰江南津入犍為有漢安橋玉津東沮津津亦七始文翁立文學精舍講堂作石室一作玉室在城南永初後堂遇火太守陳留髙䀢更修立又增造二石室州奪郡文學為州學郡更於夷里橋南岸道東邊起文學有女墻其道西城故錦官也錦江織錦濯其中則鮮明他江則不好故命曰錦里也西又有車官城其城東西南北皆有軍營壘城其郡四出大道道實二十里有衢今言十八里者昔蜀王女未嫁年二十亡王哀悼不忍言二十故言十八也王女墓在城北今王女陌是也其太守著德垂績者前漢莫聞建武以來有苐五倫廉范叔度特垂慈愛百姓歌之曰廉叔度來何暮來時我单衣去時重五袴其後漢中趙瑤自扶風太守來之郡司空張謂曰苐五伯魚從蜀郡為司空今掃吾苐以待足下瑤換廣漢陳留高䀢亦播文教太尉趙公初為九卿適子甯還蜀䀢命為文學撰鄉俗記亦能屈士如此廣漢王啇犍為楊洪皆見詠懐及晉建西夷府太守多遷為西夷校尉亦遷益州刺史成都縣郡治有十二鄉五部尉漢户七萬晉三萬七千名難治時廣漢馮顥為令而太守京兆劉宣不奉法免顥奏之立文學學徒八百人實戸口萬八千開稻田百頃治有尤異後有廣漢劉厖為令大姓恣縱諸趙倚公故多犯法濮陽太守趙子真父子强横厖治其罪莫不震肅郫民陽伯侯奢侈大起冡營因厖為郫令伯侯遂徙占成都厖復為成都豪右敬服有蜀侯祠四姓有栁杜張趙郭楊氏富先有程鄭郄公後有郭子平奢豪楊伯侯兄弟郫縣郡西北六十里冠冕大姓何羅郭氏繁縣郡北九十里有泉水稻田三張為甲族江原縣郡西渡大江濱文井江去郡一百二十里有青城山稱江祠安漢上下朱邑出好麻黄潤細布有羗筒盛小亭有好稻田東方常氏為大姓文井上有守捉三十里土有天馬祠臨卭縣郡西南二百里本有卭民秦始皇上郡實之有布濮水從布濮來合火井江有火井夜時光映上昭民欲其火光以家火投之頃許如雷聲火焰出通耀數十里以竹筒盛其光藏之可拽行終日不滅也井有二水取井火煮之一斛水得五㪷鹽家火煮之得無幾也有古石山有石鑛大如蒜子火燒合之成流支鐡甚剛因置鐡官有鐡祖廟祠漢文帝時以鐵銅賜侍郎鄧通通假民卓王孫歲取千匹故王孫貨累巨萬億鄧通錢亦盡天下王孫女文君能鼓琴時有司馬長卿者臨卭令王吉與之遊王孫家文君因奔長卿漢世縣民陳立歴巴郡䍧柯天水太守有異政陳氏劉氏為大姓冠葢也廣都縣郡西三十里元朔二年置有鹽井漁田之饒大豪馮氏有魚池鹽井縣凡有小井十數所及漁田之饒江有魯漕梁山有鐵鑛江西有安稻田穿山崖過水二十里漢時縣民朱辰字元燕為巴郡太守甚著德恵辰卒官郡獽民北送及墓獽蜑鼓刀辟踊感動路人於是葬所草木頃許皆倣之曲折迄今蜀人莫不歎辰之德靈為之感應今朱氏為首族也成都市官本有長建武十八年省蜀郡太康初屬國改號曰成都内史王改封乃復舊廣漢郡高帝六年置屬縣八漢戸十七萬晉四萬去洛三千里南去成都百二十里西接汶山北接梓潼東接巴郡本治繩鄉安帝永和中隂平漢中羗反元初二年移涪後治雒城王莽改曰就都公孫述名曰子同益州以蜀郡廣漢犍為三蜀土地沃美人士俊乂為一州稱望然漢選蜀郡廣漢太守毎重德高俊故前有趙護苐五伯魚後有蔡陳表章禮物殊於諸郡其太守著功德者有劉感孫賓蔡陳寵伯魚自郡徑遷司徒寵亦至三公而祋諷尹睦鮮于定趙瑤皆公望也薛鴻軰卿佐也而許靖亦為上公及何祗常閤皆有稱以處州中益州恒治此郡初平中益州牧劉焉自綿竹移雒縣城築闕門云其地不王乃留孫脩據之建安十八年劉先主自涪攻圍且一年軍師龎統中流矢死先主痛惜言則涕泣廣漢太守南陽張存曰統雖可惜違大雅之體先主怒曰統殺身成仁非仁者乎即免存官十九年㧞雒城援襄陽馬良書詒諸葛亮曰承雒已下尊兄配業先國魄兆見矣時州或治成都時復治雒為蜀􅚡府雒縣郡治汎鄉有孝子姜詩田地宅姓族有鐔李郭翟氏綿竹縣劉焉初所治綿與雒各出稻稼畆收三十斛有至十五斛漢時任安定祖以儒學教號侔洙泗有多士秦杜為首族也什邡縣山出好茶楊氏為大姓美田有鹽井新都縣蜀以成都廣都新都為三都號名城有金堂山水通於巴漢時五倉名萬安倉有棗魚梁多名士有楊厚董扶又有四姓馬史汝鄭者也五城縣郡東南有水通于巴漢時置五倉發五縣民尉部主之後因以為縣出龍骨云龍升其山值天門閉不達墮死於此後没地故掘取得龍骨郪縣有山原田冨國鹽井濮出好棗宐君山出麋尾特好入貢大姓王李氏又有髙馬家世常部曲蜀時高勝馬泰皆叛伏誅廣漢縣有山原田蜀時彭義有儁才晉世改號令德故二姓為甲族也德陽縣有青石祠山原肥沃有澤漁之利士女貞孝望山樂水土地易為生事車騎將軍鄧芝雅有終焉之思後遂葬其山太守夏侯慕時古濮為功曺康古袁氏為四姓大族之甲者劉氏延熙中分廣漢四縣置東廣漢郡咸熙初省泰始末又分置新都郡太康省末年又置蜀王國蜀郡常騫為内史永嘉末省犍為郡孝武建元六年置時治鄨縣十二漢戸十萬鄨故犍為地是也鄨有犍山見保乾圖武帝初欲開南中令蜀通僰青衣道是元年僰道令通之費功無成百姓愁怨司馬相如諷諭之使者唐蒙將南入以道不通執令將斬之令歎曰忝官益土恨不見成都市蒙即令送成都市而殺之蒙乃斬石通閣道故世為諺曰思都郵斬令頭云後蒙為都尉治南夷道元光五年郡移治南廣四年益州刺史任安城武陽孝昭元年郡治僰道後遂徙武陽至晉屬縣五戸二萬去洛三千二百七十里東接江陽南接朱提北接蜀郡西接廣漢王喬升其北山彭祖家其彭䝉白虎仁於廣德寳鼎見於江溉綏和五年又上寳磬十六劉向以為美化所降用立辟雍而士多仁孝女性貞專王莽改曰西順郡人不㑹更始都南陽逺奉貢職及公孫述有蜀郡拒守述伐之郡功曺朱遵逆戰衆寡不敵遵絆馬死戰遂為述所幷而任君業閉户費貽素隱光武帝嘉之曰士大夫之郡也郡去成都百五十里渡大江昔人作大橋曰漢安橋廣一里半每秋夏水盛斷絶歲歲修理百姓苦之建安二十一年太守南陽李嚴乃鑿天柱山尋江通車道省橋梁三津吏民悅之嚴因更造起府寺觀壮麗為一州勝宇二十四年黄龍見武功陽赤水九日蜀以劉氏瑞應其太守漢興以來鮮有顯者武陽縣郡治有王喬彭祖祠蒲江大堰灌郡下六門有朱遵祠山出鐵及白玉特多大姓有七陽五李諸姓十二也南安縣郡東四百里治有青衣江㑹縣溉有名灘一曰雷垣二曰鹽塈李氷所平也有柑橘官社漢有鹽井南安武陽皆出名茶多陂池西有熊耳南有峨眉山山去縣八十里孔子地圖言有仙藥漢武帝遣使者祭之欲致其藥不能得有四姓能宣謝審五大族楊費又有信士吕孟貞紀至行也僰道縣在南安東四百里拒郡百里髙后六年城之治馬湖江會水通越嶲本有僰人故秦紀言僰童之冨漢民多漸斥徙之有茘支薑蒟濱江有兵欄李氷所燒之崖有五色赤白映水玄黄魚從楚來至此而止畏崖映水也有韓原素祠又有孝子隗通為母汲江裔水為出平石生江中今石在焉湖江而孝子吴順飬母赤烏巢其門崩容江出好磨石崩江多魚害民失在於徵巫好鬼妖大姓吴隗又有楚石薛相者牛鞞縣受新都江去郡三百里元鼎二年置相陽明鹽井程韓為冠葢之族資中縣受牛鞞江也江陽郡先有王延世著勲河平後有董鈞為漢定禮王董張趙為四族二縣在中多山田少稻種之地本犍為枝江都尉建安十八年置郡漢安程徴石謙白州牧劉璋求立郡璋聴之以都尉廣漢成存為太守屬縣四户五千去洛四千八十里東接巴郡南接䍧柯西接廣漢犍為北接廣漢有茘支巴菽桃枝蒟給橙俗好文刻少儒學多樸野葢天性也江陽縣郡治江雒會有方山蘭祠江中有大闕小闕季春黄龍堆没闕即平昔云世祖微時過江陽有一子望氣者曰江陽有貴兒氣王莽求之縣人殺之後世祖為子立祠謫江陽民不使冠帶者數世有冨義鹽井又郡下百二十里者曰伯塗魚梁六伯氏女為塗氏婦造此梁四姓王孫程鄭八族又有魏趙先周也有荔支已菽桃枝蒟給橙字與上文巴志序所稱果蔓名大同小異漢安縣郡東五百里土地雖迫山水特美好宐蠶桑有鹽井魚池以百數家家有焉一郡豐沃四姓程石姚郭八族張季李趙輩而程石傑立郡常秉議論選之苻縣郡東二百里元鼎二年置治安樂水會東接巴蜀樂城南水通平羗鄨縣永建元年十二月縣長趙祉遣吏先尼和拜檄巴蜀守過成瑞灘死子賢求喪不得女絡年二十五迺分金珠作二錦囊繫兒頭下至二年二月十五日女絡廼乘小船至父沒所哀哭自沉見夢告賢曰至二十一日與父屍俱出至日父子浮出縣言郡太守蕭登髙之上尚書遣戸曺掾為之立碑人為語曰符有先絡僰道張帛求其夫天下無有其偶者矣新樂縣郡西二百八十里元康五年置西楚僰道有鹽井大姓魏吕氏西楚僰道四字疑誤汶山郡本蜀郡北部冉駹都尉孝武元封四年置舊屬縣八户二十五萬去洛三千四百六十三里東接蜀郡南接漢嘉西接梁州酒泉北接隂平有六夷羗胡羗虜白蘭峒九種之戎牛馬旄氈班罽青頓毞毲芉羖之屬特多雜藥名香土地剛鹵不宐五穀惟種麥而多氷寒盛夏凝凍不釋故夷人冬則避寒入蜀庸賃自食夏則避暑反落歲以為常故人謂之作五百石子也宣帝地節元年武都白馬羗反使者駱武平之因拜越嶲太守迎者如雲後蜀郡趙温亦著治績故王莽遣任貴為鎮戍大尹守之自建武後數叛章武三年越嶲叟大帥高定元稱王恣㫿遣都督李承之殺將軍梓潼焦璜破没郡土丞相亮遣越嶲太守龔禄住安上縣遙領太守安上去郡八百里有名而已建興三年蜀安南將軍馬忠率越嶲郡夷郡夷剛狠皆鴟視忠率越嶲太守張嶷將所領之郡誘殺蘇祈邑君冬逄及其弟隗渠等懐集種落威信允著諸種漸服又斬斯都耆帥李承之首乃手殺焦璜龔禄者也又討叛鄙降夷人安種落蠻夷率服嶷始以郡郛宇頽更築小隖居之舊本記此段訛舛不可重叙姑考事之本末略加整頓刻之延熙二年乃還舊郡更城郡城夷人男女莫不致力興復七縣嶷遷復後頗奸軌雖有四部斯兒及七營軍不足固守乃置赤甲北軍二牙門及斯兒督軍中堅衛夷徼卭都縣郡治因卭邑名也卭之初有七部後為七部營軍又有四部斯兒南山出銅有温泉穴冬夏熱其温可湯雞豚下流治疾病餘多悪水水神護之不可汚穢及沉亂髮照面則使人被悪疾一郡通云然臺登縣有孫水一曰白沙江入馬湖水山有砮石火燒成鐵剛利禹貢厥賦砮是也又有漆漢末夷皆有之嶷取焉張嶷闡縣故卭人邑卭都接寒關今省漢示縣漢末夷王及弟隗渠數偝叛以服諸種張嶷先殺王弟隗渠又叛遁入西徼遣親信二人使嶷嶷知姧計以重賂使使殺渠渠死夷徼肅清縣晉省㑹無縣路通寧州渡瀘得住狼縣故濮人邑也今有濮人冢冢不開戸其穴多有碧珠人不可取取之不祥有天馬河馬日千里後死於蜀葬江原小亭今天馬冡是也縣有天馬祠初民家馬牧山下或產駿駒云天馬子也今其天馬逕厥迹存焉河中有銅胎今以羊祀之可取河中見存土地時產犀牛山色青碧大笮縣漢末省也定筰縣筰笮夷也汶山曰夷南中曰昆明漢嘉越嶲曰筰蜀曰卭皆夷種也縣在郡西渡瀘水賓剛徼白摩沙夷有鹽池積薪以齊水灌而後㷊之成鹽漢末夷皆錮之張嶷徃爭夷帥岑槃木明不肯服嶷禽撻殺之厚賞賜餘類皆安官迄有之北沙河是三縫縣一曰小㑹無音三播字疑誤音三播通道寧州渡瀘得蜻蛉縣有長谷石時坪中有石豬子母數千頭長老傳言夷昔牧豬於此一朝豬化為石迄今夷不敢牧於此卑水縣去郡三百里水流通馬湖潛街縣漢末置晉初省安上縣馬湖縣水通僰道入江晉初省右益州漢初統郡五後漸分建蜀郡及巴郡又分為五郡含工十五郡廣漢漢中犍為為四郡又開益州五郡合二十五郡及寧州梁州建復增七郡蜀於是有州四十二郡一百九十六縣州分後益州凡新舊郡九縣四十八户夷晉二十四萬譔曰蜀之為邦天文井絡輝其上地理岷嶓鎮其域五岳華山表其陽四瀆則汶江出其徼故上聖則大禹生其鄉媾姻則黄帝㛰其女顕族大賢彭祖育其山列仙王喬升其岡而寳鼎輝光於中流離龍仁虎躍乎淵陵開闢及漢國富民殷府腐榖帛家藴畜積雅頌之聲充塞天衢中穆之詠侔乎二南蕃衍三州土廣万里方之九區於斯為盛固乾坤之靈囿先王之所經緯也華陽國志卷苐三
