front:
  text: 華陽國志之作所以有補於史家者流也予嘗攷其書部分區别各有條理其指歸有三焉首述巴蜀漢中南中之風土次列公孫述劉二牧蜀二主之興廢及晉太康之混一以迄於特雄壽勢之僣竊繼之以兩漢以來先後賢人梁益寧三州士女總讃序志終焉就其三者之間於一方人物尤致深意雖侏離之氓賤俚之婦茍有可取在所不棄此尤足以𢎞宣風教使善惡知所懲勸豈但屑屑於山川物産以資廣見異聞而已乎本朝元豐間吕汲公守成都嘗刋是書以廣其傳而載禩荒忽刓缺愈多觀者莫曉所謂予毎患此久矣假守臨卭官居有暇蓋嘗博訪善本以證其誤而莫之或得因摭兩漢史陳壽蜀書益部耆舊傳互相參訂以決所疑凡一事而先後失序本末舛逆者則考而正之一意而詞㫖重複句讀錯雜者則刋而去之設或字誤而文理明白者則因而全之其它旁搜逺取求通于義者又非一端凡此皆有明驗可信不誣者若其無所考據則亦不敢臆決姑闕之以竢能者然較以舊本之訛謬大畧十得五六矣鋟木既具輒叙所以冠於篇首好古博雅與我同志者願無以夏五郭公之義而律之嘉泰甲子季夏朔眉丹稜李􅘊叔厪甫謹序欽定四庫全書
