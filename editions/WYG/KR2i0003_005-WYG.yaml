body:
  text: 華陽國志卷五晉常璩撰公孫述劉二牧志先王命史立典逺則經紀人倫三材炳焕品物章矣然而有志之士猶敢議論於鄉校之下芻蕘之人加之謠誦於林野之中管闚瞽言君子有採所以綜核羣善休風惟照也公孫述劉牧二主之廢興存亡漢書國志固以詳矣統之州部物有條貫必申斯篇者格之前憲左氏素臣之功王侯之載籍也而八國之語作焉五傳淵邃大義洋洋聖人之微言也而八覽之書興焉茍在宜稱雖道同世出一事身見遊精博志無嫌其繁矣漢十二世孝平皇帝帝祚短促國統三絶孝元后兄子安漢公新都侯魏郡王莽簒盜稱天子改天下郡守為卒正又改蜀郡為導江遷故中散大夫茂陵公孫述字子陽為導江卒正治臨卭而劉辟起兵廣漢更始劉聖公在南陽蜀欲應之㑹宗成垣副王岑等作亂述率吏民拒禦之所在討破作圍守防遏逸越斬首萬計遂據成都威有巴漢政治嚴刻民不為非更始誅王莽都關中為赤眉賊所敗建武元年世祖光武皇帝即位河北述夢人謂已曰公子系後漢作八厶子系十二為期述以語婦婦曰朝聞道夕死尚可何況十二乎㑹夏四月龍出府殿前以為瑞應述遂稱皇帝號大成建元龍興以莽尚黄乃服色尚白自以興西方為金行也以功曹李熊為大司徒巴部任滿為大司空弟恢為太尉具置百官造十層赤樓帛蘭改益州為司𨽻蜀郡為成都尹時世祖方平河北而荆邯延牙並歸述盡有益州置鐵錢官廢銅錢百姓貨賣不行蜀中童謡曰黄牛白腹五銖當復謂莽黄牛述為白腹五銖漢錢言漢當復也故主簿李隆後漢作張隆常少數諫述歸帝稱藩述不納天水隗囂亦據隴連述蜀土清晏述乃移檄中國稱引圖緯以惑衆世祖報曰西狩獲麟讖曰乙子夘金即乙未歲授劉氏非西方之守也光廢昌帝立子公孫即霍光廢昌邑王立孝宣帝也黄帝姓公孫自以土德君所知也漢家九百二十歲以䝉孫亡受以承相其名當塗髙髙豈君身耶吾自繼祖而興不稱受命求漢之斷莫過王莽近張滿作惡兵圍得之歎曰為天文所誤恐君復誤也又使述舊交馬援喻述述不從荆邯說述曰昔湯以七十里王天下文王方百里臣諸侯以次漢祖敗而復征傷瘳復戰故能禽秦亡楚以弱為强况今地方數千杖㦸百萬天下之心未有所歸不東出荆門北陵關隴與之進退則王業不全子孫不久安也述悅之乃出軍荆門陳倉欲震盪秦楚多改易郡縣分封子弟淫恣過度然國富民殷户百餘萬世祖未遑加兵與述及隗囂書輒署公孫皇帝七年囂背漢降述述封為王厚資給之十年世祖命大司馬呉漢與大司徒鄧禹討囂平隴右述聞而惡之城東素有秦時空倉述更名白帝倉使人宣言白帝倉暴出米巨萬公卿以下及國人就視之無米述曰倉去此數里虚妄如此隗王在數千里外言破壊真不然矣十一年世祖命征南大將軍岑彭自荆門泝江征述又遣中郎將來歙及述舊交馬援奉詔喻述隆少諌令服從述怒曰自古來有降天子乎尚書解文卿大夫鄭文伯初亦諫述繫之暴室六年二子幽死自是莫有言者彭破述荆門關及沔關徑至彭亡述使刺客刺殺彭由是改彭亡曰平無言無賊也又使刺客刺殺歙於武都世祖重遣呉漢與劉尚征述又遣臧宫從斜谷道入述使妹婿延牙距宫大司徒謝豐距漢連戰輒北漢到城下軍其江橋及其少城豐在廣都牙引還成都述謂曰事當奈何牙對曰男兒貴死中求生敗中求成無愛財物也述乃大發金帛開門募兵得五千餘人以配牙牙告漢戰因偽遣鼓角麾幟渡市橋漢兵爭觀牙因放竒兵擊漢大破之漢溺水縁馬尾至盎底得出後宫兵已至北門述復城守占書曰虜死城下述以為漢等是虜乃自出戰述當漢牙當宫大戰牙殺宫兵數百三合三勝士卒氣驕漢益鼓之自旦至日中饑不得食倦不得息日迭後述兵敗漢騎士髙平以㦸刺述中頭即墜馬叩心者數十人都知是述前取其首牙等悵然還城吏民窮急即夜開門出降漢盡誅公孫氏及牙等諸將帥二十餘人放兵大掠多所殘害是歲十二年也漢搜求隱逸旌表忠義以述臣常少李隆忠諫發憤病死表更遷葬贈以漢卿官蜀郡王皓王嘉廣漢李業刎首死節表其門閭犍為朱遵絆馬死戰贈以將軍為之立祠費貽任永君業馮信等閉門素隱公車特徵文齊守義益州封為列侯董鈞習禮明經貢為博士程烏李育本有才幹擢而用之於是西土宅心莫不鳬藻建武十八年刺史郡守撫恤失和蜀郡史歆怨呉漢之殘掠蜀也擁郡自保世祖以天下始平民未忘兵而歆唱之事宜必克復遣漢平蜀多行誅戮世祖誚讓於漢漢深陳謝自是守藩供職自建武至乎中平垂二百載府盈西南之貨朝多華岷之士矣漢二十二世孝靈皇帝政治衰缺王室多故太常竟陵劉焉字君郎建議言刺史太守貨賂為官割剥百姓以致離叛可選清名重臣以為牧伯鎮安方夏焉内求州牧以避世難侍中廣漢董扶私於焉曰京都將亂益州分野有天子氣焉惑之意在益州㑹刺史河南郄儉賦斂繁擾流言逺聞而并州殺刺史張益涼州殺刺史耿鄙焉議得行漢帝將徵儉加刑以焉為監軍使尋領益州牧董扶亦求為蜀西部都尉太倉令巴郡趙韙去官從焉來西中平元年涼州黄巾逆賊馬相趙祗等聚衆綿竹殺縣令李升募疲役之民一二日中得數千人遣王饒趙播等進攻雒城殺刺史儉并下蜀郡犍為旬月之間破壊三郡相自稱天子衆以萬數又别破巴郡殺太守趙韙部州從事賈龍素領家兵在犍為之青衣率吏民攻相破滅之州界清淨龍乃選吏卒迎焉焉既到州移治綿竹撫納離叛務行小惠時南陽三輔民數萬家避地入蜀焉恣饒之引為黨與號東州士遣張魯斷北道枉誅大姓巴郡太守王咸李權等十餘人以立威刑前後左右部司馬擬四軍統兵位皆二千石漢獻帝初平二年犍為太守任岐與賈龍惡焉之隂圖異計也舉兵攻焉燒成都邑下焉禦之東州人多為致力遂克岐龍焉意盛乃造乘輿車服千餘僣擬至尊焉長子範為左中郎將仲子誕治書御史季子璋奉車都尉皆從獻帝都長安惟叔子别部司馬瑁隨焉焉聞相者相陳留呉懿妹當大貴為瑁聘之荆州牧山陽劉表上焉有子夏在西河疑聖人論帝遣璋曉喻焉焉留璋不遣反四年征西將軍馬騰自郿與焉範通謀襲長安治中從事廣漢王商亟諫不從謀泄範誕受誅議郎河南龎羲以通家將範誕諸子入蜀而天火燒焉車乗蕩盡延及民家興平元年焉徙治成都既痛二子又感祅灾疽發背卒州帳下司馬趙韙治中從事王商等貪璋温仁共表代又京師大亂不能更遣天子除璋監軍使者領益州牧以韙為征東中郎將率衆征劉表璋字季玉既襲位懦弱少斷張魯稍驕於漢中巴夷杜濩朴胡袁約等叛詣魯璋怒殺魯母弟遣和德中郎將龎羲討魯不克巴人日叛乃以羲為巴郡太守屯閬中禦魯羲以宜須兵衛輒召漢昌賨民為兵或構羲於璋璋與之情好攜隙趙韙數進諫不從亦恚恨也建安五年趙韙起兵數萬將以攻璋璋逆擊之明年韙敗羲懼遣吏程郁宣㫖於郁父漢昌令畿索益賨兵畿曰郡合部曲本不為亂縱有讒謏要在盡誠遂懐異志非所聞也羲令郁重徃畿曰我受牧恩當為盡節汝自郡吏宜念効力不義之事莫有二意羲恨之使人告曰不從太守家將及禍畿曰昔樂羊食子非無父子之恩大義然也今雖羹子畿飲之矣羲乃厚謝於璋璋善畿遷為江陽太守十年璋聞曹公將征荆州遣中郎將河内隂􅄎致敬公表加璋振威將軍兄瑁平冦將軍十二年璋復遣别駕從事蜀郡張肅送傁兵三百人并雜御物公辟肅為掾拜廣漢太守十三年仍遣肅弟松為别駕詣公公時已定荆州追劉主不存禮松加表望不足但拜越巂比蘇令松以是怨公㑹公軍不利兼以疫病而劉主尋取荆州松還疵毁曹公勸璋自絶因說璋曰劉豫州使君之肺腑更可與通時扶風法正字孝直留客在蜀不見禮恨望松亦以身抱利器忖璋不足與有為常與正竊歎息松舉正可使交好劉主璋從之使正將命正佯為不得已行又遣正同郡孟達將兵助劉主守禦前後賂遺無限十六年璋聞曹公將遣司𨽻校尉鍾繇伐張魯有懼心松進曰曹公兵强無敵天下若因張魯之資以向蜀土誰能禦之者乎璋曰吾固憂之而未有計松對曰劉豫州使君之宗室而曹公之深讐也善用兵使之伐魯魯必破破魯則益州强曹公雖來無為也且州中諸將龎羲李異等皆恃功驕豪欲有外意不得豫州則敵攻其外民叛於内必敗之道也璋然之復遣法正迎劉先主主簿巴西黄權諫曰左將軍有驍名今請到欲以部曲遇之則不滿其心欲以賓客待之則一國不容二君客有太山之安則主有累􅆑之危璋不聽從事廣漢王累倒懸於州門以死諫璋璋壹無所納正既宣㫖隂獻䇿曰以明將軍之英才乗劉牧之懦弱張松之股肱以響應於内然後資益州之富慿天府之險以此成帝業猶反手也劉主大悅乃留軍師中郎將諸葛亮將軍關侯張飛鎮荆州率萬人泝江西上璋初勅所在供奉入境如歸劉主至巴郡巴郡嚴顔撫心歎曰此所謂獨坐窮山放虎自衛者也劉主由巴水達涪城璋徃見之松復令正白劉主曰今因此㑹便可執璋則將軍無用兵之勞坐定一州也軍師中郎將襄陽龎綂亦言之劉主曰此大事也初入他國恩信未著不可倉卒歡飲百餘日璋推劉主行大司馬司𨽻校尉劉主推璋行鎮西大將軍領牧如故益劉主兵使伐張魯又令督白水軍併三萬軍車甲精實而别璋還州劉主次葭萌厚樹恩德以收衆心十七年曹公征呉呉主孫權呼劉主自救劉主貽璋書曰孫氏與孤本為脣齒今樂進在清泥與關侯相拒不徃赴救進必大克轉侵州界其憂有甚於魯魯自守之賊不足慮也求益萬兵及資寳璋但許四千他物半給張松書與劉主及法正曰今大事垂可立如何釋此去乎松兄廣漢太守肅懼禍及已白璋露松謀璋殺松劉主歎曰君矯殺吾内主乎嫌隟始構璋勅諸關守不内劉主龎綂說曰隂選精兵晝夜兼行徑襲成都璋既不武又無素豫一舉而定此上計也楊懐髙沛璋之名將各仗强兵據守關頭數有牋諫璋遣將軍還將軍遣與相聞說當東歸並使速裝二子既服將軍名又嘉將軍去必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也退還白帝連引荆州徐還圖之此下計也劉主然其中計即斬懐等遣將黄忠卓膺魏延等勒兵前行梓潼令南陽王連固城堅守劉主義之不逼攻也進據涪城置酒作樂謂龎綂曰今日之㑹可謂樂矣綂對曰伐人之國而以為歡非仁者也劉主曰武王伐紂前歌後儛豈非仁也綂退出劉主請尋還謂曰向者之談阿誰為失綂曰君臣俱失十八年璋遣將劉璝冷苞張任鄧賢呉懿等拒劉主於涪皆破敗還保綿竹縣令懿詣軍降拜討逆將軍初劉主之南伐也廣漢鄭度說璋曰左將軍懸軍襲我衆不滿萬百姓未附野穀是資計莫若驅巴西梓潼民内涪水以南其倉廩野穀一皆燒除高壘深溝靜以待之彼請戰不許久無所資不過百日必禽矣先主聞而惡之法正曰璋終不能用無所憂也璋果謂羣下曰吾聞拒敵以安民未聞動民以避敵絀度不用故劉主所至有資進攻綿竹璋復遣䕶軍南陽李嚴江夏費觀等督綿竹軍嚴觀率衆降同拜禆將軍進圍璋子循於雒城十九年關侯綂荆州事諸葛亮張飛趙雲等泝江降下巴東入巴郡巴郡太守巴西趙莋拒守飛攻破之獲將軍嚴顔謂曰大軍至何以不降敢逆戰顔對曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒曰牽去斫頭顔正色曰斫頭便斫何為怒也飛義之引為賓客趙雲自江州分定江陽犍為飛攻巴西亮定德陽巴西功曹龔諆迎飛璋帳下司馬蜀郡張裔距亮敗於栢下裔退還夏劉主克雒城與飛等合圍成都而偏將軍扶風馬超率衆自漢中請降劉主遣建寧督李恢迎超超徑至璋震恐所署蜀郡太守汝南許靖踰城出降璋知不敢誅被圍數十日城中有精兵三萬穀支二年衆咸欲力戰璋曰父子在州二十餘年無恩德以加百姓攻戰三年肌膏草野以璋故也何以能安遂遣張裔奉使詣劉主主許裔禮其君而安其民劉主又遣從事中郎涿郡簡雍說璋璋素雅敬雍遂與同輿而出降吏民莫不歔欷泣涕劉主復其所佩振威將軍印綬還其財物遷璋于南郡之公安呉主孫權之取荆州也以璋為益州刺史劉主東征璋還呉卒也譔曰公孫述藉導江之資值王莽之虐民莫援者得跨巴蜀而欺天罔物自取滅亡者也然祅夢告終期數有極奉身歸順猶可以免矜愚遂非何其頑哉劉焉器非英傑圖射僥倖璋才非人雄據土亂世其見奪取陳子以為非不幸也昔齊侯嗤晉魯之使旋䝉易乗之困魏君賤公叔之侍人亦受割地之辱量才懐逺誠君子之先畧也觀劉璋曹公之侮慢法正張松二憾既徵同怨相濟或家國覆亡或三分天下古人一饋十起輟沐揮洗良有以也華陽國志卷五
