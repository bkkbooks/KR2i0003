  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_WYG_012-1a, image: WYG0463/WYG0463-0285a.png}
body:
  text: 華陽國志巻十二晉常璩撰序志巴蜀厥初開國載在書籍或因文緯或見史記乆逺隠没實多疎略及周之世侯伯擅威雖與牧野之師希同盟要之㑹而秦資其富用兼天下漢祖階之奄有四海梁益及晉分益為寜司馬相如嚴君平揚子雲陽成子𤣥鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀畧舉其隅其次聖稱賢仁人志士言為世範行為表則者名挂史録而陳君承祚别為耆舊傳始漢及魏煥乎可觀然三州土地不復悉載地理志頗言山水歴代轉乆郡縣分建地名改易於以居然辨物知方猶未詳偹於時漢晉方隆官司星列提封圖簿歲集司空故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭阨運函夏滔堙李氏㨿蜀兵連戰結三州傾墜生民殱盡府庭化為狐狸之窟城郭蔚為熊羆之宿宅遊雉鹿田棲虎豹平原鮮麥黍之苖千里蔑鷄狗之響丘城蕪邑莫有名者嗟乎三州近為荒裔桑梓之域曠為長野反側惟之心若焚灼懼益遐棄城陴靡聞迺考諸舊紀先宿所傳并南裔志騐以漢書取其近是及自所聞以著斯篇又畧言公孫述蜀書咸熈以来喪亂之事約取耆舊士女英彦又肇自開闢終乎永和三年凡十篇號曰華陽國記夫書契有五善逹道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪􅀶咨流離困瘵方資腐帛於顛墻之下求餘光於灰塵之中劘滅者多故有所闕猶愈於遺忘焉蜀紀言三皇乘祇車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南鄭此谷道之通乆矣而説者以為蜀王因石牛始通不然也本紀旣以炳明而世俗間横有為蜀傳者言蜀王蠶叢之間周迴三千歲又云荆人鼈靈死屍化西上後為蜀帝周萇𢎞之血變成碧珠杜宇之魄化為子䳌又言蜀椎髻左衽未知書文翁始知書學案蜀紀帝居房心决事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流於西故周失紀綱而蜀先王七國皆王蜀又稱帝此則蠶叢自王杜宇自帝皆周之叔世安得三千歲且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則為恠異子所不言况能為帝王乎碧珠出不一處地之相距動數千里一人之血豈能致此子䳌鳥今云是嶲或曰嶲周今案説文云蜀王望帝婬其相妻慙亡去為子嶲鳥故蜀人聞子嶲鳴皆起云望帝嶲户圭切所言與蜀志所述相似爾雅亦云嶲周子嶲鳥也出蜀中四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由来逺矣孔子曰述而不作信而好古竊比於我老彭則彭祖本生蜀為殷太史夫人為國史作為聖則傳自上世見稱在昔及周之末服事於秦首為郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄉方大人之國也至於漢興反當荒服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學哉漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕骨聊著翰墨當時以為極歡後人有以為惑恐此之𩔖必起於元靈之由也惟智者辨其不然幸也綜其理数或以為西土嶮固衿帶易守世亂先違道治後服若吴楚然故逋逃必萃奸雄闚覦盖帝王者統天理物必居土中徳膺命運非可資能恃險以干常亂紀雖饕竊名號終於絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而取也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之所産古無興國夫恃險憑危不階厯数而能傳國垂世所未有也故公孫劉氏以敗於前而諸李踵之覆亡於後天人之際存亡之術可以為永鍳也干運犯厯破家喪國可以為京觀也今齊之國志貫之一揆同見不臣所以防狂狡杜奸萌以崇春秋敗絶之道也而顯賢能著治亂亦以為奬勸也其序曰先王經畧萬國剖分厥甸巴梁式象縣辰九俊述職賦政以均佐周斃紂相漢亡秦寔繁其民世載其俊述巴志第一維天有漢鑒亦有光實司羣望表我華陽炎劉是應洪祚攸長述漢中志第二井絡啓耀文昌契符茫茫禹績畫為九州功冐普天率土以休光靈遐照慶祚爽流邦家濟濟世徳球球述蜀志第三蠢爾南域在彼要荒漢武徳振蠻貊是攘開州列郡幽裔来王柔逺能邇實須才良甄徳表失以明紀綱述南中志第四赤徳中微巨猾干篡白虜乘興致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌䝉此艱難述公孫劉二牧志第五政去王室權流二桀𤓰分天壌宰割民物舍彼信順任此智計大道既隠詭詐競設並以豪特力爭當世居正慮明名號絶替身兼萬乗籍同列國述劉先主志第六乾坤渾始樹君立王天工人代萬邦是望明不二日地不二皇茍非其器窮髙必亢􅄥濛後主弗慮弗臧負乘致冦世業以喪述劉後主志第七陽升三九品物始亨帝紘失振任非其良趙倡禍階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀元黎顧瞻靡望述大同志第八素精南飄天維弛綱薨薨特流肆其豺狼蕩雄纂承殱我益梁牧守顛摧黔首辛嘗三州毁曠攸然以荒絡結王罔民亦流亡述李特雄期夀勢志第九華嶽降精江漢吐靈濟濟多士命世克生徳為世雋幹為時貞畧舉士女表諸賢明世濟其美不隕其名述先賢士女總讚論第十皇皇大晉下土是覆化澹教洽誕茲彥茂峩峩俊乂亹亹英秀如嶽之崇如蘭之臭經徳秉哲綽然有裕述後賢志第十一博考行故揔厥舊聞班序州部區别山川憲章成敗旌照仁賢抑絀虚妄糾正繆言顯善懲惡以杜未然述序志第十二譔曰駟牡騤騤萬馬龍飛陶然斯猶阜㑹京畿麏獲西狩鹿從東麋郇伯勞之旬不接辰嘗茲珍嘉甘心庶幾中為令徳一行可師璝瑋俶儻貴韜光暉據冲體正平揖宣尼導以禮樂教洽化齊木訥剛毅有威有懐鏘鏘宫縣磬筦諧諧金奏石拊降福孔皆揔括道檢揔覽幽微選賢與能仁逺乎哉益梁寕三州先漢以来士女目録晉常璩撰髙尚逸民嚴遵字君平成都人也髙尚逸民林閭字公孺臨卭人揚雄師之見方言徳行治中從事李𢎞字仲元成都人也徳行給事黄門侍郎揚雄字子雲成都人也文學神童楊烏雄子也七歳預父𤣥文九歳卒文學侍中揚州刺史張寛字叔文成都人始受文翁遣東受七經還以教授者文學中郎将司馬相如字長卿成都人也文學諫議大夫王褒字子淵資中人也尚書郎楊壮成都人也見揚子方言美秀中郎将何覇字翁君郫人也執政大中司空汎鄉侯何武字君公霸弟以忠正為三公王莽簒位憚而殺之潁川太守何顯武弟也兄弟五人皆在漢書武子况嗣武侯王莽時廢黄門侍郎鄧通蜀人孝文帝時為侍郎甚有寵卓王孫臨卭人也見食貨志姑仍舊列於執政目下政事左衛䕶軍陳立字少遷臨卭人歴牂柯巴郡天水三郡太守治為天下最節士太中大夫章明字公孺繁人也節士尚書郎侯岡字宣孟新繁人也節士尚書郎王嘉字公卿江原人也節士美陽令王皓字子離江原人也右十九人在前漢其侍郎田儀楊徳意無善事在中也知士博士羅衍字伯紀成都人也徳政益州太守王阜字世公成都人也長沙太守任循字伯度成都人少失父後為長沙父流離逺届長沙為郡五官父之母識知是事在精通也公亮大司農司𨽻校尉任昉字文始循子也徐州刺史任愷字文悌昉弟也文學侍中五更張霸字伯饒諡曰文父成都人也校書郎楊終字子山成都人也聘士張楷字公超文父子也聘士張光超公超弟也尚書張陵字處沖公超子自陵之後世有大官義士趙定成都人以延仁赴義濟窮恤乏為業保貴太尉司徒司空特進厨亭文侯趙戒字志伯定子文學國師太常趙典字仲經戒第二子也忠亮太尉司徒郫惠侯趙謙字彦信戒孫也其子孫襲厨亭侯不顯道徳司徒司空趙温字子柔謙弟自是後世有二千石義烈侍中長水校尉常洽字茂尼江原人見趙温傳道徳侍御史常詡字孟元江原人在趙太尉公耆舊𫝊述作謁者僕射何英字叔俊郫人也作漢德春秋經治犍為屬國何汶字景由英孫也髙士楊由字哀侯成都人也見後漢方術𫝊篤愛髙士侯祈字升伯繁人文父楊序弟子篤愛博士楊珏字仲桓成都人何萇弟子公府辟士羅衡字仲伯郫人亦萇弟子也至孝孝廉禽堅字孟由成都人推賢美陽令栁宗字伯騫成都人也求次方王仲曽張叔遼殷知孫並蜀人伯騫所㧞皆致郡守失其官名匡正治中從事張充字伯春江原人匡正司空辟士李幾字孟元江原人也猛畧部從事楊竦字子㳟成都人也子統為二千石失其官守憲陳湛字小伯成都人節士仲圼成都人也髙士王廣晧子也父為公孫述所聘自刎廣逃匿述破後郡及州命察舉皆不徃曰吾不能復辯敢當世榮利也仁義志士任末字叔本繁人也烈士嚴道主簿李磬字文寺嚴道人也義烈郡功曹史朱普字伯禽廣都人也巴郡太守朱辰字元燕廣都人述作漢中太守鄭厪字伯邑臨卭人也作耆舊傳右四十人馳名後漢尚書郎張俊失其行事不載學士張寜見朱倉傳朱倉字雲卿見下目什邡人傳未詳大鴻臚何宗字彦英郫人也䨇柏長何䨇字漢偶宗子郡䨇柏乃建寧屬縣也穎逸廣漢犍為太守何祇字君肅郫人忠懃輔漢将軍張裔字君嗣成都人𤣥寂太常杜瓊字伯瑜成都人也侍中常竺字代文在耆舊傳安南将軍張表字伯逺成都人也伯父肅廣漢太守兄松字子喬州牧劉璋别駕從事永昌太守王伉成都人見蜀書右八人在劉氏世五更張霸夫人司馬敬司成都人也公乗㑹婦張氏廣都人也犍為楊鳳珪妻陳助臨卭人也廣漢便敬賔婦常元常江原人廣都令常良女也殷氏婦常靡常江原人常仲山女也趙侯夫人常紀常江原人常常侍女景竒妻羅貢郫人羅倩女也趙憲妻何玹郫人也朱叔賢妻張昭儀繁人也廣柔長姚超二女姚妣饒郫人也廣漢王遵妻張叔紀霸女孫也右十一人列女右蜀郡士女七十八人六十七人士十一人女明略渡沔俟范目閬中人文學聘士洛下宏字長公閬中人也𤣥始侍御史任文孫閬中人也文學司空掾任文公文孫弟也先生胥君安見春秋傳首京兆尹徐誦字子産閬中人也忠正侍中譙隆字伯司閬中人也髙清太中大夫譙𤣥字君黄閬中人也潔白尚書郎譙瑛𤣥子也以易授孝明帝公車令趙珜字孫明閬中人也公府掾趙毅字仲都珜子也公車令臧太伯宕渠人也見珜傳雋才凉州刺史趙宏字温柔閬中人也右十三人前漢政事揚州刺史嚴遵字王思閬中人也徐州牧嚴羽字子翼王思子也長安令王偉卿王思友見王思傳政事大司農𤣥賀字文和宕渠人也将畧大鴻臚龎雄字宣孟宕渠人也政事幽州刺史馮煥宕渠人也明略使持節車騎将軍馮緄字鴻卿煥子宕渠人也降虜都尉馮元字公信緄弟尚書郎馮遵字文衡元子政事司𨽻校尉陳禪字紀山安漢人漢中太守陳澄禪子别駕從事陳實字盛先澄孫也與王文表為友思防治中從事楊仁字文義閬中人也志士荆州刺史龔調字叔侯安漢人也忠貞魏郡太守趙晏字平仲安漢人也籌畫益州太守李顒字徳卬墊江人也見漢書及巴耆舊傳汝南太守謁煥字闕江州人也見汝南紀度遼将軍桂陽太守然温字闕江州人見巴耆舊𫝊美化越嶲太守張翕字叔陽安漢人也越嶲太守張璊翕子也太守王堂察舉孝亷至孝上蔡令趙邵字泰伯閬中人也孝子嚴永名儒陳髦隠士黄錯右三人巴郡太守王堂所進失其官位見堂𫝊巴郡太守龔楊字闕墊江人茂才孟彪江州人右並王文表所薦日南太守黎景字闕墊江人茂才王澹閬中人見文表傳文學掾龔策墊江人桂陽太守李温宕渠人戸曹掾趙芬宕渠人上庸太守陳𢎞安漢人見巴紀忠義宕渠主簿曲庾宕渠人也忠義宕渠主簿馮湛宕渠人也烈士郝伯都閬中人右三十五人後漢司𨽻校尉程烏等失其事不録義烈江陽太守程畿字季黙閬中人也程祁字公𢎞畿子也楊汰字季儒巴郡人韓儼巴西人黎韜巴西人三人見楊文然𫝊壯烈將軍嚴顔臨江人也見張飛𫝊𤣥真徴士周舒字叔布閬中人也文學儒林校尉周羣字仲直舒子也博士周巨羣子也雅重車騎將軍育陽景侯黄權字公衡閬中人在魏儀同三司尚書郎黄崇權子也勇壯折衝將軍西陵太守甘寜字興霸臨江人仕吳政事鎮南大將彭鄉亭侯馬忠字徳信閬中人將略鎮北大將軍安漢侯王平字子均宕渠人果壯左將軍宕渠侯句扶字孝興漢昌人見王平𫝊將略盪冦將軍關内侯張㠜字伯岐南充國人也尚書僕射姚伷字子緒閬中人見楊義𫝊諸葛故事也别駕從事馬勲字盛衡閬中人見季漢輔臣𫝊尚書馬參字承伯閬中人見蜀書越嶲太守龔禄字徳緒安漢人父諶犍為太守見巴紀鎮軍將軍龔皦字徳光禄弟也徴士譙字榮始西充國人也周父淵通散騎常侍城陽亭侯譙周字允南子在劉氏光禄大夫右二十三人在劉氏三國之世馬妙祈妻義貞烈趙雲君妻華貞烈王元憒妻姬貞烈已上皆閬中人趙璝妻姬節烈宕渠人童女趙英璝女也趙萬妻娥宕渠人耿秉妾行安漢人鮮尼母姜安漢人右八人列女右巴郡凡士女七十九人士七十一人八人女道徳三老楊統字仲通新都人也曽祖仲續祁令父春卿為公孫述将光禄大夫楊博字仲逹統長子文學侍中楊序字仲桓諡曰文父博弟髙士冦懽字文儀綿竹人序弟子也髙士昭約字節宰雒人也序弟子二人見序傳術藝使持節交州牧楊宣字君緯什邡人學士嚴象廣漢人宣弟子也大儒趙翹廣漢人宣弟子也烏丸校尉郭堅雒人也光禄大夫侍中衛尉鐔顯字子誦郪人廬江太守蔡弓字子騫雒人善績司𨽻校尉郭賀字喬卿堅孫永昌太守鄭純字長伯郪人也文學髙士王祐字平仲郪人也弟灌有文才而不悉行事也文才樂安相李尤字伯仁雒人也尚書郎李充尤孫也文才東觀郎李勝字茂通雒人也見尤傳公亮將作大匠翟酺字超雒人聘士王稚字叔起諡曰憲文堂少子也堂長子博失官位博子遵亦失官位善績蜀郡太守王商字文表遵子也隠士夫子段翳字元章新都人也隠士馮信字季誠郪人明亷侍御史洛陽令王渙字稚子郪人司𨽻校尉王堂字敬伯郪人亢烈辟士段恭字節英新都人也越嶲太守馬顥字叔宰郪人武威太守南陽折侯張江雒人鬱林太守折國江四世孫因封國改姓折髙士折象字伯式國之子也治中祭酒朱倉字雲卿什邡人政事䍧柯太守劉寵字世信綿竹人孝子江陽符長姜詩字士遊雒人隂徳郿令王忳字少林新都人也交州牧羊甚郪人也推讓野王令羊朞字仲魚甚子文學侍中董扶字茂安綿竹人楊厚弟子也文學聘士任安字定祖綿竹人亦厚弟子髙讓義士杜真字孟宗綿竹人精誠五官諒輔字漢儒新都人義士楊寛字叔仲新都人父斌兄混皆有證明君事失其官位義士張鉗字子安廣漢人也烈士賈栩字元集什邡人也節士甯叔字茂泰廣漢人也忠義綿竹主簿韓揆字伯彦壯童左喬雲綿竹人孝亷汝敦新都人周幹廣漢人彭勰廣漢人古朴廣漢人見右三人儒學文才蜀志及王商傳方術太醫丞郭玉字通直右五十二人馳名漢世别駕從事李朝字永南郪人也丞相西曹掾李邵字偉南朝弟也文才大司農秦宓字子勑綿竹人益州太守王士字義彊郪人王祐從弟也别駕從事王甫字國山文表弟也優遊特進太常關内侯鐔承字公文郪人才雋江陽太守彭羕字永年廣漢人忠謀從事鄭度綿竹人也見劉璋𫝊忠烈從事王累新都人也見劉璋𫝊右九人在劉氏世及二牧時聘士任安母姚綿竹人也姜詩妻龎行雒人也姜嬪字義舊綿竹人狄道長姜穆女司馬雅妻廖伯妻殷紀配廣漢人也便敬妻王和新都人也李珥字進娥郪人李氏女馮季宰妻也王輔妻彭非廣漢人也李平字正流廣漢李元女楊文妻袁稚妻相烏徳陽人也王上妻袁福徳陽人也汝敦妻失姓不知何郡縣人也右十一人列女右廣漢郡凡士女七十二人六十一人士十一人女知術光禄大夫關内侯王延世字長叔資中人揚州刺史楊莽字翁君武陽人見何霸傳忠壮復漢將軍朱遵字孝仲武陽人也隠知徴士任永字君業僰道人也隠遯合浦太守費貽字奉君南安人精宻上黨太守趙松字君橋武陽人文學城門校尉董鈞字文伯資中人秀頴司𨽻校尉楊渙字孟文武陽人見犍為耆舊傳漢中太守楊文方渙字文方子頴伯冀州刺史仲頴二千石失其行亊也政事司𨽻校尉楊凖字伯邳文方兄子太守太尉李固舉之清秀大司空張皓字升明武陽人也正直光禄大夫廣陵太守張綱字文紀皓子也郎中張植綱子也尚書張續植弟也豫州牧張方字公始續弟也正直司𨽻校尉趙旂字子鸞資中人也别駕從事王元武陽人也刺史張喬時見楊統傳義士公車令杜撫字叔和資中人也義士新都令趙敦字建侯武陽人也孝士尚書郎隗相字叔通僰道人也呂孟南安人不詳其事呉順字叔和僰道人學士韓子方僰道人張貞之師學士謝褒南安人傳見張鉗右二十四人在漢世政事蜀郡太守關内侯楊洪字季休武陽人固率諫議大夫費詩字公舉南安人忠正車騎將軍都亭侯張翼字伯恭武陽人綱後也文學五官中郎將伍梁字徳山南安人文才射聲校尉楊義字文然武陽人右五人在劉氏世從亊賈龍不悉其事不録漢中太守楊文方妻陽姬武陽人相登妻周度僰道人也曹禁字敬姬南安人周紀妻也程貞㺳字瑗玉牛鞞人資中張惟妻也尹仲讓妻韓姜僰道人也儀成妻謝姬南安人也趙媛姜資中人趙盛道妻也張貞妻黄帛僰道人也楊進武陽人廣漢王博妻右九人列女右犍為郡士女凡三十八人二十九人士九人女忠正城陽中尉鄧公成固人也景帝時楊王孫致逺衛尉博望侯張騫成固人武帝時爽朗給事中張猛騫孫元帝時髙尚逸民鄭子真褒中人成帝時大儒李頡南鄭人文學司徒李郃字孟節頡子執正太尉李固字子堅郃子雅望京兆尹李燮字徳公固少子奉車都尉李歴字季子固從弟也善績司𨽻校尉李法字伯度南鄭人也犍為太守趙宣字子雅南鄭人也徳望廣漢太守趙瑶字元珪宣子温雅尚書趙琰字稚珪瑶弟義壮𢎞農太守陳綱字仲卿成固人也義烈從事陳調字元化綱孫知思巴郡太守陳雅字伯䑓成固人南郡太守程基字稚業南郡人也大鴻臚劉巨公南鄭人也見烈女傳廣漢屬國張泰字伯彊南鄭人也政事度遼將軍張亮則字元脩泰從弟愷悌綿竹令閻憲字孟度成固人也隠士樊志張南鄭人也見征西將軍段熲傳尚志聘士衛衡字伯梁南鄭人樊志張弟子也籌畫計曹史程苞字元道南鄭人也文才葭萌長祝龜字元靈南鄭人也義烈郡主簿段崇字禮髙南鄭人也義烈功曹程信字伯義南鄭人也嚴孳李容陳已王宗姜濟曹亷勾矩劉旌原展九人太守鄭廣吏見段崇程信傳義烈從事燕邠字元侯南鄭人義烈主簿趙嵩字伯髙南鄭人右三十九人後漢陳術字申伯歴二郡太守見蜀書撰益部耆舊傳者右一人劉氏之世李穆姜安衆令程祗妻李法姑也子基劉泰瑛巨公女楊拒妻杜泰姬南鄭人犍為太守趙宣妻楊禮珪成固楊元珍女陳省妻李文姬太尉固女趙瑛妻陳順謙鄧令曹寧妻陳伯䑓從女也兄子陳規著書稱之陳惠謙順謙妹度遼將軍張亮則夫人張禮脩南鄭人趙嵩妻韓樹南南鄭人趙子賤妻也右九人列女右漢中郡士女凡四十九人四十人士九人女忠義鎮逺将軍義侯文齊字子竒梓潼人也平帝用為益州大守遂不服王莽公孫述光武嘉之北海太守文忳齊子節士李業字巨遊梓潼人也遂乆令李翬業子益州太守景毅字文堅梓潼人也政事有道景鸞字漢伯梓潼人也文學孝亷楊充字盛國梓潼人也壯烈濟隂相寇祺字宰朝梓潼人也壯烈童人李餘涪人也義士功曹張夀字伯僖涪人也義士王晏字叔博涪人也方士李助字翁君涪人也右十二人漢世尚𤣥諫議大夫杜微字國輔涪人也文學李仁字徳賢涪人也太子僕李巽字欽仲仁子太子家令尹黙字思潛涪人也承相㕘軍文恭字仲賢梓潼人也果銳前監軍將軍司馬李福字孫徳涪人見諸葛故事蜀書右六人劉氏世文極字季姜梓潼人将作大匠王堂夫人也巴郡虞顯妻杜慈涪杜季女也郭孟妻楊敬涪楊女也右列女三人右梓潼郡士女二十一人十八人士三人女修慎少府太常關内侯王謀字元泰漢嘉人也雲南太守張休右二人漢嘉人士在劉氏世文學制州刺史尹珍字道真母斂人也巴郡太守傅寳字紀圖下夷人也忠義冠軍将軍寧州刺史謝恕字茂理母斂人也右三人牂柯人士忠義大將軍朝侯祭酒錫光字長沖右一人西域人士忠義雲南太守陽遷亭侯吕凱字季平不韋人也右一人永昌人士義正安漢將軍建寧太守李恢字徳昂領軍爨習御史中丞孟獲右三人建寧人士輔漢將軍孟琰字休明右一人朱提人士先泥和女絡符人也右一人列女江陽人大凡三州十三郡自漢興至三國之終士女載傳記者三百四十人二百九十三人士四十七人女公七人大將二十二人侯二十人卿佐十四人侍中七人尚書五人司𨽻校尉六人州刺史十三人郡守四十八人國師三人光禄大夫四人尚書郎十二人中書郎將御史六人公車令諫議大中十一人公府辟士八人髙士一人聘士七人徴士四人節士四人烈女四十七人益梁寧三州三國兩晉以来人士目録添立目録明畧大司農西域公何攀字恵興郫人清秀大長秋夀良字文淑成都人也果烈西河太守栁隠字休然成都太也梁益二州都督杜禎成都人也都督度支巴東太守栁伸字雅厚成都人也徳行江陽太守何隨字季業郫人令徳犍為太守杜軫字超宗成都人也犍為太守杜烈字仲武軫弟建寧太守杜良字幼倫益州刺史杜毘字長基徳行給事中任熈字伯逺成都人也涪陵太守任蕃字憲祖熈子義正郫令常朂字修業江原人也州都常忌字茂通朂從弟也令才太史令髙玩字伯珍江原人也温才湘東太守常騫字季慎江原人也述作武平太守常寛字泰恭騫從弟也使持節西夷校尉張岐字紹茂成都人也征西將軍西夷校尉益州刺史王異字彦明成都人也勇畧雍州刺史南中郎將重安開國侯李陽字文叔郫人征虜将軍廣漢梓潼太守楊謙字令志成都人也右二十一人蜀郡人在晉世彊濟少府成都威侯李毅字允剛郪人西夷校尉李釗字世康毅子仁讓漢嘉太守司馬勝之字興先綿竹人徳義梓潼太守王化字伯逺郪人文表孫巴東太守王振字仲逺化弟也作唐令王岱字季逺振弟也述作蜀郡太守王崇字幼逺岱弟也素隠中書郎王長文字徳雋郪人也建寧太守耿容字宗仲廣漢人也右九人廣漢人在晉世漢中太守李宓字令伯武陽人也汶山太守李賜字宗碩宓子也太傅參軍李典字雋碩賜弟也廣漢太守張徴字建興翼子也譙國内史費緝字文平南安人二子見夀良𫝊執義衡陽太守楊邠字岐之武陽人清正尚書費立字建熈南安人右七人犍為人士在晉世衛尉文立字廣休臨江人也武陽太守楊守臨江人也牂柯太守毛楚枳人右三人巴郡人在晉世述作太子中庻子陳夀字承祚安漢人驃騎府掾陳莅字叔度夀兄子上亷令陳符字長住夀凡子建寧太守陳階字逹芝莅弟正直漢中太守閻纉字續伯安漢人卓畧長水校尉荆州刺史張奕字希祖南充國人義烈揚烈将軍梓潼内史譙登字順明周孫令徳錫令譙周字彦紹周子見周傳右八人巴西人士在晉世清重長水校尉吕淑字偉徳右一人漢中人廣漢太守李􅋮字叔龍福子右一人梓潼人忠義江陽太守侯馥字世明右一人江陽人三州後賢五十一人并前賢三百九十一人譔曰凡此人士或見漢書或載耆舊或見郡紀或在三國書并取其秀異表之斯篇其洪伐張顯者並生附載者齊之其但見名目而不詳其行故或有以傳無珍善闕之以副直文為實錄矣華陽國志卷十二附江原常氏士女志明張佳允輯侍中長水校尉常洽字茂尼侍御史常翊南廣太守常竺字代文閬中令常偉字公然竺子廣都令常良郫令常朂字修業河内令常忌朂弟常仲山湘東太守常騫字季慎偉子戸曹掾常敞中郎常美都䕶常俊都䕶常深武平太守常寛字泰恭騫從弟治中從事長生字彭祖寛子散騎常侍常璩字道將寛族孫右士十六人便敬賔婦常元常良女殷氏婦常靡常仲山女趙侯夫人常紀常右女三人佳允曰江原常氏代有明徳故大姓也道將立志僅書其半豈以私親自嫌哉夫岷瀆委靈哲又作則儻資國器寸璧是尊今考出士女共十九人自立録目又見道將承源家學修辭有經斯龍門世業良史稱材間有行實詳畧不侔然英名遺烈垂在竹素庶幾尚友遐心蓍龜孔邇者矣
