body:
  text: 華陽國志卷六晉常璩撰劉先主志先主諱備字𤣥德􅃰郡􅃰縣人漢景帝中山靖王勝後也勝子貞元狩六年封􅃰縣陸城亭侯因家焉祖父雄察孝廉為東郡范令父𢎞早亡先主幼孤其母販履織席自業舍東南角籬上有桑樹生高五丈餘遙望童童如車蓋人皆異之或謂當出貴人先主少時與宗中諸兒戯於樹下言吾必乘此羽葆蓋車叔父子敬謂曰汝勿妄言滅吾門也年十五母遣行學與宗人劉德然遼西公孫瓉俱事故九江太守同郡盧子幹德然父元起常資給先主與德然等元起妻曰各自一家何能常爾起曰宗中有此兒非常人也而瓉深與先主善瓉年長先主兄事之喜狗馬音樂美衣服長七尺五寸垂臂下膝顧自見耳能下人喜怒不形於色善交結豪俠年少爭附之中山大商張世平蘇雙等見而竒之多與之金先主由是得合徒衆河東關侯雲長同郡張飛益德並以壯烈為之禦侮先主與二子寢則同牀食則共器恩若弟兄然於稠人廣衆中侍立終日中平元年從校尉鄒靖討黄巾賊有功除安喜尉求謁督郵不得乃入縳執之杖二百以綬繫督郵頭頸著馬枊柱委官亡命頃之應大將軍何進募有功除下宻丞復為高唐尉遷為令瓉為中郎將表先主為别部司馬拒冀州牧袁紹數有戰功守平原令進領平原相郡民劉平恥為之下使客刺之客服其德告之而去北海相魯國孔融為黄巾賊所圍使太史慈求救於先主先主曰孔文舉聞天下有劉某乎以兵救之廣陵太守下邳陳登元龍太尉球孫也有雋才輕天下士謂功曹陳矯曰閨門雍穆有行吾敬陳元方父子氷清玉潔有德有言吾敬華子魚博聞强識竒偉卓犖吾敬孔文舉雄姿傑出有王霸之畧吾敬劉𤣥德名器盡此徐州牧陶謙表先主為豫州刺史徐州牧陶謙病篤謂别駕東海麋竺曰非劉備不能安此州也謙卒竺率州人迎先主先主未許廣陵太守下邳陳登進曰今漢室陵遲海内傾覆立功立事在今日鄙州殷富户口百萬欲屈使君撫臨州事先主曰袁公路近在壽春此君四世五公海内所歸可以州與之登曰公路驕豪非治亂之主今欲為使君合步騎十萬上可以匡主濟民成五霸之業下可以割地守境書功於竹帛若使君不見聽許登亦未敢聽使君也北海相孔融謂先主曰袁術豈憂國忘家者耶冢中枯骨何足介意今日之事百姓與能天與不取悔不可追先主遂領徐州牧建安元年曹公表為鎮東將軍封宜城亭侯先主與袁術相拒而下邳守將曹豹叛為吕布所敗先主失妻子轉軍海西糜竺進妺為夫人及奴客二千金銀寳物資之先主因而獲振連和於布布還其妻子先主衆萬餘移軍小沛布惡之自攻先主先主歸曹公公以為豫州牧益其軍使伐布失利布將髙順復虜先主妻子送布公使夏侯惇助先主不能克三年公自征布生禽之布曰使布為明公將騎天下不足定也公有疑色先主曰公待布能如丁建陽董太師乎公頷之布目先主曰大耳兒最叵信者也遂殺布先主還得妻子從公還許為左將軍公禮之甚重出則同輿坐則同席又拜關侯張飛皆中郎將公謀臣程昱郭嘉勸公殺先主公慮失英豪望不許袁術自淮南欲經徐州北就袁紹獻帝舅車騎將軍董承受帝衣帶中宻詔當殺公承先與先主及長水校尉种輯將軍呉子蘭王子服等同謀以將行未發公從容謂先主曰天下英雄惟使君與操本初之徒不足數也先主方食失匕箸㑹天震雷先主曰聖人言迅雷風烈必變良有以也一震之威乃至於此也公亦悔失言先主還沛解公使覘之見其方披䓗使厮人為之不端正舉杖擊之公曰大耳翁未之覺也其夜先主急東行昱嘉復言之公馳使追之不及先主遂殺徐州刺史車胄以叛留關侯行下邳太守事身還小沛而承等謀洩受誅先主衆數萬遣從事北海孫乾自結於袁紹公遣將軍劉岱王忠擊之不克五年公東征先主先主敗績妻子及關侯見獲先主奔青州刺史袁譚奉迎道路馳以白父紹紹身出鄴二百里與先主相見公壯侯勇銳拜偏將軍初侯隨先主從公圍吕布於濮陽時秦宜禄為布求救於張楊侯啓公妻無子下城乞納宜禄妻公許之及至城門復白公疑其有色自納之後先主與公獵侯欲於獵中殺公先主為天下惜不聽故侯常懐懼公察其神不安使將軍張遼以情問之侯歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之要當立効以報曹公公聞而義之是歲紹征官渡遣梟將顔良攻東郡太守劉延於白馬公使遼侯為先鋒侯望見良麾蓋䇿馬刺良於萬衆中斬其首還紹將莫敵遂解延圍公即表封侯漢壽亭侯重加賞賜侯盡封其物拜書告辭而歸先主左右欲追之公曰彼各有主先主說紹南連荆州牧劉表紹遣將其卒兵至汝南公使將蔡陽擊之先主謂曰吾勢雖不便汝等百萬來末如吾何曹孟德單車來吾自去陽等必戰為先主所殺公既破紹自南征汝南先主遣糜竺孫乾詣劉表表郊迎之待以上賓使屯新野潁川徐元直致瑯瑘諸葛亮曰孔明卧龍也將軍願見之乎先主曰君與俱來庶曰此人可就見不可屈致也先主遂造亮凡三因屏人曰漢室傾頽奸臣竊命主上䝉塵孤不度德量力欲信大義於天下而智術淺短遂用猖蹶至于今日志猶未已君謂計將安出亮對曰自董卓以來豪桀並起跨州連郡不可勝數曹操比於袁紹則名微而衆寡然遂能克紹以弱為彊雖云天時抑人謀也今操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒也孫權據有江東已歴三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連呉㑹西通巴蜀此用武之國而其主不能守殆天所以資將軍也益州險塞沃野天府之土高祖因之以成帝業劉璋闇弱張魯在北國富民殷而不知卹賢能之士思得明君將軍既帝室之胄信義著於四海總覽英雄思賢如渴若跨有荆益保其險阻西和諸戎南撫夷越結好孫權内脩政理天下有變命一上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川天下孰不簞食壺漿以迎將軍者乎如此則霸業可成漢室可興矣先主曰善與亮情好日宻自以為猶魚得水也十三年表卒少子琮襲位曹公南征琮遣使請降先主屯樊不知曹公卒至至宛先主乃知遂將其衆去比到當陽衆十餘萬人車數千兩日行十餘里别遣關侯乗舡㑹江陵或謂先主曰宜速行雖擁大衆被甲者少曹公軍至何以禦之先主曰夫濟大事以人為本今人歸吾何忍棄之公以江陵有軍實恐先主據之乃釋輜重以輕騎五千追先主一日一夜行三百里及於當陽之長坂先主棄妻子與諸葛亮張飛等數十騎走公盡獲其民衆急追先主張飛據水斷橋横馬案矛曰我張益德也可來決死公徒乃止先主斜趣漢津適與侯舡會而趙雲身抱先主弱子後主及擁先主甘夫人相及濟江亮曰事急矣請奉命求救於孫將軍時權軍柴桑既服先主大名又悅亮竒雅即遣周瑜程普水軍三萬助先主拒曹公大破公軍於赤壁焚其舫舟公引軍北歸先主以劉表長子江夏太守琦為荆州刺史先主南平四郡武陵太守金旋長沙太守韓𤣥桂陽太守趙範零陵太守劉度皆降廬江雷緒率部曲數萬口稽顙㑹琦病死先主領荆州牧治公安孫權進妹恩好綢繆以亮為軍師中郎將督南三郡事以關侯為盪冦將軍領襄陽太守住江北張飛為征虜將軍宜都太守初先主之敗東走也徑徃鄂無土地關侯責之曰早從獵中言無今日先主曰安知此不為福也及得荆州復有人衆孫權遣使求共伐蜀又曰雅願以隆成為一家諸葛孔明母兄在呉可令相并主簿殷觀曰若為呉先驅大事去矣今但可讃之言新據諸郡未可以動彼必不越我而有蜀也先主乃報曰益州不明得罪左右庶幾將軍高義上匡漢朝下輔宗室若必尋干戈備將放髮於山林未敢聞命權果輟計遷觀别駕十六年益州牧劉璋遣法正迎遂西入益州建安十九年先主克蜀蜀中豐富盛樂置酒大㑹饗食三軍取蜀城中民金銀頒賜將士還其穀帛賜諸葛亮法正關侯張飛金五百斤銀千斤錢五千萬錦萬疋其餘各有差以亮為軍師將軍署左將軍府事正揚武將軍蜀郡太守關侯督荆州事張飛為巴西太守馬超平西將軍不用許靖法正說曰有獲虛譽而無實者靖也然其浮名稱播海内人將謂公輕士乃以為長史龎羲為司馬李嚴為犍為太守費觀為巴郡太守徵益州太守南郡董和掌軍中郎太守漢嘉王謀為别駕廣漢彭羕為治中辟零陵劉巴為西曹掾廣漢長黄權為偏將軍於是亮為股肱正為謀主侯飛超為爪牙靖羲及糜竺簡雍孫乾山陽伊籍為賓友和嚴權本劉璋所授用也呉懿費觀璋之婚親也彭羕璋所排擯也劉巴已所宿恨也皆處之顯位盡其器能有志之士無不競勸羣下勸先主納劉􅈘妻先主嫌其同族法正曰論其親疏何與晉文之於子圉乎從之正既臨郡睚眦之怨一飡之惠無不報復或謂諸葛亮曰法正蜀郡太縱横將軍宜啓主公亮曰公之在公安也北畏曹操之强東憚孫權之逼内慮孫夫人興變於肘腋之下孝直為輔翼遂翻飛翺翔不可復制如何禁法使不得行其志也初孫夫人才捷剛猛有諸兄風侍婢百人皆杖劒侍立先主毎下車心常澟澟正勸先主還之二十年孫權使使報先主欲得荆州先主報曰吾方圖涼州涼州定以荆州相與孫權怒遣吕蒙襲奪長沙零陵桂陽三郡先主下公安令關侯入益陽㑹曹公入漢中張魯定巴西黄權進曰若失漢中則三巴不振此割蜀人股臂也於是先主與呉連和分荆州江夏長沙桂陽東屬南郡零陵武陵西屬引軍還江夏以權為䕶軍迎魯魯已北降曹公權破公所署三巴太守杜濩朴胡袁約等公留征西將軍夏侯淵益州刺史趙顒及張郃守漢中公東還郃數犯掠巴界先主率張飛等進軍宕渠之蒙頭拒郃相持五十餘日飛從他道邀郃戰於陽石遂大破郃軍郃失馬縁山獨與麾下十餘人從間道還南也二十一年先主還成都二十二年蜀郡太守法正進曰曹操一舉降張魯定漢中不因此勢以圖巴蜀而留淵郃身遽北還非智不逮力不足將内有憂逼耳今算淵郃才畧不勝我將率舉衆徃討則必可擒天以與我時不可失也先主從之以問儒林校尉巴西周羣羣對曰當得其地不得其民若出偏軍必不利先主遂行諸葛亮居守足食足兵也二十三年先主急書發兵軍師亮以問從事犍為楊洪洪對曰漢中蜀之喉咽存亡之機若無漢中則無蜀矣此家門之禍男子當戰女子當運發兵何疑亮以法正從行白先主以洪領蜀郡太守後遂即真初洪為犍為太守李嚴功曹去郡數年已為蜀郡嚴故在職而蜀郡何祗為洪門下書佐去郡數年已為廣漢太守洪故在官是以西土咸服亮之能攬拔英秀也後洪祗俱㑹亮門下洪謂祗曰君馬何駛祗對曰故吏馬不為駛明府馬不進耳二十四年先主定漢中斬夏侯淵張郃率吏民内徙先主遣將呉蘭雷同入武都皆没乃舉羣茂才時州後部司馬張裕亦知占術坐漏言言先主得蜀寅夘之間當失漢㐫年在庚子誅曹公為魏王王西征聞法正䇿曰固知𤣥德不辦此又曰吾收奸雄畧盡獨不得正邪羣下上先主為漢中王大司馬以許靖為太𫝊法正為尚書令零陵賴恭為太常南陽黄權為光禄勲王謀為少府武陵廖立為侍中關侯為前將軍張飛為右將軍馬超為左將軍皆假節鉞又以黄忠為後將軍趙雲翊軍將軍其餘各進官號軍師諸葛亮曰黄忠名望本非關張馬超之倫也今張馬在近親見其功猶可喻指關遙聞之恐必不悅先主曰吾自解之時關侯自江陵圍曹仁於樊城遣前部司馬犍為費詩拜假節侯怒曰大丈夫終不與老兵同列不肯受拜詩謂曰昔蕭曹與髙祖幼舊陳韓亡命後至論其班爵韓最居上未聞蕭曹以此為怨今王以一時之功隆崇於漢升黄忠字也意之輕重寧當與君侯齊乎王與君侯譬猶一體禍福同之愚謂君臣不宜計官號之高下爵位之多少也侯即受拜初侯聞馬超來降素非知故書與諸葛亮問其人才亮知侯䕶前答曰孟起黥彭之徒一世之桀當與益德並驅爭先猶不如髯之絶倫也侯省書忻悅以示賓客侯美鬢髭故亮稱云髯也侯臂嘗中流矢每天隂疼痛醫言矢鋒有毒須破臂刮毒患乃可除侯即伸臂使治時適㑹客臂血流離盈於盤器而侯引酒割炙言笑自若魏王遣左將軍于禁督七軍三萬人救樊漢水暴長皆為侯所獲又殺魏將龎德威震華夏魏王議徙許都以避其銳而孫權襲江陵將軍傅士仁南郡太守糜芳降呉侯久不拔城魏右將軍徐晃救樊侯退還遂為孫權所殺呉盡取荆州以劉璋為益州牧住秭歸是歲尚書令法正卒諡曰翼侯以尚書劉巴為尚書令二十五年春正月魏武王薨嗣王丕即位改元延康蜀傳聞漢帝見害先主乃發喪制服追諡曰孝愍皇帝所在並言衆瑞故議郎陽泉亭侯劉豹青衣侯向舉偏將軍張裔黄權司馬屬殷純别駕趙莋治中楊洪從事祭酒何宗議曹從事杜瓊勸學從事張爽尹黙譙周等上河洛符驗孔子所甄赤三日德昌九世㑹備合為帝際洛書寳號命曰天度帝道備稱皇又言周羣父未亡時數言西南有黄氣立數十丈而景雲祥風從璇璣下來應之如圖書必有天子出方今大王應際而生與神合􅆻願速即洪業以寧海内先主未許冬魏王丕即皇帝位改元黄初漢獻帝遜位為山陽公章武元年魏黄初二年也春太傅許靖安漢將軍糜竺軍師將軍諸葛亮太常賴恭光禄勲黄權少府王謀等乃勸先主紹漢絶統即帝號先主不許亮進曰昔呉漢耿弇等勸世祖世祖辭讓耿純進曰天下英雄喁喁冀有所望若不從議者士大夫各歸求主無從公也世祖感之今曹氏簒漢天下無主大王紹世而起乃其宜也士大夫隨大王久勤苦者亦欲望尺寸之功如純言耳先主乃從之亮與博士許慈議郎孟光建立禮儀擇令辰費詩上疏曰殿下以曹操父子逼主簒位故乃羇旅萬里糺合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖與楚約先破秦者王及屠咸陽獲子嬰猶推讓況今殿下未出門便欲自立愚臣誠不為殿下取也朝廷左遷詩部永昌從事夏四月丙午先主即帝位大赦改元章武以諸葛亮為丞相假節録尚書許靖為右司徒張飛車騎將軍領司𨽻校尉進封西鄉侯馬超驃騎將軍領涼州刺史封斄鄉侯北督臨沮偏將軍呉懿為關中都督進魏延鎮北將軍李嚴輔漢將軍襄陽馬良為侍中楊儀為尚書蜀郡何宗為鴻臚立宗廟祫祭髙皇帝世祖光武皇帝五月辛巳立皇后呉氏呉懿妹劉璋兄􅈘妻也子禪為皇太子六月立子永為魯王理為梁王先主將東征以復關侯之恥命張飛率巴西萬兵將㑹江州飛帳下將張達范彊殺飛持其首奔呉初飛侯勇冠三國俱稱萬人之敵侯善待小人而驕士大夫飛愛敬君子而不䘏小人是以皆敗先主常戒之曰卿刑殺過差鞭撻健兒令在左右此取禍之道飛不悟故敗先主聞飛營軍都督之有表也曰噫飛死矣命丞相亮領司𨽻校尉秋七月先主東伐羣臣多諫不納廣漢秦宓上陳天時必無其利先主怒縶之于理孫權送書請和先主不聽呉將陸議李異劉阿等軍至秭歸左右領軍南郡馮習陳留呉班自建平攻破異等軍次秭歸武陵五溪蠻夷遣使請兵二年春正月先主軍秭歸呉班陳式等水軍屯夷陵夾江東西岸二月將進黄權諫曰呉人悍戰而水軍泝流進易退難臣請為先驅以嘗冦陛下宜為後鎮先主不從以權為鎮北將軍督江北軍先主連營稍前軍於夷道猇亭遣侍中馬良經佷山安慰五溪蠻夷夏六月黄氣見自秭歸十餘里中廣十餘丈後十數日與呉人戰先主敗績馮習及將張南皆死先主歎曰吾之敗天也委舟舫由步道還魚復將軍義陽傅彤為後殿兵衆死盡彤氣益烈呉將喻令降彤罵曰呉狗何有漢將軍降者遂戰死從事祭酒程畿獨泝江退衆曰後追以至宜解舫輕行畿曰吾在軍未習為敵之走況從天子乎亦見殺黄權偏軍孤絶遂北降魏李異劉阿等踵躡先主屯南山先主改魚復曰永安丞相亮聞而歎曰法孝直若在則能制主上使不東行就復東行必不傾危矣八月司徒靖卒是歲驃騎將軍馬超亦卒臨没上疏曰臣宗門二百餘口為孟德所誅畧盡唯從弟岱當為微宗血食之係深託陛下岱官至平北將軍拜彤子僉左右郎將冬十月詔丞相亮營南北郊於成都孫權聞先主在白帝甚懼遣使請和先主使太中大夫南陽宗瑋報命十有一月先主寢疾十有二月漢嘉太守黄元素為亮所不善聞先主疾病慮有後患舉郡拒守三年春正月召丞相亮於成都詔亮省疾于永安元燒臨卭城治中從事楊洪啓太子遣將軍陳曶鄭綽由青衣水伐元滅之二月亮至永安先主謂曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣對曰臣敢竭股肱之力効忠貞之節繼之以死先主又為詔勅太子曰汝與丞相從事事之如父亮與尚書令李嚴並受寄託夏四月先主殂于永安宫時年六十三亮表後主曰大行皇帝邁仁樹德覆育無疆昊天不弔今月二十四日奄忽升遐臣妾號咷如喪考妣乃顧遺詔事惟太宗百寮發哀三日除服到葬復服其郡國守相令長丞尉三日除服五月梓宫至成都諡曰昭烈皇帝秋八月葬惠陵譔曰漢末大亂雄桀並起若董卓吕布二袁韓馬張楊劉表之徒兼州連郡衆踰萬計叱咤之間皆自謂漢祖可踵桓文易邁而魏武神武幹畧戡屠盪盡于時先主名微人鮮而能龍興鳯舉伯豫君徐假翼荆楚飜飛梁益之地元𦙍漢祚而呉魏與之鼎峙非英才命世孰克如之然必以曹氏替漢宜扶信順以明至公還乎名號為義士所非及其寄死託孤於諸葛亮而心神無貳陳子以為君臣之至公古今之盛軌也華陽國志卷六
