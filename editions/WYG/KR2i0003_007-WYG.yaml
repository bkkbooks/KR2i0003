body:
  text: 華陽國志卷七晉常璩撰劉後主志後主諱禪字公嗣先主太子甘夫人所生也襲位時年十七建興元年夏五月後主即位尊皇后呉氏曰皇太后大赦改元於魏黄初四年呉黄武二年也立皇后張氏車騎將軍張飛女也封丞相亮武郷侯中護軍李嚴假節加光禄勲封都郷侯督永安事中軍師衛尉魯國劉琰亦都郷侯中護軍趙雲江州都督費觀屯騎校尉丞相長史王連中部督襄陽向寵及魏延呉懿皆封都亭侯楊洪王謀等關内侯南中諸郡並叛亂亮以新遭大喪未便加兵遣尚書南陽鄧芝固好於呉呉王孫權曰吾誠願與蜀和親但主幼國小慮不自存芝對曰呉蜀二國之地呉有三江之阻蜀有重險之固大王命世之英諸葛亮一時之傑合此二長共為脣齒進可兼并天下退可鼎足而跱大王如臣服於魏魏則上望大王入朝其次求太子入侍若其不從則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也呉王大悅與蜀和報使聘歲通芝後累徃權曰若滅魏之後二主分治不亦樂乎芝對曰滅魏之後大王未深識天命者戰爭方始耳權曰君之誠懇乃至於此書與亮曰丁宏掞張隂化不實和合二國惟有鄧芝二年丞相亮開府領益州牧事無巨細咸決於亮亮乃撫百姓示儀軌約官職從權制盡忠益時者雖讐必賞犯法怠慢者雖親必罸服罪輸情者雖重必釋遊辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物究其本循名責實虚偽不齒終乎封域之内畏而愛之刑政雖峻而無怨者以其用心平勸戒明也辟尚書郎蔣琬及廣漢李邵巴西馬勳為掾南陽宗預為主簿皆德舉也秦宓為别駕犍為五梁為功曹梓潼杜微為主簿皆州俊彦也而江夏費禕南郡董允郭攸之始為侍郎賛揚日月呉遣中郎將張温來聘報鄧芝也將返命百官餞焉惟宓未徃亮累催之温問曰彼何人也亮曰益州學士者也及至温問宓曰君學乎答曰五尺童子皆學何况小人温曰天有頭乎在何方也宓曰詩云乃眷西顧知其在西又曰天有耳乎宓曰詩不云乎鶴鳴九臯聲聞于天若無其耳何以聽之又曰天有足乎曰詩不云乎天步艱難之子不猶若其無足何以步之又曰天有姓乎曰姓劉何以知之曰其子姓劉又曰日生於東乎曰雖生於東終没於西答問如響之應聲温大敬服宓亦尋遷右中郎將長水校尉大司農三年春長水校尉廖立坐謗訕朝廷改徙汶山立自荆州與龎統並見知而性傲侮後更冗散怨望故致黜廢三月亮南征四郡以𢎞農太守楊儀為參軍從行步兵校尉襄陽向朗為長史統留府事秋南中平軍資所出國以富饒冬亮還至漢陽與魏降人李鴻相見說新城太守孟達委仰於亮無已亮方北圖欲招達為外援謂參軍蔣琬從事費詩曰歸當有書與子度相聞對曰孟達小子昔事振威不忠後奉先帝背叛反覆之人何足與書亮不答詩數率意而言故淩遲於世十有二月亮至羣官皆道迎而亮命侍郎費禕參乗禕官小年幼衆士於是莫不易觀四年永安都䕶李嚴還督江州城巴郡大城以征西將軍汝南陳到督永安封亭侯是歲魏文帝崩明帝立五年魏太和元年也春丞相亮將北伐上疏曰今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈于内忠志之士亡身於外者咸追先帝之遇欲報之陛下也先帝以臣謹慎故臨崩寄臣以大事受命以來夙夜憂歎故五月渡瀘深入不毛今南方以定兵甲以足當奨率三軍北平中原庶竭駑鈍攘除奸㐫克復漢室還乎舊都此臣所報先帝而忠於陛下願陛下託臣以討賊興復不効則治臣之罪以告先帝之靈陛下亦宜自謀諮諏善道察納雅言不宜引喻失義以塞忠諫之路也又曰親賢臣逺小人先漢所以興隆昵小人疎君子後漢所以傾覆侍中郭攸之費禕侍郎董允先帝簡拔以遺陛下斟酌損益進盡忠言則其任也宫省之事悉以諮之必能禆補闕漏有所廣益也以尚書南陽陳震為中書令治中張裔為留府長史與參軍蔣公琰知居府事二月亮出屯漢中營沔北陽平石馬以鎮北將軍魏延為司馬六年春丞相亮揚聲由斜谷道取郿使鎮東將軍趙雲中監軍鄧芝據箕谷為疑軍魏大將軍曹真舉衆當之亮身率大衆攻祁山賞罰肅而號令明天水南安安定三郡叛魏應亮關中響震魏明帝西鎮長安命張郃拒亮亮使參軍襄陽馬謖禆將軍巴西王平及張沐李盛黄襲等在前違亮節度為郃所破平獨歛衆為殿而雲芝亦不利亮拔將西縣千餘家還漢中戮謖及沐盛以謝衆奪襲兵貶雲秩長史向朗以不時臧否免罷超遷平參軍進位討寇將軍封亭侯統軍五月亮上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違令之闕箕谷不戒之失咎皆在臣臣授任無方春秋責帥臣職是當請自貶三等以督厥咎於是以亮為右將軍行丞相事辟天水姜維為倉曹掾加奉義將軍封當陽亭侯亮書與長史張裔參軍蔣琬稱維曰姜伯約西州上士馬季常李永南不如也冬亮復出散關圍陳倉糧盡還魏將王雙追亮亮合戰斬雙七年春丞相亮遣䕶軍陳式攻武都隂平魏雍州刺史郭淮出將擊式亮自至建威淮退遂平二郡後主詔䇿亮曰街亭之敗咎由馬謖而君引愆深自抑損重違君意聽順所守前年耀師馘斬王雙今歲授征郭淮遯走降集氐羌興復二郡威震㐫暴功勲赫然復君丞相君其無辭夏四月呉主孫權稱尊遣衛尉陳震慶問呉與蜀約分天下冬城漢樂八年春丞相亮以參軍楊儀為長史加綏逺將軍遷姜維䕶軍征西將軍秋魏大將軍司馬宣王由西城征西車騎將軍張郃由子午大司馬曹真由斜谷三道將攻漢中丞相亮軍城固表進江州都䕶李嚴驃騎將軍將二萬人赴漢中嚴初求以五郡為巴州書告亮言魏大臣陳羣司馬懿並開府亮乃加嚴中都䕶以嚴子豐為江州都督大雨道絶真等還丞相亮以當先北征因留嚴漢中署留府事嚴改名平丞相司馬魏延將軍呉懿西入羌中大破魏後將軍費曜雍州刺史郭淮于陽溪延遷前軍師鎮西將軍封南鄭侯懿左將軍高陽郷侯徙魯王永為甘陵王梁王理為安平王皆以魯梁在呉分故也九年春丞相亮復出圍祁山始以木牛運參軍王平守南圍司馬宣王拒亮張郃拒平亮慮糧運不繼設三䇿告都䕶李平曰上計斷其後道中計與之持久下計還住黄土時宣王等糧亦盡盛夏雨水平恐運漕不給書白亮宜振旅夏六月亮承平指引退張郃至青封交戰為亮所殺秋八月亮還漢中平懼亮以運不辦見責欲殺督運領岑述驚問亮何故來還又表後主言亮偽退亮怒表廢平為民徙梓潼奪平子豐兵以為從事中郎與長史蔣琬共知居府事時費禕為司馬也十年春丞相亮休士勸農車騎將軍劉琰與軍師魏延不和還成都秋旱亮練兵講武十一年魏青龍元年也丞相亮治斜谷閣運糧谷口十二年春丞相亮以流馬運從斜谷道出武功據五丈原與司馬宣王對於渭南亮每患糧不繼使志不伸乃分兵屯田為久住之基耕者雜於渭濱居民之間百姓安堵軍無私焉秋八月亮疾病卒于軍時年五十四還葬漢中定軍山塚足容棺歛以時服諡曰忠武侯鎮西大將軍魏延與長史楊儀素不和亮既恃延勇猛又惜儀籌畫不能偏有所廢常恨恨之為作甘戚論二子不感延常舉刃擬儀涕淚交流惟䕶軍費禕和解中間終亮之世盡其器用儀欲案亮成規將喪引退使延斷後姜維次之延怒舉軍先歸南鄭各相表反留府長史蔣琬侍中董允保楊儀疑延延道欲擊儀儀遣平北將軍馬岱討滅延延自以武幹常求將數萬别行依韓信故事亮不許以亮為怯及儀將退使費禕造延延曰公雖亡吾見在當率衆擊賊豈可以一人亡廢國家大事乎使禕報儀不可故欲討儀儀率諸軍還成都大赦以呉懿為車騎將軍假節督漢中事初亮宻表後主以儀性狷狹若臣不幸可以蔣琬代臣於是以琬為尚書令總統國事以儀為中軍師司馬費禕為後軍師征西姜維為右監軍輔漢將軍鄧芝前軍師領兖州刺史張翼前領軍並典軍政廖立在汶山聞亮卒垂泣曰吾終於左祍矣李平亦發病死初立平為亮所廢安奄没齒常冀亮當自補復䇿後人不能故感憤焉十三年拜尚書令蔣琬為大將軍領益州刺史以費禕為尚書令時新喪元帥逺近危悚琬超登大位既無戚容又無喜色衆望漸服侍郎董允兼虎賁中郎將統宿衛兵軍師楊儀自以年官在琬前雖同為參軍長史已常征伐勤苦更處琬下書怨望謂費禕曰公亡際吾當舉衆降魏處世寧當落度如此邪令人悔不可追禕表其言廢徙漢嘉儀又上書激切遂行儀重辟呉以亮之卒也増巴丘守萬人蜀亦益白帝軍右中郎宗預使呉呉主曰東之與西共為一家何以益白帝守預對曰東增巴丘之戍蜀益白帝之兵俱事勢宜然不足以相問也十四年夏四月後主西巡至湔山登坂觀汶川之流武都氐王苻健請降將軍張尉迎之過期不至大將軍琬憂之牙門將巴西張嶷曰健求附欵至必無他變聞健弟狡不能同功各將乖離是以稽耳健弟果叛就魏健率四百家隨尉居廣都縣十五年魏景初元年也夏六月皇后張氏薨諡曰敬哀是歲車騎將軍呉懿卒以後典軍安漢將軍王平領漢中太守代懿督漢中事懿從弟班漢大將軍何進官屬呉匡之子也名常亞懿官至驃騎將軍持節鄉侯時南郡輔匡光弼零陵劉邕南和官亦至鎮南將軍潁川袁淋南郡高翔至大將軍淋征西將軍延熈元年春正月立皇后張氏敬哀皇后妹也大赦改元立子璿為太子瑤為安定王以典學從事巴西譙周為太子家令梓潼李譔為僕射皆名儒也冬十二月大將軍琬出屯漢中更拜王平以前䕶軍署大將軍府事尚書僕射李福為前監軍領大將軍司馬延熈二年春三月進大將軍琬大司馬開府辟治中從事犍為楊義為東曹掾義性簡琬與言時不應答羣吏以為慢琬曰夫人心不同各如其面面從後言古人所戒義欲賛吾是耶則非本心欲反吾言也則顯吾之非是以嘿然此義之快也督農楊敏常毁琬作事憒憒誠非前人也或以白琬琬曰吾信不如前人主者白乞問憒憒狀琬曰茍其不如則憒憒矣復問何也後敏坐事下獄人以為必死琬心無適莫是以上下輯睦歸仰於琬蜀猶稱治輔漢將軍姜維領大司馬是歲西征入羌中魏明帝崩齊王即位延熈三年魏正始元年也安南將軍馬忠率越巂太守張嶷平越巂郡四年冬十月尚書令費禕至漢中與大司馬琬諮論事計歲盡還五年春正月姜維還屯涪縣大司馬琬以丞相亮數入秦川不克欲順沔東下征三郡朝臣咸以為不可安南將軍馬忠自建寧還朝因至漢中宣詔㫖于琬琬亦連疾動輟計遷忠鎮南大將軍封彭鄉侯六年大司馬琬上疏曰臣既闇弱加嬰疾疢奉辭六年規方無成夙夜憂慘今魏跨帶九州除之未易如東西掎角但當蠶食然呉期二三連不克果輒與費禕馬忠議以為涼州胡塞之要宜以姜維為涼州刺史銜持河右今涪水陸四通惟急是赴東北之便應之不艱冬十月琬還鎮涪以王平為鎮北大將軍督漢中事姜維鎮西大將軍涼州刺史十有一月大赦遷尚書令費禕大將軍録尚書事就遷江州都督鄧芝車騎將軍七年閏月魏大將軍曹爽征西將軍夏侯𤣥征蜀王平白與䕶軍零陵劉敏距興勢圍以大司馬琬疾病假大將軍禕節率軍自成都赴漢中旌旗啓路人馬擐甲羽檄交馳嚴皷將發光禄大夫義陽來敏求共圍棋禕留意博弈色無厭倦敏曰聊試君耳君信可人必能辦賊者也比至爽等退命鎮南大將軍馬忠平尚書事夏四月安平王卒子𦙍嗣秋九月禕還大司馬琬以病固讓州職于費禕董允於是禕加大將軍領益州刺史允加輔國將軍守尚書令允立朝正色處中上則匡主下帥羣司於時蜀人以諸葛亮蔣費及允為四相一號四英宦人黄皓便僻佞慧畏允不敢為非後主欲採擇允曰妃后之數不可過十二允常與典軍義陽胡濟大將軍禕共期遊宴命駕將出郎中襄陽董恢造允脩敬自以官卑年少求去允曰本所以出者欲與同好遊談耳君以自屈方展濶積舍此就彼非所謂也命解驂止駕允之下士接物皆此𩔖也君子以為有周公之德八年秋皇太后吳氏薨諡曰穆冬十有一月大將軍禕行軍漢中九年夏六月禕還成都秋大赦司農孟光於衆中責禕曰夫赦者偏枯之物非明世之所宜有也今主上賢仁百寮稱職有何旦夕之急數施非常之恩以惠奸邪之惡上犯天時下違人理豈具瞻之高美所望於明德哉禕但顧謝焉初丞相亮時有言公惜赦者答曰治世以大徳不以小惠故匡衡呉漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啟告治亂之道備矣曽不語赦也若景升季玉父子嵗嵗赦宥何益於治故亮時軍旅屢興赦不妄下也自亮殁後兹制遂虧蜀初闕三司之位以待天下賢人其卿士皆勲徳融茂大常杜瓊學通行修衛尉陳震忠惇篤粹孟光亮直著聞皆良幹也但光好指摘利病大長秋南陽許慈普記載籍典掌舊文光禄来敏荆楚名族東宫耆宿以舉措不慎失勢事者指當世美名不及特進大常廣漢鐔承光禄勲河東裴雋也其朝臣尚書巴西司學義陽胡博僕射巴西姚伷侍中汝南陳祗並讃事業以故丞相長史向朗為左將軍朗自去長史優遊無事乃鳩合經籍開門誘士講論古義不豫世務是以上自執政下及童冠莫不宗敬焉冬十有一月大司馬琬卒諡曰恭侯中書令董允亦卒超遷蜀郡太守南陽吕乂為尚書令進姜維為衛將軍與大將軍禕並録尚書事維出隴西與魏將郭淮夏侯霸戰尅之十年涼州胡王白虎文治無戴等率衆降魏將軍維徙之繁縣汶山平康夷反維復討平之過見廖立意氣自若維還假節十一年鎮北將軍王平卒以中監軍胡濟為驃騎將軍假節領兖州刺史代平督漢中事平始出軍武不大知書性警朗有思理與馬忠並埀事績平同郡勾扶亦果壯亞平官至右將軍封宕渠侯後張翼與襄陽廖化並為大將故時人為語曰前有何勾後有張廖平本養外家何氏後復姓夏五月大将軍禕出屯漢中十二年魏嘉平元年也魏誅大將軍曹爽右將軍夏侯霸來降淵子也拜車騎將軍四月大赦秋衛將軍維出雍州不克將軍勾安李韶降魏十三年衛將軍維復出西平不克而還十五年呉主孫權薨子亮立來告赴之如古義也立子琮爲西河王命大將軍禕開府尚書令吕乂卒以侍中陳祗守尚書令加鎮軍將軍十六年春正月朔魏降人郭脩因賀㑹手刃殺大將軍費禕於漢壽諡曰敬侯禕當國名畧與蔣琬比而功業相繼雖典戎于外慶賞刑威咸咨於已承諸葛之成規因循不革故能邦家和壹自禕殁後閹宦并權衛將軍維自負才兼文武加練西方風俗謂自隴以西可制而有禕常裁制至是無憚屢出師旅功績不立政刑失錯矣四月維將數萬攻南安魏雍州刺史陳泰救之維糧盡還十七年魏正元元年也春衛將軍維督中外軍事大赦夏六月維復出隴西隴西狄道長李簡舉縣降維圍襄武魏大將徐質救之維拔狄道河間臨洮三縣民入蜀居于綿竹及繁是歲魏帝齊王廢高貴鄉公即祚十八年春衛將軍維復議出征征西大將軍張翼廷爭以國小不宜黷武維不聽夏率車騎將軍夏侯霸及翼出狄道大破魏雍州刺史王經于洮西經衆死數萬經退保狄道城翼曰可矣不宜進或毁此成功為蛇畫足維必進魏征西將軍陳泰救狄道維退駐鍾題十九年魏甘露元年也春進衛將軍姜維為大將軍秋八月維復出天水至上邽鎮西大將軍胡濟失期不至大為魏將鄧艾所破死者衆士庶由是怨維而隴以西亦無寧歲冬維還謝過引負求自貶削於是以維為後將軍行大将軍事立子瓚為新平王大赦二十年春大赦魏征東大將軍諸葛誕以淮南叛連呉魏分關中兵東下後將軍姜維復從駱谷出長城軍芒水與魏大將司馬望鄧艾相持景耀元年維以誕破退還成都復拜大將軍史官言景星見大赦改元宦人黄皓與尚書令陳祗相表裏始豫政皓自黄門丞至今年為奉車都尉中常侍姜維雖班在祗右權任不如蜀人無不追思董允者時兵車久駕百姓疲弊太中大夫譙周著仇國論言可為文王難為漢祖人莫察焉征北大將軍宗預自永安徵拜鎮南將軍領兖州刺史以襄陽羅憲為鎮軍督永安事呉大臣廢其主亮立孫休來告難如同盟也大將軍維議以為漢中錯守諸圍適可禦敵不獲大利不若退據漢樂二城積穀堅壁聽敵入平且重關鎮守以御大敵攻關不克野無散穀千里懸糧自然疲退此殄敵之術也於是督漢中胡濟却守漢壽監軍王含守樂城䕶軍蔣舒守漢城又於西安建威武衛石門武城建昌臨逺皆立圍守二年夏六月立子諶為北地王恂為新興王䖍為上黨王以征西張翼為左車騎將軍領冀州刺史廣武督廖化為右車騎將軍領并州刺史時南郡閻宇為右衛大將軍秋八月丙子領中䕶軍陳祗卒諡曰忠侯祗在朝上希主指下接閹宦後主甚善焉以僕射南鄉侯董厥為尚書令三年魏景初元年也秋九月追諡故前將軍關侯曰忠義侯車騎將軍張飛曰桓侯驃騎將軍馬超曰威侯軍師龎統曰靖侯後將軍黄忠曰剛侯是歲魏帝髙貴鄉公卒常道鄉公即帝位四年春三月追諡故鎮軍趙雲曰順平侯冬十月大赦拜丞相亮子武鄉侯瞻中都䕶衛將軍遷董厥輔國大將軍與瞻輔政以侍中義陽樊建守尚書令自瞻厥用事黄皓秉權無能正矯者惟建特不與皓和好徃來而祕書令河南郄正與皓比屋周旋皓從微至著既不憎正又不愛之官不過六百石常免於憂患五年春正月西河王琮卒大將軍維惡皓之恣擅啓後主欲殺之後主曰皓趨走小臣耳徃者董允切齒吾常恨之君何足介意維本羇旅自託而功効無稱見皓枝附葉連懼於失言遜辭而出後主勅皓詣維陳謝維誘皓求沓中種麥以避内逼皓承白後主秋維出侯和為魏將鄧艾所破還駐沓中皓協比閻宇欲廢維樹宇故維懼不敢還六年春魏相國晉文王命征南將軍鄧艾鎮西將軍鍾㑹雍州刺史諸葛緒益州刺史師纂五道伐蜀大將軍姜維表後主求遣左右車騎張翼廖化督諸軍分䕶陽安關口及隂平橋頭黄皓信巫鬼謂敵不來啓後主寢其事羣臣不知夏艾將入沓中㑹將向駱谷蜀方聞之遣張翼董厥為陽安關外助廖化為維援繼大赦改元炎興比至隂平聞諸葛緒向建威故待月餘維為鄧艾所摧還隂平鍾㑹圍樂城遣别將攻關分將蔣舒開門降督傅僉奮戰而死冬㑹以樂城不下徑長驅而前翼厥之至漢壽也維化捨隂平還保劒閣拒㑹㑹不能尅糧運懸逺議欲還而鄧艾由隂平景谷傍入後主又遣都䕶諸葛瞻督諸軍距艾至漢涪不進尚書郎黄崇權子也勸瞻速行固險無令敵得入坪言至流涕瞻不從前鋒已破艾徑至涪瞻退保綿竹艾書誘瞻曰若降者必表封琅琊王瞻怒殺艾使戰于綿竹瞻軍敗績瞻臨陣死崇及羽林督李球尚書張遵皆必死没命瞻長子尚歎曰父子荷恩不早斬黄皓以致敗國殄民用生何為乃驅馬赴魏軍而死百姓聞艾入坪驚迸山野後主㑹羣臣議欲南入七郡或欲奔呉光禄大夫譙周勸降魏魏必裂土封後主後主從之遣侍中張紹駙馬都尉鄧良齎璽綬奉牋詣艾降北地王諶恚憤殺妻子而後自殺艾至成都後主轝櫬面縳銜璧迎之艾親釋其縳受其璧焚其櫬承制拜驃騎將軍使止其宫執黄皓將殺之受賂而赦之諸圍守皆奉後主勅令乃下姜維未知後主降謂且固城素與執政者不平欲使其知衛敵之難而後逞志乃􅂞由巴西出郪五城㑹被後主手令乃投戈釋甲詣鍾㑹降于涪軍士莫不奮擊以刃斫石明年春正月㑹構艾檻車見徵㑹圖異計竒維雄勇還其節益本兵謂長史杜預曰姜伯約比中州名士夏侯泰初諸葛公休不如也鄧艾亦謂蜀人曰姜維雄兒也㑹維每出同車坐同席將至成都自稱益州牧以叛恃維為爪牙欲遣維為前將軍伐中國維既失䇿又知㑹志廣教㑹誅北諸將諸將既死徐欲殺㑹盡坑魏兵還後主宻書通後主曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明魏太后崩㑹命將發喪因欲誅之諸將半入而南安太守胡烈等知其謀燒成都東門以襲殺㑹及維張翼後主太子璿等軍衆抄掠數日乃定三月後主舉家東遷洛陽丁亥封安樂縣公食邑萬戸賜絹萬疋奴婢百人他物稱此兄弟子孫為郡都尉侯者五十餘人以譙周全國濟民封城陽亭侯秘書令郄正舎妻子隨侍後主相導威儀封關内侯於是尚書今樊建殿中督張通侍中張紹亦封侯劉氏凡得蜀五十年正稱尊號四十二年蜀郡太守王崇論後主曰昔世祖内資神武之大才外拔四屯之竒將猶勤而獲濟然乃登天衢車不輟駕坐不安席非淵明𢎞鑒則中興之業何容易哉後主無常之君雖有一亮之經緯内無䟽附之謀外無爪牙之將焉可苞括天下也又曰鄧艾以疲兵二萬逺出江由姜維舉十萬之師案道南歸艾為成禽禽艾已訖復還拒㑹則蜀之存亡未可量也乃迴道之巴逺至五城使艾輕進徑及成都兵分家滅已自招之然以鍾㑹之智畧稱為子房姜維陷之莫至尅㨗籌笇相應優劣惜哉愚以為維徒能謀一㑹不慮窮兵十萬難為制御美意播越矣譔曰諸葛亮雖資英霸之能而主非中興之器欲以區區之蜀假已廢之命北吞强魏抗衡上國不亦難哉似宋襄求霸者乎然亮政脩民理威武外振爰迄琬禕遵脩弗革攝乎大國之間以弱為强猶可自保姜維才非亮匹志繼洪軌民嫌其勞家國亦喪矣華陽國志卷七
