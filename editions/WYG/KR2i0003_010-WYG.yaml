front:
  text: 洽君子
  hash: sha256:169ccb1150797ea219d8dd96cce500c6fa73eef11c405c4269f1c07537990658
body:
  text: 云又史載散騎常侍常璩實勸李勢降桓温璩必作志者因續記此云華陽國志卷九欽定四庫全書華陽國志卷十上晉常璩撰先賢士女摠讚論含和誕氣人倫資生必有賢彦為人經紀宣徳達教博化篤俗故太上立徳其次立功其次立言品物焕炳彜倫攸敘也益梁爰在前代則夏勲配天而彭祖體地及至周世韓服將命蔓子忠堅然顯者猶鮮豈國史簡闕亦將分以秦楚希預華同自漢興以來迄乎魏晉多士克生髦俊葢世愷元之疇感于帝思於是璽書交馳於斜谷之南束帛戔戔于梁益之鄉或迺龍飛紫閣允陟璿璣亦有磐桓利居經綸皓素其躭懐道術服膺六藝弓車之招旃旌之命徴名聘徳忠臣孝子烈士賢女髙劭足以振𤣥風貞淑可以方蘋蘩者奕世載美是以四方述作來世志士莫不仰髙軌以咨詠憲洪猷而儀則擅名八區為世師表矣故耆舊之篇較義史漢而今志州部區别未可摠而言之用敢撰約其善為之述讚因自注解甄其洪伐尋事釋義略可以知其前言往行矣蜀郡士女嚴平恬泊皓然沉冥嚴遵字君平成都人也雅性澹泊學業加妙專精大易躭於老莊常卜筮於市假蓍龜以教與人子卜教以孝與人弟卜教以悌與人臣卜教以忠於是風移俗易上下慈和日閱得百錢則閉肆下簾授老莊著指歸為道書之宗揚雄少師之稱其徳杜陵李強為益州刺史謂雄曰吾真得君平矣雄曰君但可見不能屈也強以為不然至州修禮交遵遵見之強服其清髙而不敢屈也歎曰揚子雲真知人也年九十卒雄稱之曰不慕夷則由矣不作茍見不治茍得久幽而不改其操雖隨和何以加諸仲元抑抑邦家儀形李𢎞字仲元成都人少讀五經不為章句處陋巷淬勵金石之志威儀容止邦家師之以徳行為郡功曹一月而去子贅以見辱殺人太守曰賢者之子必不殺人放之贅自以枉語家人𢎞遣亡命太守怒讓𢎞𢎞對曰贅為殺人之賊明府私𢎞枉法君子不誘而誅也石碏殺厚春秋譏之孔子稱父子相隠直在其中𢎞實遣贅太守無以詰也州命従事常以公正諫爭為志揚子雲稱之曰李仲元為人也不屈其志不累其身不夷不恵可否之間見其貌者肅如也觀其行者穆如也聞其言者愀如也非正不言非正不行非正不聽吾先師之所畏子雲𤣥達焕乎𢎞聖揚雄字子雲成都人也少貧好道家無擔石之儲十金之費而晏如也好學不為章句初慕司馬相如綺麗之文多作詞賦車騎將軍王音成帝叔舅也召為門下史薦待詔上甘泉羽獵賦遷侍郎給事黄門雄既升祕閣以為辭賦可尚則賈誼升堂相如入室武帝讀大人賦飄飄然有凌雲之志不足以諷諫乃輟其業以經莫大於易故則而作太𤣥傳莫大於論語故作法言史莫善於蒼頡故作訓纂箴諫莫美於虞箴故作州箴賦莫𢎞於離騷故反屈原而廣之典莫正於爾雅故作方言初與劉歆王莽董賢同官並至三公雄歴三帝獨不易官年七十一卒自劉向父子桓譚等深敬服之其𤣥源淵懿後世大儒張衡崔子玉宋仲子王子雍皆為注解吳郡陸公紀尤善於𤣥稱雄聖人雄子神童烏七嵗預雄𤣥文年九嵗而卒林生清寂莫得而名林閭字公孺臨邛人也善古學古者天子有輶車之使自漢興以來劉向之徒但聞其官不詳其職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同主海内之音韻使人主居髙堂知天下風俗也揚雄聞而師之因此作方言閭隠遯世莫聞也泛鄉忠貞社稷是經進賢為國稽攷典刑愛莫助之身殞朝傾何武字君公郫人也初以對䇿甲科為郎歴揚兖州刺史司𨽻校尉京兆尹清河楚沛太守廷尉御史大夫成帝初具三公拜大司空封泛鄉侯為人忠厚公正推賢進士在楚致兩龔在沛厚兩唐臨司𨽻致茂陵何並居公位進辛慶忌皆世名賢臨州郡雖無赫赫之名及去民思之才雖不及丞相薛宣翟方進而正直過之哀帝即位以朱博趙𤣥為公卿用事免官諫大夫鮑子都亟言訟之丞相王嘉亦以為慨帝復徵武為御史大夫徙前將軍時大司馬新都侯王莽避帝外家丁𫝊氏遜位亦以列侯見徵哀帝詔博舉太常莽従武求舉武以莽奸人之雄不許哀帝崩王太皇太后莽姑也即日引莽入收大司馬董賢印綬詔舉大司馬丞相孔光等逼王氏皆舉莽武與左將軍公孫禄謀曰莽五父世朝權傾人主必危劉氏乃舉禄禄亦舉武太后不従用莽為大司馬莽諷有司劾奏皆免武就國後莽寖盛遂為宰衡安漢公欲圗簒漢憚武與其叔紅陽侯王立不従元始三年因吕寛吳章事檻車徵武武自煞衆咸寃之莽欲厭衆心諡武曰刺侯子况嗣平帝崩莽因居攝後僭王位叔文播教變風為雅道洽化遷我寔西魯張寛字叔文成都人也蜀承秦後質文刻野太守文翁遣寛詣博士東受七經還以教授於是蜀學比於齊魯巴漢亦化之景帝嘉之命天下郡國皆立文學由翁唱其教蜀為之始也寛従武帝郊甘泉泰畤過橋見一女子裸浴川中乳長七尺曰知我者帝後七車適得寛車對曰天有星主祠祀不齊潔則作女令見帝感悟以為揚州刺史復别地莽之妖世稱云七車張作春秋章句十五萬言長卿彬彬文為世矩司馬相如字長卿成都人也遊京師善屬文著子虚賦而不自名武帝見而善之曰吾獨不與此人同世楊得意對曰臣邑子司馬相如所作也召見相如相如又作上林賦帝恱以為郎又上大人賦以風諫制封禪書為漢辭宗官至中郎將世之作辭賦者自揚雄之徒咸則之王淵豔麗蔚若華圃王褒字子淵資中人也以髙才文藻侍宣帝初為王襄作樂職中和頌宣帝時又上甘泉洞簫賦帝善之令宫人誦之為諫大夫卒子山翰藻遺篇有厚楊終字子山成都人也年十三已能作雷賦通屈原七諫章後坐太守徙邊作孤憤詩明帝時與班固賈逵並為校書郎刪太史公書為十餘萬言作生民詩又上符瑞詩十五章制封禪書著外傳十二卷章句十五萬言皆傳於世者少遷猛毅埀勲三邦陳立字少遷臨邛人也成帝時牂柯有亂將軍王鳯薦立為太守克平禍亂徙守巴郡秩中二千石治有尤異又徙天水太守為天下最天子賜黄金四十斤入為左衛護軍世公賦政祥瑞來同王阜字世公成都人也太守第五倫察舉孝亷為重泉令有鸞鳥集于文學十餘日遷益州太守神馬出滇池河甘露降白烏見民懐之如父母猗歟文父叡發幼童徳澹㑹稽道崇辟雍張霸字伯饒諡曰文父成都人也年數嵗以知禮義諸生孫林劉固段著等宗之移家其宇下啓母求就師學母憐其稚對曰饒能故字伯饒也為㑹稽太守撥亂興治立文學學徒以千數風教大行道路但聞誦聲百姓歌詠之致達名士顧奉公孫松畢海胡毋官萬虞先王演李根皆至大位在郡十年以有道徵拜議郎遷侍中遂授霸五更尊禮於文學年老卒塟河南少府委遲作卿作師趙典字仲經成都人也太尉戒孫也與潁川李膺等並號八俊三為侍中自樂禄俸施貧方授國師未拜病卒何楊研神貫奥入微何英字叔俊郫人也楊由字哀侯成都人也二子學通經緯英著漢徳春秋十五卷孫汶字景由亦深學初徵上日食盗賊起有効為謁者京師旱請雨即澍遷犍為屬國著世務論三十篇卒楊由為太守亷范文學范稱能治由言當有賊發頃之廣柔羌反殺長吏姚超鄉人冷豐齎酒候之值客未内由為知其多少又言人當致菓其色赤黄果有送甘橘者大將軍竇憲従太守索雲氣圗由諫莫與尋憲受誅其明如此著書十篇而卒司農明允國憲是維任昉字文始成都人也初為葉令治奸賊七十餘人遷梁相尚書令清身檢下大將軍梁冀憚之出為魏郡徙平原嵗出租稅百萬冀誅復入為尚書令司𨽻校尉遷大司農卒弟愷徐州刺史亦有治名昉父循字伯度為長沙太守得其父時為五官事在精通也翁君美秀牧後寤機何霸字翁君司空武兄也為郡户曹刺史王尊將之官移諸郡不得遣迎太守唯霸白宜往太守遣霸尊大怒霸對曰太守遣霸非修敬也以去京師久遲知朝廷起居耳尊遽下車持節對之因竒霸容止辟為别駕舉秀才為屬國中郎將弟闕名潁川太守兄弟五人皆有名伯騫推賢求善如飢柳宗字伯騫成都人也初結九友共學號九子及為州郡右職務在進賢拔致求次方張叔遼王仲曽殷智孫等終至牧守州里為諺曰得黄金一笥不如為伯騫所議舉茂才為陽夏太守文侯顒卬極位台衡文侯趙戒字志伯少府典祖也父定以遊俠稱戒順桓帝之世歴司徒太尉登特進屢居公輔免憂患于無妄之世告歸于蜀薨家太尉頡頏志振頽綱趙謙字彦信戒孫也歴位卿尹初平元年為太尉時董卓秉政欲遷天子長安謙與司空荀爽固諫卓不聽以為車騎將軍奉大駕西幸封洛亭侯拜司𨽻校尉忤卓㫖免討白波賊有功封侯進司徒免拜尚書令太僕三年薨諡曰忠侯司徒繼踵僶俛權横趙温字子柔謙弟以侍中與同輦西遷封江南亭侯兄亡初平四年拜司空未朞進司徒當世榮之時車騎將軍李傕與董承張濟等爭權數遷移天子温以書切責於傕天子聞為寒心尋曹公入徙天子都許政出諸侯禮待温居公位十五年建安十三年薨猶操道柄董李是讓讓責也董卓李傕凶擅謙温干之初文侯與李固胡廣議立清河王蒜而冀欲立蠡吾趙戒脅而従之使李固枉死君子以為卓傕之惡甚於梁冀謙摩卓之牙温弄傕之爪雖逼權勢以道陳訓賢其祖逺矣侍中授命分節亦章常洽字茂尼江原人也自荆州刺史遷京兆尹侍中長水校尉以兵衛大駕西幸傕等作難常侍衛天子左右為傕所殺蠻夷猾擾倡亂南疆子恭要傳醜穢于攘楊竦字子恭成都人也永初中越嶲永昌夷反殘破郡縣衆十萬餘刺史張喬以竦勇猛授従事任平南中竦先以詔書告喻不服乃加誅殺虜三萬餘人獲生口千五百人財物四千萬降夷三十六種舉正奸濁長吏九十人黄綬六十人南中清平㑹被傷卒喬舉州弔贈列畫東觀伯春孟元匡正時君張充字伯春李字孟元江源人也充為治中従事時刺史恃豪每見従事布席地坐已自安髙床上充入閤不肯進刺史悟乃更禮従事刺史辟公孫特大姓犍為李威橋稚充曹闕事節時有水灾倫受刺史指以漢中斗平不足表聞固争之後刺史至與倫不平求郡短劾倫不言水灾對以詔書上災異不得由州倫遷司空辟掾居希切説文古字㣲也始出今作㡬楊羅為小遺愛在民楊班字仲桓成都人也羅衡字仲伯郫縣人也俱師徴士何初山班為不韋茂陵令治化浹洽徙西城閬中令號時名宰衡為萬年令路不拾遺人家牛馬皆繫道邊曰屬羅公三府爭辟拜廣漢長二縣皆為立祠小伯温恭預圗息紛陳湛字小伯成都人也歴數縣令民皆懐之州辟治中従事廣漢太守遣子詣州修歡交使君欲納湛諫不可失羔羊義使君従之後有言州郡私交者考之無得乃明也孟由至孝遐棄晞風禽堅字孟由成都人也父信為縣史越嶲為夷所得傳賣歴十一種去時堅方姙六月生母更嫁堅壯乃知父湮沒鬻力傭賃求碧珠以求父一至漢中三出徼外周旋萬里經六年四月突瘴毒狼虎乃至夷中得父相見悲感夷徼哀之即將父歸迎母致養州郡嘉其孝召功曹辟従事列上東觀太守王商追贈孝亷令李苾為立碑銘迄今祠之仲圼免師仲圼成都人也少受學於嚴季后季后為汶江尉書呼仲圼仲圼許十月往㑹夷反斷道仲圼期於往經渡六千㡬死數年卒得至汶江為季后陳䇿俱得免難逺近歎之叔本慕仁任末字叔本繁人也與董奉徳俱學京師奉徳病死推鹿車送其喪師亡身病齎棺赴之道死遺令勑子載喪至師門敘平生之志也伯禽證將朱普字伯禽廣都人也為郡功曹太守與刺史王冀有隟枉見劾普詣新都獄掠笞連月肌肉腐臭惡同死人證太守無事勑其子曰我死載喪詣闕使天子知我心事得情理普以烈聞文寺代君李磬字文寺嚴道人也為長章表主簿旄牛夷叛入攻縣表倉卒走鋒刃交至磬傾身捍表謂虜曰乞煞我活我君虜乃煞之表得免太守嘉之圗象府庭在三義敦終始可稱人生于三事若一君父師也言人靡不有初鮮克有終普磬可謂能終始也炎光中微巨述僭亂炎火光也漢以火徳王自髙祖至平帝十二世國嗣三絶平帝早崩安漢公王莽字巨君遂簒天子位稱新室皇帝而茂陵公孫述字子陽為莽導江卒正遂僭號于蜀章王刎首章明字公孺新繁人也王皓字子離江原人也明為太中大夫莽簒位歎曰不以一身事二主遂自煞皓為美陽令去莽歸蜀公孫僭號使使聘之皓乃自刎以頭付使者述慙怒誅其妻子侯剛哭漢剛字直孟新繁人也為郎見莽簒位佯狂負木斗守闕號哭莽使人問之對曰漢祚無窮吾寧死之不忍事非主也莽追煞之公卿絶脰亦蹈節貫王嘉字公卿江原人為郎去莽還留蜀公孫述先閉其妻子使人徵之嘉聞王皓死歎曰吾後之哉亦自煞述慙貰其妻子羅生美至思濟艱難述方遂非殘彼貞榦羅衍字伯紀成都人也為述郎說述尚書解文卿鄭文伯使諫述降漢為子孫福解鄭従之述怒閉二子於薄室六年二子守志不回遂以幽死衍察孝亷徵博士劉主割據資我英俊鴻臚淵通與道推運何宗字彦英郫縣人也通經緯天官推步圗䜟知劉備應漢九世之運讚立先主為大鴻臚方授公輔㑹卒君肅矯矯頴𩔖倬羣何祗字君肅宗族人也初犍為楊洪為太守李嚴功曹去郡數年以為蜀郡嚴在官祗為洪門下書佐去郡數年以為廣漢洪猶在官是以西土咸服諸葛亮之能攬拔秀異也祗徙犍為太守卒輔漢朗捷服時之懃張裔字君嗣成都人也汝南許文休稱其才鍾元常輩也為輔漢將軍丞相長史丞相北征居府統事足食足兵太常清宻邃逺鈎深杜瓊字伯瑜成都人也師事任安粗通經緯術藝為太常沉黙慎宻稱諸生之淳休休衆彦殊途同臻金聲玉振蜀之球琳休休美也衆彦言此四十三人也易曰殊塗同歸百行齊致貴於流光顯稱揚名埀世此四十三人者雖立行不同俱以垂美如金玉之音器為世名寳述蜀郡人士敬司穆穆暢始𤣥終敬司馬氏女五更張伯饒妻也霸前妻有三男一女敬司産一男撫教五子恩愛若一霸卒葬河南敬司與諸子還蜀疾病遺令告諸子曰舜葬蒼梧二妃不従汝父在梁吾自在蜀亦各其志勿違吾勑也遂葬蜀子光超禀母教為聘士也叔紀婉娩十媛仰風叔紀霸女孫也適廣漢王尊至有賢訓事姑以禮生子商海内名士廣漢周幹古朴彭勰漢中祝龜為作頌曰少則為家之孝女長則為家之賢婦老則為子之慈親終温且恵秉心塞淵宜諡曰化明恵母公乘氏張兩髦義崇公乘㑹妻廣都張氏女也夫早亡無子姑及兄弟欲改嫁之張誓不許而言之不止乃斷髮割耳養㑹族子事姑終身助陳撫孩節篤分充助陳臨邛陳氏女犍為揚鳳珪妻也鳳珪亡養遺生子守節兄弟必欲改嫁乃引刀割咽宗族駭之㡬死遂全其義二常焭焭頽搆再隆元常靡常江原人也元常廣都令常良女適廣漢便敬賓早亡元常無子養賓族子父母欲嫁乃祝刀誓志而死靡常仲山女適成都殷仲孫家遭疫氣死亡惟靡常在年甫十八收葬諸喪養餘生子立美成家紀常哀哀精感昭融紀常常侍常洽女趙侯夫人也父遇害在長安一兄皆先沒遣父門生瞿登張順迎喪時冦賊蜂起晝夜悲哀順登得將喪無恙還時人皆以紀常精誠所感貢羅誓志貢羅郫羅倩女景竒妻也竒早亡無子父愍其年壯以許同郡何詩貢羅白晝誓父不還家父使詩乃白州州告縣逼遣之羅乃訴州刺史髙而許之玹何忘生玹何郫何氏女成都趙憲妻也憲早亡無子父母欲改嫁何恚憤自幽乃不食旬日而死郡縣為立石表昭儀徇身昭儀新繁張氏女廣漢朱叔賢妻也賢為郡督郵建安十九年劉主圍劉璋於成都賢坐謀外降璋以昭儀配兵將見逼昭儀自殺三軍莫不哀歎二姚見靈廣柔長郫姚超二女姚妣饒未許嫁隨父在官値九種夷反殺超獲二女欲使牧羊二女誓不辱乃以衣連腰自沉水中死見夢告兄慰曰姊妹之喪當以某日至溉下慰寤哀愕如夢日得喪郡縣圗象府庭峨峨淑媛表圗銘旌淑善媛婉娩也言此十二女皆圗象列傳述蜀郡列女右蜀郡士女讚第一凡五十五人四十三人士十二人女華陽國志卷十上欽定四庫全書華陽國志卷十中晉常璩撰廣漢士女講學沖􅃉洙泗是稀𦙍帝紹聖庶熙疇咨楊宣字君緯什邡人也少受學於楚國王子張天文圖緯於河内鄭子侯師事楊翁叔能暢鳥言長於灾異教授弟子以百數成帝徵拜諌大夫帝無嗣宣上封事勸宜以定陶恭王子爲太子帝從之出宣爲交州牧太子即位爲哀帝拜河内太守徵太倉令上宜封周公孔子後帝從之封周公孫相如爲褒魯侯孔子後孔均爲褒成侯又薦遼東王綱瑯琊徐吉太原郭越楚國龔勝等宜讃隆時雍平帝時命持節爲講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿析虎命邦綽有餘徽鄭純字長伯郪人也爲益州西部都尉處地金銀琥珀犀象翠羽出作此官者皆富及十世純獨清亷毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之明帝嘉之乃改西部爲永昌郡以純爲太守在官十年卒列畫頌東觀三老泱泱實作父師楊綂字仲通新都人也事華里先生炎高高戒綂曰漢九世王出圖書與卿適應之建武初天下求通内䜟二卷者不得永平中刺史張志舉綂方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光禄大夫以年老道深養於辟雍授几杖爲三老卒内讖二卷竟未詳平仲涉道殆乎庶幾王祐字平仲郪人也少與雒高士張浮齊名不應州郡之命司𨽻校尉陳紀山名知人稱祐天下之高年四十二卒弟獲志其遺言撰王子五篇東觀郞李勝文章士也作誄方之顏子列畫學宫獲一作灌文父明洞探賾索微楊序字仲桓綂仲子也道業侔父三司及公車連徵辭拜侍中上言四方反荆揚交州當兵起人民疫蝗洛陽大水宫殿當灾三府當免近戚謀變皆効驗大將軍梁冀秉權自退去授門徒三千人本初元年及建和中特徵聘不行年八十三卒天子痛惜詔諡曰文父弟子雒昭約節宰綿竹寇懽文儀蜀郡何萇幼正侯祈升伯巴郡周舒叔布及任安董扶等皆徵聘辟舉馳名當世元章𤣥泊韜光匿耀段翳字元章新都人也明經術妙占未來常告大渡津口曰某日當有諸生二人荷擔問翳舍處者幸爲吿之後竟如其言又有人從冀州來學積年自以精究翳術辭去翳爲筒作書封頭與之告曰有急發之至葭萌爭津吏撾從者頭諸生發筒筒中有書曰到葭萌爭津破頭以膏褁之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子稚子弈弈古之畏愛王渙字稚子郪人也初爲河内温令路不拾遺卧不閉門民歌之曰王稚子世未有平徭役百姓喜遷兗州刺史部中肅清徵拜侍御史洛陽令聰明惠斷公平廉正抑强扶弱化行不犯發姧擿伏思若有神京華宻静權豪畏敬元興元年卒百姓痛哭二縣弔祭行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦歌之爲立祠天子悼惜每下詔書德令必賜後嗣與卓茂等爲伍敬伯愷悌樹德播惠王堂字敬伯郪人也初臨巴郡進賢達士舉孝子嚴永隱士黄錯及張璊陳髦民爲立祠徙任左扶風政教嚴明帝舅車騎將軍閻顯大將軍竇憲中常侍江京等囑託輒拒之白鹿見象不以爲祥徙魯相又徙汝南守舉陳蕃爲功曹應嗣司𨽻校尉號知人之鑑叔宰濟濟以禮進退馮顥字叔宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞叔雅初爲謁者威儀濟濟爲成都令遷越嶲太守所在著稱爲梁冀所不善冀風州追之隱居作易章句及刺奢說脩黄老恬然終日大匠竒暢妙監𤣥察盡言世規秪以隕越翟酺字子超雒人也少事段翳以明天官爲侍中尚書常見太史令孫懿歔欷涕泣曰圖書有賊臣孫登將以才智爲黄門開路君表相應之是以悽愴後爲京兆尹光禄大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之間薦故太尉龐參故司徒李郃明通三才忠正可以輔世所言每指利疾權貴誣酺及尚書令高堂芝交構免死著援神契經說卒家司𨽻聰敏奮名後葉郭賀字喬卿雒人也初爲太守黄幸戸曹幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽留詔殺之由是顯名太守蔡茂命爲主簿茂夢坐太極殿上得嘉禾三穗以問賀對曰明府位當至三公旬月茂遷司徒表賀明律令稍遷侍中尚書僕射司𨽻校尉荆州刺史明帝南巡狩善其治徵河南尹卒天子痛惜賜錢三十萬鐔蔡翩翩交友惟賢鐔顯字子誦郪人也蔡弓字子騫雒人也俱擕手共學冬則侍親春行受業與張霸李郃張皓陳禪爲友共師司徒魯恭顯又與王稚子同見察孝於太守陳司空歴豫州刺史光禄大夫侍中衛尉弓爲廬江太守徵拜郞而霸郃皓禪皆至公卿兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如揚雄之才明帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諫大夫樂安相後與劉珍共撰漢記孫􅂶有文才勝爲東觀郞著賦諫論頌數十篇憲父懸車王稚字叔起堂幼子也屢拒孝廉公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人録其本行諡曰憲父癸未詔書以安車聘請會已亡徵君肥遯馮信字季誠郪人也郡三察孝廉州舉茂才公府十辟公車再徵不詣公孫述時託目青盲𫝊婢姦其前陽不覺述卒以年老不出董任循志束帛戔戔董扶字茂安任安字定祖綿竹人也家居教授弟子自逺而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道爲侍中觀漢將亂求爲屬國還蜀安察孝及茂才公府辟公車徵皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表氾博提攜士彦王商字文表廣漢人也博學多聞州牧劉璋辟爲治中試守蜀郡太守荆州牧劉表大儒南陽宋仲子逺慕其名皆與交好許文休稱商中夏王景興輩也商勸璋攬竒拔雋甚善匡捄薦致名士安漢趙韙及陳寔盛先墊江龔楊趙敏黎景閬中王澹江州孟彪皆至州右職郡守又爲嚴李立祠正諸祀典在官一十年而卒超𩔖拔萃寔惟世信劉寵字世信綿竹人也出自孤微以明公羊春秋上計闕下見除成都令政教明肅時諸縣多難治乃換寵爲郫令又換郪安漢皆垂績還在成都遷牂柯太守初乘一馬之官布衣䟽食儉以爲教居郡九年乘之而還吏人爲之立銘王商陳實當世貴士皆與爲友節英亢烈仰訴鼎臣段恭字節英雒人也少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彦之章渤海紀叔陽遂明天文二卷東平虞叔雅學絕高當世遂遊於蜀恭以朋友禮待之後爲上計掾會有司劾太尉龐參兼舉茂才孝亷參性忠正亮直爲貴戚所擯以恚發病逺近稱寃恭不能耐其枉亢䟽表參忠直不當以讒佞傷毁忠正帝悟即日召西曹掾問疾尋羊酒慰勞參忠士遊孝淳感物悟神姜詩字士遊雒人也事母至孝母欲江水及鯉魚膾又不能獨食須隣母共之詩嘗供備子汲江溺死秘言遣學不使母知於是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比隣公孫述平後東精爲賊掠害不敢入詩里時大荒餓精致米肉與詩詩埋之永平三年察孝亷明帝詔曰大學入朝孝廉一切皆平之除江陽符長所居鄉皆爲之立祠少林陰德陽報是甄王忳字少林新都人也遊學京師見客舍有一書生疾困忳愍視奄忽便絕有金十斤忳以一斤買棺木九斤置棺下塟埋之後爲大度亭長有馬一疋馳入亭中又有繡被一領飛墮其前人莫識者郡縣以畀忳後乘馬到雒縣馬牽忳入它舍主人問忳所由得馬忳具說其狀并及繡被主人悵然曰卿何陰德而致此忳說昔埋書生事主人驚曰是我子也姓金名彦卿葬之大恩不報天彰卿徳耳辟舉茂才除郿令宿斄亭中數有人爲爲所殺忳上樓夜半有女子稱寃曰妾涪令妻也當之官宿此枉爲亭長所殺大小二十口埋在樓下奪取財物忳曰汝何故以恒殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召遊徼詰問具服即收同謀十餘人殺之送涪令喪還郡里當世稱之仲魚謙沖羊朞字仲魚郪人也父爲交州刺史卒官朞迎喪不敢取官舍一物郡三察孝亷公府辟州别駕皆不應太守尹奉棄刑名行禮樂請爲功曹刺史必欲借朞自佐不得已爲别駕後爲太守孫寶蔡茂祋諷功曹當欲渡津津吏滯停車待之三日將宿中亭中有縣吏引車避之爲野王令雲卿安貧朱倉字雲卿什邡人也受學於蜀郡張寧飡豆飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧恒以步行爲郡功曹每察孝亷羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式𤣥照折像字伯式雒人也其先張江爲武威太守封南陽折侯因氏焉父國爲鬱林太守家貲二億故奴姬八百人盡散以施宗族䘏贍親舊葬死弔喪事東平虞叔雅以道教授門人朋友自逺而至時人爲諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經孟宗當仁味道好施清風邁倫讃仲魚已下也杜眞字孟宗綿竹人誦書百萬言兄事翟酺酺免後尚書令與司𨽻校尉枉劾之復徵詣獄眞上章救之受掠笞六百獄中明酺無事京師壯之以漢道微散財施宗族不應公州辟命及辭長吏候迎每交於門乃斷髪以自絕漢儒請雨精感慶雲諒輔字漢儒新都人爲郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰不雨則欲自焚爲貪叨吏謝罪百姓言終暴雨韓揆義烈韓揆字伯彦綿竹人也爲令錡裒主簿値黄巾賊入界扶裒走入草中裒遣求隱翳處未還裒爲賊所得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而茍自活非忠乃自殺喬雲勇震左喬雲綿竹人也少爲左通所養爲子通坐任徒徒逃吏欲破通臏通無壯子故爲吏所侵喬雲時年十三喟然憤怒以銳刀殺吏解通將走令出追初聞以爲壯士及知小兒爲之流涕楊寛證將烈播友人寛字叔仲新都人父斌證令萬世太守祋諷以忠義壯聞寛爲郡吏鄉人馬閏章言太守王方寛與兄偕詣獄證之得理後方當遷南郡閏復章之寛乃發閏臨私事閏伏罪友人汝錕爲張明所殺寛怒縛明送錕家使自謝之也寗叔執仇寗叔字茂泰廣漢人與友人張昌共受業太學昌爲河南大豪吕條所殺叔殺條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍爲謝裒裒死負土成墳三年裒子爲人所殺鉗復其仇自拘武陽獄會赦免當世義之賈爲士死分侔虞朱賈祤字元集什邡人也雒孟伯元爲父復讎聞祤名徃投之雒縣追伯元蹤祤歎曰士以義遇我豈可倍哉殺雒縣必移什邡負我君乃自殺李勝言之以方虞卿魯之朱家郭玉通直蓋亦所脩郭玉字通直新都人也明方術􅇊妙用針作經方頌說官至太醫丞校尉爰迄劉氏司農含章爽朗璀粲觀國之光秦宓字子勑綿竹人也初隱遁不應州郡之命丞相亮領益牧以選爲别駕中郞將吳使張温將反命亮率百官饑之温與宓語荅問若響應聲辭義雅美温大敬服以爲蜀之有宓猶魯仲尼也遷長水校尉司農宓甚有通理弟子譙周具傳其業李王四子並作琳琅李朝字永南弟邵字偉南郪人也王士字義强從弟甫字國山文表諸弟也先主領牧朝爲别駕羣下上先主爲漢中王其文朝所造也後丞相亮府辟西曹掾亦有文才兄弟三人號三龍士歴宕渠犍爲益州太守甫善言議闕人流美稱自綿竹令爲州右職優遊容與特進太常鐔承字公文郪人也歴郡守州右職爲少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諌君刎首王累新都人也州牧璋從别駕張松計遣法正迎先主主簿黄權諌不納累爲從事以諫不入乃自刎州門以明不可鄭度進規忠謀莫受雖云天時抑由人咎度綿竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野糓是資急驅巴西梓潼民内涪水以南一切燒除野糓固壘待之彼請戰不許久無所資不過百日必當囘先主聞而惡之璋不納言雖在天亦由璋之愚永年負才自喪世主彭羕字永年廣漢人有俊才劉璋時坐事爲徒及先主入自託龎統爲州右職失主意左遷江陽太守羕望諸葛亮以爲心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時爲牛鞞長先主領牧爲從事正旦命行酒得進見讓先主曰振威以將軍宗室肺腑委以討賊元功未効先寇而滅邈以將軍之取鄙州甚爲不宜也先主曰知其不宜何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮爲請得免久之爲犍爲太守丞相參軍安漢將軍建興六年亮西征馬謖在前亮將殺之邈諌以秦赦孟明用霸西戎楚誅子玉二世不競失亮意還蜀十三年亮卒後主素服發哀三日邈上疏曰吕禄霍禹未必懷反叛之心孝宣不好爲殺臣之君直以臣懼其偪主畏其威故姦萌生亮身杖强兵狼顧虎視五大不在邊臣常危之今亮殞歿蓋宗族得全西戎靜息大小爲慶後主怒下獄誅之詵詵彦造或哲或友昭德音芳垂名厥後㧾讃此四十六人也述廣漢人士任母治内子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每爲賑䘏其弟子以慰勉其志於是安之門生益盈門龎行養姑婦師之先龎行姜詩妻也事姑晝夜紡績以給供養子汲江溺水死秘言遣詣學常作冬夏衣投水中託言寄與子詩呼妻使爲姑舂應命遲見遣不敢逺去遊於外供給因隣母致姑勑還依依義舊抗疏邦庭誠感世主徙女輟刑義舊狄道長姜穆女綿竹司馬雅妻也既許婚父坐事徙朔方雅就婚死雇人送其喪尋父母死朔方義舊獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女已許嫁不得從父母徙紀配斷指以章厥貞紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡已自有美色慮人求己作詩三章自誓心而求者猶衆父母將許乃斷指明情養子猛終義太守薛鴻圖象府庭彭王進娥殘體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡叔父欲改嫁非乃詣太守五方截髪自誓敬亦早亡和養孤守義蜀郡何玉因媒介求之凡曉諭以公族可憑和恚割其一耳季宰亦早亡父母欲改嫁進娥亦剪髪自誓各養子終義正流自沈水絜冰清正流廣漢李元女楊文妻也適文有一男一女而文沒以織履爲業父欲改嫁乃自沈水中宗族捄之幾死得免太守五方爲之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親過哀死福哀感終身父母欲改嫁乃自殺洪氏世胄由婦謙柔汝敦妻某敦兄弟共居有父母時財㛐心欲得妻勸送二兄敦盡讓田宅奴婢與兄自出居後敦耕得金一器妻復勸送二兄夫妻共往㛐性恡嗇謂欲借貸甚不悦及見金踊躍兄感悟即出妻讓財還弟弟不受相讓積年後並察孝亷世爲冠族思媚烈媛美稱惟休揔讃十一人也述廣漢列女右廣漢郡士女讃第三凡五十七人四十六人士十一人女犍爲士女王延河平纂禹之功王延世字長叔資中人也建始五年河決東郡氾濫兗豫四郡三十二縣沒官民屋舎四萬所御史大夫尹忠以不憂職致河決自殺漢史案圖緯當有能循禹之功在犍柯之資陽求之正得延世徵拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平封延世關内侯拜光禄大夫乃賜黄金百斤文伯習禮繼武孫通董鈞字文伯資中人也少受業於鴻臚王臨永平初議天地宗廟郊祀儀禮鈞與太常定其制又定諸侯王喪禮歴城門校尉五官中郞將以儒學貴稱繼叔孫通張公執憲克智克聰極位青紫寔作司空張皓字叔明武陽人也以文聰明辟大將軍掾遷尚書僕射彭城相進隱士閭丘遷等徵拜廷尉延光三年安帝將廢太子爲濟陰王皓與太常桓焉太僕來歴爭之安帝不許及安帝崩濟陰得立爲順帝以皓爲司空久之免後徵爲廷尉清河趙騰等坐謗訕當誅所引八十餘人皓以聖賢明義爭之咸稱平當子鸞司京桴鼓不鳴趙旂字子鸞資中人也初臨甘陵𢎞農郡甚善治民徵尚書遷司𨽻校尉時梁冀子弟放恣旂以法䋲之不敢爲非京師肅清桴鼓不鳴孟文翹翹平顯有成楊渙字孟文武陽人也以清秀博雅歴䑓郞相稍遷尚書中郞司𨽻校尉甚有嘉聲美稱伯邳正直耀祖揚聲楊凖字伯邳漢安縣人也初爲郡守太尉李固薦凖累世忠直拜尚書太傅陳蕃表爲河東入爲尚書令奏書治南陽太守曹麻潁川太守曹騰濟南太守孫訓等子弟依託形勢淫縱徵廷尉治罪訓梁冀婦家子也於是憚之又薦朱禹盛精滕延爲尚書陸稠爲郡守皆名士也桓帝即位拜河南尹遷司𨽻校尉冀叔父梁忠爲執金吾不朝正初劾奏之朝士服其公亮徙將作大匠翁君將命迺播其名楊莽字翁君武陽人爲功曹刺史王尊當之州移書諸郡不得遣迎惟犍爲遣莽何霸巴郡遣嚴尊尊大怒莽前對曰使君不使奉迎謙也太守承迎敬也謙敬上下之節不可廢也尊乃欣請辟别駕舉茂才官至揚州刺史奉君遯世費貽字奉君南安人也公孫述時漆身爲厲佯狂避世述破爲合浦守蜀中歌之曰節義至仁費奉君不仕亂世不避惡君脩身於蜀紀名亦足後世爲大族任公開明任永字君業僰道人也長厯數王莽時託青盲公孫述時累徵不詣子溺井中死見而不言妻淫於前面而不怪述平乃曰世適平目即清妻自殺光武徵之以年老不詣卒叔和順終杜撫字叔和資中人也少師事薛漢治五經教授門生千人太守王卿召爲功曹司徒辟不及聞公免必往承問東平憲王爲驃騎將軍辟西曹掾後罷爲王師在驃騎府者遣之數年乃去建初中為公車令數月卒作詩通議説弟子南陽馮良亦以道學徵聘君橋宻精趙松字君橋武陽人爲童子數咨問費貽及知其避世宻與周旋終不露之也述平舉茂才爲上黨太守英英四子利於居貞讃費貽以下皇漢㢮綱官人失紀文紀蹇諤表明臧否張綱字文紀司空皓子也在漢朝公平亷正權宦側目憚之漢安元年以光禄大夫持節與侍中杜喬循行州郡考察風俗出宫垣埋車先奏太尉桓焉司徒劉壽尸祿素餐不堪其職出城又奏司𨽻校尉趙峻河南尹梁不疑汝南太守梁乾等贓穢濁亂檻車送廷尉治罪天子以乾梁冀叔父貶秩免峻等又奏魯相寇儀儀自殺威風大行郡縣莫不肅懼還冀恨之出爲廣陵太守承叛亂後懷集撫䘏甚有治化在官十年卒子續爲尚書續弟方爲豫州牧子孫數世至大官白虜狂僭亂離斯圯孝仲縶馬社稷是死朱遵字孝仲武陽人也公孫僭號遵爲犍爲郡功曹領軍拒戰於六水門衆少不敵乃埋車輪絆馬必死爲述所殺光武嘉之追贈復漢將軍郡縣爲立祠建侯弔梁効志知己趙敦字建侯武陽人也初爲新都令德禮宣流三司及大將軍梁冀累辟終不詣冀辟書不絶後冀自殺使者監守不使人弔問敦獨往弔祭訖自拘有司天子赦之叔通敦孝石生江汜隗相字叔通僰道人也養母至孝母食欲江中正流水相冬夏汲之一朝有横石生正流中哀帝世察孝廉平帝世爲郞吳生致養亦感靈祉吳順字叔和僰道人也事母至孝赤烏巢其門甘露降其戸察孝廉永昌太守劉后初載實多良才季休忠亮經事能治楊洪字季休武陽人也先主領牧爲部屬從事及征漢中丞相亮表爲蜀郡太守先主疾病永安召亮東行漢嘉太守黄元反後主從其計克元封關内侯後爲中郞將校尉忠清欵亮亮甚信任之德山躭學道以光時伍梁字德山南安人也儒學雅尚州選迎牧諸葛亮爲功曹遷五官中郞將烈武作合度曠塗夷惜哉公舉帥直凌遲費詩字公舉南安人也先主領牧爲前部司馬羣臣勸先主稱尊號詩上疏曰殿下以曹操父子逼主簒盜故乃羇旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖獲子嬰猶尚推讓況未出門便欲自立耶以是左遷部永昌從事建興三年從丞相亮南征魏將李鴻來降說魏新城太守孟達欲背魏向蜀亮方北面欲招達爲外援欲與書詩進曰孟達小子昔事振威不忠後事先帝背叛反覆之人何足與書也亮嘿然詩終劉氏之世官位不盡其才君子以昭烈之𢎞曠武侯之明達詩吐直言猶尚凌遲況庸主昏世帥意直言而望肆効者哉文然簡略不從詭隨楊義字文然武陽人也輔漢將軍張裔薦爲丞相亮主簿大司馬蔣琬辟東曹掾歴二郡太守爲射聲校尉性簡略未曾以甘言加人酒後言笑多慢詞失大將軍姜維意爲維所廢延熙十八年作季漢輔臣讃在蜀書車騎怏怏與國安危張翼字伯恭文紀孫也以文武才幹歴征西鎭南大將軍封亭侯延熙十八年與大將軍姜維西征大破魏雍州刺史王經於狄道經衆死洮水者數萬人維欲進翼諫不可進必無功時維屢出隴西翼常庭爭以國小不宜黷武必爲蛇畫足不聽不得已每怏怏從行景耀元年遷左車騎將軍領冀州刺史蜀平後死猗猗衆偉芳烈名垂方德繹勲犍之瓊瑰述犍爲人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博妻也博後母文有母儀之德進楊則其教爲行閨門雍穆䍧柯太守李禕家亦假係每不和歎恨徒富貴學問不及博家也陽姬請父厥族䝉援克諧内愛訓及秀彦姬武陽人也生自寒微父闕坐事閉獄楊渙始爲尚書郞告歸郡縣敬重之姬爲處女乃邀道扣渙馬訟父罪言辭慷慨涕泣渙懇吿郡縣爲出其父因竒其才爲子文方聘之結婚大族二弟得仕宦遂世爲宦門後文方爲漢中太守以趙宣爲賢將察孝廉函封未定病卒姬秘不發先遣孝廉上道乃發喪宣得進用姬之力也後文方兄子伯邳爲司𨽻校尉時姬長子頴伯冀州刺史仲子頰二千石伯邳以稟叔母教迎在官舍每教邳政治伯邳欲舉茂才選有二人伯邳欲用老者嫌其年耄欲舉五方而其年幼以咨叔母勸舉方後趙宣爲犍爲五方爲廣漢姬尚在故吏之敬四時承問不絕周度割體貞節是全周度僰道人也相登妻十九登亡中牟令吳厚因人為子求之斷髮以誓志後人猶欲求之乃割其鼻養子早亡其妻左亦年十九遂俱守義世感歎婦姑之貞專其節操也敬姬沈淵誠烈邈然曹敬姬南安人也周紀之妻十七出適十九紀亡遺生子元餘服闋父母以許孫賔紿母病迎還知之自投水人赴之氣已絕一日一夜乃蘇息送依紀弟居訓導元餘號爲女學士年九十卒貞玦玉操彌久不刋貞玦字瓊玉牛鞞程氏女張惟妻也十九適惟未朞惟亡無子養兄子悅供養舅姑夙夜不怠資中王冲欲娶玦玦叔父肱荅以女志不可奪冲爲太守李嚴督郵嚴託縣遣孝義掾奉羔鴈宣太守命聘之玦乃自投水捄援不死後太守蘇高爲立表太守蜀郡闕遣仁恕掾論曰貞玦太守章陵劉威又爲作頌故稱述也韓姜自財后旌其寃韓姜僰人尹仲讓妻也二十讓亡服除資中董䑓因從事王爲表弟求姜不許䑓門生左習王蘇以爲姜可奪教姜家言母病迎還韓氏因逼成婚姜聞故自殺太守巴郡龔楊哀之殺習蘇以報姜死謝姬引決同穴齊窆姬南安人武陽儀成妻也成死以己年壯無子將葬乃預作殯殮具毒藥須夫棺入墓拊棺吞藥而死遂同葬縣以表郡郡言州州上尚書天子咨嗟下書每大赦賜家帛四疋蜀穀二石媛姜疋婦勉夫濟子授命囹圄義踰國士趙媛姜資中人盛道妻也建安五年道坐過夫婦閉獄子翔方年五歲姜謂道曰官有常刑君不得已矣妾在後何益君門戸君可同翔亡命妾代君死可得繼君宗廟道依違數日姜苦言勸之遂解脫給衣糧使去代爲應對度走逺乃吿吏殺之後遇赦父子得還道雖仕宦當世痛感終不更娶翔亦不仕耳黄帛求喪沉身中流靈精相感􅂝夫共浮黄帛僰道人張貞妻也貞受易於韓子方去家三十里船覆死貞弟求喪經月不得帛乃自往沒處躬訪不得遂自投水中大小驚睨積十四日持夫手浮出時人爲語曰符有先絡僰道帛求其夫天下無有其偶縣長韓子冉嘉之召帛子幸之爲縣股肱烈哉諸媛節稱義遵叙之讃此九女也述犍爲列女右犍爲士女讃第四凡三十人二十一人士九人女華陽國志卷十中欽定四庫全書華陽國志卷十下晉常璩撰漢中士女鄭真岳跱確乎其清鄭子真褒中人也𤣥静守道履至徳之行乃其人也教曰忠孝愛敬天下之至行也神中五徴帝王之要道也成帝元舅大將軍王鳳備禮聘之不應家谷口世號谷口子真亡漢中與立祠神中五徴未詳其義衛梁泥盤𤣥湛淵亭衛衡字伯梁南鄭人也少師事隠士同郡樊季齊以髙行聞郡九察孝亷公府州十辟公車三徴不應董扶任安從洛還過見之曰京師天下之市朝也足下猶之人耳幸其在逺以虚名屢動徴書若至中國則價盡矣衡笑曰時有儉易道有汙隆若樊季齊楊仲桓雖應徴聘何益於時乎茍無所則尼軻栖栖是以君平子真不屈其志豈予之徒也哉吾何虚假之有安扶服之敬其言也鄧公方到忠枉原情鄧公成固人也景帝時御史大夫晁錯患諸侯强大建議減削㑹吴楚七國謀反假言誅錯故吴相袁盎譛帝殺之拜盎太常使赦七國七國遂叛鄧公為謁者入言軍事問曰七國聞晁錯死罷兵不對曰吴王即山鑄錢煑海為鹽謀反積數十年錯患之故欲削弱為萬世策諸侯憂之計畫始行身死東市諸侯莫憚内杜忠臣之口外為諸侯報怨臣竊為陛下不取也帝歎息曰吾亦恨之武帝初為九卿博望致逺西南來庭張騫成固人也為人强大有謀能涉逺為武帝開西域五十三國窮河源南至絶逺之國拜校尉從討匃奴有功遷衛尉封博望侯於是廣漢縁邊之地通西南之塞豐絶逺之貨令帝無求不得無思不服至今方外開通騫之功也子游師生讒巧所傾張猛字子游騫孫也師事光禄勲周堪以光禄大夫給事中侍元帝帝當廟祭濟渭欲御樓船御史大夫薛廣徳當車免冠乞頸血汚車輪陛下不得廟祭矣帝以不悦猛進曰主聖則臣直今乘船危就橋安聖主不乘危故大夫言之帝曰曉人不當如是耶後與周堪俱以忠正為幸臣𢎞恭石顯所譛毁乍出乍徴堪平和猛卒自殺王孫養性矯𦵏厲生楊王孫成固人也治黄老家累千金厚自奉養臨終告其子曰我死躶𦵏以復吾真但為布囊盛尸入地七尺既下從足脫之以身親土其子不忍見王孫友人祁侯諌之王孫曰厚𦵏無益死者也夫僤財送死今日入明日發此真無異暴骸中原裹以幣帛隔以棺槨唅以珠玊後腐朽乃得歸土不可故吾欲早就真宅祁侯無以易卒躶塟如其言司徒監使術暢思精屢登上司七政是經李郃字孟節南鄭人也少明經術為郡候吏和帝遣使者二人微行至蜀宿郃候舎郃為出酒夜飲露坐郃問曰君來時寜知二使何日發來耶二人恠問之郃指星言曰有二使星入益部後一人為漢中太守命為功曹察孝遂馳名為尚書郎徙左丞稍遷至尚書僕射尚書令拜司空又進司徒清公直亮當世稱名順帝世薨炎精不頽朱明不揚太尉謇諤任國抜荒濯日暘谷將外扶桑惡直醜正漢道遂喪李固字子堅郃子也陽嘉二年以對䇿忠亢拜議郎大將軍梁商后父也表為從事中郎授荆州刺史值州部有亂至州先友賢者南陽鄭叔躬宋孝節零陵支宣雅表薦長沙桂陽太守趙歴已又奏上江夏南郡太守孔疇髙賜等臧穢州土自然安静徙太山太守克寜盜賊入為將作大匠多致海内名士南陽樊英江夏黄瓊廣漢楊厚㑹稽賀純光禄周舉侍中杜喬陳留楊倫河南尹存東平王惲陳國何臨清河房植等皆蒙徵聘轉大司農順帝崩太后臨朝拜太尉與后弟大將軍梁冀太傅趙峻並録尚書沖帝崩時徐揚有盜賊太后欲不發喪須召諸王至固争不可言國家多難宜立長君太后欲專權乃立樂安王為質帝質帝崩太后復與梁冀謀所立固與司徒南郡胡廣司空蜀郡趙戒書與冀引周勃霍光立文宣以安漢之䇿閻鄧廢立之禍言國統三絶期運厄㑹興崩之漸在斯一舉宜求賢王親近不可寢嘿也冀得書召公卿列侯議所立三公及鴻臚杜喬僉舉清河王蒜冀然之奏御太后中常侍曹騰私恨蒜説冀明日更議廣戒從冀固與喬必争蒜宜立中興才也且年長識義必厚于將軍冀不聴䇿免固喬嵗餘取下獄以無事出之京師市邑皆稱千萬嵗冀惡其為人所善更奏繫之固書與二公曰吾欲扶持漢室使之比隆文宣何圖梁將軍迷謬諸子曲從以吉物為凶成事為敗漢家衰微從是始矣將軍亦有不利吾雖死上不慙於天下不愧於人求義得義死復何恨遂自殺二公得書歎息流涕士民咸哀哭之桓帝無道冀尋受誅漢家遂微政在閹官無不思固也元修敦重威惠實亮張則字元修南鄭人也為牂柯太守威著南土永昌越嶲夷謀欲反畏則換臨其郡相諌而止號曰卧虎以戍狄勲遷護羌校尉徴拜扶風又換臨桂陽皆平盜賊巴郡板楯反拜隆集校尉鎮漢中徙梁州刺史又為魏郡太守所在稱治靈帝崩後大將軍袁紹表為長史不就丞相曹公拜度遼將軍子雅温恭見察文方趙宣字子雅南鄭人也出自寒微以温良􅀶雅太守犍為楊文方深器異之遂察孝亷官至犍為太守二珪琬琰三辰懸望趙瑤字元珪琰字稚珪凡七兄弟宣子也皆以令徳著聞瑤少有公望瑤始為緱氏袁趙二公相與書曰趙瑤在緱氏猛虎歸迹百里均耳叔平何難遷扶風太守徙蜀郡司空張温謂之曰昔第五伯魚徙蜀郡為司空掃吾第以待足下矣瑤曰諾尋換廣漢卒琰始為青州刺史部下清肅徙梁相徴拜尚書不就卒仲卿報友行義以理陳綱字仲卿成固人也少與同郡張宗受學南陽以母喪歸宗為安衆劉元所煞綱免喪徃復之值元醉卧還須醒乃殺之自拘有司㑹赦免三府並辟舉茂才拜𢎞農太守初至有兄弟自相責引退是後無訟者在官九年卒天子痛惜賜家錢四十萬伯度𤣥鏡榮辱屑已李法字伯度南鄭人也桓帝時為侍中光禄大夫數亢表宦官泰盛椒房泰重史官記事無實録之才虚相褒述必為後笑帝怒免為庶人恬然以咎失為己責乆之徴拜汝南太守遷司𨽻校尉湛然無自得之容徳公在林懸象垂晷既沖雲清荀張儀准李燮字徳公太尉固子也父死時二兄亦死燮為姊所遣隨父門生王成亡命徐州傭酒家酒家知非常人以女妻之延熹二年梁冀誅後月經陽道暈五車史官上書昔有大星升漢而西捲舌揚芒迫月熒惑犯帝坐則有大臣枉誅星在西方太尉固應之今暈如之宜有赦命録其遺嗣以除此異於是下赦燮得返舊四府並辟公車徴議郎與趙元珪潁川賈偉節荀慈明張伯慎為友伯慎為潁川太守與慈明交相言論偉節與焉京師以為臧否伯慎問趙元珪曰徳公所言何元珪曰無言也伯慎追嘆曰當如徳公兒輩徒靡沸耳慈明亦寤而心服拜東平相國王為黄巾所没得出天子復封之燮以為不可果敗遷京兆尹時人為之語曰李徳公父不欲立帝子不欲立王伯臺處諌師言亢盡末命防萌妙覩𤣥揆陳雅字伯臺成固人也靈帝時為諌大夫閹官用事上䟽曰昔孝和帝與中常侍鄭衆謀誅大將軍竇憲由是宦官秉權安帝幼沖和熹太后兄大將軍鄧騭輔政太后適崩中常侍江京等殺騭安帝登遐黄門孫程又殺車騎將軍閻顯孝桓帝又與中常侍單超等共誅大將軍梁冀陛下即祚太𫝊陳蕃大將軍竇武尚書令尹勲等欲誅宦官絶其奸擅盡忠王室建萬世筞機事不宻為中常侍朱瑀等所殺此即陛下所見今宦官强盛威傾人主天下鉗口莫敢言者海内怨望妖㜸並作四方兵起萬姓辛苦陛下尚可以安奈後嗣何帝不省納出為巴郡太守年七十五卒臨終戒其子曰期運推之天下將大亂雄夫力争無以貨財為意吾亡依山薄𦵏亡嵗餘靈帝崩大將軍何進復為黄門所殺海内果亂終成三國也孟度邵允閻憲字孟度成固人也名知人為綿竹令以禮讓為化民莫敢犯男子杜成夜行得遺物一囊中有錦二十五疋求其主還之曰縣有明君何敢負其化童謠歌曰閻尹賦政既明且昶去苛去辟動以禮讓遷蜀郡吏民泣涕送之以千數季子英瑋李歴字季子太尉固從弟也少修文學性行清白與鄭康成陳元方齊名弱冠拜新城令朝請都督計君經筭程苞字元道南鄭人也光和二年上計吏時巴郡板楯反軍旅數起征伐頻天子患之訪問益州計考以方畧苞對言板楯忠勇立功先漢為帝義民羌入漢中輒蒙其力東征南戰世有功勞由不料䘏以致叛亂非有僣盗能相羣殺兵臨之未必卒得不如但選明能太守恩信懷服自然安定矣天子從之卒如其言後在道卒元靈斐斐祝龜字元靈南鄭人也年十五逺學汝潁及太學通􅀶蕩達能屬文太守張府君竒之曰吾見海内士多矣無如祝龜者也州牧劉焉辟之不得已行授葭萌長撰漢中耆舊傳以著述終禮髙殉名段崇字禮髙南鄭人也太守河間鄭廑命為主簿永初四年涼州羌反溢入漢中從廑屯褒中虜東攻廑欲戰崇諌不可願固壘待之廑不聴出戰敗績崇與門下吏王宗原展及子勃兄子伯生推鋒死戰衆寡不敵崇等皆死羌遂得廑殺之伯義死節程信字伯義南鄭人也時為功曹守居馳來赴難殯殮廑喪送還郷里訖乃結故吏冠葢子弟二十五人言共報羌各募敢死士以待時太守鄧成命信為五官元初二年虜復來信等將其同志率先奮討大破之信被八創死天子咨嗟元初五年下詔書賜信崇家穀數千斛四行齊致在兹六子讃閻憲已下也又有王宗原展及嚴孳李容姜濟陳已曹亷勾矩劉旌九人皆以令義為鄭厪所命王宗原展與厪同死孳容等七人與信共并命詔書既賜崇信家又賜九子家穀各五百斛給死事復元侯趙陳葢亦烈士燕邠字元侯趙嵩字伯髙南鄭人也陳調字元化仲卿孫也邠為刺史郤儉從事使在葭萌與從事董馥張𦙍同行儉為黄巾賊王饒趙播等所殺邠聞故哀慟説馥𦙍赴難二子不可邠歎曰使君已死用生何為獨死之牧劉焉嘉之為圖象學宫誅馥等嵩事太守蘇固固為米賊張脩所疾殺嵩痛之杖劍直入脩營殺十餘人幾獲脩死陳調少尚遊俠聞固死聚賔客百餘人攻脩大破之進攻脩營乃與戰以傷死渙渙龍宗振振麟趾文炳彬蔚漢之表軌搃讃此三十五人也述漢中人士其陳術字申伯作耆舊傳者也失其行事歴新城魏興上庸三郡太守及錫光等不列也穆姜温仁化繼為親穆姜安衆令程祗妻司𨽻校尉李法姊也祗前妻有四子興敦覲豫穆姜生二子淮基祗亡興等憎惡姜姜視之愈厚其資給六子以長幼為差衣服飲食凡百如之久興等感寤自知失子道詣南鄭獄受不愛親罪太守嘉之復除門户常以二月八月社致肉三十斤酒米各二斛六㪷六子相化皆作令士五人州郡察舉基字稚業特嶲逸為南郡太守泰瑛嚴明世範厥訓泰瑛南鄭楊柜妻大鴻臚劉巨公女也有四男二女拒亡教訓六子動有法矩長子元珍出行醉母十日不見之曰我在汝尚如此我亡何以帥羣弟子元珍叩頭謝過次子仲珍白母請客既至無賢者母怒責之仲珍乃革行交友賢人兄弟為名士泰瑛之教流於三世四子才官隆於先人故時人為語曰三苗止四珍復起杜氏之教父母是遵杜泰姬南鄭人趙宣妻也生七男七女若元珪稚珪有望五人皆令徳其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寛宓子賤帶弦以自急故能改身之恒為天下名士戒諸女及婦曰吾之􅗖身在乎正順及其生也恩存於撫愛其長之也威儀以先後之體貌以左右之恭敬以監臨之懃恪以勸之孝順以内之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也後七子皆辟命察舉牧州守郡而漢中太守南鄭令多與七子同嵗季考上計無不修敬泰姬執子孫禮禮珪肅穆言存典韻禮珪成固陳省妻也楊元珍之女生二男長娶張度遼女惠英少娶荀氏皆貴家豪富從婢七八資財自富禮珪勑二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不為貧也所以粗食急務者使知苦難備獨居時二婦再拜奉教從孫奉上微慢珪抑絶之感悟革行遭亂流行宗表欲見之必自嚴飭從子孫侍婢乃引見之曰此先姑法也四時祭禮自親養牲醸酒曰夫祭禮之尊也年八十九卒惠英亦有淑訓母師之行者也文姬叡敏宗祀獲歆文姬南鄭趙伯英妻太尉李固女也父為梁冀所免兄憲公季公罷官歸文姬歎曰李氏滅矣乃與二兄議匿弟燮父門生王成亡命徐州涕泣送之謂成曰託君以六尺之孤若李氏得嗣君之名義參於程杵矣久之遇赦燮得還行喪服闋勑之曰先公為漢忠臣雖死之日猶生之年梁冀以族弟幸濟豈非天乎慎勿有一言加梁氏加梁氏則連主上是又掇祸也奉行之後成在徐州各異處傭賃而私相徃來成病亡燮四時祭之陳氏二謙或智或仁陳順謙成固人也順謙適鄧令曹寜十九寡居長育遺孤八十餘卒兄子陳規著書歎述之惠謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元脩訪於惠謙惠謙曰恢𢎞徳教養亷免恥五刑三千葢亦多矣又何加也兄子伯思學仙道惠謙戒之曰君子疾没世名不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之後耳禮脩順姑恩愛温潤禮脩趙嵩妻張氏女也姑酷惡無道遇之不以禮脩終無愠色及寜父母父母問之但引咎不道姑卒感寤更慈愛之郷人相訓曰作婦不當如趙伯髙婦乎使惡姑知變可謂婦師矣後姑病女來省疾姑却之曰我死固當絶於賢婦手中後遭米賊嵩死乃碧塗面亂首懷刀託言病賊不逼也養遺生女依父叔立義終身者也樹南悼夫輕死重信韓樹南南鄭人趙子賤妻也子賤初為郡功曹李固之誅詔書下郡殺固二子憲公季公太守知其枉遇之甚寛二子託服藥死具棺器欲因出逃子賤畏法勑更驗實就煞之及固小子燮得還子賤慮燮報仇賃人刺之燮覺告郡煞子賤初樹南諌子賤子賤不從及臨死許共并命兄弟㛐侍婢視守之經百餘日乃怠白兄㛐念一死萬不得生不敢復圖死也上下以為信然無幾時於幕下自煞祁祁令姬如玉如金允矣淑媛齊徳姜任搃讃此九人也述漢中列女右漢中士女讃第五凡四十四人三十五人士九人女梓潼人士鎮逺敦壯立勲南瀕文瀕字子竒梓潼人也孝平帝末以城門校尉為犍為屬國遷益州太守造開稻田民咸賴之公孫述時拒郡不服述拘其妻子許以公侯招之不應乃遣使由交趾貢獻河北述平世祖嘉之徴拜鎮逺將軍封成義侯南中咸為立祠子忳有令徳為北海太守巨遊玉碎髙風金振李業字巨遊梓潼人也少執志清白太守劉咸慕其名召為功曹不詣咸怒欲煞之業徑入獄咸釋之公孫述累聘不應述怒遣鴻臚尹融持毒藥酒逼之業笑曰名不可毁身可殺不可辱也遂飲藥死述恥殺善士賜錢百萬子翬逃匿不受建武中察孝亷為遂久令文堅亟哉南面懷民景毅字文堅梓潼人也太守丁羽察舉孝亷司徒舉治劇為沇陽侯相髙陵令立文學以禮譲化民遷太守上封吏民守闕請之三年不絶以子顧師事少府李膺膺誅自免久之拜成都令遷益州太守上封吏民涕泣送之至沮者七百人白水縣者三百人值益州亂後米㪷千錢毅至恩化暢洽比去米㪷八錢鳩鳥巢其㕔事孕育而去三府表薦徴拜議郎自免歸州牧劉焉表拜都尉為人亷正疾淫祠勑子孫惟修善為禱仁義為福年八十一而卒盛國好學研賾聖真楊充字盛國梓潼人也少好學求師遂業受古學於扶風馬季長呂叔公南陽朱明叔潁川白仲職精究七經其朋友則潁川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海内名士還以教授州里常言圖緯空説去事希略疑非聖不以為教察孝亷為郎卒漢伯肄業諸生之純景鸞字漢伯梓潼人也少與廣漢郝伯宗蜀郡任叔本潁川李仲勃海孟元叔遊學七州遂明經術還乃撰禮略河洛交集風角雜書月令章句凡五十萬言太守闕貺命為功曹察孝亷舉有道􅀶士徴不詣然上陳時政言經得失又戒子孫人紀之禮及遺令期死𦵏不設衣衿務在節儉甚有法度卒終布衣伯僖効志張夀字伯僖涪人也少給縣丞楊放為佐放為梁賊所得夀求之積六年始知其生存乃賣家鹽井得三十萬市馬五疋徃贖放道為羌所刼掠盡凡徃三年計道逺不可得數乃單身詣虜涕泣自説虜哀其屢求遣放還郷郡召為中候詔書除巫尉以身佩印盡譲所有財物與三弟復為郡掾章平賦役嵗出三百五十萬遷功曹史徙五官掾卒李餘殘身李餘涪人父早世兄夷殺人亡命母慎當死餘年十三問人曰兄弟相代能免母不人曰趣得一人耳餘乃詣吏乞代母死吏以餘年小不許餘因自死吏以白令令哀傷言郡郡上尚書天子與以財𦵏圖畫府廷童人李餘涪人可考於先漢士女目篇冦王二子行勇以仁冦祺字宰朝梓潼人也與邑子侯蔓俱學涼州蔓後為勃海王象所殺祺杖劍至象家值象病象謝曰君子不掩人無備安有為友報讎殺病人也祺乃還久之復徃殺象由是察孝亷為㶚陵令濟陰相王晏字叔博涪人也與廣漢張昌寗叔受業大學昌為河南呂條所殺晏叔殺條事在叔解李助多方以兹立稱助字翁君涪人也通名方校醫術作經方頌説名齊郭玉自此以上原闕章武之興亦迪才倫徳賢好古澹心藝文李仁字徳賢涪人也益部多貴今文而不崇章句仁知其不博乃游學荆州從司馬徳操宋仲子受古學以修文自終也國輔皓然形動神況杜微字國輔涪人也任安弟子先主定蜀常稱聾闔門不出建興二年丞相亮領州牧選為主簿輿而致之亮引見與書誘勸欲使以徳輔時微固辭疾篤亮表拜諌大夫從其所志思潜遊學休志素林尹黙字思潜涪人也少與李仁俱受學司馬徽宋忠等博通五經專精左氏春秋自劉歆條例鄭衆賈逵父子陳元方服䖍注説略皆誦述希復案本以左傳授後主後主立拜諌議大夫丞相軍祭酒子宗亦為􅀶士耳欽仲朗博訓詁典墳李譔字欽仲仁子也少受父業又講問尹黙自五經四部百家諸子伎藝筭計卜數醫術弓弩機械之巧皆致思焉為太子中庶子右中郎將著古文周易尚書毛詩三禮左氏注解太𤣥指依則賈馬異於鄭𤣥與王肅初不相見而意歸多同孫徳果鋭作劉幹臣李福字孫徳涪人也先主初為成都令建興九年遷巴西太守後為江州都督揚武將軍入為尚書僕射封平陽亭侯延熙初為前監軍司馬福同郡梓潼文恭仲寳亦以才幹為牧亮治中從事丞相㕘軍衎衎偉彦玉潤蘭芬邵名表器江漢之俊搃讃此十五人也述梓潼人士季姜雍穆化播二婦王氏世興實由賢母季姜梓潼文氏女將作大匠廣漢王敬伯夫人也少讀詩禮敬伯前夫人有子博女紀流二人季姜生康稚芝女始示凡前後八子撫育恩愛親繼若一堂祖母性嚴子孫雖見官二千石猶杖之婦跪受罰於堂歴五郡祖母隨之官後以年老不願逺鄉里姜亦常侍養左右紀流出適分已侍婢給之博好冩書姜手為作衮於是内門相化動行推讓博妻犍為楊進及博子遵婦蜀郡張叔紀服姑之教皆有賢訓號之三母堂亡姜勑康稚芝婦事楊進如舅姑中外則之皆成令徳季姜年八十一卒四男棄官行服四女亦從官舎交赴内外冠冕百有餘人當時榮之王氏遂世興杜慈專專父不諒只涪杜季女者巴郡虞顯妻也十八適顯顯亡無子季欲改嫁與同縣楊上慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑死就養成室存亡等但欲在終供養亡不有恨願不易圖季知不可告而奪也乃宻謀與强逼迫之慈縊而死敬楊雪讎壯踰烈士敬楊涪郭孟妻楊文之女也始生失母八嵗父為闕盛所殺無宗親依外祖鄭行年十七適孟孟與盛有舊盛數徃來孟家敬楊涕泣謂孟曰盛凶惡薄命為女無男昆惡讎未報未嘗一日忘也雖婦人拘制然父子恩深恐卒狂惑益君禍患君宜疎之孟以告盛盛不納安漢元年盛至孟家敬楊以大杖打殺盛將自殺孟止之與俱逃涪令雙勝出追聞其故而止安尉二門㑹赦得免中平四年涪令向遵為立圖表之惟兹三媛仁暢義理邦有斯嬪以馳遐紀搃讃三人也述梓潼列女右梓潼郡士女讃第六凡十八人十五人士三人女譔曰二州人士自漢及魏二百四十八人而已一百九十七人士五十一人女後賢二十人合二百六十八人以示來世之君子焉如其遺脱及後世可書者願貽後雋又春秋穀梁傳首叙曰成帝時議立三傳博士巴郡􅇧君安獨駮左傳不祖聖人後漢時魏郡太守王牧薦尹方為三公天子詔尚書郎蜀郡張俊筞之然不詳其行事譔曰二州人士自漢及魏可謂衆矣何者世宗多士則相如麟遊伯司鳳翔洛下雲翳叔文龍驤在孝宣則王褒蔚炳中和作詠屬文甘泉葩為世鏡在元成則君公謇謇心思國病慮經劉危直忤王聴其髙者則嚴君味道易俗移風仲元端委居為人宗若夫秉心塞淵與物盈冲則揚子雲也名重泰山華夏仰崇則鄭子真也不屈其身志髙青雲則譙𤣥也不恥惡君混道推運則楊宣也降及建武明章以來出者則能内貫朝揆外播五教賛和鼎味經綸治要上答太階下允民照處者則利居盤桓晧然𤣥蹈天爵翫之人爵則笑懸車門肆夷惠齊紹若斯之倫海内服其英名洙泗方其渙耀矣故曰漢徴八士蜀出其四又曰漢具四義蜀選其二可謂不衆乎然巴郡􅇧君安以儒學典雅稱於孝咸蜀郡張俊筞問尹方不出五經常議犍為呂孟有託孤之節若兹之𩔖郡邑徃徃垂象刋銘見有苖裔璩晩生長亂故老以沒莫所咨質不詳其事但依漢書國志陳君所載凡士女二百四十八人而已後賢二十人合二百六十八人以示來世之好事者如能詳其遺脱及有可書願附於左其傳志父祖子孫及有名失事失官位者不列寜州人士亦不列别為目録至晉元康末凡三百九十二人也華陽國志卷十下
