front:
  text: 華陽國志巻苐十二
  hash: sha256:6ecd6589c9dd7e3e7b9378a259de66d0e83e1758d6aeafd7fa484ca6bc69652b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_012-1a}
body:
  text: 序志常璩道將巴蜀厥初開國載在書籍或因文緯或見史記久逺􅀮沒寔多踈略及周之丗侯伯擅威雖與牧野之師希同􅉀要之㑹而秦資其冨用兼天下漢祖階之奄有四海梁益及晉兮益爲寜司馬相如嚴君平􅀭子雲陽成子玄鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀略舉其隅其次聖稱賢仁人志士言爲丗範行爲表則者名挂史録而陳君承祚别爲耆􅃇始漢及魏煥乎可􅀚然三州土地不復悉載地理志頗言山水歷代轉久郡縣分建地名改易扵以居然辨物知方猶未詳僃于時漢晉方隆官司星列提封圖簿歲集司􅆰故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭阨運凾夏滔堙李氏據蜀兵連戰結三州傾墜生民殱盡府􅒉化爲狐狸之窟城郭蔚爲熊羆之宿宅逰雉鹿田棲虎豹平原鮮麥黍之苗千里蔑雞狗之響丘城蕪邑莫有名者嗟乎三州近爲􅂽裔桒梓之域曠爲長野反側惟之心若焚灼懼益遐棄城陴靡聞乃考諸􅃇紀先􅀫􅀁傳并南裔志驗以漢書􅂑其近是及自􅀁聞以著斯篇又畧言公孫述蜀書咸熈以來䘮亂之事約􅂑􅂄􅃇士女英彦又肇自開闢終乎永和三年凡十篇號曰華陽國記夫書􅆻有五善逹道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪博咨流離困瘵方資腐帛扵顛墻之下求餘光扵灰塵之中劘滅者多故有􅀁闕猶愈扵遺忘焉蜀紀言三皇乘祗車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南鄭此谷道之通久矣而􅀃者以爲蜀王因石牛始通不然也本紀既以炳眀而丗俗間横有爲蜀􅀓者言蜀王􅁞叢之間周迴三千歲又云荆人鼈靈􅋱屍化西上後爲蜀帝周萇弘之血變成碧珠杜宇之魄化爲子䳌又言蜀椎髻左袵未知書文翁始知書學案蜀紀帝居房心决事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流扵西故周失紀綱而蜀先王七國皆王蜀又稱帝此則􅁞叢自王杜宇自帝皆周之􅅩丗安得三千歲且太素資始有生必􅋱􅋱終物也自古以來未聞􅋱者能更生當世或遇有之則爲恠異子􅀁不言况能爲帝王乎碧珠出不一処地之相距動數千里一人之血豈能􅃱此子䳌鳥今云是嶲或曰嶲周去爲子嶲鳥故蜀人聞子嶲鳴皆起云今案説文云蜀王望帝媱其相妻慚亡爾雅亦云嶲周子嶲鳥也出蜀中望帝嶲户圭切􅀁言與蜀志􅀁述相似四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由來逺矣孔子曰述而不作信而好古􅀼比扵我老彭則彭祖本生蜀爲殷大史夫人爲國史作爲聖則僊自上丗見稱在昔及周之末服事于秦首爲郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄊方大人之國也至于漢興反當􅂽服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學㢤漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕骨聊著翰墨當時以爲極歡後人有以爲惑恐此之􅀋必起扵元靈之由也惟智者辨其不然幸也綜其理數或以爲西土嶮固衿帶易守丗亂先違道治後服若吳楚然故逋逃必萃姧雄闚覦葢帝王者統天理物必居土中德膺命運非可資能恃險以干常亂紀雖饕竊名號終扵絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而􅂑也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之􅀁産古無典國夫恃險憑危不階曆數而能􅀓國垂丗所未有也故公孫劉氏以敗扵前而諸李踵之覆亡扵後天人之際存亡之術可以爲永鑒也干運犯曆破家䘮國可以爲京觀也今齊之國志貫之一揆同見不臣􅀁以防狂狡杜姧􅎯以崇春秋敗絶之道也而顯賢能著治亂亦以爲奨勸也其序曰先王經畧萬國剖分厥甸巴梁式象懸辰九俊述職賦政以均佐周斃紂相漢亡秦寔繁其民丗載其俊述巴蜀志苐一維天有漢鑒亦有光實司羣望表我華陽炎劉是應洪祚攸長述漢中志苐二井絡啓耀文昌􅆻符茫茫禹績畫爲九州功冐普天率土以休光靈遐照慶祚爽流邦家濟濟丗德球球述蜀志苐三蠢爾南域在彼要􅂽漢武德振蠻貃是攘開州列郡幽裔來王柔逺能邇實須才良甄德表失以眀紀綱述南中志苐四赤德中微臣猾干篡白虜乘釁致民塗炭爰迄靈獻皇極不建牧后失國英雄迭進覆車齊軌䝉此艱難述公孫劉二牧志苐五政去王室權流二桀􅀲分天壤宰割民物舍彼信順任此智計大道旣􅀮詭詐競設竝以豪捋力爭當丗居正慮眀名號絶替身兼萬乗籍同列國述劉先主志苐六乾坤渾始􅀣君立王天工人代萬邦是望眀不二日地不二皇苟非其噐窮高必亢􅄥􅄥後主弗慮弗臧負乘致冦丗業以䘮述劉後主志苐七陽升三九品物始亨帝紘失振任非其良趙倡􅍔階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀冗􅀺顧瞻靡望述大同志苐八素精南飄天維㢮綱薨薨特流肆其豺狼蕩雄纂承殱我益梁牧守顛摧黔首辛嘗三州毁曠攸然以􅂽絡結王罔民亦流亡述李特䧺期夀􅀔志苐九華嶽降精江漢吐靈濟濟多士命丗克生德爲丗儁幹爲時貞略舉士女表諸賢朙丗濟其美不隕其名述先賢士女揔讚論苐十皇皇大晉下土是覆化澹教洽誕兹彦茂峨峨俊乂亹亹英秀如嶽之崇如蘭之臭經德秉哲綽然有􅁉述後賢志苐十一博考行故揔厥􅃇聞班序州部區别山川憲章成敗旌照仁賢抑絀虚妄紏正謬言顯善懲惡以杜未然述序志苐十二駟牡騤騤萬馬龍飛陶然斯猶阜㑹京畿麏􅀗西守鹿從東麋郇伯勞之旬不接辰甞兹珍嘉甘心庻㡬中爲令徳一行可師璝瑋倜儻貴韜光輝據冲體正平揖宣尼導以禮樂教洽化齊木訥剛毅有威有懐鏘鏘宫懸磬筦諧諧金奏石拊降福孔皆揔括道檢揔覽幽微選賢與能人逺乎㢤梁孟寕三州先漢以來士女目録常道􅀅集高尚逸民嚴遵字君平成都人也高尚逸民林閭字公孺師之見方言臨卭人揚雄徳行治中從事李弘字仲元成都人也德行給事黄門侍郎揚雄字子雲成都人也文學神童楊烏雄子也預父玄文九歳卒文學侍中揚州刺史張寛字􅅩文經還以教授者成都人始受文翁遣東受七文學中郎􅀅司馬相如字長卿成都人也文學諫議大夫王襃字子淵資中人也尚書郎楊壯成都人也見􅀭子方言美秀中郎將何覇字翁君郫人也執政大中司空汎鄊侯何武字君公覇弟以忠正爲三公王莾欲篡位憚而殺之潁川太守何顯廢武弟也兄弟五人皆在漢書武子况嗣武侯王莾時黄門侍郎鄧通蜀人孝文帝時爲侍郎甚有寵卓王孫臨卭人也見食貨志姑仍􅃇列扵執政臣下政事左衞護軍陳立字少遷治為天下最臨卭人歷牂柯巴郡天水三郡太守節士太中大夫章朙字公孺繁人也節士尚書郎侯岡字宣孟新繁人也節士尚書郎王嘉字公卿江原人也節士美陽令王皓字子離江原人也右十九人在前漢其侍郎田儀楊德意無善事在中也知士博士羅衍字伯紀成都人也德政益州太守王阜字丗公成都人也長沙太守任循字伯度爲郡五官父之母識知是事在精通也成都人少失父後爲長沙父流離逺届長沙公亮大司農司􅀠校尉任昉字文始循子也徐州刺史任愷字文悌昉弟也文學侍中漢五更張覇字伯饒謚曰文父成都人也聘士張楷字公超文父子也聘士張光超公超弟也尚書張陵字處沖公超子自陵之後世有大官義士趙定成都人以延仁赴義濟窮恤乏爲業保貴太尉司徒司空特進厨亭文侯趙戒字志伯定子文學國師太常趙典字仲經戒苐二子也忠亮太尉司徒郫恵侯趙謙字彦信侯不顯戒孫也其子孫襲厨亭道德司徒司空趙温字子柔謙弟自是後丗有二千石義烈侍中長水校尉常洽字茂尼江原人見趙温傳道德侍御史常詡字孟元江原人在趙太尉公耆舊傳述作謁者㒒射何英字􅅩俊郫人也作漢德春秋經治犍爲屬國何汶字景由英孫也髙士楊由字哀侯成都人見後漢方術傳篤􅋢高士侯祈字升伯繁人文父楊序弟子篤􅋢博士楊珏字仲桓成都人何萇弟子公府辟士羅衡字仲伯郫人亦萇弟子也至孝孝廉禽堅字孟由成都人推賢美陽令桞宗字伯騫成都人也求次方王仲曽張􅅩遼殷知孫郡守失其官名並蜀人伯騫􅀁㧞皆致匡正治中從事張充字伯春江原人匡正司空辟士李幾字孟元江原人也猛略部從事楊竦字子恭成都人也子統爲二千石失其官守憲陳湛字小伯成都人節士仲圼成都人也高士王廣不徃曰吾不能復辨敢當丗榮利也皓子也父爲公孫述􅀁聘自刎廣逃匿述破後郡及州命察舉皆仁義志士任末字􅅩本繁人也烈士嚴道主簿李磬字文寺嚴道人也永昌太守王伉成都人見蜀書右八人在劉氏丗五更張覇夫人司馬敬司成都人也公乗㑹婦張氏廣都人也犍爲楊鳳珪妻陳助臨卭人也廣漢便敬賓婦常元常江原人廣都令常良女也殷氏婦常靡常江原人常仲山女也趙侯夫人常紀常江原人常常侍女景竒妻羅貢郫人羅倩女也趙憲妻何玹郫人也朱􅅩賢妻張昭儀繁人也廣柔長姚超二女姚妣饒郫人也廣漢王遵妻張􅅩紀覇女孫也右十一人烈女右蜀郡士女七十四人十一人女六十三人士朙畧渡􅃆侯范目閬中人文學聘士洛下宏字長公閬中人也玄始侍御史任文孫閬中人也文學司空掾任文公文孫弟也先生骨君安見春秋首傳京兆尹徐誦字子産閬中人也忠正侍中譙隆字伯司閬中人也髙清太中大夫譙􅀇字君黄閬中人也潔白尚書郎譙瑛􅀇子也以易授孝眀帝公車令趙珜字孫眀閬中人也公府掾趙毅字仲都珜子也公車令臧太伯宕渠人也見珜傳雋才凉州刺史趙宏字温柔閬中人也右十三人前漢政事揚州刺史嚴遵字王思閬中人也徐州牧嚴羽字子翼王思子也長安令王偉卿王思友見王思傳政事大司農玄賀字文和宕渠人也將畧大鴻臚龎雄字宣孟宕渠人也政事幽州刺史馮煥宕渠人也朙略使持節車􅀐將軍馮緄字鴻卿煥子降虜都尉馮元字公信緄弟尚書郎馮遵字文衡元子政事司􅀠校尉陳禪字紀山安漢人漢中太守陳澄禪子别駕從事陳實字盛先澄孫也與王文表爲友思防治中從事楊仁字文義閬中人也志士荆州刺史龔調字􅅩侯安漢人也忠貞魏郡太守趙晏字平仲安漢人也籌畫益州太守李顒字德卬墊江人也漢書及巴耆􅃇也汝南太守謁煥字闕江州人也見汝南紀度遼將軍桂陽太守然温字闕江州人見巴耆舊傳美化越嶲太守張翕字􅅩陽安漢人也越嶲太守張璊翕子也太守三堂察舉孝廉至孝上蔡令趙邵字泰伯閬中人也孝子嚴永名儒陳髦􅀮士黄錯進失其官位見堂傳右三人已郡太守王堂所巴郡太守龔楊字闕墊江人茂才孟彪江州人右並王文表􅀁薦日南太守􅀺景字闕墊江人茂才王澹閬中人見文表傳文學掾龔策墊江人桂陽太守李温宕渠人户曹掾趙芬宕渠人上庸太守陳弘安漢人見巴紀忠義宕渠主簿曲􅁃宕渠人也忠義宕渠主簿馮湛宕渠人也烈士郝伯都閬中人右三十五人後漢司􅀠校尉陳烏等失其事不録義烈江陽太守程畿字季黙閬中人也程祁字公弘畿子也楊汰字季儒巴郡人韓儼巴西人􅀺韜然傳巴西人三人見楊文壮烈將軍嚴顔臨江人也見張飛傳玄眞徴士周舒字􅅩布閬中人也文學儒林校尉周羣字仲直舒子也博士周巨羣子也雅重車􅀐將軍育陽景侯黄權字公衡三司閬中人在魏儀同尚書郎黄崇權子也勇壮折衝將軍西陵太守甘寜字興覇臨江人仕吴政事鎮南大將軍彭鄊亭侯馬忠字德信閬中人將略鎭北大將軍安漢侯王平字子均宕渠人果壯左􅀅軍宕渠侯句扶字孝興漢昌人見王平傳􅀅略盪冦􅀅軍關内侯張嶷字伯岐南充國人也尚書僕射姚伷字子緒閬中人見楊義􅀓諸葛故事也别駕從事馬勲字盛衡閬中人見季漢軸臣傳尚書馬參字承伯閬中人見蜀書越嶲太守龔禄字德緒安漢人父諶犍爲太守見巴紀鎭軍􅀅軍龔皦字徳德禄弟也徴士譙字榮始西充國人也周父淵通散􅀐常侍城陽亭侯譙周字􅁢南大夫子在劉氏光禄右二十三人在劉氏三國之丗馬妙祈妻義貞烈趙雲君妻華貞烈王元憒妻􅁎人貞烈已上皆閬中趙璝妻􅁎節烈宕渠人童女趙英璝女趙萬妻娥宕渠人耿秉妾行安漢人鮮尼母姜安漢人右八人烈女右巴郡凡士女七十八人八人女士七十人道德三老楊統字仲通新都人也曽祖仲續祁令父春卿爲公孫述将光禄大夫楊博字仲逹統長子文學侍中楊序字仲桓謚曰文父博弟高士冦懽字文儀綿竹人序弟子也高士昭約字節宰雒人也序弟子二人見序傳術藝使持節交州牧楊宣字君緯什邡人學士嚴象廣漢人宣弟子也大儒趙翹廣漢人宣弟子也烏丸校尉郭堅雒人也善績司􅀠校尉郭賀字喬卿堅孫永昌太守鄭純字長伯郪人也文學高士王祐字平仲郪人也弟灌有文才而不悉行事也文才樂安相李尤字伯仁雒人也尚書郎李􅂶尤孫也文才東觀郎李勝字茂通雒人也尤傳公亮將作大匠翟酺字超雒人聘士王稚字􅅩起謚曰憲文堂少子也堂長子博失官位博子遵亦失官位善績蜀郡太守王啇字文表遵子隱士夫子段翳字元章新都人也亢烈辟士段恭字節英新都人也武威太守南陽折侯張江雒人鬱林太守折國江四丗孫因封國改信折高士折象字伯式國之子也治中祭酒朱倉字雲卿什邡人政事牂柯太守劉寵字丗信綿竹人孝子江陽符長姜詩字士逰雒人隂德􅔛令王忳字少林新都人也交州牧羊甚郪人也推讓野王令羊朞字仲魚甚子文學侍中董扶字茂安綿竹人楊厚弟子也文學聘士任安字定祖綿竹人亦厚弟子高讓義士杜眞字孟宗綿竹人精誠五官諒輔字漢儒新都人義士楊寛字􅅩仲新都人父斌兄混皆有證明君事失其官位義士張鉗字子安廣漢人也烈士賈栩字元集什邡人也節士寗􅅩字茂泰廣漢人也忠義綿竹主簿韓揆字伯彦壮童左喬雲綿竹人孝㢘汝敦新都人周幹廣漢人彭勰廣漢人古朴右三人儒學文才見蜀志及王啇傳廣漢人方術太醫丞郭玉字通􅈂右五十二人馳名漢丗别駕從事李朝字永南郪人也丞相西曺掾李邵字偉南朝弟也文才大司農秦宓字子敕綿竹也益州太守王士義字彊郪人王祐從弟也别駕從事王甫字國山文表弟也優㳺特進太常關内侯鐔承字公文郪人才雋江陽太守彭羕字年廣漢人忠謀從事鄭度綿竹人也見劉璋傳忠烈從事王累新都人也見劉璋傳右九人在劉氏丗及二牧時聘士任安母姚綿竹人也姜詩妻龎行雒人也姜嬪字義􅃇綿竹也狄道長姜穆女司馬雅妻廖伯妻殷紀配廣漢人也便敬妻王和新李珥妻進娥郪人李氏女馮季宰妻也王輔妻彭非廣漢人也李平字正流廣漢李元女楊文妻袁稚妻相烏德陽人也汝敦妻失姓不知何郡縣人右十一人烈女右廣漢郡凡士女七十二人十一人女六十一人士知術光禄大夫關内侯王延丗字長􅅩資中人􅀭州刺史楊莾字翁君武陽人見何覇傳忠壯復漢將軍朱遵字孝仲武陽人也隠知徴士任永字君業僰道人也隠遯合浦太守費貽字奉君南安人精宻上黨太守趙松字君橋武陽人文學城門校尉董鈞字文伯資中人秀頴司􅀠校尉楊渙字孟文武陽人見犍爲耆􅃇傳漢中太守楊文方也渙子文方子潁伯兾州刺史仲頴二千石失其行事政事司􅀠校尉楊凖字伯邳文方兄子太守太尉李固舉之清秀大司空張皓字升眀武陽人也正直光禄大夫廣陵太守張綱字文紀皓子也郎中張植綱子也尚書張續植弟也豫州牧張方字公始續弟也正直司􅀠校尉趙旂字子鸞資中人也别駕從事王元武陽人刺史張喬時見楊統傳義士公車令杜撫字􅅩和資中人也義士新都令趙敦字建侯武陽人也孝士尚書郎隗相字􅅩通􅈎道人也吕孟南安人不詳其事呉順字􅅩和僰道人學士韓子方僰道人張貞之師學士謝襃南安人見張鉗傳右二十四人在漢丗政事蜀郡太守関内侯楊洪字季休武陽人固率諌議大夫費詩字公舉南安人忠正車􅀐將軍都亭侯張翼字伯恭武陽人綱後也文學五官中郎將伍梁字德山南安人文才射聲校尉楊義字文然武陽人右五人在劉氏丗從事賈龍不悉其事不録漢中太守楊文方妻陽􅁎武陽人相登妻周度僰道人也曹禁字敬􅁎南安人周紀妻也程貞玫字瑗玉牛鞞人資中張惟妻也尹仲讓妻韓姜僰道人也儀成妻謝􅁎南安人也趙媛姜資中人趙盛道妻也張貞妻黄帛僰道人也楊進武陽人廣漢王愽妻右九人列女右犍爲郡士女凡三十八人九人女二十九人士忠正城陽中尉鄧公成固人景帝時楊王孫致逺衛尉博望侯張騫成固人武帝時爽朗給事中張猛騫孫元帝時高尚逸民鄭子眞襃中人成帝時大儒李頡南鄭人文學司徒李郃字孟節頡子執正太尉李固字子堅郃子雅望京兆尹李爕字德公固少子奉車都尉李歷字季子固従弟也善績司隸校尉李法字伯度南鄭人也犍爲太守趙宣字子雅南鄭人也徳望廣漢太守趙瑶字元珪宣子温雅尚書趙琰字稚珪瑶弟義壯弘農太守陳綱字仲卿成固人也義烈從事陳調字元化綱孫知思巴郡太守陳雅字伯壹成固人南郡太守程基字稚業南鄭人也大鴻臚劉巨公南鄭人見列女傳廣漢屬國張㤗字伯彊南鄭人也政事度遼將軍張亮則字元修泰從弟愷悌綿竹令閻憲字孟度成固人也隠士樊志張南鄭人也見征西􅀅軍段熲傳尚志聘士衛衡字伯梁南鄭人樊志張弟子也籌畫計曹史程苞字元道南鄭人也文才葭􅎯長祝􅀛字元靈南鄭人也義烈郡主簿段崇字禮高南鄭人也義烈功曹曹程信字伯義南鄭人也嚴孳李容陳已王宗姜濟曹㢘勾矩劉旌原㞡九人太守鄭廣史見段崇程信傳義烈從事燕邠字元侯南鄭人義烈主簿趙嵩字伯高南鄭人右三十八人後漢陳術字申伯歷二郡太守見蜀書撰益部耆􅃇傳者右一人劉氏丗之李穆姜安衆令程秖妻李法姑也子基劉泰瑛巨公女楊拒妻杜泰􅁎南鄭人犍爲太守趙宣妻楊禮珪成固楊元珍女陳省妻李文􅁎太尉固女趙瑛妻陳順謙鄧令曺寧妻陳伯臺從女也兄子陳䂓著書稱之陳恵謙順謙妹度遼􅀅軍張亮則夫人張禮修南鄭人趙嵩妻韓􅀣南南鄭人趙子賤妻也右九人烈女右漢中郡士女凡五十人九人女四十一人士忠義鎭逺將軍義侯文齊字子竒不服王莾公孫述光武嘉之梓潼人也平帝用為益州大守遂北海太守文忳齊子節士李業字巨逰梓潼人也遂久令李翬業子益州太守景毅字文堅梓潼人也政事有道景鸞字漢伯梓潼人也文學孝㢘楊充字盛國梓潼人也壯烈濟隂相冦祺字宰朝梓潼人也壯烈童人李餘涪也義士功曹張夀字伯禧涪人也義士王晏字􅅩博涪人也方士李助字翁君涪人也右十二人漢丗尚玄諌議大夫杜微字國輔涪人也李仁字德賢涪人也太子僕李㢲字欽仲仁子太子家令尹黙字思潛涪人也承相參軍文恭字仲賢梓潼人也果銳前監軍將軍司馬李福字孫德涪人見諸葛故事蜀書右六人劉氏丗文極字季姜梓糧人􅀅作大匠王堂夫人也巴郡虞顯妻杜慈涪杜季女也郭孟妻楊敬涪楊女也右烈女三右梓潼郡士女二十一人三人女十八人士修愼少府太常關内侯王謀字元㤗漢嘉人也雲南太守張休右二人漢嘉人士在劉氏丗文學制州刺史尹珍字道珍母歛人也巴郡太守傅宝字紀圖下夷人也忠義冠軍將軍寧州刺史謝恕字茂理母歛人也右三人牂柯人士忠義大將軍朝侯􅀕酒􅃬光字長沖右一人西城人士忠義雲南太守陽遷亭侯吕凱字季平右一人永昌人士義正安漢將軍建寧太守李恢字德昂領軍爨習御史中丞孟􅀗右三人建寧人士輔漢將軍孟琰字休朙右一人朱提人士先泥和女絡符人也右一人烈女江陽人大凡三州十三郡自漢興至三國之終士女載傳記者三百四十人四十七人女二百九十三人士公七人大將軍二十二人侯二十人卿佐十四人侍中七人尚書五人司􅀠校尉六人州刺史十三人郡守四十八人國師三人光禄大夫四人尚書郎十二人中書郎􅀅御史六人公車令諌議太中十一人公府辟士八人高士一人聘士七人徴士四人節士四人烈女四十七人益梁寧三州三國兩晉以來人士目録添立目録眀略大司農西城公何攀字恵興郫人清秀大長秋夀良字文㳤成都人也果烈西河太守栁隠字休然成都人也益梁二州都􅇂杜禎成都人也都􅇂度支巴東太守栁伸字雅厚成都人也德行江陽太守何隨字季業郫人令德犍爲太守杜軫字超宗成都人也犍爲太守杜烈字仲武軫弟建寧太守杜良字㓜倫益州刺史杜毗字長基德行給事中任熈字伯逺成都人也涪陵太守任蕃字憲祖熈子義正郫令常勗字修業江原人也州都常忌字茂通勗從弟也令才太史令高玩字伯珍江原人也温才湘東太守常騫字季㤗愼江原人也述作武平太守常寛字㤗恭騫從弟也使持節西夷校尉張岐字紹茂成都人也征西將軍西夷校尉益州刺史王異字彦眀成都人也勇略雍州刺史南中郎􅀅重安開國侯李陽字文􅅩郫人征虜􅀅軍廣漢梓潼太守楊謙字令志成都人也右二十二人蜀郡人在晉世強濟少府成都威侯李毅字􅁢剛郪人西夷校尉李釗字丗康毅子仁讓漢嘉太守司馬勝之字興先綿竹人德義梓潼太守王化字伯逺郪人文表孫巴東太守王振字仲逺化弟也作唐令王岱字季逺振弟也述作蜀郡太守王崇字㓜逺岱弟也素隠中書郎王長文字徳雋郪人也建寧太守耿容字宗仲廣漢人也右九人廣漢人在晉世漢中太守李宓字令伯武陽人也汶山太守李賜字宗碩宓子也太傅參軍李興字雋頭賜弟也廣漢太守張徴字建興翼子也譙國内史費緝字文平南安人二子見夀良傳執義衡陽太守楊邠字岐之武陽人清正尚書費立字建熈南安人右七人犍爲人士在晉世衛尉文立字廣休臨江人也武陽太守楊守臨江人也牂柯太守毛楚枳人右三人巴郡人在晉世述作太子中庻子陳夀字承祚安漢人驃􅀐府掾陳莅字􅅩度夀兄子上㢘令陳符字長住夀兄子建寧太守陳階字逹芝莅弟正􅈂漢中太守閻績字續伯安漢人卓略長水校尉荆州刺史張奕字希祖南充國人義烈揚烈将軍梓潼内史譙登字順眀周孫令德􅃬令譙周字彦紹周子見周傳右八人巴西人士在晉丗清重長水校尉吕㳤字偉徳右一人漢中人廣漢太守李􅋮字􅅩龍福子右一人梓潼人忠義江陽太守侯馥字丗眀右一人江陽人三州後賢五十一人并前賢三百九十一人譔曰凡此人士或見漢書或載耆􅃇或見郡紀或在三國書并取其秀異表之斯篇其弘伐洪顯者生附載者齊之其但見名目而不詳其行故或有以傳無珍善闕之以副直文爲實錄矣華陽國志卷苐十二
