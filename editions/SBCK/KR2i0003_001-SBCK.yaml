front:
  text: 華陽國志卷苐一
  hash: sha256:0bc098a924bd01f3a9dc63da17a4e0cb7ec67e71be048a2a0123082ded127a2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_001-1a}
body:
  text: 巴志昔在唐堯洪水滔天鯀功無成聖禹嗣興導江疏河百川蠲脩封殖天下因古九囿以置九州仰稟參伐俯壤華陽黑水江漢為梁州厥土青黎厥田惟下上厥賦惟下中厥貢璆䥫銀鏤砮磬熊羆狐狸織皮於是四奥既宅九州逌同六府孔修庶土交正厎眘財賦成貢中國蓋時雍之化東被西漸矣歷夏殷周九州牧伯率職周文為伯西有九國及武王克商幷徐合青省梁合雍而職方氏猶掌其地辨其土壤甄其寳利起于秦帝漢興高祖藉之成業乃改雍曰涼革梁曰益故巴漢庸蜀屬益州至魏咸熈元年平蜀始分益州巴漢七郡置梁州治漢中以相國叅軍中山耿黼為剌史元康六年廣漢益州更割雍州之武都隂平荆州之新城上庸魏興以屬焉凡統郡一十一縣五十八洛書曰人皇始出繼地皇之後兄弟九人分理九州為九囿人皇居中州制八輔華陽之壤梁岷之域是其一囿囿中之國則巴蜀矣其分野輿鬼東井其君上世未聞五帝以來黄帝高陽之支庶世為侯伯及禹治水命州巴蜀以屬梁州禹娶於塗山辛壬癸甲而去生子啓􅈱􅈱啼不及視三過其門而不入室務在救時今江州塗山是也帝禹之廟銘存焉會諸侯於會稽執玉帛者萬國巴蜀徃焉周武王伐紂實得巴蜀之師著乎尚書巴􅖾勇鋭歌舞以淩殷人倒戈故世稱之曰武王伐紂前歌後舞也武王既克殷以其宗姬於巴爵之以子古者逺國雖大爵不過子故吳楚及巴皆曰子其地東至魚復西至僰道北接漢中南極黔涪土植五穀牲具六畜桑蠶麻苧魚鹽銅鐡丹漆茶蜜靈􅀛巨犀山雞白雉黄潤鮮粉皆納貢之其果實之􅈿者樹有荔支蔓有辛蒟園有芳蒻香茗給客橙蕟其藥物之異者有巴㦸天􅎛竹木之貴者有桃支靈壽其名山有塗籍靈臺石書􆇑山其民質直好義土風敦厚有先民之流故其詩曰川厓惟平其稼多黍㫖酒嘉穀可以飬父野惟阜丘彼稷多有嘉穀㫖酒可以飬母其祭祀之詩曰惟月孟春􅆩祭彼崖永言孝思享祀孔嘉彼黍既㓗彼儀惟澤蒸命良辰祖考來格其好古樂道之詩曰日月明明亦惟其名誰􅀎長生不朽難獲又曰惟德實寳冨貴何常我思古人令問令望而其失在於重遲魯鈍俗素樸無造次辨麗之氣其屬有濮賨苴共奴獽夷蜑之蠻周之仲世雖奉王職與秦楚鄧為比春秋魯桓公九年巴子使韓服告楚請與鄧為好楚子使道朔將巴客聘鄧鄧南鄙攻而奪其幣巴子怒伐鄧敗之其後巴師楚師伐申楚子驚巴師魯莊公十八年巴伐楚克之魯文公十六年巴與秦楚共滅庸哀公十八年巴人伐楚敗於鄾是後楚主夏盟秦擅西土巴國分逺故於盟會希戰國時嘗與楚婚及七國稱王巴亦稱王周之季世巴國有亂將軍􅕃子請師於楚許以三城楚王救巴巴國既寧楚使請城􅕃子曰藉楚之靈克弭􅍔難誠許楚王城將吾頭徃謝之城不可得也乃自刎以頭授楚使王歎曰使吾得臣若巴􅕃子用城何為乃以上卿禮塟其頭巴國塟其身亦以上卿禮周顯王時楚國衰弱秦恵文王與巴蜀為好蜀王弟苴私親於巴巴蜀世戰爭周慎王五年蜀王伐苴侯苴侯奔巴巴為求救於秦秦恵文王遣張儀司馬錯救苴巴遂伐蜀滅之儀貪巴道之冨因取巴執王以歸置巴蜀及漢中郡分其地為一縣儀城江州司馬錯自巴涪水取楚啇於之地為黔中郡秦昭襄王時白虎為害自秦蜀巴漢患之秦王乃重募國中有􅀎煞虎者邑萬家金帛稱之於是夷朐忍廖仲藥何射虎秦精等乃作白竹弩於高樓上射虎中頭三節白虎常從羣虎瞋恚盡搏煞羣虎大呴而􅋱秦王嘉之曰虎歴四郡害千二百人一朝患除功莫大焉欲如要王嫌其夷人乃刻石為盟要復夷人頃田不租十妻不筭傷人者論煞人雇􅋱倓錢盟曰秦犯夷輸黄龍一􅀟夷犯秦輸清酒一鍾夷人安之漢興亦從高祖定秦有功高祖因􅂧之專以射白虎為事户歲出賨錢口四十故世號白虎復夷一曰板楯蠻今所謂弜頭虎子者也漢高帝滅秦為漢王王巴蜀閬中人范目有恩信方畧知帝必定天下說帝為募發賨民要與共定秦秦地既定封目為長安建章鄉侯帝將討關東賨民皆思㱕帝嘉其功而難傷其意遂聴還巴謂目曰冨貴不㱕故鄉如衣繡夜行耳徙封閬中慈鄉侯目固辭乃封渡􅃆縣侯故世謂三秦亡范三侯也目復除民羅朴昝鄂度夕龔七姓不供租賦閬中有渝水賨民多居水左右天性勁勇初為漢前鋒陷陣銳氣喜武帝善之曰此武王伐紂之歌也乃令樂人習學之今所謂巴渝舞也天下既定高帝乃分巴置廣漢郡孝武帝又兩割置犍為郡故世曰分巴割蜀以成犍廣也自時厥後五教雍和秀茂挺逸英偉既多而風謠㫄作故朝廷有忠貞盡節之臣鄉黨有主文歌詠之音巴郡譙君黄仕成哀之世為諫議大夫數進忠言後違避王莽又不事公孫述述怒遣使賫藥酒以懼之君黄笑曰吾不省藥乎其子瑛納錢八百萬得免國人作詩曰肅肅清節士執德寔固貞違惡以授命没世遺令聲巴郡陳紀山為漢司􅈻校尉嚴明正直西虜獻眩王􅒉試之分公卿以為嬉紀山獨不視京師稱之巴人歌曰築室載直梁國人以貞真邪娱不揚目枉行不動身姧軌僻乎逺理義協乎民巴郡嚴王思為揚州刺史恵愛在民毎當遷官吏民塞路攀轅詔遂留之居官十八年卒百姓若喪考妣義送者賫錢百萬欲以贍王思家其子徐州刺史不受送吏義崇不忍持還乃散以為食食行客巴郡太守汝南應季先善而美之乃作詩曰乘彼西漢潭潭其􅚡君子愷悌作民二親没世遺愛式鏡後人漢安帝時巴郡太守連失道國人風之曰明明上天下土是觀帝選元后求定民安孰可不念􅍔福由人願君奉詔惟德日親永初中廣漢漢中羗反虐及巴郡有馬妙祈妻義王元㥽妻姬趙􅕃君妻華夙䘮夫執恭姜之節守一醮之禮號曰三貞遭亂兵迫匿懼見拘辱三人同時自沉于西漢水而没􅋱有黄鳥鳴其亡処徘徊焉國人傷之乃作詩曰關關黄鳥爰集于􅀣窈窕㳤女是繡是黼惟彼繡黼其心匪石嗟爾臨川邈不可獲永建中泰山吴資元約為郡守屢獲豐年民歌之曰習習晨風動㴻雨潤乎苗我后䘏時務我民以優饒及資遷去民人思慕又曰望逺忽不見惆悵嘗伭佪恩澤實難忘悠悠心永懐孝桓帝時河南李盛仲和為郡守貪財重賦國人剌之曰狗吠何喧喧有吏來在門披衣出門應府記欲得錢語窮乞請期吏怒友見尤旋顧家中家中無可與思徃從鄰貸鄰歩人以言遺錢錢何難得令我獨憔悴漢末政衰牧守自擅民人思治作詩曰混混濁沼魚習習激清流温温亂國民業業仰前脩其德操仁義文學政幹若洛下閎任文公馮鴻卿龎宣孟􅀇文和趙温柔龔升侯楊文義等播名立事言行表世者不勝次載者也孝安帝元初三年凉州羗反入漢中殺太守董炳擾動巴中中郎將尹就討之不克益州諸郡皆起兵禦之三府舉廣漢王堂為巴郡太守撥亂􅃱治進賢達士貢孝子嚴永隱士黄錯名儒陳髦俊士張璊皆至大位益州刺史張喬表其尤異徙右扶風民為立祠孝桓帝以并州刺史泰山但望字伯闔為巴郡太守勤䘏民隠郡文學掾宕渠趙芬􅁺弘農馮尤墊江龔榮王祈李温臨江嚴就胡良文愷安漢陳禧閬中黄閶江州毋成陽譽喬就張紹牟存平直等詣望自訟曰郡境廣逺千里給吏兼將人從冬徃夏還夏單冬複惟踰時之役懐怨曠之思其憂喪吉㓙不得相見解緩補綻下至薪菜之物無不躬買於市冨者財得自供貪者無以自久是以清儉枉夭不聞加以水陸艱難山有猛禽思迫期㑹隕身江河投􅋱虎口咨嗟之歎歴世所苦天之應感乃遭明府欲為更新兒童匹婦懽喜相賀將去逺就近釋危􅀩安縣無數十民無逺邇恩加未生澤及來世巍巍之功勒於金石乞以文書付計􅁺史人鬼同符必獲嘉報芬等幸甚望深納之郡戸曺史枳白望曰芬等前後百餘人歴政訟訴未䝉感寤明府運機布政稽當皇極為民庶請命救患德合天地澤潤河海開闢以來今遇慈父經曰奕奕梁山惟禹甸之有倬其道韓侯受命比隆等盛於斯為美永興二年三月甲午望上䟽曰謹按巴郡圖經境界南北四千東西五千周萬餘里屬縣十四鹽鐡五官各有丞史户四十六萬四千七百八十口百八十七萬五千五百三十五逺縣去郡千二百至千五百里鄉亭去縣或三四百或及千里土界遐逺令尉不􅀎窮詰姦㐫時有賊發􅇂郵追案十日乃到賊巳逺逃蹤迹絶滅罪録逮捕證驗文書詰訊即從春至冬不能究訖繩憲未加或遇德令是以賊盜公行姦宄不絶榮等及隴西太守馮含上谷太守陳弘徃者至有刼閬中令楊殷終津侯姜昊傷尉蘇鴻彭亭侯孫魯雍亭矦陳巳殷侯樂普又有女服賊千有餘人布散千里不即彂覺謀成乃誅其水陸覆害煞郡掾枳謝盛塞威張御魚復令尹尋主簿胡直若此非一給吏休謁徃還數千閉困須報或有彈劾動便歷年吏坐踰科恐失冬節侵疑先􅋱如當移傳不能待報輒自刑戮或長吏忿怒寃枉弱民欲赴訴郡官毎憚還徃太守行桑農不到四縣剌史行部不到十縣郡治江州時有温風遥縣客吏多有疾病地勢剛嶮皆重屋累居數有火害又不相容結舫水居五百餘家承三江之會夏水漲盛壊散顛溺􅋱者無數而江州以東濱江山險其人半楚姿態敦重墊江以西土地平敞精敏輕疾上下􅊋俗情性不同敢欲分為二郡一治臨江一治安漢各有桑麻丹漆布帛漁池鹽鐵足相供給两近京師榮等自欲義出財帛造立府寺不費縣官得百姓懽心孝武以來亦分吴蜀諸郡聖德廣被民物滋繁增置郡土釋民之勞誠聖主之盛業也臣雖貪大郡以自優暇不忍小民顒顒蔽隔謹具以聞朝議未許遂不分郡分郡之議始於是矣哉順桓之世板楯數反太守蜀郡趙温恩信降服於是宕渠出九穗之禾朐忍有連理之木光和二年板楯復叛攻害三蜀漢中州郡連年苦之天子欲大出軍時征役疲弊問益州計曺考以計畧益州計曹掾程包對曰板楯七姓以射白虎為業立功先漢本為義民復除徭役但出賨錢口歲四十其人勇敢能戰昔羗數入漢中郡縣破壊不絶若線後得板楯來虜彌盡號為神兵羗人畏忌傳語種輩勿􅂧南行後建寧建和後漢作二年羗􅂧入漢牧守遑遑復賴板楯破之若微板楯則蜀漢之民為左衽矣前車騎將軍馮緄南征雖授丹楊精兵亦倚板楯近益州之亂朱􅀛以并凉勁卒討之無功太守李顒以板楯平之忠功如此本無惡心長吏鄉亭更賦至重㒒役過於奴婢箠楚隆於囚虜至乃嫁妻賣子或自剄割陳寃州郡牧守不理去闕􅒉遙逺不能自聞含怨呼天叩心窮谷愁於賦伇困乎刑酷邑域相聚以致叛戾非有深謀至計􅆫號不軌但選明能牧守益其資穀安便賞募從其利隟自然安集不煩征伐也昔中郎將尹就伐羗擾動益部百姓諺云虜來尚可尹將殺我就徵還後羗自破退如臣愚見權之遣軍不如任之州郡天子從之遣太守曺謙宣詔降赦一朝清戢獻帝初平元年征東中郎將安漢趙穎建議分巴為二郡穎欲得巴舊名故白益州牧劉璋以墊江以上為巴郡江南龎羲為太守治安漢以江州至臨江為永寧郡朐忍至魚􅂧為固陵郡巴遂分矣建安六年魚復蹇􅉙白璋爭巴名璋乃改永寧為巴郡以固陵為巴東徙羲為巴西太守是為三巴於是涪陵謝本白璋求以丹興漢髪二縣為郡初以為巴東屬國後遂為涪陵郡分後屬縣七户二萬去洛三千七百八十五里東接朐忍西接蔣縣南接涪陵北接安漢德陽巴子時雖都江州或治墊江或治平都後治閬中其先王陵墓多在枳其畜牧在沮今東突硤下畜沮是也又立市於􅀛亭北岸今新市里是也其郡東枳有明月硤廣德嶼故巴亦有三硤巴楚數相攻伐故置扞關陽關及􅃆關漢世郡治江州巴水北有甘橘宫今北府城是也今乃還南城劉先主初以江夏費瓘為為太守領江州都􅇂後都護李嚴更城大城周廻十六里欲穿城後山自汶江通水入巴江使城為州求以五都置巴州丞相諸葛亮不許亮將北征召嚴漢中故穿山不逮然造蒼龍白虎門别郡縣倉皆有城嚴子農代為都􅇂農解後梓漢李福為都􅇂延熈中車騎將軍鄧艾為都􅇂治陽關十七年省平都樂城常安咸熈元年但四縣以鎮西參軍隴西怡思和為太守二部守軍江州縣郡治塗山有禹王祠及塗后祠北水有銘書祠云漢初犍為張君為太守忽得仙道從此升渡今民曰張府君祠縣下有清水穴巴人以此水為粉則膏暉鮮芳貢粉京師因名粉水故世謂江州墮休粉也有荔枝園至􅍄二千石常設厨膳命士大夫共會􅀣下食之縣北有稻田出御米陂池出蒲蒻藺席其冠族有波鈆毋謝然楊白工官程常世有大官也枳縣郡東四百里治涪陵水㑹土地确瘠時多人士有章常連黎牟楊郡冠首也臨江縣枳東西百里接朐䏰有鹽官在監塗二谿一郡所仰其豪門亦家有鹽井又嚴甘文楊杜為大姓晉初文立實作常伯納言左右楊宗符稱武隆人在吴為孫氏虎臣也平都縣蜀延熈時省大姓殷吕蔡氏墊江縣郡西北中水四百里有枽蠶牛馬漢時龔榮以俊才為荆州刺史後有龔揚趙敏令德為巴郡太守淳于長雅有美貌􅀺夏杜皆大姓也樂城縣在西州江三百里延熈十七年省常安縣亦省巴東郡先主入益州改為江關都尉建安二十一年以朐䏰魚􅂧羊渠及宐都巫北井六縣為固陵郡武陵康立為太守章武元年朐䏰徐慮魚復蹇機以失巴名上表自訟先主聽復為巴東南郡輔厈為太守先主征吴於夷道還薨斯郡以尚書令李嚴為都􅇂造設圍戍嚴還江州征西將軍汝南陳到為都􅇂到卒官以征北大將軍南陽宗預為都􅇂預還内領軍襄陽羅獻為代蜀平獻仍其任拜淩江捋軍領武陵太守泰始二年吴大捋步闡唐咨攻獻獻保城咨西侵至朐忍故蜀尚書郎巴郡楊宗告急於洛未還獻出擊闡大破之闡咨退獻遷監軍假節安南將軍封西鄂侯入朝加錫御蓋朝服吴武陵太守孫恢冦南浦安蠻護軍楊宗討之退走因表以宗為武陵太守住南浦誘䘏武陵蠻夷得三縣初附民獻卒以犍為太守天水楊攸為監軍攸遷涼州刺史朝議以唐彬及宗為代晉武帝問散騎常侍文立曰彬宗孰可用立對曰彬宗俱立事績在西不可失者然宗才誠佳有酒嗜彬亦其人性在財欲惟陛下裁之帝曰財欲可足酒嗜難改遂用彬為監軍加廣武將軍迄吴平巴東後省羊渠置南浦晉太康初將巫北井還建平但五縣去洛二千五百里東接建平南接武陵西郡北接房陵奴獽夷蜑之蠻民魚􅂧縣郡治公孫述更名白帝章武二年改曰永安咸熈初復有橘官又有澤水神天旱鳴鼓於􅅖即雨也朐忍縣西二百九十里水道有東陽下瞿數灘山有大小石城􅀔靈壽木鹽井靈􅀛咸熈元年獻靈􅀛於相府大姓扶先徐氏漢時有扶徐荆州著石楚訪有弜頭白虎復夷者也强皃又渠覊切又渠良切文一重音三着石楚訪四字未詳弜其兩切又翹移切弓漢豐縣建安二十一年置在郡西北彭溪源南浦縣郡南三百里晉初置主夷郡與楚接人多勁勇少文學有將帥材涪陵郡巴之南鄙從枳南入折丹涪水本與楚啇於之地接秦時司馬錯由之取楚商於地為黔中郡也漢後恒有都尉守之舊屬縣五去洛五千一百七十里東接巴東南接武陵西接䍧柯北接巴郡土地山險水灘人多戅勇多獽蜑之民縣邑阿黨闘訟必􅋱無蠶桑少文學惟出茶丹漆􅁡蠟漢時赤甲軍常取其民蜀丞相亮亦發其勁卒三千人為連弩士遂移家漢中延熈十三年大姓徐巨反車騎將軍鄧芝討平之見􅀇猨縁其山芝性好弩手自射猨中之猨子㧞其箭卷木葉塞其創芝歎曰嘻吾傷物之性其捋􅋱矣乃移其豪徐藺謝范五千家於蜀為獵射官分羸弱配􅇂捋韓蔣名為助郡軍遂世掌部曲為大姓晉初移弩士于馮翊蓮勺其人性質直雖徙他所風俗不變故迄今有蜀漢關中涪陵其為軍在南方者猶存山有大􅀛其甲可卜其縁可作义世号靈义涪陵縣郡治丹興蜀時省山出名丹漢平縣延熈十三年置萬寧縣孝靈帝時本名永寧漢髪縣有鹽井諸縣北有獽蜑又有蟾夷也巴西郡屬縣七去洛二千八百一十五里東接巴郡南接梓潼北接涼西城土地山原多平有牛馬桑蠶人自先漢以來傀偉俶儻冠冕三巴及郡分後􅅩布榮始周羣父子程公弘等或學兼三才或精秀竒逸其次馬盛衡承伯才藻清妙龔德緒兄弟英氣曄然黄公衡應權通變馬德信王子均勾孝興張伯岐建功立事劉二主之世稱美荆楚乃先漢以來馮車騎范鎮南皆植斯鄉故曰巴有將蜀有相也及晉譙侯修文於前陳君煥炳於後並遷􅀟固倬羣頴世甄在􅀓記縉紳之徒不勝次載焉閬中縣郡治有彭池大澤名山靈臺見文緯書䜟大姓有三狐五馬蒲趙任黄嚴也南充國縣和帝時置有鹽井大姓侯譙氏安漢縣號出人士大姓陳范閻趙平州縣其二縣為郡宕渠郡延熈中置以廣漢王士為太守郡建九年省永興元年李䧺復置今遂為郡長老言宕渠盖為故賨國今有賨城盧城秦始皇時有長人二十五丈見宕渠秦史胡母敬曰是後五百年外必有異人為大人者及雄之王祖世出自宕渠有識者皆以為應之先漢以來士女賢貞縣民車騎將軍馮緄大司農􅀇賀大鴻臚龐雄桂陽太守李温等皆建功立事有補於世緄温各葬所在常以三月二子之靈還鄉里水㬥漲郡縣吏民莫不於水上祭之其列女節義在先賢志宕渠縣郡治有鐵官石􅁡山圖所採也漢昌縣和帝時置大姓勾氏宣漢縣今省右巴國凡分為五郡二十三縣譔曰巴國逺世則黄炎之支封在周則宗姬之戚親故於春秋班侔秦楚示甸衛也若􅕃子之忠烈范目之果毅風惇俗厚世挺名將斯乃江漢之含靈山岳之精爽乎觀其闕足以知其敦壹矣昔沙麓崩卜偃言其後當有聖女興元城郭公謂王翁孺屬當其時故有政君李雄宕渠之厮伍略陽之黔首耳起自流􅈻君獲士民其長人之􅅎良有以也華陽國志卷苐一
