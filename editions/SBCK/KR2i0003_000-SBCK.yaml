front:
  text: 重刋華陽􅀦志叙古者封建五等諸侯􅀦皆有史以記事后丗罷封建爲􅇿縣然亦必有圖志以具述蓋以疆域旣殊風俗各異山川有險要阨塞之當備􅇿邑有廢置割􅈻之不常至於一士之行一民之謡皆有不可歿者顧非筆之於書則不能也周官職方氏掌天下之地圗辨其􅇿國􅚾鄙夷蠻閩貊五戎六狄之人民與其財用之􅁆要至於九榖之所六畜之􅀁産亦未嘗不佔畢而紀其詳况夫環􅁆千里之地分城置邑殆踰􅁆十中間時異事變徃徃裂爲偏方覇􅀦其理􅅍得失蓋有繫天下大􅁆安可使放絶而無聞虖此晉常璩華陽􅀦志之作􅀁以有補於史家者流也子嘗攷其書郶分區别各有條理其指歸有三焉􅈡述巴蜀漢中南中之風土次列公孫述劉二牧蜀二主之興廢及晉太康之混一以迄於特䧺壽􅀔之僣􅀼􅁇之以兩漢以來先後賢人梁益寧三州士女揔讃序志終焉就其三者之間於一方人物尤􅃱深意雖侏離之氓賤俚之婦苟有可􅂑在􅀁不棄此尤足以弘宣風教使善惡知􅀁懲勸豈但屑屑於山川物産以資廣見異聞而已乎本朝元豐間吕汲公守成都嘗刋是書以廣其傳而載祀􅂽忽刓缺愈多觀者莫暁􅀁謂予毎患此久矣假守臨邛官居有暇蓋嘗博訪善本以證其誤而莫之或得因摭兩漢史陳夀蜀書益郶􅂄􅃇傳互相參訂以决􅀁疑凡一事而先後失序本末舛逆者則考而正之一意而詞㫖重複句讀錯雜者則刋而去之設或字誤而文理眀白者則因而全之其他㫄捜逺􅂑求通於義者又非一端凡此皆有眀驗可信不誣者若其無所考據則亦不散臆决姑闕之以竢􅀎者然較以􅃇本之訛謬大略十得五六矣鋟木旣具􅂺叙􅀁以冠於篇􅈡好古博雅與我同志者願無以夏五郭公之義而律之嘉泰甲子季夏朔眉丹稜李墍􅅩廑甫謹叙華陽􅀦志目錄
