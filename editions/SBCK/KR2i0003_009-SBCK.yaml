front:
  text: 華陽國志卷苐九
  hash: sha256:33ad23d2e2404ff9265b7c6f7f447b60344fbe0f7024e55c223091a9e6b0d898
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_009-1a}
body:
  text: 李特雄壽勢志李特字􅀇休略陽臨渭人也祖世本巴西宕渠賨民種黨勁勇俗好􅀑巫漢末張魯居漢中以􅀑道教百姓賨人敬信値天下大亂自巴西之宕渠移入漢中魏武定漢中曽祖父虎與杜朴胡約楊車李黒等移于略陽北土復号曰巴人特父慕為東羌獵將特兄弟五人長兄輔字玄政次特特弟庠字玄序庠弟流字玄通流弟驤字玄龍皆銳驍有武幹特長子蕩字仲平好學有容觀少子雄字仲儁初特妻羅氏夢雙虹自門昇天一虹中斷羅曰吾二兒若有先亡者必大貴雄少時辛冉相當貴有劉化者道術士也言闗隴民皆當南移李氏子中惟仲儁天姿竒異終為人主鄊里人多善之與􅅩父庠竝以烈氣聞人多歸之既克成都衆皆飢餓驤乃將民入郪王城食穀芋雄遣信奉迎范賢欲推戴之賢不許更勸雄自立永興元年冬十月楊襃楊共勸雄稱王雄遂稱成都王追尊曽祖庸曰巴郡公祖父慕隴西王父特景王母曰太后追諡世父輔齊烈王仲父庠梁武王仲父流秦文王兄蕩廣漢壯文公以􅅩父驤爲太傅庶兄始爲太保外兄李國為太宰國弟離爲太尉従弟雲為司徒璜爲司空閻式為尚書令襃為僕射􅀤爲侍中珪為尚書洪爲益州剌史徐輿鎮南王達軍師具置百官下赦建元太武迎范賢為丞相従弟置流子也以不陪列誅之賢既至尊為天地太師封西山侯復其部曲軍征不預租稅皆入賢家賢名長生一名延久又名九重一曰支字元涪陵丹興人也光熙元年雄稱皇帝改元晏平永嘉三年羅羕訇琦等殺李離扵梓潼時閻式去雄依離幷見殺驤攻不克時李雲李璜皆戰􅂮明年文碩殺李國以巴西梓潼爲晉平冦將軍李鳳在晉壽梁州先已為雄所破不守而譙登在涪平西參軍向奮屯漢安之宐福張羅屯平無逼雄雄將張宝弟全在訇􅄾中雄遣宝反爲奸許以代離宝素凶勇先殺人而後奔梓潼宻結心腹㑹羅尚遣使慰勞琦琦等出送其使宝従後閉城門琦等奔巴西雄得梓潼拜寳為太尉雄自攻奮奮走遣驤攻登登初將驤子壽欲以誘驤被攻急救援不至還驤壽五年春驤獲登遣李始􅇂李鳳攻巴西殺文碩是嵗雄姨弟任小受張羅募手刅雄頭雄㡬􅂮改元玉衡是後扶風鄧芝楊虎等各率流民前後數千家入蜀以鳳爲征北梁州任回鎮南南夷寧州李恭征東南蠻荆州皆大將軍校尉剌史雄驤勤䘏百姓扵内鳳回恭招流民扵外稱有功氐苻成隗文既降復叛手傷雄母及其來也咸釋其罪厚加待納皆以為將天水陳安舉隴右來降武都氐王楊茂􅊧奉貢稱臣杜弢自湘州使使求援晉涼州剌史張駿遣信交好漢嘉夷王冲遣子入質頃之朱提審炤率民歸降建寧爨量䝉嶮委誠其餘附者日月而至雄乃虛已愛人寛和政伇逺至邇安年豐穀登乃興文教立學官其賦民男丁一嵗穀三斛女丁一斛五􅂛疾病半之户調絹不過數文綿不過數兩事少役稀民多冨實至乃閭門不閉路無拾遺獄無滯囚刑不濫及但爲國則無威儀官無秩禄職署委積班序無别君子小人服章不殊貨賄公行懲勸不眀行軍無號令用兵無部伍其戰勝不相讓敗不相救攻城破邑動以虜獲爲先故綱紀莫稱李鳳在北數有戰降之功時蕩子稚屯晉壽害其功大興元年鳳以巴西叛驤討之久住梓潼不敢進雄自至涪驤遂斬鳳以壽代鳳以知州征事二年驤伐越嶲又分伐朱提三年獲太守西夷校尉李釗夏進伐寧州大敗扵螳蜋還初氐王楊茂􅊧子難敵堅頭爲劉曜所破奔晉壽晉壽守將李稚蕩苐二子也受其賂遺不送成都曜既引還稚遣難敵兄弟還武都遂即判稚稚悔失計連白雄求伐氐雄許之群臣多諫雄不從遣稚兄琀以侍中中領軍統稚攻難敵由白水道壽遣與稚弟玝由隂平入二道討氐難敵等先拒壽玝玝壽不進而琀稚徑至下辨以深入無繼大爲氐所破稚琀皆􅂮􅂮者千餘人雄深自咎責以謝百姓琀蕩之元子有名望志尚雄欲傳以後嗣甚痛惜之雄妻任無子養琀弟班爲子雄自有庻子十五人群臣上立嗣雄曰孫仲謀割有江東伯符基兆子止侯爵國志恥之宣公舎子立弟君子以爲知人吾將彌縫國志之耻以繼宣公之美驤與司徒王達諫以爲不可雄不従永昌元年冬立班爲太子驤泣曰亂始於是矣泰寧元年越嶲斯叜反攻圍任回及太守李謙遣其征南費黒救之咸和元年夏斯叜破二年謙移郡民扵蜀三年冬驤􅂮追贈相國諡曰漢獻王壽以䘮還拜玝征北梁州代壽以班行撫軍將軍脩晉壽軍屯五年拜壽都􅇂中外諸軍大將軍中護軍西夷校尉録尚書摠統如驤冬壽率征南費黒征東任邵伐巴東至建平監軍毋丘奥退保宐都六年春壽還遣任邵屯巴雄以子越為車騎住廣漢秋壽伐隂平冬城涪縣七年秋壽南征寧州以費黒爲司馬與邵攀等為前軍由南廣入又别遣任回子調由越嶲冬十月壽黒至朱提朱提太守董炳固城寧州剌史尹奉遣建寧太守霍彪大姓爨深等助炳時壽已圍城欲逆拒之黒曰料城中食少霍彪等雖至齎糧不多宐令人入城共消其穀猶嫌其少何縁拒之彪等皆入城城久不下壽欲急攻之黒諫曰南道險俗好反亂宐必待其詐勇已困但當日月制之全軍取勝以求有餘溷牢之物何足汲汲也壽必欲戰果不利乃率以軍事任黒八年春正月炳彪等出降威震十三郡三月剌史尹奉舉州委質遷奉扵蜀壽領寧州南夷初平威禁甚肅後轉凌掠民秋建寧州民毛衍羅屯等反殺太守邵攀䍧柯太守謝恕舉郡爲晉壽破之九年春分寧州置交州以霍炳爲寧州建寧爨深爲交州剌史封壽建寧王張駿使參軍傅頴治中張淳遺雄書勸去尊號稱藩扵晉雄引見謂曰吾過爲士大夫所推然本無心扵帝王也貴州將令行河沙常所希冀進思共爲晉室元功之臣退兾共爲守籓之將掃除氛埃以康帝宇而晉室陵遲徳聲不振引領東望有年月矣㑹獲來貺情鈞闇至有何已已頴淳以爲然使聘相繼巴郡嘗告急云有東君雄曰吾常慮石勒跋扈侵逼瑯琊以爲耿耿不圗乃能舉軍使人欣然雄之雅談多如此􅀋三月壽還夏六月癸亥雄疾病卒時年六十一偽諡曰武帝廟稱太宗凡自立三十年冬十二月丙寅葬成都墓號安都陵也班字世文蕩苐四子也少見養扵雄年十六立爲太子好學愛士毎觀書傳謂其師友天水文夔隴西董融等曰吾見周景王太子晉魏太子丕吳太子孫登文章鍳識超然卓絶未嘗不有慙色何古人之難及乎進止周旋動扵咨問但性輕躁失在田獵甲子襲位玝來奔䘮勸遣雄子越還江陽而欲令期代已知北事班以未葬不許遣玝還涪冬十月癸亥期越殺班扵臨次并殺班仲兄領軍都弟玝奔晉期偽諡班曰戾太子壽追諡曰哀皇帝子幽顒爲期所殺班兄弟五人皆兵􅂮四人無後玝在晉歴巴郡襄陽宐都太守龍驤將軍永和三年従征西扵山陽戰􅂮也期字世運雄苐四子也母冉賤雄妻任養為子少攻學問有客觀雄時令諸子各募合部曲多者纔淂數百人而期獨得千餘人爲安東將軍雄亡越自江陽來赴䘮兄弟怏怏既以班非雄所生又慮玝不利已與兄越宻謀圗班太史令韓約上言宫室有隂謀兵氣戒在親戚班不悟遂因夜哭越殺班期自立以越爲相國與壽竝録尚書事進壽大都􅇂徙封漢王使討玝扵涪封越建寧王以仲兄覇爲中領軍鎮南弟保鎮西西夷校尉汶山太守従兄始征東代越皆大將軍玝走即拜壽梁州知北事咸熙元年春正月立妻閻氏為后下赦改元玊恒秋以司􅀠景騫爲尚書令征南費黒爲司􅀠班舅羅演爲僕射舅羅演與漢王相天水上官澹謀襲期立班子幽謀泄殺澹并誅班母羅琀子礹稚妻昝二年忌從子載多才藝託他事誅之而覇保皆暴病􅂮扵是大臣自疑骨不相親而期志益廣忽􅗦父時公卿政刑失錯四年夏四月壽自涪還襲期假以誅越騫爲言越請散財募士格戰期謂壽不自薄不許既誅越騫初廢期爲邛都縣公五月乃殺期及誅李始等殺兄弟十餘期􅂮時年二十四諡曰幽王五年徙其妻人子扵越嶲勢又使人就越嶲誅其子壽字武考有幹局愛尚學義志度少殊扵諸子雄竒之自代父為將志在功名故東征南伐毎有効事雄疾病侍疾左右左右侍臣造雄顧命寄託扵壽期之殺班也李始初欲附壽圗共討期壽不敢始怒說期取壽憚李玝在北欲藉壽討之故許夀既受漢封北伐玝告以去就利害假道故玝得由巴順水東下吳壽雖伐玝鎮涪嵗終當入朝覲常自危嫌輒造漢中守將張才急書告方外㓂警咸康二年冬北入漢中破走司馬勲壽見期越兄弟十餘人年方壯大而手下有强兵懼不自全數聘命髙士巴西龔壯壯雖不應恐見害不得已數見壽時岷山崩江水竭壽縁劉向之言而惡之毎謀壯以自安之術壯之父及􅅩皆爲特所殺欲假手報讎未有其由因說立事何如舎小従大以危易安開國裂土長爲諸侯名髙桓文勲流百代矣壽従之隂與長史畧陽羅恒巴西解思眀共謀據成都爲晉稱藩㑹養弟攸従成都病還􅂮道中乃佯言越藥殺之又詐造妹婿任調書言期越當廢壽以惑羣下群下信之乃誓文武許賞城中資財得數千人南攻成都子勢爲開門内應遂獲期越誅其宗族十餘人兵入虜掠民家奸滛雄公主及李氏諸婦多所殘害數日乃定恒與思眀及李奕王利等勸壽稱鎮西將軍益州牧成都王以壯爲長史告下又勸令送期扵晉任調與司馬蔡興侍中李艶及張烈等勸壽自立壽亦生心遂背思眀所陳之計稱漢皇帝尊父驤曰獻帝母昝氏曰太后下赦改元漢興以恒爲尚書思朙爲廣漢太守任調鎮北梁州知東羗校尉李奕鎮西西夷校尉更代諸郡及卿佐皆用宿人及已參佐省交州以從子權爲鎮南南夷寧州扵是成都諸李子弟無復秉兵馬形勢者雄時舊臣及六郡人皆斥廢也秋七月李奕從兄乾與大臣合謀欲廢壽壽懼使子廣与大臣盟要爲兄弟進李閎爲征東荆州移鎮巴郡八月天連隂雨禾稼傷損百姓飢疫草莾臣龔壯上封事曰臣聞隂徳必有陽報故于公理獄髙門待封伏惟獻皇帝寛仁厚恵宥罪甚衆靈徳洪洽誕鍾陛下陛下天性忠篤受遺建節志齊周霍誠貫神眀而志緒違理顛覆頋命管蔡既興讒䛕滋􅕃大義滅親撥亂濟危上指星辰昭告天地㰱血朙衆舉國稱籓天應人恱白魚登舟霆震助威烈風順義神誠允暢日月光朙而論者未喻權時定制滛雨汜濆垂向百日禾稼損傷加之饑疫百姓愁望或者天以監示陛下又前日之舉止以救􅍔陛下至心本無大圗而今久不變天下之人誰復分朙知陛下本心者哉且玄宫之䜟難知而盟誓頋違一旦疆􅂣有急内外騷動不可不深思長久之䇿永爲子孫之計也愚謂宐遵前盟誓結援呉㑹以親天子彼必崇重封國歴世雖降階一等永爲靈徳宗廟相承福祉無窮君臣銘勲扵上生民寧息扵下通天下之髙理弘信慎之美義垂拱南面􅁔詩興禮上與彭韋爭美下與齊晉抗徳豈不休哉論者或言二州人附晉必榮六郡人事之不便昔豫州入蜀荆楚人貴公孫述時流民康濟及漢征蜀殘民大半鍾鄧之役放兵大掠誰復别楚蜀者乎論者或不達安固之基惜其名位在昔諸侯自有卿相司徒司空宋魯皆然及漢藩王亦有丞相今義歸彼但當崇重豈當減削昔劉氏郡守令長方仕州郡者國亡主易故也今日義舉主榮臣賴寧可同日而論也論者又謂臣當爲法正陛下覆臣如天養臣如地恣臣所安至扵名榮漢晉不處臣復何爲當侔法正論者或言晉家必責質任及徴兵伐胡何以應之案晉不煩尺兵一國來附威卷四海廣地萬里何任之責胡之在北亦此之憂今平居有東北之虞縦令徴兵但援漢川猶差二門耳臣託附深重忘疲病之穢實感殊遇兾以微言少補朙時常懼殞歿不寫愚心辜負恩顧謹進悾悾伏願罪戮壽不恱然拘前言秘藏之九月僕射任顔雄妻弟也謀反誅并殺雄子約等五年春二月晉將伐巴郡獲李閎閎恭子也初壽許自牛鞞以東土斷與閎執政者以爲不可乃止復不益兵故覆沒閎弟豔以是怨故與朝右有隙是時壽疾病恒思明等復議奉晉計尋郡破壽以為附晉晉當以兵威故不能自斷遂輟計三月拜李奕鎮東代閎夏建寧太守孟彦率州人縳寧州剌史霍彪扵晉舉建寧爲晉遣右將軍李位都討之時權在越嶲秋又遣尚書廣漢李攄爲御史入南中攄祖毅晉故寧州剌史以向與南人有舊故遣之攄從兄演自越嶲上書勸壽歸正返本釋帝稱王壽怒殺之車騎將軍王韜爲參軍知記何事也今仍舊本存此九字扵後以待考右車騎將軍王韜爲參軍九字前後文不相屬不晉康帝建元元年壽卒勢立改元太和太史令韓皓上言熒惑守心乃宗廟不修之譴勢乃更命祀成始祖太宗皆謂之漢勢之弟大將軍廣以勢無子求爲太弟勢不許馬當解思朙固請許之勢疑與廣有謀收當思明斬之廣自殺思朙被收歎曰國之不亡以我數人在也今其殆矣思朙有智略敢諫諍焉當素得人心及其􅂮士民無不哀之冬李奕自晉壽舉兵反單騎突門門者射殺衆潰勢大境内改年嘉寧勢驕滛不恤國事中外離心蜀土無獠南夷别族魯皓切西至是始従山出自巴至犍爲梓潼布滿山谷大爲民患加以饑饉境内蕭條三年春二月桓温伐蜀軍至青衣勢大發兵遣昝堅等將之切姓也昝子感自山陽趣合水諸將欲設伏江南以待晉兵昝堅不従引兵自江北鴛鴦碕渡向犍為曲岸曰碕碕渠覇切温自將步卒直指成都昝堅至犍爲乃知與温異道還自沙頭津濟北至温已軍扵成都之十里陌堅衆自潰勢率衆出戰于笮橋昨笮音中書監王嘏散騎常侍常璩勸勢降勢乃夜開東門走至葭􅎯使散騎常侍王幼送降文扵温勢至建康封歸義侯李氏自起事至亡六世四十七年正僭號四十三年蜀中亦有恠異期時有狗豕交木冬榮勢時涪陵民樂氏婦頭上生􅊁長三寸凡三截之又有民馬氏婦姙身兒脇下生其母無恙兒亦長育有馬生駒一頭二身相着六耳一牡一牝又有天雨血扵江南數畆許李漢家舂米自臼中跳出遽歛扵箕中又跳出寫扵簟中又跳出有猿居鳥巢至城下地仍震又連生毛其天譴不能詳也譔曰特流乘釁險害雄能推亡固存遭皇極不建遇其時與期倡爲􅍔階而壽勢終之詩所謂亂離瘼矣奚其適歸者也長老傳譙周䜟曰廣漢北有大賊曰流曰特攻難得嵗在玄宫自相賊終如其記先識預覩何異古人乎歴觀前世僞僭之徒縦毒䖍劉未有如兹毎惟殷人丘墟之歎賈生過秦之論亡國破家其監不逺矣按常璩華陽國志目録苐九卷及序志皆云述李特雄期壽勢志則勢固有志也今諸本皆無之意者傳寫脫漏因循不録遂失之爾今本諸通鑑所述參以載記所書續成勢志用補其闕以俟後之
