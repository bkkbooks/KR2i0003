front:
  text: 華陽國志卷苐二
  hash: sha256:2d6d675da9cc332eaaf0861c7ad164d80abeae94fa24e1ba2524e41d410cbff7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_002-1a}
body:
  text: 漢中志漢中郡本附庸國屬周赧王二年秦恵文王置郡因水名也漢有二源東源出武都氐道漾山因名漾禹貢流漾為漢是也西源出隴西嶓冡山會白水經葭萌入漢始源曰􅃆故曰漢􅃆在詩曰滔滔江漢南國之紀其應上昭于天又曰惟天有漢其分野與巴蜀同占其地東接南郡南接廣漢西接隴西隂平北接秦川厥壤沃美賦貢所出略侔三蜀六國時楚强盛略有其地後為秦恒成爭地漢高帝既克秦獲子嬰項羽封髙帝為漢王王巴蜀三十一縣帝不悅丞相蕭何謀曰雖王漢之惡不猶愈於􅋱乎且語曰天漢其稱甚美夫􅀎屈於一人之下則伸於萬乘之上者湯武是也願大王王漢中撫其民以致賢人􅀵用巴蜀還定三秦天下可圖也帝從之都南鄭及項籍弑義帝高帝東伐蕭何常居守漢中足食足兵既定三秦蕭何鎮關中資其衆卒平天下以田􅅩為漢中守屬縣十一去洛一千九十一里􅅩既饋以軍饟又致名材立宫室帝嘉之後為魯相然以帝業所興不封藩王自􅅩之後世脩文教有俶儻之士異人竝挺鄧公抗言於孝景之朝以眀忠抂之情張騫特以蒙險遠為孝武帝開縁邊之地賓沙越之國致大宛之馬入南海之象而車渠瑪瑙珊瑚琳碧罽寳明珠玳瑁虎􅅎水精琉璃火浣之布蒲桃之酒笻竹蒟醬􅊋方竒玩盈於市朝振揚威靈被於幽裔遂登九列杖節繡衣剖符博望谷口子真秉箕潁之操湛然岳立不營不求德望邁流楊王孫應至人之概自建武以後羣儒修業開按圖緯漢之宰相當出坤鄉於是司徒李公屢登七政太傅子堅奕世論道其珪璋瑚璉之器則陳伯臺李季子申伯之徒文秀瑋曄其州牧郡守冠葢相繼於西州為盛葢濟濟焉莽時公孫述據蜀跨有漢中當秦隴之徑毎罹於其害安帝永初二年隂平武都羗反入漢中殺太守董炳没畧吏民四年羗􅂧來太守鄭廑出屯襃中欲與羗戰主簿段崇陳禪以為但可堅守來虜乘勝其鋒不可當廑不從戰敗績崇與門下史王宗原展及崇子勃兄子伯生力戰捍廑幷命功曺程信素居守馳來赴難冐冦殯殮厪虜遂大盛天子乃拜巴郡陳禪為漢中太守虜素憚禪更來盤結禪知攻守未可卒下而年荒民困乃矯詔赦之大小咸服既誅其亂首天子善之徙禪左馮翊太守程信怨恥乃結故吏冠蓋子弟嚴孳李容姜濟陳已曺廉勾矩劉旌等二十五人誓志報羗各募壮士豫結同􅋱以待冦太守鄧成命信為五官孳等門下官屬元和二年羗復來巴郡板楯捄之信等將其士卒力奮討大破之信被八創二十五人戰􅋱自是後羗不敢南向五年天子下詔襃歎信崇等賜其家穀各千斛宗展孳等家穀各五百斛列畫東觀每新太守到必先存問其家以羗畏服陳禪拜禪子澄漢中太守漢末沛國張陵學道於蜀鶴鳴山造作道書自稱太清􅀇元以惑百姓陵􅋱子衡傳其業衡􅋱子魯􅀓其業魯字公祺以鬼道見信於益州牧劉焉魯母有少容徃來焉家初平中以魯為􅇂義司馬住漢中斷谷道魯既至行寛恵以鬼道教立義舍置義米義肉其中行者取之量腹而已不得過過多云鬼病之其市肆賈平亦然犯法者三原而後行刑學道未信者謂之鬼䘚後乃為祭酒巴漢夷民多便之其供通限出五㪷米故世謂之米道扶風蘇固為漢中太守魯遣其黨張脩攻固成固人陳調素遊俠學兵法固以為門下􅁺說固守扞禦冦之術固不能用踰墻走投南鄭趙嵩嵩將俱逃賊盛固遣嵩求隱避處嵩未還固又令鈴下偵賊賊得鈐下遂得煞固嵩痛憤杖劒直入調亦聚其賓客百餘人攻脩戰􅋱魯遂有漢中數害漢使焉上書言米賊斷道至劉焉子璋為牧時魯益驕恣璋怒建安五年殺魯母弟魯率巴夷杜濩朴胡袁約等叛為讎敵魯時使使漢朝亦慢憍帝室以亂不能征就拜中郎將漢寧太守不置長吏皆以祭酒為治民璋數遣龐羲李思等討之不􅀎克而巴夷日叛乃以羲為巴西太守又遣楊懐髙沛守關頭請劉先主討魯先主更襲取璋二十年魏武帝西征魯魯走巴中先主將迎之而魯功曺巴西閻圃說魯北降㱕魏武贊以大事宐附託不然西結劉備以歸之魯勃然曰寜為曺公作奴不為劉備上客遂委質魏武武帝拜魯鎮南將軍封襄平侯又封其五子皆列侯時先主東下江安巴漢稽服魏武以巴夷王杜濩朴胡袁約為三巴太守留征西將軍夏侯淵及張郃益州刺史趙顒等守漢中遷其民於關隴二十四年春先主進軍鎮漢中蜀平梁州治􅃆陽大康中晉武帝子漢王迪受封更曰漢國郡但六縣南鄭縣郡治周貞王十六年秦厲公城之有池水從旱山來入􅃆大姓李程趙氏􅃆陽縣州治有鐵官又有度水水有二源一曰清檢二曰濁檢有魚穴清水出􅧖濁水出鮒常以二月八日取蜀丞相諸葛亮葬定軍山襃中縣孝昭帝元鳯六年置本都尉治也山名扶木有唐公房祠也城固縣蜀時以􅃆陽為漢城城固為樂城蒲池縣西鄉縣魏興郡本漢中西城縣哀平之世縣民􅃬光字長冲為交州刺史徙交阯太守王莽簒位拒郡不附莽方有事海内未以為意尋所在兵起遂自守更始即祚正其本官世祖嘉其忠節徵拜為大將軍朝候祭酒封鹽水侯後漢中數冦亂縣土獨存漢季世别為郡建安二十四年劉先主命宐都太守孟達從秭歸北伐房陵上庸自漢中又遣副軍中郎將劉乗􅃆水㑹逹上庸以申躭弟儀為建信將軍西城太守達躭降魏黄初二年文帝轉儀為魏興太守封鄖鄉侯蜀平遂治西城屬縣六萬户去洛一千七百土地險隘其人半楚風俗略與荆州􅃆中郡同西城縣郡治元康元年封越騎校尉蜀郡何攀為公國也鍚縣安康縣興晉縣晉置員鄉縣本名長利縣縣有員鄉洵陽縣洵水所出上庸郡故庸國楚與巴秦所共滅者也秦時屬蜀後屬漢中漢末為上庸郡建安二十四年孟達劉封征上庸上庸太守申躭稽服遣子弟及宗族詣成都先主拜躭征北將軍封鄖鄉侯仍郡如故黄初中降魏魏文拜躭懐集將軍徙居南陽帝省上庸并新城孟達誅後復為郡屬縣五户七千去洛一千七百里上庸縣郡治北巫縣安樂縣咸熈元年為公國封劉後主也武陵縣安冨縣微陽縣新城郡本漢中房陵縣也秦始皇徙吕不韋舎人萬家於房陵以其隘地也漢時宗族大臣有罪亦多徙此縣漢末以為房陵郡建安二十四年孟達征房陵殺太守蒯祺進平三郡與劉封不和封奪達鼓吹關羽圍樊城求助於封逹封達以新據山郡未可擾動為辭羽為吴所破殺達既忿封又懼先主見責遂拜書先主告叛降魏魏文帝善達姿才容觀以為散騎常侍建武將軍襲劉封封敗走達據房陵文帝合三郡為新城以達為太守後蜀丞相諸葛亮將北伐招達為外援故貽書曰嗟乎孟子度邇者劉封侵凌足下以傷先帝待士之望慨然永歎毎存足下平素之志豈虗託名載䇿者哉都護李嚴亦與書曰吾與孔明竝受遺詔思得良伴吴王孫權亦招之達遂背魏通吴蜀表請馬弩於文帝撫軍司馬宣王以為不可許帝曰吾為天下主義不先負人當使吴蜀知吾心乃多與之過其所求明帝太和初達叛魏歸蜀時宣王屯宛知其情乃以書喻之曰將軍昔棄劉備託身國家委將軍以疆􅂣之任任將軍以圖蜀之事可謂心貫白日蜀人愚智莫不切齒於將軍諸葛亮欲相破惟恐無路耳模之所言􅂥孟達謀者郭模亮遣詐降非小事也亮豈輕之而令宣露此迨易知耳達乃以書與亮曰宛去洛八百去此千二百里聞吾舉事當表上天子比相反覆一月間也則吾城已固諸軍足辨則吾所在深險司馬公必不自來諸將來吾無患矣及兵到達又告亮曰吾起事八日而兵至城下何其神速也亮以其數反覆亦不捄遂為宣王所誅滅宣王分為三郡新城屬縣四戸二萬去洛一千六百里房陵縣有維山維水所出東入瀘瀘字疑誤當作漢沵鄉縣昌魏縣綬陽縣右三郡漢中所分也在漢之東故蜀漢謂之東三郡蜀時為魏屬荆州晉元康六年始還梁州山水艱阻有黄金子午馬聰建鼓之阻又有作道九君搏土作人處而其記及漢中記不載又不為李䧺所據璩識其大梗概未􅀎詳其小委曲也梓潼郡本廣漢屬縣也建安十八年劉先王自葭萌南攻州牧劉璋留中郎將南郡霍峻守葭萌城張魯遣將楊帛誘峻求共城守峻曰小人頭可得城不可得也帛退劉璋將向存扶禁由巴閬水攻峻歲餘不能克峻衆才八百人存衆萬計更為峻所破敗退走成都既定先主嘉峻功二十二年分廣漢置梓潼郡以峻為太守屬縣六户萬去洛二千八百三十八里東接巴西南接廣漢西接隂平北接漢中土地出金銀丹漆藥蜜也世有儁彥人侔於巴蜀梓潼縣郡治有五婦山故蜀五丁士所拽虵崩山處也有善板祠一曰惡子民歲上雷杵十牧歲盡不􅂧見云雷取去四姓文景雍鄧者也一本作梓涪縣去成都三百五十里水通于巴於蜀東北之要蜀時大將軍鎮之有宕田平稻田孱水出孱山其源有金銀鑛洗取火融合之為金銀陽泉出石丹大司馬蔣琬葬此大姓楊杜李人士多見耆舊也晉夀縣本葭萌城劉氏更曰漢壽水通于巴西又入漢川有金銀鑛民今歲歲取洗之蜀亦大將軍鎮之漆藥􅁡所出也大將軍費禕葬此山大姓葬此者多白水縣有關尉故州牧劉璋將楊懐髙沛守也廣漢縣徳陽縣有劒閣道三十里至險有閣尉桑下兵民也武都郡本廣漢西部都尉治也元鼎六年别為郡屬縣九戸萬去洛一千八百七十八里東接梓潼西接天水北接始平土地嶮岨有麻田氐傁多羗戎之民其人半秦多勇戇出名馬牛羊漆蜜有瞿堆百頃嶮勢氐傁常依之為叛漢世數征討之分徙其羗逺至酒泉敦煌其攻戰壘戍處所亦多建安二十四年先主遣將軍雷同吴蘭平之為魏將曺洪所破殺魏益州刺史天水楊阜治此郡阜以濱蜀境移其氐傁於汧雍及天水略陽建興七年丞相諸葛亮遣護軍陳戒伐之遂平武都隂平二郡還屬益州魏將夏侯淵張郃徐晃征伐常由此郡而蜀丞相亮及魏延姜維等多從此出秦川遂荒無晉民其氐傁楊濮屬魏魏遙置其郡屬蜀蜀平屬雍州太康六年還梁州八年氐傁齊萬年反郡罹其冦晉民流徙入蜀及梁州永嘉初天水氐傁楊茂搜率種人為冦保據其郡貢獻長安愍帝以胡冦方盛欲懐來戎翟拜驃騎將軍左賢王劉曜破長安丞相平昌公上隴據天水茂搜數饋平昌公拜茂搜長子難敵征南將軍少子堅頭龍驤將軍種衆彊盛東破梁州南連李䧺威服羗戎時平昌公為劉曜所破陳安作賊于時并氐傁如一國茂搜􅋱敵堅代為主數歲曜自攻武都敵堅南奔雄至晉壽遣子為質又厚賂雄兄晉壽守將稚曜不獲敵堅引還武都恃嶮驕慢攻走雄隂平太守羅演演稚舅也稚忿恚白兄含與雄求征之雄使含將稚數千人攻之時敵堅妻􅋱葬於隂平含稚徑至下辨入武街城以深入無繼盡為氐傁所破殺敵堅死子磐毅復代為主咸康四年敵堅從弟初殺磐毅兄弟代為主迄今自茂搜父子之結據也通晉家及李雄劉曜石勒石虎張駿皆稱臣奉貢受其官􅃅所向用其官及其年號下辨縣郡治一曰武街武都縣東漢水所出有天池澤上禄故道縣河池縣泉街縣水入沮合漢也沮縣河池水所出東狼谷也平樂縣脩城縣嘉陵縣隂平郡本廣漢北部都尉永平後羗虜數反遂置為郡屬縣四戸萬去洛二千三百四十四里東接漢中南接梓潼西接隴西北接酒泉土地山嶮人民剛勇多氐傁有黑白水羗紫羗胡虜風俗所出與武都略同漢安帝永初二年羗反燒郡城郡人退住白水㑹漢陽諸羗反溢入漢殺太守漢陽杜琦自稱將軍叛亂廣漢郡屯葭萌漢使御史大夫唐喜討琦進討羗經年不下詔賜􅋱更遣中郎將尹就討羗亦無功諸郡太守皆屯涪元初五年巴郡板楯軍救漢中大破羗羗乃退郡復治置助郡都尉劉先主之漢中也爭二郡不得建興七年諸葛亮始命陳戒平之魏亦遙置其郡屬雍州自景谷有步道徑江由左儋行出涪鄧艾從之伐蜀元康六年還屬梁州永嘉末太守王鑒粗㬥郡民毛深左騰等逐出之相率降李雄晉民盡出蜀氐羗為楊茂搜所占有隂平縣郡治漢曰隂平道也甸氐縣有白水出徼外入漢武平縣有關尉自景谷有步道徑江由左儋出涪鄧艾伐蜀道也劉主時置義守號關尉剛氐縣涪水所出有金銀鑛右梁州譔曰漢􅃆彪炳靈光上照在天鑒為雲漢於地畫為梁州而皇劉應之洪祚攸長蕭公之云不亦宐手華陽國志卷苐二
