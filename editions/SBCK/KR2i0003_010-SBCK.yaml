front:
  text: 華陽國志卷苐十上
  hash: sha256:c26b36bf5ec7669a6e340f13dfa9a55b3568766121630b834dc9da7f06112785
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_010-1a}
body:
  text: 先賢士女揔讚含和誕氣人倫資生必有賢彦爲人經紀宣德逹教博化篤俗故太上立德其次立功其次立言品物煥炳􅂜倫攸叙也益梁爰在前代則夏勲配天而彭祖體地及至周世韓服􅀅命􅟵子忠堅然顕者猶鮮豈國史簡􅇅亦􅀅分以秦楚希預華同自漢興以來迄乎魏晉多士克生髦俊盖丗愷元之疇感于帝思扵是璽書交馳扵斜谷之南束帛戔戔于梁益之鄊或迺龍飛紫閣􅁢陟璿璣亦有磐桓利居經綸皓素其躭懐道術服膺六藝車之招旃旌之命徴名聘德忠臣孝子烈士賢女高劭足以振玄風貞㳤可以方蘋蘩者奕丗載美是以四方述作來丗志士莫不仰髙軌以咨詠憲洪猷而儀則擅名八區爲世師表矣故􅂄􅃇之篇較義史漢而今志州部區别未可揔而言之用敢撰約其善爲述讚因自注解甄其洪伐尋事􅇚義畧可以知其前言徃行矣蜀郡士女嚴平恬泊皓然沉冥嚴遵字君平成都人也雅性澹泊學業加妙専精大易躭扵老莊常卜筮於市假􅆱􅀛以教與人子卜教以孝與人弟卜教以悌與人臣卜教以忠扵是風移俗易上下慈和日閱得百錢則閉肆下簾授老莊著指歸爲道書之宗揚雄少師之稱其德杜陵李強爲益州刺史謂雄曰吾眞得君平矣雄曰君但可見不能屈也強以爲不然至州脩禮交遵遵見之強服其清高而不敢屈也歎曰揚子雲眞知人也年九十卒雄稱之曰不慕夷則由矣不作苟見不治苟得久幽而不改其操雖隨和何以加諸仲元抑抑邦家儀形李弘字仲元成都人少讀五經不爲章句処陋巷淬勵金石之志威儀容止邦家師之以德行爲郡功曺一月而去子贅以見辱殺人太守曰賢者之子必不殺人放之贅自以枉語家人弘遣亡命太守怒讓弘弘對曰贅爲殺人之賊朙府私􅀪枉法君子不誘而誅也石碏殺厚春秋譏之孔子稱父子相􅀮直在其中弘實遣贅太守無以詰也州命從事常以公正諌爭爲志揚子雲稱之曰李仲元爲人也不屈其志不累其身不夷不恵可否之間見其貌者肅如也觀其行者穆如也聞其言者愀如也非正不言非正不行非正不聽吾先師之􅀁畏子雲玄逹煥乎弘聖揚雄字子雲成都人也少貧好道家無擔石之儲十金之費晏如也好學不爲章句初慕司馬相如綺麗之文多作詞賦車􅀐􅀅軍王音成帝􅅩舅也召爲門下史薦待詔上甘泉羽獵賦遷侍郎給事黄門雄旣升秘閣以爲詞賦可尚則賈誼升堂相如入室武帝讀大人賦飄飄然有凌雲之志不足以諷諌乃輟其業以經莫大扵易故則而作太玄􅀓莫大扵論語故作法言史莫善扵蒼頡故作訓纂賦莫弘扵離騷故反屈原而廣之典莫正扵爾雅故作方言初與劉歆王莾董賢同官竝至三公雄歷三帝獨不易官年七十一卒自劉向父子桓譚等深敬服之其􅀇源淵懿後世大儒張衡崔子玉宋仲子王子雍皆為注解吳郡陸公紀尤善扵玄稱雄聖人雄子神童烏七歲預雄玄文年九歳而卒林生清􅄫莫得而名林閭字公孺臨邛人也善古學古者天子有輶車之使自漢興以來劉向之徒但聞其官不詳其職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同主海内之音韻使人主居高堂知天下風俗也揚雄聞而師之因此作方言閭隠遯丗莫聞也泛鄊忠貞社稷是經進賢爲國稽攷典刑􅋢莫助之身殞朝傾何武字君公郫人也初以對䇿甲科為郎歴􅀭兖州刺史司􅀠校尉京兆尹清河楚沛太守廷尉御史大夫成帝初具三公拜大司空封泛鄊侯爲人忠厚公正推賢進士在楚致兩龔在沛厚兩唐臨司􅈻致茂陵何竝居公位進辛慶忌皆丗名賢臨州郡雖無赫赫之名及去民思之才雖不及丞相薛宣翟方進而正直􅂈之哀帝即位㠯朱博趙玄爲公卿用事免官諌大夫鮑子都亟言訟之丞相王嘉亦以爲慨帝復徵武爲御史大夫徙前將軍時大司馬新都侯王莾避帝外家丁傅氏遜位亦以列侯見徵哀帝詔博舉太常莾從武求舉武以莾姧人之雄不許哀帝崩王太皇太后莾姑也即日引莾入收大司馬董賢印綬詔舉大司馬丞相孔光等逼王氏皆舉莾武與左􅀅軍公孫禄謀曰莾五父丗朝權傾人主必危劉氏乃舉禄禄亦舉武太后不從用莾爲大司馬莾諷有司劾奏皆免武就國後莾寖盛遂爲宰衡安漢公欲圗簒漢憚武與其叔紅陽侯王立不從元始三年因吕寛吳章事檻車徴武武自殺衆咸寃之莾欲厭衆心謚武曰剌侯子况嗣平帝崩莾因居攝後僭王位􅅩文播教變風爲雅道洽化遷我寔西魯張寛字􅅩文成都人也蜀承秦後質文刻野太守文翁遣寛詣博士東受七經還以教授扵是蜀學比於齊魯巴漢亦化之景帝嘉之命天下郡國皆立文學由翁唱其教蜀爲之始也寛從武帝郊甘泉泰畤過橋見一女子躶浴川中乳長七尺曰知我者帝後七車適得寛車對曰天有星主祠祀不齊㓗則作女令見帝感寤以爲揚州刺史復别虵莾之妖世稱云七車張作春秋章句十五萬言長卿彬彬文爲丗矩司馬相如字長卿成都人也逰京師善属文著子虚賦而不自名武帝見善之曰吾獨不與此人同丗楊得意對曰臣邑子司馬相如􅀁作也召見相如相如又作上林賦帝悓以爲郎又上大人賦以風諌制封禪書爲漢詞宗官至中郎􅀅丗之作詞賦者自揚雄之徒咸則之王淵􅃩麗蔚若華國王襃字子淵資中人也以高才文藻侍宣帝初爲王襄作樂賦中和頌宣帝時又上甘泉洞簫賦帝善之令宫人誦之爲諌大夫卒子山翰藻遺篇有厚楊終字子山成都人也年十三已能作雷賦通屈原七諌章後坐太守徙邊作􅀌憤詩朙帝時與班固賈逵竝爲校書郎刪太史公書爲十餘萬言作生民詩又上符瑞詩十五章制封禪書著外傳十二卷章句十五萬言皆傳於丗者少遷猛毅垂勲三邦陳立字少遷臨邛人也成帝時牂柯有亂􅀅軍王鳯薦立爲太守克平􅍔亂徙守巴郡秩中二千石治有尤異又徙天水太守為天下最天子賜黄金四十觔入為左衛護軍世公賦政祥瑞來同王阜字世公成都人也太守苐五倫察舉孝㢘為重泉令有鸞鳥集於文學十餘日遷益州太守神馬出滇池河甘露降白烏見民懐之如父母猗欤文父叡􅀤㓜童德澹㑹稽道崇辟雍張覇字伯饒謚曰文父成都人也年數嵗以知禮義諸生孫林劉固段著等宗之移家其宇下啓母求就師學母憐其稚對曰饒能故字伯饒也爲㑹稽太守撥亂興治立文學學徒以千數風教大行道路但聞誦聲百姓􅁔詠之􅃱逹名士顧奉公孫松畢海胡毋官萬虞先王演李根皆至大位在郡十年以有道徵拜議郎遷侍中遂授覇五更尊禮於文學年老卒葬於河南少府委遲作卿作師趙典字仲經成都人也太尉戒孫也與潁川李膺等竝號八俊三爲侍中自樂禄俸施貧方授國師未拜病卒何楊研神貫奥入微何英字􅅩俊郫人也楊由字哀侯成都人也二子學通經緯英著漢徳春秋十五卷孫汶字景由亦深學初徵上日食盗賊起有効為謁者京師旱請雨即澍遷犍為屬國著世務論三十篇卒楊由爲太守㢘范文學范稱能治由言當有賊發頃之廣柔羗反冦殺長姚超鄊人冷豐齎酒􅀱之值客未内由爲知其多少又言人當􅃱果其色赤黄果有送甘橘者大將軍竇憲從太守索雲氣圗由諌莫與尋憲受誅其眀如此著書十篇而卒司農朙􅁢國憲是維任昉字文始成都人也初爲葉令治姧賊七十餘人遷梁相尚書令清身撿下大將軍梁冀憚之出爲魏郡徙平原歳出租稅百萬冀誅復入爲尚書令司􅀠校尉遷大司農卒弟愷徐州刺史亦有治名昉父循字伯度爲長沙太守得其父時爲五官事在精通也翁君美秀牧後寤機何覇字翁君司空武兄也爲郡户曺刺史王尊􅀅之官移諸郡不得遣迎太守唯覇白宐徃太守遣覇尊大怒覇對曰太守遣覇非脩敬也以去京師久遲知朝廷起居耳尊遽下車持節對之因竒覇容止辟爲别駕舉秀才爲属國中郎􅀅弟名闕潁川太守兄弟五人皆有名伯騫推賢求善如飢柳宗字伯騫成都人也初結九友共學號九子及爲州郡右職務在進賢㧞致求次方張􅅩遼王仲曽殷智孫等終至牧守州里爲諺曰得黄金一笥不如爲伯騫􅀁議舉茂才為陽夏太守文侯顒卬極位台衡文侯趙戒字志伯少府典祖也父定以遊俠稱戒順桓帝之丗歷司徒太尉登特進屢居公輔免憂患無妄之丗告歸于蜀薨太尉頡頑志振頽綱趙謙字彦信戒孫也歴位卿尹初平元年爲太尉時董卓秉政欲遷天子長安謙與司空苟爽固諫卓不􅃪以爲車􅀐將軍奉大駕西幸封洛亭侯拜司􅈻校尉忤卓指免討白波賊有功封侯進司徒免拜尚書令大㒒三年薨謚曰忠侯司徒繼踵僶俛權横趙温字子柔謙弟以侍中與同輦西遷封江南亭侯兄亡初平四年拜司空未期進司徒當丗榮之時車􅀐􅀅軍李傕與董承張濟等爭權數遷移天子温以書切責扵傕天子聞寒心尋曺公入徙天子都許政出諸侯禮待温居公位十五年建安十三年薨猶操道柄董李是讓讓責也董卓李傕凶擅謙温干之初文侯與李固胡廣議立清河王蒜而冀欲立蠡吾趙戒脅而從之使李固枉􅂮君子以爲卓傕之惡甚扵梁冀謙摩卓之牙温弄傕之爪雖逼權勢以道陳訓賢其祖逺矣侍中授命分節亦章常洽字茂尼江原人也自荆州刺史遷京兆尹侍中長水校尉以兵衞大駕西幸傕等作難常侍衞天子左右爲傕􅀁煞蠻夷猾擾倡亂南疆子恭要􅀓醜穢于攘楊竦字子恭成都人也永初中越嶲永昌夷反􅋊破郡縣衆十萬餘刺史張喬以竦勇猛授從事任平南中竦先以詔書告喻不服乃加誅殺虜三萬餘人􅀗生口千五百人財物四千萬降夷三十六種舉正姧濁長吏九十人黄綬六十人南中清平㑹被傷卒喬舉州弔贈列画東觀伯春孟元厈正時君張充字伯春李幾字孟元江源人也充爲治中從事時刺史恃豪每見從事布席地坐已自安高牀上充入閤不肯進刺史寤乃更禮從事刺史辟公孫特大姓犍爲李威橋稚充曺闕事節時有水災倫受刺史指以漢中升平不足表聞幾固爭之後刺史至與倫不平求郡短劾倫不言水災幾對以詔書上災異不得由州倫遷司空辟幾掾幾居希切説文㣲也始出幾古字今作㡬楊羅爲小遺􅋢在民楊班字仲桓成都人也羅衡字仲伯郫縣人也俱師徴士何初山班爲不韋茂陵令治化浹洽徙西城閬中令號時名宰衡爲萬年令路不拾遺人家牛馬皆繫道􅁁曰屬羅公三府爭辟拜廣漢長二縣皆爲立祠小伯温恭預圗息紛陳湛字小伯成都人也歴數縣令民皆懐之州辟治中從事廣漢太守遣子詣州脩歡交使君欲納湛諌不可失羔羊義使君從之後有言州郡私交者考之無得乃朙也孟由至孝遐葉晞風禽堅字孟由成都人也父信爲縣史越嶲爲夷􅀁得傳賣歷十一種去時堅方姙六月生母更嫁堅壮乃知父湮沒鬻力傭賃求碧珠以求父一至漢中三出徼外周旋萬里經六年四月突瘴毒狼虎乃至夷中得父父相見悲感夷徼哀之即􅀅父歸迎母􅃱飬州郡嘉其孝召功曺辟從事列上東觀太守王啇追贈孝㢘令李苾爲立碑銘迄今祠之仲圼勉師仲圼成都人也少受學扵嚴季后季后爲汶江尉呼仲圼仲圼許十月徃㑹反斷道仲圼期扵徃經渡六千㡬􅂮數年卒得至汶江爲季后陳䇿俱得免難逺近歎之􅅩本慕仁任末字􅅩本繁人也與董奉德俱學京師奉德病􅋱推􅎷車送其喪師亡身病齎棺赴之道􅋱遺令敕子載䘮至師門叙平生之志也伯禽證􅀅朱普字伯禽廣都人也爲郡功曺太守與刺史王冀有隟枉見劾普詣新都獄掠笞連月肌肉腐臭惡同􅋱人證太守無事敕其子曰我􅋱載喪詣闕使天子知我心事得情理普以烈聞文寺代君李磬字文寺嚴道人也爲長章表主簿旄牛夷叛入攻縣表倉卒走鋒刅交至磬傾身捍表謂虜曰乞殺我活我君虜乃殺之表得免太守嘉之圗象府􅒉在三義敦終始可稱人生扵三事若一君父師也言人靡不有初鮮克有終普磬可謂能終始也炎光中微巨述僭亂炎火光也漢以火德王自高祖至平帝十二丗國嗣三絶平帝早崩安漢公王莾字巨君遂簒天子位稱新室皇帝而茂陵公孫述字子陽爲莾導江卒正遂僭號于蜀章王刎首章眀字公孺新繁人也王皓字子離江原人也朙爲太中大夫莾簒位歎曰不以一身事二主遂自殺皓爲美陽令去莾歸蜀公孫僣號使使聘之皓乃自刎以頭付使者述慚怒誅其妻子侯剛哭漢剛字直孟新繁人也爲郎見莾篡位佯狂負木升守闕號哭莾使人問之對曰漢祚無窮吾寧􅋱之不忍事非主也莾追殺之公卿絶脰亦蹈節貫王嘉字公卿江原人也爲郎去莾還􅅏蜀公孫述先閉其妻子使人徴之嘉聞王皓􅋱歎曰吾後之㢤亦自殺述慙貰其妻子羅生美至思濟艱難述方遂非􅋊彼貞幹羅衍字伯紀成都人也爲述郎􅀃述尚書解文卿鄭文伯使諌述降漢爲子孫福解鄭從之述怒閉二子扵薄室六年二子守志不回遂幽􅂮卒衍察孝㢘徵博士劉主割據資我英俊鴻臚淵通與道推運何宗字彦英郫縣人也通經緯天官推步圗䜟知劉備應漢九丗之運讚立先主爲鴻臚方授公輔㑹䘚君肅矯矯頴􅀋倬群何祗字君肅宗族人也初犍爲楊洪爲太守李嚴功曺去郡數年以爲蜀郡嚴在官祗爲洪門下書佐去郡數年以爲廣漢洪猶在官是以西土咸服諸葛亮之能􅄃㧞秀異也祗徙犍爲太守卒輔漢朗捷服時之懃張裔字君嗣成都人也汝南許文休稱其才鍾元常輩也爲輔漢􅀅軍丞相長史丞相北征居府統事足食足兵太常清宻􅃉逺鈎深杜瓊字伯瑜成都人也師事任安粗通經緯術藝爲太常沉黙愼宻稱諸生之淳休休衆彦􅊋途同臻金聲玉振蜀之球琳休休美也衆彦言此四十三人也易曰􅊋塗同歸百行齊􅃱貴扵流光顕稱揚名垂丗此四十三人者雖立行不同俱以垂美如金玉之音器爲丗名寳述蜀郡人士敬司穆穆暢始􅀇終敬司馬氏女五更張伯饒妻也覇前妻有三男一女敬司産一男撫教五子㤙􅋢若一覇卒葬河南敬司與諸子還蜀疾病遺令告諸子曰舜葬蒼梧二妃不從汝父在梁吾自在蜀亦各其志勿違敕也遂葬蜀子光超樂母教爲聘士也叔紀婉娩十媛仰風􅅩紀覇女孫也適廣漢王尊至有賢訓事姑以禮生子啇海内名士廣漢周幹古朴彭勰漢中祝􅀛爲作頌曰少則爲家之孝女長則爲家之賢婦老則爲子之慈親終温且惠秉心塞淵宐謚曰化朙恵母公乘氏張兩髦義崇公乗㑹妻廣都張氏女也夫早亡無子姑及兄弟欲改嫁之張誓不許而言之不止乃断髮割耳飬㑹族子事姑終身助陳撫孩節篤分充助陳臨邛陳氏女犍爲揚鳳珪妻也鳳珪亡飬遺生子守節兄弟必欲改嫁乃引刀割咽宗族駭之㡬􅋱遂全其義二常焭焭頽搆再隆元常靡常江原人也元常廣都令常良女適廣漢便敬賔早亡元常無子飬賓族子父母欲嫁乃祝刀誓志而􅋱靡常仲山女適成都殷仲孫家􅇜疫氣􅋱亡惟靡常在十八収葬諸喪飬遺生子立美成家紀常哀哀精感昭融紀常常侍常洽女趙侯夫人也父遇害在長安一兄皆先殁遣父門生瞿登張順迎䘮時冦賊蜂起晝夜悲哀順登得將䘮無恙還時人皆以紀常精誠􅀁感貢羅誓志貢羅郫羅倩女景奇妻也竒早亡無子父愍其年壮以許同郡何詩貢羅白晝誓父不還家父使詩乃白州州告縣逼遣之羅乃訴州刺史髙而許之玹何忘生玹何郫何氏女成都趙憲妻也憲早亡無子父母欲改嫁何恚憤自幽乃不食旬日而􅋱郡縣爲立石表昭儀殉身昭儀新繁張氏女廣漢朱􅅩賢妻也賢爲郡􅇂郵建安十九年劉主圍劉璋扵成都賢坐謀外降璋以昭儀配兵將見逼昭儀自殺三軍莫不哀歎三姚見靈廣柔長郫姚超二女姚妣饒未許嫁隨父在官值九種夷反殺超􅀗二女欲使牧羊二女誓不辱乃以衣連腰自沈水中􅋱見夢告兄慰曰姉妹之䘮以某日至漑下慰寤哀愕如夢日得䘮郡縣圗象府廷峨峨㳤媛表圗銘旌㳤善媛婉娩也言此十二女皆圗像列􅀓述蜀郡列女右蜀郡士女讚苐一凡五十五人十二人女四十三人士華陽國志卷苐十上華陽國志卷十中廣漢士女講學沖􅃉洙泗是稀㣧帝紹聖庻熈疇咨楊宣字君緯什邡人也少受學扵楚國王子張天文圖緯扵河内鄭子侯師事楊翁􅅩能暢鳥言長於災異教授弟子以百數成帝徵拜諌大夫帝無嗣宣上封事勸宐以定陶恭王子爲太子帝從之出宣爲交州牧太子即位為哀帝拜河内太守徵太倉令上宐封周公孔子後帝從之封周公孫相如爲襃魯侯孔子後孔均爲襃成侯又薦遼東王綱瑯琊徐吉太原郭越楚國龔勝等宐贊隆時雍平帝時命持節爲講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿祈虎命邦綽有餘徽鄭純字長伯郪人也爲益州西部都尉処地金銀琥珀犀象翠羽出作此官者皆冨及十丗純獨清廉毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之朙帝嘉之乃改西部爲永昌郡以純爲太守在官十年卒列画頌東觀三老泱泱實作父師楊綂字仲通新都人也事華里先生炎高高戒綂曰漢九丗王出圖書與卿適應之建武初天下求通内䜟二卷者不得永平中刺史張志舉統方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光禄大夫以年老道深飬扵辟雍授几杖爲三老卒内䜟二卷竟未詳平仲涉道殆乎庻㡬王祐字平仲郪人也少與雒高士張浮齊名不應州郡之命司􅀠校尉陳紀山名知人稱祐天下之高年四十二卒弟􅀗志其遺言撰王子五篇東觀郎李勝文章士也作誄方之顏子列画學宫􅀗一作灌文父朙洞探賾索微楊序字仲桓統仲子也道業侔父三司及公車連徵辭拜侍中上言四方及荆交州當兵起人民疫蝗洛陽大水宫殿當災三府當免近戚謀變皆効驗大將軍梁冀秉權自退去授門徒三千人本初元年及建和中特徴聘不行年八十三卒天子痛惜詔謚曰文父弟子雒昭約節宰綿竹寇懽文儀蜀郡何萇㓜正俟祈升伯巴郡周舒􅅩布及任安董扶等皆徴聘辟舉馳名當世元章玄泊韜光匿耀段翳字元章新都人也明經術妙占未來常告大渡津口曰某日當有諸生二人荷擔問翳舍処者幸爲吿之後竟如其言又有人從兾州來學積年自以精䆒翳術辭去翳爲筒作書封頭與之告曰有急發之至葭􅎯爭津吏撾從者頭諸生發筒筒中有書曰到葭􅎯爭津破頭以膏褁之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子稚子奕奕古之畏􅋢王渙字稚子郪人也初爲河内温令路不拾遺臥不閉門民􅁔之曰王稚子丗未有平徭役百姓喜遷兖州刺史部中肅清徴拜侍御史洛陽令聦朙恵斷公平㢘正抑強扶弱化行不犯發姧擿伏思若有神京華宻静權豪畏敬元興元年卒百姓痛哭二縣弔祭行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦􅁔之爲立祠天子悼惜每下詔書德令必賜後嗣與卓茂等爲伍敬伯愷悌􅀣德播恵王堂字敬伯郪人也初臨巴郡進賢逹士舉孝子嚴永􅀮士黄錯及張璊陳髦民爲立祠徙任左扶風政教嚴眀帝舅車􅀐􅀅軍閻顯大將軍竇憲中常侍江京等嘱託輒拒之白􅎷見象不以爲祥徙魯相又徙汝南守舉陳蕃爲功曺應嗣司􅀠校尉號知人之鑑􅅩宰濟濟以禮進退馮顥字􅅩宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞􅅩雅初爲謁者威儀濟濟爲成都令遷越嶲太守􅀁在著稱爲梁冀􅀁不善冀風州追之􅀮居作易章句及刺奢說修黄老恬然終日大匠竒暢妙監玄察盡言丗䂓秪以隕越翟酺字子超雒人也少師事段翳以朙天官爲侍中尚書常見太史令孫懿􅒣欷涕泣曰圖書有賊臣孫登將以才智爲黄門開路君表相應之是以悽愴後爲京兆尹光禄大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之間薦故太尉龎參故司徒李郃眀通三才忠正可以輔丗􅀁言每指利疾權貴誣酺及尚書令高堂芝交構免􅋱著援神􅆻經説卒家司􅀠聦敏奮名後葉郭賀字喬卿雒人也初爲太守黄幸戸曺幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽㽞詔殺之由是顕名太守蔡茂命爲主簿茂夢坐太極殿上得嘉禾三穗以問賀對曰朙府位當至三公旬月茂遷司徒表賀朙律令稍遷侍中尚書僕射司􅀠校尉荆州刺史朙帝南巡狩善其治徵河南尹卒天子痛惜賜錢三十萬鐔恭翩翩交友惟賢鐔顕字子誦郪人也蔡弓字子騫雒人也俱攜手共學冬則侍親春行受業與張覇李郃張皓陳禪爲友共師司徒魯恭顕又與王稚子同見察孝扵太守陳司空歷豫州刺史光禄大夫侍中衞尉弓爲廬江太守徵拜郎而覇郃皓禪皆至公㑡兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如􅀭雄之才朙帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諌大夫樂安相後與劉珍共撰漢記孫􅂶有文才勝爲東觀郎著賦諌論頌數十篇憲父懸車王稚字􅅩起堂㓜子也屡拒孝㢘公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人録其本幸謚曰憲父癸未詔書以安車聘請會已亡徵君肥遯馮信字季誠郪人也郡三察孝㢘州舉茂才公府十辟公車再徵不詣公孫述時託目􅌌盲傅婢奸其前陽不覺述卒以年不之出董任循志束帛戔戔董扶字茂安任安字定祖綿竹人也家居教授弟子自逺而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道爲侍中觀漢􅀅亂求爲屬國還蜀安察孝㢘及茂才公府辟公車徴皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表汜博提攜士彦王啇字文表廣漢人也博學多聞州牧劉璋辟爲治中試守蜀郡太守荆州牧劉表大儒南陽宋仲子逺慕其名皆與交好許文休稱啇中夏王景興軰也啇勸璋􅄃竒枝雋甚善厈捄薦􅃱名士安漢趙韙及陳實盛先墊江龔揚趙敏􅀺景閬中王澹江州孟彪皆至州右職郡守又爲嚴李主祠正諸祀典在官一十年而卒超􅀋㧞萃寔惟世信劉寵字世信綿竹人也出自􅀌微以朙公芊春秋上計闕下見除成都令政教朙肅時諸縣多難治乃換寵爲郫令又換郪安漢皆垂績還在成都遷牂柯太守初乘一馬之官布衣􅂼食儉以爲教居郡九年乘之而還吏人爲之立銘王啇陳實當世貴士皆與爲友節英亢烈仰訢鼎臣段恭字節英雒人也少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彦之章渤海紀􅅩陽遂眀天文二卷東平虞􅅩雅學絕高當丗遂逰扵蜀恭以朋友禮待之後爲上計掾爲有司劾太尉龎參兼舉茂才孝㢘參性忠正亮直爲貴戚􅀁擯以恚發病逺近稱寃恭不能耐其狂亢䟽表參忠直不當以讒佞傷毁忠正帝悟即日召西曺掾問疾尋羊酒慰勞參忠士㳺孝湻感物悟神姜詩字士㳺雒人也事母至孝母欲江水及鯉魚膾又不能獨食須隣母共之詩嘗供備子汲江溺􅋱秘言遣學不使母知扵是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比隣公孫述平後東精爲賊掠害不敢入詩里時大􅂽餓精􅃱米肉與詩詩埋之永平二年察孝㢘朙帝詔曰大學入朝孝㢘一切皆平之除江陽符長􅀁居鄉皆爲之立祠少林隂德陽報是甄王忳字少林新都人也遊學京師見客舍有一書生困病忳􅀮視奄忽便絕有金十斤忳以一斤買棺木九斤還腰下葬埋之後爲大度亭長大馬一匹來入亭中又有繡被一領飛墮其前人莫識者郡縣畀忳後乘馬到雒縣馬牽忳入他舍主人問忳􅀁由得馬忳具說其状并及繡被主人悵然曰卿何陰德而􅃱此忳說昔埋書生事主人驚曰是我子也姓金名彦卿乃葬之不報天彰郷德辟舉茂才除郿令宿漦亭中數有人爲鬼􅀁殺忳上樓夜半有女子稱寃曰妾涪令妻也當之官宿此枉爲亭長􅀁殺大小二十口埋在樓下奪取財物忳曰汝何故恒殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召逰徼詰問具服即收同謀十餘人殺之送涪令䘮還郡里當丗稱之仲魚謙沖芉朞字仲魚郪人也父爲交州刺史卒官朞迎喪不敢取官舍一物郡三察孝㢘公府辟州别駕皆不應太守尹奉棄刑名行禮樂請爲功曺刺史必欲借朞自佐不得已爲别駕後爲太守孫寶蔡茂祋諷功曺常欲渡津津吏滯停車待之三日將宿亭中有縣吏引車避之爲野王令雲卿安貧朱倉字雲卿什邡人也受學扵蜀郡張寧飱豆飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧以步行爲郡功曺每察孝㢘羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式玄照折像字伯式雒人也其先張江爲武威太守封南陽折侯因氏焉父國爲鬱林太守家資二億故奴姫八百人盡􅄆以施宗族䘏贍親􅃇葬􅋱弔䘮事東平虞􅅩雅以道教授門人朋友自逺而至時人爲諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但説天文論五經孟宗當仁味道好施清風邁倫讚仲魚已下也杜眞字孟宗綿竹人誦書百万言兄事翟酺酺免後尚書令與司􅀠校尉枉劾之復徵詣獄眞上章救之受掠笞六百獄中朙酺無事京師壯之以漢道微散財施宗族不應公州辟命及辭長吏候迎每交扵門乃斷髪以自絕漢儒請雨精感慶雲諒輔字漢儒新都人爲郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰不雨則欲自焚爲貪叨吏謝罪百姓言終㬥雨韓揆義烈韓揆字伯彦綿竹人也爲令錡裒主簿値黄巾賊入界扶裒走入草中裒遣求􅀮翳処未還裒爲賊􅀁得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而苟自活非忠乃自殺喬雲勇震左喬雲綿竹人也少爲左通􅀁飬爲子通坐任徒徒逃吏欲破通臏通無壯子故爲吏􅀁侵喬雲時年十三喟然憤怒以銳刀煞吏解通將走令出追初聞以爲壮士及知小兒爲之流涕楊寛證將烈播友人寛字叔舒新都人父斌證令萬丗太守祋諷以忠義壯聞寛爲郡吏鄊人馬閏章言太守王方寛與兄偕詣獄證之得理後方當遷南郡閏復章之寛乃發閏臨私事閏伏罪友人汝錕爲張朙􅀁煞寛怒縛朙送錕家使自謝之也寗􅅩執仇寗􅅩自茂奉廣漢人與友人張昌共受業太學昌爲河南大豪吕條􅀁殺􅅩煞條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍爲謝裒裒􅋱負土成墳三年裒子爲人􅀁煞鉗復其仇自拘武陽獄會赦免當丗義之賈爲士􅋱分侔虞朱賈祤字元集什邡人也雒孟伯元爲父復讎聞祤名徃投之雒縣追伯元蹤祤歎曰士以義遇我豈可倍哉煞雒縣必移什邡負我君乃自煞李勝言之以方虞卿魯之朱家爰迄劉氏司農含章爽朗翠粲觀國之光秦宓字子敕綿竹人也初􅀮遁不應州郡之命丞相亮領益州牧以􅃟爲别駕中郎􅀅吳使張温將反命亮率百官饑之温與宓語荅問若響應聲辭義雅美温大敬服以爲蜀之有宓猶魯仲尼也遷長水校尉司農宓甚有通理弟子譙周具􅀓其業李王四子竝作琳琅李朝字永南弟邵字偉南郪人也王士字義强從弟甫字國山文表諸弟也先主領牧朝爲别駕群下上先主爲漢中王其文朝所造也後丞相亮府辟西曺掾亦有文才兄弟三人號三龍士歴宕渠犍爲益州太守甫善言議闕人流美稱自綿竹令爲州右職優游容與特進太常鐔承字公文郪人也歴郡守州右職爲少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諌君刎首王累新都人也州牧璋從别駕張松計遣法正迎先主主簿王權諌不納累爲從事以諫不入乃自刎州門以眀不可鄭度進䂓忠謀莫受雖云天時抑由人咎度綿竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野糓是資急驅巴西梓潼民内涪水以南一切燒除野糓固壘待之彼請戰不許久無􅀁資不過百日必當囘先主聞而惡之璋不納言雖天亦由璋之愚永年負才自喪丗主彭羕字永年廣漢人有俊才劉璋時坐事爲徒及先主入自託龎統爲州右職失主左遷江陽太守羕望諸葛亮以爲心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時爲牛鞞長先主領牧爲從事正旦命行酒得進見讓先主曰振威以討賊元功未効先冦而滅邈以將軍之取鄙州甚爲不宐也先主曰知其不宐何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮爲請得兔爲犍爲太守丞相參軍安漢􅀅軍建興六年亮西征馬謖在前亮􅀅殺之邈諌以秦赦孟朙用覇西戎楚誅子玉二丗不競失亮意還蜀十三年亮卒後主素服發哀三日邈上䟽曰吕禄霍禹未必懷反叛之心孝宣不好爲殺臣之君直以臣懼其偪主畏其威故姧􅎯生亮身杖强兵狼顧虎臣五大不在􅁁臣常危之今亮殞歿盖宗族得全西戎靜息大小爲慶後主怒下獄誅之詵詵彦造或哲或友昭德音芳垂名厥後㧾讚此四十六人也述廣漢人士任母治内子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每爲賑䘏其弟子以慰勉其志扵是安之門生益盈門龎行飬姑婦師之先龐行姜詩妻也事姑晝夜紡績以給供飬子汲江溺水􅋱秘言遣詣學常作冬夏衣投水中託言􅀉與子詩呼妻使爲姑舂應命遲見遣不敢逺去遊於外供給因隣母􅃱姑敕還依依義􅃇抗䟽邦􅒉誠感丗主徙女􅂺刑義􅃇狄道長姜穆女綿竹司馬雅妻也旣許婚父坐事徙朔方雅就婚􅋱雇人送其䘮尋父母􅋱朔方義􅃇獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女已許嫁不得從父母徙紀配斷指以章厥身紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡已自有美色慮人求己作詩三章自誓心而求者猶衆父母將許乃斷指眀情飬子猛終義太守薛鴻圖象府􅒉彭王進娥􅋊體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡􅅩父欲改嫁非乃詣太守五方截髪自誓敬亦早亡和飬姑守義蜀郡何玉因媒介求之兄曉喻以公族可憑和恚割一耳季宰亦早亡父母欲改嫁進娥亦剪髪自誓各飬子終義正流自沉水絜氷清正流廣漢李元女楊文妻也適文有一男一女而文殁以織􅂂爲業父欲改嫁乃自沉水中宗族捄之得免太守五方爲之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親􅂈哀􅋱福哀感終身父母欲改嫁乃自殺洪氏丗胄由婦謙柔汝敦妻某敦兄弟共居有父母時財㛐心欲得妻勸送二兄敦盡讓田宅奴婢與兄自出居後敦耕得金一器妻復勸送二兄夫妻共往㛐性恡嗇謂欲借貸甚不悦及見金踊躍兄感悟即出妻讓財還弟弟不受相讓積年後竝察孝㢘丗爲冠族思􅆺烈媛美稱惟休揔讚十一人也述廣漢烈女右廣漢郡士女讚苐三凡五十六人十一人女四十六人士犍爲士女王延河平纂禹之功王延丗字長􅅩資中人也建始五年河決東郡氾濫兖豫四郡三十一縣沒官民屋舎四萬􅀁御史大夫尹忠以不憂職致河決自煞漢史案圖緯當有能循禹之功在犍柯之資陽求之正得延世徵拜河隄謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平封延丗關内侯拜光禄大夫乃賜黄金百斤文伯習禮繼武孫通董鈞字文伯資中人也少受業扵鴻臚王臨永平初議天地宗廟郊祀儀禮鈞與太常定其制又定諸侯王䘮禮歷城門校尉五官中郞􅀅以儒學貴稱繼􅅩孫通張公執憲克智克聦極位青紫寔作司空張皓字􅅩眀武陽人也以文聦朙辟大將軍掾遷尚書㒒射彭城相進􅀮士閭丘遷等徴拜廷尉延光三年安帝􅀅廢太子爲濟隂王皓與太常桓焉太僕來歷爭之安帝不許及安帝崩濟隂得立爲順帝以皓爲司空久之免後徵爲廷尉清河趙騰等坐􅉪訕當誅􅀁引八十餘人皓以聖賢眀義爭之咸稱平當子鸞司京桴鼓不鳴趙旂字子鸞資中人也初臨甘陵弘農郡甚善治民徴尚書遷司􅀠校尉時梁冀子弟放恣旂以法䋲之不敢爲非京師肅清桴鼓不鳴孟文翹翹平顯有成楊渙字孟文武陽人也以清秀博雅歴臺郎相稍遷尚書中郎司􅀠校尉甚有嘉聲美稱伯邳正􅈂耀祖揚聲楊凖字伯邳漢安縣人也初爲郡守太尉李固薦凖累世忠直拜尚書太傅陳蕃表爲河東入爲尚書令奏書治南陽太守曺麻潁川太守曺騰濟南太守孫訓等子弟依託形勢􅁋縱徵廷尉治罪訓梁冀婦家子也扵是憚之又薦朱禹盛精滕延爲尚書陸稠爲郡守皆名士也桓帝即位拜河南尹遷司􅀠校尉冀􅅩父梁忠爲執金吾不朝正初劾奏之朝士服其公亮徙􅀅作大匠翁君􅀅命迺播其名楊莾字翁君武陽人爲功曹刺史王尊當之州移書諸郡不得遣迎惟犍爲遣莾何覇巴郡遣嚴尊尊大怒莾前對曰使君不使奉迎謙也太守承迎敬也謙敬上下之節不可廢也尊乃欣請辟别駕舉茂才官至揚州刺史奉君遯丗費貽字奉君南安人也公孫述時漆身爲厲佯狂避世述破爲合浦守蜀中􅁔之曰節義至仁費奉君不仕亂世不避惡君修身於蜀紀名亦足後丗爲大族任公開朙任永字君業僰道人也長歷數王莾時託青盲公孫述時累徴不詣子溺井中􅋱見而不言妻􅁋扵前面而不恠述平乃曰丗適平目即清妻自煞光武徴之以年老不詣卒􅅩和順終杜撫字􅅩和資中人也少師事薛漢治五經教授門生千人太守王卿召爲功曹司徒辟不及聞公免必徃承問東平憲王爲驃騎􅀅軍辟西曹􅁺後罷爲王師在驃􅀐府者數年乃去數應三公徴撫侍送故公作詩通議􅀃弟子南陽馮良亦以道學徴聘君橋宻精趙松字君橋武陽人爲童子數咨問費貽及知其避丗宻與周旋終不露之也述平舉茂才爲上黨太守英英四子利扵居貞讚費貽以下皇漢㢮綱官人失紀文紀蹇諤表朙臧否張綱字文紀司空皓子也在漢朝公平㢘正權宦側目憚之漢安元年以光禄大夫持節與侍中杜喬循行州郡考察風俗出宫垣埋車先奏太尉桓焉司徒劉壽尸禄素飱不堪其職出城又奏司􅀠校尉趙峻河南尹梁不疑汝南太守梁乾等􅂍穢濁亂檻車送廷尉治罪天子以乾梁冀􅅩父貶秩免峻等又奏魯相冦儀儀自殺威風大行郡縣莫不肅懼還冀恨之出爲廣陵太守承叛亂後懷集撫恤甚有治化在官十年卒子續爲尚書續弟方爲豫州牧子孫數丗至大官白虜狂僣亂離斯圯孝仲縶馬社稷是􅋱朱遵字孝仲武陽人也公孫僣號遵爲犍爲郡功曺領軍拒戰扵六水門衆少不敵乃埋車輪絆馬必􅋱爲述􅀁煞光武嘉之追贈復漢將軍郡縣爲立祠建侯弔梁効志知己趙敦字建侯武陽人也初爲新都令德禮宣流三司及大􅀅軍梁冀累辟終不詣冀辟書不絶後冀自煞使者監守不使人弔問敦獨徃弔祭訖自拘有司天子赦之􅅩通敦孝石生江汜隗相字􅅩通僰道人也飬母至孝母食欲江中正江水相冬夏汲之一朝有横石生正流中哀帝丗察孝㢘平帝丗爲郎吳生致飬亦感靈祉呉順字􅅩和僰道人也事母至孝赤烏巢其門甘露降其戸察孝㢘永昌太守劉后初載實多良才季休忠亮經事能治楊洪字季休武陽人也先主領牧爲部屬從事及征漢中丞相亮表爲蜀郡太守先主疾病永安召亮東行漢嘉太守黄元反後主從其計克元封關内侯後爲中郎將越􅀐尉清公亮甚信任之德山躭學道以光時伍梁字德山南安人也儒學雅尚州􅃟迎牧諸葛亮爲功曺遷五官中郎將烈武作合度曠塗夷惜㢤公舉帥直淩遲費詩字公舉南安人也先主領牧爲前部司馬群臣勸先主稱尊號詩上䟽曰殿下以曺操父子逼主􅆲盗故乃覊旅萬里紏合士衆將以討賊今大敵未剋而先自立恐人心疑惑昔高祖􅀗子嬰猶尚推讓况未出門便欲自立耶以是左遷部永昌從事建興三年從丞相亮南征魏將李鴻來降説魏新城太守孟逹欲背魏向蜀亮方北面欲招逹爲外援欲與書詩進曰孟逹小子昔事振威不忠後事先帝背叛反覆之人何足與書也亮默然詩終劉氏之丗官位不盡其才君子以昭烈之弘曠武侯之朙達詩吐直言猶尚淩遲况庸主昏丗帥意直言而望肆効者㢤文然簡略不從詭隨楊義字文然武陽人也輔漢將軍張裔薦爲丞相亮主簿大司馬􅃽琬辟東曺􅁺歷二郡太守爲射聲校尉性簡略未曾以甘言加人酒後言笑多慢詞失大􅀅軍姜維意爲維􅀁廢延熈十八年作季漢輔臣讚在蜀書車􅀐怏怏與國安危張翼字伯恭文紀孫也以文武才幹歷征西鎭南大􅀅軍封亭侯延熈十八年與大􅀅軍姜維西征大破魏雍州刺史王經於狄道經衆􅋱洮水者數萬人維欲進翼諌不可必進無功時維屢出隴西翼常􅒉爭以爲國小不宐黷武必爲蛇􅀞足不聽不得已每怏怏從行景耀元年遷左車􅀐將軍領兾州刺史蜀平後􅋱猗猗衆偉芳烈名垂方德繹勲犍之瓊瑰述犍爲人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博也博後母文有母儀之德進楊則其教爲行閨門雍穆牂柯太守李禕家亦假係每不和歎恨徒冨貴學問不及愽家也陽􅁎請父厥族䝉援克諧内􅋢訓及秀彦􅁎武陽人也生自寒微父坐事閉獄楊渙始爲尚書郎告歸郡縣敬重之􅁎爲處女乃邀道扣渙馬訟父罪言辭慷慨悌泣渙懇吿郡縣爲出其父因竒其才爲子文方聘之結婚大族二弟得仕官遂丗爲官門後文方爲漢中太守以趙宣爲賢􅀅察孝㢘凾封未定病卒􅁎秘不發先遣孝㢘上道乃􅀤喪宣得進用􅁎之力也後文方兄子伯邳爲司􅀠校尉時􅁎長子潁伯兾州刺史仲子頰二千石伯邳以禀􅅩母教迎在官舍每教邳政治伯邳欲舉茂才選有二人伯邳欲用老者嫌以其耄欲舉五方而其年㓜以咨􅅩母勸舉方後趙宣爲犍爲五方爲廣漢􅁎尚在故吏之敬四時承問不絕周度割體貞節是全周度􅈎道人也相登妻十九登亡中牟令吳厚因人求之斷髪以誓志後人猶欲求之乃割其鼻飬子早亡其妻左亦年十九遂俱守義感歎婦姑之貞專其節操也敬􅁎沉淵誠烈邈然曺敬􅁎南安人也周紀之妻十七出適十九紀亡遺生子元餘服闋父母以許孫賓詒母病迎還知之自投水人赴之氣已絕一日一夜乃蘇息送依紀弟居訓導元餘號爲學士年九十䘚貞玦玉操彌久彌刋貞玦字瓊玉牛鞞程氏女張惟妻也十九適惟未期惟亡無子飬兄子悅供飬舅姑夙夜不怠資中玉冲欲娶玦玦􅅩父肱答以女志不可奪冲爲太守李嚴􅇂郵嚴託縣遣孝義掾奉羔雁宣太守命聘之玦乃自投水捄援不􅋱後太守蘇高爲立表太守蜀郡闕遣仁恕掾論曰貞玦太守章陵劉威又爲作頌故稱述也韓姜自財后旌其寃􅊨韓姜僰人尹仲讓妻也二十讓亡服除資中董臺因從事王爲表弟求姜不許臺門生左習王蘇以爲姜可奪教姜家言母病迎還韓氏因逼成婚姜聞故自殺太守巴郡龔楊哀之殺習蘇以報姜􅋱謝􅁎引决同穴齊定􅁎南安人武陽儀成妻也成􅋱以已年壯無子將葬乃預作殯殮具毒藥須夫棺入墓拊棺吞藥而􅋱遂同葬縣以表郡郡言州州上尚書天子咨嗟下書每大赦賜家帛四匹蜀穀二石媛姜匹婦勉夫濟子授命囹圄義踰國士趙媛姜資中盛道妻也建安五年道坐過夫婦閉獄子翔方五歲姜謂道曰官有常刑君不得已矣妾在後何益君門戸君可同翔亡命妾代君􅋱可得繼君宗廟道依違數日姜苦言勸之遂解脫給衣糧使去代爲應對度走逺乃吿吏殺之後遇赦父子得還道雖仕宦當丗痛感終不更􅂑翔亦不仕耳黄帛求喪沉身中流靈精相感攜夫共浮黄帛僰道人張貞妻也貞受易扵韓子方去家三十里船覆􅋱貞弟求䘮經月不得帛乃自徃沒處躬訪不得遂自投水中大小驚睨積十四日持夫手浮出時人爲語曰符有先絡僰道帛求其夫天下無有其偶縣長韓子冉嘉之召帛子幸之爲縣股肱烈哉諸媛節稱義遵叙之讚此九女也述犍爲烈女右犍爲士女讚苐四凡三十人九人女二十一人士華陽國志卷十中華陽國志卷十下漢中士女鄭眞岳峙確乎其清鄭子眞襃中人也玄靜守道履至德之行乃其人也教曰忠孝􅋢敬天下之至行也神中五徴帝王之要道也成帝元舅大􅀅軍王鳳僃禮聘之不應家谷口號谷口子眞亡漢中與立祠神中五徴未詳其義衡梁􅅺盤玄湛淵亭衞衡字伯梁南鄭人也少師事隠士同郡樊季齊以髙行聞郡九察孝㢘公府州十辟公車三徴不應董扶任安從洛還過見之曰京師天下之市朝也足下猶之人耳幸其在逺以虚名屢動徴書若至中國則價盡矣衡笑曰時有儉易道有汚隆若樊季齊楊仲桓雖應徴聘何益扵時乎苟無􅀁則尼軻栖栖是以君平子眞不屈其忠豈予之徒也㢤吾何虗假之有安扶服之敬其言也鄧公方到忠枉原情鄧公成固人也景帝時御史大夫晁錯患諸侯强大建議減削㑹吴楚七國謀反假言誅錯故吳相􅀽盎譛帝殺之拜盎太常使赦七國七國遂叛鄧公爲謁者入言軍事問曰七國聞晁錯􅋱罷兵不對曰呉王即山鑄錢煮海爲鹽謀反積數十年錯患之故欲削弱爲萬世策諸侯憂之計畫始行身􅋱東市諸侯莫憚内杜忠臣之口外爲諸侯報怨臣竊爲陛下不􅂑也帝歎息曰吾亦恨之武帝初爲九卿博望致逺西南來􅒉張騫成固人也爲人强大有謀能渉逺爲武帝開西域五十三國窮河源至絶逺之國拜校尉從討匈奴有功遷衞尉博望侯扵是廣漢縁􅁁之地通西南之塞豐絶逺之貨令帝無求不得無思不服至今方外開通騫之功也子游師生讒巧􅀁傾張猛字子㳺騫孫也師事光禄勲周堪以光禄大夫給事中侍元帝帝當廟祭濟渭欲御樓船御史大夫薛廣德當車免冠乞頸血汚車輪陛下不得廟􅀕矣帝以不悦猛進曰主聖則臣直今乗船危就橋安聖主不乘危故大夫言之帝曰曉人不當如是也後與周堪俱以忠正爲幸臣弘恭石顕􅀁譛毁乍出乍徴堪平和猛卒自殺王孫飬性矯葬厲生楊王孫成固人也治黄老家累千金厚自奉飬臨終告其子曰我􅋱躶葬以復吾眞但爲布囊盛屍入地七尺既下從足脱之以身親􅁟其子不忍見王孫友人祁侯諌之王孫曰厚葬無益􅋱者也夫殫財送􅋱今日入朙日彂此眞無異㬥骸中原褁以幣帛隔以棺槨􅅤以珠玉後腐朽乃得歸土不可故吾欲早就眞宅祁侯無以易卒躶葬如其言司徒監使術暢思精屢登上司七政是經李郃字孟節南鄭人也少眀經術爲郡􅃸吏和帝遣使者二人微行至蜀􅀫郃􅃸舎郃爲出酒夜飲露坐郃問曰君來時寧知二使何日發來耶二人恠問之郃指星言曰有使星入益部後一人爲漢中太守命爲功曹察孝遂馳名爲尚書徙左丞稍遷至尚書僕射尚書令拜司空又進司徒清公亮直當丗稱名順帝丗薨炎精不頽朱朙不􅀭太尉謇諤任國㧞􅂽濯日晹谷􅀅外扶桑惡直醜正漢道遂䘮李固字子堅郃子也陽嘉三年以對䇿忠亢拜議郎大􅀅軍梁啇后父也表爲從事中郎授荆州刺史值州部有亂至州先友賢者南陽鄭􅅩躬宋孝節零陵支宣雅表薦長沙桂陽太守趙歴䘚已奏免江夏南郡太守孔疇髙賜為昆疑誤爲昆等州土自然安静徙泰山太守克寧盗賊入爲􅀅作大匠多􅃱海内名士南陽樊英江夏黄瓊廣漢楊厚㑹稽賀純光禄周舉侍中杜喬陳留楊倫河南尹存東平王惲陳國何􅎔清河房植等皆蒙徴聘轉大司農順帝崩太后臨朝拜太尉與后弟大􅀅軍梁冀太傅趙峻竝録尚書冲帝崩時徐楊有盗賊太后欲不發䘮須召諸王至固爭不可言􅀦家多難宐立長君太后欲專權乃立樂安王爲質帝質帝崩太后復與梁冀謀􅀁立固與司徒南郡胡廣司􅆰蜀郡趙戒書與冀引周勃霍光立文宣以安漢之䇿閻鄧廢立之􅍔言國統三絶期運厄㑹興崩之漸在斯一舉宐求賢王親近不可寝嘿也冀得書召公卿列侯議􅀁立三公及鴻臚杜喬僉舉清河王蒜冀然之奏御太后中常侍曺騰私恨蒜􅀃冀朙日更議廣戒從冀固與喬必爭蒜宐立中興才也且年長識義必有厚􅀅軍冀不聴䇿免固喬歳餘取下獄以無事出之京師市邑皆稱千萬嵗冀惡其爲人􅀁善更奏繫之固與書二公曰吾欲扶持漢室使之比隆文宣何圖梁􅀅軍迷謬諸子曲從以吉物爲㓙成事爲敗漢家衰微從是始矣􅀅軍亦有不利吾雖􅋱上不慚扵天下不愧扵人求義得義􅋱復何恨遂自殺二公得書歎息流涕士民咸哀哭之桓帝無道冀尋受誅漢家遂微政在閹宦無不思固也元脩敦重威恵寔亮張則字元脩南鄭人也爲牂柯太守威著南􅁟永昌越嶲夷謀欲反畏則換臨其郡相諌而止號曰卧虎以戍狄勲遷護􅆧校尉徴拜扶風又換臨桂陽皆平盗賊巴郡板楯反拜隆集校尉鎮漢中徙梁州刺史又爲魏郡太守􅀁在稱治靈帝崩後大將軍􅀽紹表爲長史不就丞相曺公拜度遼將軍子雅温恭見察文方趙宣字子雅南鄭人也出自寒微以温良博雅太守犍爲楊文方深器異之遂察孝㢘官至犍爲太守二珪琬琰三辰懸望趙瑤字元珪琰字稚圭凡七兄弟宣子也皆以令德著聞瑶少有公望瑶始爲緱氏袁趙二公與書曰趙瑶在緱氏猛虎歸迹百里均耳􅅩平何難遷扶風太守徙蜀郡相司空張温謂之曰昔苐五伯魚徙蜀郡爲司空掃吾苐以待足下矣瑶曰諾尋換廣漢䘚琰始爲青州刺史部下清肅徙梁相徴拜尚書不就䘚仲卿報友行義以理陳綱字仲卿成固人也少與同郡張宗受學南陽以母䘮歸宗爲安衆劉元􅀁煞綱免䘮徃復之值元醉臥還須醒乃煞之自拘有司㑹赦免三府竝辟舉茂才拜弘農太守初至有兄弟自相責引退是後無訟者在官九年䘚天子痛惜賜家錢四十萬伯度玄鏡榮辱屑已李法字伯度南鄭人也桓帝時爲侍中光禄大夫數亢表宦官泰盛􅎛房泰重史官記事無實録之才虗相襃述必爲後笑帝怒免爲庶人恬然以咎失爲己責久之徴拜汝南太守遷司􅀠校尉湛然無自得之容德公在林懸象垂咎旣冲雲清荀張儀准李爕字徳公太尉固子也父􅋱時二兄亦􅋱爕爲姉􅀁遣隨父門生王成亡命徐州傭酒家酒家知非常人以女妻之延熹二年梁冀誅後月經陽道暈五車史官上書昔有大星升漢而西捲舌揚芒迫月熒惑犯帝座則有大臣枉誅星在西方太尉固應之今暈如之宐有赦命録其遺嗣以除此異扵是下赦爕得返舊四府竝辟公車徴議郎與趙元珪潁川賈偉節荀慈眀張伯慎爲友伯慎爲潁川太守與慈眀交相言論偉節與焉京師以爲􅆇否伯愼問趙元珪曰德公􅀁言何元珪曰無言也伯愼追歎曰當如德公兒軰徒靡沸耳慈眀亦寤而心變拜東平相國王爲黄巾􅀁没得出天子復封之爕以爲不可果敗遷京兆尹時人爲之語曰李德公甫不欲立帝子不欲立王伯臺處諌師言亢盡末命防􅎯妙覩玄揆陳雅字伯臺成固人也靈帝時爲諌大夫閹官用事上䟽曰昔孝和帝與中常侍鄭衆謀誅大將軍竇憲由是宦官秉權安帝㓜冲和熹太后兄鄧騭輔政太后適崩中常侍江京等殺騭安帝登遐黄門孫程又殺車􅀐將軍閻顯孝桓帝又與中常侍單超等共誅大將軍梁冀陛下即祚太傅陳蕃大將軍竇武尚書令尹勲等欲誅宦官絶其姧擅盡忠王室建万丗䇿機事不宻爲中常侍朱瑀等􅀁殺此即陛下􅀁見今宦官強盛威傾人主天下鉗口莫敢言者海内怨望妖孽竝作四方兵起萬姓辛苦陛下尚可以安柰後嗣何帝不省納出爲巴郡太守年七十五卒臨終戒其子曰期運推之天下􅀅大亂雄夫立爭無以貨財爲意吾亡依山薄葬亡嵗餘靈帝崩大􅀅軍何進復爲黄門􅀁殺海内果亂終成三國也孟度邵允閻憲字孟度成固人也名知人爲綿竹令以禮讓爲化民莫敢犯男子杜成夜行得遺物一囊中有錦二十匹求其主還之曰縣有朙君何敢負其化童謡􅁔曰閻尹賦政既朙且昶去苛去辟動以禮讓遷蜀郡吏民泣涕送之以千數季子英瑋李歷字季子太尉固從弟也少修文學性行清白與鄭康成陳元方齊名弱冠拜新城令朝請都􅇂計君經􅄸程苞字元道南鄭人也光和二年上計史時巴郡板楯反軍旅數起征伐頻天子患之訪問益州計考以方畧苞對言板楯忠勇立功先漢爲帝義民羗入漢中􅂺蒙其力東征南戰丗有功勞由不料䘏以􅃱叛亂非有僣盗能相群殺兵臨之未必卒得不如但􅃟朙能太守恩信懐服自然安定矣天子從之䘚如其言後在道卒元靈斐斐祝􅀛字元靈南鄭人也年十五逺學汝潁及太學通博蕩逹能属文太守張府君竒之曰吾見海内士多矣無如祝􅀛者也州牧劉焉辟之不得已行授葭􅎯長撰漢中􅂄舊傳以著述終禮高殉名段崇字礼髙南鄭人太守河間鄭廑命爲主簿永初四年凉州􅆧反溢入漢中從廑屯襃中虜東攻廑欲戰崇諌不可􅂅固壘待之廑不聴出戰敗績崇與門下吏王宗原展及子勃兄子伯先摧鋒􅋱戰衆寡不敵崇等皆􅋱羗遂得廑殺之伯義􅋱節程信字伯義南鄭人也時爲功曺居守馳來赴難殯殮廑喪送還鄊里訖乃結故吏冠盖子弟二十五人言共報羗各募敢􅋱士以待時太守鄧成命信爲五官元初二年虜復來信等將其同志率先奮計大破之信被八創􅋱天子咨嗟元初五年下詔書賜信崇家穀數千斛四行齊􅃱在玆六子讃閻憲已下也又有王崇原展及嚴孳李容姜濟陳已曹㢘勾矩劉旌九人皆以令義爲鄭廑􅀁命王宗原展與廑同􅋱孳容等七人與信共并命詔書旣賜崇信又賜九子家穀各五百斛給􅋱事復元侯趙陳葢亦烈士燕邠字元侯趙嵩字伯高南鄭人也陳調字元化仲卿孫也邠爲刺史郤儉從事使在葭􅎯與從事董馥張胤同行儉爲黄巾賊王饒趙播等􅀁殺邠聞故哀慟說馥㣧赴難二子不可邠難曰使君已􅋱用生何爲獨􅋱之牧劉焉嘉之爲圖象學官誅馥等嵩事太守蘇固固爲米賊張脩􅀁疾殺嵩杖劒直入脩營殺十餘人㡬獲脩􅋱陳調少尚逰俠聞固􅋱聚賓客百餘人攻脩大破之進攻脩營乃與戰傷􅋱渙渙龍宗振振麟趾文炳彬蔚漢之表軌㧾讚三十五人也述漢中人士其陳術字申伯作􅂄舊􅀓者也失其行事歷新城魏興上庸三郡太守及錫光等不列也穆姜温仁化繼爲親穆姜安衆令程祗妻司􅀠校尉李法姉也祗前妻有四子興敦覲豫穆姜生二子淮基祗亡興等憎惡姜姜視之愈厚其資給六子以長㓜爲差衣服飲食凡百如之久興等感寤自知失子道詣南鄭獄受不􅋢親罪太守嘉之復除門户常以二月八月社􅃱肉三十斤酒米各二斛六㪷六子相化皆作令士五人州郡察舉基字稚業特雋逸爲南郡太守泰瑛嚴眀丗範厥訓泰瑛南鄭楊拒妻大鴻臚劉巨公女也有四男二女拒亡教訓六子動有法矩長子元珍出行醉母十日不見之曰我在汝尚如此我亡何以帥群弟子元珍扣頭謝過次子仲珍白母請客既至無賢者母怒責之仲珍乃革行交友賢人兄弟爲名士泰瑛之教流扵三丗四子才官隆於先人故時人爲語曰三苖止四珍復起杜氏之教父母是遵杜泰􅁎南鄭人趙宣女也生七男七女若元珪稚圭有望五人皆令德其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寛宓子賤絃以自急故能改身之恒爲天下名士戒諸女及婦曰吾之􅗖身在乎正順及其生也恩存扵撫􅋢其長之也威儀以先後之體㒵以左右之恭敬以監臨之懃恪以勸之孝順以内之忠信以發之是以皆成而無不善汝曺庶幾勿忘吾法也後七子皆辟察舉牧州守郡而漢中太守南鄭令多與七子同嵗季考上訂無不脩也泰􅁎執子孫禮禮珪肅穆言存典韻禮珪成固陳省妻也楊元珍之女生二男長娶張度遼女恵英少娶荀氏皆貴家豪富從婢七八資財自冨禮珪敕二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不爲貧也􅀁以麤食急務者使知苦難備獨居時二婦再拜奉教從孫奉上微􅗦珪抑絶之感悟革行遭亂流行宗表欲見之必自嚴􅅚從子孫侍婢乃引見之曰此先姑法也四時祭禮自親飬牲醸酒曰夫祭禮之尊也年八十九卒恵英亦有㳤訓母師之行者也文􅁎叡敏宗祀􅀗歆文􅁎南鄭趙伯英妻太尉李固女也父爲梁冀􅀁免兄憲公季公罷官歸文􅁎歎曰李氏滅矣乃與二兄議匿弟爕父門生王成亡命徐州涕泣送之謂成曰託君以六尺之􅀌若李氏得嗣君之名義參扵程杵矣久之遇赦爕得還行䘮服闋敕之曰先公爲漢忠臣雖􅋱之日猶生之年梁冀以族弟幸濟豈非天乎愼勿有一言加梁氏加梁氏則連主上是又掇􅍔也奉行之徙成在徐州各異処傭賃而私相徃來成病亡爕四時祭之陳氏二謙或智或仁陳順謙成固人也順謙適鄧令曺寜十九寡居長育遺􅀌八十餘卒兄子陳䂓著書歎述之恵謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元脩訪扵恵謙恵謙曰恢弘徳教飬㢘免恥五刑三千葢亦多矣又何加也兄子伯思學仙道恵謙戒之曰君子疾没丗名不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之後耳禮脩順姑恩􅋢温潤禮脩趙嵩妻張氏女也姑酷惡無道遇之不以禮脩終無愠色及寜父母父母問之但引咎不道姑卒感寤更慈􅋢之鄊人相訓曰作婦不當如趙伯髙婦乎使􅁖姑知變可謂婦師矣後姑病女來省疾姑却之曰我以固當絶于賢婦手中後􅇜米賊嵩􅋱乃碧塗面亂首懷刀託言病賊不敢逼也飬遺生女依父􅅩立義終身者也樹南悼夫輕􅋱重信謝樹南南鄭人趙子賤妻也子賤初為郡功曹李固之誅詔書下郡殺固二子憲公季公太守知其枉遇之甚寛二子託服藥􅋱具棺器欲因出逃子賤畏法敕更驗實就殺之及固小子爕得還子賤慮爕報仇賃人刺之爕覺告郡殺子賤初􅀣南諌子賤子賤不從及臨􅋱許共并命兄弟㛐侍婢視守之經百餘日乃怠白兄㛐念一􅋱萬不得生不敢復圖􅋱也上下以爲信然無㡬時扵幕下自殺祁祁令􅁎如玉如金允矣㳤媛齊德姜任捴讃此九人也述漢中列女右漢中士女讃苐五凡四十四人九人女三十五人士梓潼人士鎭逺敦壯立勲南瀕文瀕字竒梓潼人也孝平帝末以城門校尉爲犍爲屬國遷益州太守開造稻田民咸賴之公孫述時拒郡不服述拘其妻子許以公侯招之不應乃遣使由交趾貢獻河北􅄒平丗祖嘉之徴拜鎭逺將軍封成義侯南中咸爲立祠子忳有令德爲北海太守巨逰玉碎髙風金振李業字巨逰梓潼人也少執志清白太守劉咸慕其名召爲功曹不詣咸怒欲殺之業徑入獄咸釋之公孫述累聘不應述怒遣鴻臚尹融持毒藥酒逼之業笑曰名不可毁身可殺不可辱也遂飲藥􅋱述耻殺善士賜錢百萬子翬逃匿不受建武中察孝㢘爲遂久令文堅亟㢤南面懷民景毅字文堅梓潼人也太守丁羽察舉孝㢘司徒舉治劇爲沇陽侯相髙陸令立文學以禮讓化民遷太守上封吏守闕請之三年三絶以子顧師事少府李膺膺誅自免久之拜都令遷益州太守上封吏民涕泣送之至沮者七百人白水縣者三百人值益州亂後米㪷千錢毅至恩化暢洽比去米㪷八錢鳩鳥巢其聽事孕育而去三府表薦徴拜議郎自免歸州牧劉焉表拜都尉爲人㢘止疾􅁋祠敕子孫惟修善為禱仁義爲福年八十一而卒盛國好學研賾聖眞楊充字盛國梓潼人也少好學求師遂業受古學扶風馬季長吕􅅩公南陽朱朙􅅩潁川白仲職精究七經其朋友則潁川荀慈朙李元禮京兆羅􅅩景漢陽孫子夏山陽王􅅩茂皆海内名士還以教授州里常言圖緯空􅀃去事希略疑非聖不以爲教察孝㢘爲郎卒漢伯肄業諸生之純景鸞字漢伯梓潼人也少與廣漢郝伯宗蜀郡任􅅩本潁川李仲勃海孟元􅅩逰學七州遂眀經術還乃􅁧禮略河洛交集風角雜書月令章句凡五十萬言太守闕貺命爲功曺察孝舉有道博士徴不詣然上陳時政言經得失又戒子孫人紀之禮及遺令期􅋱葬不設衣衿務在節儉甚有法度卒終布衣伯僖効志張夀字伯僖涪人也少給縣丞楊放爲佐放爲梁賊􅀁得夀求之積六年始知其生存乃賣家鹽井得三十萬市馬五匹徃贖放道爲􅆧􅀁刼掠盡凡徃三年計道逺不可得數乃單身詣虜涕泣自􅀃虜哀其屢求遣放還鄊郡召爲中􅃸詔書除巫尉以身佩印盡讓􅀁有財物與三弟復爲郡掾章平賦伇嵗出三百五十萬還功曹吏徙五官掾卒李餘􅋊身李餘涪人父早丗兄夷殺人亡命母愼當􅋱餘年十三問人曰兄弟相代􅀎免母不人曰趣得一人耳餘乃詣吏乞代母􅋱吏以餘年小不許餘因自􅋱吏以白令令哀傷言郡郡上尚書天子與以財葬圖畫府􅒉童人李餘涪人可考於先漢士女目篇冦王二子行勇以仁冦祺字宰朝梓潼人也與邑子侯􅕃俱學凉州􅕃後爲勃海王象􅀁殺祺杖劒至象家值象病象謝曰君子不俺人無僃安有爲友報讎煞病人也祺乃還久之復徃煞象由是察孝㢘爲㶚陵令濟隂相王晏字􅅩博涪人也與廣漢張昌寗􅅩受業大學昌爲河南吕條􅀁煞晏􅅩煞條事在􅅩解李助多方以玆立稱助字翁君涪人也通名方校醫術作經方頌􅀃名齊郭玉自此以上可曉不錄以下闕文義不章武之興亦迪才倫徳賢好古澹心藝文李仁字德賢涪人也益部多貴今文而不崇章句仁知其不博乃游學荆州從司馬德操宋仲子受古學以修文自終也國輔皓然形動神沉杜㣲字􅀦輔涪人也任安弟子先主定蜀常稱聾闔門不出建興二年丞相亮領州牧􅃟爲主簿輿而􅃱之亮引見與書誘􅂆欲使以德輔時微固辭疾篤亮表拜諫大夫從其􅀁志思潜逰學休志素林尹黙字思潜涪人也少與李仁俱受學司馬徽宋忠等博通五經專精左氏春秋自劉歆條例鄭衆賈逵父子陳元方服䖍注􅀃略皆誦述希復案本以左傳授後主後主立拜諌議大夫丞相軍祭酒子宗亦爲博士耳欽仲朗博訓詁典墳李譔字欽仲仁子也少受父業又講問尹黙自五經四部百家諸子􅇊藝筭計卜數醫術弓弩機械之巧皆􅃱思焉爲太子中庶子右中郎將著古文周易尚書毛詩三禮左氏注解太玄指依則賈馬異扵鄭玄與王肅初不相見而意歸多同孫德果銳作劉幹臣李福字孫德涪人也先主初爲成都令建興九年遷巴西太守後爲江州都􅇂揚武􅀅軍入爲尚書僕射封平陽亭侯延熈初以前監軍司馬福同郡梓潼文恭仲賢亦以才幹爲牧亮治中從事丞相參軍衎衎偉彦玉潤蘭芬邵名表器江漢之俊揔讃十五人也述梓潼人士季姜雍穆化播二婦王氏世興寔由賢母季姜梓潼文氏女􅀅作大匠廣漢王敬伯夫人也少讀詩禮敬伯前夫人有子博女紀流二人季姜生康稚芝女始示凡前後八子撫育恩􅋢親繼若一堂祖母性嚴子孫雖見官二千石猶杖之婦跪受罰扵堂歷五郡祖母隨之宦後以年老不願逺鄊里姜亦常侍飬左右紀流出適分已侍婢給之博好書冩姜手爲作衮扵是内門相化動行推讓博妻犍爲楊進及博子遵婦蜀郡張􅅩紀服姑之教皆有賢訓号之三母堂亡姜敕康稚芝婦事楊進如舅姑中外則之皆成令德季姜年八十一卒四男棄官行服四女亦從官舎交赴内外冠冕百有餘人當時榮之王氏遂丗興杜慈專専父不諒只涪杜季女者巴郡虞顯妻也十八適顯顯亡無子季欲改嫁與同縣楊上慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑􅋱就飬成室存亡等但欲在終供飬亡不有恨願不易圖季知不可告而奪也乃宻謀與彊逼迫之慈縊而􅋱敬楊雪讎壯踰烈士敬楊涪郭孟妻楊文之女也始生失母八嵗父為闕盛􅀁殺無宗親依外祖鄭行年十七適孟孟與盛有􅃇盛數徃來孟家敬楊涕泣謂孟曰盛凶惡薄命爲女無男昆惡讎未報未嘗一日忘也雖婦人拘制然父子恩深恐卒狂惑益君􅍔患君宐疎之孟以告盛盛不納安漢元年盛至孟家敬楊以大杖打殺盛將自煞孟止之與俱逃涪令􅀟勝出追聞其故而止安尉二門㑹赦得中平四年涪令向遵爲立圖表之惟兹三媛仁暢義理邦有斯嬪以馳遐紀㧾讃三人述梓潼烈女右梓潼郡士女讃苐六凡士女十八人三人女十五人士譔曰二州人士自漢及魏二百四十八人而已七人士五一百九十人女十一後賢二十人合二百六十八人以示來世之君子焉如其遺脱及後丗可書者􅂅貽後雋又春秋穀梁傳首叙曰成帝時議立三傳博士巴郡骨君安獨駮左傳不祖聖人後漢時魏郡太守王牧薦尹方爲三公天子詔尚書郎蜀郡張俊策之然不詳其行事譔曰二州人士自漢及魏可謂衆矣何者丗宗多士則相如麟遊伯司鳳翔洛下雲翳􅅩文龍驤在孝宣則王襃蔚炳中和作詠屬文甘泉葩爲丗鏡在元成則君公謇謇心思國病慮經劉危直忤王聴其髙者則嚴君味道易俗移風仲元端委居爲人宗若夫秉心塞淵與物盈冲則揚子雲也名重泰山華夏仰崇則鄭子眞也不屈其身志髙青雲則譙玄也不恥惡君混道推運則楊宣也降及建武明章以來出者則能内貫朝揆外播五教贊和􅂦味經綸治要上答泰階下允民照處者則利居槃桓晧然玄蹈天爵玩之人爵則笑懸車門肆夷恵齊紹若斯之倫海内服其英名洙泗方其渙耀矣故曰漢徴八士蜀出其四又曰漢具四義蜀選其二可謂不衆乎然巴郡􅇧君安以儒學典雅稱扵孝成蜀郡張俊策問尹方不出五經常議犍爲吕孟有託􅀌之節若兹之􅀋郡邑徃徃垂象刋銘見有苖裔璩晩生長亂故老以沒莫􅀁咨質不詳其事但依漢書國志陳君􅀁載凢士女二百四十八人而已後賢二十人合二百六十八人以示來世之好事者如能詳其遺脱及有可書願附于左其傳志父祖子孫及有名失事失官位者不列寜州人士亦不列别爲目録至晉元康末凡三百九十二人也華陽國志卷苐十之下
