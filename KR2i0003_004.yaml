body:
  text: 卷第四南中志寧州晉泰始六年初置蜀之南中諸郡庲降都督治也南中在昔蓋夷越之地滇濮句町夜郎葉榆桐師巂唐侯王國以十數編髮左衽隨畜遷徙莫能相雄長周之季世楚威王遣將軍莊蹻泝沅水出且蘭以伐夜郡植牂柯繫船於是且蘭既克夜郎又降而秦奪楚黔中地無路得反遂留王滇池蹻楚莊王苗裔也以牂柯繫船因名且蘭為牂柯國分侯支黨傳數百年秦并蜀通五尺道置吏主之漢興遂不賓有竹王者興於遁水有一女子浣於水濱有三節大竹流入女子足間推之不肯去聞有兒聲取持歸破之得一男兒長養有才武遂雄夷狄氏以竹為姓捐所破竹於野成竹林今竹王祠竹林是也王與從人嘗止大石上命作羹從者曰無水王以劍擊石水出今竹王水是也破石存焉後漸驕恣武帝使張騫至大夏國見卭竹蜀布問所從來曰吾賈人從身毒國得之身毒國蜀之西國今永昌是也騫以白帝東越攻南越大行王恢救之恢使番陽令唐蒙曉喻南越南越人食有蒟醬蒙問所從曰牂柯來蒙亦以白帝因上書曰南越地東西萬里名為外臣實一州主今以長沙豫章往水道多絶難行竊聞夜郎精兵可得十萬若從番禺浮船牂柯出其不意此制越之一奇也可通夜郎道為置吏主之帝乃拜蒙中郎將發巴蜀兵千人奉幣帛見夜郎侯喻以威德為置吏旁小邑皆貪漢繒帛以為道遠漢終不能有也故皆且聽命司馬相如亦言西戎邛笮蜀之後園可置為郡帝既感邛竹又甘蒟醬乃拜為中郎將往喻意皆聽命後西南夷數反發運興役費甚多相如知其不易也乃假巴蜀之論以諷帝且以宣使指於百姓卒開僰門通南中相如持節開越巂按道侯韓説開益州武帝轉拜唐蒙為都尉開牂柯以重幣喻告諸種侯王侯王服從因斬竹王置牂柯郡以吳霸為太守及置越巂朱提益州合四郡後夷濮阻城咸怨訴竹王非血氣所生求立後嗣霸表封其三子列侯死配食父祠今竹王三郎神是也昭帝始元元年益州廉頭姑繒等二十四縣民反水衡都尉呂破胡募吏民及發犍為蜀郡奔命擊破之後三歲姑繒復反都尉呂辟胡擊之敗績明年遣大鴻臚田廣明等大破之斬首捕虜五萬人獲畜産十餘萬頭富埒中國封其渠帥亡波為鉤町王以助擊反者故也廣明賜爵邑成帝時夜郎王興與鉤町王禹漏臥侯愈更相攻擊帝使太中大夫張匡持節和解之鉤町夜郎王不服乃刻木作漢使射之大將軍王鳳薦金城司馬蜀郡陳立為牂柯太守何霸為中郎將出益州立既到郡單至夜郎召興興與邑君數十人來見立立責數斬興邑君皆悅服興妻父翁指與興子恥復反立討之威震南裔平帝末梓潼文齊為益州太守公孫述時拒郡不服光武稱帝以南中有義益州西部金銀寶貨之地居其官者皆富及十世孝明帝初廣漢鄭純獨尚清廉毫毛不犯夷漢歌詠表薦無數上自三司下及卿士莫不歎賞明帝嘉之因以為永昌郡拜純太守章帝時蜀郡王阜為益州太守治化尤異神馬四匹出滇池河中甘露降白烏見始興文學漸遷其俗安帝永初中漢中陰平廣漢羌反征戰連年元初四年益州永昌越巂諸夷封離等反衆十餘萬多所殘破益州刺史張喬遣從事蜀郡楊竦將兵討之竦先以詔書告諭告諭不從方略滌討凡殺虜三萬餘人獲生口千五百人財物四千餘萬降赦夷三十六種舉劾姦貪長吏九十人黃綬六十人諸郡皆平竦以傷死故功不録自是後少寧五十餘年迄靈帝熹平中蠻夷復反擁沒益州太守雍陟遣御史中丞朱龜將并涼徑兵討之不克朝議不能征欲依朱崖故事棄之太尉掾巴郡李顒獻陳方策以為可討帝乃拜顒益州太守與刺史龐芝伐之徵龜還顒將巴郡板楯軍討之皆破陟得生出後復更叛梓潼景毅為益州太守承喪亂後民夷困餓米一斗千錢皆離散毅至安集後米一斗八錢建安十九年劉先主定蜀遣安遠將軍南郡鄧方以朱提太守庲降都督治南昌縣輕財果毅夷漢敬其威信方亡先主問代於治中從事建寧李恢對曰西零之役趙充國有言莫若老臣先主遂用恢為都督治平夷縣先主薨後越巂叟帥高定元殺郡將軍焦璜舉郡稱王以叛益州大姓雍闓亦殺太守正昂更以蜀郡張裔為太守闓假鬼教曰張裔府君如瓠壺外雖澤而內實粗殺之不可縛與吳於是執送裔於吳吳主孫權遙用闓為永昌太守遣故劉璋子闡為益州刺史處交益州際牂柯郡丞朱提朱褒領太守恣睢丞相諸葛亮以初遭大喪未便加兵遣越巂太守巴西龔祿住安上縣遙領郡從事蜀郡常頎行部南入以都護李嚴書曉喻闓闓答曰愚聞天無二日土無二王今天下派分正朔有三遠人惶惑不知所歸其傲慢如此頎至牂柯收郡主簿考訊姦褒因煞頎為亂益州夷復不從闓闓使建寧孟獲説夷叟曰官欲得烏狗三百頭膺前盡黑蟎腦三斗斷木構三丈者三千枚汝能得不夷以為然皆從闓斷木堅剛性委曲高不至二丈故獲以欺夷建興三年春亮南征自安上由水路入越巂別遣馬忠伐牂柯李恢向益州以犍為太守廣漢王士為益州太守高定元自旄牛定笮卑水多為壘守亮欲俟定元軍衆集合并討之軍卑水定元部曲殺雍闓及士庶等孟獲代闓為主亮既斬定元而馬忠破牂柯李恢敗於南中夏五月亮渡瀘進征益州生虜孟獲置軍中問曰我軍如何獲對曰恨不相知公易勝耳亮以方務在北而南中好叛亂宜窮其詐乃赦獲使還合軍更戰凡七虜七赦獲等心服夷漢亦思反善亮復問獲獲對曰明公天威也邊民長不為惡矣秋遂平四郡改益州為建寧以李恢為太守加安漢將軍領交州刺史移治味縣分建寧越巂置雲南郡以呂凱為太守又分建寧牂柯置興古郡以馬忠為牂柯太守移南中徑卒青羌萬餘家於蜀為五部所當無前軍號飛分其羸弱配大姓焦雍婁爨孟量毛李為部曲置五部都尉號五子故南人言四姓五子也以夷多剛很不賓大姓富豪乃勸令出金帛聘策惡夷為家部曲得多者奕世襲官於是夷人貪貨物以漸服屬於漢成夷漢部曲亮收其俊傑建寧爨習朱提孟琰及獲為官屬習官至領軍琰輔漢將軍獲御史中丞出其金銀丹漆耕牛戰馬給軍國之用都督常用重人李恢卒後以蜀郡太守犍為張翼為都督翼持法嚴不得殊俗和夷帥劉胄反徵翼以馬忠為代忠未至翼修攻戰方略資儲群下懼翼曰吾方臨戰場豈可以絀退之故廢公家之務乎忠至承以滅胄蜀賜翼爵關內侯忠在南柔遠能爾甚垂惠愛官至鎮南大將軍卒後南人為之立祠水旱禱之以蜀郡張表為代加安南將軍又以犍為楊義為參軍副二之表後以南郡閻宇為都督南郡霍弋為參軍弋甚善參毗之禮遂代宇為監軍安南將軍撫和異俗為之立法施教輕重允當夷晉安之及晉世因仍其任時交趾不附假弋節遙領交州刺史得以便宜選用長吏今官和解夷人及適罰之皆依弋故事弋卒子在襲領其兵和諸姓晉以巴西太守吳靜代弋在官數年撫恤失和軍司鮮于嬰表徵靜還嬰因代之泰始六年以益州大分南中四郡為寧州嬰為刺史咸寧五年尚書令衛瓘奏兼并州郡太康三年罷寧州置南夷以天水李毅為校尉持節統兵鎮南中統五十八部夷族都監行事每夷供貢南夷府入牛金旃馬動以萬計皆豫作忿恚致校尉官屬其供郡縣亦然南人以為饒自四姓子弟仕進必先經都監夷人大種曰昆小種曰叟皆曲頭木耳環鐵裹結無大侯王如汶山漢嘉夷也夷中有桀黠能言議屈服種人者謂之耆老便為主論議好譬諭物謂之夷經今南人言論雖學者亦半引夷經與夷為姓曰遑耶諸姓為自有耶世亂犯法輒依之藏匿或曰有為官所法夷或為報仇與夷至厚者謂之百世遑耶恩若骨肉為其逋逃之藪故南人輕為禍變恃此也其俗徵巫鬼好詛盟投石結草官常以盟詛要之諸葛亮乃為夷作圖譜先畫天地日月君長城府次畫神龍龍生夷及牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫夷牽牛負酒齎金寶詣之之象以賜夷夷甚重之許致生口直又與瑞錦鐵券今皆存每刺史校尉至齎以呈詣動亦如之毅後永昌呂祥為校尉祥後數人李廣漢從雲南犍為郡守為校尉久之建寧太守巴西杜俊朱提太守梓潼雍約懦鈍無治政以賄成俊奪大姓鐵官令毛詵中郎李睿部曲致詵弟耐罪朱提大姓太中大夫李猛有才幹弟為功曹分當察舉而俊約受都尉雷逢賂舉逢子照孝廉不禮猛猛等怨之太安元年秋詵睿猛逐俊以叛猛貽之書曰昔魯侯失道季氏出之天之愛民君師所治知足下追踵古人見賢思齊足下箕帚枉慚吾郡亦逐約應之作亂衆數萬毅討破之斬詵首睿走依遑耶五蔡夷帥于陵承猛箋降曰生長遐荒不達禮教徒與李特和光合勢雖不能營師五丈略地渭濱冀北斷褒斜東據永安退考靈符晉德長久誠非狂夫所能干輒表革面歸罪有司毅惡其言遂誘殺之部永昌從事江陽孫辨上南中形勢七郡斗絶晉弱夷強加其土人屈塞應復寧州以相鎮慰冬十一月丙戌詔書復置寧州增統牂柯益州朱提合七郡以毅為刺史加龍驤將軍進封成都縣侯二年于陵承詣毅請恕睿罪毅許之睿至群下以為詵睿破亂州土必殺之毅不得已許諾及睿死于陵承及詵猛遑耶怒扇動謀反奉建寧太守巴西馬恢為刺史燒郡偽發毅方疾作力出軍初以救恢及聞其情乃殺恢夷愈強盛破壞郡縣沒吏民會毅疾甚軍連不利晉民或入交州或入永昌牂柯半亦為夷所困虜夷因攻圍州城毅但疾力固孤城病篤不能戰討時李特李雄作亂益州而所在有事救援莫至毅上疏陳謝不能式遏寇虐疾與事遇使虜遊魂兵穀既單器械窮盡而求救無望坐待殄斃若必不垂矜憂乞請大使及臣尚存加臣重罪若臣已死陳尸為戮積四年光熙元年春三月毅薨子釗任洛還赴到牂柯路塞停住交州文武以毅女秀明達有父才遂奉領州事秀初適漢嘉太守廣漢王載載將家避地在南故共推之又以載領南夷龍驤參軍秀奬勵戰討食糧已盡人但樵草炙鼠為命秀伺夷怠緩輒出軍掩破首尾三年釗乃得達丁喪文武復逼釗領州府事毅故吏毛孟等詣洛求救至欲自刎懷帝乃下交州使救助之以釗為平寇將軍領南夷護軍遣御史趙濤贈毅少府諡曰威侯交州刺史吾彥遣子威遠將軍咨以援之朝廷以廣漢太守魏興王遜為南夷校尉寧州刺史代毅自永嘉元年受除四年乃至遙舉建寧董敏為秀才郡久無太守功曹周悅行郡事輕敏不下其板遜至怒殺悅悅弟秦臧長周昺合夷叟謀以趙濤父渾昔為建寧有德惠欲殺遜樹濤遜誅之并殺濤夷晉莫不惶懼表釗為朱提太守治南廣禦李雄時荒亂後倉無斗粟衆無一旅官民虛弱繩紀弛廢遜惡衣菜食招集夷民夷徼厭亂漸亦返善勞來不怠數年克復以五茶夷昔為亂首圖討之未有致罪會夷發夜郎莊王墓遜因此遂討滅之及討惡獠剛夷數千落威震南方官至平西安南將軍又兼益州刺史加散騎常侍封褒中伯而嚴猛太過多所誅鋤平夷太守朱提雷照流民陰貢平樂太守董霸破牂柯平夷南廣北降李雄建寧爨量與益州太守李蕩梁水太守董慬保興古盤南以叛雄遣叔父驤破越巂伐寧州遜使督護雲南姚嶽距驤於堂螂縣違遜指授雖大破之驤不獲太興四年遜發病薨州人推中子堅領州事永昌元年晉朝更用零陵太守南陽尹奉為寧州刺史南夷校尉加安西將軍奉威刑緩鈍政治不理咸和八年遂為雄弟壽所破獲南中盡為雄所有惟牂柯謝恕不為壽所用遂保郡獨為晉官至撫夷中郎將寧州刺史冠軍牂柯郡漢武帝元鼎二年開屬縣漢十七戶六萬及晉縣四戶五千去洛五千六百一十里郡上值天井故多雨潦俗好鬼巫多禁忌畬山為田無蠶桑頗尚學書少威稜多懦怯寡畜産雖有僮僕方諸郡為貧王莽更名牂柯曰同亭郡不服會公孫述據三蜀大姓龍傅尹董氏與功曹謝暹保郡聞漢世祖在河北乃遠使使由番禺江出奉貢漢朝世祖嘉之號為義郎明章之世毋斂人尹珍字道真以生遐裔未漸庠序乃遠從汝南許叔重受五經又師事應世叔學圖緯通三材還以教授於是南域始有學焉珍以經術選用歷尚書丞郎荊州刺史而世叔為司隸校尉師生並顯平夷傅寶夜郎尹貢亦有名德歷尚書郎長安令巴郡太守彭城相號南州人士郡特多阻險有延江霧赤煎水為池衛少有亂惟朱褒見誅其郡守垂功名者前有吳霸陳立後有漢中張亮則廣漢劉寵犍為費詩巴西馬忠皆著勳烈晉愍帝世太守建寧孟才以驕暴無恩郡民王清范朗逐出之刺史王遜怒分鄨半為平夷郡夜郎以南為夜郎郡四縣萬壽縣郡治有萬壽山漢本有鹽井漢末時夷民共詛盟不開今三郡皆無鹽且蘭縣漢曰故且蘭有柱蒲關也廣談縣毋斂縣有剛水也平夷郡晉愍帝建興元年置屬縣二戶千平夷縣郡治有䂪津安樂水山出茶蜜鄨縣故犍為郡城也不狼山出鄨水入沅有野生薜可食大姓王氏夜郎郡夜郎國也屬縣二戶千夜郎縣郡治有遁水通廣鬱林有竹王三郎祠甚有靈響也談指縣晉寧郡本益州也元鼎初屬牂柯越巂漢武帝元封二年叟反遣將軍郭昌討平之因開為郡治滇池上號曰益州漢屬縣二十四戶二十萬晉縣七戶萬去洛五千六百里司馬相如韓説初開得牛馬羊屬三十萬漢乃募徙死罪及姦豪實之郡土平敞有原田多長松皋有鸚鵡孔雀鹽池田漁之饒金銀畜産之富俗奢豪難撫御惟文齊王阜景毅李顒及南郡董和為之防檢後遂為善蜀建興三年丞相亮之南征以郡民李恢為太守改曰建寧治味縣寧州別建為益州郡後太守李蕩恢孫也與前太守董慬建興爨量共叛寧州刺史王遜表改益州為晉寧郡滇池縣郡治故滇國也有澤水周回二百里所出深廣下流淺狹如倒流故曰滇池長老傳言池中有神馬或交焉即生駿駒俗稱之曰滇池駒日行五百里有黑水神祠祀亦有溫泉如越巂溫水又有白蝟山山無石惟有蝟也同勞縣同安縣連然縣有鹽泉南中共仰之建伶縣毋單縣秦臧縣建寧郡治故庲降都督屯也南人謂之屯下屬縣十七晉太安二年分為益州平樂二郡合縣十三戶萬去洛五千六百三十九里有五部都尉四姓及霍家部曲味縣郡治有明月社夷晉不奉官則官與共盟於此社也牧麻縣山出好升麻有塗水同樂縣大姓爨氏穀昌縣漢武帝將軍郭昌討夷平之因名郭昌以威夷孝章時改為穀昌也同瀨縣雙柏縣存䣕縣雍闓反結壘於縣山繫馬柳柱生成林今夷言雍無梁林無梁夷言馬也昆澤縣漏江縣九十里出蠙口談稿縣有濮獠伶丘縣主獠修雲縣俞元縣平樂郡愍帝建興元年刺史王遜割建寧之新定興遷二縣新立平樂三沮二縣合四縣為一郡後太守建寧董霸叛降李雄郡縣遂省寧州北屬雄復為郡以朱提李壯為太守朱提郡本犍為南部孝武帝元封二年置屬縣四建武後省為犍為屬國至建安二十年鄧方為都尉先主因易名太守屬縣五戶八千去洛五千三百里先有梓潼文齊初為屬國穿龍池溉稻田為民興利亦為立祠大姓朱魯雷興仇遞高李亦有部曲其民好學濱犍為號多士人為寧州冠冕朱提縣郡治堂螂縣因山名也出銀鉛白銅雜藥有堂螂附子南秦縣自僰道南廣有八亭道通平夷漢陽縣有漢水入延江南昌縣故都督治有鄧安遠城也南廣郡蜀延熙中置以蜀郡常竺為太守蜀朝召竺入為侍中巴西令狐衷代之建武九年省元帝世刺史王遜移朱提治郡南廣太守李釗數破雄殺賊大將樂初後刺史尹奉卻郡還舊治及雄定寧州復置郡以興古太守朱提李播為太守屬縣四戶千自僰道至朱提有水步道水道有黑水及羊官水至險難行步道度三津亦艱阻故行人為語曰猶溪赤木盤蛇七曲盤羊烏櫳氣與天通看都濩泚住柱呼伊庲降賈子左儋七里又有牛叩頭馬搏頰坂其險如此土地無稻田蠶桑多蛇蛭虎狼俗妖巫惑禁忌多神祠南廣縣郡治漢武帝太初元年置有鹽官臨利縣常遷縣新興縣永昌郡古哀牢國哀牢山名也其先有一婦人名曰沙壼依哀牢山下居以捕魚自給忽於水中觸有一沈木遂感而有娠度十月産子男十人後沈木化為龍出謂沙壼曰若為我生子今在乎而九子驚走惟一小子不能去陪龍坐龍就而舐之沙壼與言語以龍與陪坐因名曰元隆猶漢言陪坐也沙壼將元隆居龍山下元隆長大才武後九兄曰元隆能與龍言而黠有智天之貴也共推以為王時哀牢山下復有一夫一婦産十女元隆兄弟妻之由是始有人民皆象之衣後著尾臂脛刻文元隆死世世相繼分置小王往往邑居散在溪谷絶域荒外山川阻深生民以來未嘗通中國也南中昆明祖之故諸葛亮為其國譜也孝武時通博南山度蘭倉水耆溪置巂唐不韋二縣徙南越相呂嘉子孫宗族實之因名不韋以彰其先人惡行人歌之曰漢德廣開不賓渡博南越蘭津渡蘭倉為他人渡蘭倉水以取哀牢地哀牢轉衰至世祖建武二十三年王扈栗遣兵乘箄船南攻鹿茤鹿茤民弱小將為所擒會天大震雷疾風暴雨水為逆流箄船沈沒溺死者數千人後扈栗復遣六王攻鹿茤鹿茤王迎戰大破哀牢軍殺其六王哀牢人埋六王夜虎掘而食之哀牢人驚怖引去扈栗懼謂諸耆老曰哀牢略徼自古以來初不如此今攻鹿茤輒被天誅中國有受命之王乎是何天祐之明也漢威甚神即遣使詣越巂太守願率種人歸義奉貢世祖納之以為西部屬國其地東西三千里南北四千六百里有穿胸襜耳種閩越濮鳩獠其渠帥皆曰王孝明帝永平十二年哀牢抑狼遣子奉獻明帝乃置郡以蜀郡鄭純為太守屬縣八戶六萬去洛六千九百里寧州之極西南也有閩濮鳩獠僄越裸濮身毒之民土地沃腴有黃金光珠虎魄翡翠孔雀犀象蠶桑綿絹采帛文繡又有貊獸食鐵猩猩獸能言其血可以染朱罽有大竹名濮竹節相去一丈受一斛許有梧桐木其華柔如絲民績以為布幅廣五尺以還潔白不受污俗名曰桐華布以覆亡人然後服之及賣與人有闌干細布蘭干獠言紵也織成文如綾錦又有罽旄帛疊水精琉璃軻蟲蚌珠宜五穀出銅錫太守著名績者自鄭純後有蜀郡張化常員巴郡沈稚黎彪然顯者猶鮮章武初郡無太守值諸郡叛亂功曹呂凱奉郡丞蜀郡王伉保境六年丞相亮南征高其義表曰不意永昌風俗敦直乃爾以凱為雲南太守伉為永昌太守皆封亭侯李恢遷濮民數千落於雲南建寧界以實二郡凱子祥太康中獻光珠五百斤還臨本郡遷南夷校尉祥子元康末為永昌太守值南夷作亂閩濮反乃南移永壽去故郡千里遂與州隔絶呂氏世官領郡於今三世矣大姓陳趙謝楊氏不韋縣故郡治比蘇縣哀牢縣永壽縣今郡治巂唐縣有周水從徼外來雍鄉縣南涪縣有翡翠孔雀博南縣西山高三十里越之得蘭滄水有金沙以火融之為黃金有光珠穴出光珠有虎魄能吸芥又有珊瑚雲南郡蜀建興三年置屬縣七戶萬去洛六千三百四十三里本雲川地有熊倉山上有神鹿一身兩頭食毒草有上方下方夷亦出桐華布孔雀常以二月來翔月餘而去土地有稻田蓄牧但不蠶桑雲南縣郡治葉榆縣有河洲遂久縣有繩水也弄棟縣有無血水水出連山蜻蛉縣有鹽官濮水出禺同山有碧雞金馬光影倏忽民多見之有山神漢宣帝遣諫議大夫蜀郡王褒祭之欲致雞馬褒道病卒故不宣著其縣二別為郡河陽郡刺史王遜分雲南置屬縣四戶千河陽縣郡治在河中源洲上也梁水郡刺史王遜分置在興古之盤南梁水縣郡治有振山出銅賁古縣山出銀銅鉛錫西隨縣興古郡建興三年置屬縣七戶四萬去洛五千八百九十里多鳩獠濮特有瘴氣自梁水興古西平三郡少穀有桄榔木可以作麵以牛酥酪食之人民資以為糧欲取其木先當祠祀宛溫縣郡治元鼎二年置律高縣西有石空山出錫東南有盢町山出錫鐔封縣有溫水句町縣故句町王國名也其置自濮王姓毋漢時受封迄今漢興縣勝休縣有河水也都唐縣故名都夢縣西平郡刺史王遜時爨量保盤南遜出軍攻討不能克已遜薨後寇掠州下吏民患之刺史尹奉重募徼外夷刺殺量而誘降李逖盤南平奉以功進安西將軍封遷陵伯乃割興古雲南之盤江來如南零三縣為郡右寧州統郡十四縣六十八咸熙元年吳交趾郡吏呂興殺太守孫諝內附魏魏拜興安南將軍時南中監軍霍弋表遣建寧爨谷為交趾太守率牙門將軍建寧董元毛炅孟幹孟通爨熊李松王素等領部曲以討之谷未至興已為功曹李統所殺泰始元年谷等徑至郡撫和初附無幾谷卒晉更用馬忠子融代谷融卒遣犍為楊稷代之加綏遠將軍又進諸牙門皆雜號將軍封吳侯交州刺史劉峻大都督修則領軍三攻稷皆為稷所敗鬱林九真皆附稷稷表遣將軍毛炅董元等攻合浦戰於古城大破吳軍殺峻則稷因表炅為鬱林太守元為九真太守元病亡更以益州王素代之數攻交州諸郡泰始七年春吳主孫皓遣大都督薛珝交州刺史陶璜帥二十萬軍興扶嚴惡夷合十萬伐交趾稷遣炅及將軍建寧孟嶽等禦之戰于封溪衆寡不敵炅等敗績僅以身還交趾固城自守破敗之後衆才千人并新附可有四千男女萬餘口陶璜圍之杜塞蹊徑救援不至雖班糧約食猶不供繼至秋七月城中食盡病餓死者大半交趾人廣野將軍王約反應陶璜以梯援外吳人遂得入城得稷等皆囚之即斬稷長史張登將軍孟通及炅并交趾人邵暉等二千餘人受皓詔傳稷秣陵故梏稷及孟幹爨熊李松四人於吳通四遠消息稷至合浦發病歐血死傳首秣陵棄其尸喪於海幹松熊至吳將加斬刑或説皓宥免幹等可以勸邊將皓原之欲徙付臨海郡初稷等私誓不能死節困辱虜手若蒙未死必當思求北歸稷既路死幹等恐北路轉遠以吳人愛蜀側竹弓弩言能作之皓轉付作部為弓工九年幹自吳逃返洛陽松熊為皓所殺初晉武帝以稷為交州刺史大封半道稷城陷或傳降故不録幹至表狀乃追贈交州刺史封松熊後嗣侯焉古城之戰毛炅手殺修則則子允隨陶璜璜以炅壯勇欲赦之而允必欲求殺炅炅亦不屈於璜璜怒乃裸身囚結面縛呵曰晉兵賊炅亦烈聲呵曰吳狗何等為賊吳人生割其腹允割其肝罵曰虜腹炅罵不斷曰尚欲斬汝孫皓汝父何死狗也吳人斬之武帝聞而矜哀即詔炅子襲爵封諸子三人關內侯九真太守王素以交趾敗與董元牙門王承等欲還南中為陶璜別將衛濮所獲功曹李祚見交趾民殘害還遂率吏民保郡為晉祚舅黎晃為吳將攻伐祚不下數遣人解喻降之祚答曰舅自吳將祚自晉臣惟力是視矣邵暉子胤先為父使詣洛拜奉車都尉比還暉敗亡胤依祚固守求救南中南中遙為之援諸姓得世有部曲弋遣之南征因以功相承也撰曰南域處邛笮五夷之表不毛閩濮之鄉固九服之外也而能開土列郡爰建方州踰博南越蘭滄遠撫西垂漢武之迹可謂大業然要荒之俗不與華同安邊撫遠務在得才故高祖思猛士作歌孝文想頗牧咨嗟斯靜禦之將信王者所詳擇也馬霍王尹得失之際足以觀矣交趾雖異州部事連南中故并志焉
