  - {type: variant, offset: 5427, length: 0, content: '', krp: 十二人女四十三人士華陽國志卷苐十上華陽國志卷十中廣漢士女講學沖邃洙泗是稀㣧帝紹聖庻熈疇咨楊宣字君緯什邡人也少受學扵楚國王子張天文圖緯扵河内鄭子侯師事楊翁叔能暢鳥言長於災異教授弟子以百數成帝徵拜諌大夫帝無嗣宣上封事勸宐以定陶恭王子爲太子帝從之出宣爲交州牧太子即位為哀帝拜河内太守徵太倉令上宐封周公孔子後帝從之封周公孫相如爲襃魯侯孔子後孔均爲襃成侯又薦遼東王綱瑯琊徐吉太原郭越楚國龔勝等宐贊隆時雍平帝時命持節爲講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿祈虎命邦綽有餘徽鄭純字長伯郪人也爲益州西部都尉処地金銀琥珀犀象翠羽出作此官者皆冨及十丗純獨清廉毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之朙帝嘉之乃改西部爲永昌郡以純爲太守在官十年卒列画頌東觀三老泱泱實作父師楊綂字仲通新都人也事華里先生炎高高戒綂曰漢九丗王出圖書與卿適應之建武初天下求通内䜟二卷者不得永平中刺史張志舉統方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光禄大夫以年老道深飬扵辟雍授几杖爲三老卒内䜟二卷竟未詳平仲涉道殆乎庻㡬王祐字平仲郪人也少與雒高士張浮齊名不應州郡之命司隷校尉陳紀山名知人稱祐天下之高年四十二卒弟獲志其遺言撰王子五篇東觀郎李勝文章士也作誄方之顏子列画學宫獲一作灌文父朙洞探賾索微楊序字仲桓統仲子也道業侔父三司及公車連徵辭拜侍中上言四方及荆交州當兵起人民疫蝗洛陽大水宫殿當災三府當免近戚謀變皆効驗大將軍梁冀秉權自退去授門徒三千人本初元年及建和中特徴聘不行年八十三卒天子痛惜詔謚曰文父弟子雒昭約節宰綿竹寇懽文儀蜀郡何萇㓜正俟祈升伯}
  - {type: variant, offset: 5428, length: 0, content: '', SBCK: 郡周舒􅅩布及任安董扶等皆徴聘辟舉馳名當世元章玄泊韜光匿耀段翳字元章新都人也明經術妙占未來常告大渡津口曰某日當有諸生二人荷擔問翳舍処者幸爲吿之後竟如其言又有人從兾州來學積年自以精䆒翳術辭去翳爲筒作書封頭與之告曰有急發之至葭􅎯爭津吏撾從者頭諸生發筒筒中有書曰到葭􅎯爭津破頭以膏褁之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子稚子奕奕古之畏􅋢王渙字稚子郪人也初爲河内温令路不拾遺臥不閉門民􅁔之曰王稚子丗未有平徭役百姓喜遷兖州刺史部中肅清徴拜侍御史洛陽令聦朙恵斷公平㢘正抑強扶弱化行不犯發姧擿伏思若有神京華宻静權豪畏敬元興元年卒百姓痛哭二縣弔祭行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦􅁔之爲立祠天子悼惜每下詔書德令必賜後嗣與卓茂等爲伍敬伯愷悌􅀣德播恵王堂字敬伯郪人也初臨巴郡進賢逹士舉孝子嚴永􅀮士黄錯及張璊陳髦民爲立祠徙任左扶風政教嚴眀帝舅車􅀐􅀅軍閻顯大將軍竇憲中常侍江京等嘱託輒拒之白􅎷見象不以爲祥徙魯相又徙汝南守舉陳蕃爲功曺應嗣司􅀠校尉號知人之鑑􅅩宰濟濟以禮進退馮顥字􅅩宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞􅅩雅初爲謁者威儀濟濟爲成都令遷越嶲太守􅀁在著稱爲梁冀􅀁不善冀風州追之􅀮居作易章句及刺奢說修黄老恬然終日大匠竒暢妙監玄察盡言丗䂓秪以隕越翟酺字子超雒人也少師事段翳以朙天官爲侍中尚書常見太史令孫懿􅒣欷涕泣曰圖書有賊臣孫登將以才智爲黄門開路君表相應之是以悽愴後爲京兆尹光禄大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之間薦故太尉龎參故司徒李郃眀通三才忠正可以輔丗􅀁言每指利疾權貴誣酺及尚書令高堂芝交構免􅋱著援神􅆻經説卒家司􅀠聦敏奮名後葉郭賀字喬卿雒人也初爲太守黄幸戸曺幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽㽞詔殺之由是顕名太守蔡茂命爲主簿茂夢坐太極殿上得嘉禾三穗以問賀對曰朙府位當至三公旬月茂遷司徒表賀朙律令稍遷侍中尚書僕射司􅀠校尉荆州刺史朙帝南巡狩善其治徵河南尹卒天子痛惜賜錢三十萬鐔恭翩翩交友惟賢鐔顕字子誦郪人也蔡弓字子騫雒人也俱攜手共學冬則侍親春行受業與張覇李郃張皓陳禪爲友共師司徒魯恭顕又與王稚子同見察孝扵太守陳司空歷豫州刺史光禄大夫侍中衞尉弓爲廬江太守徵拜郎而覇郃皓禪皆至公㑡兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如􅀭雄之才朙帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諌大夫樂安相後與劉珍共撰漢記孫􅂶有文才勝爲東觀郎著賦諌論頌數十篇憲父懸車王稚字􅅩起堂㓜子也屡拒孝㢘公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人録其本幸謚曰憲父癸未詔書以安車聘請會已亡徵君肥遯馮信字季誠郪人也郡三察孝㢘州舉茂才公府十辟公車再徵不詣公孫述時託目􅌌盲傅婢奸其前陽不覺述卒以年不之出董任循志束帛戔戔董扶字茂安任安字定祖綿竹人也家居教授弟子自逺而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道爲侍中觀漢􅀅亂求爲屬國還蜀安察孝㢘及茂才公府辟公車徴皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表汜博提攜士彦王啇字文表廣漢人也博學多聞州牧劉璋辟爲治中試守蜀郡太守荆州牧劉表大儒南陽宋仲子逺慕其名皆與交好許文休稱啇中夏王景興軰也啇勸璋􅄃竒枝雋甚善厈捄薦􅃱名士安漢趙韙及陳實盛先墊江龔揚趙敏􅀺景閬中王澹江州孟彪皆至州右職郡守又爲嚴李主祠正諸祀典在官一十年而卒超􅀋㧞萃寔惟世信劉寵字世信綿竹人也出自􅀌微以朙公芊春秋上計闕下見除成都令政教朙肅時諸縣多難治乃換寵爲郫令又換郪安漢皆垂績還在成都遷牂柯太守初乘一馬之官布衣􅂼食儉以爲教居郡九年乘之而還吏人爲之立銘王啇陳實當世貴士皆與爲友節英亢烈仰訢鼎臣段恭字節英雒人也少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彦之章渤海紀􅅩陽遂眀天文二卷東平虞􅅩雅學絕高當丗遂逰扵蜀恭以朋友禮待之後爲上計掾爲有司劾太尉龎參兼舉茂才孝㢘參性忠正亮直爲貴戚􅀁擯以恚發病逺近稱寃恭不能耐其狂亢䟽表參忠直不當以讒佞傷毁忠正帝悟即日召西曺掾問疾尋羊酒慰勞參忠士㳺孝湻感物悟神姜詩字士㳺雒人也事母至孝母欲江水及鯉魚膾又不能獨食須隣母共之詩嘗供備子汲江溺􅋱秘言遣學不使母知扵是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比隣公孫述平後東精爲賊掠害不敢入詩里時大􅂽餓精􅃱米肉與詩詩埋之永平二年察孝㢘朙帝詔曰大學入朝孝㢘一切皆平之除江陽符長􅀁居鄉皆爲之立祠少林隂德陽報是甄王忳字少林新都人也遊學京師見客舍有一書生困病忳􅀮視奄忽便絕有金十斤忳以一斤買棺木九斤還腰下葬埋之後爲大度亭長大馬一匹來入亭中又有繡被一領飛墮其前人莫識者郡縣畀忳後乘馬到雒縣馬牽忳入他舍主人問忳􅀁由得馬忳具說其状并及繡被主人悵然曰卿何陰德而􅃱此忳說昔埋書生事主人驚曰是我子也姓金名彦卿乃葬之不報天彰郷德辟舉茂才除郿令宿漦亭中數有人爲鬼􅀁殺忳上樓夜半有女子稱寃曰妾涪令妻也當之官宿此枉爲亭長􅀁殺大小二十口埋在樓下奪取財物忳曰汝何故恒殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召逰徼詰問具服即收同謀十餘人殺之送涪令䘮還郡里當丗稱之仲魚謙沖芉朞字仲魚郪人也父爲交州刺史卒官朞迎喪不敢取官舍一物郡三察孝㢘公府辟州别駕皆不應太守尹奉棄刑名行禮樂請爲功曺刺史必欲借朞自佐不得已爲别駕後爲太守孫寶蔡茂祋諷功曺常欲渡津津吏滯停車待之三日將宿亭中有縣吏引車避之爲野王令雲卿安貧朱倉字雲卿什邡人也受學扵蜀郡張寧飱豆飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧以步行爲郡功曺每察孝㢘羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式玄照折像字伯式雒人也其先張江爲武威太守封南陽折侯因氏焉父國爲鬱林太守家資二億故奴姫八百人盡􅄆以施宗族䘏贍親􅃇葬􅋱弔䘮事東平虞􅅩雅以道教授門人朋友自逺而至時人爲諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但説天文論五經孟宗當仁味道好施清風邁倫讚仲魚已下也杜眞字孟宗綿竹人誦書百万言兄事翟酺酺免後尚書令與司􅀠校尉枉劾之復徵詣獄眞上章救之受掠笞六百獄中朙酺無事京師壯之以漢道微散財施宗族不應公州辟命及辭長吏候迎每交扵門乃斷髪以自絕漢儒請雨精感慶雲諒輔字漢儒新都人爲郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰不雨則欲自焚爲貪叨吏謝罪百姓言終㬥雨韓揆義烈韓揆字伯彦綿竹人也爲令錡裒主簿値黄巾賊入界扶裒走入草中裒遣求􅀮翳処未還裒爲賊􅀁得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而苟自活非忠乃自殺喬雲勇震左喬雲綿竹人也少爲左通􅀁飬爲子通坐任徒徒逃吏欲破通臏通無壯子故爲吏􅀁侵喬雲時年十三喟然憤怒以銳刀煞吏解通將走令出追初聞以爲壮士及知小兒爲之流涕楊寛證將烈播友人寛字叔舒新都人父斌證令萬丗太守祋諷以忠義壯聞寛爲郡吏鄊人馬閏章言太守王方寛與兄偕詣獄證之得理後方當遷南郡閏復章之寛乃發閏臨私事閏伏罪友人汝錕爲張朙􅀁煞寛怒縛朙送錕家使自謝之也寗􅅩執仇寗􅅩自茂奉廣漢人與友人張昌共受業太學昌爲河南大豪吕條􅀁殺􅅩煞條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍爲謝裒裒􅋱負土成墳三年裒子爲人􅀁煞鉗復其仇自拘武陽獄會赦免當丗義之賈爲士􅋱分侔虞朱賈祤字元集什邡人也雒孟伯元爲父復讎聞祤名徃投之雒縣追伯元蹤祤歎曰士以義遇我豈可倍哉煞雒縣必移什邡負我君乃自煞李勝言之以方虞卿魯之朱家爰迄劉氏司農含章爽朗翠粲觀國之光秦宓字子敕綿竹人也初􅀮遁不應州郡之命丞相亮領益州牧以􅃟爲别駕中郎􅀅吳使張温將反命亮率百官饑之温與宓語荅問若響應聲辭義雅美温大敬服以爲蜀之有宓猶魯仲尼也遷長水校尉司農宓甚有通理弟子譙周具􅀓其業李王四子竝作琳琅李朝字永南弟邵字偉南郪人也王士字義强從弟甫字國山文表諸弟也先主領牧朝爲别駕群下上先主爲漢中王其文朝所造也後丞相亮府辟西曺掾亦有文才兄弟三人號三龍士歴宕渠犍爲益州太守甫善言議闕人流美稱自綿竹令爲州右職優游容與特進太常鐔承字公文郪人也歴郡守州右職爲少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諌君刎首王累新都人也州牧璋從别駕張松計遣法正迎先主主簿王權諌不納累爲從事以諫不入乃自刎州門以眀不可鄭度進䂓忠謀莫受雖云天時抑由人咎度綿竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野糓是資急驅巴西梓潼民内涪水以南一切燒除野糓固壘待之彼請戰不許久無􅀁資不過百日必當囘先主聞而惡之璋不納言雖天亦由璋之愚永年負才自喪丗主彭羕字永年廣漢人有俊才劉璋時坐事爲徒及先主入自託龎統爲州右職失主左遷江陽太守羕望諸葛亮以爲心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時爲牛鞞長先主領牧爲從事正旦命行酒得進見讓先主曰振威以討賊元功未効先冦而滅邈以將軍之取鄙州甚爲不宐也先主曰知其不宐何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮爲請得兔爲犍爲太守丞相參軍安漢􅀅軍建興六年亮西征馬謖在前亮􅀅殺之邈諌以秦赦孟朙用覇西戎楚誅子玉二丗不競失亮意還蜀十三年亮卒後主素服發哀三日邈上䟽曰吕禄霍禹未必懷反叛之心孝宣不好爲殺臣之君直以臣懼其偪主畏其威故姧􅎯生亮身杖强兵狼顧虎臣五大不在􅁁臣常危之今亮殞歿盖宗族得全西戎靜息大小爲慶後主怒下獄誅之詵詵彦造或哲或友昭德音芳垂名厥後㧾讚此四十六人也述廣漢人士任母治内子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每爲賑䘏其弟子以慰勉其志扵是安之門生益盈門龎行飬姑婦師之先龐行姜詩妻也事姑晝夜紡績以給供飬子汲江溺水􅋱秘言遣詣學常作冬夏衣投水中託言􅀉與子詩呼妻使爲姑舂應命遲見遣不敢逺去遊於外供給因隣母􅃱姑敕還依依義􅃇抗䟽邦􅒉誠感丗主徙女􅂺刑義􅃇狄道長姜穆女綿竹司馬雅妻也旣許婚父坐事徙朔方雅就婚􅋱雇人送其䘮尋父母􅋱朔方義􅃇獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女已許嫁不得從父母徙紀配斷指以章厥身紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡已自有美色慮人求己作詩三章自誓心而求者猶衆父母將許乃斷指眀情飬子猛終義太守薛鴻圖象府􅒉彭王進娥􅋊體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡􅅩父欲改嫁非乃詣太守五方截髪自誓敬亦早亡和飬姑守義蜀郡何玉因媒介求之兄曉喻以公族可憑和恚割一耳季宰亦早亡父母欲改嫁進娥亦剪髪自誓各飬子終義正流自沉水絜氷清正流廣漢李元女楊文妻也適文有一男一女而文殁以織􅂂爲業父欲改嫁乃自沉水中宗族捄之得免太守五方爲之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親􅂈哀􅋱福哀感終身父母欲改嫁乃自殺洪氏丗胄由婦謙柔汝敦妻某敦兄弟共居有父母時財㛐心欲得妻勸送二兄敦盡讓田宅奴婢與兄自出居後敦耕得金一器妻復勸送二兄夫妻共往㛐性恡嗇謂欲借貸甚不悦及見金踊躍兄感悟即出妻讓財還弟弟不受相讓積年後竝察孝㢘丗爲冠族思􅆺烈媛美稱惟休揔讚十一人也述廣漢烈女右廣漢}
