  - {type: variant, offset: 5428, length: 0, content: '', WYG: 郡周舒叔布及任安董扶等皆徵聘辟舉馳名當世元章𤣥泊韜光匿耀段翳字元章新都人也明經術妙占未來常告大渡津口曰某日當有諸生二人荷擔問翳舍處者幸爲吿之後竟如其言又有人從冀州來學積年自以精究翳術辭去翳爲筒作書封頭與之告曰有急發之至葭萌爭津吏撾從者頭諸生發筒筒中有書曰到葭萌爭津破頭以膏褁之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子稚子弈弈古之畏愛王渙字稚子郪人也初爲河内温令路不拾遺卧不閉門民歌之曰王稚子世未有平徭役百姓喜遷兗州刺史部中肅清徵拜侍御史洛陽令聰明惠斷公平廉正抑强扶弱化行不犯發姧擿伏思若有神京華宻静權豪畏敬元興元年卒百姓痛哭二縣弔祭行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦歌之爲立祠天子悼惜每下詔書德令必賜後嗣與卓茂等爲伍敬伯愷悌樹德播惠王堂字敬伯郪人也初臨巴郡進賢達士舉孝子嚴永隱士黄錯及張璊陳髦民爲立祠徙任左扶風政教嚴明帝舅車騎將軍閻顯大將軍竇憲中常侍江京等囑託輒拒之白鹿見象不以爲祥徙魯相又徙汝南守舉陳蕃爲功曹應嗣司𨽻校尉號知人之鑑叔宰濟濟以禮進退馮顥字叔宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞叔雅初爲謁者威儀濟濟爲成都令遷越嶲太守所在著稱爲梁冀所不善冀風州追之隱居作易章句及刺奢說脩黄老恬然終日大匠竒暢妙監𤣥察盡言世規秪以隕越翟酺字子超雒人也少事段翳以明天官爲侍中尚書常見太史令孫懿歔欷涕泣曰圖書有賊臣孫登將以才智爲黄門開路君表相應之是以悽愴後爲京兆尹光禄大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之間薦故太尉龐參故司徒李郃明通三才忠正可以輔世所言每指利疾權貴誣酺及尚書令高堂芝交構免死著援神契經說卒家司𨽻聰敏奮名後葉郭賀字喬卿雒人也初爲太守黄幸戸曹幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽留詔殺之由是顯名太守蔡茂命爲主簿茂夢坐太極殿上得嘉禾三穗以問賀對曰明府位當至三公旬月茂遷司徒表賀明律令稍遷侍中尚書僕射司𨽻校尉荆州刺史明帝南巡狩善其治徵河南尹卒天子痛惜賜錢三十萬鐔蔡翩翩交友惟賢鐔顯字子誦郪人也蔡弓字子騫雒人也俱擕手共學冬則侍親春行受業與張霸李郃張皓陳禪爲友共師司徒魯恭顯又與王稚子同見察孝於太守陳司空歴豫州刺史光禄大夫侍中衛尉弓爲廬江太守徵拜郞而霸郃皓禪皆至公卿兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如揚雄之才明帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諫大夫樂安相後與劉珍共撰漢記孫􅂶有文才勝爲東觀郞著賦諫論頌數十篇憲父懸車王稚字叔起堂幼子也屢拒孝廉公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人録其本行諡曰憲父癸未詔書以安車聘請會已亡徵君肥遯馮信字季誠郪人也郡三察孝廉州舉茂才公府十辟公車再徵不詣公孫述時託目青盲𫝊婢姦其前陽不覺述卒以年老不出董任循志束帛戔戔董扶字茂安任安字定祖綿竹人也家居教授弟子自逺而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道爲侍中觀漢將亂求爲屬國還蜀安察孝及茂才公府辟公車徵皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表氾博提攜士彦王商字文表廣漢人也博學多聞州牧劉璋辟爲治中試守蜀郡太守荆州牧劉表大儒南陽宋仲子逺慕其名皆與交好許文休稱商中夏王景興輩也商勸璋攬竒拔雋甚善匡捄薦致名士安漢趙韙及陳寔盛先墊江龔楊趙敏黎景閬中王澹江州孟彪皆至州右職郡守又爲嚴李立祠正諸祀典在官一十年而卒超𩔖拔萃寔惟世信劉寵字世信綿竹人也出自孤微以明公羊春秋上計闕下見除成都令政教明肅時諸縣多難治乃換寵爲郫令又換郪安漢皆垂績還在成都遷牂柯太守初乘一馬之官布衣䟽食儉以爲教居郡九年乘之而還吏人爲之立銘王商陳實當世貴士皆與爲友節英亢烈仰訴鼎臣段恭字節英雒人也少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彦之章渤海紀叔陽遂明天文二卷東平虞叔雅學絕高當世遂遊於蜀恭以朋友禮待之後爲上計掾會有司劾太尉龐參兼舉茂才孝亷參性忠正亮直爲貴戚所擯以恚發病逺近稱寃恭不能耐其枉亢䟽表參忠直不當以讒佞傷毁忠正帝悟即日召西曹掾問疾尋羊酒慰勞參忠士遊孝淳感物悟神姜詩字士遊雒人也事母至孝母欲江水及鯉魚膾又不能獨食須隣母共之詩嘗供備子汲江溺死秘言遣學不使母知於是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比隣公孫述平後東精爲賊掠害不敢入詩里時大荒餓精致米肉與詩詩埋之永平三年察孝亷明帝詔曰大學入朝孝廉一切皆平之除江陽符長所居鄉皆爲之立祠少林陰德陽報是甄王忳字少林新都人也遊學京師見客舍有一書生疾困忳愍視奄忽便絕有金十斤忳以一斤買棺木九斤置棺下塟埋之後爲大度亭長有馬一疋馳入亭中又有繡被一領飛墮其前人莫識者郡縣以畀忳後乘馬到雒縣馬牽忳入它舍主人問忳所由得馬忳具說其狀并及繡被主人悵然曰卿何陰德而致此忳說昔埋書生事主人驚曰是我子也姓金名彦卿葬之大恩不報天彰卿徳耳辟舉茂才除郿令宿斄亭中數有人爲爲所殺忳上樓夜半有女子稱寃曰妾涪令妻也當之官宿此枉爲亭長所殺大小二十口埋在樓下奪取財物忳曰汝何故以恒殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召遊徼詰問具服即收同謀十餘人殺之送涪令喪還郡里當世稱之仲魚謙沖羊朞字仲魚郪人也父爲交州刺史卒官朞迎喪不敢取官舍一物郡三察孝亷公府辟州别駕皆不應太守尹奉棄刑名行禮樂請爲功曹刺史必欲借朞自佐不得已爲别駕後爲太守孫寶蔡茂祋諷功曹當欲渡津津吏滯停車待之三日將宿中亭中有縣吏引車避之爲野王令雲卿安貧朱倉字雲卿什邡人也受學於蜀郡張寧飡豆飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧恒以步行爲郡功曹每察孝亷羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式𤣥照折像字伯式雒人也其先張江爲武威太守封南陽折侯因氏焉父國爲鬱林太守家貲二億故奴姬八百人盡散以施宗族䘏贍親舊葬死弔喪事東平虞叔雅以道教授門人朋友自逺而至時人爲諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經孟宗當仁味道好施清風邁倫讃仲魚已下也杜眞字孟宗綿竹人誦書百萬言兄事翟酺酺免後尚書令與司𨽻校尉枉劾之復徵詣獄眞上章救之受掠笞六百獄中明酺無事京師壯之以漢道微散財施宗族不應公州辟命及辭長吏候迎每交於門乃斷髪以自絕漢儒請雨精感慶雲諒輔字漢儒新都人爲郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰不雨則欲自焚爲貪叨吏謝罪百姓言終暴雨韓揆義烈韓揆字伯彦綿竹人也爲令錡裒主簿値黄巾賊入界扶裒走入草中裒遣求隱翳處未還裒爲賊所得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而茍自活非忠乃自殺喬雲勇震左喬雲綿竹人也少爲左通所養爲子通坐任徒徒逃吏欲破通臏通無壯子故爲吏所侵喬雲時年十三喟然憤怒以銳刀殺吏解通將走令出追初聞以爲壯士及知小兒爲之流涕楊寛證將烈播友人寛字叔仲新都人父斌證令萬世太守祋諷以忠義壯聞寛爲郡吏鄉人馬閏章言太守王方寛與兄偕詣獄證之得理後方當遷南郡閏復章之寛乃發閏臨私事閏伏罪友人汝錕爲張明所殺寛怒縛明送錕家使自謝之也寗叔執仇寗叔字茂泰廣漢人與友人張昌共受業太學昌爲河南大豪吕條所殺叔殺條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍爲謝裒裒死負土成墳三年裒子爲人所殺鉗復其仇自拘武陽獄會赦免當世義之賈爲士死分侔虞朱賈祤字元集什邡人也雒孟伯元爲父復讎聞祤名徃投之雒縣追伯元蹤祤歎曰士以義遇我豈可倍哉殺雒縣必移什邡負我君乃自殺李勝言之以方虞卿魯之朱家郭玉通直蓋亦所脩郭玉字通直新都人也明方術􅇊妙用針作經方頌說官至太醫丞校尉爰迄劉氏司農含章爽朗璀粲觀國之光秦宓字子勑綿竹人也初隱遁不應州郡之命丞相亮領益牧以選爲别駕中郞將吳使張温將反命亮率百官饑之温與宓語荅問若響應聲辭義雅美温大敬服以爲蜀之有宓猶魯仲尼也遷長水校尉司農宓甚有通理弟子譙周具傳其業李王四子並作琳琅李朝字永南弟邵字偉南郪人也王士字義强從弟甫字國山文表諸弟也先主領牧朝爲别駕羣下上先主爲漢中王其文朝所造也後丞相亮府辟西曹掾亦有文才兄弟三人號三龍士歴宕渠犍爲益州太守甫善言議闕人流美稱自綿竹令爲州右職優遊容與特進太常鐔承字公文郪人也歴郡守州右職爲少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諌君刎首王累新都人也州牧璋從别駕張松計遣法正迎先主主簿黄權諌不納累爲從事以諫不入乃自刎州門以明不可鄭度進規忠謀莫受雖云天時抑由人咎度綿竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野糓是資急驅巴西梓潼民内涪水以南一切燒除野糓固壘待之彼請戰不許久無所資不過百日必當囘先主聞而惡之璋不納言雖在天亦由璋之愚永年負才自喪世主彭羕字永年廣漢人有俊才劉璋時坐事爲徒及先主入自託龎統爲州右職失主意左遷江陽太守羕望諸葛亮以爲心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時爲牛鞞長先主領牧爲從事正旦命行酒得進見讓先主曰振威以將軍宗室肺腑委以討賊元功未効先寇而滅邈以將軍之取鄙州甚爲不宜也先主曰知其不宜何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮爲請得免久之爲犍爲太守丞相參軍安漢將軍建興六年亮西征馬謖在前亮將殺之邈諌以秦赦孟明用霸西戎楚誅子玉二世不競失亮意還蜀十三年亮卒後主素服發哀三日邈上疏曰吕禄霍禹未必懷反叛之心孝宣不好爲殺臣之君直以臣懼其偪主畏其威故姦萌生亮身杖强兵狼顧虎視五大不在邊臣常危之今亮殞歿蓋宗族得全西戎靜息大小爲慶後主怒下獄誅之詵詵彦造或哲或友昭德音芳垂名厥後㧾讃此四十六人也述廣漢人士任母治内子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每爲賑䘏其弟子以慰勉其志於是安之門生益盈門龎行養姑婦師之先龎行姜詩妻也事姑晝夜紡績以給供養子汲江溺水死秘言遣詣學常作冬夏衣投水中託言寄與子詩呼妻使爲姑舂應命遲見遣不敢逺去遊於外供給因隣母致姑勑還依依義舊抗疏邦庭誠感世主徙女輟刑義舊狄道長姜穆女綿竹司馬雅妻也既許婚父坐事徙朔方雅就婚死雇人送其喪尋父母死朔方義舊獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女已許嫁不得從父母徙紀配斷指以章厥貞紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡已自有美色慮人求己作詩三章自誓心而求者猶衆父母將許乃斷指明情養子猛終義太守薛鴻圖象府庭彭王進娥殘體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡叔父欲改嫁非乃詣太守五方截髪自誓敬亦早亡和養孤守義蜀郡何玉因媒介求之凡曉諭以公族可憑和恚割其一耳季宰亦早亡父母欲改嫁進娥亦剪髪自誓各養子終義正流自沈水絜冰清正流廣漢李元女楊文妻也適文有一男一女而文沒以織履爲業父欲改嫁乃自沈水中宗族捄之幾死得免太守五方爲之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親過哀死福哀感終身父母欲改嫁乃自殺洪氏世胄由婦謙柔汝敦妻某敦兄弟共居有父母時財㛐心欲得妻勸送二兄敦盡讓田宅奴婢與兄自出居後敦耕得金一器妻復勸送二兄夫妻共往㛐性恡嗇謂欲借貸甚不悦及見金踊躍兄感悟即出妻讓財還弟弟不受相讓積年後並察孝亷世爲冠族思媚烈媛美稱惟休揔讃十一人也述廣漢列女右廣漢}
