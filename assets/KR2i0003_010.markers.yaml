  - {type: variant, offset: 5427, length: 0, content: '', WYG: еӣӣеҚҒдёүдәәеЈ«еҚҒдәҢдәәеҘіиҸҜйҷҪеңӢеҝ—еҚ·еҚҒдёҠж¬Ҫе®ҡеӣӣеә«е…ЁжӣёиҸҜйҷҪеңӢеҝ—еҚ·еҚҒдёӯжҷүеёёз’©ж’°е»ЈжјўеЈ«еҘіи¬ӣеӯёжІ–ф…ғүжҙҷжі—жҳҜзЁҖрҰҷҚеёқзҙ№иҒ–еә¶зҶҷз–Үе’ЁжҘҠе®Јеӯ—еҗӣз·Ҝд»ҖйӮЎдәәд№ҹе°‘еҸ—еӯёж–јжҘҡеңӢзҺӢеӯҗејөеӨ©ж–Үең–з·Ҝж–јжІіеҶ…й„ӯеӯҗдҫҜеё«дәӢжҘҠзҝҒеҸ”иғҪжҡўйіҘиЁҖй•·ж–јзҒҫз•°ж•ҷжҺҲејҹеӯҗд»Ҙзҷҫж•ёжҲҗеёқеҫөжӢңи«ҢеӨ§еӨ«еёқз„Ўе—Је®ЈдёҠе°ҒдәӢеӢёе®ңд»Ҙе®ҡйҷ¶жҒӯзҺӢеӯҗзҲІеӨӘеӯҗеёқеҫһд№ӢеҮәе®ЈзҲІдәӨе·һзү§еӨӘеӯҗеҚідҪҚзҲІе“ҖеёқжӢңжІіеҶ…еӨӘе®ҲеҫөеӨӘеҖүд»ӨдёҠе®ңе°Ғе‘Ёе…¬еӯ”еӯҗеҫҢеёқеҫһд№Ӣе°Ғе‘Ёе…¬еӯ«зӣёеҰӮзҲІиӨ’йӯҜдҫҜеӯ”еӯҗеҫҢеӯ”еқҮзҲІиӨ’жҲҗдҫҜеҸҲи–ҰйҒјжқұзҺӢз¶ұз‘ҜзҗҠеҫҗеҗүеӨӘеҺҹйғӯи¶ҠжҘҡеңӢйҫ”еӢқзӯүе®ңи®ғйҡҶжҷӮйӣҚе№іеёқжҷӮе‘ҪжҢҒзҜҖзҲІи¬ӣеӯёеӨ§еӨ«иҲҮеҠүжӯҶе…ұж Ўжӣёеұ…ж”қдёӯеҚ’й–Җз”ҹжІіеҚ—жқҺеҗүе»ЈжјўеҡҙиұЎи¶ҷзҝ№зӯүзҡҶдҪңеӨ§е„’й•·дјҜж’«йҒҗиҒІжҡўдёӯз•ҝжһҗиҷҺе‘ҪйӮҰз¶ҪжңүйӨҳеҫҪй„ӯзҙ”еӯ—й•·дјҜйғӘдәәд№ҹзҲІзӣҠе·һиҘҝйғЁйғҪе°үиҷ•ең°йҮ‘йҠҖзҗҘзҸҖзҠҖиұЎзҝ зҫҪеҮәдҪңжӯӨе®ҳиҖ…зҡҶеҜҢеҸҠеҚҒдё–зҙ”зҚЁжё…дә·жҜ«жҜӣдёҚзҠҜеӨ·жјўжӯҢжӯҺиЎЁиҒһдёүеҸёеҸҠдә¬её«иІҙйҮҚеӨҡи–ҰзҫҺд№ӢжҳҺеёқеҳүд№Ӣд№ғж”№иҘҝйғЁзҲІж°ёжҳҢйғЎд»Ҙзҙ”зҲІеӨӘе®ҲеңЁе®ҳеҚҒе№ҙеҚ’еҲ—з•«й Ңжқұи§ҖдёүиҖҒжіұжіұеҜҰдҪңзҲ¶её«жҘҠз¶Ӯеӯ—д»ІйҖҡж–°йғҪдәәд№ҹдәӢиҸҜйҮҢе…Ҳз”ҹзӮҺй«ҳй«ҳжҲ’з¶Ӯжӣ°жјўд№қдё–зҺӢеҮәең–жӣёиҲҮеҚҝйҒ©жҮүд№Ӣе»әжӯҰеҲқеӨ©дёӢжұӮйҖҡеҶ…дңҹдәҢеҚ·иҖ…дёҚеҫ—ж°ёе№ідёӯеҲәеҸІејөеҝ—иҲүз¶Ӯж–№жӯЈеҸёеҫ’йӯҜжҒӯиҫҹжҺҫиҲҮжҒӯе…ұе®ҡйҹіеҫӢдёҠе®¶жі•з« еҸҘеҸҠдәҢеҚ·и§ЈиӘӘйҒ·дҫҚдёӯе…үзҰ„еӨ§еӨ«д»Ҙе№ҙиҖҒйҒ“ж·ұйӨҠж–јиҫҹйӣҚжҺҲеҮ жқ–зҲІдёүиҖҒеҚ’еҶ…и®–дәҢеҚ·з«ҹжңӘи©іе№ід»Іж¶үйҒ“ж®Ҷд№Һеә¶е№ҫзҺӢзҘҗеӯ—е№ід»ІйғӘдәәд№ҹе°‘иҲҮйӣ’й«ҳеЈ«ејөжө®йҪҠеҗҚдёҚжҮүе·һйғЎд№Ӣе‘ҪеҸёрЁҪ»ж Ўе°үйҷізҙҖеұұеҗҚзҹҘдәәзЁұзҘҗеӨ©дёӢд№Ӣй«ҳе№ҙеӣӣеҚҒдәҢеҚ’ејҹзҚІеҝ—е…¶йҒәиЁҖж’°зҺӢеӯҗдә”зҜҮжқұи§ҖйғһжқҺеӢқж–Үз« еЈ«д№ҹдҪңиӘ„ж–№д№ӢйЎҸеӯҗеҲ—з•«еӯёе®«зҚІдёҖдҪңзҒҢж–ҮзҲ¶жҳҺжҙһжҺўиіҫзҙўеҫ®жҘҠеәҸеӯ—д»ІжЎ“з¶Ӯд»Іеӯҗд№ҹйҒ“жҘӯдҫ”зҲ¶дёүеҸёеҸҠе…¬и»ҠйҖЈеҫөиҫӯжӢңдҫҚдёӯдёҠиЁҖеӣӣж–№еҸҚиҚҶжҸҡдәӨе·һз•¶е…өиө·дәәж°‘з–«иқ—жҙӣйҷҪеӨ§ж°ҙе®«ж®ҝз•¶зҒҫдёүеәңз•¶е…Қиҝ‘жҲҡи¬Җи®ҠзҡҶеҠ№й©—еӨ§е°Үи»ҚжўҒеҶҖз§үж¬ҠиҮӘйҖҖеҺ»жҺҲй–Җеҫ’дёүеҚғдәәжң¬еҲқе…ғе№ҙеҸҠе»әе’Ңдёӯзү№еҫөиҒҳдёҚиЎҢе№ҙе…«еҚҒдёүеҚ’еӨ©еӯҗз—ӣжғңи©”и«Ўжӣ°ж–ҮзҲ¶ејҹеӯҗйӣ’жҳӯзҙ„зҜҖе®°з¶ҝз«№еҜҮжҮҪж–Үе„ҖиңҖйғЎдҪ•иҗҮе№јжӯЈдҫҜзҘҲеҚҮдјҜ}
