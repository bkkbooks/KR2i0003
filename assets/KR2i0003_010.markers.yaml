  - {type: variant, offset: 5427, length: 0, content: '', WYG: 四十三人士十二人女華陽國志卷十上欽定四庫全書華陽國志卷十中晉常璩撰廣漢士女講學沖􅃉洙泗是稀𦙍帝紹聖庶熙疇咨楊宣字君緯什邡人也少受學於楚國王子張天文圖緯於河内鄭子侯師事楊翁叔能暢鳥言長於灾異教授弟子以百數成帝徵拜諌大夫帝無嗣宣上封事勸宜以定陶恭王子爲太子帝從之出宣爲交州牧太子即位爲哀帝拜河内太守徵太倉令上宜封周公孔子後帝從之封周公孫相如爲褒魯侯孔子後孔均爲褒成侯又薦遼東王綱瑯琊徐吉太原郭越楚國龔勝等宜讃隆時雍平帝時命持節爲講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿析虎命邦綽有餘徽鄭純字長伯郪人也爲益州西部都尉處地金銀琥珀犀象翠羽出作此官者皆富及十世純獨清亷毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之明帝嘉之乃改西部爲永昌郡以純爲太守在官十年卒列畫頌東觀三老泱泱實作父師楊綂字仲通新都人也事華里先生炎高高戒綂曰漢九世王出圖書與卿適應之建武初天下求通内䜟二卷者不得永平中刺史張志舉綂方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光禄大夫以年老道深養於辟雍授几杖爲三老卒内讖二卷竟未詳平仲涉道殆乎庶幾王祐字平仲郪人也少與雒高士張浮齊名不應州郡之命司𨽻校尉陳紀山名知人稱祐天下之高年四十二卒弟獲志其遺言撰王子五篇東觀郞李勝文章士也作誄方之顏子列畫學宫獲一作灌文父明洞探賾索微楊序字仲桓綂仲子也道業侔父三司及公車連徵辭拜侍中上言四方反荆揚交州當兵起人民疫蝗洛陽大水宫殿當灾三府當免近戚謀變皆効驗大將軍梁冀秉權自退去授門徒三千人本初元年及建和中特徵聘不行年八十三卒天子痛惜詔諡曰文父弟子雒昭約節宰綿竹寇懽文儀蜀郡何萇幼正侯祈升伯}
