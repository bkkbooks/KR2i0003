  - {type: variant, offset: 5427, length: 0, content: '', SBCK: 十二人女四十三人士華陽國志卷苐十上華陽國志卷十中廣漢士女講學沖􅃉洙泗是稀㣧帝紹聖庻熈疇咨楊宣字君緯什邡人也少受學扵楚國王子張天文圖緯扵河内鄭子侯師事楊翁􅅩能暢鳥言長於災異教授弟子以百數成帝徵拜諌大夫帝無嗣宣上封事勸宐以定陶恭王子爲太子帝從之出宣爲交州牧太子即位為哀帝拜河内太守徵太倉令上宐封周公孔子後帝從之封周公孫相如爲襃魯侯孔子後孔均爲襃成侯又薦遼東王綱瑯琊徐吉太原郭越楚國龔勝等宐贊隆時雍平帝時命持節爲講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿祈虎命邦綽有餘徽鄭純字長伯郪人也爲益州西部都尉処地金銀琥珀犀象翠羽出作此官者皆冨及十丗純獨清廉毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之朙帝嘉之乃改西部爲永昌郡以純爲太守在官十年卒列画頌東觀三老泱泱實作父師楊綂字仲通新都人也事華里先生炎高高戒綂曰漢九丗王出圖書與卿適應之建武初天下求通内䜟二卷者不得永平中刺史張志舉統方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光禄大夫以年老道深飬扵辟雍授几杖爲三老卒内䜟二卷竟未詳平仲涉道殆乎庻㡬王祐字平仲郪人也少與雒高士張浮齊名不應州郡之命司􅀠校尉陳紀山名知人稱祐天下之高年四十二卒弟􅀗志其遺言撰王子五篇東觀郎李勝文章士也作誄方之顏子列画學宫􅀗一作灌文父朙洞探賾索微楊序字仲桓統仲子也道業侔父三司及公車連徵辭拜侍中上言四方及荆交州當兵起人民疫蝗洛陽大水宫殿當災三府當免近戚謀變皆効驗大將軍梁冀秉權自退去授門徒三千人本初元年及建和中特徴聘不行年八十三卒天子痛惜詔謚曰文父弟子雒昭約節宰綿竹寇懽文儀蜀郡何萇㓜正俟祈升伯}
