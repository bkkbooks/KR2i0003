  - {type: variant, offset: 5427, length: 0, content: '', SBCK: еҚҒдәҢдәәеҘіеӣӣеҚҒдёүдәәеЈ«иҸҜйҷҪеңӢеҝ—еҚ·иӢҗеҚҒдёҠиҸҜйҷҪеңӢеҝ—еҚ·еҚҒдёӯе»ЈжјўеЈ«еҘіи¬ӣеӯёжІ–ф…ғүжҙҷжі—жҳҜзЁҖгЈ§еёқзҙ№иҒ–еә»зҶҲз–Үе’ЁжҘҠе®Јеӯ—еҗӣз·Ҝд»ҖйӮЎдәәд№ҹе°‘еҸ—еӯёжүөжҘҡеңӢзҺӢеӯҗејөеӨ©ж–Үең–з·ҜжүөжІіеҶ…й„ӯеӯҗдҫҜеё«дәӢжҘҠзҝҒф……©иғҪжҡўйіҘиЁҖй•·ж–јзҒҪз•°ж•ҷжҺҲејҹеӯҗд»Ҙзҷҫж•ёжҲҗеёқеҫөжӢңи«ҢеӨ§еӨ«еёқз„Ўе—Је®ЈдёҠе°ҒдәӢеӢёе®җд»Ҙе®ҡйҷ¶жҒӯзҺӢеӯҗзҲІеӨӘеӯҗеёқеҫһд№ӢеҮәе®ЈзҲІдәӨе·һзү§еӨӘеӯҗеҚідҪҚзӮәе“ҖеёқжӢңжІіеҶ…еӨӘе®ҲеҫөеӨӘеҖүд»ӨдёҠе®җе°Ғе‘Ёе…¬еӯ”еӯҗеҫҢеёқеҫһд№Ӣе°Ғе‘Ёе…¬еӯ«зӣёеҰӮзҲІиҘғйӯҜдҫҜеӯ”еӯҗеҫҢеӯ”еқҮзҲІиҘғжҲҗдҫҜеҸҲи–ҰйҒјжқұзҺӢз¶ұз‘ҜзҗҠеҫҗеҗүеӨӘеҺҹйғӯи¶ҠжҘҡеңӢйҫ”еӢқзӯүе®җиҙҠйҡҶжҷӮйӣҚе№іеёқжҷӮе‘ҪжҢҒзҜҖзҲІи¬ӣеӯёеӨ§еӨ«иҲҮеҠүжӯҶе…ұж Ўжӣёеұ…ж”қдёӯеҚ’й–Җз”ҹжІіеҚ—жқҺеҗүе»ЈжјўеҡҙиұЎи¶ҷзҝ№зӯүзҡҶдҪңеӨ§е„’й•·дјҜж’«йҒҗиҒІжҡўдёӯз•ҝзҘҲиҷҺе‘ҪйӮҰз¶ҪжңүйӨҳеҫҪй„ӯзҙ”еӯ—й•·дјҜйғӘдәәд№ҹзҲІзӣҠе·һиҘҝйғЁйғҪе°үеҮҰең°йҮ‘йҠҖзҗҘзҸҖзҠҖиұЎзҝ зҫҪеҮәдҪңжӯӨе®ҳиҖ…зҡҶеҶЁеҸҠеҚҒдё—зҙ”зҚЁжё…е»үжҜ«жҜӣдёҚзҠҜеӨ·жјўжӯҢжӯҺиЎЁиҒһдёүеҸёеҸҠдә¬её«иІҙйҮҚеӨҡи–ҰзҫҺд№Ӣжңҷеёқеҳүд№Ӣд№ғж”№иҘҝйғЁзҲІж°ёжҳҢйғЎд»Ҙзҙ”зҲІеӨӘе®ҲеңЁе®ҳеҚҒе№ҙеҚ’еҲ—з”»й Ңжқұи§ҖдёүиҖҒжіұжіұеҜҰдҪңзҲ¶её«жҘҠз¶Ӯеӯ—д»ІйҖҡж–°йғҪдәәд№ҹдәӢиҸҜйҮҢе…Ҳз”ҹзӮҺй«ҳй«ҳжҲ’з¶Ӯжӣ°жјўд№қдё—зҺӢеҮәең–жӣёиҲҮеҚҝйҒ©жҮүд№Ӣе»әжӯҰеҲқеӨ©дёӢжұӮйҖҡеҶ…дңҹдәҢеҚ·иҖ…дёҚеҫ—ж°ёе№ідёӯеҲәеҸІејөеҝ—иҲүзөұж–№жӯЈеҸёеҫ’йӯҜжҒӯиҫҹжҺҫиҲҮжҒӯе…ұе®ҡйҹіеҫӢдёҠе®¶жі•з« еҸҘеҸҠдәҢеҚ·и§ЈиӘӘйҒ·дҫҚдёӯе…үзҰ„еӨ§еӨ«д»Ҙе№ҙиҖҒйҒ“ж·ұйЈ¬жүөиҫҹйӣҚжҺҲеҮ жқ–зҲІдёүиҖҒеҚ’еҶ…дңҹдәҢеҚ·з«ҹжңӘи©іе№ід»Іж¶үйҒ“ж®Ҷд№Һеә»гЎ¬зҺӢзҘҗеӯ—е№ід»ІйғӘдәәд№ҹе°‘иҲҮйӣ’й«ҳеЈ«ејөжө®йҪҠеҗҚдёҚжҮүе·һйғЎд№Ӣе‘ҪеҸёф…Җ ж Ўе°үйҷізҙҖеұұеҗҚзҹҘдәәзЁұзҘҗеӨ©дёӢд№Ӣй«ҳе№ҙеӣӣеҚҒдәҢеҚ’ејҹф…Җ—еҝ—е…¶йҒәиЁҖж’°зҺӢеӯҗдә”зҜҮжқұи§ҖйғҺжқҺеӢқж–Үз« еЈ«д№ҹдҪңиӘ„ж–№д№ӢйЎҸеӯҗеҲ—з”»еӯёе®«ф…Җ—дёҖдҪңзҒҢж–ҮзҲ¶жңҷжҙһжҺўиіҫзҙўеҫ®жҘҠеәҸеӯ—д»ІжЎ“зөұд»Іеӯҗд№ҹйҒ“жҘӯдҫ”зҲ¶дёүеҸёеҸҠе…¬и»ҠйҖЈеҫөиҫӯжӢңдҫҚдёӯдёҠиЁҖеӣӣж–№еҸҠиҚҶдәӨе·һз•¶е…өиө·дәәж°‘з–«иқ—жҙӣйҷҪеӨ§ж°ҙе®«ж®ҝз•¶зҒҪдёүеәңз•¶е…Қиҝ‘жҲҡи¬Җи®ҠзҡҶеҠ№й©—еӨ§е°Үи»ҚжўҒеҶҖз§үж¬ҠиҮӘйҖҖеҺ»жҺҲй–Җеҫ’дёүеҚғдәәжң¬еҲқе…ғе№ҙеҸҠе»әе’Ңдёӯзү№еҫҙиҒҳдёҚиЎҢе№ҙе…«еҚҒдёүеҚ’еӨ©еӯҗз—ӣжғңи©”и¬ҡжӣ°ж–ҮзҲ¶ејҹеӯҗйӣ’жҳӯзҙ„зҜҖе®°з¶ҝз«№еҜҮжҮҪж–Үе„ҖиңҖйғЎдҪ•иҗҮг“ңжӯЈдҝҹзҘҲеҚҮдјҜ}
