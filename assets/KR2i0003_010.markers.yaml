  - {type: variant, offset: 5431, length: 0, content: '', WYG: 讃第三凡五十七人四十六人士十一人女犍爲士女王延河平纂禹之功王延世字長叔資中人也建始五年河決東郡氾濫兗豫四郡三十二縣沒官民屋舎四萬所御史大夫尹忠以不憂職致河決自殺漢史案圖緯當有能循禹之功在犍柯之資陽求之正得延世徵拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平封延世關内侯拜光禄大夫乃賜黄金百斤文伯習禮繼武孫通董鈞字文伯資中人也少受業於鴻臚王臨永平初議天地宗廟郊祀儀禮鈞與太常定其制又定諸侯王喪禮歴城門校尉五官中郞將以儒學貴稱繼叔孫通張公執憲克智克聰極位青紫寔作司空張皓字叔明武陽人也以文聰明辟大將軍掾遷尚書僕射彭城相進隱士閭丘遷等徵拜廷尉延光三年安帝將廢太子爲濟陰王皓與太常桓焉太僕來歴爭之安帝不許及安帝崩濟陰得立爲順帝以皓爲司空久之免後徵爲廷尉清河趙騰等坐謗訕當誅所引八十餘人皓以聖賢明義爭之咸稱平當子鸞司京桴鼓不鳴趙旂字子鸞資中人也初臨甘陵𢎞農郡甚善治民徵尚書遷司𨽻校尉時梁冀子弟放恣旂以法䋲之不敢爲非京師肅清桴鼓不鳴孟文翹翹平顯有成楊渙字孟文武陽人也以清秀博雅歴䑓郞相稍遷尚書中郞司𨽻校尉甚有嘉聲美稱伯邳正直耀祖揚聲楊凖字伯邳漢安縣人也初爲郡守太尉李固薦凖累世忠直拜尚書太傅陳蕃表爲河東入爲尚書令奏書治南陽太守曹麻潁川太守曹騰濟南太守孫訓等子弟依託形勢淫縱徵廷尉治罪訓梁冀婦家子也於是憚之又薦朱禹盛精滕延爲尚書陸稠爲郡守皆名士也桓帝即位拜河南尹遷司𨽻校尉冀叔父梁忠爲執金吾不朝正初劾奏之朝士服其公亮徙將作大匠翁君將命迺播其名楊莽字翁君武陽人爲功曹刺史王尊當之州移書諸郡不得遣迎惟犍爲遣莽何霸巴郡遣嚴尊尊大怒莽前對曰使君不使奉迎謙也太守承迎敬也謙敬上下之節不可廢也尊乃欣請辟别駕舉茂才官至揚州刺史奉君遯世費貽字奉君南安人也公孫述時漆身爲厲佯狂避世述破爲合浦守蜀中歌之曰節義至仁費奉君不仕亂世不避惡君脩身於蜀紀名亦足後世爲大族任公開明任永字君業僰道人也長厯數王莽時託青盲公孫述時累徵不詣子溺井中死見而不言妻淫於前面而不怪述平乃曰世適平目即清妻自殺光武徵之以年老不詣卒叔和順終杜撫字叔和資中人也少師事薛漢治五經教授門生千人太守王卿召爲功曹司徒辟不及聞公免必往承問東平憲王爲驃騎將軍辟西曹掾後罷爲王師在驃騎府者遣之數年乃去建初中為公車令數月卒作詩通議説弟子南陽馮良亦以道學徵聘君橋宻精趙松字君橋武陽人爲童子數咨問費貽及知其避世宻與周旋終不露之也述平舉茂才爲上黨太守英英四子利於居貞讃費貽以下皇漢㢮綱官人失紀文紀蹇諤表明臧否張綱字文紀司空皓子也在漢朝公平亷正權宦側目憚之漢安元年以光禄大夫持節與侍中杜喬循行州郡考察風俗出宫垣埋車先奏太尉桓焉司徒劉壽尸祿素餐不堪其職出城又奏司𨽻校尉趙峻河南尹梁不疑汝南太守梁乾等贓穢濁亂檻車送廷尉治罪天子以乾梁冀叔父貶秩免峻等又奏魯相寇儀儀自殺威風大行郡縣莫不肅懼還冀恨之出爲廣陵太守承叛亂後懷集撫䘏甚有治化在官十年卒子續爲尚書續弟方爲豫州牧子孫數世至大官白虜狂僭亂離斯圯孝仲縶馬社稷是死朱遵字孝仲武陽人也公孫僭號遵爲犍爲郡功曹領軍拒戰於六水門衆少不敵乃埋車輪絆馬必死爲述所殺光武嘉之追贈復漢將軍郡縣爲立祠建侯弔梁効志知己趙敦字建侯武陽人也初爲新都令德禮宣流三司及大將軍梁冀累辟終不詣冀辟書不絶後冀自殺使者監守不使人弔問敦獨往弔祭訖自拘有司天子赦之叔通敦孝石生江汜隗相字叔通僰道人也養母至孝母食欲江中正流水相冬夏汲之一朝有横石生正流中哀帝世察孝廉平帝世爲郞吳生致養亦感靈祉吳順字叔和僰道人也事母至孝赤烏巢其門甘露降其戸察孝廉永昌太守劉后初載實多良才季休忠亮經事能治楊洪字季休武陽人也先主領牧爲部屬從事及征漢中丞相亮表爲蜀郡太守先主疾病永安召亮東行漢嘉太守黄元反後主從其計克元封關内侯後爲中郞將校尉忠清欵亮亮甚信任之德山躭學道以光時伍梁字德山南安人也儒學雅尚州選迎牧諸葛亮爲功曹遷五官中郞將烈武作合度曠塗夷惜哉公舉帥直凌遲費詩字公舉南安人也先主領牧爲前部司馬羣臣勸先主稱尊號詩上疏曰殿下以曹操父子逼主簒盜故乃羇旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖獲子嬰猶尚推讓況未出門便欲自立耶以是左遷部永昌從事建興三年從丞相亮南征魏將李鴻來降說魏新城太守孟達欲背魏向蜀亮方北面欲招達爲外援欲與書詩進曰孟達小子昔事振威不忠後事先帝背叛反覆之人何足與書也亮嘿然詩終劉氏之世官位不盡其才君子以昭烈之𢎞曠武侯之明達詩吐直言猶尚凌遲況庸主昏世帥意直言而望肆効者哉文然簡略不從詭隨楊義字文然武陽人也輔漢將軍張裔薦爲丞相亮主簿大司馬蔣琬辟東曹掾歴二郡太守爲射聲校尉性簡略未曾以甘言加人酒後言笑多慢詞失大將軍姜維意爲維所廢延熙十八年作季漢輔臣讃在蜀書車騎怏怏與國安危張翼字伯恭文紀孫也以文武才幹歴征西鎭南大將軍封亭侯延熙十八年與大將軍姜維西征大破魏雍州刺史王經於狄道經衆死洮水者數萬人維欲進翼諫不可進必無功時維屢出隴西翼常庭爭以國小不宜黷武必爲蛇畫足不聽不得已每怏怏從行景耀元年遷左車騎將軍領冀州刺史蜀平後死猗猗衆偉芳烈名垂方德繹勲犍之瓊瑰述犍爲人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博妻也博後母文有母儀之德進楊則其教爲行閨門雍穆䍧柯太守李禕家亦假係每不和歎恨徒富貴學問不及博家也陽姬請父厥族䝉援克諧内愛訓及秀彦姬武陽人也生自寒微父闕坐事閉獄楊渙始爲尚書郞告歸郡縣敬重之姬爲處女乃邀道扣渙馬訟父罪言辭慷慨涕泣渙懇吿郡縣爲出其父因竒其才爲子文方聘之結婚大族二弟得仕宦遂世爲宦門後文方爲漢中太守以趙宣爲賢將察孝廉函封未定病卒姬秘不發先遣孝廉上道乃發喪宣得進用姬之力也後文方兄子伯邳爲司𨽻校尉時姬長子頴伯冀州刺史仲子頰二千石伯邳以稟叔母教迎在官舍每教邳政治伯邳欲舉茂才選有二人伯邳欲用老者嫌其年耄欲舉五方而其年幼以咨叔母勸舉方後趙宣爲犍爲五方爲廣漢姬尚在故吏之敬四時承問不絕周度割體貞節是全周度僰道人也相登妻十九登亡中牟令吳厚因人為子求之斷髮以誓志後人猶欲求之乃割其鼻養子早亡其妻左亦年十九遂俱守義世感歎婦姑之貞專其節操也敬姬沈淵誠烈邈然曹敬姬南安人也周紀之妻十七出適十九紀亡遺生子元餘服闋父母以許孫賔紿母病迎還知之自投水人赴之氣已絕一日一夜乃蘇息送依紀弟居訓導元餘號爲女學士年九十卒貞玦玉操彌久不刋貞玦字瓊玉牛鞞程氏女張惟妻也十九適惟未朞惟亡無子養兄子悅供養舅姑夙夜不怠資中王冲欲娶玦玦叔父肱荅以女志不可奪冲爲太守李嚴督郵嚴託縣遣孝義掾奉羔鴈宣太守命聘之玦乃自投水捄援不死後太守蘇高爲立表太守蜀郡闕遣仁恕掾論曰貞玦太守章陵劉威又爲作頌故稱述也韓姜自財后旌其寃韓姜僰人尹仲讓妻也二十讓亡服除資中董䑓因從事王爲表弟求姜不許䑓門生左習王蘇以爲姜可奪教姜家言母病迎還韓氏因逼成婚姜聞故自殺太守巴郡龔楊哀之殺習蘇以報姜死謝姬引決同穴齊窆姬南安人武陽儀成妻也成死以己年壯無子將葬乃預作殯殮具毒藥須夫棺入墓拊棺吞藥而死遂同葬縣以表郡郡言州州上尚書天子咨嗟下書每大赦賜家帛四疋蜀穀二石媛姜疋婦勉夫濟子授命囹圄義踰國士趙媛姜資中人盛道妻也建安五年道坐過夫婦閉獄子翔方年五歲姜謂道曰官有常刑君不得已矣妾在後何益君門戸君可同翔亡命妾代君死可得繼君宗廟道依違數日姜苦言勸之遂解脫給衣糧使去代爲應對度走逺乃吿吏殺之後遇赦父子得還道雖仕宦當世痛感終不更娶翔亦不仕耳黄帛求喪沉身中流靈精相感􅂝夫共浮黄帛僰道人張貞妻也貞受易於韓子方去家三十里船覆死貞弟求喪經月不得帛乃自往沒處躬訪不得遂自投水中大小驚睨積十四日持夫手浮出時人爲語曰符有先絡僰道帛求其夫天下無有其偶縣長韓子冉嘉之召帛子幸之爲縣股肱烈哉諸媛節稱義遵叙之讃此九女也述犍爲列女右犍爲士女讃第四凡三十人二十一人士九人女華陽國志卷十中欽定四庫全書華陽國志卷十下晉常璩撰漢中士女鄭真岳跱確乎其清鄭子真褒中人也𤣥静守道履至徳之行乃其人也教曰忠孝愛敬天下之至行也神中五徴帝王之要道也成帝元舅大將軍王鳳備禮聘之不應家谷口世號谷口子真亡漢中與立祠神中五徴未詳其義衛梁泥盤𤣥湛淵亭衛衡字伯梁南鄭人也少師事隠士同郡樊季齊以髙行聞郡九察孝亷公府州十辟公車三徴不應董扶任安從洛還過見之曰京師天下之市朝也足下猶之人耳幸其在逺以虚名屢動徴書若至中國則價盡矣衡笑曰時有儉易道有汙隆若樊季齊楊仲桓雖應徴聘何益於時乎茍無所則尼軻栖栖是以君平子真不屈其志豈予之徒也哉吾何虚假之有安扶服之敬其言也鄧公方到忠枉原情鄧公成固人也景帝時御史大夫晁錯患諸侯强大建議減削㑹吴楚七國謀反假言誅錯故吴相袁盎譛帝殺之拜盎太常使赦七國七國遂叛鄧公為謁者入言軍事問曰七國聞晁錯死罷兵不對曰吴王即山鑄錢煑海為鹽謀反積數十年錯患之故欲削弱為萬世策諸侯憂之計畫始行身死東市諸侯莫憚内杜忠臣之口外為諸侯報怨臣竊為陛下不取也帝歎息曰吾亦恨之武帝初為九卿博望致逺西南來庭張騫成固人也為人强大有謀能涉逺為武帝開西域五十三國窮河源南至絶逺之國拜校尉從討匃奴有功遷衛尉封博望侯於是廣漢縁邊之地通西南之塞豐絶逺之貨令帝無求不得無思不服至今方外開通騫之功也子游師生讒巧所傾張猛字子游騫孫也師事光禄勲周堪以光禄大夫給事中侍元帝帝當廟祭濟渭欲御樓船御史大夫薛廣徳當車免冠乞頸血汚車輪陛下不得廟祭矣帝以不悦猛進曰主聖則臣直今乘船危就橋安聖主不乘危故大夫言之帝曰曉人不當如是耶後與周堪俱以忠正為幸臣𢎞恭石顯所譛毁乍出乍徴堪平和猛卒自殺王孫養性矯𦵏厲生楊王孫成固人也治黄老家累千金厚自奉養臨終告其子曰我死躶𦵏以復吾真但為布囊盛尸入地七尺既下從足脫之以身親土其子不忍見王孫友人祁侯諌之王孫曰厚𦵏無益死者也夫僤財送死今日入明日發此真無異暴骸中原裹以幣帛隔以棺槨唅以珠玊後腐朽乃得歸土不可故吾欲早就真宅祁侯無以易卒躶塟如其言司徒監使術暢思精屢登上司七政是經李郃字孟節南鄭人也少明經術為郡候吏和帝遣使者二人微行至蜀宿郃候舎郃為出酒夜飲露坐郃問曰君來時寜知二使何日發來耶二人恠問之郃指星言曰有二使星入益部後一人為漢中太守命為功曹察孝遂馳名為尚書郎徙左丞稍遷至尚書僕射尚書令拜司空又進司徒清公直亮當世稱名順帝世薨炎精不頽朱明不揚太尉謇諤任國抜荒濯日暘谷將外扶桑惡直醜正漢道遂喪李固字子堅郃子也陽嘉二年以對䇿忠亢拜議郎大將軍梁商后父也表為從事中郎授荆州刺史值州部有亂至州先友賢者南陽鄭叔躬宋孝節零陵支宣雅表薦長沙桂陽太守趙歴已又奏上江夏南郡太守孔疇髙賜等臧穢州土自然安静徙太山太守克寜盜賊入為將作大匠多致海内名士南陽樊英江夏黄瓊廣漢楊厚㑹稽賀純光禄周舉侍中杜喬陳留楊倫河南尹存東平王惲陳國何臨清河房植等皆蒙徵聘轉大司農順帝崩太后臨朝拜太尉與后弟大將軍梁冀太傅趙峻並録尚書沖帝崩時徐揚有盜賊太后欲不發喪須召諸王至固争不可言國家多難宜立長君太后欲專權乃立樂安王為質帝質帝崩太后復與梁冀謀所立固與司徒南郡胡廣司空蜀郡趙戒書與冀引周勃霍光立文宣以安漢之䇿閻鄧廢立之禍言國統三絶期運厄㑹興崩之漸在斯一舉宜求賢王親近不可寢嘿也冀得書召公卿列侯議所立三公及鴻臚杜喬僉舉清河王蒜冀然之奏御太后中常侍曹騰私恨蒜説冀明日更議廣戒從冀固與喬必争蒜宜立中興才也且年長識義必厚于將軍冀不聴䇿免固喬嵗餘取下獄以無事出之京師市邑皆稱千萬嵗冀惡其為人所善更奏繫之固書與二公曰吾欲扶持漢室使之比隆文宣何圖梁將軍迷謬諸子曲從以吉物為凶成事為敗漢家衰微從是始矣將軍亦有不利吾雖死上不慙於天下不愧於人求義得義死復何恨遂自殺二公得書歎息流涕士民咸哀哭之桓帝無道冀尋受誅漢家遂微政在閹官無不思固也元修敦重威惠實亮張則字元修南鄭人也為牂柯太守威著南土永昌越嶲夷謀欲反畏則換臨其郡相諌而止號曰卧虎以戍狄勲遷護羌校尉徴拜扶風又換臨桂陽皆平盜賊巴郡板楯反拜隆集校尉鎮漢中徙梁州刺史又為魏郡太守所在稱治靈帝崩後大將軍袁紹表為長史不就丞相曹公拜度遼將軍子雅温恭見察文方趙宣字子雅南鄭人也出自寒微以温良􅀶雅太守犍為楊文方深器異之遂察孝亷官至犍為太守二珪琬琰三辰懸望趙瑤字元珪琰字稚珪凡七兄弟宣子也皆以令徳著聞瑤少有公望瑤始為緱氏袁趙二公相與書曰趙瑤在緱氏猛虎歸迹百里均耳叔平何難遷扶風太守徙蜀郡司空張温謂之曰昔第五伯魚徙蜀郡為司空掃吾第以待足下矣瑤曰諾尋換廣漢卒琰始為青州刺史部下清肅徙梁相徴拜尚書不就卒仲卿報友行義以理陳綱字仲卿成固人也少與同郡張宗受學南陽以母喪歸宗為安衆劉元所煞綱免喪徃復之值元醉卧還須醒乃殺之自拘有司㑹赦免三府並辟舉茂才拜𢎞農太守初至有兄弟自相責引退是後無訟者在官九年卒天子痛惜賜家錢四十萬伯度𤣥鏡榮辱屑已李法字伯度南鄭人也桓帝時為侍中光禄大夫數亢表宦官泰盛椒房泰重史官記事無實録之才虚相褒述必為後笑帝怒免為庶人恬然以咎失為己責乆之徴拜汝南太守遷司𨽻校尉湛然無自得之容徳公在林懸象垂晷既沖雲清荀張儀准李燮字徳公太尉固子也父死時二兄亦死燮為姊所遣隨父門生王成亡命徐州傭酒家酒家知非常人以女妻之延熹二年梁冀誅後月經陽道暈五車史官上書昔有大星升漢而西捲舌揚芒迫月熒惑犯帝坐則有大臣枉誅星在西方太尉固應之今暈如之宜有赦命録其遺嗣以除此異於是下赦燮得返舊四府並辟公車徴議郎與趙元珪潁川賈偉節荀慈明張伯慎為友伯慎為潁川太守與慈明交相言論偉節與焉京師以為臧否伯慎問趙元珪曰徳公所言何元珪曰無言也伯慎追嘆曰當如徳公兒輩徒靡沸耳慈明亦寤而心服拜東平相國王為黄巾所没得出天子復封之燮以為不可果敗遷京兆尹時人為之語曰李徳公父不欲立帝子不欲立王伯臺處諌師言亢盡末命防萌妙覩𤣥揆陳雅字伯臺成固人也靈帝時為諌大夫閹官用事上䟽曰昔孝和帝與中常侍鄭衆謀誅大將軍竇憲由是宦官秉權安帝幼沖和熹太后兄大將軍鄧騭輔政太后適崩中常侍江京等殺騭安帝登遐黄門孫程又殺車騎將軍閻顯孝桓帝又與中常侍單超等共誅大將軍梁冀陛下即祚太𫝊陳蕃大將軍竇武尚書令尹勲等欲誅宦官絶其奸擅盡忠王室建萬世筞機事不宻為中常侍朱瑀等所殺此即陛下所見今宦官强盛威傾人主天下鉗口莫敢言者海内怨望妖㜸並作四方兵起萬姓辛苦陛下尚可以安奈後嗣何帝不省納出為巴郡太守年七十五卒臨終戒其子曰期運推之天下將大亂雄夫力争無以貨財為意吾亡依山薄𦵏亡嵗餘靈帝崩大將軍何進復為黄門所殺海内果亂終成三國也孟度邵允閻憲字孟度成固人也名知人為綿竹令以禮讓為化民莫敢犯男子杜成夜行得遺物一囊中有錦二十五疋求其主還之曰縣有明君何敢負其化童謠歌曰閻尹賦政既明且昶去苛去辟動以禮讓遷蜀郡吏民泣涕送之以千數季子英瑋李歴字季子太尉固從弟也少修文學性行清白與鄭康成陳元方齊名弱冠拜新城令朝請都督計君經筭程苞字元道南鄭人也光和二年上計吏時巴郡板楯反軍旅數起征伐頻天子患之訪問益州計考以方畧苞對言板楯忠勇立功先漢為帝義民羌入漢中輒蒙其力東征南戰世有功勞由不料䘏以致叛亂非有僣盗能相羣殺兵臨之未必卒得不如但選明能太守恩信懷服自然安定矣天子從之卒如其言後在道卒元靈斐斐祝龜字元靈南鄭人也年十五逺學汝潁及太學通􅀶蕩達能屬文太守張府君竒之曰吾見海内士多矣無如祝龜者也州牧劉焉辟之不得已行授葭萌長撰漢中耆舊傳以著述終禮髙殉名段崇字禮髙南鄭人也太守河間鄭廑命為主簿永初四年涼州羌反溢入漢中從廑屯褒中虜東攻廑欲戰崇諌不可願固壘待之廑不聴出戰敗績崇與門下吏王宗原展及子勃兄子伯生推鋒死戰衆寡不敵崇等皆死羌遂得廑殺之伯義死節程信字伯義南鄭人也時為功曹守居馳來赴難殯殮廑喪送還郷里訖乃結故吏冠葢子弟二十五人言共報羌各募敢死士以待時太守鄧成命信為五官元初二年虜復來信等將其同志率先奮討大破之信被八創死天子咨嗟元初五年下詔書賜信崇家穀數千斛四行齊致在兹六子讃閻憲已下也又有王宗原展及嚴孳李容姜濟陳已曹亷勾矩劉旌九人皆以令義為鄭厪所命王宗原展與厪同死孳容等七人與信共并命詔書既賜崇信家又賜九子家穀各五百斛給死事復元侯趙陳葢亦烈士燕邠字元侯趙嵩字伯髙南鄭人也陳調字元化仲卿孫也邠為刺史郤儉從事使在葭萌與從事董馥張𦙍同行儉為黄巾賊王饒趙播等所殺邠聞故哀慟説馥𦙍赴難二子不可邠歎曰使君已死用生何為獨死之牧劉焉嘉之為圖象學宫誅馥等嵩事太守蘇固固為米賊張脩所疾殺嵩痛之杖劍直入脩營殺十餘人幾獲脩死陳調少尚遊俠聞固死聚賔客百餘人攻脩大破之進攻脩營乃與戰以傷死渙渙龍宗振振麟趾文炳彬蔚漢之表軌搃讃此三十五人也述漢中人士其陳術字申伯作耆舊傳者也失其行事歴新城魏興上庸三郡太守及錫光等不列也穆姜温仁化繼為親穆姜安衆令程祗妻司𨽻校尉李法姊也祗前妻有四子興敦覲豫穆姜生二子淮基祗亡興等憎惡姜姜視之愈厚其資給六子以長幼為差衣服飲食凡百如之久興等感寤自知失子道詣南鄭獄受不愛親罪太守嘉之復除門户常以二月八月社致肉三十斤酒米各二斛六㪷六子相化皆作令士五人州郡察舉基字稚業特嶲逸為南郡太守泰瑛嚴明世範厥訓泰瑛南鄭楊柜妻大鴻臚劉巨公女也有四男二女拒亡教訓六子動有法矩長子元珍出行醉母十日不見之曰我在汝尚如此我亡何以帥羣弟子元珍叩頭謝過次子仲珍白母請客既至無賢者母怒責之仲珍乃革行交友賢人兄弟為名士泰瑛之教流於三世四子才官隆於先人故時人為語曰三苗止四珍復起杜氏之教父母是遵杜泰姬南鄭人趙宣妻也生七男七女若元珪稚珪有望五人皆令徳其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寛宓子賤帶弦以自急故能改身之恒為天下名士戒諸女及婦曰吾之􅗖身在乎正順及其生也恩存於撫愛其長之也威儀以先後之體貌以左右之恭敬以監臨之懃恪以勸之孝順以内之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也後七子皆辟命察舉牧州守郡而漢中太守南鄭令多與七子同嵗季考上計無不修敬泰姬執子孫禮禮珪肅穆言存典韻禮珪成固陳省妻也楊元珍之女生二男長娶張度遼女惠英少娶荀氏皆貴家豪富從婢七八資財自富禮珪勑二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不為貧也所以粗食急務者使知苦難備獨居時二婦再拜奉教從孫奉上微慢珪抑絶之感悟革行遭亂流行宗表欲見之必自嚴飭從子孫侍婢乃引見之曰此先姑法也四時祭禮自親養牲醸酒曰夫祭禮之尊也年八十九卒惠英亦有淑訓母師之行者也文姬叡敏宗祀獲歆文姬南鄭趙伯英妻太尉李固女也父為梁冀所免兄憲公季公罷官歸文姬歎曰李氏滅矣乃與二兄議匿弟燮父門生王成亡命徐州涕泣送之謂成曰託君以六尺之孤若李氏得嗣君之名義參於程杵矣久之遇赦燮得還行喪服闋勑之曰先公為漢忠臣雖死之日猶生之年梁冀以族弟幸濟豈非天乎慎勿有一言加梁氏加梁氏則連主上是又掇祸也奉行之後成在徐州各異處傭賃而私相徃來成病亡燮四時祭之陳氏二謙或智或仁陳順謙成固人也順謙適鄧令曹寜十九寡居長育遺孤八十餘卒兄子陳規著書歎述之惠謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元脩訪於惠謙惠謙曰恢𢎞徳教養亷免恥五刑三千葢亦多矣又何加也兄子伯思學仙道惠謙戒之曰君子疾没世名不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之後耳禮脩順姑恩愛温潤禮脩趙嵩妻張氏女也姑酷惡無道遇之不以禮脩終無愠色及寜父母父母問之但引咎不道姑卒感寤更慈愛之郷人相訓曰作婦不當如趙伯髙婦乎使惡姑知變可謂婦師矣後姑病女來省疾姑却之曰我死固當絶於賢婦手中後遭米賊嵩死乃碧塗面亂首懷刀託言病賊不逼也養遺生女依父叔立義終身者也樹南悼夫輕死重信韓樹南南鄭人趙子賤妻也子賤初為郡功曹李固之誅詔書下郡殺固二子憲公季公太守知其枉遇之甚寛二子託服藥死具棺器欲因出逃子賤畏法勑更驗實就煞之及固小子燮得還子賤慮燮報仇賃人刺之燮覺告郡煞子賤初樹南諌子賤子賤不從及臨死許共并命兄弟㛐侍婢視守之經百餘日乃怠白兄㛐念一死萬不得生不敢復圖死也上下以為信然無幾時於幕下自煞祁祁令姬如玉如金允矣淑媛齊徳姜任搃讃此九人也述漢中列女右漢中士女讃第五凡四十四人三十五人士九人女梓潼人士鎮逺敦壯立勲南瀕文瀕字子竒梓潼人也孝平帝末以城門校尉為犍為屬國遷益州太守造開稻田民咸賴之公孫述時拒郡不服述拘其妻子許以公侯招之不應乃遣使由交趾貢獻河北述平世祖嘉之徴拜鎮逺將軍封成義侯南中咸為立祠子忳有令徳為北海太守巨遊玉碎髙風金振李業字巨遊梓潼人也少執志清白太守劉咸慕其名召為功曹不詣咸怒欲煞之業徑入獄咸釋之公孫述累聘不應述怒遣鴻臚尹融持毒藥酒逼之業笑曰名不可毁身可殺不可辱也遂飲藥死述恥殺善士賜錢百萬子翬逃匿不受建武中察孝亷為遂久令文堅亟哉南面懷民景毅字文堅梓潼人也太守丁羽察舉孝亷司徒舉治劇為沇陽侯相髙陵令立文學以禮譲化民遷太守上封吏民守闕請之三年不絶以子顧師事少府李膺膺誅自免久之拜成都令遷益州太守上封吏民涕泣送之至沮者七百人白水縣者三百人值益州亂後米㪷千錢毅至恩化暢洽比去米㪷八錢鳩鳥巢其㕔事孕育而去三府表薦徴拜議郎自免歸州牧劉焉表拜都尉為人亷正疾淫祠勑子孫惟修善為禱仁義為福年八十一而卒盛國好學研賾聖真楊充字盛國梓潼人也少好學求師遂業受古學於扶風馬季長呂叔公南陽朱明叔潁川白仲職精究七經其朋友則潁川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海内名士還以教授州里常言圖緯空説去事希略疑非聖不以為教察孝亷為郎卒漢伯肄業諸生之純景鸞字漢伯梓潼人也少與廣漢郝伯宗蜀郡任叔本潁川李仲勃海孟元叔遊學七州遂明經術還乃撰禮略河洛交集風角雜書月令章句凡五十萬言太守闕貺命為功曹察孝亷舉有道􅀶士徴不詣然上陳時政言經得失又戒子孫人紀之禮及遺令期死𦵏不設衣衿務在節儉甚有法度卒終布衣伯僖効志張夀字伯僖涪人也少給縣丞楊放為佐放為梁賊所得夀求之積六年始知其生存乃賣家鹽井得三十萬市馬五疋徃贖放道為羌所刼掠盡凡徃三年計道逺不可得數乃單身詣虜涕泣自説虜哀其屢求遣放還郷郡召為中候詔書除巫尉以身佩印盡譲所有財物與三弟復為郡掾章平賦役嵗出三百五十萬遷功曹史徙五官掾卒李餘殘身李餘涪人父早世兄夷殺人亡命母慎當死餘年十三問人曰兄弟相代能免母不人曰趣得一人耳餘乃詣吏乞代母死吏以餘年小不許餘因自死吏以白令令哀傷言郡郡上尚書天子與以財𦵏圖畫府廷童人李餘涪人可考於先漢士女目篇冦王二子行勇以仁冦祺字宰朝梓潼人也與邑子侯蔓俱學涼州蔓後為勃海王象所殺祺杖劍至象家值象病象謝曰君子不掩人無備安有為友報讎殺病人也祺乃還久之復徃殺象由是察孝亷為㶚陵令濟陰相王晏字叔博涪人也與廣漢張昌寗叔受業大學昌為河南呂條所殺晏叔殺條事在叔解李助多方以兹立稱助字翁君涪人也通名方校醫術作經方頌説名齊郭玉自此以上原闕章武之興亦迪才倫徳賢好古澹心藝文李仁字徳賢涪人也益部多貴今文而不崇章句仁知其不博乃游學荆州從司馬徳操宋仲子受古學以修文自終也國輔皓然形動神況杜微字國輔涪人也任安弟子先主定蜀常稱聾闔門不出建興二年丞相亮領州牧選為主簿輿而致之亮引見與書誘勸欲使以徳輔時微固辭疾篤亮表拜諌大夫從其所志思潜遊學休志素林尹黙字思潜涪人也少與李仁俱受學司馬徽宋忠等博通五經專精左氏春秋自劉歆條例鄭衆賈逵父子陳元方服䖍注説略皆誦述希復案本以左傳授後主後主立拜諌議大夫丞相軍祭酒子宗亦為􅀶士耳欽仲朗博訓詁典墳李譔字欽仲仁子也少受父業又講問尹黙自五經四部百家諸子伎藝筭計卜數醫術弓弩機械之巧皆致思焉為太子中庶子右中郎將著古文周易尚書毛詩三禮左氏注解太𤣥指依則賈馬異於鄭𤣥與王肅初不相見而意歸多同孫徳果鋭作劉幹臣李福字孫徳涪人也先主初為成都令建興九年遷巴西太守後為江州都督揚武將軍入為尚書僕射封平陽亭侯延熙初為前監軍司馬福同郡梓潼文恭仲寳亦以才幹為牧亮治中從事丞相㕘軍衎衎偉彦玉潤蘭芬邵名表器江漢之俊搃讃此十五人也述梓潼人士季姜雍穆化播二婦王氏世興實由賢母季姜梓潼文氏女將作大匠廣漢王敬伯夫人也少讀詩禮敬伯前夫人有子博女紀流二人季姜生康稚芝女始示凡前後八子撫育恩愛親繼若一堂祖母性嚴子孫雖見官二千石猶杖之婦跪受罰於堂歴五郡祖母隨之官後以年老不願逺鄉里姜亦常侍養左右紀流出適分已侍婢給之博好冩書姜手為作衮於是内門相化動行推讓博妻犍為楊進及博子遵婦蜀郡張叔紀服姑之教皆有賢訓號之三母堂亡姜勑康稚芝婦事楊進如舅姑中外則之皆成令徳季姜年八十一卒四男棄官行服四女亦從官舎交赴内外冠冕百有餘人當時榮之王氏遂世興杜慈專專父不諒只涪杜季女者巴郡虞顯妻也十八適顯顯亡無子季欲改嫁與同縣楊上慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑死就養成室存亡等但欲在終供養亡不有恨願不易圖季知不可告而奪也乃宻謀與强逼迫之慈縊而死敬楊雪讎壯踰烈士敬楊涪郭孟妻楊文之女也始生失母八嵗父為闕盛所殺無宗親依外祖鄭行年十七適孟孟與盛有舊盛數徃來孟家敬楊涕泣謂孟曰盛凶惡薄命為女無男昆惡讎未報未嘗一日忘也雖婦人拘制然父子恩深恐卒狂惑益君禍患君宜疎之孟以告盛盛不納安漢元年盛至孟家敬楊以大杖打殺盛將自殺孟止之與俱逃涪令雙勝出追聞其故而止安尉二門㑹赦得免中平四年涪令向遵為立圖表之惟兹三媛仁暢義理邦有斯嬪以馳遐紀搃讃三人也述梓潼列女右梓潼郡士女讃第六凡十八人十五人士三人女譔曰二州人士自漢及魏二百四十八人而已一百九十七人士五十一人女後賢二十人合二百六十八人以示來世之君子焉如其遺脱及後世可書者願貽後雋又春秋穀梁傳首叙曰成帝時議立三傳博士巴郡􅇧君安獨駮左傳不祖聖人後漢時魏郡太守王牧薦尹方為三公天子詔尚書郎蜀郡張俊筞之然不詳其行事譔曰二州人士自漢及魏可謂衆矣何者世宗多士則相如麟遊伯司鳳翔洛下雲翳叔文龍驤在孝宣則王褒蔚炳中和作詠屬文甘泉葩為世鏡在元成則君公謇謇心思國病慮經劉危直忤王聴其髙者則嚴君味道易俗移風仲元端委居為人宗若夫秉心塞淵與物盈冲則揚子雲也名重泰山華夏仰崇則鄭子真也不屈其身志髙青雲則譙𤣥也不恥惡君混道推運則楊宣也降及建武明章以來出者則能内貫朝揆外播五教賛和鼎味經綸治要上答太階下允民照處者則利居盤桓晧然𤣥蹈天爵翫之人爵則笑懸車門肆夷惠齊紹若斯之倫海内服其英名洙泗方其渙耀矣故曰漢徴八士蜀出其四又曰漢具四義蜀選其二可謂不衆乎然巴郡􅇧君安以儒學典雅稱於孝咸蜀郡張俊筞問尹方不出五經常議犍為呂孟有託孤之節若兹之𩔖郡邑徃徃垂象刋銘見有苖裔璩晩生長亂故老以沒莫所咨質不詳其事但依漢書國志陳君所載凡士女二百四十八人而已後賢二十人合二百六十八人以示來世之好事者如能詳其遺脱及有可書願附於左其傳志父祖子孫及有名失事失官位者不列寜州人士亦不列别為目録至晉元康末凡三百九十二人也華陽國志卷十下}
