  - {type: variant, offset: 6411, length: 0, content: '', SBCK: 将軍幕府爲尚書郎除錫令亦有爲作傳者登少以公亮義烈聞郡命功曹州辟主簿别駕從事領隂平太守郡五官素大姓豪擅侵凌羗晉登誅之郡中皆肅後以李特作亂本郡没冦父爲李雄巴西太守馬脱􅀁殺乃東詣鎭南劉公請兵時中原亂守公三年不能得兵表拜楊烈}
