  - {type: variant, offset: 1142, length: 0, content: '', WYG: 洛加貟外散騎常侍封闗内侯每凖正三州人物品格褒貶帥意方䂓無復疏親莫不畏敬然委曲者多恨其䋲墨數辭諸郡意在河秦汝潁乆之朝議欲以為荆州永嘉六年與子并沒于胡冦立時漢國吕毅叔偉徳以清彦辟别舉秀才尚書郎秦國内史長水校尉員外常侍梁州都督與立同沒胡冦常騫字季慎蜀郡江原人也祖父竺字代文南廣太守侍中父偉字公然閬中令騫治毛詩三禮以清尚知名州辟部從事主簿郡請功曹察孝㢘萍鄉令以選為國王侍郎出為綿竹令國王歸之復入為郎中令從王起義有功封闗内侯遷魏郡太守加材官將軍以晉政衰覩中原不靜固辭去官拜新都内史時蜀亂民皆流在荆湘徙湘東太守疾病未拜卒年六十八騫性泛愛敦敬友宗族當官修理恕以撫物好咨問動必謙讓州鄉以為儀範二州清官見述者先有宜都太守犍為唐定義業隴西太守巴西馮仚休翊而後騫云常寛字泰恭騫族弟郫令朂弟子也父廓字敬業以明經}
