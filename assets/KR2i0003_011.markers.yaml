  - {type: variant, offset: 994, length: 248, content: 也初臨巴郡進賢達士舉孝子嚴永隱士黃錯及張璊陳髦民為立祠徙任右扶風政教嚴明帝舅車騎將軍閻顯大將軍竇憲中常侍江京等囑託輒拒之白鹿見象不以為祥徙魯相又徙汝南守舉陳蕃為功曹應嗣司隸校尉號知人之鑑叔宰濟濟以禮進退馮顥字叔宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞叔雅初為謁者威儀濟濟為成都令遷越巂太守所在著稱為梁冀所不善冀風州追之隱居作易章句及刺奢說脩黃老恬然終日大匠奇暢妙監玄察盡言規世祇以隕越翟酺字子超雒人也少事段翳以明天官為侍中尚書常見太史令孫懿歔欷涕泣曰圖書有賊臣孫登將以才智為黃門所害君表相應之, SBCK: 殄扵}
