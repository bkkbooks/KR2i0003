  - {type: variant, offset: 247, length: 60, content: 處地金銀琥珀犀象翠羽出作此官者皆富及十世純獨清廉毫毛不犯夷漢歌嘆表聞三司及京師貴重多薦美之明帝嘉之乃改西部為永昌郡以純為, krp: 建寜興古}
  - {type: variant, offset: 250, length: 7, content: 銀琥珀犀象翠羽, WYG: 吾熈治毛詩京易博通五經事親至孝居喪毁瘠為州郷所稱察孝廉除南鄭令以病去官復授南鄭不就轉梓潼令為政清浄辭疾告歸勤農力穡居室致給循訓闔門内則可法博愛以謙㳟接物開門待賔傾懐下士客無長幼必有供饍清談遊講不妄失言祗慎著聞太康中除越嶲䕶軍非其雅好不往徵給事中熈以侍臣日月左右贊暉揚光不可茍私終以疾辭而蜀郡令毎至官為之脩謁嵗致羊酒即家拜朱提太守固讓不之官好述作詩誄論難皆燦􅃩年六十九卒於家子蕃字憲祖察孝廉新都令西夷司馬涪陵太守蕃子廸字叔孤少與巴西龔壯俱知名而學業優之早殁熈同時犍為楊彭敬宗弟逵訓宗各以德行稱同察孝廉彭比蘇令甘露降其縣逵滇池令殊俗懐其德王長文字德雋廣漢郪人也父顒字伯元犍為太守長文天姿聡警髙暢敏識治五經博綜羣籍弱冠州三辟書佐丁時衰託疾歸家大同後郡功曹察孝廉不就遂陽愚嘗著絳衣絳㡌牽猪過市中乞人與語偽不聞常騎牛周旋郡守初至詣門脩敬至閭走}
