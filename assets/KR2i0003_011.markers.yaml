  - {type: variant, offset: 6413, length: 16, content: 梁冀累辟終不詣冀辟書不絕後冀自殺, SBCK: 梓潼内史}
  - {type: variant, offset: 6413, length: 848, content: 梁冀累辟終不詣冀辟書不絕後冀自殺使者監守不使人弔問敦獨往弔祭訖自拘有司天子赦之叔通敦孝石生江氾隗相字叔通僰道人也養母至孝母食欲江中正流水相冬夏汲之一朝有橫石生正流中哀帝世為孝廉平帝時為郎吳生致養亦感靈祉吳順字叔和僰道人也事母至孝赤烏巢其門甘露降其戶察孝廉永昌太守劉后初載實多良才季休忠亮經事能治楊洪字季休武陽人也先主領牧為部蜀從事及征漢中丞相亮表為蜀郡太守先主疾病永安召亮東行漢嘉太守黃元反後主用其計克元封關內侯後為忠節將軍越騎校尉忠清公亮亮甚信任之德山耽學道以光時伍梁字德山南安人也儒學雅尚州牧諸葛亮選迎為功曹遷五官中郎將烈武作合度曠塗夷惜哉公舉帥直陵遲費詩字公舉南安人也先主領牧為前部司馬群臣勸先主稱尊號詩上疏曰殿下以曹操父子逼主篡盜故乃羈旅萬里糾合士眾將以討賊今大敵未剋而先自立恐人心疑惑昔高祖獲子嬰猶尚推讓況未出門便欲自立耶以是左遷部永昌從事建興三年從丞相亮南征魏將李鴻來降說魏新城太守孟達欲背魏向蜀亮方北圖欲招達為外援欲與書詩進曰孟達小子昔事振威不忠後事先帝背叛反覆之人何足與書也亮嘿然詩終劉氏之世官位不盡其才君子以昭烈之弘曠武侯之明達詩吐直言猶尚淩遲況庸主昏世率意直言而望肆效者哉文然𥳑略言不詭隨楊羲字文然武陽人也輔漢將軍張裔薦為丞相亮主簿大司馬蔣琬辟東曹掾歷二郡太守為射聲校尉性𥳑略未曾以甘言加人酒後言笑多慢詞失大將軍姜維意為維所廢延熙四年作季漢輔臣讚在蜀書車騎怏怏與國安危張翼字伯恭文紀曾孫也以文武才幹歷征西鎮南大將軍封亭侯延熙十八年與衛將軍姜維西征大破魏雍州刺史王經於狄道經眾死洮水者數萬人維欲進翼諫不可必進無功為蛇畫足時維屢出隴西翼常廷爭以為國小不宜黷武不聽不得已每怏怏從行景耀二年遷左車騎將軍領冀州刺史蜀平後死猗猗眾偉芳烈名垂方德繹勳犍之瓊瑰總讚此二十一人也述犍為人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博妻也博後母文有母儀之德進楊則其教為行閨門雍穆䍧柯太守李褘家亦假係每不知嘆恨徒富貴學問不及博家也陽姬請父厥族蒙援克諧內愛訓及秀彥姬武陽人也生自寒微父坐事閉獄楊渙始, WYG: 幕府}
