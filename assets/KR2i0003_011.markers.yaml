  - {type: 'tls:seg', offset: 2028, content: '', id: KR2i0003_CHANT_011-17a.17}
  - {type: variant, offset: 2028, length: 0, content: '', SBCK: 良少與犍爲張徵費緝竝知名治春秋三傳貫通五經澡身貞素州從事散􅀐黄門侍郎大同郡主簿上計吏察孝不就州辟主簿治中别駕舉才行刺史皇甫晏貢之三司遂辟太宰除覇城令始平太守治政著稱從扶風轉秦國内史文立卒後温令李宓表武帝言二州人士零頽才彦凌遲無復厠豫綱紀後進慰寧遐外者良公朝在時二州之望宐見超子紹繼立後帝徵爲黄門侍郎兼二州都給事中梁州刺史遷散􅀐常侍大長秋卒葬洛北芒山徵字建興張翼子也篤志好學官至廣漢太守緝字文平清檢有治幹舉秀才歷城令涪陵太守遷譙内史良公朝疑誤何攀字恵興蜀郡郫人漢司空汎鄊侯武弟潁川太守顯後也父包字休楊察舉孝秀皆不行除瑯琊王中尉不就攀兄弟五人皆知名攀少夙成竒姿卓逸弱冠郡主簿上計吏州辟從事刺史王晏稱攀王佐才也以爲主簿泰始十年飬母歸家晏爲牙門張弘等􅀁害攀操表詣洛訟釋事得清刺史王濬復辟主簿别駕咸寜三年濬被詔罷屯田兵作船爲伐吳調攀進曰今見佃兵但六百人計作船六七年財可勝萬人後者未成前者已腐無以輔成國意宐輙召四守休兵及諸武吏并萬餘人造作嵗終可辦濬及綱紀疑輙召萬兵欲先上須報攀曰官家雖欲伐呉疑者尚多卒聞召萬兵必不見􅃪以佃兵作船船不時成當輒召以速爲機設當見却功夫已成勢不得止濬之議欲入山裁船動數百里艱難攀曰今冡墓多種松栢當什四市􅂑以速爲機濬悦之任攀典舟船器仗冬遣攀使洛攀曰聖人之功可成使人信之不可必也夫髙祖之大略猶未察扵韓信婁敬因蕭何子房而後用之今建非常之功或莫之信羊公使君同􅉀國家􅀁重加曩日失䇿江陵思有夙駕宐與相聞此一助也濬曰何但芉􅅩子亦宋元亮之憂君至洛官家未有舉意便前襄陽與芉宋論之攀既至洛拜表獻䇿因至荆州與刺史宋􅒉論宋未許乃見芉祜累日共畫用兵之要攀曰若令循清海以趣京下壽春揚州直指秣陵兖豫踰海竝據桑浦則武昌以東㑹稽以西騷然駭矣荆州平南徑造夏口巴東諸軍固守西陵益梁之衆乘浮江東下封樂郷要巴丘則武陵零桂長沙湘東從風而靡矣但眀信賞首尾俱㑹旌旗耀天四面雲合乘機席卷傳檄南極呉㑹不盡平者未之有也羊祜大悦遂表請伐吳㝷徴濬大司農至晉壽詔以濬爲龍驤􅀅軍除攀郎中參濬軍事攀頻奉使詣洛時未婚司空裴公竒其才以女妻之五年秋攀使在洛安東􅀅軍王渾表孫皓欲北上􅁁戍警戒朝議征却須六年攀上䟽䇿皓必不敢出宐因今戒嚴掩取甚易中書令張華命宿下舍設諸難攀皆通之}
