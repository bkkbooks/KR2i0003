  - {type: variant, offset: 1590, length: 355, content: 議郎而霸郃皓禪皆至公卿兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如楊雄之才明帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諫大夫樂安相後與劉珍共撰漢紀孫充有文才勝為東觀郎著賦誄論頌數十篇憲父懸車王稚字叔起堂幼子也屢拒孝廉公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人錄其本行謚曰憲父癸未詔書以安車騁請會已亡徵君肥遯馮信字季誠郪人也郡三察孝廉州舉茂才公府十辟公車再徵不詣公孫述時託目青盲侍婢姦其前陽不覺述卒以年老不出董任循志束帛戔戔董扶字茂安任安字定祖緜竹人也家居教授弟子自遠而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道為侍中觀漢將亂求為屬國還蜀安察孝及茂才公府辟公車徵皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表氾博提攜士彥王商字文表郪人也博學多聞州牧劉璋辟為治中試守, SBCK: ''}
