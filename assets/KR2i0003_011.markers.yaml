  - {type: variant, offset: 31, length: 0, content: '', WYG: 雒令大同後刺史邵坐治城被徵忌詣洛陳訴逺國初附君民始結不冝改易又表修治城池居安思危邊將常職事皆中情晉文帝時為相國辟忌舎人武帝踐祚拜騎都尉除河内令州名為難治忌挫折豪勢風教大行縣有姦嫂殺兄者羣黨蔽匿前令莫得忌皆窮治入為州都方議為郡守㑹卒忌為人信道任數不從下人故為貴勢所不善是以作詩著論先攻己短臨喪與樂歡哀俱至為士𩔖所稱忌友人廣漢段宗仲亦有學行蜀時官與忌比袁邵為主簿與忌共理郡事文帝善之梁州辟别駕從事舉秀才稍遷官至雲南建寜太守何隨字季業蜀郡郫人也漢司空武後世有名德徵聘入官隨治韓詩歐陽尚書研精文緯通星厯郡命功曹州辟從事光禄郎中主事除安漢令蜀亡去官時巴土飢荒所在無榖送吏行乏輒取道側民芋隨以綿繫其處使足所取直民視芋見綿相語曰聞何安漢清廉行過從者無糧必能爾耳持綿追還之終不受因為語曰安漢吏取糧令為之償察孝廉大同後臺召不詣除河間王郎中令不就居貧固儉衣弊蔬食晝躬耕耨夕修講諷郷族饋及禮厚皆不納目不視色口不語利著譚言十篇論道德仁讓嘗有屠牽猪過隨門猪索斷失之强認溷中猪隨便牽猪與之屠人出門㝷得其所亡猪謝隨還猪遂以乞之有家養竹園人盗其筍隨偶行見之恐盗者覺怖走竹中傷其手足挈屐徐歩而歸其仁如此太康中即家拜江陽太守民思其政年七十一卒官後州郷人言議平當者皆相謂何江陽至于汶山夷有正直廉讓者亦號夷中何江陽杜景文何興仁皆為作傳長子觀字巨忠清公淑慎知名州里察孝廉西都南安令平西長史張昌作亂荆州從黨西上郡守無不望風降下至江陽平西將軍羅尚表為安逺護軍討賊平殄除巴郡太守朝議欲以為寜州刺史㑹病卒次子遊治中從事隨時同郡繁令張崇清亷推譲見稱當時王化字伯逺廣漢郪人也漢將作大匠王堂後也祖父商字文表州牧劉璋時為蜀太守有懿德髙名在耆舊傳父彭字仲巴郡太守化兄弟四人少有令望化治毛詩三禮春秋公羊傳郡命功曹州辟從事光禄郎中主事尚書郎除閬中令為政清靜察孝廉大同後復端右郡察孝廉為樂涫令縣近邊塞値外虜反化率吏民積榖堅守虜斷道重圍孤絶七年伺虜怠惰出軍討之民得野掠大軍至虜退以功封關内侯遷朱提太守撫和殊俗得夷晉懽心轉在梓潼復有稱績為人嚴重言論方雅臧否允衷州里服其誠亮年七十二卒官弟振字仲逺亦有德望廣都令巴東太守叔弟岱字季逺恪居官次歴廣陽作唐令早亡少弟崇字㓜逺學淵􅀶雅性洪粹蜀時東觀郎大同後梁州辟别駕别舉秀才尚書郎與壽良李宓陳壽李驤杜烈同入京洛為二州標雋五子情好未必能終惟崇獨以寛和無所彼此著蜀書及詩賦之屬數十篇其書與陳壽頗不同官至上庸蜀郡太守陳壽字承祚巴西安漢}
