  - {type: variant, offset: 3693, length: 1807, content: 丞相亮領益州牧選為別駕中郎將吳使張溫將反命亮率百官餞之溫與宓語荅問若嚮應聲辭義雅美溫大敬服以為蜀之有宓猶魯有仲尼也遷長水校尉司農宓甚有通理弟子譙周具傳其業李王四子並作琳瑯李朝字偉南弟邵字永南郪人也王士字義強從弟甫字國山文表諸弟也先主領牧朝為別駕群下上先主為漢中王其文朝所造也後丞相亮府辟西曹掾亦有文才兄弟三人號三龍士歷宕渠犍為益州太守甫善言議人流美稱自緜竹令為州右職優遊容與特進太常鐔承字公文郪人也歷郡守州右職為少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諫君刎首王累新都人也州牧璋從別駕張松計遣法正迎先主主簿黃權諫不納累為從事以諫不入乃自刎州門以明不可鄭度進規忠謀莫受雖云天時抑由人咎度緜竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野穀是資急驅巴西梓潼民由涪水以南一切燒除野穀固壘待之彼請戰不許久無所資不過百日必當面縛先主聞而惡之璋不納言雖在天亦由璋之愚永年負才自喪世主彭羕字永年廣漢人有俊才劉璋時坐事為徒及先主入自託龐統為州右職失先主意左遷江陽太守羕望諸葛亮以為心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時為牛鞞長先主領牧為從事正旦命行酒得進見讓先主曰振威以將軍宗室肺腑委以討賊元功未效先寇而滅邈以將軍之取鄙州甚為不宜也先主曰知其不宜何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮為請得免久之為犍為太守丞相參軍安漢將軍建興六年亮西征馬謖在前敗績亮將殺之邈諫以秦赦孟明用霸西戎楚誅子玉二世不競失亮意還蜀十二年亮卒後主素服發哀三日邈上疏曰呂祿霍禹未必懷反叛之心孝宣不好為殺臣之君直以臣懼其偪主畏其威故姦萌生亮身杖強兵狼顧虎視五大不在邊臣常危之今亮殞歿蓋宗族得全西戎靜息大小為慶後主怒下獄誅之詵詵彥造或哲或友昭德音芳垂名厥後總讚此四十六人也述廣漢人士任母治內子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每為賑䘏其弟子以慰勉其志於是安之門生益盈門龐行養姑婦師之先龐行姜詩妻也事姑晝夜紡績以給供養子汲江溺水死祕言遣詣學常作冬夏衣投水中託言寄與子詩呼妻使為姑舂應命遲見遣不敢遠去遊於外供給因鄰母致姑姑勑還依依義舊抗疏拜庭誠感世主徙女輟刑義舊狄道長姜穆女緜竹司馬雅妻也既許婚父坐事徙朔方雅就婚死雇人送其喪尋父母死朔方義舊獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女子許嫁不得從父母徙紀配斷指以章厥貞紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡以己有美色慮人求己作詩三章自誓心而求者猶眾父母將許乃斷指明情養子猛終義太守薛鴻圖象府庭彭王進娥殘體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡叔父欲改嫁非乃詣太守五方截髮自誓敬亦早亡和養孤守義蜀郡何玉因媒介求之兄曉喻以公族可憑和恚割其一耳季宰亦早亡父母欲改嫁進娥亦翦髮自誓各養子終義正流自沈玉潔冰清正流廣漢李元女楊文妻也適文有一男一女而文沒以織履為業父欲改嫁乃自沈水中宗族捄之幾死得免太守五方為之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親過哀死福哀感終身父母欲改嫁乃自殺汝氏世冑由婦謙柔汝敦妻某敦兄弟共居有父母時財物嫂心欲得之妻勸送與兄敦盡讓田宅奴婢與兄自出別居後敦耕田得金一器妻復勸送與兄夫妻共往嫂性恡嗇謂欲借貸甚不悅及見金踊躍兄感悟即出妻讓財還弟弟又不受相讓積年後並察孝廉世為冠族思媚列媛美稱惟休總讚十一人也述廣漢列女右廣漢郡士女讚第三凡五十七人犍為士女王延河平纂禹之功王延世字長叔資中人也建始五年河決東郡氾濫兗豫四郡三十二縣沒官民屋舍四萬所御史大夫尹忠以不憂職致河決自煞漢史案圍緯當有能循禹之功在犍河之資陽求之正得延世徵拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平封延世關內侯拜光祿大夫仍賜黃金百斤文伯習禮繼武孫通董鈞字文伯資中人也少受業於鴻臚王臨永平初議天地宗廟郊祀儀禮鈞與太常定其制又定諸侯王喪禮歷城門校尉五官中郎將以儒學貴稱繼叔孫通張公執憲克智克聰極位青紫實作司空張皓字叔明武陽人也以文聰明辟大將軍掾遷尚書僕射彭城相進隱士閭丘遷等徵拜廷尉延光三年安帝將廢太子為濟陰王皓與太常桓焉太僕來歷爭之安帝不許及安帝崩濟陰得立為順帝以皓為司空久之免復徵為廷尉清河趙騰坐謗訕當誅所引八十餘人皓以聖賢明義爭之咸稱平當子鸞司京桴鼓不鳴趙旂字子鸞資中人也初臨甘陵弘農郡甚善治民徵尚書遷司隸校尉時, SBCK: ''}
