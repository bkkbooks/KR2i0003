  - {type: variant, offset: 2544, length: 221, content: 縣以畀忳後乘馬到雒縣馬牽忳入他舍主人問忳所由得馬忳具說其狀并及繡被主人悵然曰卿何陰德而致此忳說昔埋書生事主人驚曰是我子也姓金名彥卿乃葬之不報天彰卿德辟舉茂才除郿令宿斄亭中數有人為鬼所煞忳上樓夜半有女子稱冤曰妾涪令妻也當之官宿此枉為亭長所煞大小二十口埋在樓下奪取財物忳曰汝何故以恆殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召遊徼詰問具服即收同謀十餘人煞之送涪令喪還鄉里當世稱之仲魚謙沖羊朞字仲魚郪人也父為, SBCK: 斬吳}
