  - {type: variant, offset: 3056, length: 243, content: 孟宗緜竹人誦書百萬言兄事翟酺酺免後尚書令與司隸校尉枉劾之復徵詣獄真上章救之受掠笞六百獄中明酺無事京師壯之以漢道微散財施宗族不應公府辟命及辟長吏候迎每交於門乃斷髮以自絕味道好施清風邁倫讚仲魚以下也漢儒請雨精感慶雲諒輔字漢儒新都人為郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰二日不雨則欲自焚為貪叨吏謝罪百姓言終暴雨韓揆義烈韓揆字伯彥竹人也為令錡裒主簿值黃巾賊入界扶裒走入草中裒遣求隱翳處未還裒為賊所得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而苟自活非忠乃自煞喬雲勇震左喬雲緜竹人也, SBCK: 彦紹}
