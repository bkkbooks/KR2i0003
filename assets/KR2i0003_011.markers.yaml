  - {type: variant, offset: 1229, length: 89, content: 以才智為黃門所害君表相應之是以悽愴後為京兆尹光祿大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之閒薦故太尉龐參故司徒李郃明通三才忠正可以輔世所言每指刺疾權貴誣酺及尚書令高堂芝, WYG: 喪去官湘州叛亂乃南入}
