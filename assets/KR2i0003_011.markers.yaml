  - {type: variant, offset: 5997, length: 204, content: 平憲王為驃騎將軍辟西曹掾後罷為王師在驃騎府者遣之數年乃去數應三公徵撫侍送故公作詩通議說弟子南陽馮良亦以道學徵聘君橋密精趙松字君橋武陽人為童子數資問費貽及知其避世密與周旋終不露之也述平舉茂才為上黨太守英英四子利於居貞讚費貽以下皇漢弛綱官人失紀文紀謇諤表明臧否張綱字文紀司空皓子也在漢朝公平廉正權宦側目憚之漢安元年以光祿大夫持節與侍中杜喬等循行州郡考察風俗出宮埋車先奏太尉桓焉司徒劉壽尸祿素餐不堪其職出城又奏司隸, SBCK: 羗}
