  - {type: variant, offset: 318, length: 1, content: 觀, SBCK: 􅀅軍胡羆與皇甫士安深善之又與士安論夷齊及司馬文中杜起宗郄令先文廣休等議論徃返言經訓詁衆人服其理趣􅇚河内趙子聲譏詩賦之屬二十餘篇壽良李驤與陳承祚相長短宓公議其得失而切責之常言吾獨立扵丗顧景爲疇而不懼者心無彼此扵人也故宓六子皆英挺秀逸號曰六龍長子賜字宗碩州别駕舉秀才汶山太守少與東海王司馬元超友昵毎書詩徃返雅有新聲少子興字雋碩太傅參軍㓜子盛碩寜浦太守宓同時蜀郡髙玩字伯珍少受學扵太常杜瓊術藝微妙博聞強識清尚簡素少與宓齊名官位相比大同後察孝㢘除曲隅令單車之縣移檄縣綱紀不使遣迎以眀}
