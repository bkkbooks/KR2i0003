  - {type: variant, offset: 874, length: 1, content: 部, WYG: 皇甫晏誣表晏反毅白濬曰皇甫侯起自諸生位極方州又當何求且廣漢與成都宻邇而統梁州者矜益州之領須防若今日也益州有禍乃此郡之憂加張𢎞小竪衆所不與宜時赴討濬欲先上後行毅曰大夫出疆茍利社稷專之為賢何况殺主賊急當不拘常宜濬從之發兵與牙門滿泰等共討𢎞斬之詔書遷濬益州刺史毅復為州主簿别駕舉秀才及濬伐吳與何攀並為參軍吳平封闗内侯除隴西護軍以疾去官徙繁令遷雲南太守濬臨薨上表後武帝思濬勲問毅所在徙犍為使持節南夷校尉乆之犍為民毛詵李叡與朱提民李孟共逐太守杜俊雍約以叛衆數萬毅討破之斬詵孟首叡走依五荼夷亦叛晉朝復置寜州以毅為刺史加龍驤將軍封成都縣侯夷遂大反破沒郡縣攻圍州城}
