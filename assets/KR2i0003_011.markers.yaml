  - {type: variant, offset: 2061, length: 0, content: '', SBCK: 祖父朝字愇南州别駕從事父旦字欽宗光禄郎中主事毅少散逹不治素檢年二十餘乃詣郡文學受業通詩礼訓詁爲學主事太守弘農王濬臨學講試問祭酒􅁎􅃩曰學中有可成進㡬百人艶對曰可有百人濬怒曰童冠八百而成者百人教少何爲毅對曰如艶之言眀府之教盛扵孔氏不爲少也濬竒之命爲主簿濬嘗夢得三口刀云人以禾益之手持不得以問郡丞與掾史莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾􅅖失者秩字眀府秩當至孟州濬笑曰如卿言當相以爲秀才張弘殺益州刺史皇甫晏誣表晏反毅白濬曰皇甫侯起自諸生位極方州又當何求且廣漢與成都宻爾而統梁州者衿益州之領須防若今日也益州有􅍔乃此郡之憂加張弘小竪衆􅀁不與宐時赴討濬欲先上後行毅曰大夫}
  - {type: page-break, offset: 2061, content: '', id: KR2i0003_SBCK_011-19a}
  - {type: variant, offset: 2061, length: 0, content: '', krp: 祖父朝字愇南州别駕從事父旦字欽宗光禄郎中主事毅少散逹不治素檢年二十餘乃詣郡文學受業通詩礼訓詁爲學主事太守弘農王濬臨學講試問祭酒姬豔曰學中有可成進㡬百人艶對曰可有百人濬怒曰童冠八百而成者百人教少何爲毅對曰如艶之言眀府之教盛扵孔氏不爲少也濬竒之命爲主簿濬嘗夢得三口刀云人以禾益之手持不得以問郡丞與掾史莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾傍失者秩字眀府秩當至孟州濬笑曰如卿言當相以爲秀才張弘殺益州刺史皇甫晏誣表晏反毅白濬曰皇甫侯起自諸生位極方州又當何求且廣漢與成都宻爾而統梁州者衿益州之領須防若今日也益州有􅍔乃此郡之憂加張弘小竪衆所不與宐時赴討濬欲先上後行毅曰大夫}
  - {type: variant, offset: 2062, length: 0, content: '', SBCK: 疆苟利社稷専之爲賢何兄殺主賊急當不拘常宐濬從之發兵與牙門滿泰等共討弘斬之詔書遷濬益州刺史毅復爲州主簿别駕舉秀才及濬伐呉與何攀竝爲參軍呉平封闗内侯除隴西護軍以疾去官徙繁令遷雲南太守濬臨薨上表後武帝思濬勲問毅􅀁在徙犍爲使持節南夷校尉久之犍爲民毛詵李叡與朱提民李孟共逐太守杜俊雍約以叛衆數萬毅討破之斬詵孟首叡走依五荼夷亦叛晉朝復置寜州以毅爲刺史加龍驤􅀅軍封成都縣侯夷遂大反破沒郡縣攻圍州城中原亂而李雄冦蜀救援不至疾病薨扵窮城懐帝嘉其忠節追贈少府謚曰威侯毅性通博居情雅厚賑䘏寒貧篤扵故􅃇人咸歸之但好談調德重猶少從弟苾字􅅩平少修身砥厲名行數諌毅宐}
  - {type: page-break, offset: 2062, content: '', id: KR2i0003_SBCK_011-19b}
