  - {type: variant, offset: 247, length: 60, content: 處地金銀琥珀犀象翠羽出作此官者皆富及十世純獨清廉毫毛不犯夷漢歌嘆表聞三司及京師貴重多薦美之明帝嘉之乃改西部為永昌郡以純為, SBCK: 建寜興古}
  - {type: variant, offset: 247, length: 2, content: 處地, WYG: 建寜興古太守皆辭章燦麗馳名當世凡壽所述作二百餘篇符莅階各數十篇二州先逹及華夏文士多為作傳大較如此時梓潼李驤叔龍亦雋逸器知名當世舉秀才尚書郎拜建平太守以疾辭不就意在州里除廣漢太守初與夀齊望又相昵友後與夀情好擕隟還相誣攻有識以是短之亦自别傳李宓字令伯犍為武陽人也祖父光朱提太守父早亡母何更行見養祖母治春秋左傳􅀶覽五經多所通渉機警辯捷辭義響起事祖母以孝聞其侍疾則泣涕側息日夜不解帶饍飲湯藥必過目嘗口本郡禮命不應州辟從事尚書郎大將軍主簿太子洗馬奉使聘吳吳主問蜀馬多少對曰官用有餘民間自足矣吳主與羣臣汎論道義謂寜為人弟宓曰願為人兄吳主及羣臣稱之大同後征西將軍鄧艾聞其名請為主簿及書招欲與相見皆不往以祖母年老心在色養拒州郡之命獨講學立旌授生武帝立太子徵為洗馬詔書累下郡縣相逼宓上疏疏在本傳武帝覽之曰宓不空有名也嘉其誠欵賜奴婢二人下郡縣供其祖母奉饍徙尚書郎河内溫令敷德陳敎政化嚴明太傅鉅平侯羊公薨無子帝令宗子為世子嗣之不時赴喪宓遣户曹齎移推轂遣之中山諸王毎過溫縣必責求供給吏民患之宓至中山王過縣徵芻茭薪蒸宓引髙祖過沛賔老幼桑梓之供一無煩費伏惟明王孝思惟則動識先戒本國望風式歌且舞誅求煩碎所未聞命後諸王過不敢煩溫縣盗賊發河内餘縣不敢近溫追賊者不敢經界隴西王司馬子舒深敬友之而貴家憚其公直宓去官為州大中正性方亮不曲意勢位者失荀張指左遷漢中太守諸王多以為寃一年去官年六十四卒著述理論論中和仁義儒學道化之事凡十篇安東將軍胡羆與皇甫士安深善之又與士安論夷齊及司馬文中杜起宗郄令先文廣休等議論往返言經訓詁衆人服其理趣釋河内趙子聲譏詩賦之屬二十餘篇壽良李驤與陳承祚相長短宓公議其得失而切責之常言吾獨立於世顧景為疇而不懼者心無彼此於人也故宓六子皆英挺秀逸號曰六龍長子賜字宗碩州别駕舉秀才汶山太守少與東海王司馬元超友昵毎書詩往返雅有新聲少子興字雋雄太傅參軍幼子盛碩寜浦太守宓同時蜀郡髙玩字伯珍少受學於太常杜瓊術藝㣲妙愽聞强識清尚簡素少與宓齊名官位相比大同後察孝廉除曲陽令單車之縣移檄縣綱紀不使遣迎以明三材徵為太史令送者亦不出界朝廷稱之方論大用㑹卒杜軫字超宗蜀郡成都人也父雄字伯休安漢雒令軫少師譙周發明髙經於譙氏之門郡命為功曹鄧艾既破蜀被徵鍾㑹進成都時太守南陽張府君不肯出官軫進曰征西囚執鎭西在近必有所遣軍亂之際交害無常宜避正殿府君即出住下舎會果遣參軍牽𢎞為太守數百騎擐甲馳馬入郡前駈問侯所在云已出善之𢎞復召為功曹察孝廉除建寜令徙仕山陽新城池陽所在有治入為尚書郎毎升降趍翔廊閣之下威容可觀中朝偉之遷犍為太守惠愛在民還為州大中正軫既才學兼該而器量倜儻武帝雅識之方用内侍㑹卒時年五十八弟烈字仲武貞幹敏識平坦和粹名譽侔軫察孝廉歴平康牛鞞南鄭安陽令王國建首選為郎中令選衡陽太守兄軫喪自上求去官以兄子幼弱軫喪飄颻欲扶將靈柩葬舊墳武帝歎惜軫能用未盡而嘉烈弟意轉拜徙官犍為太守又轉湘東少弟良字幼倫亦有當世局分舉秀才荼陵新都令國王郎中令遷涪陵建寜太守兄弟並興州里以為美譚軫二子長子毗字長基少子秀字彦頴珪璋琬琰世號二鳯毗舉秀才大將軍辟掾太傅參軍平東長史尚書郎稍遷鎭南軍司益州刺史主簿早卒任熈字伯逺蜀郡成都人也漢大司農任方後也世有德彦父元字秀明犍為太守執}
