  - {type: variant, offset: 5815, length: 181, content: 奉君遯世費貽字奉君南安人也公孫述時漆身為厲佯狂避世述破為合浦守蜀中歌之曰節義至仁費奉君不仕亂世避惡君脩身於蜀紀名交趾後世為大族任公開明任永字君業僰道人也長歷數王莽時託青盲公孫述時累徵不詣子溺井中死見而不言妻淫於前面而不怪述平乃曰世適平目即清妻自煞光武徵之以年老不詣卒叔和順終杜撫字叔和資中人也少師事薛漢治五經教授門生千人太守王卿召為功曹司徒辟不詣及聞公免必往承問, SBCK: 夀良與}
