  - {type: variant, offset: 7104, length: 181, content: 已每怏怏從行景耀二年遷左車騎將軍領冀州刺史蜀平後死猗猗眾偉芳烈名垂方德繹勳犍之瓊瑰總讚此二十一人也述犍為人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博妻也博後母文有母儀之德進楊則其教為行閨門雍穆䍧柯太守李褘家亦假係每不知嘆恨徒富貴學問不及博家也陽姬請父厥族蒙援克諧內愛訓及秀彥姬武陽人也生自寒微父坐事閉獄楊渙始為尚書郎告歸郡縣敬重之姬為處女乃邀道扣渙馬訟父罪, SBCK: 輿登致雄}
