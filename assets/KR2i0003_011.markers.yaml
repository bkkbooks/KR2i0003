  - {type: variant, offset: 2169, length: 259, content: 少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彥之章渤海紀叔陽遂明天文二卷東平虞叔雅學絕高當世遂遊於蜀恭以朋友禮待之後為上計掾會有司劾太尉龐參兼舉茂才孝廉參性忠正亮直為貴戚所擯以恚發病遠近稱冤恭不能耐其枉亢疏表參忠直不當以讒佞傷毀忠正帝悟即日召西曹掾問疾尋羊酒慰勞參忠士遊孝淳感物悟神姜詩字士遊雒人也事母至孝母欲江水及鯉魚膾又不能獨食須鄰母共之詩常供備子汲江溺死祕言遣學不使母知於是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比鄰公孫述平後東精為賊掠害不敢入詩里時大荒飢精致米肉與詩詩埋之永平三年, WYG: 仲父熈}
