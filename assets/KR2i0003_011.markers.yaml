  - {type: variant, offset: 1243, length: 346, content: 以悽愴後為京兆尹光祿大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之閒薦故太尉龐參故司徒李郃明通三才忠正可以輔世所言每指刺疾權貴誣酺及尚書令高堂芝交搆免死著援神契經說卒家司隸聰敏奮名後葉郭賀字喬卿雒人也初為太守黃幸戶曹幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽留詔殺之由是顯名太守蔡茂命為主簿茂夢坐大殿極上得嘉禾三穗以問賀對曰明府位當至三公旬月茂遷司徒表賀明律令稍遷侍中尚書僕射司隸校尉荊州刺史百姓歌之曰厥德仁明郭喬卿明帝南巡狩善其治賜三公服去襜露冕使百姓見之以彰有德徵河南尹卒天子痛惜賜錢三十萬鐔蔡翩翩交友惟賢鐔顯字子誦郪人也蔡弓字子騫雒人也俱攜手共學冬則侍親春行受業與張霸李郃張皓陳禪為友共師司徒魯恭顯又與王稚子同見察孝於太守陳司空歷豫州刺史光祿大夫侍中衛尉弓為廬江太守徵, SBCK: 矣}
