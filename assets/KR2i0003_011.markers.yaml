  - {type: variant, offset: 7831, length: 3, content: 郡弓楊, SBCK: 西黄龕涪陵太守巴西趙弼永昌謝俊牂柯文猛皆區區稽顙無如馥者數年卒譔曰文王多士才不同用孔門七十科揆百行􅊋塗貴扵一􅃱若斯諸子或挺珪璋之質或苞瑚璉之器或躭儒墨之業或韜王佐之略潛則􅅺蟠躍則龍飛揮翮揚芳流光遐紀實西土之􅈿彦聖晉之多士也徒以生処限外服膺日淺􅀒荷榮顯未充其能假使植榦華宇振條神區徳行自有長短然三趙兩李張何之軌其有及之者乎譙登侯馥忠䂓奮烈美志不遂}
