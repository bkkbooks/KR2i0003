  - {type: variant, offset: 818, length: 0, content: '', WYG: 下關者法據大辟攀駮之曰上關執信之主下關儲備之物設有開上關何以加刑遂減死多所議讞遷散騎侍郎太傅楊駿謀逆請衆官攀與侍中傅祗侍郎王愷等往惠帝從楚王瑋殿中中郎孟觀䇿戒嚴誅駿駿外己忩忩攀與祗踰墻得出侍天子天子以為翊軍校尉領熊渠兵一戰斬駿社稷用安封西城公邑萬户䇿曰於戲在昔先王光濟厥世罔不開國列土建德表功也故逆臣楊駿謀危社稷構兵飛矢集于殿庭白刄交於宫闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城為攀封國錫兹𤣥社苴以白茅永為晉藩輔往欽哉敬乃有土惠康黎元無或以隳爾顯烈又賞絹萬疋攀固辭受五千疋又賜拜弟逄平郷侯兄子夔關内侯遷宣城内史不就轉東羌校尉西虜冦邊遣長史楊威討之違攀指受失利徵還領越騎校尉㑹武庫災百官皆赴火攀獨以兵衛宫復賞絹五百疋領河南尹遷揚州刺史假節在官數年德敎敷宣征虜將軍石崇表東南有兵氣不宜用逺}
