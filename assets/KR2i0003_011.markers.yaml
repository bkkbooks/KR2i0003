  - {type: variant, offset: 816, length: 1, content: 知, WYG: 信之不可必也夫髙祖之大略猶未察於韓信婁敬因蕭何子房而後用之今建非常之功或莫之信羊公使君同盟國家所重加曩日失䇿江陵思有夙駕宜與相聞此一助也濬曰何但羊叔子亦宋元亮之憂君至洛官家未有舉意便前襄陽與羊宋論之攀既至洛拜表獻䇿因至荆州與刺史宋庭論宋未許乃見羊祜累日共畫用兵之要攀曰若令循清海以趣京口壽春揚州直指秣陵兖豫踰海並據桑浦則武昌以東㑹稽以西騷然駭矣荆州平南徑造夏口巴東諸軍固守西陵益梁之衆乘浮江東下封樂郷要巴丘則武陵零桂長沙湘東從風而靡矣但明信賞首尾俱㑹旌旗耀天四面雲合乘勝席卷傳檄南極吳㑹不盡平者未之有也羊祜大恱遂表請伐吳㝷徵濬大司農至晉壽詔以濬為龍驤將軍除攀郎中參濬軍事攀頻奉使詣洛時未婚司空裴公竒其才以女妻之五年秋攀使在洛安東將軍王渾表孫皓欲北上邊戍警戒朝議征却須六年攀上疏䇿皓必不敢出宜因今戒嚴掩取甚昜中書令張華命宿下舍設諸難攀皆通之又濬性在忠烈受命必果宜重其位號詔書遷濬平東將軍督二州事吳平封關内侯濬入拜輔國攀為司馬上論時務五篇除滎陽令進廷尉評有盗開城}
