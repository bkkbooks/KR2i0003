  - {type: variant, offset: 3, length: 0, content: '', krp: 一後賢志聞之善志者述而不作序事者實而不華是以史遷之記詳扵秦漢班生之書僃乎哀平皆以丗及事邇可得而言也西州自奉聖晉後俊瑋倜儻之士或脩德讓行止從時或播功立事羽儀上京策勲王府甄名史録侔扵先賢㑹遇䘮亂軋遘華夏顛墜典籍多缺族祖武平府君愍其若斯乃操簡援翰拾其遺闕然但言三蜀巴漢未列又務在舉善不必珍異揆之耆舊竹素宐闡今更撰次損益足銘後觀者凡二十人綴之斯篇雖行故墜没大較舉其一隅衞尉散騎常侍文立廣休散騎穆穆誠感聖君西河太守桞隱休然西河烈烈秉義居眞漢嘉太守司馬勝之興先漢嘉克讓謙德之倫郫令州主簿常勗修業郫君謇諤自固底身江陽太守何隨季業江陽皎皎命丗清湻梓潼太守王化伯逺梓潼矜矜在險能平太子中庶子陳壽承祚庻子稽古遷固竝聲漢中太守李宓令伯漢中韙曄才葢羣生犍爲太守杜軫起宗犍爲卬卬友于寔令給事中任熈伯逺給事温恭尚德蔑榮中書郎王長文德雋中書淵識寳道韜朙大長秋壽良文㳤長秋忠肅朙允篤誠大司農西城公何攀恵興司農運籌思侔良平少府成都侯威李毅允剛少府果壯文武是經衡陽内史楊邠岐之衡陽固節隱然不傾尚書三州都費立建熈尚書凖繩古之遺直湘東太守常騫季愼湘東汜􅋢仁以接物武平太守常寛泰恭武平亹亹氷清玉嶷楊烈將軍梓潼内史巴西譙登江陽太守江陽侯馥文立廣休巴郡臨江人也少逰蜀太學治毛詩三禮兼通羣書州刺史費褘命爲從事入爲尚書郎復辟褘大將軍東曺掾稍遷尚書蜀并于魏梁州建首爲别駕從事咸熈元年舉秀才除郎中晉武帝方欲懐納梁益引致雋彦泰始二年拜立濟隂太守武帝太子以司徒李胤爲太傅齊王驃爲少傅選立爲中庶子立上䟽曰伏惟皇太子春秋美茂盛德日新始建㓜志誕陟大繇猶朝日初暉良寳耀璞侍從之臣宐簡俊乂妙選賢彦使視觀則覩禮容棣棣之則聽納當受嘉話駭耳之言靜應道軌動有所采佐清初陽緝熈天光其任至重聖王詳擇誠非糞朽能可堪任臣聞之人臣之道量力受命其所不諧得以誠聞帝報曰古人稱與田蘇逰非舊德乎立上故蜀大官及盡忠死事者子孫雖仕郡國或有不才同之齊民為劇又上諸葛亮蒋琬費禕等子孫流徙中畿宐見叙用一則以慰巴蜀民之心其次傾東吳士人之望事皆施行十年詔曰太子中庶子立忠貞清實有思理器幹前在濟隂政事修朙後事東宫盡輔導之節昔光武平隴蜀皆收其才秀所以援濟殊方伸叙幽滯也其以立爲散騎常侍累辭不許上䟽曰臣子之心碩從䟽以求眤凡在人情貪從幽以致眀斯實物性賢愚所同臣者何人能無此懐誠自審量邊荒遺燼犬馬老甚非左右機納之噐臣雖至愚處之何顔詔曰常伯之職簡才而授何謙虗也立自内侍獻可替否多所補納甄致二州人士銓衡平當爲士彦所宗故蜀尚書犍爲程瓊雅有德望素與立至厚武帝聞其名以問立立對曰臣至知其人但年垂八十禀性謙退無復當時之望不以上聞耳瓊聞之曰廣休可謂不黨矣故吾善夫人也西界獻馬帝問立馬何如對曰乞問太僕帝毎善其恭慎遷衛尉猶兼都職中朝服其賢雅爲時名卿連上表年老乞求解替還桑梓帝不聴咸寜末卒帝縁立有懐舊性乃送葬于蜀使者護䘮事郡縣修墳塋當時榮之初安樂思公丗子早殁次子宐嗣而思公立所􅋢者立亟諌之不納及􅋢子立驕㬥二州人士皆欲表廢立止之曰彼自㬥其一門不及百姓當以先公故得爾也後安樂公淫亂無道何攀與上庸太守王崇涪陵太守張寅爲書諌責稱當思立言凡立章奏集爲十篇詩賦論頌亦數十篇同郡毛楚楊崇皆有德美楚牂柯崇武陵太守栁隱字休然蜀郡成都人也少與同郡杜充栁伸竝知名隱直誠篤亮交友居厚逹扵從政數從大将軍姜維征伐臨事設計當敵䧟陣勇畧冠軍爲牙門将巴郡太守騎都尉遷漢中黄金圍督景耀六年魏鎮西将軍鍾㑹伐蜀入漢川圍戍多下惟隱堅壁不動㑹别将攻之不能克後主旣降以手令敕隱乃詣㑹晉文帝聞而義之咸熈元年内移河東拜議郎武帝踐祚以爲西河太守在官三年以年老去官乞骸還蜀卒扵家年八十長子克連道令次子初舉秀才杜禛字文然栁伸字雅厚州牧諸葛亮辟爲從事禛符節令梁益二州都督伸度支禛子昣字伯重略陽護軍伸漢嘉巴東太守大同後竝舉秀才昣子彌字景文伸子純字偉㳤有名德幹器舉秀才巴郡宐都建平太守西夷長水校尉巴東監軍司馬勝之字興先廣漢綿竹人也學通毛詩治三禮清尚虗素性澹不榮利初爲郡功曹甚善綱紀之體州辟從事進尚書左選郎徙秘書郎時蜀國州書佐望與郡功曹參選而從事侔臺郎時重察舉雖位經朝要還為秀孝亦為郡端右景耀末郡請察孝㢘大同後梁州辟别駕從事舉秀才歴廣都新繁令政理尤異以清秀徵為散騎侍郎以宗室禮之終以疾辭去職即家拜漢嘉太守候迎盈門固讓不之官閒居清靜謙卑自牧常言世人不務求道德而汲汲扵爵禄若吾者可少以爲有餘榮矣訓化鄊閭以恭敬爲先年六十五卒扵家子尊賢佐皆有令德常勗字修業蜀郡江原人也祖父貟牂柯永昌太守父高廟令從父閎漢}
