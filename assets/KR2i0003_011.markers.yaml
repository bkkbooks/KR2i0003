  - {type: variant, offset: 5501, length: 311, content: 冀子弟放恣旂以法繩之不敢為非京師肅清桴鼓不鳴孟文翹翹丕顯有成楊渙字孟文武陽人也以清秀博雅歷臺郎相稍遷尚書中郎司隸校尉甚有嘉聲美稱伯邳正直耀祖揚聲楊淮字伯邳渙孫初為郡守太尉李固薦淮累世忠直拜尚書太傅陳蕃表為河東入為尚書令奏書治南陽太守曹麻潁川太守曹騰濟南太守孫訓等子弟依託形勢淫縱徵廷尉治罪訓梁冀婦家子也於是權貴憚之又薦朱禹盛精騰延為尚書陸稠為郡守皆名士也桓帝即位拜河南尹遷司隸校尉冀叔父梁忠為執金吾不朝正初劾奏之朝士服其公亮徙將作大匠翁君將命迺播其名楊莽字翁君武陽人為功曹刺史王尊當之州移書諸郡不得遣迎惟犍為遣莽蜀郡遣何霸巴郡遣嚴尊尊大怒莽前對曰使君不使奉迎謙也大守承迎敬也謙敬上下之節不可廢也尊乃欣然請辟別駕舉茂才官至揚, SBCK: ''}
