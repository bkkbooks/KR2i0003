  - {type: variant, offset: 2029, length: 0, content: '', SBCK: 濬性在忠烈受命必果宐重其位號詔書遷濬平東􅀅軍􅇂二州事呉平封關内侯濬入拜輔國攀爲司馬上論時務五篇除滎陽令進廷尉評有盗開城門下關者法據大辟攀駮之曰上關執信之主下關儲備之物設有開上關何以加刑遂減􅋱多􅀁議讞遷散􅀐侍郎太傅楊駿謀逆請衆官攀與侍中傅祗侍郎王愷等徃恵帝從楚王瑋殿中中郎孟觀䇿戒嚴誅駿外已怱怱攀與祇踰墻得出侍天子天子以爲翊軍校尉領熊渠兵一戰斬駿社稷用安封西城公邑萬户䇿曰於戲在昔先王光濟厥丗罔不開國列土建德表功也故逆臣楊駿謀危社稷􅌟兵飛矢集于殿􅒉白刄交扵宫闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城爲攀封國􅃬兹玄社苴以白茅永}
  - {type: page-break, offset: 2029, content: '', id: KR2i0003_SBCK_011-17b}
  - {type: variant, offset: 2029, length: 0, content: '', krp: 濬性在忠烈受命必果宐重其位號詔書遷濬平東将軍督二州事呉平封關内侯濬入拜輔國攀爲司馬上論時務五篇除滎陽令進廷尉評有盗開城門下關者法據大辟攀駮之曰上關執信之主下關儲備之物設有開上關何以加刑遂減死多所議讞遷散騎侍郎太傅楊駿謀逆請衆官攀與侍中傅祗侍郎王愷等徃恵帝從楚王瑋殿中中郎孟觀䇿戒嚴誅駿外已怱怱攀與祇踰墻得出侍天子天子以爲翊軍校尉領熊渠兵一戰斬駿社稷用安封西城公邑萬户䇿曰於戲在昔先王光濟厥丗罔不開國列土建德表功也故逆臣楊駿謀危社稷􅌟兵飛矢集于殿􅒉白刄交扵宫闈攀受命奮討凶逆速殄忠烈果毅朕甚嘉焉今以魏興之西城爲攀封國錫兹玄社苴以白茅永}
