  - {type: variant, offset: 336, length: 2, content: 事華, SBCK: 父雄字伯休安漢雒令軫少師譙周發明髙經扵譙氏之門郡命爲功曹鄧艾既破蜀被徵鍾㑹進成都時太守南陽張府君不肯出官軫進曰征西囚執鎭西在近必有􅀁遣軍亂之際交害無常宐避正殿府君即出住下舎會果遣參軍牽弘爲太守數百􅀐擐甲馳馬入郡前驅問侯􅀁在云已出善之引復召爲功曹察孝㢘除建寜令徙仕山陽新城池陽􅀁在有治入爲尚書郎毎升降趋翔廊閣之下盛容可觀中朝偉之遷犍爲太守恵􅋢在民還爲州大中正軫旣才學兼該而器量倜儻武帝雅識之方用内侍㑹卒時年五十八弟烈字仲武貞幹敏識平坦和粹名譽侔軫察孝㢘歷平康牛鞞南鄭安陽令王國建首選為郎中令􅃟衡陽太守兄軫䘮自上求去官以兄子㓜弱軫䘮飄颻欲扶􅀅靈柩葬舊墳武帝歎惜軫能用未盡而嘉烈弟意轉拜徙官犍爲太守又轉湘東少弟良字㓜倫亦有當丗局分舉秀才茶陵新都令國王郎中令遷涪陵建寧太守兄弟竝興州}
  - {type: page-break, offset: 336, content: '', id: KR2i0003_SBCK_011-12b}
  - {type: variant, offset: 336, length: 2, content: 事華, krp: 父雄字伯休安漢雒令軫少師譙周發明髙經扵譙氏之門郡命爲功曹鄧艾既破蜀被徵鍾㑹進成都時太守南陽張府君不肯出官軫進曰征西囚執鎭西在近必有所遣軍亂之際交害無常宐避正殿府君即出住下舎會果遣參軍牽弘爲太守數百騎擐甲馳馬入郡前驅問侯所在云已出善之引復召爲功曹察孝㢘除建寜令徙仕山陽新城池陽所在有治入爲尚書郎毎升降趋翔廊閣之下盛容可觀中朝偉之遷犍爲太守恵􅋢在民還爲州大中正軫旣才學兼該而器量倜儻武帝雅識之方用内侍㑹卒時年五十八弟烈字仲武貞幹敏識平坦和粹名譽侔軫察孝㢘歷平康牛鞞南鄭安陽令王國建首選為郎中令選衡陽太守兄軫䘮自上求去官以兄子㓜弱軫䘮飄颻欲扶将靈柩葬舊墳武帝歎惜軫能用未盡而嘉烈弟意轉拜徙官犍爲太守又轉湘東少弟良字㓜倫亦有當丗局分舉秀才茶陵新都令國王郎中令遷涪陵建寧太守兄弟竝興州}
