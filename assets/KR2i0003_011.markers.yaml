  - {type: variant, offset: 309, length: 0, content: '', krp: 皆辭章燦麗馳名當丗凡壽所述作二百餘篇符莅階各數十篇二州先逹及華夏文士多爲作傳大較如此尚書郎拜建章太守以疾辭不就意}
  - {type: variant, offset: 310, length: 0, content: '', SBCK: 州里除時梓潼李驤􅅩龍亦雋逸器知名當丗舉秀才攜隟還相誣攻有識以是短之亦自别傳廣漢太守初與夀齊望又相眤友後與夀情好李宓字令伯犍爲武陽人也祖父光朱提太守父早亡母何更行見飬祖母治春秋左傳博覽五經多􅀁通渉機警辯捷辭義響起事祖母以孝聞其侍疾則泣涕側息日夜不解帶饍飲湯藥必過目嘗口本郡禮命不應州辟從事尚書郎大將軍主簿太子洗馬奉使聘吴吴主問蜀馬多少對曰}
  - {type: page-break, offset: 310, content: '', id: KR2i0003_SBCK_011-10b}
  - {type: variant, offset: 310, length: 0, content: '', krp: 州里除時梓潼李驤叔龍亦雋逸器知名當丗舉秀才攜隟還相誣攻有識以是短之亦自别傳廣漢太守初與夀齊望又相眤友後與夀情好李宓字令伯犍爲武陽人也祖父光朱提太守父早亡母何更行見飬祖母治春秋左傳博覽五經多所通渉機警辯捷辭義響起事祖母以孝聞其侍疾則泣涕側息日夜不解帶饍飲湯藥必過目嘗口本郡禮命不應州辟從事尚書郎大將軍主簿太子洗馬奉使聘吴吴主問蜀馬多少對曰}
  - {type: variant, offset: 311, length: 0, content: '', SBCK: 用有餘民間自足吴主與群臣汎論道義謂寜爲人弟宓曰􅂅爲人兄吴主及群臣稱之大同後征西􅀅軍鄧艾聞其名請爲主簿及書招欲與相見皆不徃以祖母年老心在色飬拒州郡之命獨講學立旌授生武帝立太子徵爲洗馬詔書累下郡縣相逼宓上䟽本􅀓䟽在武帝覽之曰宓不􅆰有名也嘉其誠􅅃賜奴婢二人下郡縣供其祖母奉膳徙尚書郎河内温令敷徳陳教政化嚴明太傅鉅平侯羊公薨無子帝令宗子爲丗子嗣之不時赴䘮宓遣户曹賫移推轂遣之中山諸王毎過温縣必責求供給吏民患之宓至中山王過縣徵芻茭薪蒸宓引髙祖過沛賓老㓜桑梓之供一無煩費伏惟眀王孝思惟則動識先戒本國望風式􅁔且舞誅求煩碎􅀁未聞命後諸王過不敢煩温縣盗賊發河内餘縣不敢近温追賊者不敢經界隴西王司馬子舒深敬友之而貴豪憚其公直宓去官爲州大中正性方亮不曲意􅀔位者失荀張指左遷漢中太守諸王多以爲寃一年去官年六}
  - {type: page-break, offset: 311, content: '', id: KR2i0003_SBCK_011-11a}
  - {type: variant, offset: 311, length: 180, content: 十年卒列畫頌東觀三老泱泱實作父師楊統字仲通新都人也事華里先生炎高高戒統曰漢九世王出圖書與卿適應之建武初天下求通內讖二卷者不得永平中刺史張志舉統方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光祿大夫以年老道深養於辟雍授几杖為三老卒內讖二卷竟未詳平仲涉道殆乎庶幾王祐字平仲郪人也少與雒高士張浮齊名不應州郡辟命司隸校尉陳紀山名知人稱祐天下高士年四十二卒弟獲志, WYG: 民思}
