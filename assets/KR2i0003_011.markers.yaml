  - {type: variant, offset: 2607, length: 1082, content: 彥卿乃葬之不報天彰卿德辟舉茂才除郿令宿斄亭中數有人為鬼所煞忳上樓夜半有女子稱冤曰妾涪令妻也當之官宿此枉為亭長所煞大小二十口埋在樓下奪取財物忳曰汝何故以恆殺人女子曰妾不得白日惟依夜愬人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召遊徼詰問具服即收同謀十餘人煞之送涪令喪還鄉里當世稱之仲魚謙沖羊朞字仲魚郪人也父為交州刺史卒官朞迎喪不敢取官舍一物郡三察孝廉公府辟州別駕皆不應太守尹奉棄刑名行禮樂請為功曹刺史必欲借朞自佐不得已為別駕後為太守孫寶蔡茂祋諷功曹當欲渡津津吏滯停車待之三日將宿中亭中有縣吏引車避之為野王令雲卿安貧朱倉字雲卿什邡人也受學於蜀郡張甯湌豆屑飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧恆以步行為郡功曹每察孝廉羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式玄照折像字伯式雒人也其先張江為武威太守封南陽折侯因氏焉父國為鬱林太守家貲二億故奴婢八百人盡散以施宗族䘏贍親舊葬死弔喪事東平虞叔雅以道教授門人朋友自遠而至時人為諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經孟宗當仁杜真字孟宗緜竹人誦書百萬言兄事翟酺酺免後尚書令與司隸校尉枉劾之復徵詣獄真上章救之受掠笞六百獄中明酺無事京師壯之以漢道微散財施宗族不應公府辟命及辟長吏候迎每交於門乃斷髮以自絕味道好施清風邁倫讚仲魚以下也漢儒請雨精感慶雲諒輔字漢儒新都人為郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰二日不雨則欲自焚為貪叨吏謝罪百姓言終暴雨韓揆義烈韓揆字伯彥竹人也為令錡裒主簿值黃巾賊入界扶裒走入草中裒遣求隱翳處未還裒為賊所得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而苟自活非忠乃自煞喬雲勇震左喬雲緜竹人也少為左通所養為子通坐任徒徒逃吏欲破通臏通無壯子故為吏所侵喬雲時年十三喟然憤怒以銳刀煞吏解通走將令出追初聞以為壯士及知是小兒為之流涕楊寬證將烈播友人寬字叔仲新都人也父斌證令萬世太守祋諷以忠義狀聞寬為郡吏鄉人馬閏章言太守五方寬與兄皆詣獄證之得理後方當遷南郡閏復章之寬乃發閏臨私事閏伏罪友人汝錕為張明所煞寬怒縛明送錕家使自謝之甯叔執仇甯叔字茂泰廣漢人與友人張昌共受業太學昌為河南大豪呂條所煞叔煞條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍為謝裒裒死負土成墳三年裒子為人所煞鉗復其讎自拘武陽獄會赦免當世義之賈為士死分侔虞朱賈栩字元集什邡人也雒孟伯元為父復讎聞栩名往投之雒縣追伯元蹤栩嘆曰士以義遇我豈可倍哉煞雒縣必移什邡負我君乃自煞李勝誄之以方虞卿魯之朱家郭玉通術蓋亦所脩郭玉新都人也明方術伎妙用針作經方頌說官至太醫丞爰迄劉氏司農含章爽朗翠粲觀國之光秦宓字子勑緜竹人也初隱遁不應, WYG: 拒}
