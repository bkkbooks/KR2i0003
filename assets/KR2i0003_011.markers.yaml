  - {type: variant, offset: 698, length: 3, content: 術妙占, WYG: 澡身貞素州從事散騎黄門侍郎大同郡主簿上計吏察孝廉不就州辟主簿治中别駕舉才行刺史皇甫晏貢之三司遂辟太宰除覇城令始平太守治政著稱從扶風轉秦國内史文立卒後溫令李宓表武帝言二州人士零頽才彦凌遲無復厠豫綱紀後進慰寜遐外者良公朝英特二州之望宜見超予紹繼立後帝徵為黄門侍郎兼二州都給事中梁州刺史遷散騎常侍大長秋卒葬洛北芒山徵字建興張翼子也篤志好學官至廣漢太守緝字文平清檢有治幹舉秀才歴城令涪陵太守遷譙内史良公朝疑誤何攀字惠興蜀郡郫人漢司空汎鄉侯武弟潁川太守顯後也父包字休揚察舉秀孝皆不行除瑯琊王中尉不就攀兄弟五人皆知名攀少夙成竒姿卓逸弱冠郡主簿上計吏州辟從事刺史皇甫晏稱攀王佐才也以為主簿泰始十年養母歸家晏為牙門張𢎞等所害攀操表徑詣洛訟釋事得清刺史王濬復辟主簿别駕咸寜三年濬被詔罷屯田兵作船為伐吳計攀進曰今見佃兵但六百人計作船六七年財可勝萬人後者}
