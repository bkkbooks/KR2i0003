  - {type: variant, offset: 2460, length: 146, content: 林陰德陽報是甄王忳字少林新都人也游學京師見客舍有一書生困病忳隱視奄忽便絕有金十斤忳以一斤買棺木九斤還腰下葬埋之後為大渡亭長大馬一匹來入亭中又有繡被一領飛墮其前人莫識者郡縣以畀忳後乘馬到雒縣馬牽忳入他舍主人問忳所由得馬忳具說其狀并及繡被主人悵然曰卿何陰德而致此忳說昔埋書生事主人驚曰是我子也姓金, WYG: 知}
