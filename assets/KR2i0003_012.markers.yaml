  - {type: variant, offset: 5, length: 1, content: 中, SBCK: 祖階之奄有四海梁益及晉兮益爲寜司馬相如嚴君平􅀭子雲陽成子玄鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀略舉其隅其次聖稱賢仁人志士言爲丗範行爲表則者名挂史録而陳君承祚别爲耆􅃇始漢及魏煥乎可􅀚然三州土地不復悉載地理志頗言山水歷代轉久郡縣分建地名改易扵以居然辨物知方猶未詳僃于時漢晉方隆官司星列提封圖簿歲集司􅆰故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭阨運凾夏滔堙李氏據蜀兵連戰結三州傾墜生民殱盡府􅒉化爲狐狸之窟城郭蔚爲熊羆之宿宅逰雉鹿田棲虎豹平原鮮麥黍之苗千里蔑雞狗之響丘城蕪邑莫有名者嗟乎三州近爲􅂽裔桒梓之域曠爲長野反側惟之心若焚灼懼益遐棄城陴靡聞乃考諸􅃇紀先􅀫􅀁傳并南裔志驗以漢書􅂑其近是及自􅀁聞以著斯篇又畧言公孫述蜀書咸熈以來䘮亂之事約􅂑􅂄􅃇}
