  - {type: variant, offset: 4122, length: 162, content: 也父為梁冀所免兄憲公季公罷官歸文姬歎曰李氏滅矣乃與二兄議匿弟燮隨父門生王成亡命徐州涕泣送之謂成曰託君以六尺之孤若李氏得嗣君之名義參於程杵矣久之遇赦燮得還行喪服闋勑之曰先公為漢忠臣雖死之日猶生之年梁冀以族弟幸濟豈非天乎慎勿有一言加梁氏加梁氏則連主上是又掇禍也奉行之從成在徐州各異處傭賃而私相往來成病亡燮四時祭之陳氏二謙或智或仁, WYG: 趙瑛妻}
