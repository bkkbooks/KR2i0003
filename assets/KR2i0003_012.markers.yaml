  - {type: variant, offset: 71, length: 0, content: '', SBCK: 子也治中祭酒朱倉字雲卿什邡人政事牂柯太守劉寵字丗信綿竹人孝子江陽符長姜詩字士逰雒人隂德􅔛令王忳字少林新都人也交州牧羊甚郪人也推讓野王令羊朞字仲魚甚子文學侍中董扶字茂安綿竹人楊厚弟子也文學聘士任安字定祖綿竹人亦厚弟子高讓義士杜眞字孟宗綿竹人精誠五官諒輔字漢儒新都人義士楊寛字􅅩仲新都人父斌兄混皆有證明君事失其官位義士張鉗字子安廣漢人也烈士賈栩字元集什邡人也節士寗􅅩字茂泰廣漢人也忠義綿竹主簿韓揆字伯彦壮童左喬雲綿竹人孝㢘汝敦新都人周幹廣漢人彭勰廣漢人古朴右三人儒學文才見蜀志及王啇傳廣漢人方術太醫丞郭玉字通􅈂右五十二人馳名漢丗别駕從事李朝字永南郪人也丞相西曺掾李邵字偉南朝弟也文才大司農秦宓字子敕綿竹也益州太守王士義字彊郪人王祐從弟也别駕從事王甫字國山文表弟也優㳺特進太常關内侯鐔承字公文郪人才雋江陽太守彭羕字年廣漢人忠謀從事鄭度綿竹人也見劉璋傳忠烈從事王累新都人也見劉璋傳右九人在劉氏丗及二牧時聘士任安母姚綿竹人也姜詩妻龎行雒人也姜嬪字義􅃇綿竹也狄道長姜穆女司馬雅妻廖伯妻殷紀配廣漢人也便敬妻王和新李珥妻進娥郪人李氏女馮季宰妻也王輔妻彭非廣漢人也李平字正流廣漢李元女楊文妻袁稚妻相烏德陽人也汝敦妻失姓}
