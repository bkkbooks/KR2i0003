  - {type: variant, offset: 70, length: 0, content: '', SBCK: 士王稚字􅅩起謚曰憲文堂少子也堂長子博失官位博子遵亦失官位善績蜀郡太守王啇字文表遵子隱士夫子段翳字元章新都人也亢烈辟士段恭字節英新都人也武威太守南陽折侯張江雒人鬱林太守折國江四丗孫因封國改信折高士折象字伯式國}
