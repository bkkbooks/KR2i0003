  - {type: variant, offset: 4, length: 0, content: '', WYG: 土是覆化澹教洽誕茲彥茂峩峩俊乂亹亹英秀如嶽之崇如蘭之臭經徳秉哲綽然有裕述後賢志第十一博考行故揔厥舊聞班序州部區别山川憲章成敗旌照仁賢抑絀虚妄糾正繆言顯善懲惡以杜未然述序志第十二譔曰駟牡騤騤萬馬龍飛陶然斯猶阜㑹京畿麏獲西狩鹿從東麋郇伯勞之旬不接辰嘗茲珍嘉甘心庶幾中為令徳一行可師璝瑋俶儻貴韜光暉據冲體正平揖宣尼導以禮樂教洽化齊木訥剛毅有威有懐鏘鏘宫縣磬筦諧諧金奏石拊降福孔皆揔括道檢揔覽幽微選賢與能仁逺乎哉益梁寕三州先}
  - {type: page-break, offset: 4, content: '', id: KR2i0003_WYG_012-7b, image: WYG0463/WYG0463-0288b.png}
