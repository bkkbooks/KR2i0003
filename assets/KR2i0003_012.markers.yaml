  - {type: variant, offset: 40, length: 5, content: 愛敬天下之, krp: 眀帝公車令趙珜字孫眀閬中人也公府掾趙毅字仲都珜子也公車令臧太伯宕渠人也見珜傳雋才凉州刺史趙宏字温柔閬中人也右十三人前漢政事揚州刺史嚴遵字王思閬中人也徐州牧嚴羽字子翼王思子也長安令王偉卿王思友見王思傳政事大司農玄賀字文和宕渠人也將畧大鴻臚龎雄字宣孟宕渠人也政事幽州刺史馮煥宕渠人也朙略使持節車騎將軍馮緄字鴻卿煥子降虜都尉馮元字公信緄弟尚書郎馮遵字文衡元子政事司隷校尉陳禪字紀山安漢人漢中太守陳澄禪子别駕從事陳實字盛先澄孫也與王文表爲友思防治中從事楊仁字文義閬中人也志士荆州刺史龔調字叔侯安漢人也忠貞魏郡太守趙晏字平仲安漢人也籌畫益州太守李顒字德卬墊江人也漢書及巴耆舊也汝南太守謁煥字闕江州人也見汝南紀度遼將軍桂陽太守然温字闕江州人見巴耆舊傳美化越嶲太守張翕字叔陽安漢人也越嶲太守張璊翕子也太守三堂察舉孝廉}
