  - {type: variant, offset: 1137, length: 370, content: 與后兄大將軍梁冀太傅趙峻並錄尚書事沖帝崩時徐揚有盜賊太后欲不發喪須召諸王至固爭不可言國家多難宜立長君太后欲專權乃立樂安王子為質帝質帝崩太后復與梁冀謀所立固與司徒南郡胡廣司空蜀郡趙戒書與冀引周勃霍光立文宣以安漢之榮閻鄧廢立之禍言國統三絕期運厄會興崩之漸在斯一舉宜求賢王親近不可寢嘿也冀得書召公卿列侯議所立三公及鴻臚杜喬僉舉清河王蒜冀然之奏御太后中常侍曹騰私恨蒜說冀明日更議廣戒從冀固與喬必爭蒜宜立中興才也且年長識義必有厚將軍冀不聽策免固喬歲餘收下獄以無事出之京師市邑皆稱千萬歲冀惡其為人所善更奏繫之固書與二公曰吾欲扶持漢室使之比隆文宣何圖梁將軍迷謬諸子曲從以吉物為凶成事為敗漢家衰微從是始矣將軍亦有不利吾雖死上不慚於天下不愧於人求義得義死復何恨遂自殺二公得書惟自流涕士民咸哀哭之桓帝無道冀尋受誅漢家遂微政在閹宦無不思固也元脩敦重威惠實亮張亮則, SBCK: 李法}
