  - {type: variant, offset: 4580, length: 160, content: 子賤初為郡功曹李固之誅詔書下郡殺固二子憲公季公太守知其枉遇之甚寬二子託服藥死具棺器欲因出逃子賤畏法勑更驗實就殺之及固小子燮得還子賤慮燮報仇賃人刺之燮覺告郡殺子賤初樹南諫子賤子賤不從及臨死許共并命兄弟㛐侍婢視守之經百餘日乃怠白兄㛐念一死萬不得生不敢復圖死也上下以為信然無幾時於幕下自煞祈祈令姬如玉如金允矣淑媛齊德姜任總讚此, SBCK: 右}
