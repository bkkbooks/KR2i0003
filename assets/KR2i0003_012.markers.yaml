  - {type: variant, offset: 6771, length: 0, content: '', SBCK: 在劉氏丗文學制州刺史尹珍字道珍母歛人也巴郡太守傅宝字紀圖下夷人也忠義冠軍將軍寧州刺史謝恕字茂理母歛人也右三人牂柯人士忠義大將軍朝侯􅀕酒􅃬光字長沖右一人西城人士忠義雲南太守陽遷亭侯吕凱字季平右一人永昌人士義正安漢將軍建寧太守李恢字德昂領軍爨習御史中丞孟􅀗右三人建寧人士輔漢將軍孟琰字休朙右一人朱提人士先泥和女絡符人也右一人烈女江陽人大凡三州十三郡}
  - {type: page-break, offset: 6771, content: '', id: KR2i0003_SBCK_012-22b}
  - {type: variant, offset: 6771, length: 0, content: '', WYG: 在劉氏世文學制州刺史尹珍字道真母斂人也巴郡太守傅寳字紀圖下夷人也忠義冠軍将軍寧州刺史謝恕字茂理母斂人也右三人牂柯人士忠義大將軍朝侯祭酒錫光字長沖右一人西域人士忠義雲南太守陽遷亭侯吕凱字季平不韋人也右一人永昌人士義正安漢將軍建寧太守李恢字徳昂領軍爨習御史中丞孟獲右三人建寧人士輔漢將軍孟琰字休明右一人朱提人士先泥和女絡符人也右一人列女江陽人大凡三州十三郡}
