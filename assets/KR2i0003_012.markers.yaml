  - {type: variant, offset: 3726, length: 713, content: 宣妻也生七男七女若元珪稚珪有望五人皆令德其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寬宓子賤帶弦以自急故能改身之恆為天下名士戒諸女及婦曰吾之妊身在乎正順及其生也恩存於撫愛其長之也威儀以先後之禮貌以左右之恭敬以監臨之懃恪以勸之孝順以內之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也後七子皆辟命察舉牧州守郡而漢中太守南鄭令多與七子同歲秀孝上計無不脩敬泰姬執子侄禮禮珪肅穆言存典韻禮珪成固陳省妻也楊元珍之女生二男長娶張度遼女惠英少娶荀氏皆貴家豪富從婢七八資財自富禮珪勑二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不為貧也所以粗食急務者使知苦難備獨居時二婦再拜奉教從孫奉上微慢珪抑絕之感悟革行遭亂流行宗表欲見之必自嚴飾從子孫侍婢乃引見之曰此先姑法也四時祭祀自親養牲釀酒曰夫祭禮之尊也年八十九卒惠英亦有淑訓母師之行者也文姬叡敏宗祀獲歆文姬南鄭趙伯英妻太尉李固女也父為梁冀所免兄憲公季公罷官歸文姬歎曰李氏滅矣乃與二兄議匿弟燮隨父門生王成亡命徐州涕泣送之謂成曰託君以六尺之孤若李氏得嗣君之名義參於程杵矣久之遇赦燮得還行喪服闋勑之曰先公為漢忠臣雖死之日猶生之年梁冀以族弟幸濟豈非天乎慎勿有一言加梁氏加梁氏則連主上是又掇禍也奉行之從成在徐州各異處傭賃而私相往來成病亡燮四時祭之陳氏二謙或智或仁陳順謙妹惠謙成固人也順謙適鄧令曹寧十九寡居長育遺孤八十餘卒兄子陳規著書歎述之惠謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元脩訪於惠謙惠謙曰恢弘德教養廉免恥五刑三千蓋亦多矣又何加也兄子伯思學仙道惠謙戒之曰君子疾沒世而不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之俊耳禮脩順姑恩愛溫潤禮脩趙, SBCK: ''}
