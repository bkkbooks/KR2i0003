  - {type: variant, offset: 14, length: 0, content: '', SBCK: 㢤梁孟寕三州先漢以來士女目録常道􅀅集高尚逸民嚴遵字君平成都人也高尚逸民林閭字公孺師之見方言臨卭人揚雄徳行治中從事李弘字仲元成都人也德行給事黄門侍郎揚雄字子雲成都人也文學神童楊烏雄子也預父玄文九歳卒文學侍中揚州刺史張寛字􅅩文經還以教授者成都人始受文翁遣東受七文學中郎􅀅司馬相如字長卿成都人也文學諫議大夫王襃字子淵資中人也尚書郎楊壯成都人也見􅀭子方言美秀中郎將何覇字翁君郫人也執政大中司空汎鄊侯何武字君公覇弟以忠正爲三公王莾欲篡位憚而殺之潁川太守何顯廢武弟也兄弟五人皆在漢書武子况嗣武侯王莾時黄門侍郎鄧通蜀人孝文帝時爲侍郎甚有寵卓王孫臨卭人也見食貨志姑仍􅃇列扵執政臣下政事左衞護軍陳立字少遷治為天下最臨卭人歷牂柯巴郡天水三郡太守節士太中大夫章朙字公孺繁人也節士尚書郎侯岡字宣孟新繁人也節士尚書郎王嘉字公卿江原人也節士美陽令王皓字子離江原人也右十九人在前漢}
