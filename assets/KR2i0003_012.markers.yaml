  - {type: page-break, offset: 0, content: '', id: KR2i0003_SBCK_012-1a}
  - {type: variant, offset: 0, length: 1, content: 卷, WYG: 欽定四庫全書華陽國志巻十二晉常璩撰序志巴蜀厥初開國載在書籍或因文緯或見史記乆逺隠没實多疎略及周之世侯伯擅威雖與牧野之師希同盟要之㑹而秦資其富用兼天下漢祖階之奄有四海梁益及晉分益為寜司馬相如嚴君平揚子雲陽成子𤣥鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀畧舉其隅其次聖稱賢仁人志士言為世範行為表則者名挂史録而陳君承祚别為耆舊傳始漢及魏煥乎可觀然三州土地不復悉載地理志頗言山水歴代轉乆郡縣分建地名改易於以居然辨物知方猶未詳偹於時漢晉方隆官司星列提封圖簿歲集司空故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭阨運函夏滔堙李氏㨿蜀兵連戰結三州傾墜生民殱盡府庭化為狐狸之窟城郭蔚為熊羆之宿宅遊雉鹿田棲虎豹平原鮮麥黍之苖千里蔑鷄狗之響丘城蕪邑莫有名者嗟乎三州近為荒裔桑梓之域曠為長野反側惟之心若焚灼懼益遐棄城陴靡聞迺考諸舊紀先宿所傳并南裔志騐以漢書取其近是及自所聞以著斯篇又畧言公孫述蜀書咸熈以来喪亂之事約取耆舊士女英彦又肇自開闢終乎永和三年凡十篇號曰華陽國記夫書契有五善逹道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪􅀶咨流離困瘵方資腐帛於顛墻之下求餘光於灰塵之中劘滅者多故有所闕猶愈於遺忘焉蜀紀言三皇乘祇車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南鄭此谷道之通乆矣而説者以為蜀王因石牛始通不然也本紀旣以炳明而世俗間横有為蜀傳者言蜀王蠶叢之間周迴三千歲又云荆人鼈靈死屍化西上後為蜀帝周萇𢎞之血變成碧珠杜宇之魄化為子䳌又言蜀椎髻左衽未知書文翁始知書學案蜀紀帝居房心决事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流於西故周失紀綱而蜀先王七國皆王蜀又稱帝此則蠶叢自王杜宇自帝皆周之叔世安得三千歲且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則為恠異子所不言况能為帝王乎碧珠出不一處地之相距動數千里一人之血豈能致此子䳌鳥今云是嶲或曰嶲周今案説文云蜀王望帝婬其相妻慙亡去為子嶲鳥故蜀人聞子嶲鳴皆起云望帝嶲户圭切所言與蜀志所述相似爾雅亦云嶲周子嶲鳥也出蜀中四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由来逺矣孔子曰述而不作信而好古竊比於我老彭則彭祖本生蜀為殷太史夫人為國史作為聖則傳自上世見稱在昔及周之末服事於秦首為郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄉方大人之國也至於漢興反當荒服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學哉漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕骨聊著翰墨當時以為極歡後人有以為惑恐此之𩔖必起於元靈之由也惟智者辨其不然幸也綜其理数或以為西土嶮固衿帶易守世亂先違道治後服若吴楚然故逋逃必萃奸雄闚覦盖帝王者統天理物必居土中徳膺命運非可資能恃險以干常亂紀雖饕竊名號終於絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而取也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之所産古無興國夫恃險憑危不階厯数而能傳國垂世所未有也故公孫劉氏以敗於前而諸李踵之覆亡於後天人之際存亡之術可以為永鍳也干運犯厯破家喪國可以為京觀也今齊之國志貫之一揆同見不臣所以防狂狡杜奸萌以崇春秋敗絶之道也而顯賢能著治亂亦以為奬勸也其序曰先王經畧萬國剖分厥甸巴梁式象縣辰九俊述職賦政以均佐周斃紂相漢亡秦寔繁其民世載其俊述巴志第一維天有漢鑒亦有光實司羣望表我華陽炎劉是應洪祚攸長述漢中志第二井絡啓耀文昌契符茫茫禹績畫為九州功冐普天率土以休光靈遐照慶祚爽流邦家濟濟世徳球球述蜀志第三蠢爾南域在彼要荒漢武徳振蠻貊是攘開州列郡幽裔来王柔逺能邇實須才良甄徳表失以明紀綱述南中志第四赤徳中微巨猾干篡白虜乘興致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌䝉此艱難述公孫劉二牧志第五政去王室權流二桀𤓰分天壌宰割民物舍彼信順任此智計大道既隠詭詐競設並以豪特力爭當世居正慮明名號絶替身兼萬乗籍同列國述劉先主志第六乾坤渾始樹君立王天工人代萬邦是望明不二日地不二皇茍非其器窮髙必亢􅄥濛後主弗慮弗臧負乘致冦世業以喪述劉後主志第七陽升三九品物始亨帝紘失振任非其良趙倡禍階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀元黎顧瞻靡望述大同志第八素精南飄天維弛綱薨薨特流肆其豺狼蕩雄纂承殱我益梁牧守顛摧黔首辛嘗三州毁曠攸然以荒絡結王罔民亦流亡述李特雄期夀勢志第九華嶽降精江漢吐靈濟濟多士命世克生徳為世雋幹為時貞畧舉士女表諸賢明世濟其美不隕其名述先賢士女總讚論}
