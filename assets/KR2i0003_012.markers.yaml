  - {type: variant, offset: 15, length: 2, content: 清鄭, SBCK: 侍郎田儀楊德意無善事在中也知士博士羅衍字伯紀成都人也德政益州太守王阜字丗公成都人也長沙太守任循字伯度爲郡五官父之母識知是事在精通也成都人少失父後爲長沙父流離逺届長沙公亮大司農司􅀠校尉任昉字文始循}
