  - {type: variant, offset: 18, length: 1, content: 真, WYG: 雲成都人也文學神童楊烏雄子也七歳預父𤣥文九歳卒文學侍中揚州刺史張寛字叔文成都人始受文翁遣東受七經還以教授者文學中郎将司馬相如字長卿成都人也文學諫議大夫王}
