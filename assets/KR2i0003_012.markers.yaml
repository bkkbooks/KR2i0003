  - {type: variant, offset: 50, length: 0, content: '', krp: 人見文表傳文學掾龔策墊江人桂陽太守李温宕渠人户曹掾趙芬宕渠人上庸太守陳弘安漢人見巴紀忠義宕渠主簿曲庾宕渠人也忠義宕渠主簿馮湛宕渠人也烈士郝伯都閬中人右三十}
  - {type: variant, offset: 51, length: 6, content: 徵帝王之要道, SBCK: 人後漢司􅀠校尉陳烏等失其事不録義烈江陽太守程畿字季黙閬中人}
  - {type: variant, offset: 51, length: 1, content: 徵, WYG: 更張霸字伯饒諡曰文父成都人也校書郎楊終字子山成都人也聘士張楷字公超文父子也聘士張光超公超弟也尚書張陵字處沖公超子自陵之後世有大官義士趙定成都人以延仁赴義濟窮恤乏為業保貴太尉司徒司空特進厨亭文侯趙戒字志伯定子文學國師太常趙典字仲經戒第二子也忠亮太尉司徒郫惠侯趙謙字彦信戒孫也其子孫襲厨亭侯不顯道徳司徒司空趙温字子柔謙弟自是後世有二千石義烈侍中長水校尉常洽字茂尼江原人見趙温傳道徳侍御史常詡字孟元江原人在趙太尉公耆舊𫝊述作謁者僕射何英字叔俊郫人也作漢德春秋經治犍為屬國何汶字景由英孫也髙士楊由字哀侯成都人也見後漢方術𫝊篤愛髙士侯祈字升伯繁人文父楊序弟子篤愛博士楊珏字仲桓成都人何萇弟子公府辟士羅衡字仲伯郫人亦萇弟子也至孝孝廉禽堅字孟由成都人推賢美陽令栁宗字伯騫成都人也求次方王仲曽張叔遼殷知孫並蜀人伯騫所㧞皆致郡守失其官名匡正治中從事張充字伯春江原人匡正司空辟士李幾字孟元江原人也猛畧部從事楊竦字子㳟成都人也子統為二千石失其官守憲陳湛字小伯成都人節士仲圼成都人也髙士王廣晧子也父為公孫述所聘自刎廣逃匿述破後郡及州命察舉皆不徃曰吾不能復辯敢當世榮利也仁義志士任末字叔本繁人也烈士嚴道主簿李磬字文寺嚴道人也義烈郡功曹史朱普字伯禽廣都人也巴郡太守朱辰字元燕廣都人述作漢中太守鄭厪字伯邑臨卭人也作耆舊傳右四十人馳名後漢尚書郎張俊失其行事不載學士張寜見朱倉傳朱倉字雲卿見下目什邡人傳未詳大鴻臚何宗字彦英郫人也䨇柏長何䨇字漢偶宗子郡䨇柏乃建寧屬縣也穎逸廣漢犍為太守何祇字君肅郫人忠懃輔漢将軍張裔字君嗣成都人𤣥寂太常杜瓊字伯瑜成都人也侍中常竺字代文在耆舊傳安南将軍張表字伯逺成都人也伯父肅廣漢太守兄松字子喬州牧劉璋别駕從事永昌太守王伉成都人見蜀書右八人在劉氏世五更張霸夫人司馬敬司成都人也公乗㑹婦張氏廣都人也犍為楊鳳珪妻陳助臨卭人也廣漢便敬賔婦常元常江原人廣都令常良女也殷氏婦常靡常江原人常仲山女也趙侯夫人常紀常江原人常常侍女景竒妻羅貢郫人羅倩女也趙憲妻何玹郫人也朱叔賢妻張昭儀繁人也廣柔長姚超二女姚妣饒郫人也廣漢王遵妻張叔紀霸女孫也右十一人列女右蜀郡士女七十八人六十七人士十一人女明略渡沔俟范目閬中人文學聘士洛下宏字長公閬中人也𤣥始侍御史任文孫閬中人也文學司空掾任文公文孫弟也先生胥君安見春秋傳首京兆尹徐誦字子産閬中人也忠正侍中譙隆字伯司閬中人也髙清太中大夫譙𤣥字君黄閬中人也潔白尚書郎譙瑛𤣥子也以易授孝明}
