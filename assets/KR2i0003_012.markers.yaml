  - {type: variant, offset: 58, length: 4, content: 成帝元舅, SBCK: 程祁字公弘畿子也楊汰字季儒巴郡人韓儼巴西人􅀺韜然傳巴西人三人見楊文壮烈將軍嚴顔臨江人也見張飛傳玄眞徴士周舒字􅅩布閬中人也文學儒林校尉周羣字仲直舒子也博士周巨羣子也雅重車􅀐將軍育陽景侯黄權字公衡三司閬中人在魏儀同尚書郎黄崇權子也勇壮折衝將軍西陵太守甘寜字興覇臨江人仕吴政事鎮南}
  - {type: page-break, offset: 58, content: '', id: KR2i0003_SBCK_012-13a}
  - {type: variant, offset: 58, length: 2, content: 成帝, WYG: 徐州牧嚴羽字子翼王思子也長安令王偉卿王思友見王思傳政事大司農𤣥賀字文和宕渠人也将畧大鴻臚龎雄字宣孟宕渠人也政事幽州刺史馮煥宕渠人也明略使持節車騎将軍馮緄字鴻卿煥子宕渠人也降虜都尉馮}
  - {type: page-break, offset: 58, content: '', id: KR2i0003_WYG_012-14b, image: WYG0463/WYG0463-0291d.png}
  - {type: variant, offset: 58, length: 4, content: 成帝元舅, krp: 程祁字公弘畿子也楊汰字季儒巴郡人韓儼巴西人黎韜然傳巴西人三人見楊文壮烈將軍嚴顔臨江人也見張飛傳玄眞徴士周舒字叔布閬中人也文學儒林校尉周羣字仲直舒子也博士周巨羣子也雅重車騎將軍育陽景侯黄權字公衡三司閬中人在魏儀同尚書郎黄崇權子也勇壮折衝將軍西陵太守甘寜字興覇臨江人仕吴政事鎮南}
  - {type: variant, offset: 61, length: 1, content: 舅, WYG: 字公信緄弟尚書郎馮遵字文衡元子政事司𨽻校尉陳禪字紀山安漢人漢中太守陳澄禪子别駕從事陳實字盛先澄孫也與王文表為友思防治中從事楊仁字文義閬中人也志士荆州刺史龔調字叔侯安漢人也忠貞魏郡太守趙晏字平仲安漢人也籌畫益州太守李顒字徳卬墊江人也見漢書及巴耆舊傳汝南太守謁煥字闕江州人也見汝南紀度遼将軍桂陽太守然温字闕江州人見巴耆舊𫝊美化越嶲太守張翕字叔陽安漢人也越嶲太守張璊翕子也太守王堂察舉孝亷至孝上蔡令趙邵字泰伯閬中人也孝子嚴永名儒陳髦隠士黄錯右三人巴郡太守王堂所進失其官位見堂𫝊巴郡太守龔楊字闕墊江人茂才孟彪江州人右並王文表所薦日南太守黎景字闕墊江人茂才王澹閬中人見文表傳文學掾龔策墊江人桂陽太守李温宕渠人戸曹掾趙芬宕渠人上庸太守陳𢎞安漢人見巴紀忠義宕渠主簿曲庾宕渠人也忠義宕渠主簿馮湛宕渠人也烈士郝伯都閬中人右三十五人後漢司𨽻校尉程烏等失其事不録義烈江陽太守程畿字季黙閬中人也程祁字公𢎞畿子也楊汰字季儒巴郡人韓儼巴西人黎韜巴西人三人見楊文然𫝊壯烈將軍嚴顔臨江人也見張飛𫝊𤣥真徴士周舒字叔布閬中人也文學儒林校尉周羣字仲直舒子也博士周巨羣子也雅重車騎將軍育陽景侯黄權字公衡閬中人在魏儀同三司尚書郎黄崇權子也勇壯折衝將軍西陵太守甘寜字興霸臨江人仕吳政事鎮南大將彭鄉亭侯馬忠字徳信閬中人將略鎮北}
