  - {type: variant, offset: 8, length: 9, content: 鄭真岳峙確乎其清鄭, WYG: 目録晉常璩撰髙尚逸民嚴遵字君平成都人也髙尚逸民林閭字公孺臨卭人揚雄師之見方言徳行治中從事李𢎞字仲元成都人也徳行給事黄門侍郎揚雄字}
  - {type: variant, offset: 8, length: 0, content: '', krp: 英彦又肇自開闢終乎永和三年凡十篇號曰華陽國記夫書契有五善逹道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪博咨流離困瘵方資腐帛扵顛墻之下求餘光扵灰塵之中劘滅者多故有所闕猶愈扵遺忘焉蜀紀言三皇乘祗車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南}
  - {type: variant, offset: 9, length: 1, content: 真, SBCK: 此谷道之通久矣而􅀃者以爲蜀王因石牛始通不然也本紀既以炳眀而丗俗間横有爲蜀􅀓者言蜀王􅁞叢之間周迴三千歲又云荆人鼈靈􅋱屍化西上後爲蜀帝周萇弘之血變成碧珠杜宇之魄化爲子䳌又言蜀椎髻左袵未知書文翁始知書學案蜀紀帝居房心决事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流扵西故周失紀綱而蜀先王七國皆王蜀又稱帝此則􅁞叢自王杜宇自帝皆周之􅅩丗安得三千歲且太素資始有生必􅋱􅋱終物也自古以來未聞􅋱者能更生當世或遇有之則爲恠異子􅀁不言况能爲帝王乎碧珠出不一処地之相距動數千里一人之血豈能􅃱此子䳌鳥今云是嶲或曰嶲周去爲子嶲鳥故蜀人聞子嶲鳴皆起云今案説文云蜀王望帝媱其相妻慚亡爾雅亦云嶲周子嶲鳥也出蜀中望帝嶲户圭切􅀁言與蜀志􅀁述相似四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由來逺矣孔子曰述而不作信而好古􅀼比扵我老彭則彭祖本生蜀爲殷大史夫人爲國史作爲聖則僊自上丗見稱在昔及周之末服事于秦首爲郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄊方大人之國也至于漢興反當􅂽服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學㢤漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕骨聊著翰墨當時以爲極歡後人有以爲惑恐此之􅀋必起扵元靈之由也惟智者辨其不然幸也綜其理數或以爲西土嶮固衿帶易守丗亂先違道治後服若吳楚然故逋逃必萃姧雄闚覦葢帝王者統天理物必居土中德膺命運非可資能恃險以干常亂紀雖饕竊名號終扵絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而􅂑也是以四}
