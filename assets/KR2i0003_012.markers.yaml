  - {type: variant, offset: 44, length: 0, content: '', WYG: 最節士太中大夫章明字公孺繁人也節士尚書郎侯岡字宣孟新繁人也節士尚書郎王嘉字公卿江原人也節士美陽令王皓字子離江原人也右十九人在前漢其侍郎田儀楊徳意無善事在中也知士博士羅衍字伯紀成都人也徳政益州太守王阜字世公成都人也長沙太守任循字伯度成都人少失父後為長沙父流離逺届長沙為郡五官父}
