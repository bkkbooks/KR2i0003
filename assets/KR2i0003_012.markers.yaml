  - {type: variant, offset: 5184, length: 386, content: 少好學求師遂業受古學於扶風馬季長呂叔公南陽朱明叔潁川白仲職精究七經其朋友則潁川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海內名士還以教授州里常言圖緯空說去事希略疑非聖不以為教察孝廉為郎卒漢伯肄業諸生之純景鸞字漢伯梓潼人也少與廣漢郝伯宗蜀郡任叔本潁川李仲渤海孟元叔遊學七州遂明經術還乃撰禮略河洛交集風角雜書月令章句凡五十萬言太守貺命為功曹察孝廉舉有道博士徵不詣然上陳時政言經得失又戒子孫人紀之禮及遺令期死葬不設衣衿務在節儉甚有法度卒終布衣伯禧效志張壽字伯僖涪人也少給縣丞楊放為佐放為涼州賊所得壽求之積六年始知其生存乃賣家鹽井得三十萬市馬五匹往贖放道為羌所劫掠盡凡往三年計道遠不可得數乃單身詣虜涕泣自說虜哀其屢來遣放隨還郡召為中候詔書除巫尉以身佩印盡讓所有財物與三弟復為郡掾量平賦役歲出三百五十萬遷功曹史徙五官掾卒李餘殘身李餘涪人父早世兄夷煞人亡命母慎當死餘年十三問人曰兄弟, SBCK: 壯烈濟隂}
