  - {type: variant, offset: 5027, length: 148, content: 以禮讓化民遷侍御史上計吏守關請之三年不絕以子顧師事少府李膺膺誅自免久之拜武都令遷益州太守上事吏民涕泣送之至沮者七百人白水縣者三百人值益州亂後米㪷千錢毅至恩化暢洽比去米㪷八錢鳩鳥巢其聽事孕育而去三府表薦徵拜議郎自免歸州牧劉焉表拜都尉為人廉正疾淫祠勑子孫惟脩善為禱仁義為福年八十一而卒盛國好學研頤聖真, SBCK: 孝㢘}
