  - {type: variant, offset: 9, length: 1, content: 真, krp: 此谷道之通久矣而說者以爲蜀王因石牛始通不然也本紀既以炳眀而丗俗間横有爲蜀傳者言蜀王𧖟叢之間周迴三千歲又云荆人鼈靈死屍化西上後爲蜀帝周萇弘之血變成碧珠杜宇之魄化爲子䳌又言蜀椎髻左袵未知書文翁始知書學案蜀紀帝居房心决事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流扵西故周失紀綱而蜀先王七國皆王蜀又稱帝此則𧖟叢自王杜宇自帝皆周之叔丗安得三千歲且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則爲恠異子所不言况能爲帝王乎碧珠出不一処地之相距動數千里一人之血豈能致此子䳌鳥今云是嶲或曰嶲周去爲子嶲鳥故蜀人聞子嶲鳴皆起云今案説文云蜀王望帝媱其相妻慚亡爾雅亦云嶲周子嶲鳥也出蜀中望帝嶲户圭切所言與蜀志所述相似四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由來逺矣孔子曰述而不作信而好古竊比扵我老彭則彭祖本生蜀爲殷大史夫人爲國史作爲聖則僊自上丗見稱在昔及周之末服事于秦首爲郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄊方大人之國也至于漢興反當荒服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學㢤漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕骨聊著翰墨當時以爲極歡後人有以爲惑恐此之類必起扵元靈之由也惟智者辨其不然幸也綜其理數或以爲西土嶮固衿帶易守丗亂先違道治後服若吳楚然故逋逃必萃姧雄闚覦葢帝王者統天理物必居土中德膺命運非可資能恃險以干常亂紀雖饕竊名號終扵絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而取也是以四}
  - {type: substitution, offset: 10, original: 岳, replacement: 嶽, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4348}}
  - {type: variant, offset: 11, length: 2, content: 峙確, SBCK: 三塗陽城太室九州之險而不一姓冀之北土馬之􅀁産古無典國夫恃險憑危不階曆數而能􅀓國垂丗所未有也故公孫劉氏以敗扵前而諸李踵之覆亡扵後天人之際存亡之術可以爲永鑒也干運犯曆破家䘮國可以爲京觀也今齊之國志貫之一揆同見不臣􅀁以防狂狡杜姧􅎯以崇春秋敗絶之道也而顯賢能著治亂亦以爲奨勸也其序曰先王經畧萬國剖分厥甸巴梁式象懸辰九俊述職賦政以均佐周斃紂相漢亡秦寔繁其民丗載其俊述巴蜀志苐一維天有漢鑒亦有光實司羣望表我華陽炎劉是應洪祚攸長述漢中志苐二井絡啓耀文昌􅆻符茫茫禹績畫爲九州功冐普天率土以休光靈遐照慶祚爽流邦家濟濟丗德球球述蜀志苐三蠢爾南域在彼要􅂽漢武德振蠻貃是攘開州列郡幽裔來王柔逺能邇實須才良甄德表失以眀紀綱述南中志苐四赤德中微臣猾干篡白虜乘釁致民塗炭爰迄靈獻皇極不建牧后失國英雄迭進覆車齊軌䝉此艱難述公孫劉二牧志苐五政去王室權流二桀􅀲分天壤宰割民物舍彼信順任此智計大道旣􅀮詭詐競設竝以豪捋力爭當丗居正慮眀名號絶替身兼萬乗籍同列國述劉先主志苐六乾坤渾始􅀣君立王天工人代萬邦是望眀不二日地不二皇苟非其噐窮高必亢􅄥􅄥後主弗慮弗臧負乘致冦丗業以䘮述劉後主志苐七陽升三九品物始亨帝紘失振任非其良趙倡􅍔階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀冗􅀺顧瞻靡望述大同志苐八素精南飄天維㢮綱薨薨特流肆其豺狼蕩雄纂承殱我益梁牧守顛摧黔首辛嘗三州毁曠攸然以􅂽絡結王罔民亦流亡述李特䧺期夀􅀔志苐九華嶽降精江漢吐靈濟濟多士命丗克生德爲丗儁幹爲時貞略舉士女表諸賢朙丗濟其美不隕其名述先賢士女揔讚論苐十皇皇大晉下土是覆化澹教洽誕兹彦茂峨峨俊乂亹亹英秀如嶽之崇如蘭之臭經德秉哲綽然有􅁉述後賢志苐十一博考行故揔厥􅃇聞班序州部區别山川憲章成敗旌照仁賢抑絀虚妄紏正謬言顯善懲惡以杜未然述序志苐十二駟牡騤騤萬馬龍飛陶然斯猶阜㑹京畿麏􅀗西守鹿從東麋郇伯勞之旬不接辰甞兹珍嘉甘心庻㡬中爲令徳一行可師璝瑋倜儻貴韜光輝據冲體正平揖宣尼導以禮樂教洽化齊木訥剛毅有威有懐鏘鏘宫懸磬筦諧諧金奏石拊降福孔皆揔括道檢揔覽幽微選賢與能人逺}
