  - {type: variant, offset: 66, length: 3, content: 鳳備禮, SBCK: 平字子均宕渠人果壯左􅀅軍宕渠侯句扶字孝興漢昌人見王平傳􅀅略盪冦􅀅軍關内侯張嶷字伯岐南充國人也尚書僕射姚伷字子緒閬中人見楊義􅀓諸葛故事也别駕從事馬勲字盛衡閬中人見季漢軸臣傳尚書馬參字承伯閬中人見蜀書越嶲太守龔禄字德緒安漢人父諶犍爲太守見巴紀鎭軍􅀅軍龔皦字徳德禄弟也徴士譙字榮始西充國人也周父淵通散􅀐常侍城陽亭侯譙周字􅁢南大夫子在劉氏光禄右二十三人在劉氏三國之丗馬妙祈妻義貞烈趙雲君妻華貞烈王元憒妻􅁎人貞烈已上皆閬中趙璝妻􅁎節烈宕渠人童女趙英璝女趙萬妻娥宕渠人耿秉妾行安漢人鮮尼母姜安漢人右八人烈女右巴郡凡士女七十八人八人女士七十人道德三老楊統字仲通新都人也曽祖仲續祁令父春卿爲公孫述将光禄大夫楊博字仲逹統長子文學侍中楊序字仲桓謚曰文父博弟高士冦懽字文儀綿竹人序弟子也高士昭約字節宰雒人也序弟子二人見序傳術藝使持節交州牧楊宣字君緯什邡人學士嚴象廣漢人宣弟子也大儒趙翹廣漢人宣弟子也烏丸校尉郭堅雒人也善績司􅀠校尉郭賀字喬卿堅孫永昌太守鄭純字長伯郪人也文學高士王祐字平仲郪人也弟灌有文才而不悉行事也文才樂安相李尤字伯仁雒人也尚書郎李􅂶尤孫也文才東觀郎李勝字茂通雒人也尤傳公亮將作大匠翟酺字超雒人}
