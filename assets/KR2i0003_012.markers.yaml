  - {type: variant, offset: 131, length: 0, content: '', SBCK: 令杜撫字􅅩和資中人也義士新都令趙敦字建侯武陽人也孝士尚書郎隗相字􅅩通􅈎道人也吕孟南安人不詳其事呉順字􅅩和僰道人學士韓子方僰道人張貞之師學士謝襃南安人見張鉗傳右二十四人在漢丗政事蜀郡太守関内侯楊洪字季休武陽人固率諌議大夫費詩字公舉南安人忠正車􅀐將軍都亭侯張翼字伯恭武陽人綱後也文學五官中郎將伍梁字德山南安人文才射聲校尉楊義字文然武陽人右五人在劉氏丗從事賈龍不悉其事不録漢中太守楊文方妻陽􅁎武陽人相登妻周度僰道人也曹禁字敬􅁎南安人周紀妻也程貞玫字瑗玉牛鞞人資中張惟妻也尹仲讓妻韓姜僰道人也儀成妻謝􅁎南安人也趙媛姜資中人趙盛道妻也張貞妻黄帛僰道人也楊進武陽人廣漢王愽妻右九人列女右犍爲郡士女凡}
