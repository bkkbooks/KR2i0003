  - {type: variant, offset: 18, length: 2, content: 真褒, SBCK: 也徐州刺史任愷字文悌昉弟也文學侍中漢五更張覇字伯饒謚曰文父成都人也聘士張楷字公超文父子也聘士張光超公超弟也尚書張陵字處沖公超子自陵之後世有大官義士趙定成都人以延仁赴義濟窮恤乏爲業保貴太尉司徒司空特進厨亭文侯趙戒字志伯定子文學國師太常趙典字仲經戒苐二子也忠亮太尉司徒郫恵侯趙謙字彦信侯不顯戒孫也其子孫襲厨亭道德司徒司空趙温字子柔謙弟自是後丗有二千石義烈侍中長水校尉常洽字茂尼江原人見趙温傳道德侍御史常詡字孟元江原人在趙太尉公耆舊傳述作謁者㒒射何英字􅅩俊郫人也作漢德春秋經治犍爲屬國何汶字景由英孫也髙士楊由字哀侯成都人見後漢方術傳篤􅋢高士侯祈字升伯繁人文父楊序弟子篤􅋢博士楊珏字仲桓成都人何萇弟子公府辟士羅衡字仲伯郫人亦萇弟子也至孝孝廉禽堅字孟由成都人推賢美陽令桞宗字伯騫成都人也求次方王仲曽張􅅩遼殷知孫郡守失其官名並蜀人伯騫􅀁㧞皆致匡正治中從事張充字伯春江原人匡正司空辟士李幾字孟元江原人也猛略部從事楊竦字子恭成都人也子統爲二千石失其官守憲陳湛字小伯成都人節士仲圼成都人也高士王廣不徃曰吾不能復辨敢當丗榮利也皓子也父爲公孫述􅀁聘自刎廣逃匿述破後郡及州命察舉皆仁義志士任末字􅅩本繁人也烈士嚴道主簿李磬字文寺嚴道人也永昌太守王伉成都人見蜀書右八人在劉氏丗五更張覇夫人司馬敬司成都人也公乗㑹婦張氏廣都人也犍爲楊鳳珪妻陳助臨卭人也廣漢便敬賓婦常元常江原人廣都令常良女也殷氏婦常靡常江原人常仲山女也趙侯夫人常紀常江原人常常侍女景竒妻羅貢郫人羅倩女也趙憲妻何玹郫人也朱􅅩賢妻張昭儀繁人也廣柔長姚超二女姚妣饒郫人也廣漢王遵妻張􅅩紀覇女孫也右十一人烈女右蜀郡士女七十四人十一人女六十三人士朙畧渡􅃆侯范目閬中人文學聘士洛下宏字長公閬}
  - {type: page-break, offset: 18, content: '', id: KR2i0003_SBCK_012-8a}
  - {type: page-break, offset: 18, content: '', id: KR2i0003_SBCK_012-8b}
