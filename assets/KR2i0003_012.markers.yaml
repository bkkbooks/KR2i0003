  - {type: variant, offset: 6777, length: 0, content: '', krp: 九十三人士公七人大將軍二十二人侯二十人卿佐十四人侍中七人尚書五人司隷校尉六人州刺史十三人郡守}
  - {type: variant, offset: 6781, length: 4, content: 而已後賢, SBCK: 國師三人光禄大夫四人尚書郎十二人中書郎􅀅御史六人公車令諌議太中十一人公府辟士八人高士一人聘士七人徴士四人節士四人烈女四十七人益梁寧三州三國兩晉以來人士目録添立目録眀略大司農西城公何攀字恵興郫人清秀大長秋夀良字文㳤成都人也果烈西河太守栁隠字休然成都人也益梁二州都􅇂杜禎成都人也都􅇂度支巴東太守栁伸字雅厚成都人也德行江陽太守何隨字季業郫人令德犍爲太守杜軫字超宗成都人也犍爲太守杜烈字仲武軫弟建寧太守杜良字㓜倫益州刺史杜毗字長基德行給事中任熈字伯逺成都人也涪陵太守任蕃字憲祖熈子義正郫令常勗字修業江原人也州都常忌字茂通勗從弟也令才太史令高玩字伯珍江原人也温才湘東太守常騫字季㤗愼江原人也述作武平太守常寛字㤗恭騫從弟也使持節西夷校尉張岐字紹茂成都人也征西將軍西夷校尉益州刺史王異字彦眀成都人也勇略雍州刺史南中郎􅀅重安開國侯李陽字文􅅩郫人征虜􅀅軍廣漢梓潼太守楊謙字令志成都人也右}
