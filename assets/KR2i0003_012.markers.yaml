  - {type: variant, offset: 2018, length: 281, content: 儀准李燮字德公太尉固子也父死時二兄亦死燮為姊所遣隨父門生王成亡命徐州傭酒家酒家知非常人以女妻之延熹二年梁冀誅後日經陽道暈五車史官上書昔有大星升漢而西捲舌揚芒迫月熒惑犯帝座則有大臣枉誅星在西方大尉固應之今暈如之宜有赦命錄其遺嗣以除此異於是下赦燮得返舊四府並辟公車徵議郎與趙元珪潁川賈偉節荀慈明南陽張伯慎為友伯慎為潁川太守與慈明交相論言偉節與焉京師以為臧否伯慎問趙元珪曰德公所言何元珪曰無言也伯慎追嘆曰當如德公兒輩徒靡沸耳慈明亦寤而心變拜安平相王為黃巾所沒得出天子復封之燮以為不可果敗遷京兆尹時人為之語曰李德公父不欲立帝子不欲立王伯臺處諫帥言亢盡末命防萌妙覩玄揆陳雅, SBCK: 㤗}
