  - {type: variant, offset: 39, length: 0, content: '', SBCK: 正侍中譙隆字伯司閬中人也髙清太中大夫譙􅀇字君黄閬中人也潔白尚書郎譙瑛􅀇子也以易授}
  - {type: page-break, offset: 39, content: '', id: KR2i0003_SBCK_012-11a}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 正為三公王莽簒位憚而殺之潁川太守何顯武弟也兄弟五人皆在漢書武子况嗣武侯王莽時廢黄門侍郎鄧通蜀人}
  - {type: page-break, offset: 39, content: '', id: KR2i0003_WYG_012-9a, image: WYG0463/WYG0463-0289a.png}
  - {type: variant, offset: 39, length: 0, content: '', krp: 正侍中譙隆字伯司閬中人也髙清太中大夫譙玄字君黄閬中人也潔白尚書郎譙瑛玄子也以易授}
  - {type: variant, offset: 40, length: 5, content: 愛敬天下之, SBCK: 眀帝公車令趙珜字孫眀閬中人也公府掾趙毅字仲都珜子也公車令臧太伯宕渠人也見珜傳雋才凉州刺史趙宏字温柔閬中人也右十三人前漢政事揚州刺史嚴遵字王思閬中人也徐州牧嚴羽字子翼王思子也長安令王偉卿王思友見王思傳政事大司農玄賀字文和宕渠人也將畧大鴻臚龎雄字宣孟宕渠人也政事幽州刺史馮煥宕渠人也朙略使持節車􅀐將軍馮緄字鴻卿煥子降虜都尉馮元字公信緄弟尚書郎馮遵字文衡元子政事司􅀠校尉陳禪字紀山安漢人漢中太守陳澄禪子别駕從事陳實字盛先澄孫也與王文表爲友思防治中從事楊仁字文義閬中人也志士荆州刺史龔調字􅅩侯安漢人也忠貞魏郡太守趙晏字平仲安漢人也籌畫益州太守李顒字德卬墊江人也漢書及巴耆􅃇也汝南太守謁煥字闕江州人也見汝南紀度遼將軍桂陽太守然温字闕江州人見巴耆舊傳美化越嶲太守張翕字􅅩陽安漢人也越嶲太守張璊翕子也太守三堂察舉孝廉}
  - {type: page-break, offset: 40, content: '', id: KR2i0003_SBCK_012-11b}
  - {type: page-break, offset: 40, content: '', id: KR2i0003_SBCK_012-12a}
