  - {type: variant, offset: 0, length: 181, content: 卷第四南中志寧州晉泰始六年初置蜀之南中諸郡庲降都督治也南中在昔蓋夷越之地滇濮句町夜郎葉榆桐師巂唐侯王國以十數編髮左衽隨畜遷徙莫能相雄長周之季世楚威王遣將軍莊蹻泝沅水出且蘭以伐夜郡植䍧柯繫船於是且蘭既克夜郎又降而秦奪楚黔中地無路得反遂留王滇池蹻楚莊王苗裔也以䍧柯繫船因名且蘭為䍧柯國分侯支黨傳數百年秦并蜀通五尺道置吏主之漢興遂不賓有竹王者興於遯水有一女子浣於水濱有, SBCK: ''}
