body:
  text: 卷第七劉後主志後主諱禪字公嗣先主太子甘夫人所生也襲位時年十七建興元年夏五月後主即位尊皇后吳氏曰皇太后大赦改元於魏黃初四年吳黃武二年也立皇后張氏車騎將軍飛女也封丞相亮武鄉侯中都護李嚴假節加光祿勳封都鄉侯督永安事中軍師衛尉魯國劉琰亦都鄉侯中護軍趙雲江州都督費觀屯騎校尉丞相長史王連中部督襄陽向寵及魏延吳懿皆封都亭侯楊洪王謀等關內侯南中諸郡並叛亂亮以新遭大喪未便加兵遣尚書南陽鄧芝固好於吳吳主孫權曰吾誠願與蜀和親但主幼國小慮不自存芝對曰吳蜀二國之地吳有三江之阻蜀有重險之固大王命世之英諸葛一時之桀合此二長共為脣齒進可兼并天下退可鼎足而峙大王如臣服於魏魏則上望大王入朝其次求太子入侍若其不從則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也吳主大悅與蜀和報使聘歲通芝後纍往權曰若滅魏之後二主分治不亦樂乎芝對曰滅魏之後大王未深識天命者戰爭方始耳權曰君之誠懇乃至於此書與亮曰丁宏掞張陰化不實和合二國惟有鄧芝二年丞相亮開府領益州牧事無巨細咸決於亮亮乃撫百姓示儀軌約官職從權制盡忠益時者雖仇必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋遊辭巧飾者雖輕必戮善無微而不賞惡無纖而不貶庶事精練物究其本循名責實虛僞不齒終乎封域之內畏而愛之刑政雖峻而無怨者以其用心平勸戒明也辟尚書郎蔣琬及廣漢李邵巴西馬勳為掾南陽宗預為主簿皆德舉也秦宓為別駕犍為五梁為功曹梓潼杜微為主簿皆州俊彥也而江夏費褘南郡董允郭攸之始為侍郎贊揚日月吳遣中郎將張溫來聘報鄧芝也將返命百官餞焉惟秦宓未往亮纍催之溫問曰彼何人也亮曰益州學士也及至溫問宓曰君學乎答曰五尺童子皆學何況小人溫曰天有頭乎宓曰有之溫曰在何方也宓曰詩云乃眷西顧知其在西又曰天有耳乎宓曰詩不云乎鶴鳴九皋聲聞于天若其無耳何以聽之又曰天有足乎曰詩不云乎天步艱難之子不猶若其無足何以步之又曰天有姓乎曰姓劉何以知之曰其子姓劉又曰日生於東乎曰雖生於東終沒於西答問如響之應聲溫大敬服宓亦尋遷右中郎將長水校尉大司農三年春長水校尉廖立坐謗訕朝廷改徙汶山立自荊州與龐統並見知而性傲悔後更冗散怨望故致黜廢三月亮南征四郡以宏農太守楊儀為參軍從行步兵校尉襄陽向朗為長史統留府事秋南中平軍資所出國以富饒冬亮還至漢陽與魏降人李鴻相見說新城太守孟達委仰於亮無已亮方北圖欲招達為外援謂參軍蔣琬從事費詩曰歸當有書與子度相聞對曰孟達子小昔事振威不忠後奉先帝背叛反覆之人何足與書亮不答詩數率意而言故淩遲於世十有二月亮至群官皆道迎而亮命侍郎費褘參乘褘官小年幼衆士於是莫不易觀四年永安都督李嚴還督江州城巴郡大城以征西將軍汝南陳到督永安封亭侯是歲魏文帝崩明帝立五年魏太和元年也春丞相亮將北伐上疏曰今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者咸追先帝之遇欲報之陛下也先帝以臣謹慎故臨崩寄臣以大事受命以來夙夜憂歎故五月渡瀘深入不毛今南方已定兵甲已足當帥獎三軍北平中原庶竭駑鈍攘除姦凶克復漢室還於舊都此臣所以報先帝而忠於陛下願陛下託臣以討賊興復不效則治臣之罪以告先帝之靈陛下亦宜自謀咨諏善道察納雅言不宜引喻失誼以塞忠諫之路也又曰親賢臣遠小人先漢所以興隆昵小人疏君子後漢所以傾覆侍中郭攸之費褘侍郎董允先帝𥳑拔以遺陛下斟酌規益進盡忠言則其任也宮省之事悉以咨之必能裨補闕漏有所廣益也以尚書南陽陳震為尚書令治中張裔為留府長史與參軍蔣公琰知居府事二月亮出屯漢中營沔北陽平石馬以鎮北將軍魏延為司馬六年春丞相亮揚聲由斜谷道取郿使鎮東將軍趙雲中監軍鄧芝據箕谷為疑軍魏大將軍曹真舉衆當之亮身率大衆攻祁山賞罰肅而號令明天水南安安定三郡叛魏應亮關中響震魏明帝西鎮長安命張郃拒亮亮使參軍襄陽馬謖裨將軍巴西王平及張休李盛黃襲等在前違亮節度為郃所破平獨斂衆為殿而雲芝亦不利亮拔將西縣千餘家還漢中戮謖及休盛以謝衆奪襲兵貶雲秩長史向朗以不時臧否免罷超遷平參軍進位討寇將軍封亭侯統五部亮上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違令之闕箕谷不戒之失咎皆在臣臣授任無方春秋責帥職臣是當請自貶三等以督厥咎於是以亮為右將軍行丞相事辟天水姜維為倉曹掾加奉義將軍封當陽亭侯亮書與長史張裔參軍蔣琬稱維曰姜伯約西州上士馬季常李永南不如也冬亮復出散關圍陳倉糧盡還魏將王雙追亮亮合戰斬雙七年春丞相亮遣護軍陳式攻武都陰平魏雍州刺史郭淮出將擊式亮自至建威淮退遂平二郡後主詔策亮曰街亭之敗咎由馬謖而君引愆深自抑損重違君意聽順所守前年耀師馘斬王雙今歲爰征郭淮遁走降集氐羌興復二郡威震凶暴功勳赫然復君丞相君其無辭夏四月吳主孫權稱尊遣衛尉陳震慶問吳與蜀約分天下冬城漢樂八年春丞相亮以參軍楊儀為長史加綏軍將軍遷姜維護軍征西將軍秋魏大將軍司馬宣王由西城征西車騎將軍張郃由子午大司馬曹真由斜谷三道將攻漢中丞相亮軍成固表進江州都督李嚴驃騎將軍將二萬人赴漢中嚴初求以五郡為巴州書告亮言魏大臣陳群司馬懿並開府亮乃加嚴中都護以嚴子豐為江州都督大雨道絶真等還丞相亮以當西征因留嚴漢中署留府事嚴改名平丞相司馬魏延將軍吳懿西入羌中大破魏後將軍費曜雍州刺史郭淮於陽溪延遷前軍師征西大將軍封南鄭侯懿左將軍高陽鄉侯徙魯王永為甘陵王梁王理為安平王皆以魯梁在吳分故也九年春丞相亮復出圍祁山始以木牛運參軍王平守南圍司馬宣王拒亮張郃拒平亮慮糧運不繼設三策告都護李平曰上計斷其後道中計與之持久下計還住黃土時宣王等糧亦盡盛夏雨水平恐漕運不給書白亮宜振旅夏六月亮承平指引退張郃至青封交戰為亮所殺秋八月亮還漢中平懼亮以運不辨見責欲殺督運岑述驚問亮何故來還又表後主言亮僞退亮怒表廢平為民徙梓潼奪平子豐兵以為從事中郎與長史蔣琬共知居府事時費褘為司馬也十年春丞相亮休士勸農車騎將軍劉琰與軍師魏延不和還成都秋旱亮練兵講武十一年魏青龍元年也丞相亮治斜谷邸閣運糧谷口十二年春丞相亮以流馬運從斜谷道出武功據五丈原與司馬宣王對於渭南亮每患糧不繼使志不伸乃分兵屯田為久住之基耕者雜於渭濱居民之閒百姓安堵軍無私焉秋八月亮疾病卒於軍時年五十四還葬漢中定軍山冢足容棺斂以時服諡曰忠武侯鎮西大將軍魏延與長史楊儀素不和亮既恃延勇猛又惜儀籌畫不能偏有所廢常恨恨之為作甘戚論二子不感延常舉刃擬儀儀涕淚交流惟護軍費褘和解中閒終亮之世盡其器用儀欲案亮成規將喪引退使延斷後姜維次之延怒舉軍先歸南鄭各相表反留府長史蔣琬侍中董允保儀疑延延欲逆擊儀儀遣平北將軍馬岱討滅延初延自以武幹常求將數萬別行依韓信故事亮不許以亮為怯及儀將退使費褘造延延曰公雖亡吾見在當率衆擊賊豈可以一人亡廢國家大事乎使褘報儀不可故欲討儀儀帥諸軍還成都大赦以吳懿為車騎將軍假節督漢中事初亮密表後主以儀性狷狹若臣不幸可以蔣琬代臣於是以琬為尚書令總統國事以儀為中軍師司馬費褘為後軍師征西姜維為右監軍輔漢將軍鄧芝前軍師領兗州刺史張翼前領軍並典軍政廖立在汶山聞亮卒垂泣曰吾終為左衽矣李平亦發病死初立平為亮所廢安奄沒齒常冀亮當自補復策後人不能故感憤焉十三年拜尚書令蔣琬為大將軍領益州刺史以費褘為尚書令時新喪元帥遠近危悚琬超登大位既無戚容又無喜色衆望漸服侍郎董允兼虎賁中郎將統宿衛兵軍師楊儀自以年宦在琬前雖同為參軍長史已常征伐勤苦更處琬下書怨望謂費褘曰公亡際吾當舉衆降魏處世寧當落度如此耶褘表其言廢徙漢嘉儀又上書激切遂行儀重辟吳以亮之卒也增巴丘守萬人蜀亦益白帝軍右中郎宗預使吳吳主曰東之與西共為一家何以益白帝守預對曰東增巴丘之戍蜀益白帝之兵俱事勢宜然不足以相問也十四年夏四月後主西巡至湔山坂觀汶川之流武都氐王符健請降將軍張尉迎之過期不至大將軍琬憂之牙門將巴西張嶷曰健求附款至必無返滯聞健弟狡不能同功各將乖離是以稽耳健弟果叛就魏健率四百家隨尉居廣都縣十五年魏景初元年也夏六月皇后張氏薨諡曰敬哀是歲車騎將軍吳懿卒以後典軍安漢將軍王平領漢中太守代懿督漢中事懿從弟班漢大將軍何進官屬吳匡之子也名常亞懿官至驃騎將軍持節綿竹侯時南郡輔匡元弼劉雍南和官亦至鎮南將軍潁川袁綝南郡高翔至大將軍綝征西將軍延熙元年春正月立皇后張氏敬哀皇后妹也大赦改元立子璿為太子瑤為安定王以典學從事巴西譙周為太子家令梓潼李撰為僕皆名儒也冬十二月大將軍琬出屯漢中更拜王平以前護軍署大將軍府事尚書僕射李福為前監軍領大將軍司馬二年春三月進大將軍琬大司馬開府辟治中從事犍為楊羲為東曹掾羲性𥳑琬與言時不應答群吏以為慢琬曰夫人心不同各如其面面從後言古人所戒羲欲贊吾是耶則非本心欲反吾言也則顯吾之非是以默然此羲之快也督農楊敏常毀琬作事憒憒誠非及前人也或以白琬琬曰吾信不如前人主者白乞問憒憒狀琬曰苟其不如則憒憒矣復何問也後敏坐事下獄人以為必死琬心無適莫是以上下輯睦歸仰於琬蜀猶稱治輔漢將軍姜維領大司馬司馬西征入羌中是歲魏明帝崩齊王即位三年魏正始元年也安南將軍馬忠率越巂太守張嶷平越巂郡四年冬十月尚書令費褘至漢中與大司馬琬咨論事計歲盡還五年春正月姜維還屯涪縣大司馬琬以丞相亮數入秦川不克欲順沔東下征三郡朝臣咸以為不可安南將軍馬忠自建寧還朝因至漢中宣詔旨於琬琬亦連疾動輟計遷忠鎮南大將軍封彭鄉亭侯六年大司馬琬上疏曰臣既暗弱加嬰疾疹奉辭六年規方無成夙夜憂慘今魏跨帶九州除之未易如東西掎角但當蠶食然吳期二三連不克果輒與費褘馬忠議以為涼州胡塞之要宜以姜維為涼州刺史銜持河右今涪水陸四通惟急是赴東北之便應之不難冬十月琬還鎮涪以王平為鎮北大將軍督漢中事姜維鎮西大將軍涼州刺史十有一月大赦遷尚書令費褘大將軍録尚書事就遷江州都督鄧芝車騎將軍七年閏月魏大將軍曹爽征西將軍夏侯玄征蜀王平白與護軍零陵劉敏距興勢圍以大司馬琬疾病假大將軍褘節率軍自成都赴漢中旌旗啓路馬人擐甲羽檄交馳嚴鼓將發光祿大夫義陽來敏求共圍棊褘留意博奕色守自若敏曰聊試君耳君信可人必能辨賊者也比至爽等退命鎮南將軍馬忠平尚書事夏四月安平王卒子胤嗣秋九月褘還大司馬琬以病故讓州職於費褘董允於是褘加大將軍領益州刺史允加輔國將軍守尚書令允立朝正色處中上則匡主下帥群司於時蜀人以諸葛亮蔣費及允為四相一號四英宦人黃皓便僻佞慧畏允不敢為非後主欲採擇允曰妃后之數不可過十二允嘗與軍典義陽胡濟大將軍褘共期遊宴命駕將出郎中襄陽董恢造允修敬自以官卑少行求索去允曰本所以出者欲與同好遊談耳君以自屈方展闊積舍此就彼非所謂也命解驂止駕允之下士接物皆此類也君子以為有周公之德八年秋皇太后吳氏薨諡曰穆冬十有一月大將軍褘行軍漢中九年夏六月褘還成都秋大赦司農孟光衆責褘曰夫赦者偏枯之物非明世之所宜有也今主上賢仁百寮稱職有何旦夕之急數施非常之恩以惠奸軌之惡上犯天時下違人理豈具瞻之高美所望於明德哉褘但顧謝焉初丞相亮時有言公惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成閒每見啓告治亂之道備矣曾不語赦也若景升季玉父子歲歲赦宥何益於治故亮時軍旅屢興赦不妄下也自亮沒後茲制遂虧蜀初闕三司之位以待天下賢人其卿士皆勳德融茂太常杜瓊學通行修衛尉陳震忠惇篤粹孟光亮直著聞皆良幹也但光好指擲利病大長秋南陽許慈普記性光祿來敏舉措不慎失執事者指當世美名不及特進太常廣漢談承光祿勳河東裴雋也其朝臣尚書巴西馬齊義陽胡博僕射巴西姚胄侍中汝南陳祗並讚事業以故丞相長史向朗為左將軍朗自去長史優遊無事乃鳩合經籍開門誘士講論古義不預世務是以上自執事下及童冠莫不宗敬焉冬十有一月大司馬琬卒諡曰恭侯尚書令董允亦卒超遷蜀郡太守南陽呂乂為尚書令進姜維為衛將軍與大將軍褘並録尚書事維出隴西與魏將郭淮夏侯霸戰剋之十年涼州胡王白虎文治無戴等率衆降衛將軍維徙之繁縣汶山平康夷反維復討平之過見廖立意氣自若維還假節十一年鎮北將軍王平卒以中監軍胡濟為驃騎將軍假節領兗州刺史代平督漢中事平始出軍武不大知書性警朗有思理與馬忠並垂事績平同郡勾扶亦果壯亞平官至左將軍封宕渠侯後張翼與襄陽廖化並為大將故時人為語曰前有何句後有張廖平本養外家何氏後復姓夏五月大將軍褘出屯漢中十二年魏嘉平元年也魏誅大將軍曹爽右將軍夏侯霸來降淵子也拜車騎將軍四月大赦秋衛將軍維出雍州不克將軍勾安李韶降魏十三年衛將軍維復出西平不克而還十五年吳主孫權薨子亮立來告赴如古義也立子琮為西河王命大將軍褘開府尚書令呂乂卒以侍中陳祗守尚書令加鎮軍將軍十六年春正月朔魏降人郭修因賀會手刃殺大將軍費褘於漢壽諡曰敬侯褘當功名略與蔣琬比而任業相繼雖典戎於外慶賞刑威咸咨於己承諸葛之成規因循不革故能邦家和一自褘歿後閹宦秉權衛將軍維自負才兼文武加練西方風俗謂自隴以西可制而有褘常裁制至是無褘屢出師旅功績不立政刑失錯矣四月維將數萬攻南安魏雍州刺史陳泰救之維糧盡還十七年魏正元元年也春衛將軍維督中外軍事大赦夏六月維復出隴西魏狄道長李𥳑舉縣降維圍襄武魏大將徐質救之維拔狄道河關臨洮三縣民入蜀居於綿竹及繁是歲魏帝齊王廢高貴鄉公即位十八年春衛將軍維復議出征征西大將軍張翼廷爭以小國不宜黷武維不聽夏率車騎將軍夏侯霸及翼出狄道大破魏雍州刺史王經於洮西經衆死數萬經退保狄道城翼曰可矣不宜進或毀此成功為蛇畫足維必進魏征西將軍陳泰救狄道維退駐鍾題十九年魏甘露元年也春進衛將軍姜維為大將軍秋八月維復出天水至上邽鎮西大將軍胡濟失期不至大為魏將鄧艾所破死者衆士庶由是怨維而隴以西亦無寧歲冬維還謝過引負求自貶削於是以維為後將軍行大將軍事立子瓚為新平王大赦二十年春大赦魏征東大將軍諸葛誕以淮南叛連吳魏分關中兵東下後將軍姜維復從駱谷出長城軍芒水與魏大將司馬望鄧艾相持景耀元年維以誕破退還成都復拜大將軍史官言景星見大赦改元宦人黃皓與尚書令陳祗相表裏始豫政皓自黃門丞至今年為奉車都尉中常侍姜維雖班在祗右權任不如蜀人無不追思董允者時兵車久駕百姓疲弊太中大夫譙周著仇國論言可為文王難為漢祖人莫察焉征北大將軍宗預自永安徵拜鎮軍將軍領兗州刺史以襄陽羅憲為領軍督永安事吳大臣廢其主亮立孫休來告難如同盟也大將軍維議以為漢中錯守諸圍適可禦敵不獲大利不若退據漢樂二城積穀堅壁聽敵入平且重關鎮守以禦之敵攻關不克野無散穀千里懸糧自然疲退此殄敵之術也於是督漢中胡濟卻守漢壽監軍王含守樂城護軍蔣斌守漢城又於西安建威武衛石門武城建昌臨遠皆立圍守二年夏六月立子諶為北地王恂為新興王虔為上黨王以征西張翼為左車騎將軍領冀州刺史廣武督廖化為右車騎將軍領并州刺史時南郡閻宇為右大將軍秋八月丙子領中護軍陳祗卒諡曰忠侯祗在朝上希主指下接閹宦後主甚善焉以僕射南鄉侯董厥為尚書令三年魏景初元年也秋九月追諡故前將軍關羽曰壯繆侯車騎將軍張飛曰桓侯驃騎將軍馬超曰威侯軍師龐統曰靖侯後將軍黃忠曰剛侯是歲魏帝高貴鄉公卒常道鄉公即帝位四年春三月追諡故將軍趙雲曰順平侯冬十月大赦拜丞相亮子武鄉侯瞻中都護衛將軍遷董厥輔國大將軍與瞻輔政以侍中義陽樊建守尚書令自瞻厥用事黃皓秉權無能正矯者惟建特不與皓和好往來而祕書令河南郤正與皓比屋周旋皓從微至著既不憎正又不愛之官不過六百石常免於憂患五年春正月西河王琮卒大將軍維惡皓之恣擅啓後主欲殺之後主曰皓趨走小臣耳往者董允切齒吾常恨之君何足介意維本羈旅自託而功效無稱見皓枝附葉連懼於失言遜辭而出後主敕皓詣維陳謝維說皓求沓中種麥以避內逼皓承白後主秋維出侯和為魏將鄧艾所破還駐沓中皓協比閰宇欲廢維樹宇故維懼不敢還六年春魏相國晉文王命征西將軍鄧艾鎮西將軍鍾會雍州刺史諸葛緒益州刺史師纂五道伐蜀大將軍姜維表後主求遣左右車騎張翼廖化督諸軍分護陽安關口及陰平橋頭黃皓信巫鬼謂敵不來啓後主寢其事群臣不知夏艾將入沓中會將向駱谷蜀方聞之遣張翼董厥為陽安關外助廖化為維援繼大赦改元炎興比至陰平聞諸葛緒向建威故待月餘維為鄧艾所摧還陰平鍾會圍樂城遣別將攻關守將蔣舒開門降都督傅僉奮戰而死冬會以樂城不下徑長驅而前翼厥之至漢壽也維化捨陰平還保劍閣拒會會不能剋糧運懸遠議欲還而鄧艾由陰平景谷傍入後主又遣都護諸葛瞻督諸軍距艾至涪不進尚書郎黃崇權子也勸瞻速行固險無令敵得入坪言至流涕瞻不從前鋒已破艾徑至涪瞻退保綿竹艾書誘瞻曰若降者必表封琅琊王瞻怒殺艾使戰於綿竹瞻軍敗績瞻臨陳死崇及羽林督李球尚書張遵皆必死沒命瞻長子尚歎曰父子荷恩不早斬黃皓以致敗國殄民用生何為乃驅馬赴魏軍而死百姓聞艾入坪驚迸山野後主會群臣議欲南入七郡或欲奔吳光祿大夫譙周勸降魏魏必裂土封後主後主從之遣侍中張紹駙馬都尉鄧良齎璽綬奉箋詣艾降北地王諶恚憤殺妻子而後自殺艾至成都後主輿櫬面縛銜璧迎之艾親釋其縛受其璧焚其櫬承制拜驃騎將軍使止其宮執黃皓將殺之受賄而赦之諸圍守皆奉後主敕令乃下姜維未知後主降謂且固城素與執政者不平欲使其知衛敵之難而後逞志乃回由巴西出郪五城會被後主手令乃投戈釋甲詣鍾會降於涪軍士莫不奮激以刃斫石明年春正月會構艾檻車見徵會圖異計奇維雄勇還其節蓋本兵謂長史杜預曰姜伯約比中州名士夏侯太初諸葛公休不如也鄧艾亦謂蜀人曰姜維雄兒也會維出則同車坐則同席將至成都稱益州牧以叛恃維牙爪欲遣維為前將軍伐中國維既失策又知會志廣教會誅北諸將諸將既死徐欲殺會盡坑魏兵還後主密書通後主曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明魏太后崩會命諸將發喪因欲誅之諸將半入而南安太守胡烈等知其謀燒成都東門以襲殺會及維張翼後主太子璿等軍衆抄掠數日乃定三月後主舉家東遷洛陽丁亥封安樂縣公食邑萬戶賜絹萬匹奴婢百人他物稱此弟兄子孫為三都尉侯者五十餘人以譙周全國濟民封城陽亭侯祕書令郤正舍妻子隨侍後主相導威儀封關內侯於是尚書令樊建殿中督張通侍中張紹亦封侯劉氏凡得蜀五十年正稱尊號四十三年蜀郡太守王崇論後主曰昔世祖內資神武之大才外拔四屯之奇將猶勤而獲濟然乃登天衢車不輟駕坐不安席非淵明弘鑒則中興之業何容易哉後主庸常之君雖有一亮之經緯內無胥附之謀外無爪牙之將焉可包括天下也又曰鄧艾以疲兵二萬溢出江油姜維舉十萬之師案道南歸艾為成禽禽艾已訖復還拒會則蜀之存亡未可量也乃回道之巴遠至五城使艾輕進徑及成都兵分家滅已自招之然以鍾會之知略稱為子房姜維陷之莫至剋揵籌笇相應優劣惜哉愚以為維徒能謀一會不慮窮兵十萬難為制御美意播越矣撰曰諸葛亮雖資英霸之能而主非中興之器欲以區區之蜀假已廢之命北吞強魏抗衡上國不亦難哉似宋襄求霸者乎然亮政修民理威武外振爰迄琬褘遵修弗革攝乎大國之閒以弱為強猶可自保姜維才非亮匹志繼洪軌民嫌其勞家國亦喪矣
