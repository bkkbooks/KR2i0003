body:
  text: 卷第一巴郡昔在唐堯洪水滔天鯀功無成聖禹嗣興導江疏河百川蠲修封殖天下因古九囿以置九州仰稟參伐俯壤華陽黑水江漢為梁州厥土青黎厥田惟下上厥賦惟下中厥貢璆鐵銀鏤砮磬熊羆狐狸織皮於是四隩既宅九州攸同六府孔修庶土交正底慎財賦成貢中國蓋時雍之化東被西漸矣歷夏殷周九州牧伯率職周文為伯西有九國及武王克商并徐合青省梁合雍而職方氏猶掌其地辨其土壤甄其貫利迄於秦帝漢興高祖藉之成業乃改雍曰涼革梁曰益故巴漢庸蜀屬益州至魏咸熙元年平蜀始分益州巴漢七郡置梁州治漢中以相國參軍中山耿黼為刺史元康六年廣魏梁州更割雍州之武都陰平荊州之新城上庸魏興以屬焉凡統郡一十一縣五十八洛書曰人皇始出繼地皇之後兄弟九人分理九州為九囿人皇居中州刺八輔華陽之壤梁岷之域是其一囿囿中之國則巴蜀矣其分野輿鬼東井其君上世未聞五帝以來黃帝高陽之支庶世為侯伯及禹治水命州巴蜀以屬梁州禹娶於塗山辛壬癸甲而去生子啓呱呱啼不及視三過其門而不入室務在救時今江州塗山是也帝禹之廟銘存焉會諸侯於會稽執玉帛者萬國巴蜀往焉周武王伐紂實得巴蜀之師著乎尚書巴師勇鋭歌舞以淩殷人前徒倒戈故世稱之曰武王伐紂前歌後舞也武王既克殷以其宗姬封於巴爵之以子古者遠國雖大爵不過子故吳楚及巴皆曰子其地東至魚復西至僰道北接漢中南極黔涪土植五穀牲具六畜桑蠶麻紵魚鹽銅鐵丹漆茶蜜靈龜巨犀山雞白雉黃潤鮮粉皆納貢之其果實之珍者樹有荔芰蔓有辛蒟園有芳蒻香茗給客橙蕟其藥物之異者有巴戟天椒竹木之璝者有桃支靈壽其名山有塗籍靈臺石書刊山其民質直好義土風敦厚有先民之流故其詩曰川崖惟平其稼多黍旨酒嘉穀可以養父野惟阜丘彼稷多有嘉穀旨酒可以養母其祭祀之詩曰惟月孟春獺祭彼崖永言孝思享祀孔嘉彼黍既潔彼犧惟澤蒸命良辰祖考來格其好古樂道之詩曰日月明明亦惟其夕誰能長生不朽難獲又曰惟德實寶富貴何常我思古人令問令望而其失在於重遲魯鈍俗素朴無造次辨麗之氣其屬有濮賨苴共奴獽夷蛋之蠻周之仲世雖奉王職與秦楚鄧為比春秋魯桓公九年巴子使韓服告楚請與鄧為好楚子使道朔將巴客聘鄧鄧南鄙攻而奪其幣巴子怒伐鄧敗之其後巴師楚師伐申楚子驚巴師魯莊公十八年巴伐楚克之魯文公十六年巴與秦楚共滅庸魯哀公十八年巴人伐楚敗於鄾是後楚主夏盟秦擅西土巴國分遠故於盟會希戰國時嘗與楚婚及七國稱王巴亦稱王周之季世巴國有亂將軍有蔓子請師於楚許以三城楚王救巴巴國既寧楚使請城蔓子曰藉楚之靈克弭禍難誠許楚王城將吾頭往謝之城不可得也乃自刎以頭授楚使王嘆曰使吾得臣若巴蔓子用城何為乃以上卿禮葬其頭巴國葬其身亦以上卿禮周顯王時楚國衰弱秦惠文王與巴蜀為好蜀王弟苴侯私親於巴巴蜀世戰爭周慎王五年蜀王伐苴侯苴侯奔巴巴為求救於秦秦惠文王遣張儀司馬錯救苴巴遂伐蜀滅之儀貪巴苴之富因取巴執王以歸置巴蜀及漢中郡分其地為三十一縣儀城江州司馬錯自巴涪水取楚商於地為黔中郡秦昭襄王時白虎為害自秦蜀巴漢患之秦王乃重募國中有能煞虎者邑萬家金帛稱之於是夷胊忍廖仲藥何射虎秦精等乃作白竹弩於高樓上射虎中頭三節白虎常從群虎瞋恚盡搏煞群虎大詬而死秦王嘉之白虎歷四郡害千二百人一朝患除功莫大焉欲如約王嫌其夷人乃刻石為盟要復夷人頃田不租十妻不算傷人者論煞人雇死倓錢盟曰秦犯夷輸黃龍一雙夷犯秦輸清灑一鍾夷人安之漢興亦從高祖定亂有功高祖因復之專以射白虎為事戶歲出賨錢口四十故世號白虎復夷一曰板楯蠻今所謂弜頭虎子者也漢高帝滅秦為漢王王巴蜀閬中人范目有恩信方略知帝必定天下說帝為募發賨民要與共定秦秦地既定封目為長安建章鄉侯帝將討關東賨民皆思歸帝嘉其功而難傷其意遂聽還巴謂目曰富貴不歸故鄉如衣繡夜行耳徙封閬中慈鳧鄉侯目固辭乃封渡沔縣侯故世謂亡秦范三侯也復除民羅朴咱鄂度夕龔七姓不供租賦閬中有渝水賨民多居水左右天性徑勇初為漢前鋒陷陳鋭氣喜舞帝善之曰此武王伐紂之歌也乃令樂人習學之今所謂巴渝舞也天下既定高帝乃分巴蜀置廣漢郡孝武帝又兩割置犍為郡故世曰分巴割蜀以成犍廣也自時厥後五教雍和秀茂挺逸英偉既多而風謠旁作故朝廷有忠貞盡節之臣鄉黨有主文歌詠之音巴郡譙君黃仕成哀之世為諫議大夫數進忠言後違避王莽又不事公孫述述怒遣使齎藥酒以懼之君黃笑曰吾不省藥乎其子瑛納錢八百萬得免國人作詩曰肅肅清節士執德實固貞違惡以授命沒世遺令聲巴郡陳紀山為漢司隸校尉嚴明正直西虜獻眩王庭試之分公卿以為嬉紀山獨不視京師稱之巴人歌曰築室載直梁國人以貞真邪娛不揚目枉行不動身奸軌辟乎遠理義協乎民巴郡嚴王思為揚州刺史惠愛在民每當遷官吏民塞路攀轅詔遂留之居官十八年卒百姓若喪考妣義送者齎錢百萬欲以贍王思家其子徐州刺史不受送吏義崇不忍持還乃散以為食食行客巴郡太守汝南應季先善而美之乃作詩曰乘彼西漢潭潭其淵君子愷悌作民二親沒世遺愛式鏡後人漢安帝時巴郡太守連失道國人風之曰明明上天下土是觀帝選元后求定民安孰可不念禍福由人願君奉詔惟德日親永初中廣漢漢中羌反虐及巴郡有馬妙祈妻義王元憒妻姬趙蔓君妻華夙喪夫執共姜之節守一醮之禮號曰三貞遭亂兵迫匿懼見拘辱三人同時自沈於西漢水而沒死有黃鳥鳴其亡處徘徊焉國人傷之乃作詩曰關關黃鳥爰集於樹窈窕淑女是繡是黼惟彼繡黼其心匪石嗟爾臨川邈不可獲永建中泰山吳資元約為郡守屢獲豐年民歌之曰習習晨風動澍雨潤乎苗我后恤時務我民以優饒及資遷去民人思慕又曰望遠忽不見惆悵嘗徘徊恩澤實難忘悠悠心永懷孝桓帝時河南李盛仲和為郡守貪財重賦國人刺之曰狗吠何喧喧有吏來在門披衣出門應府記欲得錢語窮乞請期吏怒反見尤旋步顧家中家中無可為思往從鄰貸鄰人已言匱錢錢何難得令我獨憔悴漢末政衰牧守自擅民人思治作詩曰混混濁沼魚習習激清流溫溫亂國民業業仰前修其德操仁義文學政幹若洛下閎任文公馮鴻卿龐宣孟玄文和趙溫柔龔升侯楊文義等播名立事言行表世者不勝次載者也孝安帝元初三年涼州羌入漢中殺太守董炳擾動巴中中郎尹就討之不克益州諸將郡皆起兵禦之三府舉廣漢王堂為巴郡太守撥亂致治進賢達士貢孝子嚴永隱士黃錯名儒陳髦俊士張璊皆至大位益州刺史張喬表其尤異徙右扶風民為立祠孝桓帝以并州刺史泰山但望字伯闔為巴郡太守勤恤民隱郡文學掾宕渠趙芬掾弘農馮尤墊江龔榮王祈李溫臨江嚴就胡良文愷安漢陳禧閬中黃閶江州母成陽譽喬就張紹牟存平直等詣望自訟曰郡境廣遠千里給吏兼將人從冬往夏還夏單冬復惟踰時之役懷怨曠之思其婚喪吉凶不得相見解緩補綻下至薪菜之物無不躬買於市富者財得自供貧者無以自久是以清儉夭枉不聞加以水陸艱難山有猛獸思迫期會隕身江河投死虎口咨嗟之歎歷世所苦天之應感乃遭明府欲為更新童兒匹婦歡喜相賀將去遠就近釋危蒙安縣無數十民無遠邇恩加未生澤及來世巍巍之功勒於金石乞以文書付計掾史人鬼同符必獲嘉報芬等幸甚望深納之郡戶曹史枳白望曰芬等前後百餘人歷政訟訴未蒙感寤明府運機布政稽當皇極為民庶請命救患德合天地澤潤河海開闢以來今遇慈父經曰奕奕梁山惟禹甸之有倬其道韓侯受命比隆等盛於斯為美永興二年三月甲午望上疏曰謹按巴郡圖經境界南北四千東西五千周萬餘里屬縣十四鹽鐵五官各有丞史戶四十六萬四千七百八十口百八十七萬五千五百三十五遠縣去郡千二百至千五百里鄉亭去縣或三四百或及千里土界遐遠令尉不能窮詰姦凶時有賊發督郵追案十日乃到賊已遠逃蹤跡滅絶罪録逮捕證驗文書詰訊即從春至冬不能究訖繩憲未加或遇德令是以賊盜公行姦究不絶榮等及隴西太守馮含上谷太守陳弘說往者至有劫閬中令楊殷終津侯姜昊傷尉蘇鴻彭亭侯孫魯雍亭侯陳已殷侯樂普又有女服賊千有餘人布散千里不即發覺謀成乃誅其水陸覆害煞郡掾枳謝盛塞威張御魚復令尹尋主簿胡直若此非一給吏休謁往還數千閉囚須報或有彈劾動便歷年吏坐踰科恐失冬節侵疑先死如當移傳不能待報輒自刑戮或長吏忿怒冤枉弱民欲赴訴郡官每憚還往太守行桑農不到四縣刺史行部不到十縣郡治江州時有溫風遙縣客吏多有疾病地勢側險皆重屋纍居數有火害又不相容結舫水居五百餘家承三江之會夏水漲盛壞散顛溺死者無數而江州以東濱江山險其人半楚姿態敦重墊江以西土地平敞精敏輕疾上下殊俗情性不同敢欲分為二郡一治臨江一治安漢各有桑麻丹漆布帛魚池鹽鐵足相供給兩近京師榮等自欲義出財帛造立府寺不費縣官得百姓歡心孝武以來亦分吳蜀諸郡聖德廣被民物滋繁增置郡土釋民之勞誠聖主之盛業也臣雖貪大郡以自優假不忍小民顒顒蔽隔謹具以聞朝議未許遂不分郡分郡之議始於是矣順桓之世板楯數反太守蜀郡趙溫恩信降服於是宕渠出九穗之禾胊忍有連理之木光和二年板楯復叛攻害三蜀漢中州郡連年苦之天子欲大出軍時征役疲弊問益州計曹考以方略益州計曹掾程苞對曰板楯七姓以射白虎為業立功先漢本為義民復除徭役但出賨錢口歲四十其人勇敢能戰昔羌數入漢中郡縣破壞不絶若線後得板楯來虜殄盡號為神兵羌人畏忌傳語種輩勿復南行後建寧二年羌復入漢牧守遑遑賴板楯破之若微板楯則蜀漢之民為左衽矣前車騎將軍馮緄南征雖授丹陽精兵亦倚板楯近益州之亂朱龜以并涼徑卒討之無功太守李顒以板楯平之忠功如此本無惡心長吏鄉亭更賦至重僕役過於奴婢箠楚降於囚虜至乃嫁妻賣子或自剄割陳冤州郡牧守不理去闕庭遙遠不能自聞含怨呼天叩心窮谷愁於賦役困乎刑酷邑域相聚以致叛戾非有深謀至計僭號不軌但選明能牧守益其資穀安便賞募從其利隟自然安集不煩征伐也昔中郎將尹就伐羌擾動益部百姓諺云虜來尚可尹將殺我就徵還後羌自破退如臣愚見權之遣軍不如任之州郡天子從之遣太守曹謙宣詔降赦一朝清戢獻帝初平元年征東中郎將安漢趙韙建議分巴為二郡韙欲得巴舊名故白益州牧劉璋以墊江以上為巴郡江南龐羲為太守治安漢以江州至臨江為永寧郡胊忍至魚復為固陵郡巴遂分矣建安六年魚復蹇胤白璋爭巴名璋乃改永寧為巴郡以固陵為巴東徙羲為巴西太守是為三巴於是涪陵謝本白璋求以丹興漢髮二縣為郡初以為巴東屬國後遂為涪陵郡分後屬縣七戶二萬去洛三千七百八十五里東接胊忍西接符縣南接涪陵北接安漢德陽巴子時雖都江州或治墊江或治平都後治閬中其先王陵墓多在枳其畜牧在沮今東突硤下畜沮是也又立市於龜亭北岸今新市里是也其郡東枳有明月硤廣德峽故巴亦有三硤巴楚數相攻伐故置扞關陽關及沔關漢世郡治江州巴水北有甘橘官今北府城是也後乃遷南城劉先主初以江夏費觀為太守領江州都督後都護李嚴更城大城周回十六里欲穿城後山自汶江通水入巴江使城為州求以五郡置巴州丞相諸葛亮不許亮將北征召嚴漢中故穿山不逮然造蒼龍白虎門別郡縣倉皆有城嚴子豐代為都督豐解後梓潼李福為都督延熙中車騎將軍鄧芝為都督治陽關十七年省平都樂城常安咸熙元年但四縣以鎮西參軍隴西怡思和為太守二部守軍江州縣郡治塗山有禹王祠及塗后祠北水有銘書詞云漢初犍為張君為太守忽得仙道從此升度今民曰張府君祠縣下有清水穴巴人以此水為粉則膏暉鮮芳貢粉京師因名粉水故世謂江州墮休粉也有荔芰園至熟二千石常設廚膳命士大夫共會樹下食之縣北有稻田出御米陂池出蒲蒻藺席其冠族有波鉛母謝然𢣏楊白上官程常世有大官也枳縣郡東四百里治涪陵水會土地確瘠時多人士有章常連黎牟陽郡冠首也臨江縣枳東四百里接胊忍有鹽官在鹽塗二溪一郡所仰其豪門亦家有鹽井又嚴甘文楊杜為大姓晉初文立實作常伯納言左右楊宗符武隆人在吳為孫氏虎臣也平都縣蜀延熙時省大姓殷呂蔡氏墊江縣郡西北中水四百里有桑蠶牛馬漢時龔榮以俊才為荊州刺史後有龔揚趙敏以令德為巴郡太守淳于長寧雅有美貌黎夏杜皆大姓也樂城縣在西州江三百里延熙十七年省常安縣亦省巴東郡先主入益州改為江關都尉建安二十一年以胊忍魚復漢豐羊渠及宜都之巫北井六縣為固陵郡武陵廖立為太守章武元年胊忍徐惠魚復蹇機以失巴名上表自訟先主聽復為巴東南郡輔匡為太守先主征吳於夷道還薨斯郡以尚書令李嚴為都督造設圍戍嚴還江州征西將軍汝南陳到為都督到卒官以征北大將軍南陽宗預為都督預還內領軍襄陽羅獻為代蜀平獻仍其任拜淩江將軍領武陵太守泰始二年吳大將步闡唐咨攻獻獻保城咨西侵至胊忍故蜀尚書郎巴郡楊宗告急於洛未還獻出擊闡大破之咨退獻遷監軍假節安南將軍封西鄂侯入朝加錫御蓋朝服吳武陵太守孫恢寇南浦安蠻護軍楊宗討之退走因表以宗為武陵太守住南浦誘恤武陵蠻夷得三縣初附民獻卒以犍為太守天水楊欣為監軍欣遷涼州刺史朝議以唐彬及宗為代晉武帝問散騎常侍文立曰彬宗孰可用立對曰彬宗俱立事績在西不可失者然宗才誠佳有酒嗜彬亦其人性在財欲惟陛下裁之帝曰財欲可足酒嗜難改遂用彬為監軍加廣武將軍迄吳平巴東後省羊渠置南浦晉太康初將巫北井還建平但五縣去洛二千五百里東接建平南接武陵西接巴郡北接房陵奴獽夷蛋之蠻民魚復縣郡治公孫述更名白帝章武二年改曰永安咸熙初復有橘官又有澤水神天旱鳴鼓於傍即雨也胊忍縣郡西二百九十里水道有東陽下瞿數灘山有大小石城勢有靈壽木橘圃鹽井靈龜咸熙元年獻靈龜於相府大姓扶先徐氏漢時有扶徐荊州著名楚記有弜頭白虎復夷者也漢豐縣建安二十一年置在郡西北彭溪源南浦縣郡南三百里晉初置主夷郡與楚接人多徑勇少文學有將帥材涪陵郡巴之南鄙從枳南入泝舟涪水本與楚商於之地接秦將司馬錯由之取楚商於地為黔中郡也漢後恆有都尉守之舊屬縣五去洛五千一百七十里東接巴東南接武陵西接牂柯北接巴郡土地山險水灘人戇勇多獽蛋之民縣邑阿黨鬭訟必死無蠶桑少文學惟出茶丹漆蜜蠟漢時赤甲軍常取其民蜀丞相亮亦發其徑卒三千人為連弩士遂移家漢中延熙十三年大姓徐巨反車騎將軍鄧芝討平之見玄猿緣其山芝性好弩手自射猿中之猿拔其箭卷木葉塞其創芝嘆曰嘻吾傷物之性其將死矣乃移其豪徐藺謝范五千家於蜀為獵射官分羸弱配督將韓蔣名為助郡軍遂世掌部曲為大姓晉初移弩士於馮翊蓮勺其人性質直雖徙他所風俗不變故迄今有蜀漢關中涪陵其為軍在南方者猶存山有大龜其甲可卜其緣可作叉世號靈叉涪陵縣郡治丹興縣蜀時省山出名丹漢平縣延熙十三年置萬寧縣孝靈帝時置本名永寧漢髮縣有鹽井諸縣北有獽蛋又有蟾夷也巴西郡屬縣七去洛二千八百一十五里東接巴郡南接廣漢西接梓潼北接涼西城土地山原多平有牛馬桑蠶其人自先漢以來傀偉俶儻冠冕三巴及郡分後叔布榮始周群父子程公弘等或學兼三才或精秀奇逸其次馬盛衡承伯才藻清妙龔德緒兄弟英氣曄然黃公衡應權通變馬德信王子均勾孝興張伯歧建功立事劉二主之世稱美荊楚乃先漢以來馮車騎范鎮南皆植斯鄉故曰巴有將蜀有相也及晉譙侯修文於前陳君煥炳於後並遷雙固倬群穎世甄在傳記縉紳之徒不勝次載焉閬中縣郡治有彭池大澤名山靈臺見文緯書讖大姓有三狐五馬蒲趙任黃嚴也南充國縣和帝時置有鹽井大姓侯譙氏安漢縣號出人士大姓陳范閻趙平州縣其二縣為郡宕渠郡延熙中置以廣漢王士為太守郡建九年省永興元年李雄復置今遂為郡長老言宕渠蓋為故賨國今有賨城盧城秦始皇時有長人二十五丈見宕渠秦史胡母敬曰是後五百年外必有異人為大人者及雄之王祖世出自宕渠有識者皆以為應之先漢以來士女賢貞縣民車騎將軍馮緄大司農玄賀大鴻臚龐雄桂楊太守李溫等皆建功立事有補於世緄溫各葬所在常以三月二子之靈還鄉里水暴漲郡縣吏民莫不於水上祭之其列女節義在先賢志宕渠縣郡治有鐵官石蜜山圖所採也漢昌縣和帝時置大姓勾氏宣漢縣今省右巴國凡分為五郡二十三縣撰曰巴國遠世則黃炎之支封在周則宗姬之戚親故於春秋班侔秦楚示甸衛也若蔓子之忠烈范目之果毅風淳俗厚世挺名將斯乃江漢之含靈山嶽之精爽乎觀其足以知其敦一矣昔沙麓崩卜偃言其後當有聖女興元城建公謂王翁孺屬當其時故有政君李雄宕渠之斯伍略陽之黔首耳起自流隸君獲士民其長人之魄良有以也
