body:
  text: 卷第九李特雄期壽勢志李特字玄休略陽臨渭人也祖世本巴西宕渠賨民種黨勁勇俗好鬼巫漢末張魯居漢中以鬼道教百姓賨人敬信值天下大亂自巴西之宕渠移入漢中魏武定漢中祖父虎與杜濩朴胡袁約楊車李黑等移於略陽北土復號曰巴人特父慕為東羌獵將特兄弟五人長兄輔字玄攻次特特弟庠字玄序庠弟流字玄通流弟驤字玄龍皆銳驍有武幹特長子蕩字仲平好學有容觀少子雄字仲儁初特妻羅氏妊雄夢雙虹自門升天一虹中斷羅曰吾二兒若有先亡在者必大貴雄少時辛冉相當貴有劉化者道術士也言關隴民皆當南移李氏子中惟仲儁天姿奇異終為人主鄉里人多善之與叔父庠並以烈氣聞人多歸之既克成都眾皆飢餓驤乃將民入郪五城食穀芋雄遣信奉迎范賢欲推戴之賢不許更勸雄自立永興元年冬十月楊褒楊珪共勸雄稱王雄遂稱成都王追尊曾祖虎曰巴郡公祖父慕隴西王父特景王母曰王太后追謚世父輔齊烈王仲父庠梁武王仲父流秦文王兄蕩廣漢壯文公以叔父驤為太傅庶兄始為太保外兄李國為太宰國弟離為太尉從弟雲為司徒璜為司空閻式為尚書令褒為僕射發為侍中珪為尚書洪為益州刺史徐輿鎮南王達軍師具置百官下赦建元建興迎范賢為丞相從弟置流子也以不陪列誅之賢既至尊為四時八節天地太師封西山侯復其部曲軍征不預租稅皆入賢家賢名長生一名延久又名九重一曰支字元涪陵丹興人也光熙元年雄稱皇帝改元晏平永嘉三年羅羕訇琦等殺李離於梓潼時閻式去雄依離并見殺驤攻不克時李雲李璜皆戰死明年文碩殺李國巴西梓潼為晉平寇將軍李鳳在晉壽梁州先以為雄所破不守而譙登在涪平西參軍向奮屯安漢之宜福張羅屯平無逼雄雄將張寶弟全在訇琦中雄遣寶反為奸許以代離寶素凶勇先殺人而後奔梓潼密結心腹會羅尚遣使慰勞琦琦等出送其使寶從後閉城門琦等奔巴西雄得梓潼拜寶為太尉雄自攻奮奮走遣驤攻登登初將驤子壽欲以誘驤被攻急救援不至還驤壽五年春驤獲登遣李始督李鳳攻巴西殺文碩改元玉衡是歲雄姨弟任小受張羅募手刃雄頭雄幾死是後扶風鄧定楊虎等各率流民前後數千家入蜀以鳳為征北梁州任回鎮南南夷甯州李恭征東南蠻荊州皆大將軍校尉刺史雄驤勤䘏百姓於內鳳回恭招流民於外並有功稱氐符成隗文既降復叛手傷雄母及其來也咸釋其罪厚加待納皆以為將天水陳安舉隴右來降武都氐王楊茂搜奉貢稱臣杜弢自湘州使使求援晉涼州刺史張駿遣信交好漢嘉夷王沖歸遣子入質頃之朱提雷炤率民歸降建甯爨畺蒙險委誠其餘附者日月而至雄乃虛己受人寬和政役遠至邇安年豐穀登乃興文教立學官其賦民男丁一歲穀三斛女丁一斛五㪷疾病半之戶調絹不過數丈緜不過數兩事少役稀民多富實至乃閭門不閉路無拾遺獄無滯囚刑不濫及但為國威儀無則官無秩祿職署委積班序無別君子小人服章不殊貨賄公行懲勸不明行軍無號令用兵無部伍其戰勝不相讓敗不相救攻城破邑動以虜獲為先故綱紀莫稱李鳳在北數有戰降之功時蕩子稚屯晉壽害其功大興元年鳳以巴西叛驤討之久住梓潼不敢進雄自至涪驤遂斬鳳以壽代鳳為梁州知北事二年驤伐越巂又分伐朱提三年獲太守西校尉李釗夏進伐甯州大敗於螳蜋還初氐王楊茂搜子難敵堅頭為劉曜所破奔晉壽晉壽守將李稚蕩第二子也受其賂遺不送成都曜既引還稚遣難敵兄弟還武都遂即叛稚稚悔失計連白雄求伐氐雄許之群臣多諫雄不從遣稚兄琀以侍中中領軍統稚攻難敵由白水入遣壽與稚弟玝由陰平入二道討氐難敵等先拒壽玝玝壽不進而琀稚逕至下辨以深入無繼大為氐所破稚琀皆死死者千餘人雄深自咎責以謝百姓琀蕩之元子有名望志尚雄欲傳以後嗣甚痛惜之雄妻任無子養琀弟班為子雄自有庶子十五人群臣上立嗣雄曰孫仲謀割有江東伯符兆基子止侯爵國志恥之宋宣公舍子立弟君子以為知人吾將彌縫國志之恥以繼宣公之美驤與司徒王達諫以為不可雄不從永昌元年冬立班為太子驤泣曰亂始於是矣泰甯元年越巂斯叟反攻圍任回及太守李謙遣其征南費黑救之咸和元年夏斯叟破二年謙移郡民於蜀三年冬驤死追贈相國謚曰漢獻王壽以喪還拜玝征北梁州代壽以班行撫軍將軍脩晉壽軍屯五年拜壽都督中外諸軍大將軍中護軍西夷校尉錄尚書事總統如驤冬壽率征南費黑征東任邵伐巴東至建平監軍毋丘奧退保宜都六年春壽還遣任邵屯巴雄以子越為車騎住廣漢秋壽伐陰平冬城涪陵七年秋壽南征甯州以費黑為司馬與邵攀等為前軍由南廣入又別遣任回子調由越巂入冬十月壽黑至朱提朱提太守董炳固城甯州刺史尹奉遣建甯太守霍彪大姓爨深等助炳時壽已圍城欲逆拒之黑曰料城中食少霍彪等雖至齎糧不多宜令人入城共消其穀猶嫌其少何緣拒之彪等皆入城城久不下壽欲急攻之黑諫曰南中道險俗好反亂宜必待其詐勇已困但當日月制之全軍取勝以求有餘溷牢之物何足汲汲也壽必欲戰果不利乃悉以軍事任黑八年春正月炳彪等出降威震十三郡三月刺史尹奉舉州委質遷奉於蜀壽領甯州南中初平威禁甚肅後轉淩掠民秋建甯民毛衍羅屯等反殺太守邵攀䍧柯太守謝恕舉郡為晉壽破之九年春分甯州置交州以霍彪為甯州建甯爨深為交州刺史封壽建甯王張駿使參軍傅穎治中張淳遺雄書勸去尊號稱藩於晉雄引見謂曰吾過為士大夫所推然本無心於帝王也貴州將令行河沙常所希冀進思共為晉室元功之臣退思共為守藩之將掃除氛埃以康帝宇而晉室淩遲德聲不振引領東望有年月矣會獲來貺情鈞闇至有何已已穎淳以為然使聘相繼巴郡嘗告急云有東軍雄曰吾常慮石勒跋扈侵逼瑯琊以為耿耿不圖乃能舉軍使人欣然雄之雅談多如此類三月壽還夏六月癸亥雄疾病卒時年六十一偽謚曰武帝廟稱太宗凡自立三十一年冬十二月丙寅葬成都墓號安都陵也班字世文蕩第四子也少見養於雄年十六立為太子好學愛士每觀書傳謂其師友天水文夔隴西董融等曰吾見周靈王太子晉魏太子丕吳太子孫登文章鑒識超然卓絕未嘗不有慚色何古人之難及乎進止周旋勤於咨問但性輕躁失在田獵甲子襲位玝來奔喪勸遣雄子越還江陽而欲令期代已知北事班以未葬不許遣玝還涪冬十月癸亥期越殺班於臨次并殺班仲兄領軍都弟玝奔晉期偽謚班曰戾太子壽追謚曰哀皇帝子幽顒為期所殺班兄弟五人皆兵死四人無後玝在晉歷巴郡襄陽宜都太守龍驤將軍永和三年從征西於山陽戰死也期字世運雄第四子也母冉賤雄妻任養為子少攻學問有容觀雄時令諸子各募合部曲多者纔得數百人而期獨得千餘人為安東將軍雄亡越自江陽來赴喪兄弟怏怏既以班非雄所生又慮玝不利已與兄越密謀圖班太史令韓約上言宮室有陰謀兵氣戒在親戚班不悟遂因夜哭越殺班期自立以越為相國與壽並錄尚書事進壽大都督徙封漢王使討玝於涪封越建甯王以仲兄霸為中領軍鎮南弟保鎮西西夷校尉汶山太守從父始征東伐越皆大將軍玝走即拜壽梁州知北事咸康元年春正月立妻閻氏為后下赦改元玉恆秋以司隸景騫為尚書令征南費黑為司隸班舅羅演為僕射羅演與漢王相天水上官澹謀襲期立班子幽謀泄殺演澹并誅班母羅琀子礹稚妻昝二年忌從子載多才藝託他事誅之而霸保皆暴病死於是大臣自疑骨內不相親而期志益廣忽慢父時公卿政刑失錯四年夏四月壽自涪還襲期假以誅越騫為言越請散財募民格戰期謂壽不自薄不許既誅越騫初廢期為邛都縣公五月乃殺期及誅李始等殺兄弟十餘人期死時年二十四謚曰幽公五年徙其妻子於越巂勢又使人就越巂誅其子壽字武考有幹局愛尚學義志度少殊於諸子雄奇之自代父為將志在功名故東征南伐每有效事雄疾病侍疾左右左右侍臣造雄顧命寄託於壽期之殺班也李始初欲附壽圖共討期壽不敢始怒說期取壽期憚李玝在北欲藉壽討之故不許壽既受漢封北伐玝告以去就利害假道故玝得由巴順水東下吳壽雖代玝鎮涪歲終當入朝覲常自危嫌輒造漢中守將張才急書告方外寇警咸康二年冬北入漢中破走司馬勳壽見期越兄弟十餘人年方壯大而手下有強兵懼不自全數聘命高士巴西龔壯壯雖不應恐見害不得已數見壽時岷山崩江水竭壽緣劉向之言而惡之每謀壯以自安之術壯之父及叔皆為特所殺欲假手報讎未有其由因說立事何如舍小從大以危易安開國裂土長為諸侯名高桓文勳流百代矣壽從之陰與長史略陽羅恆巴西鮮思明共謀據成都為晉稱藩會養弟攸從成都病還死道中乃陽言越藥殺之又詐造妹壻任調書言期越當廢壽以惑群下群下信之乃誓文武許賞城中資財得數千人南攻成都子勢為開門內應遂獲期越誅其宗族十餘人兵入虜掠民家奸淫雄公主及李氏諸婦多所殘害數日乃定恆與思明及李弈王利等勸壽稱鎮西將軍益州牧成都王以壯為長史告下又勸令送期於晉任調與司馬蔡興侍中李豔及張烈等勸壽自立壽亦生心遂背思明所陳之計稱漢皇帝尊父驤曰獻帝母咎氏曰太后下赦改元漢興以恆為尚書令思明為廣漢太守任調鎮北梁州知北事東羌校尉李弈鎮西西夷校尉更代諸郡及卿佐皆用宿人及已參佐省交州以從子權為鎮南南夷甯州於是成都諸李子弟無復秉兵馬形勢者雄時舊臣及六郡人皆斥廢也秋七月李弈從兄乾與大臣合謀欲廢壽壽懼使子廣與大臣盟要為兄弟進李閎為征東荊州移鎮巴郡八月天連陰雨禾稼傷損百姓飢疫草莽臣龔壯上封事曰臣聞陰德必有陽報故于公理獄高門待封伏惟獻皇帝寬仁厚惠宥罪甚眾靈德洪洽誕鍾陛下陛下天性忠篤受遺建節志齊周霍誠貫神明而志緒違理顛覆顧命管蔡既興讒諛滋蔓大義滅親撥亂濟危上指星辰昭告天地歃血盟眾舉國稱藩天應人悅白魚登舟霆震助威烈風順義神誠允暢日月光明而論者未喻權時定制淫雨氾濆垂向百日禾稼傷損加之飢疫百姓愁望或者天以監示陛下又前日之舉止以救禍陛下至心本無大圖而今久不變天下之人誰復分明知陛下本心者哉且玄宮之讖難知而盟誓顧違一旦疆場有急內外騷動不可不深思長久之策永為子孫之計也愚謂宜遵前盟誓結援吳會以親天子彼必崇重封國歷世雖降階一等永為靈德宗廟相承福祉無窮君臣銘勳於上生民甯息於下通天下之高理弘信慎之美義垂拱南面歌詩興禮上與彭韋爭美下與齊晉抗德豈不休哉論者或言二州人附晉必榮六郡人事之不便昔豫州入蜀荊楚人貴公孫述時流民康濟及漢征蜀殘民太半鍾鄧之役放兵大掠誰復別楚蜀者乎論者或不達安固之基惜其名位在昔諸侯自有卿相司徒司空宋魯皆然及漢藩王亦有丞相今義歸彼但當崇重豈當減削昔劉氏郡守令長方仕州郡者國亡主易故也今日義舉主榮臣顯甯可同日而論也論者又謂臣當為法正階下覆臣如天養臣如地恣臣所安至於名榮漢晉不處臣復何為當侔法正論者或言晉家必責質任及徵兵伐胡何以應之案晉不煩尺兵一國來附威卷四海廣地萬里何任之責胡之在北亦此之憂今平居有東北之虞縱令徵兵但援漢川猶差二門耳臣託附深重忘疲病之穢實感殊遇冀以微言少補明時常懼殞沒不寫愚心辜負恩顧謹進悾悾伏願罪戮壽不悅然拘前言祕藏之九月僕射任顏雄妻弟也謀反誅并殺雄子豹等五年春二月晉將伐巴郡獲李閎閎恭子也初壽許自牛鞞以東土斷與閎執政者以為不可乃止復不益兵故覆沒閎弟豔以是怨故與朝右有隙是時壽疾病恆思明等復議奉晉計尋巴郡破壽以為附晉晉當以兵威故不能自斷遂輟計三月拜李弈鎮東代閎夏建甯太守孟彥率州人縛甯州刺史霍彪於晉舉建甯為晉遣右將軍李位都討之時權在越巂秋又遣尚書廣漢李攄為御史入南中攄祖毅晉故甯州刺史以向與南人有舊故遣之攄從兄演自越巂上書勸壽歸正返本釋帝稱王壽怒殺之車騎將軍王韜為參軍晉康帝建元元年壽卒勢立改元太和太史令韓皓上言熒惑守心乃宗廟不脩之譴勢乃更命祀成始祖太宗皆謂之漢勢之弟大將軍廣以勢無子求為太弟勢不許馬當鮮思明固請許之勢疑與廣有謀收當思明斬之廣自殺思明被收歎曰國之不亡以我數人在也今其殆矣思明有智略敢諫諍馬當素得人心及其死士民無不哀之冬李弈自晉壽舉兵反單騎突門門者射殺眾潰勢大赦境內改年嘉甯勢驕淫不䘏國事中外離心蜀土無獠至是始從山出自巴至犍為梓潼布滿山谷大為民患加以飢饉境內蕭條三年春二月桓溫伐蜀軍至青衣勢大發兵遣昝堅等將之自山陽趣合水諸將欲設伏江南以待晉兵昝堅不從引兵自江北鴛鴦碕渡向犍為溫自將步卒直指成都昝堅至犍為乃知與溫異道還自沙頭津濟比至溫已軍於成都之十里陌堅眾自潰勢悉眾出戰於笮橋中書監王嘏散騎常侍常璩勸勢降乃夜開東門走至葭萌使散騎常侍王幼送降文於溫勢至建康封歸義侯李氏自起事至亡六世四十七年正僭號四十二年蜀中亦有怪異期時有狗豕交木冬華勢時涪陵民樂氏婦頭上生角長二寸凡三截之又有民馬氏婦妊身而脅下生其母無恙兒亦長育有馬生駒一頭二身相著六耳一牡一牝又有天雨血於江南數畝許李漢家舂米自臼中跳出遽斂於箕中又跳出寫於簟中又跳出有猿居鳥巢至城下地仍震又連生毛其天譴不能詳也譔曰特流乘釁險害雄能推亡固存遭皇極不建遇其時與期倡為禍階而壽勢終之詩所謂亂離瘼矣爰其適歸者也長老傳譙周讖曰廣漢城北有大賊曰流曰特攻難得歲在玄宮自相賊終如其記先識預覩何異古人乎歷觀前世偽僭之徒縱毒虔劉未有如茲每惟殷人丘墟之歎賈生過秦之論亡國破家其監不遠矣
