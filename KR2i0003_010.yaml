body:
  text: 卷第十上先賢士女總讚含和誕氣人倫資生必有賢彥為人經紀宣德達教博化篤俗故太上立德其次立功其次立言品物煥炳彝倫攸敘也益梁爰在前代則夏勳配天而彭祖體地及至周世韓服將命蔓子忠堅然顯者猶鮮豈國史簡闕抑將分以秦楚希預華同自漢興以來迄乎魏晉多士克生髦俊蓋世愷元之疇感於帝思於是璽書交馳於斜谷之南束帛戔戔於梁益之鄉或乃龍飛紫閣允陟璿璣亦有盤桓利居經論皓素其耽懷道術服膺六藝弓車之招旃旌之命徵名聘德忠臣孝子烈士賢女高劭足以振玄風貞淑可以方蘋蘩者奕世載美是以四方述作來世志士莫不仰高軌以咨詠憲洪猷而儀則擅名八區為世師表矣故耆舊之篇較美史漢而今志州部區別未可總而言之用敢撰約其善為之述讚因自注解甄其洪伐尋事釋義略可以知其前言往行矣蜀都士女嚴平恬泊皓然沈冥嚴遵字君平成都人也雅性淡泊學業加妙專精大易耽於老莊常卜筮於市假蓍龜以教與人子卜教以孝與人弟卜教以悌與人臣卜教以忠於是風移俗易上下茲和日閲人得百錢則閉肆下簾授老莊著指歸為道書之宗楊雄少師之稱其德杜陵李強為益州刺史謂雄曰吾真得君平矣雄曰君但可見不能屈也強以為不然至州修禮交遵遵見之強服其清高而不敢屈也嘆曰楊子雲真知人也年九十卒雄稱之曰不慕夷即由矣不作苟見不治苟得久幽而不改其操雖隨和何以加諸仲元抑抑邦家儀形李弘字仲元成都人少讀五經不為章句處陋巷淬勵金石之志威儀容止邦家師之以德行為郡功曹一月而去子贅以見辱殺人太守曰賢者之子必不殺人放之贅自以枉語家人弘遣亡命太守怒讓弘弘對曰贅為殺人之賊明府私弘枉法君子不誘而誅也石碏殺厚春秋譏之孔子稱父子相隱直在其中弘實遣贅太守無以詰也州命從事常以公正諫爭為志楊子雲稱之曰李仲元為人也不屈其志不纍其身不夷不惠可否之間見其貌者肅如也觀其行者穆如也聞其言者愀如也非正不言非正不行非正不聽吾先師之所畏子雲玄達煥乎弘聖楊雄字子雲成都人也少貧好道家無擔石之儲十金之費而晏如也好學不為章句初慕司馬相如綺麗之文多作詞賦車騎將軍王音成帝叔舅也召為門下史薦待詔上甘泉羽獵賦遷侍郎給事黃門雄既升祕閣以為辭賦可尚則賈誼升堂相如入室武帝讀大人賦飄飄然有淩雲之志不足以諷諫乃輟其業以經莫大於易故則而作太玄傳莫大於論語故作法言史莫善於蒼頡故作訓纂針諫莫美於虞針故作州針賦莫弘於離騷故反屈原而廣之典莫正於爾雅故作方言初與劉歆王莽董賢同官並至三公雄歷三帝獨不易官年七十一卒自劉向父子桓談等深敬服之其玄淵源懿後世大儒張衡崔子玉宋仲子王子雍皆為注解吳郡陸公紀尤善於玄稱雄聖人雄子神童烏七歲預雄玄文年九歲而卒林生清寂莫得而名林閭字公孺臨邛人也善古學古者天子有輶車之使自漢興以來劉向之徒但聞其官不詳其職職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同主海內之音韻使人主居高堂知天下風俗也楊雄聞而師之因此作方言閭隱遁世莫聞也泛鄉忠貞社稷是經進賢為國稽考典刑愛莫助之身殞朝傾何武字君公郫人也初以射策甲科為郎歷揚兗州刺史司隸校尉京兆尹清河楚沛太守廷尉御史大夫成帝初具三公拜大司空封泛鄉侯為人忠厚公正推賢進士在楚致兩龔在沛厚兩唐臨司隸致平陵何並居公位進辛慶忌皆世名賢臨州郡雖無赫赫之名及去民思之才雖不及丞相薛宣翟方進而正直過之哀帝即位以朱博趙玄為公卿用事免官諫大夫鮑子都亟言訟之丞相王嘉亦以為慨帝復徵武為御史大夫徙前將軍時大司馬新都侯王莽避帝外家丁傅氏遜位亦以列侯見徵哀帝詔博舉太常莽從武求舉武以莽姦人之雄不許哀帝崩王太皇太后莽姑也即日引莽入收大司馬董賢印綬詔舉大司馬丞相孔光等逼王氏皆舉莽武與左將軍公孫祿謀曰莽四父世朝權傾人主必危劉氏乃舉祿祿亦舉武太后不從用莽為大司馬莽諷有司劾奏皆免武就國後莽浸盛遂為宰衡安漢公欲圖篡漢憚武與其叔紅陽侯王立不從元始三年因呂寬吳章事檻車徵武武自殺衆咸冤之莽欲厭衆心諡武曰刺侯子況嗣平帝崩莽因居攝後僭帝位叔文播教變風為雅道洽化遷我實西魯張寬字叔文成都人也蜀承秦後質文刻野太守文翁遣寬詣博士東受七經還以教授於是蜀學比於齊魯巴漢亦化之景帝嘉之命天下郡國皆立文學由翁唱其教蜀為之始也寬從武帝郊甘泉泰畤過橋見一女子裸浴川中乳長七尺曰知我者帝後七車適得寬車對曰天有星主祠祀不齊潔則作女令見帝感寤以為揚州刺史復別蛇莽之妖世稱云七車張作春秋章句十五萬言長卿彬彬文為世矩司馬相如字長卿成都人也遊京師善屬文著子虛賦而不自名武帝見而善之曰吾獨不得與此人同世楊得意對曰臣邑子司馬相如所作也召見相如相如又作上林賦帝悅以為郎又上大人賦以風諫制封禪書為漢辭宗官至中郎將世之作辭賦者自楊雄之徒咸則之王淵豔麗蔚若華圃王褒字子淵資中人也以高才文藻侍宣帝初為王襄作樂職中和頌宣帝時又上甘泉洞簫賦帝善之令宮人誦之為諫大夫卒子山翰藻遺篇有序楊終字子山成都人也年十三已能作雷賦通屈原七諫章後坐太守徙邊作孤憤詩明帝時與班固賈逵並為校書郎刪太史公書為十餘萬言作生民詩又上符瑞詩十五章制封禪書著春秋外傳十二卷章句十五萬言皆傳於世者少遷猛毅垂勳三邦陳立字少遷臨邛人也成帝時牂柯有亂大將軍王鳳薦立為太守克平禍亂徙守巴郡秩中二千石治有尤異又徙天水太守為天下最天子賜黃金四十斤入為左曹衛將軍護軍都尉世公賦政祥瑞來同王阜字世公成都人也大守弟五倫察舉孝廉為重泉令有鸞鳥集於文學十餘日遷益州太守神馬出滇池河甘露降白烏見民懷之如父母猗歟文父睿發幼童德淡會稽道崇辟雍張霸字伯饒諡曰文父成都人也年數歲以知禮義諸生孫林劉固段著等宗之移家其宇下啓母求就師學母憐其稚對曰饒能故字伯饒也為會稽太守撥亂興治立文學學徒以千數風教大行道路但聞誦聲百姓歌詠之致達名士顧奉公孫松畢海胡母官萬虞先王演李根皆至大位在郡十年以有道徵拜議郎遷侍中遂授霸五更尊禮於太學年老卒葬河南少府委遲作卿作師趙典字仲經成都人太尉戒子也與潁川李膺等並號八俊三為侍中自樂祿俸施貧方授國師未拜病卒何楊研神貫奧入微何英字叔俊郫人也楊由字哀侯成都人也二子學通經緯英著漢德春秋十五卷孫汶字景由亦深學初徵上日食盜賊起有效為謁者京師旱請雨即澍遷犍為屬國著世務論三十篇卒楊由為太守廉范文學范稱能治由言當有賊發頃之廣柔羌反寇殺長姚超鄉人冷豐齎酒候之值客未內由為知其多少又言人當致果其色赤黃果有送甘橘者大將軍竇憲從太守索雲氣圖由諫莫與尋憲受誅其明如此著書十篇而卒司農明允國憲是維任昉字文始成都人也初為葉令治姦賊七十餘人遷梁相尚書令清身檢下大將軍梁冀憚之出為魏郡徙平原歲出租稅百萬冀誅復入為尚書令司隸校尉遷大司農卒弟愷徐州刺史亦有治名昉父循字伯度為長沙太守得其父時為五官事在精通也翁君美秀牧后寤機何霸字翁君司空武兄也為郡戶曹刺史王尊將之官移諸郡不得遣迎唯霸白太守宜往太守遣霸尊大怒霸對曰太守遣霸非修敬也以去京師久遲知朝廷起居耳尊遽下車持節對之因奇霸容止辟為別駕舉秀才為屬國中郎將弟潁川太守兄弟五人皆有名伯騫推賢求善如飢柳宗字伯騫成都人也初結九友共學號九子及為州郡右職務在進賢拔致求次方張叔遼王仲曾殷智孫等終至牧守州里為諺曰得黃金一笥不如為伯騫所識舉茂才為美陽令文侯顒卬極位台衡文侯趙戒字志伯少府典父也父定以遊俠稱戒順桓帝之世歷司徒太尉登特進屢居公輔免憂患於無妄之世告歸於蜀薨家太尉頡頏志振頽綱趙謙字彥信戒孫也歷位卿尹初平元年為太尉時董卓秉政欲遷天子長安謙與司空荀爽固諫卓不聽以為車騎將軍奉大駕西幸封洛亭侯拜司隸校尉忤卓指免討白波賊有功封郫侯進司徒免拜尚書令太僕三年薨諡曰忠侯司徒繼踵僶俯權橫趙溫字子柔謙弟以侍中同輿輦西遷封江南亭侯兄亡初平四年拜司空未期進司徒當世榮之時車騎將李傕與董承張濟等爭權數遷移天子溫以書切責於傕天子聞為寒心尋曹公入徙天子都許政出諸侯禮待溫居公位十五年建安十三年薨猶操道柄董李是讓讓責也董卓李傕凶擅謙溫干之初文侯與李固胡廣議立清河王蒜而冀欲立蠡吾侯趙戒脅而從之使李固枉死君子以為卓傕之惡甚於梁冀謙摩卓之牙溫弄傕之爪雖逼權勢以道陳訓賢其祖遠矣侍中授命分節亦彰常洽字茂尼江原人也自荊州刺史遷京兆尹侍中長水校尉以兵衛大駕西幸傕等作難常侍衛天子左右為傕所煞蠻夷猾擾倡亂南壃子恭要傳醜穢于攘楊竦字子恭成都人也元初中越巂永昌夷反殘破郡縣衆十餘萬刺史張喬以竦勇猛授從事任平南中竦先以詔書告喻不服乃加誅煞虜三萬餘人獲生口千五百人財物四千萬降夷三十六種舉正姦濁長吏九十人黃綬六十人南中清平會被傷卒喬舉州弔贈列畫東觀伯春孟元匡正時君張充字伯春李幾字孟元江原人也充為治中從事時刺史恃豪每見從事布席地坐己自安高床上充入閣不肯進刺史寤乃更禮從事刺史辟公孫特大姓犍為李威橋稚充曹時有火災倫受刺史指以江中斗平不足表聞幾固爭之後刺史至與倫不平求郡短劾倫不言水災幾對以詔書上災異不得由州倫遷司空辟幾掾楊羅為令遺愛在民楊班字仲桓成都人也羅衡字仲伯郫人也俱師徵士何幼正班為不韋茂陵令治化浹洽徙西城閬中令號時名宰衡為萬年令路不拾遺人家牛馬皆繫道邊曰屬羅公三府爭辟拜廣漢長二縣皆為立祠小伯溫恭預圖息紛陳湛字小伯成都人也歷數縣令民皆懷服州辟治中從事廣漢太守遣子詣州修歡交使君欲納湛諫不可失羔羊義使君從之後有言州郡私交者考之無得乃明也孟由至孝遐葉睎風禽堅字孟由成都人也父信為縣吏使越巂為夷所得傳賣歷十一種去時堅方妊六月生母更嫁堅壯乃知父湮沒鬻力傭賃求碧珠以求父一至漢嘉三出徼外周旋萬里經六年四月突瘴毒狼虎乃至夷中得父父相見悲感夷徼哀之即將父歸迎母致養州郡嘉其孝召功曹辟從事列上東觀太守王商追贈孝廉令李苾為立碑銘迄今祠之仲圼勉師仲圼成都人也少受學於嚴季后季后為汶江尉書呼仲圼仲圼許十月往會夷反斷道仲圼期於往經度六七幾死數年卒得至汶江為季后陳策俱得免難遠近嘆之叔本慕仁任末字叔本繁人也與董奉德俱學京師奉德病死推鹿車送其喪師亡身病齎棺赴之道死遺令敕子載喪至師門敘平生之志也伯禽證將朱普字伯禽廣都人也為郡功曹太守與刺史王冀有隟枉見劾普詣新都獄掠笞連月肌肉腐臭惡同死人證太守無事敕其子曰我死載喪詣闕使天子知我心事得清理普以烈聞文寺代君李磬字文寺嚴道人也為長章表主簿旄牛夷叛入攻縣表倉卒走鋒刃交至磬傾身捍表謂虜曰乞煞我活我君虜乃煞之表得免太守嘉之圖象府庭在三義敦終始可稱人生於三事之若一君父師也言人靡不有初鮮克有終普磬可謂能終始也炎光中微巨述僭亂炎火光也漢以火德王自高祖至平帝十二世國嗣三絶平帝早崩安漢公王莽字巨君遂篡天子位稱新室皇帝而茂陵公孫述字子陽為莽導江卒正遂僭號於蜀章王刎首章明字公孺繁人也王皓字子離江原人也明為太中大夫莽篡位嘆曰不以一身事二主遂自煞皓為美陽令去莽歸蜀公孫僭號使使聘之皓乃自刎以頭付使者述慚怒誅其妻子侯剛哭漢剛字直孟繁人也為郎見莽篡位佯狂負木斗守闕號哭莽使人問之對曰漢祚無窮吾寧死之不忍事非主也莽追煞之公卿絶脰亦蹈節貫王嘉字公卿江原人也為郎去莽還蜀公孫述先閉其妻子使人徵之嘉聞王皓死歎曰吾後之哉亦自煞述慚貰其妻子羅生美至思濟艱難述方遂非殘彼貞幹羅衍字伯紀成都人也為述郎説述尚書解文卿鄭文伯使諫述降漢為子孫福解鄭從之述怒閉二子於薄室六年二子守志不回遂幽死衍卒察孝廉徵博士劉主割據資我英俊鴻臚淵通與道推運何宗字彥若郫縣人也通經緯天官推步圖讖知劉備應漢九世之運讚立先主為大鴻臚方授公輔會卒君肅矯矯穎類倬群何祗字君肅宗族人也初犍為楊洪為太守李嚴功曹去郡數年以為蜀郡嚴猶在官祗為洪門下書佐去郡數年以為廣漢洪猶在官是以西土咸服諸葛亮之能攬拔秀異也祗徙犍為太守卒輔漢朗捷服時之勤張裔字君嗣成都人也汝南許文休稱其才鍾元常輩也為輔漢將軍丞相長史丞相北征居府統事足食足兵太常清密邃遠鉤深杜瓊字伯瑜成都人也師事任定祖通經緯術藝為太常沈默慎密稱諸生之淳休休衆彥殊塗同臻金聲玉振蜀之球琳休休美也衆彥言此四十三人也易曰殊塗同歸百行齊致貴於流光顯稱揚名垂世此四十三人者雖立行不同俱以垂美如金玉之音器為世名寶述蜀郡人士敬司穆穆暢始玄終敬司司馬氏女五更張伯饒妻也霸前妻有三男一女敬司産一男撫教五子恩愛若一霸卒葬河南敬司與諸子還蜀疾病遺令告諸子曰舜葬蒼梧二妃不從汝父在梁吾自在蜀亦各其志勿違吾勑也遂葬蜀子光超稟母教為聘士也叔紀婉娩十媛仰風叔紀霸女孫也適廣漢王遵至有賢訓事姑以禮生子商海內名士廣漢周幹古朴彭協漢中祝龜為作頌曰少則為家之孝女長則為夫之賢婦老則為子之慈親終溫且惠秉心塞淵宜諡曰孝明惠母公乘氏張兩髦義崇公乘會妻廣都張氏女也夫早亡無子姑及兄弟欲改嫁之張誓不許而言之不止乃斷髮割耳養會族子事姑終身助陳撫孩節篤分充助陳臨邛陳氏女犍為楊鳳圭妻也鳳圭亡養遺生子守節兄弟必欲改嫁乃引刀割咽幾死宗族駭之遂全其義二常煢煢頽搆再隆元常靡常江原人也元常廣都令常良女適廣漢便敬賓早亡元常無子養賓族子父母欲嫁乃祝刀誓志而死靡常仲山女適成都殷仲孫家遭疫氣死亡惟靡常在十八收葬諸喪養遺生子立美成家紀常哀哀精感昭融紀常常侍常洽女趙侯夫人也父遇害長安其二兄皆先沒遣父門生翟登張順迎喪時寇賊蜂起晝夜悲哀順登得將喪無恙還時人皆以紀常精誠所感貢羅誓志貢羅郫羅倩女景奇妻也奇早亡無子父愍其年壯以許同郡何詩貢羅白書誓父不還家父乃使詩白州州告縣逼遣之羅乃訴州刺史高而許之玹何忘生玹何郫何氏女成都趙憲妻也憲早亡無子父母欲改嫁何恚憤自幽乃不食旬日而死郡縣為立石表昭儀殉身昭儀繁張氏女廣漢朱叔賢妻也賢為郡督郵建安十九年劉主圍劉璋於成都賢坐謀外降誅璋以昭儀配兵將見逼昭儀自殺三軍莫不哀嘆二姚見靈廣柔長郫姚超二女妣饒未許嫁隨父在官值九種夷反殺超獲二女欲使牧羊二女誓不辱乃以衣連腰自沈水中死見夢告兄慰曰姊妹之喪當以某日至溉下慰寤哀愕如夢日得喪郡縣圖象府庭峨峨淑媛表圖銘旌淑善媛婉娩也言此十二女皆圖象列傳述蜀郡列女右蜀郡士女讚第一凡五十五人巴郡士女
