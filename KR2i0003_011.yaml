body:
  text: 卷第十中廣漢士女講學沖邃洙泗是睎胤帝紹聖庶熙疇咨楊宣字君緯什邡人也少受學於楚國王子張天文圖緯於河內鄭子侯師楊公叔能暢鳥言長於災異教授弟子以百數成帝徵拜諫大夫帝無嗣宣上封事勸宜以定陶恭王子為太子帝從之出宣為交州牧太子即位為哀帝拜河內太守徵太倉令上言宜封周公孔子後帝從之封周公后公孫相如為褒魯侯孔子後孔均為褒成侯又薦遼東王綱琅㖿徐吉太原郭越楚國龔勝等宜讚隆時雍平帝時命持節為講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒長伯撫遐聲暢中畿析虎命邦綽有餘徽鄭純字長伯郪人也為益州西部都尉處地金銀琥珀犀象翠羽出作此官者皆富及十世純獨清廉毫毛不犯夷漢歌嘆表聞三司及京師貴重多薦美之明帝嘉之乃改西部為永昌郡以純為太守在官十年卒列畫頌東觀三老泱泱實作父師楊統字仲通新都人也事華里先生炎高高戒統曰漢九世王出圖書與卿適應之建武初天下求通內讖二卷者不得永平中刺史張志舉統方正司徒魯恭辟掾與恭共定音律上家法章句及二卷解說遷侍中光祿大夫以年老道深養於辟雍授几杖為三老卒內讖二卷竟未詳平仲涉道殆乎庶幾王祐字平仲郪人也少與雒高士張浮齊名不應州郡辟命司隸校尉陳紀山名知人稱祐天下高士年四十二卒弟獲志其遺言撰王子五篇東觀郎李勝文章士也作誄方之顏子列畫學官文父明洞探賾索微楊序字仲桓統仲子也道業侔父三司及公車連徵辟拜侍中上言西方及荊揚交州當兵起人民疫蝗洛陽大水宮殿當災三府當免陰臣近戚謀變皆效驗大將軍梁冀秉權自退歸家遂修黃老授門徒三千人本初元年及建和中特徵聘不行年八十三卒天子痛惜詔諡曰文父弟子雒昭約節宰綿竹寇歡文儀蜀郡何萇幼正侯祈升伯巴郡周舒叔布及任安董扶等皆徵聘辟舉馳名當世元章玄泊韜光匿輝段翳字元章新都人也明經術妙占未來嘗告大渡津吏曰某日當有諸生二人荷擔問翳舍處者幸為告之後竟如其言又有人從冀州來學積年自以精究翳術辭去翳為筒作書封頭與之告曰有急發之至葭萌爭津吏撾從者頭諸生發筒筒中有書曰到葭萌爭津破頭以膏裹之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子稚子奕奕古之畏愛王渙字稚子郪人也初為河內溫令路不拾遺臥不閉門民歌之曰王稚子世未有平徭役百姓喜遷兗州刺史部中肅清徵拜侍御史洛陽令聰明惠斷公平廉正抑強扶弱化行不犯發奸擲伏忽若有神京華密靜權豪畏敬元興元年卒百姓痛哭二縣弔喪行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦歌之為立祠天子悼惜每下詔書德令必賜後嗣與卓茂等為伍敬伯愷悌樹德播惠王堂字敬伯郪人也初臨巴郡進賢達士舉孝子嚴永隱士黃錯及張璊陳髦民為立祠徙任右扶風政教嚴明帝舅車騎將軍閻顯大將軍竇憲中常侍江京等囑託輒拒之白鹿見象不以為祥徙魯相又徙汝南守舉陳蕃為功曹應嗣司隸校尉號知人之鑑叔宰濟濟以禮進退馮皓字叔宰郪人也少師事楊仲桓及蜀郡張光超後又事東平虞叔雅初為謁者威儀濟濟為成都令遷越巂太守所在著稱為梁冀所不善冀風州追之隱居作易章句及刺奢說修黃老恬然終日大匠奇暢妙監玄察盡言規世祇以隕越翟酺字子超雒人也少事段翳以明天官為侍中尚書常見太史令孫懿歔欷涕泣曰圖書有賊臣孫登將以才智為黃門所害君表相應之是以悽愴後為京兆尹光祿大夫將作大匠上言漢四百年當有弱主閉門聽政數在三百年之閒薦故太尉龐參故司徒李郃明通三才忠正可以輔世所言每指刺疾權貴誣酺及尚書令高堂芝交搆免死著援神契經說卒家司隸聰敏奮名後葉郭賀字喬卿雒人也初為太守黃幸戶曹幸有事與漢中太守李榮俱被徵賀勸幸星行詣詔獄自歸得免榮稽留詔殺之由是顯名太守蔡茂命為主簿茂夢坐大殿極上得嘉禾三穗以問賀對曰明府位當至三公旬月茂遷司徒表賀明律令稍遷侍中尚書僕射司隸校尉荊州刺史百姓歌之曰厥德仁明郭喬卿明帝南巡狩善其治賜三公服去襜露冕使百姓見之以彰有德徵河南尹卒天子痛惜賜錢三十萬鐔蔡翩翩交友惟賢鐔顯字子誦郪人也蔡弓字子騫雒人也俱攜手共學冬則侍親春行受業與張霸李郃張皓陳禪為友共師司徒魯恭顯又與王稚子同見察孝於太守陳司空歷豫州刺史光祿大夫侍中衛尉弓為廬江太守徵拜議郎而霸郃皓禪皆至公卿兩李麗采文藻可觀李尤字伯仁李勝字茂通雒人也侍中賈逵薦尤有相如楊雄之才明帝召作東觀辟雍德陽諸觀賦銘懷戎頌百二十銘著政事論七篇帝善之拜諫大夫樂安相後與劉珍共撰漢紀孫充有文才勝為東觀郎著賦誄論頌數十篇憲父懸車王稚字叔起堂幼子也屢拒孝廉公府十五辟公車徵及授二千石徵以太常終不詣年八十一卒門人録其本行諡曰憲父癸未詔書以安車騁請會已亡徵君肥遁馮信字季誠郪人也郡三察孝廉州舉茂才公府十辟公車再徵不詣公孫述時託目青盲侍婢姦其前陽不覺述卒以年老不出董任循志束帛戔戔董扶字茂安任安字定祖綿竹人也家居教授弟子自遠而至扶初應賢良方正詣京師宰府十辟公車三徵再舉有道為侍中觀漢將亂求為屬國還蜀安察孝及茂才公府辟公車徵皆不詣卒布衣弟子杜微何宗杜瓊皆名士至卿佐文表泛博提攜士彥王商字文表郪人也博學多聞州牧劉璋辟為治中試守蜀郡太守荊州牧劉表大儒南陽宋仲子遠慕其名皆與交好許文休稱商中夏王景興輩也商勸璋攬奇拔雋甚善匡救薦致名士安漢趙韙及陳實盛先墊江龔楊趙敏黎景閬中王淡江州孟彪皆至州右職郡守又為嚴李立祠正諸祀典在官十年而卒超類拔萃實惟世信劉寵字世信綿竹人也出自孤微以明公羊春秋上計闕下見除成都令政教明肅時諸縣多難治乃換寵為郫令又換郪安漢皆垂績還在成都遷牂柯太守初乘一馬之官布衣疏食儉以為教居郡九年乘之而還吏人為之立銘王商陳實當世貴士皆與為友節英亢烈仰訴鼎臣段恭字節英雒人也少周流七十餘郡求師受學經三十年凡事馮翊駱異孫泰山彥之章渤海紀叔陽遂明天文二卷東平虞叔雅學絶高當世遂遊於蜀恭以朋友禮待之後為上計掾會有司劾太尉龐參兼舉茂才孝廉參性忠正亮直為貴戚所擯以恚發病遠近稱冤恭不能耐其枉亢疏表參忠直不當以讒佞傷毀忠正帝悟即日召西曹掾問疾尋羊酒慰勞參忠士遊孝淳感物悟神姜詩字士遊雒人也事母至孝母欲江水及鯉魚膾又不能獨食須鄰母共之詩常供備子汲江溺死祕言遣學不使母知於是有涌泉出於舍側有江水之香朝朝出鯉魚二頭供二母之膳其泉灌田六頃施及比鄰公孫述平後東精為賊掠害不敢入詩里時大荒飢精致米肉與詩詩埋之永平三年察孝廉明帝詔曰大孝入朝孝廉一切皆平之除江陽符長所居鄉皆為之立祠少林陰德陽報是甄王忳字少林新都人也游學京師見客舍有一書生困病忳隱視奄忽便絶有金十斤忳以一斤買棺木九斤還腰下葬埋之後為大渡亭長大馬一匹來入亭中又有繡被一領飛墮其前人莫識者郡縣以畀忳後乘馬到雒縣馬牽忳入他舍主人問忳所由得馬忳具說其狀并及繡被主人悵然曰卿何陰德而致此忳說昔埋書生事主人驚曰是我子也姓金名彥卿乃葬之不報天彰卿德辟舉茂才除郿令宿斄亭中數有人為鬼所煞忳上樓夜半有女子稱冤曰妾涪令妻也當之官宿此枉為亭長所煞大小二十口埋在樓下奪取財物忳曰汝何故以恆殺人女子曰妾不得白日惟依夜訴人眠不肯應恚故殺之初來時言無衣忳以衣衣之言訖投衣而去旦召遊徼詰問具服即收同謀十餘人煞之送涪令喪還鄉里當世稱之仲魚謙沖羊朞字仲魚郪人也父為交州刺史卒官朞迎喪不敢取官舍一物郡三察孝廉公府辟州別駕皆不應太守尹奉棄刑名行禮樂請為功曹刺史必欲借朞自佐不得已為別駕後為太守孫寶蔡茂祋諷功曹當欲渡津津吏滯停車待之三日將宿中亭中有縣吏引車避之為野王令雲卿安貧朱倉字雲卿什邡人也受學於蜀郡張寧餐豆屑飲水以諷誦同業憐其貧資給米肉終不受著河洛解家貧恆以步行為郡功曹每察孝廉羞碌碌詣公府試不就州辟治中從事以諷詠自終伯式玄照折像字伯式雒人也其先張江為武威太守封南陽折侯因氏焉父國為鬱林太守家資二億故奴婢八百人盡散以施宗族恤贍親舊葬死弔喪事東平虞叔雅以道教授門人朋友自遠而至時人為諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經孟宗當仁杜真字孟宗綿竹人誦書百萬言兄事翟酺酺免後尚書令與司隸校尉枉劾之復徵詣獄真上章救之受掠笞六百獄中明酺無事京師壯之以漢道微散財施宗族不應公府辟命及辟長吏候迎每交於門乃斷髮以自絶味道好施清風邁倫讚仲魚以下也漢儒請雨精感慶雲諒輔字漢儒新都人為郡五官掾時天大旱請雨不降輔出禱祈乃積薪祝神曰二日不雨則欲自焚為貪叨吏謝罪百姓言終暴雨韓揆義烈韓揆字伯彥竹人也為令錡裒主簿值黃巾賊入界扶裒走入草中裒遣求隱翳處未還裒為賊所得見害揆殯殮葬埋訖詣從事賈龍求兵討賊賊破曰本報令君而苟自活非忠乃自煞喬雲勇震左喬雲綿竹人也少為左通所養為子通坐任徒徒逃吏欲破通臏通無壯子故為吏所侵喬雲時年十三喟然憤怒以鋭刀煞吏解通走將令出追初聞以為壯士及知是小兒為之流涕楊寬證將烈播友人寬字叔仲新都人也父斌證令萬世太守祋諷以忠義狀聞寬為郡吏鄉人馬閏章言太守五方寬與兄皆詣獄證之得理後方當遷南郡閏復章之寬乃發閏臨私事閏伏罪友人汝錕為張明所煞寬怒縛明送錕家使自謝之寧叔執仇寧叔字茂泰廣漢人與友人張昌共受業太學昌為河南大豪呂條所煞叔煞條自拘河南獄順帝義而赦之張復師讎張鉗字子安廣漢人也師事犍為謝裒裒死負土成墳三年裒子為人所煞鉗復其讎自拘武陽獄會赦免當世義之賈為士死分侔虞朱賈栩字元集什邡人也雒孟伯元為父復讎聞栩名往投之雒縣追伯元蹤栩嘆曰士以義遇我豈可倍哉煞雒縣必移什邡負我君乃自煞李勝誄之以方虞卿魯之朱家郭玉通術蓋亦所修郭玉新都人也明方術伎妙用針作經方頌說官至太醫丞爰迄劉氏司農含章爽朗翠粲觀國之光秦宓字子勑綿竹人也初隱遁不應州郡之命丞相亮領益州牧選為別駕中郎將吳使張溫將反命亮率百官餞之溫與宓語答問若嚮應聲辭義雅美溫大敬服以為蜀之有宓猶魯有仲尼也遷長水校尉司農宓甚有通理弟子譙周具傳其業李王四子並作琳琅李朝字偉南弟邵字永南郪人也王士字義強從弟甫字國山文表諸弟也先主領牧朝為別駕群下上先主為漢中王其文朝所造也後丞相亮府辟西曹掾亦有文才兄弟三人號三龍士歷宕渠犍為益州太守甫善言議人流美稱自綿竹令為州右職優遊容與特進太常鐔承字公文郪人也歷郡守州右職為少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也從事烈至諫君刎首王纍新都人也州牧璋從別駕張松計遣法正迎先主主簿黃權諫不納纍為從事以諫不入乃自刎州門以明不可鄭度進規忠謀莫受雖云天時抑由人咎度綿竹人也先主自葭萌南攻說牧璋曰左將軍懸軍襲我野穀是資急驅巴西梓潼民由涪水以南一切燒除野穀固壘待之彼請戰不許久無所資不過百日必當面縛先主聞而惡之璋不納言雖在天亦由璋之愚永年負才自喪世主彭羕字永年廣漢人有俊才劉璋時坐事為徒及先主入自託龐統為州右職失先主意左遷江陽太守羕望諸葛亮以為心大志廣難可保勸先主因事誅之漢南哽哽天奪其守李邈字漢南邵兄也牧璋時為牛鞞長先主領牧為從事正旦命行酒得進見讓先主曰振威以將軍宗室肺腑委以討賊元功未效先寇而滅邈以將軍之取鄙州甚為不宜也先主曰知其不宜何以不助之邈曰匪不敢也力不足耳有司將殺之諸葛亮為請得免久之為犍為太守丞相參軍安漢將軍建興六年亮西征馬謖在前敗績亮將殺之邈諫以秦赦孟明用霸西戎楚誅子玉二世不競失亮意還蜀十二年亮卒後主素服發哀三日邈上疏曰呂祿霍禹未必懷反叛之心孝宣不好為殺臣之君直以臣懼其逼主畏其威故姦萌生亮身杖強兵狼顧虎視五大不在邊臣常危之今亮殞歿蓋宗族得全西戎靜息大小為慶後主怒下獄誅之詵詵彥造或哲或友昭德音芳垂名厥後總讚此四十六人也述廣漢人士任母治內子成名賢任安母姚氏也雍穆閨門早寡立義資安遂事大儒安教授每為賑恤其弟子以慰勉其志於是安之門生益盈門龐行養姑婦師之先龐行姜詩妻也事姑晝夜紡績以給供養子汲江溺水死祕言遣詣學常作冬夏衣投水中託言寄與子詩呼妻使為姑舂應命遲見遣不敢遠去遊於外供給因鄰母致姑姑勑還依依義舊抗疏拜庭誠感世主徙女輟刑義舊狄道長姜穆女綿竹司馬雅妻也既許婚父坐事徙朔方雅就婚死雇人送其喪尋父母死朔方義舊獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女子許嫁不得從父母徙紀配斷指以章厥貞紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡以己有美色慮人求己作詩三章自誓心而求者猶衆父母將許乃斷指明情養子猛終義太守薛鴻圖象府庭彭王進娥殘體令誠彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馮季宰妻也輔早亡叔父欲改嫁非乃詣太守五方截髮自誓敬亦早亡和養孤守義蜀郡何玉因媒介求之兄曉喻以公族可憑和恚割其一耳季宰亦早亡父母欲改嫁進娥亦翦髮自誓各養子終義正流自沈玉潔冰清正流廣漢李元女楊文妻也適文有一男一女而文沒以織履為業父欲改嫁乃自沈水中宗族救之幾死得免太守五方為之圖象相烏袁福義不存生相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親過哀死福哀感終身父母欲改嫁乃自殺汝氏世胄由婦謙柔汝敦妻某敦兄弟共居有父母時財物嫂心欲得之妻勸送與兄敦盡讓田宅奴婢與兄自出別居後敦耕田得金一器妻復勸送與兄夫妻共往嫂性吝嗇謂欲借貸甚不悅及見金踊躍兄感悟即出妻讓財還弟弟又不受相讓積年後並察孝廉世為冠族思媚列媛美稱惟休總讚十一人也述廣漢列女右廣漢郡士女讚第三凡五十七人犍為士女王延河平纂禹之功王延世字長叔資中人也建始五年河決東郡泛濫兗豫四郡三十二縣沒官民屋舍四萬所御史大夫尹忠以不憂職致河決自煞漢史案圍緯當有能循禹之功在犍河之資陽求之正得延世徵拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平封延世關內侯拜光祿大夫仍賜黃金百斤文伯習禮繼武孫通董鈞字文伯資中人也少受業於鴻臚王臨永平初議天地宗廟郊祀儀禮鈞與太常定其制又定諸侯王喪禮歷城門校尉五官中郎將以儒學貴稱繼叔孫通張公執憲克智克聰極位青紫實作司空張皓字叔明武陽人也以文聰明辟大將軍掾遷尚書僕射彭城相進隱士閭丘遷等徵拜廷尉延光三年安帝將廢太子為濟陰王皓與太常桓焉太僕來歷爭之安帝不許及安帝崩濟陰得立為順帝以皓為司空久之免復徵為廷尉清河趙騰坐謗訕當誅所引八十餘人皓以聖賢明義爭之咸稱平當子鸞司京桴鼓不鳴趙旗字子鸞資中人也初臨甘陵弘農郡甚善治民徵尚書遷司隸校尉時梁冀子弟放恣旗以法繩之不敢為非京師肅清桴鼓不鳴孟文翹翹丕顯有成楊渙字孟文武陽人也以清秀博雅歷臺郎相稍遷尚書中郎司隸校尉甚有嘉聲美稱伯邳正直耀祖揚聲楊淮字伯邳渙孫初為郡守太尉李固薦淮纍世忠直拜尚書太傅陳蕃表為河東入為尚書令奏書治南陽太守曹麻潁川太守曹騰濟南太守孫訓等子弟依託形勢淫縱徵廷尉治罪訓梁冀婦家子也於是權貴憚之又薦朱禹盛精騰延為尚書陸稠為郡守皆名士也桓帝即位拜河南尹遷司隸校尉冀叔父梁忠為執金吾不朝正初劾奏之朝士服其公亮徙將作大匠翁君將命乃播其名楊莽字翁君武陽人為功曹刺史王尊當之州移書諸郡不得遣迎惟犍為遣莽蜀郡遣何霸巴郡遣嚴尊尊大怒莽前對曰使君不使奉迎謙也大守承迎敬也謙敬上下之節不可廢也尊乃欣然請辟別駕舉茂才官至揚州刺史奉君遁世費貽字奉君南安人也公孫述時漆身為厲佯狂避世述破為合浦守蜀中歌之曰節義至仁費奉君不仕亂世避惡君修身於蜀紀名交趾後世為大族任公開明任永字君業僰道人也長歷數王莽時託青盲公孫述時纍徵不詣子溺井中死見而不言妻淫於前面而不怪述平乃曰世適平目即清妻自煞光武徵之以年老不詣卒叔和順終杜撫字叔和資中人也少師事薛漢治五經教授門生千人太守王卿召為功曹司徒辟不詣及聞公免必往承問東平憲王為驃騎將軍辟西曹掾後罷為王師在驃騎府者遣之數年乃去數應三公徵撫侍送故公作詩通議說弟子南陽馮良亦以道學徵聘君橋密精趙松字君橋武陽人為童子數資問費貽及知其避世密與周旋終不露之也述平舉茂才為上黨太守英英四子利於居貞讚費貽以下皇漢弛綱官人失紀文紀謇諤表明臧否張綱字文紀司空皓子也在漢朝公平廉正權宦側目憚之漢安元年以光祿大夫持節與侍中杜喬等循行州郡考察風俗出宮埋車先奏太尉桓焉司徒劉壽尸祿素餐不堪其職出城又奏司隸校尉趙峻河南尹梁不疑汝南太守梁乾等贓污濁亂檻車送廷尉治罪天子以乾梁冀叔父貶秩免峻等又奏魯相寇儀儀自殺威風大行郡縣莫不肅懼還冀恨之出為廣陵太守承叛亂後懷集撫恤甚有治化在官一年卒子續尚書續弟方為豫州牧子孫數世至大官白虜狂僭亂離斯圮孝仲縶馬社稷是死朱遵字孝仲武陽人也公孫僭號遵為犍為郡功曹領軍拒戰於六水門衆少不敵乃埋車輪絆馬必死為述所殺光武嘉之追贈復漢將軍郡縣為立祠建侯弔梁效志知己趙敦字建侯武陽人也初為新都令德禮宣流三司及大將軍梁冀纍辟終不詣冀辟書不絶後冀自殺使者監守不使人弔問敦獨往弔祭訖自拘有司天子赦之叔通敦孝石生江泛隗相字叔通僰道人也養母至孝母食欲江中正流水相冬夏汲之一朝有橫石生正流中哀帝世為孝廉平帝時為郎吳生致養亦感靈祉吳順字叔和僰道人也事母至孝赤烏巢其門甘露降其戶察孝廉永昌太守劉后初載實多良才季休忠亮經事能治楊洪字季休武陽人也先主領牧為部蜀從事及征漢中丞相亮表為蜀郡太守先主疾病永安召亮東行漢嘉太守黃元反後主用其計克元封關內侯後為忠節將軍越騎校尉忠清公亮亮甚信任之德山耽學道以光時伍梁字德山南安人也儒學雅尚州牧諸葛亮選迎為功曹遷五官中郎將烈武作合度曠塗夷惜哉公舉帥直陵遲費詩字公舉南安人也先主領牧為前部司馬群臣勸先主稱尊號詩上疏曰殿下以曹操父子逼主篡盜故乃羈旅萬里糾合士衆將以討賊今大敵未剋而先自立恐人心疑惑昔高祖獲子嬰猶尚推讓況未出門便欲自立耶以是左遷部永昌從事建興三年從丞相亮南征魏將李鴻來降說魏新城太守孟達欲背魏向蜀亮方北圖欲招達為外援欲與書詩進曰孟達小子昔事振威不忠後事先帝背叛反覆之人何足與書也亮默然詩終劉氏之世官位不盡其才君子以昭烈之弘曠武侯之明達詩吐直言猶尚淩遲況庸主昏世率意直言而望肆效者哉文然𥳑略言不詭隨楊羲字文然武陽人也輔漢將軍張裔薦為丞相亮主簿大司馬蔣琬辟東曹掾歷二郡太守為射聲校尉性𥳑略未曾以甘言加人酒後言笑多慢詞失大將軍姜維意為維所廢延熙四年作季漢輔臣讚在蜀書車騎怏怏與國安危張翼字伯恭文紀曾孫也以文武才幹歷征西鎮南大將軍封亭侯延熙十八年與衛將軍姜維西征大破魏雍州刺史王經於狄道經衆死洮水者數萬人維欲進翼諫不可必進無功為蛇畫足時維屢出隴西翼常廷爭以為國小不宜黷武不聽不得已每怏怏從行景耀二年遷左車騎將軍領冀州刺史蜀平後死猗猗衆偉芳烈名垂方德繹勳犍之瓊瑰總讚此二十一人也述犍為人士進楊穆穆先姑是憲進武陽楊氏女大匠廣漢王堂長子博妻也博後母文有母儀之德進楊則其教為行閨門雍穆牂柯太守李褘家亦假係每不知嘆恨徒富貴學問不及博家也陽姬請父厥族蒙援克諧內愛訓及秀彥姬武陽人也生自寒微父坐事閉獄楊渙始為尚書郎告歸郡縣敬重之姬為處女乃邀道扣渙馬訟父罪言辭慷慨涕泣摧感渙愍之告郡縣為出其父因奇其才為子文方以禮聘之結婚大族二弟得仕宦遂世為宦門後文方為漢中太守以趙宣為賢將察孝廉函封未定病卒姬祕不發先遣孝廉上道乃發喪宣得進用姬之力也後文方兄子伯邳為司隸校尉時姬長子穎伯冀州刺史仲子頍二千石伯邳以稟叔母教迎在官舍每教伯邳政治伯邳欲舉茂材選有二人伯邳欲用老者嫌以其耋欲舉五方而其年幼以咨叔母勸舉方後趙宣為犍為五方為廣漢姬尚在故吏敬之四時承問不絶周度割體貞節是全周度僰道人也相登妻十九登亡中牟令吳厚因人求之斷髮以誓志後人猶欲求之乃割其鼻養子早亡其妻左亦年十九遂俱守義世咸嘆婦姑之貞專其節操也敬姬沈淵誠烈邈然曹敬姬南安人也周紀之妻十七出適十九紀亡遺生子元餘服闋父母以許孫賓紿母病迎還知之自投水人赴之氣已絶一日一夜乃蘇息送依紀弟居訓導元餘號為學士年九十卒貞𤤠玉操彌久彌刊貞𤤠字瓊玉牛鞞程氏女張惟妻也十九適惟未朞惟亡無子養兄子悅供養舅姑夙夜不怠資中王沖欲娶𤤠𤤠叔父肱答以女志不可奪沖為太守李嚴督郵嚴記縣遣孝義掾奉羔鴈宣太守命聘之𤤠乃自投水救援不死後太守蘇高為立表太守蜀郡遣仁恕掾論曰貞𤤠太守章陵劉威又為作頌故稱述也韓姜自財后旌其冤韓姜僰道人尹仲讓妻也二十讓亡服除資中董臺因從事王為表弟求姜不許臺門生左習王蘇以為姜可奪教姜家言母病迎還韓氏因逼成婚姜聞故自殺太守巴郡弓楊哀之殺習蘇以報姜死謝姬引決同穴齊定姬南安人武陽儀成妻也成死以己年壯無子將葬乃預作殯殮具毒藥須夫棺入墓拊棺吞藥而死遂同葬縣以表郡郡言州州上尚書天子咨嗟下詔書每大赦賜家帛四匹蜀穀二石媛姜匹婦勉夫濟子授命囹圄義踰國士趙媛姜資中人盛道妻也建安五年道坐過夫婦閉獄子翔方年五歲姜謂道曰官有常刑君不得已矣妾在復何益君門戶君可同翔亡命妾代君死可得繼君宗廟道依違數日姜苦言勸之遂解脫給衣糧使去代為應對度走遠乃告吏殺之後遇赦父子得還道雖仕宦當世痛感終不更娶翔亦不仕耳黃帛求喪沈身中流靈精相感攜夫共浮黃帛僰道人張貞妻也貞受易於韓子方去家三十里船覆死貞弟求喪經月不得帛乃自往沒處躬訪不得遂自投水中大小驚睨積十四日持夫手浮出時人為語曰符有先絡僰道帛求其夫天下無有其偶縣長韓子冉嘉之召帛子幸之為縣股肱烈哉諸媛節稱義遒讚此九女也述犍為列女右犍為士女讚第四凡三十人
