body:
  text: 卷第三蜀志蜀之為國肇於人皇與巴同囿至黃帝為其子昌意娶蜀山氏之女生子高陽是為帝嚳封其支庶於蜀世為侯伯歷夏商周武王伐紂蜀與焉其地東接於巴南接於越北與秦分西奄峨嶓地稱天府原曰華陽故其精靈則井絡垂耀江漢遵流河圖括地象曰岷山之精上為井絡帝以會昌神以建福夏書曰岷山導江東別為沱泉源深盛為四瀆之首而分為九江其寶則有璧玉金銀珠碧銅鐵鉛錫赭堊錦繡罽氂犀象氈毦丹黃空青桑漆麻紵之饒滇獠賨僰僮僕六百之富其卦值坤故多班綵文章其辰值未故尚滋味德在少昊故好辛香星應輿鬼故君子精敏小人鬼黠與秦同分故多悍勇在詩文王之化被乎江漢之域秦豳同詠故有夏聲也其山林澤漁園囿瓜果四節代熟靡不有焉有周之世限以秦巴雖奉王職不得與春秋盟會君長莫同書軌周失綱紀蜀先稱王有蜀侯蠶叢其目縱始稱王死作石棺石椁國人從之故俗以石棺椁為縱目人冢也次王曰柏灌次王曰魚鳧魚鳧王田於湔山忽得仙道蜀人思之為立祠後有王曰杜宇教民務農一號杜主時朱提有梁氏女利遊江源宇悅之納以為妃移治郫邑或治瞿上七國稱王杜宇稱帝號曰望帝更名蒲卑自以功德高諸王乃以褒斜為前門熊耳靈關為後戶玉壘峨眉為城郭江潛綿洛為池澤以汶山為畜牧南中為園苑會有水災其相開明決玉壘山以除水害帝遂委以政事法堯舜禪授之義遂禪位於開明帝升西山隱焉時適二月子鵑鳥鳴故蜀人悲子鵑鳥鳴也巴亦化其教而力農務迄今巴蜀民農時先祀杜主君開明位號曰叢帝叢帝生盧帝盧帝攻秦至雍生保子帝帝攻青衣雄張獠僰九世有開明帝始立宗廟以酒曰醴樂曰荊人尚赤帝稱王時蜀有五丁力士能移山舉萬鈞每王薨輒立大石長三丈重千鈞為墓志今石筍是也號曰筍里未有諡列但以五色為主故其廟稱青赤黑黃白帝也開明王自夢郭移乃徙治成都周顯王之世蜀王有褒漢之地因獵谷中與秦惠王遇惠王以金一笥遺蜀王王報珍玩之物物化為土惠王怒群臣賀曰天承我矣王將得蜀土地惠王喜乃作石牛五頭朝瀉金其後曰牛便金有養卒百人蜀人悅之使使請石牛惠王許之乃遣五丁迎石牛既不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也武都有一丈夫化為女子美而豔蓋山精也蜀王納為妃不習水土欲去王必留之乃為東平之歌以樂之無幾物故蜀王哀之乃遣五丁之武都擔土為妃作冢蓋地數畝高七丈上有石鏡今成都北角武擔是也後王悲悼作臾邪歌隴歸之曲其親埋作冢者皆立方石以志其墓成都縣內有一方折石圍可六尺長三丈許去城北六十里曰毗橋亦有一折石亦如之長老傳言五丁士擔土擔也公孫述時武擔石折故治中從事任文公歎曰噫西方智士死吾其應之歲中卒周顯王三十二年蜀侯使朝秦秦惠王數以美女進蜀王感之故朝焉惠王知蜀王好色許嫁五女於蜀蜀遣五丁迎之還到梓潼見一大蛇入穴中一人攬其尾掣之不禁至五人相助大呼抴蛇山崩時壓殺五人及秦五女并將從而山分為五嶺直頂上有平石蜀王痛傷乃登之因命曰五婦冢山川平石上為望婦堠作思妻臺今其山或名五丁冢蜀王別封弟葭萌於漢中號曰苴侯命其邑曰葭萌焉苴侯與巴王為好巴與蜀仇故蜀王怒伐苴侯苴侯奔巴求救於秦秦惠王方欲謀楚群臣議曰夫蜀西僻之國戎狄為鄰不如伐楚司馬錯中尉田真黃曰蜀有桀紂之亂其國富饒得其布帛金銀足給軍用水通於楚有巴之徑卒浮大舶船以東向楚楚地可得得蜀則得楚楚亡則天下并矣惠王曰善周慎王五年秋秦大夫張儀司馬錯都尉墨等從石牛道伐蜀蜀王自於葭萌拒之敗績王遁走至武陽為秦軍所害其相傅及太子退至逢鄉死於白鹿山開明氏遂亡凡王蜀十二世冬十月蜀平司馬錯等因取苴與巴周赧王元年秦惠王封子通國為蜀侯以陳壯為相置巴郡以張若為蜀國守戎伯尚強乃移秦民萬家實之三年分巴蜀置漢中郡六年陳壯反殺蜀侯通國秦遣庶長甘茂張儀司馬錯復伐蜀誅陳壯七年封子惲為蜀侯司馬錯率巴蜀衆十萬大舶船萬艘米六百萬斛浮江伐楚取商於之地為黔中郡五年惠王二十七年儀與若城成都周回十二里高七丈郫城周回七里高六丈臨邛城周回六里高五丈造作下倉上皆有屋而置觀樓射蘭成都縣本治赤里街若徙置少城內營廣府舍置鹽鐵市官并長丞修整里闠市張列肆與咸陽同制其築城取土去城十里因以養魚今萬歲池是也城北又有龍壩池城東有千秋池城西有柳池西北有天井池津流徑通冬夏不竭其園囿因之平陽山亦有池澤蜀之魚畋之地也赧王十四年蜀侯惲祭山川獻饋於秦孝文王惲後母害其寵加毒以進王王將嘗之後母曰饋從二千里來當試之王與近臣近臣即斃文王大怒遣司馬錯賜惲劍使自裁惲懼夫婦自殺秦誅其臣郎中令嬰等二十七人蜀人葬惲郭外十五年王封其子綰為蜀侯十七年聞惲無罪冤死使使迎喪入葬之郭內初則炎旱三月後又霖雨七月車溺不得行喪車至城北門忽陷入地中蜀人因名北門曰咸陽門為蜀侯惲立祠其神有靈能興雲致雨水旱禱之三十年疑蜀侯綰反王復誅之但置蜀守張若因取笮及其江南地也周滅後秦孝文王以李冰為蜀守冰能知天文地理謂汶山為天彭門乃至湔氐縣見兩山對如闕因號天彭闕髣佛若見神遂從水上立祀三所祭用三牲圭璧沈濆漢興數使使者祭之冰乃壅江作堋穿郫江檢江別支流雙過郡下以行舟船岷山多梓柏大竹頽隨水流坐致材木功省用饒又溉灌三郡開稻田於是蜀沃野千里號為陸海旱則引水浸潤雨則杜塞水門故記曰水旱從人不知飢饉時無荒年天下謂之天府也外作石犀五頭以厭水精穿石犀溪於江南命曰犀牛里後轉置犀牛二頭一在府市市橋門今所謂石牛門是也一在淵中乃自湔堰上分穿羊摩江灌江西於玉女房下白沙郵作三石人立三水中與江神要水竭不至足盛不沒肩時青衣有沫水出蒙山下伏行地中會江南安觸山脅溷崖水脈漂疾破害舟船歷代患之冰發卒鑿平溷崖通正水道或曰冰鑿崖時水神怒冰乃操刀入水中與神鬭迄今蒙福僰道有故蜀王兵蘭亦有神作大灘江中其崖嶄峻不可鑿乃積薪燒之故其處懸崖有赤白五色冰又通笮通文井江徑臨邛與蒙溪分水白木江會武陽天社山下合江又導洛通山洛水或出瀑口經什邡郫別江會新都大渡又有綿水出紫巖山經綿竹入洛東流過資中會江陽皆溉灌稻田膏潤稼穡是以蜀川人稱郫繁曰膏腴綿洛為浸沃也又識察水脈穿廣都鹽井諸陂池蜀於是盛有養生之饒焉漢祖自漢中出三秦伐楚蕭何發蜀漢米萬船而給助軍糧收其精鋭以補傷疾雖王有巴蜀南中不賓也高祖六年始分置廣漢郡高后六年城僰道開青衣孝文帝末年以廬江文翁為蜀守穿湔江口溉灌繁田千七百頃是時世平道治民物阜康承秦之後學校陵夷俗好文刻翁乃立學選吏子弟就學遣雋士張叔等十八人東詣博士受七經還以教授學徒鱗萃蜀學比於齊魯巴漢亦立文學孝景帝嘉之令天下郡國皆立文學因翁倡其教蜀為之始也孝武帝皆徵入叔為博士叔明天文災異始作春秋章句官至侍中揚州刺史元光四年置蜀四部都尉元鼎二年立成都郭十八門於是郡縣多城觀矣六年分廣漢置犍為郡元封元年分犍為置牂柯郡二年分牂柯置益州郡六年以廣漢西部白馬為武都郡蜀南部邛都為越巂郡北部冉駹為汶山郡西部邛笮為沈黎郡合置二十餘縣天漢四年罷沈黎置兩部都尉一治旄牛主外羌一治青衣主漢民孝宣帝地節三年罷汶山郡置北部都尉時又穿臨邛蒲江鹽井二十所增置鹽鐵官蜀自漢興至乎哀平皇德隆熙牧守仁明宣德立教風雅英偉之士命世挺生感於帝思於是璽書交馳於斜谷之南玉帛踐乎梁益之鄉而西秀彥盛或龍飛紫闥允陟璿璣或盤桓利居經綸皓素故司馬相如耀文上京楊子雲齊聖廣淵嚴君平經德秉哲王子淵才高明雋李仲元湛然嶽立林公孺訓詁玄遠何君公謨明弼諧王延世著勳河平其次楊壯何顯得意之徒恂恂焉斯蓋華岷之靈標江漢之精華也故益州刺史王襄悅之命王褒作中和頌令胄子作鹿鳴聲歌之以上孝宣帝帝曰此盛德之事朕何以堪之即拜為郎降及建武以後爰迄靈獻文化彌純道德彌臻趙志伯三遷台衡子柔兄弟相繼元輔司空張公宣融皇極太常仲經為天下材英廣陵太守張文紀號天下整理武陵太守杜伯持能決天下所疑王稚子震名華夏常茂尼流芳京尹其次張俊秦宓英辨博通董扶楊厚究知天文任定祖訓徒同風洙泗其孝悌則有薑詩感物寤靈禽堅精動殊俗隗通石橫中流吳順赤烏來巢其忠貞則王皓隕身不傾朱遵絆馬必死王纍懸頸州門張任守節故主其淑媛則有元常靡常程𤤠及吳几先絡郫之二姚殷氏兩女趙公夫人自時厥後龍宗有鱗鳳集有翼搢紳邵右之疇比肩而進世載其美是以四方述作有志者莫不仰其高風範其遺則擅名八區為世師表矣其忠臣孝子烈士貞女不勝詠述雖魯之詠洙泗齊之禮稷下未足尚也故漢徵八士蜀有四焉然秦惠文始皇克定六國輒徙其豪俠於蜀資我豐土家有鹽銅之利戶專山川之材居給人足以富相尚故工商致結駟連騎豪族服王侯美衣娶嫁設太牢之廚膳歸女有百兩之從車送葬必高墳瓦椁祭奠而羊豕夕牲贈襚兼加賵賻過禮此其所失原其由來染秦化故也若卓王孫家僮千數程鄭各八百人而郤公從禽巷無行人簫鼓歌吹擊鍾肆懸富侔公室豪過田文漢家食貨以為稱首蓋亦地沃土豐奢侈不期而至也蜀郡州治屬縣六戶漢草七萬晉六萬五千去洛三千一百二十里東接廣漢北接汶山西接漢嘉南接犍為州治太城郡治少城西南兩江有七橋直西門郫江中曰沖治橋西南石牛門曰市橋下石犀所潛淵中也城南曰江橋南渡流曰萬里橋西上曰夷里橋上曰笮橋橋從沖治橋西出折曰長升橋郫江上西有永平橋長老傳言李冰造七橋上應七星故世祖謂吳漢曰安軍宜在七星間城北十里有升仙橋有送客觀司馬相如初入長安題其門曰不乘赤車駟馬不過汝下也其郫西上有永平橋於是江衆多作橋故蜀立里多以橋為名其大江自湔堰下至犍為有五津始曰白華津二曰皂里津三曰江首津四曰涉頭津劉璋時召東州民居此改曰東州頭五曰江南津入犍為有漢安橋玉津東沮津津亦七始文翁立文學精舍講堂作石室一作玉室在城南永初後堂遇火太守陳留高瞬更修立又增造二石室州奪郡文學為州學郡更於夷里橋南岸道東邊起文學有女牆其道西城故錦官也錦工織錦濯其江中則鮮明濯他江則不好故命曰錦里也西又有車官城其城東西南北皆有軍營壘城其郡四出大道道實二十里有衢今言十八里者昔蜀王女未嫁年二十亡王哀悼不忍言二十故言十八也王女墓在城北今王女陌是也其太守著德垂績者前漢莫聞建武以來有弟五倫廉范叔度特垂惠愛百姓歌之曰廉叔度來何暮來時我單衣去時重五袴其後漢中趙瑤自扶風太守來之郡司空張溫謂曰弟五伯魚從蜀郡為司空今掃吾第以待足下瑤換廣漢陳留高瞬亦播文教太尉趙公初為九卿適子寧還蜀瞬命為文學撰鄉俗記亦能屈士如此廣漢王商犍為楊洪皆見詠懷及晉建西夷府太守多遷為西夷校尉亦遷益州刺史成都縣郡治有十二鄉五部尉漢戶七萬晉三萬七千名難治漢時廣漢馮皓為令而太守京兆劉宣不奉法皓奏免之立文學學徒八百人實戶口萬八千開稻田百頃治有尤異後有廣漢劉寵為令大姓恣縱諸趙倚公故多犯法濮陽太守趙子真父子強橫寵治其罪莫不震肅郫民陽伯侯奢侈大起冢營因寵為郫令伯侯遂徙占成都寵復為成都豪右敬服有蜀侯祠大姓有柳杜張趙郭楊氏豪富先有程鄭郤公後有郭子平奢豪楊伯侯兄弟郫縣郡西北六十里冠冕大姓何羅郭氏繁縣郡北九十里有泉水稻田三張為甲族江原縣郡西渡大江濱文井江去郡一百二十里有青城山稱江祠安漢上下朱邑出好麻黃潤細布有羌筒盛小亭有好稻田東方常氏為大姓文井江上有常堤三十里上有天馬祠臨邛縣郡西南二百里本有邛民秦始皇徙上郡實之有布濮水從布濮來合文井江有火井夜時光映上昭民欲其火先以家火投之頃許如雷聲火焰出通耀數十里以竹筒盛其光藏之可拽行終日不滅也井有二一燥一水取井火煮之一斛水得五斗鹽家火煮之得無幾也有古石山有石礦大如蒜子火燒合之成流支鐵甚剛因置鐵官有鐵祖廟祠漢文帝時以鐵銅賜侍郎鄧通通假民卓王孫歲取千匹故王孫資纍巨萬億鄧通錢亦盡天下王孫女文君能鼓琴時有司馬長卿者臨邛令王吉與之遊王孫家文君因奔長卿漢世縣民陳立歷巴郡牂柯天水太守有異政陳氏劉氏為大姓冠蓋也廣都縣郡西三十里元朔二年置有鹽井漁田之饒大豪馮氏有魚池鹽井縣凡有小井十數所及漁田之饒江有魚漕梁山有鐵礦江西有安稻田有望川原穿山崖過水二十里漢時縣民朱辰字元燕為巴郡太守甚著德惠辰卒官郡獽民北送及墓獽蛋鼓刀辟踊感動路人於是葬所草木頃許皆倣之曲折迄今蜀人莫不歎辰之德靈為之感應今朱氏為首族也成都市官本有長建武十八年省蜀郡太康初屬王國改號曰成都內史王改封乃復舊廣漢郡高帝六年置屬縣八漢戶十七萬晉四萬去洛三千里南去成都百二十里西接汶山北接梓潼東接巴郡本治繩鄉安帝永初中陰平漢中羌反元初二年移涪後治雒城王莽改曰就都公孫述名曰子同益州以蜀郡廣漢犍為為三蜀土地沃美人士俊乂一州稱望然漢選蜀郡廣漢太守每重德高俊故前有趙護弟五伯魚後有蔡陳表章禮物殊於諸郡其太守著功德者有劉咸孫寶蔡茂陳寵伯魚自郡徑遷司徒寵亦至三公而祋諷尹睦鮮于定趙瑤皆公望也薛鴻輩卿佐也而許靖亦為上公及何祇常閎皆有稱以處州中益州恆治此郡初平中益州牧劉焉自綿竹移雒縣城築闕門云其地不王乃留孫循據之建安十八年劉先主自涪攻圍且一年軍師龐統中流矢死先主痛惜言則涕泣廣漢太守南楊張存曰統雖可惜違大雅之體先主怒曰統殺身成仁非仁乎即免存官十九年夏雒城拔襄陽馬良書詒諸葛亮曰承雒城已下尊兄配業光國魄兆見矣時州或治成都時復治雒為蜀淵府雒縣郡治泛鄉有孝子薑詩田地宅姓族有鐔李郭翟氏綿竹縣劉焉初所治綿與雒各出稻稼畝收三十斛有至五十斛漢時任定祖以儒學教號侔洙泗有多士秦杜為首族也什仿縣山出好茶楊氏為大姓美田有鹽井新都縣蜀以成都廣都新都為三都號名城有金堂山水通於巴漢時五倉名萬安倉有棗魚梁多名士有楊厚董扶又有四姓馬史汝鄭者也五城縣郡東南有水通於巴漢時置五倉發五縣民尉部主之後因以為縣玄武山一名三隅山山出龍骨云龍升其山值天門閉不達墮死於此後沒地中故掘取得龍骨郪縣有山原田富國鹽井濮出好棗宜君山出麋尾特好入貢大姓王李氏又有高馬家世掌部曲蜀時高勝馬秦皆叛伏誅廣漢縣有山原田蜀時彭羕有雋才晉世段容號令德故二姓為甲族也德陽縣有青石祠山原肥沃有澤漁之利士女貞孝望山樂水土地易為生事車騎將軍鄧芝雅有終焉之思後遂葬其山太守夏侯慕時古濮為功曹康古袁氏為四姓大族之甲者也劉氏延熙中分廣漢四縣置東廣漢郡咸熙初省泰始末又分置新都郡太康省末年又置屬王國蜀郡常騫為內史永嘉末省犍為郡孝武建元六年置時治鄨縣十二漢戶十萬鄨故犍為地是也鄨有犍山見保乾圖武帝初欲開南中令蜀通僰青衣道建元年僰道令通之費功無成百姓愁怨司馬相如諷諭之使者唐蒙將南入以道不通執令將斬之嘆曰忝官益土恨不見成都市蒙即令送成都市而殺之蒙乃斬石通閣道故世為諺曰思都郵斬令頭云後蒙為都尉治南夷道元光五年郡移治南廣太初四年益州刺史任安城武陽孝昭元年郡治僰道後遂徙武陽至晉屬縣五戶二萬去洛三千二百七十里東接江陽南接朱提北接蜀郡西接廣漢王橋升其北山彭祖家其彭蒙白虎仁於廣德寶鼎見於江溉綏和元年又上寶磬十六劉向以為美化所降用立辟雍而士多仁孝女性貞專王莽改曰西順郡人不服會更始都南陽遠奉貢職及公孫述有蜀郡拒守述伐之郡功曹朱遵逆戰衆寡不敵遵絆馬死戰遂為述所并而任君業閉戶費貽素隱光武帝嘉之曰士大夫之郡也郡去成都百五十里渡大江昔人作大橋曰漢安橋廣一里半每秋夏水盛斷絶歲歲修理百姓苦之建安二十一年太守南陽李嚴乃鑿天社山尋江通車道省橋三津吏民悅之嚴因更造起府寺城觀壯麗為一州勝宇二十四年黃龍見武陽赤水九日蜀以劉氏瑞應其太守漢興以來鮮有顯者武陽縣郡治有王橋彭祖祠藉江為大堰灌郡下六門有朱遵祠山出鐵及白玉特多大姓有七楊五李諸姓十二也南安縣郡東四百里治青衣江會縣溉有名灘一曰雷坻二曰鹽溉李冰所平也有柑橘官社漢有鹽井南安武陽皆出名茶多陂池西有熊耳峽南有峨眉山山去縣八十里孔子地圖言有仙藥漢武帝遣使者祭之欲致其藥不能得有四姓能宣謝審五大族楊費又有信士呂孟真紀至行也僰道縣在南安東四百里距郡百里高后六年城之治馬湖江會水通越巂本有僰人故秦紀言僰童之富漢民多漸斥徙之有荔芰薑蒟濱江有兵蘭李冰所燒之崖有五色赤白映水玄黃魚從楚來至此而止畏崖映水也有韓原素祠又有孝子隗通為母汲江裔水天為出平石生江中今石在馬湖江而孝子吳順奉母赤烏巢其門崩容江出好磨石江多魚害民失在於徵巫好鬼妖大姓吳隗又有楚石薛相者牛鞞縣受新都江去郡三百里元鼎二年置有陽明鹽井程韓氏為冠蓋之族資中縣受牛鞞江也先有王延世著勳河平後有董鈞為漢定禮王董張趙為四族二縣在中多山田少種稻之地江陽郡本犍為枝江都尉建安十八年置郡漢安程徵石謙白州牧劉璋求立郡璋聽之以都尉廣漢成存為太守屬縣四戶五千去洛四千八百里東接巴郡南接牂柯西接犍為北接廣漢有荔芰巴菽桃枝蒟給客橙俗好文刻少儒學多朴野蓋天性也江陽縣郡治治江雒會有方山蘭祠江中有大闕小闕季春黃龍堆沒闕即平昔云世祖微時過江陽有一子望氣者曰江陽有貴兒氣王莽求之縣人殺之後世祖為子立祠謫江陽民不使冠帶者數世有富義鹽井又郡下百二十里者曰伯塗魚梁云伯氏女為塗氏婦造此梁四姓王孫程鄭八族又有趙魏先周也漢安縣郡東五百里土地雖迫山水特美好宜蠶桑有鹽井魚池以百數家家有焉一郡豐沃四姓程姚郭石八族張季李趙輩而程石傑立郡常秉議論選之符縣郡東二百里元鼎二年置治安樂水會東接巴蜀樂城南水通平夷鄨縣永建元年十二月縣長趙祉遣吏先尼和拜檄巴蜀守過成瑞灘死子賢求喪不得女絡年二十五乃分金珠作二錦囊繫兒頭下至二年二月十五日女絡乃乘小船至父沒所哀哭自沈見夢告賢曰至二十一日與父尸俱出至日父子浮出縣言郡太守蕭登高之上尚書遣戶曹掾為之立碑人為語曰符有先絡僰道張帛求其夫天下無有其偶者矣新樂縣郡西二百八十里元康五年置西楚僰道有鹽井大姓魏呂氏汶山郡本蜀郡北部冉駹都尉孝武元封四年置舊屬縣八戶二十五萬去洛三千四百六十三里東接蜀郡南接漢嘉西接涼州酒泉北接陰平有六夷羌胡羌虜白蘭洞九種之戎牛馬旄氈班罽青頓毞毲羊羖之屬特多雜藥名香土地剛鹵不宜五穀惟種麥而多冰寒盛夏凝凍不釋故夷人冬則避寒入蜀庸賃自食夏則避暑反落歲以為常故蜀人謂之作氐白石子也宣帝地節元年武都白馬羌反使者駱武平之因慰勞汶山吏及百姓詣武自訟一歲再度更賦至重邊人貧苦無以供給求省郡郡建以來四十五年矣武以狀上遂省汶山郡復置都尉漢嘉郡越巂郡拜越巂太守迎者如雲後蜀郡趙溫亦著治績故王莽遣任貴為鎮戍大尹守之自建武後數叛章武三年越巂高叟大帥高定元稱王恣睢遣斯都耆帥李承之煞將軍梓潼焦璜破沒郡土丞相亮遣越巂太守龔祿住安上縣遙領太守安上去郡八百里有名而已延熙三年蜀安南將軍馬忠討越巂郡夷郡夷剛很皆鴟視忠率越巂太守張嶷將所領之郡誘殺蘇祈邑君冬逢及其弟隗渠等懷集種落威信允著諸種漸服又斬斯都耆帥李承之首乃手煞焦璜龔祿者也又討叛鄙降夷人安種落蠻夷率服嶷始以郡郛宇頽更築小塢居之延熙五年乃還舊郡更城郡城夷人男女莫不致力興復七縣嶷遷後復頗姦軌雖有四部斯臾及七營軍不足固守乃置赤甲北軍二牙門及斯臾督軍中堅衛夷徼邛都縣郡治因邛邑名也邛之初有七部後為七部營軍又有四部斯臾南山出銅有邛都河河中有蚌巂山有溫泉穴冬夏常熱其源可湯雞豚下流澡洗治疾病餘多惡水水神護之不可污穢及沈亂髮照面則使人被惡疾一郡通云然臺登縣有孫水一曰白沙江入馬湖水山有砮石火燒成鐵剛利禹貢厥賦砮是也又有漆漢末夷皆有之張嶷取焉闌縣故邛人邑治邛部城接寒關今省蘇示縣漢末夷王及弟隗渠數偝叛以服諸種張嶷先殺王弟隗渠又叛遁入西徼遣親信二人使嶷嶷知姦計以重賂使使殺渠渠死夷徼肅清縣晉省會無縣路通寧州渡瀘得堂狼縣故濮人邑也今有濮人冢冢不閉戶其穴多有碧珠人不可取取之不祥有天馬河馬日千里後死於蜀葬江原小亭今天馬冢是也縣有天馬祠初民家馬牧山下或産駿駒云天馬子也今有天馬徑厥迹存焉河中有銅胎今以羊祀之可取河中見存土地時産犀牛山色青碧大筰縣漢末省也定筰縣筰笮夷也汶山曰夷南中曰昆明漢嘉越巂曰筰蜀曰邛皆夷種也縣在郡西渡瀘水賓剛徼曰摩沙夷有鹽池積薪以齊水灌而後焚之成鹽漢末夷皆錮之張嶷往爭夷帥狼岑槃木王舅不肯服嶷禽撻殺之厚賞賜餘類皆安官迄有之北沙河是三縫縣一曰小會無音三播通道寧州渡瀘得蜻蛉縣有長谷石豬坪中有石豬子母數千頭長老傳言夷昔牧豬於此一朝豬化為石迄今夷不敢牧於此卑水縣去郡三百里水流通馬湖潛街縣漢未置晉初省安上縣馬湖縣水通僰道入江晉初省右益州漢初統郡五後漸分建蜀郡及巴郡又分為五郡廣漢漢中犍為為四郡又開益州五郡合二十五郡及寧州梁州建復增七郡蜀於是有三州四十二郡一百九十六縣州分後益州凡新舊郡九縣四十八戶夷晉二十二萬撰曰蜀之為邦天文井絡輝其上地理岷嶓鎮其域五嶽則華山表其陽四瀆則汶江出其徼故上聖則大禹生其鄉媾姻則黃帝婚其女顯族大賢彭祖育其山列仙王喬升其岡而寶鼎輝光於中流離龍仁虎躍乎淵陵開闢及漢國富民殷府腐穀帛家蘊畜積雅頌之聲充塞天衢中和之詠侔乎二南蕃衍三州土廣萬里方之九區於斯為盛固乾坤之靈囿先王之所經緯也
