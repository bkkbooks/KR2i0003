body:
  text: 卷第十二序志巴蜀厥初開國載在書籍或因文瑋或見史記久遠隱沒實多疏略及周之世侯伯擅威雖與牧野之師希同盟要之會而秦資其富用兼天下漢祖階之奄有四海梁益及晉分益為寧司馬相如嚴君平楊子雲陽成子玄鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀略舉其隅其次稱聖賢仁人志士言為世範行為表則者名注史錄而陳君承祚別為耆舊始漢及魏煥乎可觀言三州土地不復悉載地理志頗言山水歷代轉久郡縣分建地名改易於以居然辨物知力猶未詳備於時漢晉方隆官司星列提封圖簿歲集司空故人君學士蔭高堂翳帷幕足綜物土不必待本紀矣曩遭阨運函夏滔堙李氏據蜀兵連戰結三州傾墜生民殲盡府庭化為狐狸之窟城郭蔚為羆熊之宿宅遊雉鹿田棲虎豹平原鮮麥黍之苗千里蔑雞狗之響丘城蕪邑莫有名者嗟乎三州近為荒裔桑梓之域曠為長野反側惟之心若焚灼懼益遐棄城陴靡聞乃考諸舊紀先宿所傳并南裔志驗以漢書取其近是及自所聞以著斯篇又略言公孫述蜀書咸熙以來喪亂之事約取耆舊士女英彥肇自開闢終乎永和三年凡十篇號曰華陽國記夫書契有五善達道義章法式通古今表功勳而後旌賢能恨璩才短少無遠及不早援翰執素廣訪博咨流離困瘵方資腐帛於顛牆之下求餘光於灰塵之中劘滅者多故雖有所闕猶愈於遺忘焉蜀紀言三皇乘祗車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十八年秦厲公城南鄭此谷道之通久矣而說者以為蜀王因石牛始通不然也本紀既以炳明而世俗閒橫有為蜀傳者言蜀王蠶叢之閒周迴三千歲又云荊人鼈靈死屍化西上後為蜀帝周萇弘之血變成碧珠杜宇之魄化為子鵑又言蜀椎髻左衽未知書文翁始知書學案蜀紀帝居房心決事參伐參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流於西故周失紀綱而蜀先王七國皆王蜀又稱帝此則蠶叢自王杜宇自帝皆周之叔世安得三千歲且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則為怪異子所不言況能為帝王乎碧珠出不一處地之相距動數千里一人之血豈能致此子鵑鳥今云是巂或曰巂周四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由來遠矣孔子述而不作信而好古竊比於我老彭則彭祖本生蜀為殷太史夫人為國史作為聖則僊自上世見稱在昔及周之未服事於秦首為郡縣雖濱戎夷亦有冠冕故蜀紀曰大人之鄉方大之國也至於漢興反當荒服而無書學乎漢書曰郡國之有文學因文翁始若然翁以前齊魯當無文學者漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕胥聊著翰墨當時以為極歡後人有以為惑恐此之類必起於元靈之由也惟智者辨其不然幸也綜其理數或以為西土險固襟帶易守世亂先違道治後服若吳楚然固逋逃必萃奸雄闚覦蓋帝王者統天理物必居土中德膺命運非可資能恃險以干常亂紀雖饕竊名號終於絕宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而取也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之所產古無興國夫恃險憑危不階曆數而能傳國垂世所未有也故公孫劉氏以敗於前而諸李踵之覆亡於後天人之際存亡之術可以為永鑒也干運犯曆破家喪國可以為京觀也今齊之國志貫之一揆同見不臣所以防狂狡杜奸萌以崇春秋貶絕之道也而顯賢能著治亂亦以為獎勸也其序曰先王經略萬國剖分厥甸巴梁式象縣辰九牧述職貢賦以均佐周斃紂相漢亡秦實繁其民世載其俊述巴志第一維天有漢鑒亦有光實司群望表我華陽炎劉是應洪祚攸長述漢中志第二井絡啟耀文昌契符芒芒禹蹟畫為九州功冒普天率土以休光靈遐昭慶祚爽流邦家濟濟世德球球述蜀志第三蠢爾南域在彼要荒漢武德振蠻貊是攘開州列郡幽裔來王柔遠能邇實須才良甄德表失以明紀綱述南中志第四赤德中微巨猾干篡白虜乘釁致民塗炭爰迄靈獻皇極不建牧后失圖英雄迭進覆車齊軌蒙此艱難述公孫劉二牧志第五政去王室權流三傑瓜分天壤宰割民物舍彼信順任此智計大道既隱詭詐競設並以豪特力爭當世居正慮明名號絕替身兼萬乘籍同列國述劉先主志第六乾坤混始樹君立王天工人代萬邦是望明不二日地不重王苟非其器窮高必亢濛濛後主弗慮弗臧負乘致寇世業以喪述劉後主志第七陽升三九品物始亨帝紘失振任非其良趙倡禍階亂是用長羅州播蕩朱旌莫亢皮張不造戎醜攸行哀哀黎元顧瞻靡望述大同志第八素精南飄天維弛綱薨薨特流肆其豺狼蕩雄纂承殲我益梁牧守顛摧黔首卒嘗三州毀曠悠然以荒絡結王網民亦流亡述李特雄期壽勢志第九華嶽降精江漢吐靈濟濟多士命世克生德為世雋幹為時貞略舉士女表諸賢明世濟其美不隕其名述先賢士女總讚論第十皇皇大晉下土是覆化贍教洽誕茲彥茂峨峨俊乂亹亹英秀如嶽之崇如蘭之臭經德秉哲綽然有裕述後賢志第十一博考行故總厥舊聞班序州部區別山川憲章成敗旌昭仁賢抑絀虛妄糾正繆言顯善懲惡以杜未然述序志第十二譔曰駟牡騤騤萬馬龍飛陶然斯猶阜會京畿麐獲西狩鹿從東麋郇伯勞之旬不接辰嘗茲珍嘉甘心庶幾中為令德一行可師璝瑋俶儻貴韜光暉據沖體正平揖宣尼道以禮樂教洽化齊木訥剛毅有威有懷鏘鏘宮縣磬筦諧諧金奏石拊降福孔皆綜括道檢總覽幽微選賢與能人遠乎哉益梁寧三州先漢以來士女目錄常道將集高尚逸民嚴遵字君平高尚逸民林閭字公孺德行治中從事李弘字仲元德行給事黃門侍郎楊雄字子雲文學神童楊鳥文學侍中揚州刺史張寬字叔文文學中郎將司馬相如字長卿文學諫議大夫王褒字子淵尚書郎楊壯美秀中郎將何霸字翁君執正大司空氾鄉侯何武字君公潁川太守何顯黃門侍郎鄧通卓王孫政事左曹衛將軍護軍都尉陳立字少遷節士太中大夫章明字公儒節士尚書郎侯剛字直孟節士尚書郎王嘉字公卿節士美陽令王皓字子離右十九人在前漢知士博士羅衍字伯紀德政益州太守王阜字世公長沙太守任循字伯度公亮大司農司隸校尉任昉字文始徐州刺史任愷字文悌文學校書郎楊終字子山文學侍中漢五更張霸字伯饒謚曰文父聘士張楷字公超聘士張光超尚書張陵字處沖義士趙定保貴太尉司徒司空特進廚亭文侯趙戒字志伯文學國師太常趙典字仲經忠亮太尉司徒郫忠侯趙謙字彥信道德司徒司空趙溫字子柔義烈侍中長水校尉常洽字茂尼道德侍御史常詡字孟元述作謁者僕射何英字叔俊經治犍為屬國何汶字景由高士楊由字哀侯篤愛高士侯祈字升伯篤愛博士楊班字仲桓公府辟士羅衡字仲伯至孝孝廉禽堅字孟由推賢美陽令柳宗字伯騫求次方王仲曾張叔遼殷知孫匡正治中從事張充字伯春匡正司空辟士李𢆻字孟元猛略部從事楊竦字子恭守憲治中從事陳湛字子伯節士仲圼高士王廣仁義志士任末字叔本烈士嚴道主簿李磬字文寺義烈郡功曹史朱普字伯禽巴郡太守朱辰字元燕述作漢中太守鄭廑字伯邑右四十人馳名後漢大鴻臚何宗字彥英雙柏長何雙字漢偶潁逸廣漢犍為太守何祗字君肅忠懃輔漢將軍張裔字君嗣玄寂太常杜瓊字伯瑜侍中常竺字代文南安將軍張表字伯達永昌太守王伉右八人在劉氏世五更張霸夫人司馬敬公乘會婦張氏犍為楊鳳珪妻陳助廣漢便敬賓婦常元殷氏婦常靡趙侯夫人常紀景奇妻羅貢趙憲妻何玹朱叔賢妻張昭儀廣柔長姚超二女姚妣饒廣漢王遵妻張叔紀右十二人列女右蜀郡士女七十九人明略渡沔侯范目文學聘士洛下閎字長公玄始侍御史任文孫文學司空掾任文公先生胥君安京兆尹徐誦字子產忠正侍中譙隆字伯司高清太中大夫譙玄字君黃潔白尚書郎譙英公車令趙珜字孫明公府掾趙毅字仲都公車令臧太伯儁才涼州刺史趙宏字溫柔右十三人前漢政事揚州刺史嚴遵字王思徐州牧嚴羽字子翼長安令王偉卿政事大司農玄賀字文和將略大鴻臚龐雄字宣孟政事幽州刺史馮煥明略使持節車騎將軍馮緄字鴻卿降虜校尉馮允字公信尚書郎馮遵字文衡政事司隸校尉陳禪字紀山漢中太守陳澄別駕從事陳實字盛先思防治中從事楊仁字文義志士荊州刺史龔調字叔侯忠貞魏郡太守趙晏字平仲籌畫益州太守李顒字德卬汝南太守謁煥字闕度遼將軍桂陽太守然溫字闕美化越巂太守張翕字叔陽越巂太守張璊至孝上蔡令趙邵字伯泰孝子嚴永名儒陳髦隱士黃錯巴郡太守龔楊字闕茂才孟彪日南太守黎景字闕茂才王澹文學掾龔榮桂楊太守李溫戶曹掾趙芬上谷太守陳宏忠義宕渠主簿曲庾忠義宕渠主簿馮湛烈女郝伯都右三十五人後漢義烈江陽太守程畿字季默程祈字公弘楊汰字季儒韓儼黎韜壯烈將軍嚴顏玄貞徵士周舒字叔布文學儒林校尉周群字仲直博士周巨雅重車騎將軍育陽景侯黃權字公衡尚書郎黃崇勇壯折衝將軍西陵太守甘寧字興霸政事鎮南大將軍彭鄉亭侯馬忠字德信將略鎮北大將軍安漢侯王平字子均果壯左將軍宕渠侯勾扶字孝興將略盪寇將軍關內侯張嶷字伯岐尚書僕射姚伷字子緒別駕從事馬勳字盛衡亢烈辟士段恭字節英隱士夫子段翳字元章隱士馮信字季誠越巂太守馮顥字叔宰武威太守南陽折侯張江鬱林太守折國高士折象字伯式治中祭酒朱倉字雲卿政事䍧柯太守劉寵字世信孝子江陽符長姜詩字士遊陰德郿令王忳字少林交州牧羊甚推讓野王令羊朞字仲魚文學侍中董扶字茂安文學聘士任安字定祖高讓義士杜真字孟宗精誠五官諒輔字漢儒義士楊寬字叔仲義士張鉗字子安烈士賈栩字元集高士昭約字節宰術藝使持節交州牧楊宣字君緯學士嚴象大儒趙翹烏丸校尉郭堅字闕善績司隸校尉郭賀字喬卿光祿大夫侍中衛尉鐔顯字子誦廬江太守蔡弓字子騫永昌太守鄭純字長伯文學高士王祐字平仲文才樂安相李尤字伯仁尚書郎李充文才東觀郎李勝字茂通公亮將作大匠翟酺字子超明廉侍御史洛陽令王渙字稚子司隸校尉王堂字敬伯聘士王稚字叔起謚曰憲文堂長子博博子遵善績蜀郡太守王商字文表尚書馬參字承伯越巂太守龔祿字德緒鎮軍將軍襲皦字德光徵士譙𡸫字榮始淵通散騎常侍城陽亭侯譙周字允南右二十三人在劉氏三國之世馬妙祈妻義趙雲君妻華王元憒妻姬趙憒妻姬童女趙英趙萬妻娥耿秉妾行鮮尼母姜右八人列女右巴郡凡士女七十九人道德三老楊統字仲通光祿大夫楊博字仲達文學侍中楊厚字仲桓謚曰文父高士寇懽字文儀節士甯叔字茂泰忠義緜竹主簿韓揆字伯彥壯童左喬雲孝廉汝敦周幹彭勰古朴方術太醫丞郭玉字通直右五十二人馳名漢世別駕從事李朝字偉南丞相西曹掾李邵字永南文才大司農秦宓字子敕益州太守王士字義強別駕從事王甫字國山優遊特進太常關內侯鐔承字公文才儁江陽太守彭羕字永年忠謀從事鄭度忠烈從事王累右九人在劉氏世及二牧時聘士任安母姚姜詩妻龐行姜嬪字義舊廖伯妻殷紀配便敬妻王和李珥字進娥王輔妻彭非李平字正流袁稚妻相烏王上妻袁福汝敦妻右十一人列女右廣漢郡凡士女七十二人知術光祿大夫關內侯王延世字長叔揚州刺史楊莽字翁君忠壯復漢將軍