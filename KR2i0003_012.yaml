body:
  text: 卷第十下漢中士女鄭真嶽峙確乎其清鄭子真褒中人也玄靜守道履至德之行乃其人也教曰忠孝愛敬天下之至行也神中五徵帝王之要道也成帝元舅大將軍王鳳備禮聘之不應家谷口世號谷口子真云漢中為立祠衛梁泥盤玄湛淵亭衛衡字伯梁南鄭人也少師事隱士同郡樊志張以高行聞郡九察孝廉公府州十辟公車三徵不應董扶任安從洛還過見之曰京師天下之市朝也足下猶之人耳何其在遠以虛名屢動徵書若至中國則價盡矣衡笑曰時有險易道有污隆若樊季齊楊仲桓雖應徵聘何益於時乎苟無所則尼軻栖栖是以君平子真不屈其志豈子之徒也哉吾何虛假之有安扶服之敬其言也鄧公亢對忠枉原情鄧公成固人也景帝時御史大夫朝錯患諸侯強大建議減削會吳楚七國謀反假言誅錯故吳相袁盎譖帝殺之拜盎太常使赦七國七國遂叛鄧公為謁者入言軍事帝問曰七國聞朝錯死罷兵不對曰吳王即山鑄錢煮海為鹽謀反積數十年錯患之故欲削弱為萬世策諸侯憂之計畫始行身死東市諸侯莫憚內杜忠臣之口外為諸侯報怨臣竊為陛下不取也帝嘆息曰吾亦恨之武帝初為九卿博望致遠西南來庭張騫成固人也為人強力有謀能涉遠為武帝開西域五十三國窮河源南至絶遠之國拜校尉從討胸奴有功遷衛尉博望侯於是廣漢緣邊之地通西南之塞豐絶遠之貨令帝無求不得無思不服至今方外開通騫之功也子遊師生讒巧所傾張猛字子遊騫孫也師事光祿勳周堪以光祿大夫給事中侍元帝帝當廟祭濟渭欲御樓船御史大夫薛廣德當車免冠乞頸血污車輪陛下不得廟祭矣帝色不悅猛進曰主聖則臣直今乘船危就橋安聖主不乘危故大夫言之帝曰曉人不當如是也後與周堪俱以忠正為幸臣弘恭石顯所譖毀乍出乍徵堪平和猛卒自殺王孫養性矯葬厲生楊王孫成固人也治黃老家纍千金厚自奉養臨終告其子曰我死裸葬以復我真但為布囊盛尸入地七尺既下從足脫之以身親土其子不忍見王孫友人祁侯祁侯諫之王孫曰厚葬無益死者也夫僤財送死今日入明日發此真無異暴骸中原裹以幣帛隔以棺椁含以珠玉後腐朽乃得歸土不可故吾欲早就真宅祁侯無以易卒裸葬如其言司徒監使術暢思精屢登上司七政是經李郃字孟節南鄭人也少明經術為郡候吏和帝遣使者二人微行至蜀宿郃候舍郃為出酒夜飲露坐郃問曰君來時寧知二使何日發來耶二人怪問之郃指星言曰有二使星入益部後一人為漢中太守命為公曹察孝遂馳名為尚書郎徙左丞稍遷至尚書僕射尚書令拜司空又進司徒清公直亮當世稱名順帝世薨炎精下頽朱明不揚太尉謇諤任國救荒濯日暘谷將升扶桑惡直醜正漢道遂喪李固字子堅郃子也陽嘉三年以對策忠亢拜議郎大將軍梁商后父也表為從事中郎授荊州刺史直州部有亂至州先友其賢者南陽鄭叔躬宋孝節零陵支宜雅表薦長沙桂陽太守趙歷欒巴奏免江夏南陽南郡太守孔疇高賜為昆等州土自然安靜徙太山太守克寧盜賊入為將作大匠多致海內名士南陽樊英江夏黃瓊廣漢楊厚會稽賀純光祿周舉侍中杜喬陳留楊倫河南尹存東平王惲陳國何臨清河房植等皆蒙徵聘轉大司農順帝崩太后臨朝拜太尉與后兄大將軍梁冀太傅趙峻並録尚書事沖帝崩時徐揚有盜賊太后欲不發喪須召諸王至固爭不可言國家多難宜立長君太后欲專權乃立樂安王子為質帝質帝崩太后復與梁冀謀所立固與司徒南郡胡廣司空蜀郡趙戒書與冀引周勃霍光立文宣以安漢之榮閻鄧廢立之禍言國統三絶期運厄會興崩之漸在斯一舉宜求賢王親近不可寢默也冀得書召公卿列侯議所立三公及鴻臚杜喬僉舉清河王蒜冀然之奏御太后中常侍曹騰私恨蒜説冀明日更議廣戒從冀固與喬必爭蒜宜立中興才也且年長識義必有厚將軍冀不聽策免固喬歲餘收下獄以無事出之京師市邑皆稱千萬歲冀惡其為人所善更奏繫之固書與二公曰吾欲扶持漢室使之比隆文宣何圖梁將軍迷謬諸子曲從以吉物為凶成事為敗漢家衰微從是始矣將軍亦有不利吾雖死上不慚於天下不愧於人求義得義死復何恨遂自殺二公得書惟自流涕士民咸哀哭之桓帝無道冀尋受誅漢家遂微政在閹宦無不思固也元修敦重威惠實亮張亮則字元修南鄭人也為牂柯太守威著南土永昌越巂夷謀欲反畏則換臨其郡相諫而止號曰臥虎以伐狄勳遷護羌校尉徵拜扶風又換臨桂陽皆平盜賊巴郡板楯反拜降集校尉鎮漢中徙涼州刺史又為魏郡太守所在稱治靈帝崩後大將軍袁紹表為長史不就丞相曹公拜度遼將軍子雅溫恭見察文方趙宣字子雅南鄭人也出自寒微以溫良博雅太守犍為楊文方深器異之遂察孝廉官至犍為太守二圭琬琰三辰懸望趙瑤字元圭琰字稚圭凡七兄弟宣子也皆以令德著聞瑤少有公望始為緱氏袁趙二公相與書曰趙瑤在緱氏猛虎歸迹百里均耳叔平何難遷扶風太守徙蜀郡司空張溫謂之曰昔弟五伯魚從蜀郡為司空掃吾第以侍足下矣瑤曰諾尋換廣漢卒琰始為青州刺史於廳事前置大器盛水貴要有托書悉投於水部下清肅徙梁相徵拜尚書不就卒仲卿報友行義以理陳綱字仲卿成固人也少與同郡張宗受學南陽以母喪歸宗為安衆劉元所殺綱免喪往復之值元醉臥還須醒乃煞之自拘有司會赦免三府並辟舉茂才拜弘農太守初至有兄弟自相責引退是後無訟者在官九年卒天子痛惜賜家錢四十萬伯度玄鏡榮辱屑己李法字伯度南鄭人也桓帝時為侍中光祿大夫數亢表宦官太盛椒房太重史官記事無實録之才虛相褒述必為後笑帝怒免為庶人恬然以咎失為己責久之徵拜汝南太守遷司隸校尉湛然無自得之容德公在林懸象垂晷既沖雲清荀張儀準李燮字德公太尉固子也父死時二兄亦死燮為姊所遣隨父門生王成亡命徐州傭酒家酒家知非常人以女妻之延熹二年梁冀誅後日經陽道暈五車史官上書昔有大星升漢而西捲舌揚芒迫月熒惑犯帝座則有大臣枉誅星在西方大尉固應之今暈如之宜有赦命録其遺嗣以除此異於是下赦燮得返舊四府並辟公車徵議郎與趙元圭潁川賈偉節荀慈明南陽張伯慎為友伯慎為潁川太守與慈明交相論言偉節與焉京師以為臧否伯慎問趙元圭曰德公所言何元圭曰無言也伯慎追嘆曰當如德公兒輩徒靡沸耳慈明亦寤而心變拜安平相王為黃巾所沒得出天子復封之燮以為不可果敗遷京兆尹時人為之語曰李德公父不欲立帝子不欲立王伯臺處諫帥言亢盡末命防萌妙覩玄揆陳雅字伯臺成固人也靈帝時為諫大夫閹宦用事上疏曰昔孝和帝與中常侍鄭衆謀誅大將軍竇憲由是宦官秉權安帝幼沖和熹太后兄大將軍鄧騭輔政太后適崩中常侍江京等殺騭安帝登遐黃門孫程又殺車騎將軍閻顯孝桓帝又與中常侍單超等共誅大將軍梁冀陛下即祚太傅陳蕃大將軍竇武尚書令尹勳等欲誅宦官絶其姦擅盡忠王室建萬世策機事不密為中常侍朱瑀等所殺此即陛下所見今宦官強盛威傾人主天下鉗口莫敢言者海內怨望妖孽並作四方兵起萬姓辛苦陛下尚可以安奈後嗣何帝不省納出為巴郡太守年七十五卒臨終戒其子曰期運推之天下將大亂雄夫力爭無以貨財為意吾亡依山薄葬亡歲餘靈帝崩大將軍何進復為黃門所殺海內果亂終成三國也孟度邵允閻憲字孟度成固人也名知人為綿竹令以禮讓為化民莫敢犯男子杜成夜行得遺物一囊中有錦二十五匹求其主還之曰縣有明君何敢負其化童謠歌曰閻尹賦政既明且昶去苛去辟動以禮讓遷蜀郡吏民涕泣送之以千數季子英瑋李歷字季子太尉固從弟也少修文學性行清白與鄭康成陳元方齊名弱冠拜新城令朝請都督計君經算程苞字元道南鄭人也光和二年上計吏時巴郡板楯反軍旅數起征伐頻年天子患之訪問益州計曹考以方略苞對言板楯忠勇立功先漢為帝義民羌入漢中輒蒙其力東征南戰世有功勞由不料恤以致叛亂非有僭盜能相群殺大兵臨之未必卒得不如但選明能太守恩信懷服自然安定矣天子從之卒如其言後在道卒元靈斐斐祝龜字元靈南鄭人也年十五遠學汝潁及太學通博蕩達能屬文太守張府君奇之曰吾見海內士多矣無如祝龜者也州牧劉焉辟之不得已行授葭萌長撰漢中耆舊傳以著述終禮高殉名段崇字禮高南鄭人也太守河間鄭廑命為主簿永初四年涼州羌反溢入漢中從廑屯褒中虜東攻廑欲戰崇諫不可願固壘待之廑不聽出戰敗績崇與門下史王宗原展及子勃兄子伯生摧鋒死戰衆寡不敵崇等皆死羌遂得廑殺之伯義節死程信字伯義南鄭人也時為功曹居守馳來赴難殯殮廑喪送還鄉里訖乃結故吏冠蓋子弟二十五人誓共報羌各募敢死士以待時太守鄧成命信為五官元初二年虜復來信等將其同志率先奮討大破之信被八創死天子咨嗟元初五年下詔書賜信崇家穀數千斛四行齊致在茲六子讚閻憲已下也又有王宗原展及嚴孳李容薑濟陳已曹廉勾矩劉旌九人皆以令義為鄭廑所命王宗原展與廑同死孳容等七人與信共并命詔書既賜崇信家又賜九子家穀各五百斛給死事復元侯趙陳蓋亦烈士燕邠字元侯趙嵩字伯高南鄭人也陳調字元化仲卿孫也邠為刺史郤儉從事使在葭萌與從事董馥張胤同行儉為黃巾賊王饒趙播等所殺邠聞故哀慟説馥胤赴難二子不可邠歎曰使君已死用生何為獨死之牧劉焉嘉之為圖象學官誅馥等嵩事太守蘇固固為米賊張修所疾殺嵩痛之杖劍直入修營殺十餘人幾獲修死陳調少尚遊俠聞固死聚賓客百餘人攻修大破之進攻修營乃與戰以傷死渙渙龍宗振振麟趾文炳彬蔚漢之表軌總讚二十五人也述漢中人士其陳術字申伯作耆舊傳者也失其行事歷新城魏興上庸三郡太守及錫光等不列也穆薑溫仁化繼為親穆薑安衆令程祗妻司隸校尉李法姊也祗前妻有四子興敦覲豫穆薑生二子淮基祗亡興等憎惡薑薑視之愈厚其資給六子以長幼為差衣服飲食凡百如之久興等感寤自知失子道詣南鄭獄受不愛親罪太守嘉之復除門戶常以二月八月社致肉三十斤酒米各二斛六斗六子相化皆作令士五人州郡察舉基字稚業特雋逸為南郡太守泰瑛嚴明世範厥訓泰瑛南鄭楊矩妻大鴻臚劉巨公女也有四男二女矩亡教訓六子動有法矩長子元珍出行醉母十日不見之曰我在汝尚如此我亡何以帥群弟子元珍叩頭謝過次子仲珍白母請客既至無賢者母怒責之仲珍乃革行交友賢人兄弟為名士泰瑛之教流於三世四子才官隆於先人故時人為語曰三苗止四珍復起杜氏之教父母是遵杜泰姬南鄭人趙宣妻也生七男七女若元圭稚圭有望五人皆令德其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寬宓子賤帶弦以自急故能改身之恆為天下名士戒諸女及婦曰吾之妊身在乎正順及其生也恩存於撫愛其長之也威儀以先後之禮貌以左右之恭敬以監臨之勤恪以勸之孝順以內之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也後七子皆辟命察舉牧州守郡而漢中太守南鄭令多與七子同歲秀孝上計無不修敬泰姬執子侄禮禮圭肅穆言存典韻禮圭成固陳省妻也楊元珍之女生二男長娶張度遼女惠英少娶荀氏皆貴家豪富從婢七八資財自富禮圭勑二婦曰吾先姑母師也常言聖賢必勞民者使之思善不勞則逸逸則不才吾家不為貧也所以粗食急務者使知苦難備獨居時二婦再拜奉教從孫奉上微慢圭抑絶之感悟革行遭亂流行宗表欲見之必自嚴飾從子孫侍婢乃引見之曰此先姑法也四時祭祀自親養牲釀酒曰夫祭禮之尊也年八十九卒惠英亦有淑訓母師之行者也文姬睿敏宗祀獲歆文姬南鄭趙伯英妻太尉李固女也父為梁冀所免兄憲公季公罷官歸文姬歎曰李氏滅矣乃與二兄議匿弟燮隨父門生王成亡命徐州涕泣送之謂成曰託君以六尺之孤若李氏得嗣君之名義參於程杵矣久之遇赦燮得還行喪服闋勑之曰先公為漢忠臣雖死之日猶生之年梁冀以族弟幸濟豈非天乎慎勿有一言加梁氏加梁氏則連主上是又掇禍也奉行之從成在徐州各異處傭賃而私相往來成病亡燮四時祭之陳氏二謙或智或仁陳順謙妹惠謙成固人也順謙適鄧令曹寧十九寡居長育遺孤八十餘卒兄子陳規著書歎述之惠謙適張亮則在扶風官下吏白欲重禁嚴防以肅非元修訪於惠謙惠謙曰恢弘德教養廉免恥五刑三千蓋亦多矣又何加也兄子伯思學仙道惠謙戒之曰君子疾沒世而不稱不患年不長也且夫神仙愚惑如繫風捕影非可得也伯思乃止陳伯臺稱云女尚書之俊耳禮修順姑恩愛溫潤禮修趙嵩妻張氏女也姑酷惡無道遇之不以禮修終無慍色及寧父母父母問之但引咎不道姑卒感悟更慈愛之鄉人相訓曰作婦不當如趙伯高婦乎使惡姑知變可謂婦師矣後姑病女來省疾姑卻之曰我死固當絶於賢婦手中後遭米賊嵩死乃碧塗面亂首懷刀託言病賊不逼也養遺生女依叔父立義終身者也樹南悼夫輕死重信韓樹南南鄭人趙子賤妻也子賤初為郡功曹李固之誅詔書下郡殺固二子憲公季公太守知其枉遇之甚寬二子託服藥死具棺器欲因出逃子賤畏法勑更驗實就殺之及固小子燮得還子賤慮燮報仇賃人刺之燮覺告郡殺子賤初樹南諫子賤子賤不從及臨死許共并命兄弟嫂侍婢視守之經百餘日乃怠白兄嫂念一死萬不得生不敢復圖死也上下以為信然無幾時於幕下自煞祈祈令姬如玉如金允矣淑媛齊德薑任總讚此九人也述漢中列女右漢中士女讚第五凡三十四人梓潼人士鎮遠敦壯立勳南瀕文齊字子奇梓潼人也孝平帝末以城門校尉為犍為屬國遷益州太守造開稻田民咸賴之公孫述時據郡不服述拘其妻子許以公侯招之不應乃遣使由交趾貢獻河北述平世祖嘉之徵拜鎮遠將軍封成義侯南中咸為立祠子忳有令德為北海太守巨遊玉碎高風金振李業字巨遊梓潼人也少執志清白太守劉咸慕其名召為功曹十命不詣咸怒欲殺之業徑入獄咸釋之公孫述纍聘不應述怒遣鴻臚尹融持毒藥酒逼之業笑曰名可成不可毀身可殺不可辱也遂飲藥死述恥殺善士賜錢百萬子翬逃匿不受建武中察孝廉為遂久令文堅亟哉南面懷民景毅字文堅梓潼人也太守丁羽察舉孝廉司徒舉治劇為沇陽侯相高陵令立文學以禮讓化民遷侍御史上計吏守關請之三年不絶以子顧師事少府李膺膺誅自免久之拜武都令遷益州太守上事吏民涕泣送之至沮者七百人白水縣者三百人值益州亂後米斗千錢毅至恩化暢洽比去米斗八錢鳩鳥巢其聽事孕育而去三府表薦徵拜議郎自免歸州牧劉焉表拜都尉為人廉正疾淫祠勑子孫惟修善為禱仁義為福年八十一而卒盛國好學研頤聖真楊充字盛國梓潼人也少好學求師遂業受古學於扶風馬季長呂叔公南陽朱明叔潁川白仲職精究七經其朋友則潁川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海內名士還以教授州里常言圖緯空説去事希略疑非聖不以為教察孝廉為郎卒漢伯肄業諸生之純景鸞字漢伯梓潼人也少與廣漢郝伯宗蜀郡任叔本潁川李仲渤海孟元叔遊學七州遂明經術還乃撰禮略河洛交集風角雜書月令章句凡五十萬言太守貺命為功曹察孝廉舉有道博士徵不詣然上陳時政言經得失又戒子孫人紀之禮及遺令期死葬不設衣襟務在節儉甚有法度卒終布衣伯禧效志張壽字伯僖涪人也少給縣丞楊放為佐放為涼州賊所得壽求之積六年始知其生存乃賣家鹽井得三十萬市馬五匹往贖放道為羌所劫掠盡凡往三年計道遠不可得數乃單身詣虜涕泣自説虜哀其屢來遣放隨還郡召為中候詔書除巫尉以身佩印盡讓所有財物與三弟復為郡掾量平賦役歲出三百五十萬遷功曹史徙五官掾卒李餘殘身李餘涪人父早世兄夷煞人亡命母慎當死餘年十三問人曰兄弟相代能免母不人曰趣得一人耳餘乃詣吏乞代母死吏以餘年小不許餘因自刎死吏以白令令哀傷言郡郡上尚書出慎太守與令以家財葬餘圖畫府廷寇王二子行勇以仁寇祺字宰朝梓潼人也與邑子侯蔓俱學涼州蔓後為渤海王象所殺祺杖劍至象家值象病象謝曰君子不掩人無備安有為友報讎煞病人也祺乃還久之復往煞象由是察孝廉為霸陵令濟陰相王晏字叔博涪人也與廣漢張昌寧叔受業太學昌為河南呂條所煞晏叔煞條事在叔解李助多方以茲立稱助字翁君涪人也通名方校醫術作經方頌説名齊郭玉章武之興亦迪才倫德賢好古淡心藝文李仁字德賢涪人也益部多貴今文而不崇章句仁知其不博乃遊學荊州從司馬德操宋仲子受古學以修文自終也國輔皓然形動神沈杜微字國輔涪人也任安弟子先主定蜀常稱聾闔門不出建興二年丞相亮領州牧選為主簿輿而致之亮引見與書誘勸欲使以德輔時微固辭疾篤亮表拜諫大夫從其所志思潛遊學休志素林尹默字思潛涪人也少與李仁俱受學司馬徽宋忠等博通五經專精左氏春秋自劉歆條例鄭衆賈逵父子陳元服虔注説略皆誦述希復案本以左傳授後主後主立拜諫議大夫丞相軍祭酒子宗亦為博士耳欽仲朗博訓詁典墳李撰字欽仲仁子也少受父業又講問尹默自五經四部百家諸子伎藝算計卜數醫術弓弩機械之巧皆致思焉為太子中庶子右中郎將著古文周易尚書毛詩三禮左氏注解太玄指歸依則賈馬異於鄭玄與王肅初不相見而意歸多同孫德果鋭作劉幹臣李福字孫德涪人也先主初為成都令建興元年遷巴西太守後為江州都督揚武將軍入為尚書僕射封平陽亭侯延熙初以前監軍領大將軍司馬福同郡梓潼文恭仲寶亦以才幹為牧亮治中從事丞相參軍衎衎褘彥玉潤蘭芬劭名表器江漢之俊總讚十五人也述梓潼人士季薑雍穆化播二婦王氏世興實由賢母季薑梓潼文氏女將作大匠廣漢王敬伯夫人也少讀詩禮敬伯前夫人有子博女紀流二人季薑生康稚芝女始示凡前後八子撫育恩愛親繼若一堂祖母性嚴子孫雖見官二千石猶杖之婦跪受罰堂歷五郡祖母隨之官後以年老不願遠鄉里薑亦常侍養左右紀流出適分已侍婢給之博好寫書薑手為作帙於是內門相化動行推讓博妻犍為楊進及博子遵婦蜀郡張叔紀服姑之教皆有賢訓號之三母堂亡薑勑康稚芝婦事楊進如姑中外則之皆成令德季薑年八十一卒四男棄官行服四女亦從官舍交赴內外冠冕百有餘人當時榮之王氏遂世興杜慈專專父不諒只慈涪杜季女巴郡虞顯妻也十八適顯顯亡無子季欲改嫁與同縣楊上慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑死就養成室存亡等但欲在終供養亡不有恨願不易圖季知不可言而奪也乃密謀與楊逼迫之慈縊而死敬楊雪讎壯踰烈士敬楊涪郭孟妻楊文之女也始生失母八歲父為盛所殺無宗親依外祖鄭行年十七適孟孟與盛有舊盛數往來孟家敬楊涕泣謂孟曰盛凶惡薄命為女無男昆惡讎未報未嘗一日忘也雖婦人拘制然父子恩深恐卒狂惑益君禍患君宜疏之孟以告盛盛不納漢安元年盛至孟家敬楊以大枚打殺盛將自殺孟止之與俱逃涪令雙勝出追聞其故而止安慰二門會赦得免中平四年涪令向遵為立圖表之惟茲三媛仁暢義理邦有斯嬪以馳遐紀總讚三人述梓潼列女右梓潼郡士女讚第六凡士女十八人二州人士自漢及魏二百四十八人而已後賢二十人合二百六十八人以示來世之君子焉如其遺脫及後世可書者願貽後雋又春秋穀梁傳首敘曰成帝時議立三傳博士巴郡胥君安獨駮左傳不祖聖人後漢時魏郡太守王牧薦尹方為三公天子詔尚書郎蜀郡張俊策之然不詳其行事撰曰二州人士自漢及魏可謂衆矣何者世宗多事則相如麟遊伯司鳳翔洛下雲翳叔文龍驤在孝宣則王褒蔚炳中和作詠屬文甘泉葩為世鏡在元成則君公謇謇心思國病慮經劉危直忤王聽其高者則嚴君味道易俗移風仲元端委居為人宗若夫秉心塞焉與物盈沖則楊子雲也名重泰山華夏仰崇則鄭子真也不屈其身志高青雲則譙玄也不恥惡君混道推運則楊宣也降及建武明章以來出者則能內貫朝揆外播五教贊和鼎味經綸治要上答太階下允明照處者則利居槃桓皓然玄蹈天爵玩之人爵則笑懸車門肆夷惠齊紹若斯之倫海內服其英名洙泗方其煥耀矣故曰漢徵八士蜀出其四又曰漢具四義蜀選其二可謂不衆乎然巴郡胥君安以儒學典雅稱於孝成蜀郡張俊策問尹方不出五經常義犍為呂孟有託孤之節若茲之類郡邑往往垂象刊銘見有苗裔璩晚生長亂故老以沒莫所咨質不詳其事但依漢書國志陳君所載凡士女二百四十八人而已後賢二十人合二百六十八人以示來世之好事者如能詳其遺脫及有可書願附於左其傳志父祖子孫及有名失事失官位者不列寧州人士亦不列別為目録至晉元康末凡三百九十一人也
